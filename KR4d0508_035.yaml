body:
  text: 至正集卷三十五元許有壬撰序文過集序丁丑分省予以五月二日發京師八日達上京大臣日侍帷幄時陪論奏退則入省治常事軍國機務一决於中而京師㽞省百事所萃必疑不决暨須上聞者始咨報故分省簿書常簡叅議左右曹非有疑禀不至都堂日長閒退恆兀兀獨坐間得朋㳺歌詩率爾賡和心有感觸亦形詠歌乘興有至一二十首而無心營度一字亦復動涉旬日七月十七日奏歸日定有司次第治行予亦諭僮僕槖衣以俟諸生李冕掇拾謬作得百廿首予視而嘆曰夫士之窮者乃工於詩予竊禄逾涯人不謂窮也謂予不窮則昔人以道不行為窮方今𤣥象示儆獠夷弄兵浙人號饑中州告水官瘝民疲財殫粟耗而予靦顔執政道果行乎悲夫予盖窮者也窮者詩宜工而復不工何哉彼之窮歛其心力一寓於詩予之窮雖疲精竭神於所當為而識淺力劣卒不能為至於詞章小技亦遂俱廢彼之窮猶有詩予之窮併詩而無有而不工猶無也予其窮之尤者也而不工之語時託箴諷滕口譊譊者又小人之文過也因題曰文過集以識予過因以見小人之志又有不在於詩者焉仇雲軒先生訓子詩序大徳丁未識仇濬公哲於京見其始婚始仕仕至西臺治書病歸遂不起繼識其兄濟公度與之交如其弟乆益厚有壬承乏中書公度為户部後守晋寕終更有壬亦投劾歸不揆非偶為小兒請婚公度不鄙二姓之好遂合昔公哲嘗以子昻趙公撰亷訪公碑刻為貺因知其先世之詳至正丙戌赴召入京公度又出大父雲軒先生訓子三詩盖亷訪守威州先生就養時所作也南北名勝題詠充積且徴及有壬有壬惟四十年交㳺兄弟間先之以故舊重之以婚姻則吾二家之好有非他人之所能及者焉而其先世之善可不知乎知而可復訒於言乎古人之學其要在於遏人欲存天理理明欲盡人爵從之先生詩三章其一以禄養為喜二以主一勉之三以從禽戒之其具知古人之學者乎且言行交謹禄在其中修其天爵人爵自至聖賢格言也先生之訓其子亦本於是而已矣然聖人之教後於干禄先生之詩先於禄養者何哉盖泝流而達之源也人有是禄而不及養者有矣禄而及養喜當何如不惟子為父喜而父亦為子喜也今之有是禄者原諸學也勉其主一則天理存戒其從禽則人欲遏理存欲遏子可以保其禄父可以樂其養矣諸葛孔明訓子修身養徳栁直清戒子崇好優㳺辭雖不同義則一也亷訪公克承家學名節焯著公度公哲為時名卿伯也治公望終江淛省郎中季也浩公善今厭次縣尹皆有古良吏風夫豈無所自邪諸曽仕者日起學者日進先生之澤其益悠乆而後之如區區締附於高門者不復省崔盧李鄭販鬻松檟之疑矣嗚呼盛哉大一統志序至元二十三年歳丙戌江南平而四海一者十年矣集賢大學士中奉大夫行秘書監事扎瑪里鼎上言今尺地一民盡入版籍宜為書以明一綂世皇嘉納命扎瑪里鼎洎奉直大夫秘書少監虞應龍等蒐集為志二十八年辛夘書成凡七百五十五卷名曰大一綂志藏之秘府應龍謂比前代地理書益為詳備然得失是非安敢自㫁尚欲網羅遺逸證其同異焉至正六年嵗又丙戌十二月二十一日中書右丞相伯勒齊爾布哈率省臣奏是書因用尤切恐乆湮失請刻印以永於世制可明年丁亥二月十七日皇上御興聖便殿中書平章政事特穆爾逹實傳㫖命臣有壬序其首臣聞春秋所以大一綂者六合同風九州共貫也然三代而下綂之一者可考焉漢拓地雖逺而攻取有正譎叛服有通塞况師異道人異論百家殊方指意不同亡以持一綂議者病之唐腹心之地為異地而不能一者動數十年若夫宋之畫於白溝金之局於中土又無以議為也我元四極之逺載籍之所未聞振古之所未屬者莫不渙其羣而混於一則是古之一統皆名浮於實而我則實恊於名矣且統之為言昉見於易乾之彖曰大哉乾元萬物資始乃統天説者謂天也者形也統也者用形者也象曰天行健君子以自強不息則又示人以體乾之道盖天為萬物之祖君為萬邦之宗乾以至健而為物始乃能綂理於天皇上體乾行健以統理萬邦所謂一綂萬類可以執一御而六合同風九州共貫之機栝繫焉九州之志謂之九坵周官小史掌邦國之志外史掌四方之志志之由來尚矣况一綂之盛跨軼漢唐者乎是書之行非以資口耳博洽也垂之萬世知祖宗創業之艱難播之臣庶知生長一統之世邦有道穀各盡其職於變時雍各盡其力上下相維以持一統我國家無疆之休豈特萬世而已哉統天而與天悠乆矣宋顯夫文集序予卧病田廬有禁近之擢廹命就道惶汗無措而復竊自喜幸故人宋君顯夫實直學士恊恭侍從自公論文亦一樂也比予入京前十五日而顯夫卒矣予病亟歸不得省其孤承詔復來顯夫已贈國子祭酒諡文清思而不可見惜哉孤籲奉燕石集拜且泣曰此先子所遺兄彍編次者也世父至治集公既序之敢援例以請予序誠夫文不一紀又序其弟人之生世其可悲也夫昔顯夫兄弟入京首與予㳺盡眡予所著睽難有作必寄故知其長蚤且悉也及閲顯夫藁則未相識時歌詩已嘗及予重以三十年分誼之篤序可辭乎國家設貢舉陶天下以經術餘三十年文當日昌而名能著見者何其指之不多屈也積儲之不厚也造詣之不逺也取而遂竭發而自柅拘拘規倣而倀倀乎所適者欲昌得乎惟其有所本也有所叅也該洽沉潜心有所得濟以定力而熟之則於辭也决淵渟而灌溝澮策堅良而走康莊庶乎其達矣顯夫登甲子科考其作未有貢舉前已汨汨矣視誘利禄而重得失忽於播而急於獲者不有間乎人知其才而不究其積儲造詣之有素也不竭不柅而又有進焉故予序其集而原其得俾後之觀者有激焉集凡若干卷文若詩樂府若干首自名燕石然世皆信其為玉也彍由奉禮郎為丞相東曹掾彚從父之文不使遺逸不愧顯夫之於誠夫矣籲甫襄事即謀刻父文宋之後其益昌矣哉巴克實彦卿四詠軒詩序至正乙酉皇上軫念黎元遣使者行天下予時僻居安陽西山竊屈指當代人物之稱者監大興府巴克實彦卿實億中者也使車四出彦卿分湖廣持斧發硎始割即㳺刃省縣地聲動天下未幾有太夫人憂於是贓吏之辭印綬具舟楫將逸去者皆復歸矣朝廷考使者賞集賢侍讀學士不起彦卿京國人家都城圖書滿室矻矻進修居有四詠軒盖即卉物之與景遇者掇為四題俾同志詠歌之以寫其胸中之樂而寓觀物之意焉人之常情狃於己者媮誘於人者流世禄鮮禮能不媮乎京師侈麗盪奔相偏有不流者乎不媮不流君子貴之況力於學而有得者乎學有得矣物特寓爾齋居黙坐萬象昭晰我之得者言可既乎及接於目一卉一物莫不有契於吾心融乎中而觸乎外也若四詠所謂紅藥之於風松之於月石之雲筠之雪皆吾胸中之緒餘爾君子之學致力於静以應動彦卿見諸動者若是其有得可知已非徒為景物役也擴而充之藥也松也石也筠也非庭前之草前川之花栁乎風非光風乎月非齊月乎雲非膚寸而施普者乎雪非洪爐之㸃化者乎人以功名期彦卿予獨望彦卿功名之外焉諸公既賦詩徴序其首為之説若是不失人矣特進大宗師閑閑呉公挽詩序至正六年十月七日特進上卿𤣥教大宗師閑閑呉公薨於大都崇真萬夀宫承慶堂中朝士大夫駢呇走弔莫不哀傷哀傷之不足又形諸歌辭諸弟子裒為卷軸徴序其首以倡嗣音以廣其哀焉有壬交㳺三十年昔在政府嘗奉勑賛公像有人以為仙我以為儒之語士論不謂過也得請歸公遺雲林小影曰我不能去以我像行是我從公于邁也今年四月赴翰林學士召甫入京公即率其徒治具相勞旅館中既陛見將歸造承慶堂不告以故但酒至為引滿公曰快意若是豈欲去而留别耶有壬明日遂行閏十月再赴承㫖召至京則公已殯於嶽祠光岳堂矣嗚呼惜哉公年十三學道十六已㧞萃班行其師神徳真君受世皇殊眷江南初定有事南嶽公以大弟子選行神徳代祠嶽瀆公實輔行年二十三聲望赫赫矣始授冲素崇道法師南嶽提㸃加號𤣥徳改大都崇真萬夀宫提㸃拜𤣥教嗣師總攝江淮荆襄等處道教都提㸃神徳觀化制拜公特進上卿崇文𢎞道𤣥徳廣化真人總攝江淮荆襄等處道教知集賢院道教事𤣥教大宗師皇帝即位親御翰墨書閑閑看雲四大字以賜年益高體日健勝目障而復明恭迓龍虎臺歸歴造故舊戒其徒畨㳄肆設飲必盡歡坐是得疾越八日中夜命弟子焚香中庭更衣正寢端然而逝夀七十有八平生勇於為善不以方外自疑故凡政令之得失人才之當否生民之利病隂有以禆益於時者人不知也與人交終始不渝至其子孫猶周恤之平居晏坐扣以國初事歴歴覼縷世家源派隆替顛末按譜敷陳有不及者經乆覆扣一語不爽二親之存屢歸為夀其没也得請襄事以能喪聞䟽封贈謚備極㤙榮夫神仙之事不得而知吾儒闢之以其亂大倫也若公事君而忠事親而孝謂之亂倫可乎夀傳八旬翛然而返㝠漠與造物者為徒視無益於世白日輕舉而稱神仙者世必有能知其孰是孰非者也其生質之異際遇之隆言行之實則有侍講虞公道行述方將銘堅珉登太史何事於序諸弟子奉冠劔歸塟有日請益切故為述三十年之契以寫不能自已之情而舉其出處之槩以導紼謳斥苦之和者焉秋谷文集序相國李韓公秋谷先生薨之廿七年子獻由叅議中書省事拜治書侍御史有壬實中丞一日出先生文集俾序其端昔蘇子瞻恨不及一見范文正公與其季子徳孺同官於徐序文正遺藁以挂名文字中自托門下士之末為幸而有壬之擢第也先生實坐主接餘光親誨益不少視子曕之於范公則有壬之幸多矣序其敢辭先生以雄邃之學為帝者師功勲在王室聲名滿天下自九重以至於里巷皆以字稱才氣跌宕落筆縱横歌詩流播荒陬下邑傳郵逆旅往往大書於壁然世知歌詩而不知其文知其文而墓碑未出不知其功勲之大之詳也國初因仍吏治日就媮窳士氣奄奄僅屬先生在潜邸日夕啟沃謂儒者可與守成一旦當國即行貢舉盖倡於草昧條於至元議於大徳沮尼百端而始成於延祐亦戛戛乎其艱哉三十年來得人之列於庶位者可枚指也士風之隆替治化之樞紐在焉大徳之末丁國勢危疑神器杌隉之㑹猶操舟灧澦三峽遇排山倒海之風而能力賛祕䇿卒底平濟非社稷之臣乎若夫名爵掃地而削其尤錫予空帑而復其舊大官恃不鈎檢而覈其濫宿衛依憑城社而汰其冗貴近世臣莫敢議及乃挺身任之灼知將來之危而不恤也國家用儒者為政至元而後炳炳有立者先生一人而已有壬因暴其槩使讀是集者知有徳有言且以見功勲之出有原柢也皇上追念勲徳贈舊學同徳翊戴輔治功臣太保儀同三司上柱國追封魏國公謚文忠獻字伯徴世濟其美詎可量也哉送呉安之赴渤海縣尹序守令皆近民令則尤近民邦本也宜培宜溉不培不溉而又㧞之揠之能茂且碩乎委諸萎芥者是不培不溉也委諸貪虐者是㧞之揠之也令可不擇乎為之令者職可不盡乎人才古今為難擇之為尤難彼有軋於上抳於下而以為不可為者復有高自標掲以為徒勞而不足為者吁以為不可為者愞也以為不足為者妄也聖天子勤恤民隠守令之法徴覈古今始末精到里人呉君安之由奉使賛幕權尹渤海安之嘗掾中臺除南臺管勾他人率階是揚揚入臺省而安之僅得令人謂其不悦而坦然無不可為之虞亦無不足為之率將行請言於余夫君子不計其位之崇卑貴其道之得行民事非一良法具存主以寛慈任以定力惟義所在孰軋孰抳令果不可為乎漢以郎官出宰唐詔郎官必擇嘗任令者宋制非兩任令不擢監察今之令猶古之令也令果不足為乎且令之養民猶農之養穀春種夏芸朝撫夕視頃刻忘乎懐非善養也然農非善養而害之者多矣水也旱也螟螣也蓼茶稂莠也水旱必備螟螣必去蓼荼稂莠必媷盡吾力矣而後可諉之天若夫不備不去不媷而望無飢不可得也甚者戕其根艾其葉惨於水旱螟螣過於蓼荼稂莠天下之賤農有不忍為者矣而乃有忍為之者可勝歎哉渤海古名地漢龔遂可考也安之種學積文年富力強任其勞弗求其逸慎其易弗辭其難其天下之良農乎召對異數匪朝伊夕余雖不與考績尚能為子紀其實安之曰敢不敬蚤夜以求事斯語於是常所往來者率為詩而余以是序其端六事備要序愚待罪中臺今衛輝路總管劉侯清臣實御史熟其賢也愚歸郷里與汲接壤深居田野政譽盈耳既而貽書於愚曰謭材承乏思有所矜式輯書曰六事備要幸序其端其書盖取昔賢黄霸而下凡百人區列今日條格六事為六卷誠有益為政之書也國家重熈累洽百度修舉獨守令法迭為更張皇上御天尤軫宸慮於是辟舉之法責成之訓優待之禮無所不用其極矣且今六事根昔五事也増農桑學校常平法户口田野其有取陸宣公之議乎農桑富之而後學校教之至於賦役虞夏之不能免則使之均而不濫詞訟羣居之不能已盗賊隆古之不能無化之使息上也簡之屛之次也夫然後水旱之係於天者不常則為常平以賑之為政之本末備矣雖然法則備矣而有在於法之外者焉周官曰學古入官議事以制政乃不迷叔向譏子産鑄刑書其有意乎先生人法並任任人為多天下之大事變無窮人才之生愚哲異適非其人視成規不能行甚者隳易之得其人法雖未至推而充之為利百倍況備若今日其及人可勝計哉若清臣其人也又輯書取善得學古入官之義矣取善一人有餘師況百人中大儒名相班班可考推其道足以淑天下後世一郡云乎哉愚於清臣有望焉使作郡皆如清臣民何幸歟或愧焉則觀是編其亦有所興起哉是編不獨淑諸己利一郡又將淑諸人而利天下也於治道豈小補云節義集序節義集者安成劉萬東之所輯也天地間林林總總莫非人也比屋可封之俗邈不可復特立獨行者幾人哉自非姿禀之挺出流俗學力之洞徹重輕鮮有自㧞於瀾倒風靡之中者一有其人史必書之以其為之者難而行之者鮮也萬東篤學通古今其有所激乎凡簡册所紀迄於我朝士行女懿之有闗名教者裒而彚之詩而歌之使讀者開卷歴歴千載之下思其人凛然如生而諷詠其詩反覆滛泆有不悠然而得暢然而興者乎以予昔嘗見之長沙走書請序嗟夫節義天下之大閑也為臣者必知有君為子者必知有父為婦者必知有夫夫豈強人為之者哉惟其陷溺崩頺而不能固也則為之閑者可不植乎植之之道非不力也有感觸之機焉感觸之機顧不在詩乎是集之詩有作有述述者才五條餘皆作也作詩不闗名節非詩也三百篇之㫖盖可考焉是集有闗名教者也喜為之書至正集卷三十五
