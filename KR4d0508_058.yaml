body:
  text: 至正集卷五十八元許有壬撰碑志故西華縣尹楊君墓志銘君諱伯循字循禮姓楊氏世居湯隂鶴山曽祖諱寳祖諱林始遷安陽壽八十七妣韓氏壽八十五考諱青字才卿善廢舉用是豐裕壽九十二旌髙年耆徳妣梁氏壽八十九長子永福能世其業次君也起家冬官行人除曹州成武縣主簿官進義校尉有惠政邑人紀之碑終更人不能忘又為去思碑改濟寕路金鄉縣主簿進寳義校尉益自砥礪風紀交薦其能民又紀之碑陞忠顯校尉京畿萬斯南倉監支納親老不赴二親没服闋擢陳州西華縣尹需次田里至正三年七月廿二日以瘍卒年五十有三是年八月廿八日祔相縣固先塋配和氏子二人長曰振次曰郁女一人未行孫堅孫甫四嵗余始識循禮京師熟其誠慤故瑣屑皆諉之來郷里才卿已九十餘時獨騎相過健捷如少年予今之來才卿已逝可念而循禮適赴調歸話存沒相慰勞俄别去行田遂不起振以總管杜公叔愚狀偕來請志嗚呼循禮家饒羨有子且有孫沒可無憾余獨悲其祖考妣考妣皆以壽稱循禮又鄉里稱善人者冝享上壽而僅若是惜哉又悲其兩在貳佐見之設施能使邑民悅服薦剡迭上使地居得為吾知其效視已試必倍得其地矣而卒不得施西華之民視成武金鄉之民何其不幸哉始循禮﨑嶇棄養干升斗之禄以顯親也七品法當推恩其親格已及矣而親與身皆不待西華之民不幸孰與循禮之不幸耶是雖人力之所不及而又不能不為之悲焉銘曰貳邑不卑厥聲四馳長人可為乃不獲施兩世四人兒齒黄髮心有弗究孰為是恝西南之原萬枳維藩祖考是從體魂孔安念子父子過從嵗久子壙我銘是亦子壽故濟寧路醫學教授李君墓碣銘醫之為術重矣哉民蹈於辟懲復生復屬之不可覆讞究極得其情且不忍世乃有以齊民操是權者寒温虛實毫釐千里為之術者可不謂重矣乎周疾醫治疾養以五味榖藥眡以五氣聲色兩以九竅參以九藏法若是其備也書其所以稽事制食責若是其至也生民之遂其壽宜哉我元擴好生之徳建學立師徧乎天下視周制有加焉至元後庚辰有壬赴召道參户病暍鹺使以教授李君之㑹薦所苦尋愈癸未再見始悉其藴久乃出其父教授君行實請銘而又悉其家學之有自也君清州㑹川人大父諱仁父諱琮三子曰祐曰忠曰克讓字仲謙君也穎悟嗜學九嵗喪父人異其哀事母以孝聞外舅張儀之世業醫有聲燕趙間從學有得醫院檄為滄州學正陞河間路教授講席凝塵慨然曰我職雖輕責不輕也奮然以師道自任郡守洞其學始尊禮之由是學者沓至迄有著效天竺僧貴至司徒欲與俱北以老母辭職教八年移真定母憂以能喪聞服除調衛輝又轉濟寧致仕歸居參户宻邇鄉里生齒繁有以行其施扁齋曰庸因自號云至正二年三月十九日卒於家壽八十有三四月三日葬㑹川孝感原配張氏前十年卒祔焉子三人曰瑞曰端皆早世曰亨之㑹也仍河間教授孫男二秉直業儒篪早世女一尚㓜君為人和易頎而㓗晳冠服甚都人望而敬口無調謔手絶奕弄請求塞門貧富不二其徒多著有為國醫者士議君為醫根儒故其造詣非淺淺者所能企及五十年人活叵計使書其所以稽事制食庶㡬無愧者乎隂徳以活人為大孫思邈極言隂陽報施豈誣也哉君活人多未食其報亨有子業儒其在是也夫銘曰軒岐奥義傳昧謏聞不根于心猶稼弗芸弗芸而薉其喪有幾傳昧之患仆則莫起大聖垂訓灼如日星學焉不精盲索㝠行天闢壽域官師建設其名其章遂與儒埒紆青滔滔一命是榮孰究其職孰半其能宋清藥市清風栁筆以而之能辭其可釋徴而在人顯而在天有報不忒時或後先八十三年天不爾嗇孝感之原尚沛其澤贈朝列大夫祕書少監騎都尉安陽郡伯莊公墓誌銘同知順徳路總管府事莊溥授其弟封同知林州事誠行狀諗於郡人許有壬曰先子見棄且三十年葬若祭雖若可以為說者而納壙無銘有善弗章今不幸母復見棄啟祔有日吾母之善不可無志也吾母不可以無志吾父可以無志乎因吾母之祔啟吾父之壙而納之銘銘復有託豈遲速有待而天假以今乎溥衰絰不敢違次以請幸哀而賜之銘有壬不及識溥父交溥久知其人在里閈知其家銘亦宜哉莊氏之先潞州上黨人至俊徙彰徳安陽俊生榮榮生信字信甫是為溥之父以溥貴贈承直郎禮部員外郎進奉議大夫太常禮儀院判官驍騎尉安陽縣子朝列大夫祕書少監騎都尉安陽郡伯貎偉而度宏喜施而不責報兄弟四人友敬著一鄉妣張氏教毓有法故不墮凡近使鄉里稱長者殫力治生家日充裕延師教子姪百口無間言再從子清洎弟妹四人無所依撫育勤至為之嫁娶焉故舊喪有貧不克舉者為擇便地具棺衾延祐三年六月二十八日卒於家年六十有一七月三日葬安陽河次村先塋配王氏同郡處士子文女封恭人進封安陽縣太君安陽郡太君㓜淑慧能誦書詩婦工臻極年十八歸莊氏事姑五十年不怠與諸娣居六十年睦如兄弟一門事仰成不以為勞臧獲有疾必躬視之至正四年閏二月廿一日棄代于溥官所壽八十有九是年五月二日祔少監墓二子溥其長㓜多病鞠養尤苦甫冠俾入胄監肄業由伴讀貢士部轉集賢掾除承直郎懐慶路推官轉奉議大夫太史院都事陞朝列大夫為今官次本純篤克家一女將嫁而卒孫男二曰文暉㓜未名孫女一姪男十四人姪孫文昭登至順癸酉進士第起家承事郎同知潞州事辟掾西臺轉中書右曹掾除工部主事文雅廣平儒學録初溥南北蹭蹬欲養莫遂及調順徳宻邇鄉里奉板輿以行太君亦欣然就養而年在喜懼故惴惴欲辭歸決閏月二十日行而十六日遘疾遂不起為終天之恨然父母教子見其有成而享其禄養無睽離之憂壽而考終於子婦之手人子之心其亦可以無悔乎然而人子欲親之壽寧有既耶壽不可力致也銘其善不使湮没是獨不可力致乎銘曰於戲祕書没三十年發身施仁鬱而弗宣其鬱其宣葢亦有時時罔克力曷云已而幽墟一閟沒齒泣血偕未亡人兹焉同穴茫茫昊天踽踽孝子附傳有聞親則不死世有兄弟乃䦧于牆亦有婦姑勃豀若常一國幾人所慕巨室夷考或虧齊民何式父為賢父母稱賢母何以知之有子如溥嗟爾來嗣聿慎厥修以迓以續相彼洹流故漕運同知紐赫公妻伊徳氏墓誌銘夫人名瑞童系出伊徳氏髙祖察罕太師河南武宣王開國有功父賔咱雅遼陽行省右丞妣巴雅爾内範㳟肅夫家奕世冨貴而削華服儉夫人質稟懿淑濟以慈訓故成習異於人惟紐赫氏為金世臣曰鈞我元中書左丞相子南合中書平章政事樂相風土家焉相人稱中書家平章孫世臣中憲大夫同知京畿都漕運使司事中憲以貴盛難昬夫人家亦偃蹇擇壻地均徳齊二姓之好克諧中憲祖妣妣皆伊徳氏至夫人則連姻三世矣延祐乙卯九月來歸一門千口里南北連阡陌中憲縻於官漫不暇省需縻不貲夫人苴補移掇不使見罅缺宿臧老獲皆慴伏中憲不幸四十一而卒夫人屏斥華澤勵節治家坐亦有常處田園經葺有加焉初封恭人再封威寜郡君至正四年甲申四月二十一日以疾卒年四十有六六月三日庚申祔湯隂小韓村中憲之墓一子禄通教不少貸每戒之曰汝父㓜沖失父母孑然有立敭歴駸駸天遽奪去先烈烜赫繼承不墜責其在汝矣禄通服膺惟恪懲父養不待冀得盡於母夫人之卒禄通適在京奔歸日已兩浹矣禄通以其友陸愷所述行實請銘予惟女徳之懿世宜有聞徵諸鄉里昔南北分裂相直兵衝聚異合汙俗龎以偷而世變無常風移俗易唐宋而下女節義班班可考也朱子采顔氏一時之言而不知遺風之已殄也觀夫人之善則知吾鄉風俗之美漸摩之久有自來矣予與中憲交知夫人之賢且欲有以聲吾鄉之非昔也為之銘曰奢麗敝化貴驕速亡夫也不免女也曷望脱襁怙侈世家習禄不慎厥居瓴建其覆戚疏萬趾言不易刑制以閒雅截截户庭我生不辰為未亡人一日未亡一門在身有子孑遺常情溺私易愛以嚴是為大慈良人永逝教子有立而壽不昌而事斯畢元故集賢侍講學士中奉大夫徐公墓誌銘愚交鄉人得善人徐公焉公由汴反鄉里病革但一再見至正四年六月十五日薨夫人介其親請誌其墓公諱奭字周臣其先武陟人曽祖考諱義金季遷安陽祖考諱珪累贈嘉議夫夫兵部尚書上輕車都尉東海郡侯考諱秉元朝列大夫同知建昌路總管府事致仕累贈中奉大夫江浙等處行中書省㕘知政事䕶軍東海郡公祖妣王氏蔣氏妣續氏皆追封東海郡夫人公由國子生為學録除廣平路照磨掾禮部除拱衛司知事掾中臺中書右司除延福監經歴改太常禮儀院都事陞經歴户部主事陞員外郎拜監察御史劾臺臣不稱者由中書省右司都事出僉浙西道肅政亷訪司事入為中臺都事中書省右司郎中擢浙東道肅政廉訪使以靜治聞賛僧作橋以利病渉徵為户部尚書遂參議中書省事除禮部尚書改燕南亷訪使奏仍禮部拜治書侍御史與言事者不合遂歸俄復除禮部尚書擢河東山西道宣慰使拜河南江北等處行中書省參知政事改集賢侍講學士病不可支矣三子定僧佛留胡養皆夭養姪子亦死病葢坐是也得年六十五為人恂恂至官事有藴即發為參議有發倉儲為功者嘗折其人主者怒因斥為禮部其復留也實隂中之謂其虧在公為户部界域奏令督徴而歲月可考勢不容辨日事榜笞迄詔放始已歴官多績惜狀不見有待他日焉昔人為鄉里掾史稱善人斯可矣及人則未也使鄉里稱善人而致位赫奕又有及人之功焉少游斯下矣天道無親常與善人公善人也而卒無子傷哉兄戭章佩監知事卒弟良僉江西道肅政亷訪司事恪屯田長官陞髙郵鹽倉副使娶杜氏繼王氏今夫人劉氏追封若封皆東海郡夫人月日祔安陽郭里先塋銘曰天可必邪鴻濛沆茫孰徃致結不可必邪善淫福禍可待於立善或禍而淫或福又謂其未定之日及其定也善已禍矣定復何益伯道殺子天道亦冝公而無子有知無知豈所謂定者昌其名於不死失於彼而得於此凡重嗣續在先世祀叔也有子先世之祀無止公亦可以無憾矣至正集卷五十八
