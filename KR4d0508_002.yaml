body:
  text: 至正集卷二元許有壬撰古詩紫芝紫芝美孝子黄葵也葵之孝格于神故嘉瑞為之應焉曄曄紫芝生于靈丘蒼蒼格思惟誠兹酬曄曄紫芝不林不谷匪焯而心孰華而目絢兮皭兮著則慤兮哀哀我思終其漠兮惟黄有子我歌不侈罔俾九齡氏振古以擅史四章章四句陳氏念初堂靜觀宇宙無物無初惟繁斯棼惟逺斯疎哲人有惻乃顔其居俾求諸一貫此萬殊源而瀰漫根而紛敷始惟一身忍至道途繼承勿忘服盡愛俱雖千萬年亦今日如詠祖思陶譜族有蘇猗歟陳門異世同符及樂堂詩并序惟帝降衷孩提知愛考始百行愚哲攸同性也推至夫温凊滫瀡承顔養志舉盡其道則能盡其性孔訓之三鄒書之五有一於此其陷溺為何如能盡其性又有命焉親幸壽考傷哉其貧累茵列鼎欲養不待若夫及存而禄足甘毳而又康寧期頥子獲盡道是豈偶然者哉舉天下之樂無以尚矣北平劉進文質母王夫人年九十一聰明不衰調益都判官奉板輿行有日請曰天既厚吾母以壽康曾𤣥且二十人又豐吾禄秩俾有以為養吾獲此天地間其為樂也誠不自禁竊取曾子及親仕三釡而心樂之語以及樂扁堂子可為我詩之嗟夫為親至於見𤣥孫為子白髪而奉母能盡其道而不可必於天者又得之誠可樂也文質弟繼祖俱以孝弟稱子孫詵詵慶且川至是皆可樂而可紀者也其詩曰昬勞企秋伊農之貞力樹俟實惟圃之恒而圃而農有饉有飢人靡克遂天實致之育蒙期哲撫毳欲堅匪耄於愚則殤以鮮生願為兒養必致樂或傷不待或困藜藿昔也拮据于長于教今也怡愉施萬一報有黄者髮有兒者齒較年匪兹人孰謂爾諸孫白首孫婦已姑挈曾抱𤣥永日以娛皇皇天休秩與子偕後大斯審禎祥日來庭萱媚春綵服輝晝請歌我詩益介眉壽神山避暑晚行田間用淵明平疇交逺風良苗亦懐新為韻十首田塍晚獨策及此時雨晴東畦與西疃泱泱流水聲豐年已足歡清風復多情歸來籍草坐濁酒還自傾不用澆磈磊我懐無不平寢迹非絶世雅志便林丘青山足一至勝處靡不遊意適輒忘返兹焉夏已秋遙遙目力窮青青盡田疇迷復幸不逺歸歟無異謀脱身豪俠窟里氓締新交愛其心無穽不較醉語譊生兒更有教治地盡肥磽禾黍已在眼𤓰蔬早登庖愧子良已多况敢希由巢浮生苦無悰道近人自逺重外樂絢身遺世幾赫咺老農初不知遑遑嵗華晚清晨負耒出日夕行歌返悠悠千載心它人莫予忖落日照我影頎然溪水中凉飈動絺衣勢欲凌虚空顧之一大笑與爾將無同昔也爾何達兹焉爾何窮莫遣山林陋乃有黄虞風昔人植松栢暎蔚彌崇岡不為朝夕利千載當自長植槿非不榮我圃因之荒白髮走畏途途脩馬非良桑榆賴非晚此樂且無央靜念少日事躁中劇揠苗欲令千載淳反之在一朝斥鷃不自量上欲摶扶搖世態任盲俗林譏愧清謡傲骨日已長及辰事逍遙淵明昔歸休閲嵗才五十我年雖近似我道慙什百兼金與尺璧敢取儕瓦礫緬焉動真想迅往孰誘亦庶幾歸田園千年可同迹我聞昔桃源民風近無懐兹山亦深窈中有讀書齋但絶車馬迹不惜雲烟埋旁圍靡靡山上蔭髙髙槐聊以永今朝得酒従無膎我髮日以變山色日以新舉杯試問山古今閲幾人我非山主人聊為山之賓杖可入幽險詩能寫清淳但恐我它適山乎爾誰鄰和林春野見寄韻二首山中真可樂經旬無客來羣材足楩楠小臣甘草萊君看倦飛鳥投林不徐徊咄爾迷途人倀倀自紆回海鷗久已狎鸕鷀復何猜秋風看木落春風看花開既種子猷竹亦有逋仙梅先生可休矣大夫亦賢哉髙步雲漢濶蹣跚詎能陪尚可學采藥談笑到天台士生如大木皆欲架明堂寧知施用處用圓吾乃方歸來何所事琢句敷腎腸既為烟霞痼復作花月荒一壑今已専萬景身可當山空白石爛雲盡青天長故人逺相慰瑰辭聨夜光一展發曄曄再誦鏗琅琅貞松無冶容老桂多古香三復如見君嵗晚誰能忘送陳日新下第作吏擢科出倅郡并闈妄司衡多士于于來含芳吐華英陳子隼解絛氣薄秋空清衆目待一飛衆耳待一鳴如何夜堂深乃著瞶且盲冬烘我莫逃得失子所輕一瞬二十年鬢髮秋已驚顧我得逾分念子猶無成琴瑟况解張奎壁韜光精昔慙有遺才今慙負登明筐篚古雖鄙萬一志可行但期敦素志道義非功名徐公渡泛舟隆暑近莫逃泛舟涉兩舎昨辭城市喧豁若脱罟擭晨光動清波蕩影天上下縦横亂葭葦縈紆入川溠鮮飇不待延青山自來迓林君望咫尺雲間屋如畫世味久嚼蠟佳境今食蔗埜人傳好語時語了禾稼村酒賤可期雞豚亦在社伊誰從老夫一笻兩不借題神山徐復初拄笏軒小軒闢靚深有竹蒼玉立西山在吾目爽氣朝可挹此笏本長物聊用為手飾書思非吾事時還假揮斥江左昔偷安禄已去公室司馬慕𤣥圭坦之遂倒執滄海正横流皇皇欲何適敢期相料理我自甘野逸勿言晉多狂允矣狂也直悠悠千載心為爾長太息贈吳吾山世欲問窮達吾山能洞知老我不問命但問山屬誰青山處處有子豈能擅之吾不曰吾山山英將有辭謝熊堯章餽大茯苓故人念多病投我以茯苓如拳已足貴紀狀聞圖經眼明見異質斗大陋楚萍内儲貞玉白外皺乾蘚青喬松薄霄漢何年摧震霆餘撥槎枿在附根精液渟孕毓幾千載成此龜鼈形想當捎菟絲木魅驅竛竮𤣥壤發神秘蒼雲披杳㝠予年過半百鬢髮宜星星有懐事服食緣木思津絅筋力疲已甚始遂辭天庭一朝獲仙藥脩餌期致靈凝酥爛冰雪作餅謝膻腥半生足驚悸坐使神志寧三山得津梁百穀消蝗螟倒影反暘谷逝水回滄溟羽翰生白日豈特綿脩齡報子無瓊琚永好心當銘秋蟬秋蟬何咽咽竟日鳴不輟始隨雞唱曉遂及蛩吟月當時出汙穢風露養髙潔於世既無求底事苦喋喋豈亦感嵗時青林見黄葉我來逃空谷塵囂謝騷屑苦遭此物䀨坐使幽致歇清霜行秋杪未許滕口説同劉先逺盧正卿遊青山對雨槁壤得時雨瞬息生意足白日變𤣥㝠青林出膏沐坐觀漲横塘驚傳響脩竹開窓望陵坡麥穗一時矗凉飇靜自生旦氣清不梏佳人可晤語鄰酒今朝熟和前韻世路分多岐人生貴知足五年紫微垣今方快休沐茫茫宇宙間何地無松竹身隨心所樂興與雲俱矗讀書舌尚在揮毫手誰梏萬事勿多談老子計已熟得請南歸道過維揚王本齋轉運尚書大書七言二句見贈擬非其倫深用悚愧即其字為韻走筆賦十四首以答之驅車出都門摇摇適故里山川雖如昔父老半為鬼釋負誠足歡愴舊曷能已浮家一葉舟又渡淮之水五年玷班行幾似誰不去籠禽束逺翮櫪馬窘濶步解絛且脱羈一旦遂騰翥茫茫宇宙間何往非所寓昔賢及壯年勲業青㝠上白髮今滿頭愁共三千丈惟餘詩酒興欣遇時一放江湖好風物平地足波浪醯雞既出甕始知别有天學道愧遲暮簪纓妄拘攣采山茹得美釣水食有鮮厚養成醜繆一飡徒萬錢髙風勵百世一篇歸去辭晉豈無文章歐公亦非私但懐賢達人今古誰似之雲泥固懸絶涉海從其湄抱關守常職辭富初非讓跛履忽踰涯脩途誰爾杖不為糟丘仙當作詩壇將悠哉復悠哉我自敦素尚兔園自可樂龍門非所望徒承素餐羞本乏食肉相山林儘髙深消得屐幾兩悟此真不憂清吟繼漁唱百嵗已過半一途惟有歸蘆花烟水國恰值鱸魚肥此去狎海鷗與我應忘機敢言誇晝錦政爾羨荷衣巨舟阻弱水不能到蓬萊乗槎亦贏糧畢竟胡為來坎井蛙跳梁地適符其才漢江風雪裏行及賞寒梅達觀天愈大安步地自平回頭三十年狗苟復蠅營始知方外境風清月常明幾欲扣船歌又恐魚龍驚淮南古名鎮厯厯舊遊地政雖無留觀來尚多故吏二師瑚璉姿東南司大計笑迓舊將軍滿船沾臠胾身心何疎散經日廢綴作邂逅老詩仙技癢不可遏㑹少意自長楮盡氣未索奉上謹正堂詩仙定予噱陳力已無效摛毫猶有神明月樓中酒開明橋上春自知疎慵迹不是薄倖人休教街子見枉笑白頭新心逺程不迫身閒人即仙弭楫竹西渡坐見平山烟珠簾十里卷長街市井連可憐瓊樹月還照渡江船阻風泝流亦勞止况復逆長風百趾挽脩綆磬折嗟無功南來㳂流者挂席髙摩空長年嘯歌坐飄飄逐輕鴻矜彼方志得笑我為途窮寄謝順流人順境鮮克終月食常在盈日昃因其中八方鼔噫氣誰能必天公五兩行轉指將爾予今同但宜安所遇誰窮復誰通黄華山次王鹿菴韻吾聞林慮西兹惟羣山㑹一舎入髙寒百里見空翠雄踞韓魏境特立宇宙内雪波驚起陸天華亂縈蔕排雲列奇峯極目認涯際出泉如江河巖壑因横潰轉曲路疑盡喧豗地將沸千崕與秋髙一逕穿雲細仙凡幾塵隔跬步萬景萃攀援攻折屐馳騁謝攬轡水簾最雄偉清響落天外淵客泣淋漓天孫織纎麗空明幾百尺振古倦不易清氷瑤草亂白日洞天閟自非骨有仙未許踐福地盤石几席陳魯酒殽䔩配道士山中宜宰相山中貴泉石聽吾言吾言諒非戲洪峪用鹿菴韻穿雲驕馬瘏俯檻飛鳥還層峯爭獻奇一一青雲邊懸泉走白虹遙岑生紫烟肺腑巧遮掩岡巒隨折旋我有扶老笻不讓歸湖船三日得其凡一念窮其巔便將巢雲松終嵗看玉蓮誰能共幽討未用譏流連九日登鳳寧山亭亭鳳寧山形勢若飛動胡為不飛去仙真此摶空靈迹既不閟煙霞遂增重城居見其圖清賞時入夢今朝事幽尋霜風肅飛鞚適與佳節㑹更與佳人共危亭構兩翼飛雲連畫棟翠柏瀉秋聲紅樹列清供遐觀千里近長歌百杯送洹流潄其根俯瞰清可弄陟降自忘疲酬酢亦豪縦牛山何用悲兹方待鳴鳳謝鼎珠文參議餽鯽我生本寒素放浪居江湖得魚食便足一飽它何需胡為走塵土甘受口腹敺餕餘分太官冷煖従膳夫弱胃傳化難野性嗜好殊况此肉為糧南烹轉紆迂鮮鯽得何所喣沬憐相濡癭盤勞走送犒此山澤臞香稻炊白雪渠椀登腹腴老饕笑捫腹翻疑身至吳但愧負將軍未能出嘉謨何以消永日融冰煮臯盧半山固可議羮飯真良圖人間校至味更有松江鱸至正集卷二
