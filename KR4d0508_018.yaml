body:
  text: 至正集卷十八元許有壬撰律詩七言六十一首和傅汝礪見寄韻二首江水舟航日夜東故人音問得常通君才能挽千鈞筆老我惟懷一畆宫自古山林容小隠只今臺省有諸公欲知别後詩成處都在花香竹影中春紅園圃眩西東花下縈紆一逕通不向雷門操布鼓要從人海見珠宫多言浪負三千牘老夢都言十八公珍重吾宗有成訓人間何似在山中雨後行小圃一徑縈紆踏墄沙手分竹樹亂交加門庭無客恰遂懶城郭有山尤可家江梅結實青於葉海榴發芽紅似花盆池才著斗許水其奈聒人多少蛙青山髙竹樓别業昔嘗題詩其壁詩故在而竹樓物故三年矣感而賦詩故人别墅俯青郊曽許幽人近結茅苔蘚雨荒留舊壁竹林雲矗見新梢樓成白玉山無主鱗出黄金客有殽悵念同㳺歌楚些風聲蕭䬃鳥咬咬題竹樓墓青㝠垂趐共傷心况是寒牕早盍簪十載故山曽有約一朝喬木遽無因先塋在眼雲林合孤塚囘頭宿草深千頃畝鍾何所用故人徒辦淚沾襟青山書懷不見青山又七年眼前風物故依然乾坤逆旅自無盡松竹主人俄已仙山色逺明新雨後松聲清到小牕前淮南種栁桓司馬白髪重來亦可憐和劉光逺韻二首自笑閒人有底忙韶華無盡待詩償旗旄炫世真如夢嵒壑留題有夜光北闕上書聊自試南方論學尚多强故人桃李何飄忽荒却平生幾處莊霜袍泥轍半生忙夙願而今且一償海上有樓皆蜃氣人間無劍是龍光山林到處何肥隠德業終身貴自强何用門前栽五栁但存松竹即吾莊青山囘途中即事風日清和眼界寛碧天無際逺浮山田疇得水雨初過籬落有花春未還樹影半涵清淺處鳥聲多在翠微間不因三日盃盤盡老子遨嬉興未闌汪華玉為撫州經歴其父梅隠就養未幾歸孝感虞伯生楊賢可有詩餞之過鄂求詩次二公韻以贈梅隠用子貴贈縣尹推恩就養樂耆年教育功成本父賢松受官封仍偃蹇梅從人隠更嬋娟子能力辦臨川幙翁喜空囘夢澤船嵗晚過從應有日衆芳摇落看暄妍人間官爵總虚名樂在天倫恰是榮封縣不將鳬作幻還官自有鶴來迎山中酒已三年醖江上舟纔幾日程我卜菟裘近仙里願從鄉社慰平生和大别石壁禪師韻四首禹柏撑雲振古青老禪相對各忘形午茶香動風生席夕磬聲沉月轉亭欲借閒田同放浪先承佳句慰飄零漢江秋色將清徹莫負沙頭雙玉瓶秋來大别轉青青老眼憑髙藐萬形物外尋常清濁酒人間多少短長亭勝㳺要歴千年徧凉意方催一葉零我羨鴟夷差解事井湄誰道不如瓶蓬鬢從知不再青人生何苦自勞形鑿渠引水來花逕種樹招雲䕶草亭風景冝人新領畧交㳺囘首半凋零等閒得似空門樂一鉢蕭然對一瓶晴川芳草勝丹青天遣南來此寓形無地避人依梵宇有時乘興到江亭山明錦樹雲猶熾天近金莖露未零殘暑滌除須一雨煩師傾倒貯龍瓶送元景悦赴茶陵州學正青年肯與世浮沉試用才知造詣深載籍聖賢埀道綂此邦今古號儒林不虞政似求全毁惟斆毋忘學半心後㑹鄙人當刮目莫教輿羽勝鈎金同劉光逺過漢陽兩郡相望未惜遥片㠶飛渡不終朝氷澌縈帶浮槎去霜氣侵凌宿酒消何地不堪容杖屨此生端合老漁樵前村定有叢梅發時送清香過小橋陪晴江國王宴秀野園夜分醉歸帶葉黄柑露未晞出罾鮮鯉冷添肥年來到處行樂好夜半絶紅乘醉歸湖海自憐豪氣在星霜轉覺故人稀嚴城小尉雖多事不問鸚洲舊布衣題徐復初竹西佳處亭四山修竹總相冝何事尋幽獨愛西萬里風來龍起舞一輪日落鳯來栖揚州陳迹乆無夢江夏勝㳺新有題見説主人歸不逺好開三逕徧扶藜神山即事京塵汨没已華顛恰是山居第一年松月照牕詩入聖竹風吹榻夢㳺仙隨人乆作悠悠者處世方知綽綽然尚愧未能忘口腹時勞昆季致肥鮮和謝敬德學士見寄韻二首平生踈懶是天姿今嵗春來起亦遲好酒或如陶靖節杜門深愧鄭當時向來事業惟供笑如此風光忍廢詩館閤真才試枚舉鵠山陪預恐難期淡靄輕風弄野姿江天寥廓鳥飛遲從知宇宙多閒地誰信襟懷勝舊時夜雨不驚逋客夢暮雲猶入故人詩山中亦有陽春曲拂拭朱絃待子期得請歸出齊化門述懷弱步豐扛遂息肩聖君恩徳大於天對廷已負三千字伴食空縻幾萬錢野店尋詩先具酒罪人逢赦便昇仙今朝拂袖都門道江漢西壖有瘦田得請之難言不可盡因得第二聮既出都門始足成之短髪年來坐苦吟等閒添得雪盈簪百錢擲地皆成字一芥投針適中心不是清時人棄置自縁多病老侵尋賔朋應道予歸好幾處壺觴候栁隂中書疑予行前一日既大設祖翼日又遣使具牲醴追送通州走筆付使者以謝諸公梨園樂府太官羊病乆餘醒豈易當敢學聖賢三宿去漫沾牲醴一船香已知腹負將軍乆更笑詩酬使者忙此去江湖足魚蠏故人天上貴相忘始食蒲笋品味在竹笋上渭川常羨錦䙀兒盤饌今朝得此竒心卷清氷微有暈肪裁寒玉瑩無玭闕鄉甘脆應無敵風味豪華定不如好與散人供口腹休教長到作輪時小酌薦以巨鯽新藕蒲笋肴蔬鮮㓗酒清醇病戒貪饞止半醺領畧江湖新品味洗除腸胃舊羶葷心無多事尚營口食到萬錢難報君藜藿乳豚同一飽世間何物不浮雲直沽買魚其賤十倍都城錦鱗堆積照行庖羮膾隨冝飫老饕自是窮鄉如土賤莫詢頳尾為誰勞小兒却恨辭官晚貪僕猶嫌索價高因歎人心何太忍更教烹煮自輸膏舟中午日憶去年此日過桑乾嶺有詩因用其韻二首軒車穏出九重城一舸摇摇載月行節序迫人無可樂詩書用世竟何成清風逺樹黄鸝囀落日滄波白鳥鳴休吊湘纍歌楚些老夫親和扣舷聲去年馳驛度長城豈意扁舟逐此行一笑病餘仍酒困幾年身退為功成管花管竹心無老觀水觀山眼尚明好在衡茅不歸去松風誰聽月中聲詠陶郭元亮子儀俱作令一居彭澤一中書中書考歴二十四彭澤日才八十餘昔人乆速有深意易地行藏無異閭愚哲古今霄壤隔希賢惟是賦歸歟晚至舊縣笑據胡床看落暉水風蕭䬃動絺衣鐘鳴煙寺片帆落鴉滿雲林獨鶴歸小店旋篘醅酒軟濁波新出鯉魚肥莫言傾倒雞豚杜此樂雖微世已稀歸至郷里拜先塋多病承恩聽避賢得攜兒女拜洹阡無親底用過三釡有淚無由達九泉故里山川勝圖畫佳城松栢䕶風煙立身揚顯愚何敢且幸歸來不辱先出郭萬事勞心雪滿頭還家纔得事遨逰太行雲盡清浮曉洹水霜餘碧染秋漸老始知閒有味此囘真與世無求溪山好處鴟夷滿况有風流老郡侯謁韓諫議墳考譜披圖總未真兩囘親得拜公墳降神生作三朝相聚氣嘘為五色雲宅兆發靈符厚德碑銘無愧有竒勲憑髙更欲推形勢逺樹啼鴉不忍聞墨竈山次杜緱山先生韻丹霞圍鎻翠潭潭仰面青天鏡出函解組已能辭好爵判山還欲署新銜冷傳霜信風生谷清透雲根月滿嵒却憶江南舊林壑幾多煙霧䕶松杉􅫊峪山寳嚴寺二首擇勝何年著梵宫日窮猶未盡重重翠紅照耀三千界屏帳周圍十二峰雪澗清泉響寒玉雲嵒喬木捲蒼龍尚憐不盡登臨興天際危亭見五松煙嵐融翠濕濛濛石路縈紆細入空明月百壺松影下清風一榻氷聲中聖燈不為吾儕見俗樂誰教釋子通兩宿豈能窮勝事山門愁見馬頭東次王君實都事韻故老凋零似曉星遣懷誰和短歌行直教松檜空雲壑猶逐衣冠戀玉京金井夏闌氷未泮紫垣天近月偏明可憐門下三升酒不信能澆磈礧平五車未試髪先華稊米何能效國家已愧傅嵒陳麯糵欲從勾漏問丹砂内官時餽雲腴釀南僕能烹粟粒芽囘首燕都天咫尺有人深夜候燈花和伯生韻贈崇真宫魏道士身已支離髻已了夕㪺沆瀣曉餐霞人間白髪不能黒方外青山便是家上谷荒林惟有石天台流水乆無花崇真宫裏相逢處欲扣真詮日又斜代祀夀寧宫贈蘇侍郎粉闈長日簿書閒禮法拘人一笑難天子九重頒信幣侍郎三日佐祠官茶餘延話風生闕朝退哦詩月滿壇但恨無縁駐清景雲璈聲斷燭花殘㳺魯國大長公主園公主乘鸞已上仙手栽花木尚依然滿階紅藥春無恙夾道蒼松老愈堅鄒子能囘寒谷氣韓湘曽握化工權繁華過眼君休羨華屋山丘正可憐六月朔留守官進芍藥六龍到處是陽和上苑名花得最多羅帕籠香來黼扆玉瓶添水付仙娥開遲只是留春者養小其如玩物何昧死一言臣有獻中陵今日富菁莪得家書别來三旬屢得書書言不盡意勤渠一瞻安字憂成喜幾向明牕卷復舒兒學女工俱有進廩儲囊積任無虞歸期只待秋風起一束離愁即破除次伯庸韻荅王可矩左司乾坤開闢壯神州季子重來已敝裘太古山川渾是畫廣寒宫闕最冝秋人間濁酒難為醉海上靈槎尚可浮深愧清時無寸補但形詩頌繼商周寄趙伯寧中丞走馬灤京獻納來翠紅鄉裏得徘徊行厨無物非君賜相府有花皆手栽休恨相逢還判袂且圖一見便銜杯雪林好在秋風菊應貯芳醪侍我迴王致和錬師將歸四明求詩為贈宣室年年侍祝釐鄉心空逐白雲飛壺中有宅聊為隠畫裏觀山未是歸京國春風𤣥髪改鑑湖秋雨紫蓴肥嵒前手植青松樹為問而今大幾圍寄閑閑宗師崇真宫裏幾徘徊底事詩仙望不來檻擁翠雲惟枸杞庭閒清晝有莓苔平生多誤依劉至老子真如訪戴囘善視黄花多備酒今春已負牡丹開和謝敬德學士入闗至上都雜詩十二首培塿纍纍幾附庸一闗獨在碧霄中九千保障空秦塞百二山河䕶漢宫天近馬隨雲上下峰囘人忘路西東頻來傳吏渾相識但訝終童變老翁眩目嵒花落又開避人幽鳥去還來山僧饋餉惟清茗石媪衣裳滿緑苔琴峽注泉成樂奏梵書隨石盡碑材前途定憩榆林驛㳺子休歌摽有梅雜遝牽黄復臂蒼清晨校獵陣雲長一圍塘濼如平地五月郊原有肅霜飲至幕庭羅酒湩周阹飛騎謝津梁先生已得毛錐力更欲崆峒倚步光逐兔弓良不用蹄種蕎坡峻馬能犁土山無樹逺如近沙路有風髙又低幸遇清時免投筆却憐華髪不勝笄寒暄南北都休校一醉當令萬物齊凉亭雨過長蒲茸使者求魚月向東黄鼠頓肥秋後草海青多逸曉來風庖羞水陸八珍聚琛貢梯航萬國通射獵寧非男子事莫言丁字勝強弓閶闔紅雲蕩蕩開天光萬象被昭囘東風清暢來三島西日微茫認五臺沙果荆藍資上谷玉醅金斚㵼懷來茂陵可笑徒英武歡樂當知極便哀上苑蒼松受雪欹石城畫角帶霜吹人雖狗監知文士世是鷹房襲小兒梵刹能司天禍福經筵時論國安危豐扛弱步歸無勇退食多慙詠素絲聖德如天萬彚新逺柔窮漠㑹宗親錦鞲掣紲蒼鷹健玉輅鳴鑾白象馴北闕風雲遭泰運南宫星月有詩人秋期應放疎慵去不望分符綰玉麟鴈落長空迹篆沙鳴嚆驚起一行斜小車細馬醉時路豐草甘泉到處家已解皮囊傾馬湩更搘銀銚試龍茶玉脂響泣炰羊熟鼻觀風香野韭花翠樓天際欝峥嶸粉澤龍岡壯帝京地勢逺連棕殿起簷牙髙並鐵竿撑葱葱佳氣歸環極穆穆昌期見迓衡長樂退朝容緩轡斷雲收雨半山明長日官曹似馬曹絲桐時得事吟猱救時乏䇿當投紱遣興成詩敢奪袍白海波隨秋雨漲黒山雲壓晚虹髙清尊常滿朋簪盍誰道驅馳我獨勞尚服三庚進紫綃清氷沙底未全消魚龍陸海無宫市皷吹鐃歌有徴招自在千年蒼鹿健閙粧三日玉驄驕最憐學士神仙福終日吟詩不造朝至正集卷十八
