body:
  text: 至正集卷三十元許有壬撰序文丞相傳序宋養士三百年得人之盛軼漢唐而過之逺矣盛時忠賢雜遝人有餘力及天命已去人心已離有挺然獨出於百萬億生靈之上而欲舉其已墜續其已絶使一時天下之人後乎百世之下洞知君臣大義之不可廢人心天理之未嘗冺其有功於名教為何如哉丞相文山公少年卓厲有經濟之志中為賈沮徊翔外僚其以兵入援也大事去矣其付以鈞軸也降表具矣其往而議和也兾萬一有濟爾平生定力萬變不渝父母有疾雖不可為然無不用藥之理公之語公之心也是以當死不死可為則為逸於淮振於海真不可為矣則惟有死爾可死矣而又不死非有他也等一死爾昔則在已今則在天一旦就義視如歸焉光明俊偉俯視一世顧膚敏祼將之士不知為何物也推此志也雖與嵩華争高可也宋之亡守節不屈者有之而未有有為若公者事固不可以成敗論也然則收宋三百年養士之功者公一人爾孫富為湖廣省檢校官始出遼陽儒學副提舉劉岳申所為傳將刻之梓俾有壬序之有壬早讀吟嘯集指南錄見公自述甚明三十年前㳺京師故老能言公者尚多而訝其傳之未見於世也伏讀感慨惜京師故老之不及見也公之事業在天地間炳如日星自不容冺而史之取信世之取法則有待於是焉若富也可謂能後者已綱目書法序朱子感興詩獵舉三朝而不他及其有激於歐馬而綱目之所以作也周不綱非一日至命三家為諸侯則其綱不復可振矣此一書託始之命意也晉史帝魏習鑿齒已病之唐書紀武則范氏之論至矣通鑑千三百六十二年事如指諸掌偉哉書乎其文則猶史也朱子慨然本春秋之㫖任筆削之重主正統以明君臣之分嚴書法以誅亂賊之心其取義大矣永新劉益友先生作書法發明之其徒進士湖廣省照磨馮君敬修欲其説暴於世畢抒其概噫朱子之心憂世甚至非矛盾温公者也民彛物則之所係則因草生焉諸侯僣王則貶稱君無正統則並書不相下帝昭烈以明正統書在房以合乾侯死揚雄之仕莽卒陶潜而係晉皆凛乎斧鉞其筆君臣之大義明矣他如奥義㣲㫖益友之撒覆發其韞殆無餘焉若夫開卷之初命三家率舊文者終卷非一義苟至當吾何異焉盖綱目成讀通鑑者有所折衷而亂臣賊子無所逃罪矣二書可相有而不可相無者也益友之書適而不牽㑹而不摦智周於理而力周於文矣或謂孔子作春秋三傳且相異同朱子學孔子者益友書法果盡合朱子之心乎予曰朱子之書主褒貶其心易知也昔之書今之削昔之遺今之特書揆之以始末律之以凡例舉此以見彼寓微而示顯者益友之綜覈精矣竊嘗一二致疑沉潜反覆祗見目力心思之不逮而足之所未至固未易悉其地之所有也然則書法一書抑綱目之不可無者乎後之人有如左氏公穀者操戈而出則非區區之所及知也國朝名臣事略序聖元基朔方立人極世祖皇帝混破裂而一之廣輪疆理古職方所未半其天地之再初乎渾淪所鍾命世卓絶之才實輩出輔成之故盛徳大業之所著自昊窮生民未之有也然而百餘年来元勲偉績世未盡白故知老者湮沒無幾家乘志銘不能家至而遍知也仁皇御極勅太史傳功臣而玉堂秘奥世莫得而見焉監察御史趙郡蘇天爵伯修輯國朝名臣事略十五卷湖北憲刻諸梓徴叙其端有壬在京師早知伯修之學而未知其有是編也惟其培學上庠歴史屬乆故考之也詳擇之也審其類例倣朱子言行錄條有徴据略而悉豐而核其四方之争先快覩者乎竊惟國朝真才雲集是編才四十七人有齊民知名而未錄者盖朱子例嗣有所得當續書之也若是則四方之快覩者不一伯修之學其益昌矣又不知今士大夫用心如伯修者幾人世所望於太史氏出於事略之外者其將有所屬乎憲長都哩哲伯幕府李榖王大有職風紀育人材俾覩者率作是亦韓子所謂牽聫得書者也安南志略序士為學當籠絡宇宙天之所覆宜皆知之而或窒於遐泄於邇里閈見聞有弗深攷穹壤之外渾淪之墟尚可知乎淵明覧周王傳山海圖以自適其胸中之竒高世之致可想見已章亥所歩予無得而究焉其得而究則士名者可不知乎安南見虞書漢唐来職方氏物也宋未平納欵於我列聖容煦示王者無外而已非有所利之也然其山川郡邑之所直風俗之所尚物産之所宜雖職方氏有不得而詳焉載籍雜見非習其土罔克傳信㑹而定之博洽之士病焉東山黎景高其國人也習其土者宜莫景高若也入中國五十年采之載籍参以所習為安南志略二十卷至順初朝廷以制作上之於是景高之書與其名不朽矣好事者將板之世乞予序之夫自成周九譯入貢二千五百年中雖叛服不常亦中國徳化厚薄之所致爾我元之興不招而来厥後自啟邊釁我則威之其来格也我則懷之此我元待安南之大較也至於出師遣使之㫖招諭錫賚之㤙與其臣屬始末之情狀是書一出槩可考焉景高在其國佐彰憲侯陳鍵幕乙酉内附其國邀擊之彰憲戰沒景高抱其屍馳出瘞之坵温懼夫忠義之湮沒也故紀録尤致意焉其氣義又可知矣然則是書之出不獨知異域之詳又以見人心天理之同者固不間於遐邇也其亦有補於風化者乎琴泉先生詩序漢陽文學掾湘瀏劉嗛光逺氣豪而温學充而貞與之㳺知若人㳺之乆知若翁翁字山甫盖今之隠君子也昔長沙趙公平逺典型一時尤相厚善家貧有襟量士大夫過者無不欵接藏書教子掃絶塵俗惟癖於琴平逺號之為琴泉先生其有得於琴乎古者成人以樂養其性情而蕩其邪穢今則無矣鄭衛嘈雜萬耳一聲聲之正者獨琴近之故嵇康嘗謂衆樂之中琴徳最優幽人高士養心理性舉有託焉平逺多藝尤精於是度曲審材斵削漆絲悉身為之顧挈是號而被之則其能可知巳天下之水泉為勝水之源也海雖大受外所輸非其自出也今夫發而涓涓流而滔滔㣲而為溝池瀦而為江湖以輸於海而無窮皆吾之所自出取於内而不求於外者也而其為水也猶雨之始隕於天潔而不汚者也易象蒙中庸時出孟子之有本皆有所取琴則何取焉豈以其始達也歴澗谷觸崖石潨然鏘然幽響振越和之以清風亂之以松聲山空夜聞其有契於吾琴乎抑絲木為聲假於人以發者也泉自然者也愛而不可挈也寓諸器而寫之泠然流出於絃徽間彼有無窮之流此有無窮之聲聲與心㑹物我兩忘不知琴之為泉乎泉之為琴乎山甫之為琴泉乎琴泉之為山甫乎吾聞其人淡然無所好豈屑屑於藝者寓意自適以發其胸中之樂爾年今七十二飲食起居如少壯時其又有得於琴之外者乎予以平逺之交知其友之端以光逺之子知其父之賢故喜為序之宋誠夫文集序延祐巳未贈翰林直學士諡正獻宋公誠夫偕其弟顯夫始入京過予陋巷一見如平生出所著曰千樹栗者視予曰京師吾郷田廬盡廢江湖二十年儲蓄歸為恒産獨此爾閲其帙知其學已充文已成謂之曰君之産不但與千户侯等將與萬户侯等承乏山北憲幕嵗辛酉當大比時語同官第一人必在誠夫已而果然為御史為左司都事皆與予同事當大廷議論不顧忌絶去儒生拘迂懦訥氣習若老於吏牘者仕至國子祭酒而病尋卒於位既葬顯夫出所為詩文監察御史上之臺臺檄山南憲下所部刻之梓而俾予叙其端夫士之生世生有聞於時沒有垂於後是不死矣而士之垂世者未可必其必傳而不與草木俱腐也至於誠夫之文則吾知其必傳焉待罪中書每館閣論材未嘗不為誠夫歔欷使天昌以年則其長翰林集賢亦猶昔之意其魁天下也不幸用之未嘗盡其材而幸得顯夫為之弟使其文著於世傳於後又類所刪文若樂府為别集片言隻字無所遺逸顯夫可謂能弟誠夫可謂不死矣誠夫自選其文更千樹栗曰至治集其傳不待予叙也獨列其守官梗槩使讀其文者知其政事之長而信其見之文者非空言也顯夫今監察御史文如其兄二宋之名於是益著矣智子元越南行藁序鎮陽智熈善子元以多學濟卓犖之才大徳間宿衛春宫冀速化行其志命與時左為南臺行人轉掾史又不樂棄去今太師秦王右丞相為南臺大夫知其才居中書擢西曹掾皇上即位故事遣使頒朔安南行者超三級歸不駮降故自售雜遝而薦私者亦復沸騰乆不决乃合議堂上丞相曰智子元可欲行者與智面校優劣衆口始塞於是子元以禮部郎中佩金符為介使以行既反命出紀行詩藁徼言表之禮諸侯即位小國朝之大國聘焉况天子即位乎諸侯之於天子比年一小聘三年一大聘五年一朝况蠻夷小國乎安南先宋納欵我不拒之天下既一彼復反覆我不銜之褒嘉錫賚不吝也然自世祖時召其主入朝而為辭幾易世矣世一来王且不能行而朝廷每勤行人涵容煦育大抵以見我元之天地其量也覩子元詩其處之之道大較已見矣今年五月二十五日掄才大安閣下予首舉子元甚力丞相喜且云子元佛法亦通宜亟用之而下坐他有論薦可否持乆俄丞相起遂輟凡使安南既酬美官子元獨留滯餘一年雖然丞相不忘也一旦柄用其亦自行其詩乎讀之竟序而歸之左丞張武定公挽詩序大徳五年朝廷有事西南夷江隂水軍萬户張公特鎮通州年六十五在行主帥憸人且宿有隙公䇿可决勝皆扞格不入賊圍帥急公發三矢斃三酋解其圍帥復遁去公死之倉頭張如山負公屍歸孤漢走赴及瞻如生𦵏京城南中疃里先塋朝廷錄其功贈宣忠秉義功臣資善大夫湖廣等處行中書省左丞上䕶軍追封齊郡公諡武定通人立祠奉之詔為功臣作傳漢狀之太史而太史張起巖又銘其碑漢曰史若碑固傳信来世而史嚴金匱碑在兆域何由周及鄙誠欲速託之多詩公其遂名天下乎於是凡識者又請歌之聞者從而和之積乆充溢則為别卷俾有壬為題辭嗚呼孝子之於親其心庸有既乎親之喪雖一而喪之遇則異親有疾視起居奉湯劑始終無毫髮悔不幸考終念罔極之徳且創鉅欲滅况李溝感截畫之痛於終天者乎起居不得而視也湯劑不得而奉也聴而不可聞也望而不可見也追而不可及也則惟有知善而傳以顯於世者猶可及爾故一人知之不若天下知之一時知之不若後世知之使天下後世知之必其人功烈之不可冺人心之不容自巳者是固不可力致也而不能不致者孝子仁人之心焉古之人臣功徳在載籍者君子知之庸人不知也有婦人小兒田夫牧䜿皆能道其姓名者豈不以傳之者衆感之者深乎人之志發為歌詩衆聲鏗鍧流播遐邇動盪心目淪浹肌骨文之感人易而入人深者也託之以傳於天下後世則吾親之亡猶存矣公少能脱人於獄南征北伐皆有功老能奮身死敵可謂忠矣漢起家拜南臺監察御史遷内臺風采振揚號才御史所蒞有稱以集賢直學士亞中大夫致仕有壬入京一見相知延祐二年冬嘗為之作挽詩矣今二十餘年而集賢之衰老益不替可謂孝矣噫天地無窮詩歌亦無窮孝子之心庸有既乎然則武定之忠集賢之孝皆可歌而傳者也有壬特與之為糠粃云李遂初文集序有壬總角師廬陵李秋山先生讀書零陵後識其從子遂初於京遂初知予予未知遂初閲二十五年辱恵書武昌始知其學之正文之粹而寕知其行之如其言乎及来湘南士論籍甚又知其行之如其言也遂初兩為邑教作新學宫武㫁吞學地前官不敢與角則抉而出之長岳麓山外侮内訌勝以定力終更帑有餘鏹廪有餘粟以貫石計各若干非毫釐不私其能積多若是耶嘗論校職明天常以淑世作人以資用他莫重焉而世每易之易之者非也使人易之者何哉教事不修摧廢不葺惟既廪是徇若然則不但易之而已也其視遂初得無愧乎江南士名者例為文能者鮮矣能者有之及施於事猶畫工不知梓人之制繪為宫室跂翬炫爛按圖作之則棼錯迷謬矣士有能文而施之不悖者予固願見而樂道之况師家佳子弟乎承示文藁為序其端讀之為竟正者益熟而粹者益昌矣盖源乎經而委乎道宜其施之而不悖也始識遂初而不能知知而不能得其詳得而不能振起之獨幸得序其文予其有愧於遂初乎至正集卷三十
