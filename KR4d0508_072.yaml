body:
  text: 至正集卷七十三元許有壬撰題跋跋顔魯公墨迹盧侯帖顔太師風節傑出千古脫翰墨未盡善思其人撫其迹猶當寶襲齋沐九頓首而後展視况畢天下之能事者乎世譊譊有真偽之辨苟稱太師豫即寶之况仲謙尚書所藏盧侯帖其為真迹昭昭無疑者哉松雪翁以平生見十六帖為幸其所稱馬病帖則豫得之又獲觀此帖是亦幸之又幸者也跋陳尚庭告唐天寶三載開江縣尉陳尚庭誥一通一時擬官者四十九人湮沒不稱者多矣而署銜於首者李林甫也林甫之惡千載不磨雖欲如當時選人之湮沒不稱不可得也吁可畏也哉跋東坡墨迹鄭君帖書家論字必晉次則唐有不收蘇黃翰墨之説可謂大言矣退之以羲之為俗書則晉亦不必收矣觀坡公黃州醉中所作孟倅鄭君帖其豪宕奔放有醉中意度再三諦視一點一畫無可指議其精而入神者乎彼不收者豫不敢有辨豫苟有得當什襲寶之恭題仇公度所藏奎章閣記賜本天厯二年文宗皇帝作奎章閣徴集儒雅講求太平見諸記文憂深思逺御製若書龎奧徑麗而又鑱刻精至信一代之文寶也墨本頒賜止及大臣皇上繼明思有以擴大訓示百僚始及朝著之有聞者而加用二璽焉此則懷慶路總管臣仇濟為户部郎中時霑賜本也屬臣有壬識其末臣竊惟帝王之文如二典三謨于以垂世立教帝王之書如二曜五星以定時成嵗豈炳炳琅琅務聲音采色者哉文皇詞翰於是備矣於戲休哉跋臨川黃孺人訓子詩先公患世不教女輯女教書草廬吳先生序謂可與朱子小學並行邵庵虞公亦為後序行于世雖歌詩有戒然載巴陵玄子韓世孟一詩豈不以臨難死節有關世教乎臨川吳母黃孺人訓子詩所遇則異易地則皆然先公官臨川黃甫四十詩則作於十年後惜先公之不見也或者謂臨川王介甫後高尚成風故黃氏能致盛名豫竊疑焉東萊吕先生言江西人物盛衰觀人文者將於此乎考以几案間有江西諸賢書札為喜諸賢不獨介甫也若以臨川宜歸介甫臨川無晏公乎黃氏勵婦節形諸言者若是其為士者宜何如豫不知今江西人物視東萊時盛衰吳綬歸為我問之邵庵恭題至治御書英宗御極練核圖治拔惡木深固之柢取豫章大材以梁棟一世時則有若東平忠獻王獨運亭毒君臣千載之遇魚水不足以喻之也一日侍便殿信手拈墨筆作古錢形而以朱筆分脈理為肉好執規矩為之有不及者上覽之大悅取朱筆書皮日休詩我愛房與杜魁然真宰輔黃閣三十年清風一萬古於其側蓋以王為房杜也今慶老福德亦侍側即以賜之福德裝潢什襲後至元庚辰以歸王之子今翰林學士承旨開府儀同三司臣都哷特穆爾開府以示臣有壬俾識其後臣有壬於是見至治之治其有以哉王偶拈筆不作它象而獨作九府錢法非以其流布濟人有功於世乎上不書他語獨書詩人誦房杜之句非有契宸衷將責以貞觀之治乎則是遊宴之頃未嘗有忘天下之心焉史稱房杜不言功持衆美效之君王汲引士類一善不遺其有得於是乎使天假以年則唐虞都俞吁咈賡歌之風藹然一堂之上矣豈特房杜而已哉噫君臣相遇古今所難及其相遇而天復中道盡之此有志之士不能不痛悼也嗚呼惜哉王之功業不終天實為之然痛悼之餘復有為王賀者玄齡後有遺愛如晦後有隳構今開府繼志述事益光前烈房杜有所不及矣積善之家必有餘慶誰不信矣夫跋雅勒呼正卿所藏鮮于伯機詞翰鮮于伯機詩豫知之已四十年吉甫段君慨言人知其書詩則知否相半豫方自幸在知者之中而夷陵監郡雅勒呼正卿知之雖晚愛之甚篤正卿素言晉後雖有書終不能如晉唐後雖有詩終不能如唐豫謂詩發於人心天地無窮人心無窮不當主世代計也書又藝之藝耳正卿不屈也及其觀伯機書則謂真十七帖觀其詩人謂軼蘇州入彭澤矣若然則晉唐而後書復有晉詩復有唐矣豫非好勝竊喜因正卿之言使不知伯機之半行皆左袒且以識吉甫之慨焉跋重刋羊祜碑墮泪碑在天地間與元氣相為無窮昔之亡也有不亡者存蓋立德立功立言有一於此足以不忘况備之者乎太傅之未就交辟也郭爽以為今之顔子其德之著見者若此委質而後大勳偉績史不勝書其功懋矣若論三年之喪欲革漢魏之薄而興先王之法以敦風俗其於立言蓋有儒者之風焉使及門孔氏其殆庶幾乎陸抗謂樂毅諸葛孔明不能過未足以盡之也李商隱因韓子淮西碑有言湯盤孔鼎有述作今無其器存其辭辭之精絶者不託於器且不可泯况德之浹人肌骨者乎昔大傅造峴山言自有宇宙便有此山豫謂但有峴山便有太傅且人皆因碑而傳是碑由梁逮今至於四刻則因人以著不亦異乎訪舊文而刻之石由京師而致之峴首者編修官楊伊志卿也跋檢討鄭取新刻千文賜本智永書千文真迹皇上覽而善之命刻諸石摹本所及蓋殊渥也而經筵檢討臣鄭取以侍從之請亦霑賜焉竊觀宸翰精妙高出古今天光日華賁飾萬物而猶取法古昔此大禹之不自滿假也昔有使臣下用拙筆以取容者自言我於興代方外之人一藝之精掇拾殘缺俾襮于世何懸絶若是耶在藝且爾則於往聖續民命壽國脈之大經要訓有不求者乎此經筵之所以緝熙日新也是帖之不泯非智永之幸斯文之幸也斯文之幸天下後世之幸也跋蔣善夫義士傳豫入京早若將作同知任瑛之獄尚書右丞博巴之死皆及見者也任犴狴固密而能出之天下大索窮山絶壑鶻巢之地亦斫木標榜姓名而能周護脫之可不謂能乎博之罹禍也親故皆避去而能收其骨而葬之可不為難乎此蔣伯祥善夫得稱義士而揭翰林所為作傳也或曰揭之傳蔣也觀其所主竊有疑焉豫曰不然智伯不仁豫讓感國士之遇至以死報列之刺客識者不能無議於太史公焉則善夫之得稱義士亦可無愧矣若夫出良家子女於異域罟擭陷阱之中又其義之炳炳者也子曰吾之於人也誰毁誰譽如有所譽者其有所試矣此非聖人善善急而惡惡緩之明訓歟跋張開府宗度牒沖真明逺玄靜真人張德隆收從父開府公宋咸淳三年度牒一通曰景定四年者是嵗之所頒也曰新法度牒者紹興間所行綾紙新法也開府年二十五受此為道士歸我朝際遇列聖綰玉章致極品此牒其起家之所由乎昔趙宋天禧間天下道士萬九千餘人迄熙寧之末登降不一未嘗及二萬人以古之為民者四則多矣以天下之大生齒之繁當尊隆其教之世而其數若此謂之少可也蓋核試之科嚴披度之條密遊惰不得苟容其中厥後國日蹙財日匱因而利之遂與泉幣並行矣因而利之其勢不能不濫而得人乃有開府者則又拔乎其萃千萬人不一二見之者焉牒之制度綾紙縝密印署周詳宛然官告也我國家富有四海言利之徒屢以是撼執政豫在左司熟聞其説利不足道也若夫扼遊惰而不使濫其亦切於為治者乎天厯初始行其法今雖不廢而奉行未至條目未悉有志於治者將於是有考焉跋神德真君畫象贊昔開府儀進上卿張公之觀化也朝廷贈恤之典士大夫哀挽之詩與夫刻銘豐碑揭示永久者莫不各臻臻其極天厯己巳追封神德真君又祠而祀之矣初開府年七十仁皇詔圖其象敕詞臣為贊識以皇帝寶像若贊亦刻之石矣沖真明逺玄靜真人德隆真君從子也哀慕之心猶以為未足復圖其象裒贊文若始終綸誥為一通請識其後以寓羮墻之思焉夫黃老之教主乎清淨古之為治者有資焉其流而為申韓者以其忍也忍於其親况於他人乎羽流之學以哀不入心為逹人而無哀果名為心乎真人為從子孝思若是忍與逹不能纍之也夫不以忍而施之人不以逹而蕩其心則所謂道者顧不在兹乎若曰其所謂道道其所道非吾所謂道者不敢施於真人矣跋紹興獄空詔紹興庚辰大理寺奏獄空賜詔奬諭時敷文閣待制贈少師開府儀同三司張運為寺臣以明決平允著稱而思陵用適其材故能致效若是焉愚讀前後刑法志有曰三代之盛至於刑措兵寢者其本末有序帝王之極功也夫所謂本者非好生之德洽於民心兹用不犯于有司乎思陵渡江當南北分裂之餘干戈騷屑之際雖未能恢復中土以底兵寢而三十餘年之間屢見空獄其有得於虞書之旨深矣今沖真明逺玄靜真人德隆者待制五世諸孫也真人從父開府公登一品清貴羣從亦至郡守其待制之流澤乎詔嘗刻于石陵谷變遷有力者取以墄塔真人購而得之殘缺已半而詔本收藏如新石乃不如紙者以張氏子孫之賢也張氏子孫仕而有職于刑者其尚取法於是哉題陳璧家藏簡齋墓志後靖康板蕩思陵踽踽東南中原士大夫有能自拔以從其君於間關流離之際丁急賢之會收録宜何如然用之而未至者人也得之而復失者天也簡齋陳公既參大政尋以疾辭遂至不起用世之學不究其施豈非天乎君子於是有以見勝國之不能復有中土也世知其詩之工而不知其心之苦若向來萬里意今在一窗間之句豫每三復而悲之墓志有不能盡者焉跋米元章臨李北海毒熱帖海嶽公臨法書用盜狐白裘手非隨人作記者也學孫叔敖不得不曲盡其似耳然其本來優態還掃除淨盡乎蓋狐白裘亦有發覺時也因觀臨李北海毒熱帖漫書若是不知識者以為何如跋張宜相所藏織成宣和御書清淨經唐安樂公主出降益州獻碧羅為花鳥大如黍米眼鼻觜甲皆備瞭視者方見之陸龜蒙紀錦裾謂其禽鳥花卉諦視條段斬絶分畫縝緻不可狀雖不可見想像不過乎景物精絶而亦疑其夸也若夫字畫見諸織組者大率僅能成字而筆意則未易得宜相張君藏織成宣和御書常清淨經一卷筆意之精不失毫髮機軸之異又有不可勝言者面文背質判然二文而吻然一層不知當時之工何以施其巧於機軸之間也因知碧羅錦裾非夸而又有不及者雖然竒則竒矣特一物爾而余因是深有感焉宣和間萬事已墮清淨經謂神好清而心擾之心好淨而欲率之遣其欲而心自淨澄其心而神自清嗚呼斯言足以為國矣知而不能踐徒從事組織之末祗增其多欲爾故余不暇論組織之工而深有感於是焉是卷出沒之詳同年歐陽原功敘之詳矣其己卯冬與豫同觀蓋庚辰冬也跋戶部主事觀音努新刻千文賜本智永真草千文散落世間存者無幾雖祕書所蓄亦有可指議者南北盛傳在京師則有田氏家藏墨迹七十三行為最佳田氏圖書散失翰林直學士伊囉斡齊桑莭購得之不敢私有以獻于上上覽而悅命移刻諸石間以墨本賜臣下翰林應奉觀音努霑賜焉觀音努得之亦思七十三行中所謂堅持雅操好爵自縻之言以報聖恩之萬一乎勿徒為翰墨觀美而已也跋兵部主事大都所藏周濓溪而下十二先生畫象右濓溪而下至東萊十二先生畫象兵部主事大都子正得諸石刻移繪緝素俾有壬識其後將朝夕瞻仰以自朂者也蓋自聖逺道塞百氏紛起十二先生者出豁其晦合其異一歸於正而道統之傳有在焉三代而下功業文學之人史册相望若十二先生則代不一二見天生大儒皆萃於宋三百年於戲盛哉子正景行先哲當求其書而讀之讀其書矣又求其人於心則庶乎其有得也跋干尚書封二代碑右禮部尚書干公封贈二代碑銘翰林學士承旨歐陽玄原功之筆翰林學士承旨張起巖夢臣篆其額有壬實為之書而記其碑隂者則今翰林直學士黃溍晉卿也干公夀道與豫四人延祐首科同年進士夢臣則大魁焉夀道子旟來京師録本請識其後干之世德碑銘具矣豫不容贅而獨列同年者非敢夸首科得人之盛蓋悲夫五十六人凋謝無幾而豫五人者乃得聨名于一石亦盛事也旟歸持奉夀道夀道必以為然題樂天醉吟先生傳池上篇香山白公勇退於強健時享間居之樂者十八年吾鄉魏忠獻韓公慕之作醉白堂東坡蘇公作記謂公道德髙於古人非溢美也又嘗謂其出處老少粗似而東坡之號實本於忠州之詩蓋又慕之深者也公年五十八分司東都有今日是長歸之句終身不渝其言彼稱其文章精純不欲一披恐回其心者適足以成公之志而自襮其愎焉愚少年讀醉吟先生傳池上篇既慨然有擺脫塵俗之想世故牽縶因循老大年五十七始投劾歸少公分司時一嵗謂可酬夙志矣而立志不武又兩入京翰林中臺凡十八月膠榮賈謗公之罪人也六十二歸作圭塘西郭雖交遊構築之盛不及池上而松竹荷栁雜植之蕃或庶幾焉今年六十四校公作傳時少三嵗老態已可掬况風節道德之懿敢倣佛其萬一哉每圭塘風清日美飯飽茶餘朗誦二文一過亦間居之至樂也可行出嘉紙請書為軸因試陵子善總筆喜為之書至正集卷七十三
