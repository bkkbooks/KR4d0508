body:
  text: 至正集卷六元許有壬撰古詩五言五十二首九月五日病起至洹堂得十韻涉旬不可風齋居夢林谷羸馬從二僮兹焉藥云勿自慚似充隱繞屋學種菊昨看青蓓蕾倐爾爛芬馥麴生方入務采采滿盈掬積隂蕩澄空浮暉動霜木西風何處來披我一溪緑振衣立雙崖人間此幽獨為歡戒遲暮騁懷亦聊復邂逅識悠然南山在豫目和郭子敬祭酒由田舍還城居詠雪四首臘前白未三膏澤入土淺天意急發生滕六起罷軟初陽力尚微著物若絲緬不資大設施勾萌曷蕃衍剪刻竭銀潢嶒崚變瓊巘有懷願年豐幽憂頓消遣乾坤塵垢盡山川畫圖展啜清茶自烹玩潔簾自卷映空似虛無因風尤宛轉平吳非我事泛剡尚可勉當年曽從龍天門通管鍵澤物愧無功歸來守疆畎樂土適吾鄉流民來濟兖飢寒號里巷狂走如越犬推食嗟不能敢恨几生蘚方將學蝟縮誰復問牛喘先生瀛洲來士林仰冠冕樂天有追遊尋景無煩舛平生幾乘軺用世真未免懸車萬事足有田從不腆遺我白雪歌鴆誦劇淫湎更待新亭成琵琶聽攏撚陵坡度髙寒溪光涉清淺郊行景有會詩成語無軟錯錯路不分茫茫勢逾緬閉門笑袁安談天睨鄒衍林慮亘中天萬玉甃疊巘全勝當野求清遊殆天遣吟鞭裊空闊一笑驥足展虛明銀海眩爛熳白波卷濛濛疑絮浮團團忽毬轉穴井露混茫出簷堆黽勉人寰炯不夜瑶京豁無鍵夏翟變振鷺供正失羽畎既混九點齊寧辨五星兖摶聚出狡猊曽不及卉犬老松半身濕餘潤浹皮蘚有人發鴻音萬籟息號喘胄館隆臯比嚴宸親衮冕五車施已多百行動罔舛俄引一鶴歸豈類三公免良辰但賞心治具不求腆蹇豫慕髙風有酒何暇湎借公如椽筆忍凍時一撚敷雲穹窿合㪺水河漢淺山木立清堅街塵失紅軟一壺太素天上古孰云緬彌綸均隆汙粉澤遍墳衍浮生多白頭何事到青巘前墜漸舒徐後驅復排遣紀瑞手屢呵愁飢眉遽展逺勢結方陳長風忽斜卷乾坤萬彚新陽和一機轉作賦休矜才澡德敢不勉彼美金閨彥石室曽扣鍵遐思寄滄洲髙情薄岱畎筆力追秦漢道原濬鄒兖尤敦鄉黨義推愛及豚犬我如橛株駒書印滿碧蘚斗山兹有仰籍湜走且喘日光玉潔中峩峩見玄冕年髙德彌劭心從出靡舛醉狂有棖觸容衆吾知免學海富玄酒酤我謝荒腆挹彼還注兹涓滴沾已湎但笑繼晷吟燭盡紙仍撚隂崖積猶深陽坡釋將淺新陽行故實剛風散輕軟枯木吐異葩長林縈素緬兆年必大有占數辭太衍周阹連水郭保障沍雲巘素娥列萬佾多應帝所遣來玩人間世大地瑶席展練帨忽不收縞裙時亂卷至人無內熱丹鼎謝九轉汙穢固云蛻消融更加勉因笑泥封關何如玉為鍵歐公昔守潁俗易民安畎白戰聊自娛那知後封兖千載思附驥一吠憐學犬憶昨廣寒宫氍毺踏翠蘚吐氣曽激昻幾人竹筒喘廣厦侍講誦太室陪黻冕滕説妄自信流傳遂多舛田里雖幸歸飢寒虞不免來年遽在眼天賜一何腆髙歌時類狂淺斟未至湎衝寒出探春栁線金已撚題汪審齋霜鍾嶧琴和虞伯生韻巖栖養貞操意適物無爽何處鐘自鳴清霜肅穹壤悠揚林壑間融液弦徽上嶧陽有孤桐豐山絶遺響撫弄不在音飛鴻入遐想從渠聽者稀但以心自賞竽瑟莫求齊王門足羈鞅送姪杞回江夏修身誠為本顧行言乃宣治家儉是主率下身當先妄則身自棄奢則家日朘爾幸無此疾吾藥強爾痊我家本寒素插架皆塵編先公手澤存能讀汝乃賢勿矜叔有官勿恃家有田緩急汝或過吾詩汝韋弦次韻韓伯髙參政見寄詠黃楊守氣縮斯盈安步後是前乃知黃楊木斂東遲逾堅人言閏為厄豈識增春妍慎勿作印章標榜成竒偏次韻伯髙見寄自述索居利幽逈野性安放逐得失謝雞蟲交遊有麋鹿璇穹豁羣隂陽光彌九服區區愧螢爝遇夜聊自燭不須飯青菁時還斸黃獨將軍飽自笑未覺負此腹梅翁況有寄千里及泛菊勿云秫湧貴今歲定太熟食槐花庭槐老能花色與秋俱妍涼飈動蔌蔌金屑堆鮮鮮薄言頃筐塈湘以清冷泉薑鹽與宜之粗熟正味全芳日發齒頰小苦見本然少陵賦冷淘每誦輒垂涎英華遂饜飫視葉嗟更賢憶昨為爾忙計吏催先鞭一第得逾分厚顔對葷羶歸田日藜藿老腹常便便見爾如故人況與鮭菜聨人言有竒效益此衰暮年頭目袪昏眩手足已踠攣健步事林壑洞視攻簡編南柯夢已斷口腹尚有緣養小成醜繆一餐徒萬錢獨樂臺馬廷彥席上次眀初韻旌孝矗華表承家推肯堂親逺心益邇身立名尤彰學海觀波瀾藝圃恢封疆索居念晤語塵俗嗟未遑一日復一月三來涉三霜山醅熟小甕我馬陟髙岡野意似孤鶴兹焉愈軒昻同行有佳士雄辭軼班揚出網得珊瑚舉瓢酌天漿風景迫九日林葉紛半黃百年貴四美萬事付一觴真假悟夢鹿書博皆亡羊我田才二頃五畝松菊莊相望隔洹水逸興詩飛翔可憐無心雲亦復戀太行雖慙長者車紀休偶成章簡編永無蠧桑梓曄有光從今堂上月千載照吾鄉羊脂杏花次眀初韻枯枝凍欲折一旦駭衆目伊誰奪天巧春意閙雪屋鼎殘幻形色能美不能馥紅糝密綴梢鉛粉薄映肉髯薄十斤尾昆刀幾重玉烹炮本自勞餘事及贊育吹香謝巽二爭妍值滕六豨魚膏適用嗟此及草木滑膩真凝膚鮮眀新出浴近暖虞消融移瓶避朝旭分餘成美觀未覺雍伯俗珍賞乏炮鳳山酒雜野蔌胸酥映多葉熾禍不可撲結子堪作丹仍共玉環服此花幸免此相對一笑足淄濰有古林髙臺九霄觸芳潤流萬世濟惠逾百穀蠟言當刋華羶德先慎獨我方事繼晷燈火待膏沃根茂實必遂拳拳須自牧冬菊次眀初韻衆芳困搖落梅獨稱暄妍有美不自閟戰寒為兩甄成冬在閉塞民隩愁氷天豈知宇宙內賦授藏竒偏東籬有積雪南山失悠然挺挺出佳色灼灼照綺筵諒非厭九日欲讓赬紫先有徒實衆勝粳粃任在前候雖戾月令氣欲無襄年貞姿稟黃中凍蘂含碧鮮遲速各有時勿謂人力專嵗寒論交遊松竹相蟬聨昔焉推三友兹也成四賢何人譜凡品同異殆白堅淵眀不可作欲辨真忘言荒涼著持撡自信肯自憐且幸蝶不知誰羡鶯喬遷隱逸分遲晚障護香色全餐英用療飢大勝咽雪羶頽顔定可制食蠧猶能仙謝吳間間宗師寄鶴氅衣逆駢欲遺世異服事繆悠恭也差可觀未是真仙儔因服究其衷有懷小竹樓一時示蕭散千載瞻風流鄙人冒朱紫因循成白頭衣錦不尚絅裭帶宜承羞歸來作褐父敝緼寒無憂老仙獨不棄謂可同真遊解衣逺衣我意重千金裘髙義固多感濁骨難崑址披之焚香坐世慮忘囂湫神仙未能學願學王黃州次韻薛夀夫見寄夏夜偶成漏斷月未午微涼生破幃起步庭樹影尚欲何枝依平生愧百拙偶巧是勇歸故山差可樂更喜賔客稀為問晝錦榮何如芰荷衣所遇苟獲安萬事皆忘機避暑嶽祠追和揭學士韻呈張囦亮提點都門東二里有宫如上清炎氣漲人海乃見白玉京園果出新脆氷盤眀水晶虛間境既闢低垂氣為平連棟深月窟玄林挹瓊英遺世固獨立愛客仍多情樹影正已斜蟬聲斷復縈聽爾羽衣曲陋披子晉笙人生貴適意何物為寵榮眀朝又城府狗苟復蠅營題訾仲元孝義詩卷臺掾訾德眀父也顓蒙錯恆品孝弟均天衷嗟彼陷溺徒倀倀劇盲聾率性見若人力踐由吾躬子職盡終始里仁洽瘝痌百行既有原推擴宜無窮遂令鄉閭間寒谷皆春融天家急彰疸華表髙摩空積善後必大佳兒行亢宗伯府試鉛槧揚揚播清風耰鋤慮德色汚俗應躋隆八月草日獨坐眀初齋前醬臺秋未深雨歇風日美斗室滿琴書清晝門不啓庭空走已永潦聚躍丁子涼飈來謖謖豐草動靡靡佳人暮何之杖履獨徙倚素襟幸自愜孤念定無悔徑荒差易治手鋤漸料理此不求同聲姿年已如此題周伯溫玉雪坡亭玉雪取譬梅論色非論質堅白將無同磨涅孰爾釋孤芳冠百卉歲晚見特立胚揮先天春具體未畫易詠歌及影香萬漏才挂一西坡據形勝嘉名任沿襲絶彼官府誼專此山林僻栽培閲三世貞潔著一德孫枝尤挺出籍甚騰茂實寄聲玉雪坡未許心鐵石次可行泛舟韻時吳安之遣人治具膠榮四十年弛擔甫天放雖云在人境心逺絶塵坱況兹遊騁地秋色入四望卉木已向榮雲水自相蕩窗虛得山多臺髙知野曠清泉來汨汨節制無暴漲何須過前川園有花可傍玉肪薦肥羜銀瀣注新釀時賡孺子歌底用小海唱龜魚共遊泳鷗鷺來翓并分亦何常小大各有量子房屈圮下髙祖隱芒碭君臣倐際遇功業驚洽暢挺然三傑中奮乎百世上一朝事辟穀身外物皆長乾坤任俯仰形骸貴放浪萬事雲悠悠一笑天蕩蕩鶚謝纍百薦龍戒上九亢人生幾雨屐芒屩乃兩舫徒令方寸心寂寂復行行吾年今如此出入必扶杖故人念衰老千里牲酒餉自鼓煙波枻永稅塵俗鞅境勝夢且清位失道未喪誰言管城子初非食肉相興來使陶寫形役豁惆悵苦吟尚作􅑂樂飲不為恙學易免大過勿藥喜無妄厭厭詎可極眀河月溶漾庶足充淹留還如李公訪次韻可行記塘上草木二十四首吾家青牛君伯仲龍矯矯不似丁令威暫來立華表鬼神護斧斤風霜幾昏曉摩挲左紐文曽見陸為沼徂徠以多賤吾圃斯拔萃逺從它山移清與幽境會樂天才四十栽爾已興慨吾年六十三方期翠成蓋長公有名言不可居無竹㒒㒒斸蒼苔森森植寒玉聲來書幌清隂入酒杯緑何須更晚食此君足當肉春風為花魁先路來枝南但憐結成實能酸不能甘世味不可口根在吾何慚年年共雪月華我徑三三蒼官昔多事乃與羣鳥鄰何如在圭塘亦勝居神囷老根已作石霜皮不成鱗不用歎不遇參軍能寫真朝來花斬新暮雨墜紅濕藤蘿助竒觀羅帔層層碧昌黎性苦隘政爾要蒙羃一笑問秋乎還能誨人奕枯樹影在水浮動如仙槎昨日春意閙今朝雪滿沙榮悴等兒戲老懷無嘆嗟作實助殽栐明年還看華有木知尚時手植日向榮無忿砥用蠲聊用寓野情亭亭矗翠葆毶毶散紅纓青裳勿異字姑以合歡行濃緑千萬枝火齋中貫穿山人晝眠起銀海日俱眩燥吻行可濡寒裂紋玳絢無賦繼殷元虛塵翰林院曉涼振弱體月墮東方晞香塗漢宫額潤展華陽衣應朝通眀殿金杯承露歸道粧豈余媚池影動清暉司花琢清貞不揥幽人髻蕞爾草堂陰香軋百畝蕙月露映氷壺美芳集磑磑著我沉水鄉庭前更叢桂披披青羅扇敷陰圭塘阿夏窗雲影薄秋枕雨聲多翰墨聊復爾風霜其若何休教近湖石掩映美人歌異卉非卯生緌纓殆天就驚風振細葉宛若三市閙赤幘不煩憎縳賣孰爾購因之記昔年聽聲趨待漏雨後叢甲生俄成尋丈樹誰名鴈過紅綵纈無不具環池爛雲錦吾圃遽爾富呼酒亟賞之秋光欲寒露花仙何許來嫣然立沼上香霧羃曉粧濛濛九華帳勿令苦幽獨就賞時策杖秉燭夜莫歸春去無羈鞅蜜脾搗簷蔔成此佛面胎黃中色可尚況在雪裏開盜名匪獨我伏神出芋魁幸無調鼎實聊用侑山杯園丁功力深春榮到由枿花開月更眀溶溶白雲遏紫實待含津囊承躬採掇莫羡鄴侯燒且浣長卿渴人生念慈親堂階多樹萱忽隨靈椿化冥漠俱髙鶱此憂詎可忘肝摧不能言對花差自慰白頭還抱孫昔人避秦亂川原多種桃我幸遇眀世栽培胡自勞看花食其實為圃豈不遭疏懶強鞭策猶勝宅不毛清夜遊西園皚皚白雲堆東風苦愛惜不遣過墻來何須領張徹且復傾我罍兹焉不省録寧免長姬咍人間隱逸花開發宜遲暮三徑連松隂百繞穿葛屨秋容淡籬落寒香入毫素掇英泛濁醪盆甌親挹注作甘最夏果其耐招衆禽禽啄吾不惜曷酬僦地金呼童日毆護青紅猶滿林禽飽人亦飽於焉獲我心造物眷花王擇后降嘉種英華得既多加以人力壅楚楚御衣黃遂冠羣芳寵羣芳各有匹物用矉而捧開元得四本花本兹焉張衆色各有態世獨推其黃我非富貴者胡為植圭塘天教風露夜受用一庭香塘上草木續詠六首用楨韻涼飈動空碧修枝振髙青張幄却炎暉交隂可中庭不煩位三公政爾宜冷卿南柯莫記夢陋室方為銘幽人非浮屠日日戲桑下愛其濟世餘重緑芘朱夏昔賢事遊觀竹木萃緑野繼踵吾不能但入老農社靈木享遐算異質稟至仁後先八千歲才是秋與春蒙莊發揮後塵世閲幾人吾材實樗也賴得爾為鄰託根鄉社門逺迹關塞上春莢羮萬錢大勝食方丈東隅何失之收之敢髙尚歲晚淡相看萍蓬謝飄蕩依依裊長條漠漠迷小院縈風輕作綿穿露巧為線不復管别離招鶯更留燕會看成車蓋吾圃有餘羡花部愛君子移栽未逾年生意自鬯達主人豈花仙初日爛雲錦靡曼知幾千逺觀敢褻玩栁隂維小船和李仲山參政見寄韻軟語慙炙轂直行昧抵巇一退願始足四序閉皆宜秋鷹遂脫鞲野麋寧受羈好道苦不早晚家隆慮陲喧無車馬至淡有琴鶴隨飛來雲錦篇賞音舍公誰詠歌樂舜日不用望九嶷次韻可行登泠然臺輕風水無波落日景逾好憑虛思橫生萬象困搜討窮睇眼未花得意詩不草勿謂城郭近下有往來道心逺地自偏興來無灑掃收藏千鈞弩莫用穿魯縞悠悠歎浮雲翩翩羡歸鳥一任坐井徒譁然説天小至正集卷六
