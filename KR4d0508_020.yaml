  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0508_WYG_020-1a, image: WYG1211/WYG1211-0148c.png}
body:
  text: 至正集卷二十元許有壬撰律詩七言四十首㑹真觀萬壑千嵒一水通東風吹動碧溶溶彌明到處曽聮句回老何年此補鐘滿地暖煙生細草半天寒雨撼長松道人不作逰仙夢嶽市花香酒正濃水簾洞和仲逹韻濺珠噴沫雪霏霏怒湧雄聲動翠微一派衝開雲峽出兩層分斷玉虹飛家山夢到黃華峪衡嶽寒生白紵衣我欲濡毫寫形勝老來才調愧元暉夀寧宫用間間韻當年鸞鶴記經過麗錦詞華出鳯梭京國天髙黃屋近衡山春滿白雲多扈行屢得聮觴詠奉祀時聞響珮珂老我一笻雙不借為言心事更無他題曽原徐叔明山居樓下田疇樓上山主人無夢到長安鮮鱗出水金三尺修竹穿雲玉萬竿堂構弟兄皆杞梓階庭孫子又芝蘭瓈江精舍經營處要與斯文共嵗寒江民永香亭用廷鎮韻夜不荒凉晝不譁一庭芳樹四時花髙情早慕陶彭澤少態都忘古押衙窗雨翠寒迷竹影洞雲紅潤出蘭芽人間多少黃塵路應被東風笑鬢華鄭元翁秀野堂屋上青山列畫圖屋前流水響循除四時花竹駢生意一片煙霞護隱居嵗稔客來須設酒日長耕罷却尋書北窗睡起扶笻出閒看浮雲卷又舒張山宗知事别三十五年今始一㑹且辱惠詩五首次韻答之當時豪氣薄雲天不位三台即列仙編簡古人誰勝已雲霄交友盡忘年流光入鏡忽成老世路著鞭何用先緑水紅蓮行入幕休忘秋菊與寒泉息堂堂下桂槎丫晝夜常縈五色霞宗㫖非傳小乘法文章真出大方家受官俸少氊常冷問字人多酒不賖老友睽離已三紀莫教容易答韶華九萬修程負壯圖兔園依舊是迂儒偶乘逸興來衡嶽敢效髙人泛具區夜月軒扉對松鶴春風薇蕨勝蓴鱸樹桑五畝生涯了不用成都八百株席珍求價售明時燕石梧臺敢自竒北海尊前著文舉南風扇底避元規尋常得句即成樂七十休官亦太遲放浪形骸有成算沙鷗從此莫相疑湘水安流不肯波湘君應喜逸人過瘦如子美吟何苦狂比寬饒飲更多百嵗儘渠為話柄四方隨寓著行窩相逢一任頭如雪猶可相從醉後歌和文復送别韻京國逢人問楚湘南遊誰憚道途長嶽峰愛客隂為霽沙鳥驚人集又翔夜艇載回詩夢去春衣留得酒㾗香天涯莫道分飛逺回首衡雲尚可望叨升左丞原功以詩為賀和其韻干祿初心只斗升偶隨驥尾遽鶱騰平生浪恃八乂手老去敢誇三折肱玉案麻沾雲氣濕宫壺酒注露華澄鳯池不是藍田縣却愧而今我負丞和原功無題韻二首夢斷春風豆䓻梢月明空室見蠨蛸塵封琴嶽靜聞蟻香褪被池寒折膠白髮而今嗟滿鏡烏衣何處更尋巢赤繩知在君侯手底用持蓍䆒易爻乾鵲何時噪樹梢著衣癡絶候蠨蛸畫圖留影鬢如漆錦瑟收聲柱欲膠一覺十年驚蝶夢平生兩度毁鳩巢莊周豈是忘情者不見咸恆未畫爻和間間承賜土尊韻百年聲譽滿方輿萬里遨逰盡坦途風月襟懷氷雪句神仙官府帝王都御香賸馥沾書几宫醖流春到藥壺我欲大書承慶事愧無椽筆似君謨鐡笛為西曹掾孟天偉賦夢斷柯亭月滿林却從良冶嗣遺音沉埋難蝕千年節剛烈能鳴七竅心回老飛來洞庭晚劉翁仙去武夷深太平不用為鋒刃吹盡人間市酒金題沙木斯迪音成之去思碑延祐乙卯余登第倅遼州維成之公實監郡後十七年承乏參議中書成之由吏部侍郎除守四明待罪政府成之考最擢兩淮都轉運使庚辰夏五承召過維揚始見其四明去思碑墨本益信昔之考最為不誣也俄升浙東道宣慰使都元師開治四明邦人士之喜當何如耶余昔同僚相得甚歡故樂道其槩而重之以詩曰當時同列共闕貞深幸掄材與鑑衡漕府五年書上考海天雙節照連城春留舊治棠無恙雲護豐碑蘚不生竹馬兒童應有語四明山水故多情送王仲方赴彰德總管天門魚鑰換魚符華髮偏冝皂蓋車愧我老非鄉郡判喜君名入御屏書莫憑鄴下一時語當念民心三代初洹水先塋滿松柏春風餘力望吹噓題楊德璋崇德樓樓頭天接玉門關樓下河流繞賀蘭要與聖賢同踐履不因風月事遊觀牙籖插架三萬軸畫棟飛雲十二闌嵗晚德符何處是階庭玉樹倚髙寒春波小隱圖楊柳煙深鶯未老桃花浪暖鱖初肥人生何日脫羈鞅方外有天容布韋已辨筆床隨野艇更添茅屋傍魚磯莫言大隱皆朝市猿鶴由來識是非贈范堯臣赴棠隂巡檢平生俠氣薄雲天能使聲名一日傳胸次故家兵十萬世間新話字三千明堂杞梓憐橫道小隊弓刀試著鞭好養排風舊毛質九霄騫翥有他年復科呈原功并序自慚膚學忝與首科凡我同盟綴歐詹之虎榜問余何事據荀朂之鳯池適丁國是之多艱莫救文風之不競紫衣傳詔驚聖訓之如綸玉笋聨班愧天香之滿袖忍作捧書之王旦誓為乞旅之申胥恨無一字以解圍愈重同年之浩歎結廬在人境我方歸隱于柴桑臨流作釣磯公欲買田于清潁奎躔有赫天道好還御燭星辰先賁玉堂之元老宫壺雨路繼呼黃閣之舊人為北道之逺來雪東隅之舊耻王庭孚號政府僉謀一髮引千鈞孰能勝此片言重九鼎子之功夫障北川之狂瀾揭中天之華日因人成事遂收效于桑榆曰我能興竟踐言于息壤喜而不寐詩以永歌朂爾羣材好作儒林之朝董歸哉二老甘為聖世之巢由略此寫心伏希捧腹圖書東壁久蒙埃手障西風為掃開駝觜不緣公第一魚羮無愧我重來栽培桃李非私已收拾楩楠要育材心事以酬歸便得石田茅屋又蒼苔糟笋和原功韻穿林快劍截文犀沉浸誰教遽到齊玉版悅禪成骨醉籜龍鴆味失雲栖此君一譜通儀狄稚子三生是阮迷我向楚山餔未厭等閒那肯傳氷虀送盧正卿赴福建運同桂林萬里恰歸來又遣三山二漕臺科第人材今可數東南民力已堪哀牢盆久待攜春去行李先期載月回九曲棹歌無用和好從雲谷問生財時雨忽降簿書甚稀獨坐後堂王可矩右司以詩見教次其韻二首翠樹雲深百鳥鳴彤闈如水嫩凉生雨聲自與詩有約天巧豈容人强名萬里秋風黃鵠夢五湖春水白鷗盟年來不用愁華髮尚有觀山老眼明西㕔東閣總詩鳴天籟相關觸處生京國故人多老病洛陽才子獨聲名風雲幸際文昌運松柏休忘嵗晚盟他日江湖攜手去儘渠蚊睫有焦明方旱得雨九齡平章徴詩志喜才覺驕陽氣鑠金便令璇極轉濃隂坐朝真有作霖手伴食可攄憂國心一夕夢占魚兆協九天雲接鳯池深神功帝力猶能賦都雅從教愧賀深送宋子與赴贑州照磨賢勞鉛槧十年期才得春風賦式微黃牒已逾毛義檄緑袍無負老萊衣蒲帆和月載詩去藝閣分香滿袖歸明日鬱孤臺上望白雲應是不孤飛送楊德璋降香寧夏如來寺何年金像峙堂堂天眷方增慧日長一旦皇華逺銜命滿林簷蔔若為香子行又遂庭闈樂詩苦寧知道路長為向平章專問訊暮雲春樹思茫茫延春門對雪丞相命即席賦岧嶤宫禁接同雲寒壓東華十丈塵輦轂幾年無此雪廟堂今日有斯人瓊樓影亂三山月玉樹花驚一夕春可笑袁安不髙卧要將綿力助洪鈞正月八日行香中心閣過王君實侍郎留酌中心臺閣曉參差白髮遺民幸侍祠禮部尊開成一醉皇州春到不多時空庭鶴舞能留客古鼎香銷未得詩酒盡且歸君莫訝上元回首又休期考官王師魯博士監試張雄飛御史皆同年也因成鄙句以寫舊懷仁皇下詔急求賢糠粃當時偶在前兩榜復科新大比三人聯事舊同年關山道路尋常夢臺閣風雲尺五天但使得才今勝昔吾儕寧復歎華顛雄飛喜作詩而例禁不得相見作詞調之張子能詩擅士林無時無地輟搜尋文場咫尺不相見春興幾多應自吟鍊字直教成白首知音豈待鑄黃金何時尊酒論真訣要自康謡說到今至公堂即事二首科目中微復盛行至公堂上寓權衡鵠袍儼雅四百輩鵬翼扶搖九萬程椽筆雲雷平地起蘧廬燈火徹宵明得賢要效涓埃報白日青天鑒此誠五更傳鑰棘門開巾卷于于悉俊才萬世重儒有天在八人承詔主文來良金政待披沙㨂真玉休教抱璞回早捧賢書拜天子紅雲跬步是蓬萊雄飛有詩次其韻二首句句珊瑚間木難君才不愧鄭都官月中有桂天何近春半無花曉尚寒多士文章雲五色野人心事日三竿松㕔雅興知多少只恐毫端墨易乾少年文戰不知難老矣常憂負縣官詩筆亂搖松月碎席房清透柏霜寒人間跛鱉從千里海上連鰲待一竿無奈春風笑吾輩滿堂佳客酒杯乾用東曹掾徐仲禮韻簾幕香凝晝景遲卿雲不動九天低百年場屋重開設一代人才入品題賦類長卿慙狗監車如伯厚笑雞栖欲知瑞應文明處夜夜寒芒爛壁奎謝賀右丞寄蒲萄酒幾年西域蓄清醇萬里鴟夷貢紫宸仙露甘分紅玉液天風香透白衣塵相君不用凉州牧老子方懷漢水春自把叵羅還自酌惜無細馬錦靴人和明初蒲萄酒韻漢家西域一朝開萬斛珠璣作酒材真味不知辭麯糵歷年無敗冠尊罍殊方尢物冝充賦何處春江更潑醅却笑無功戀門下􅐕田荒盡不歸來至正集卷二十
