body:
  text: 至正集卷八元許有壬撰古詩七言十九首送揭立禮用原功韻設科昉自延祐年招徠賢俊闢四門太平盛典遂興舉當國大臣精討論賔興人人重徳行繼述在在聞王言豈惟髦士登棫樸又恐絶壑遺蘭蓀拔幽風紀許投削言事布韋令扣閽爾來何人眩國是舊章成憲如芟繁袄虹飲竭北溟水欲使變化無鵬鵾亦知有時天未定天地不老斯文存黄能永閉羽窟厎剥盡而復貞而元子方急養且歸去四海尚賴他人昆豐扗弱歩退不勇素餐愧我猶薇垣㑹觀桑榆酬東隅已掃姦穢空西園車堅御良路可逺眼前未可定輊軒叔能贈言一舉手猶勝杜老尋諸孫人間富貴土苴爾得似定省躬晨昏題楊見心山水横披季主不見長安市子誰置之巖壑裏一朝袖得白雲來不使青山去吾几清風襲人嵐濕衣山林朝市同一機白頭利達復何問但欲此山從此歸題同年王君冕芳潤亭我生有恨未入秦佔畢詎盡山水真每聞聒聒說形勝矯首空美西游人樊川真隠有佳處觸目便與終南親終南振古青未了秀色排闥寒嶙峋玉山太白峙左右變滅萬景昏復晨一亭風物宛隔世三時花木常如春潏流㶁㶁走庭下餘波逺溉斯為津亭中之人何所事學有原柢筆有神英華􅅹液日著見生香不斷流無垠陸家徒說漱六藝心得乃與造化均人生有樂在道義此外何物闗吾身憶昔充賦來京師姓名一旦達紫宸徒勞州縣二十載秋風兩鬢吳霜新亦知此地有捷徑我車政爾方其輪清泉白石但無愧蠖屈時也寧非信何年杖䇿遂一過巨觥盡洗胷中塵贈李孝子和原功韻倦游度闗如度磧草色寒與霜俱白按圖地則仍塞垣問俗今非袵金革柔逺雄盛角兩都二十年前我曽客李孳孝行聞里閈滫瀡怡愉躬旦夕母心憐女不忍嫁嫁出吾門恩意隔子能養志安貧居姊遽從夫入窀穸林宗何嘗貸五千爐韛自可來千百但知有母斯有姊詎肻同生不同室負甥真可繼賢躅輟饌猶能光史冊寸草幾何殫此心白雲幸免傷於役矯情一分定寡恩大笑子亷錢置席李叔儀御史榮夀堂丹砂貯井水漬紅甘谷大菊千萬樷居民子孫受滋液里閈接武期頤翁棗强仙人世中土飯飲但與齊民同一家四世皆上夀夀自有種天無功乃知丹砂與甘谷只在若人方寸中翁今又復近八十目炯巖電顔如童田娛里娭行不杖弄孫教子春融融子賢亢宗早馳譽法冠峨豸方乗驄聖朝推恩敦孝治鄉邑五品疏恩隆人間盛事及養志身外名位何卑崇可憐泉壤謾極品封薄亦勝追之豐斯堂繼今世濟美我歌翁夀傳無窮送界畫林一清赴台州并序予幼讀書江南舍書無所嗜買書苦無貲故於畫不能有況能别乎入京游道廣時時有見鑒論品第咻之積久因知古人以是名家亦豈易哉我朝傑出者盖可厯數十門諸品各見於世獨宫室臺閤名者罕聞焉宣和秘藏所見不過唐尹繼昭五代胡翼衛賢宋郭忠恕而已則知此藝世殆未易精也皇慶間王震朋者名一時今得永嘉林一清予所知二人爾天地間事未有無法者畫雖一藝囿於繩矩而不為窘束乃可語其至奮筆作氣揮霍塗抹有足以聳動人者語其豪宕則可而未足語乎法也若夫千門萬户正斜曲折廣狹髙下毫釐之間不悖繩矩寓算家乗除之法此畫之有合於學而有用於世者也故界畫有可據以締構者有但觀美而施用繆悠者識者謂之可以拆架乃為得法此真知畫者哉一清多藝而攻於此所謂囿於繩矩而不為窘束可以拆架者也昔以岐黄術業供侍文宗青宫出官監滄州稅改台州監倉副使其行士大夫餞之詩余序其首且為之詩曰天地萬物有規矩大匠胸中具樓閣有人悟此謝斧斤筆鋒乃有公輸學千門密可數椳闑萬間細不遺榱桷鈎心鬬角矗蜂房各抱地勢分垠堮横鈄平直自乗除髙下蔽虧相脉絡按圖考制如指掌拆架不許差毫末林君又得髙古趣守法不受繩墨縛乃知作事貴有益舍是但可資談謔有言贈子試静聽阿房迷樓勿輕作後來賢者識寓戒淫昏適足媒其惡子歸好究土階圖聖治方將復淳朴題原功舅李氏遺經閣湘瀏望族隴西李四百餘年業詩禮藏家無金惟有經建閣儲之付孫子子孫相繼百年中閣燬而復兵再燬傳經有人豈終廢又見翬飛矗雲起秦宫漢闕鞠為墟札柿誰能斧斤擬清門盛舉雖偶墜詩書厚澤流未已閣能儲經俾嗣賢嗣能復閣為經侈經存閣廢武可繩經廢閣存族俱圮直須經閣與吾嗣綿絡百世相終始眼前風物總天成羣山連娟迤流水親朋一樽時宴聚談笑無非杼文史豈惟道義淑吾宗遂見善良薰晉鄙有甥翹翹金閨彦記文髙與前賢峙三生應是魏陽元成此宅相世濟美薛子敬母夀康堂人生有親期有夀夀而康寧世希有人生有子欲其賢賢而復貴天何厚薛門有子號能養弃郡承歡備膏滫謝家寶樹暎萱草萊子綵衣輝白首只今稀年又逾十扶掖尚不勞子婦東朝敬老示殊恩錦服侑以黄封酒春風滿堂扇里閭咨訝嘖嘖傳衆口人間福慶豈力致積善已厯三世久聖朝浩蕩開夀域鳩杖時時鮐耇願推四海均此慶直見曽𤣥印如斗寄黄文復吾友黄君字文復肥遁山林探理窟髙情萬事等浮雲獨於樹藝常吃吃枝頭能出二色花堂下羅栽多品菊依墻㳂砌僅存苔當户繞池皆種竹非因百趾無所歸五畝多應不容屋扁舟訪我黄鶴磯笑我人寰混塵俗季也其徒頗好游簣土小山勞自築盆池纔貯數斗水要看芙蕖紅暎緑常聞種藕便得花菂須再歳生意足君言我有已試方功比如船更神速土籸和餅壓汙泥匀埋石繭清漣沃君歸十日見毫芒薏尖出水青猶曲杖藜百繞望已切茄才如線擎錢矗鮮粧擁盖渺何許黄萎遽似經霜酷其徒可笑又為辭遇夜每遭蛙肆毒新根食盡人莫知遂使卵胎成殈殰蘜灰早用蟈氏典定見亭亭雲錦簇墨香千里忽飛采欲驗平生橐馳術我方絶倒力為疲不覺開緘機再觸蛙耶人耶未易究政爾隍中夢蕉鹿種蓮有道敢告君近效小成車戒覆人間七澤闊於天㑹洗而今盆盎辱謝洪憲副惠繭紙汗牛編簡罄竹木蔡氏弊網功方興剡溪藤角㑹稽楮文塲擅美紛相仍東方妙製中天下照眼瑩滑涵春氷清泉縻繭融玉液不動機杼成霜繒感公分惠到狂客欲奉瓊瑤道途隔等間肯造五鳳樓留草匡時萬言策喜逢口灤陽驛東北四十里山有雙塜世傳昔有久戍不歸者其父求之適相遇此山下相抱大笑喜極而死遂葬於是俗因謂之喜逢口亦猶望夫之有石也雖莫究其世代姓氏而其言有足感人者故作是以紀之兒寒解衣重撫摩兒飢推食孰忍訶長城與國逺負戈一去不返當如何去時云戍東北鄙直出榆闗度遼水白頭郎罷與影俱豈憚山川十萬里天教此地適相逢父曰從天墜吾子笑疲樂極俱隕身誰謂情鍾遽如此官家開邊方未已同生又别寧同死山雲漠漠風颼颼山頭雙塜知幾秋當時不忍一朝喜今日翻成千載愁猶勝貞女化為石終古孤身雙不得清江寒影日悠悠行人一去無消息以墨贈伯庸春風聮轡出瀛洲兄署玉堂我倅州倅州屝屨不遑給况得操筆攻雕鎪玉堂業攻代天語泓穎日與兄為儔黟川妙劑大盈尺豹囊幾載勞慳收中韜光𦦨待人發我非其人難久留黎芹菲獻意有在要助揮灑昭皇猷政如和弓到羿手此不破筈將誰求北門草制退食後還冩新詩寄我不紫微宫松花石偉哉元工陶萬類翻覆洪纎等兒戯即死為生草化螢蛻鱗附翼蛇成雉紛紛朽腐還神奇况復根柯本堅緻長林絶壑雲霧深斧斤難及幽潜地由來長育不假土盤結層崕出羔稚香流石髓日灌潤孕秀含貞真有自風霜陵虐知幾年坐看寒暄變榮悴一朝老極枝葉殘太古須眉失蒼翠誰知千尺嵗寒姿幻作一拳山骨峙紋理綢繆節目存流脂尚漬皴膚膩棟梁雖廢大厦用礎石政為明堂備琳宫老仙好事者不憚逺途三犢致斯珍舊說出金華欲識無由今忽遂但恨米狂未及見太湖靈璧勞兄事摩挲清氣凜生秋猶似半天風雨至老僧指㸃笑且言君可寓意無留意石居吾室豈吾有曽閱嬴顛與劉躓詩成相對一掀髯大笑奇章牛氏記觀刈春耕軺軒載耜來夏耘竭力空蕪穢天時人事兩無失一飽今知堪坐待農家到秋塞破屋此樂天今付貧倅禾頭飽重垂拂根梓擦風聲傳銍艾月明健卒擔如飛足繭肩赬汗流背一埸方畝積無隙更向隣翁借車載山妻啼飢已拭淚忙呼赤脚同掃碓餓夫不言但臆對大嚼預摇三尺喙縱横滯穗不假收西風肥殺鑚籬萊覆田銅鞮宿榆社李氏小樓市樓有階不可攀縱有風月無溪山中藏萬斛塵俗氣擾擾歌舞羅翠鬟斯樓雖小獨全美四面青山一溪水清風明月不用錢咫尺真須論萬里聚逺收奇景亦多可憐騷客暫經過主人力穡寧恤此奈爾溪山風月何琴峯夜月圖有峯如琴青㠝岏有人能琴栖其間携琴獨對琴峯彈琴調况復彈髙山趣深境勝畫難巧助清出奇天不慳玉輪濕露軋遥碧陰氛辟易開松闗山人於時喜欲狂清風入指傾潺湲潜蛟起舞猿狖泣石恠睥睨山英蹮我聞至樂本無聲底用兩手紛如翾君有真琴未曽撫倚空千尺嗟長閒扶桑大繭如甕盎我當為爾絃孱顔中藏萬古不傳調奮臂一皷驚區寰要令聾瞶知蟻鬭鈞天歸奏通明班山人見此應絶倒山中有約何當還錢舜舉闗山行旅圖為馬良臣賦江山信美非吾土何事飄飄無定所想因逐利利在途逺駕車牛來服賈天寒日暮山路長羸牸鏖鞭背如堵往來如織有底忙觸面相逢不相語琴書汨没長安道趣向雖殊實同苦人間蠻觸方紛爭得失區區都幾許我行四方定何為十年夢斷江湖雨披圖浩蕩發詩愁政爾闗山作行旅書事為友人賦有梟突來居鳳池四翼濟惡喧一時面謾晝市恣攘攫力障賢路為嶇崎燎原凶熖未易撲懸河偽辯公相欺呼朋笑類布中外禍心包蓄將何為一朝奮出曰松者怒挾彈射爭先之中天日月靡不照覆盆偶蔽天非私從知貫盈敗可必曵兵棄甲何纍纍亦由遲速理有在機來閒不容毫釐體骸能與孟青抗傳車又向窮荒馳九重清問既下逹益者遐方皆内移君才磊落去就審氣節不負先皇知因思鄙人昔孟浪詰難屢犯編須危幸災仁者固不忍魯觀曽有聞人尸寄言同惡未及者早宜改行懲吾詩以畫鹿為太師夀祁連山中有神鹿毛質千年似蒼玉芝香泉洌不肯留來與仙人服雙轂仙人兩手握化機陶冶宇宙成雍熙相看一笑陋昔典三公但見圖車輜洞中有天春不老嵗嵗香風滿瑶草仙人自有長生方更開夀域均八荒至正集卷八
