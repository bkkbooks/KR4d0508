body:
  text: 至正集卷七十七元許有壬撰公移正始十事竊謂春秋王即位大一綂而謹始也盖為政莫大於謹始未有不正其始而能善其終者也欽惟今上皇帝以聖神之姿嗣大厯服凡在有生孰不忭躍思見一新之治夫繼政之間聖聖相承帖然無事猶必厲精更始思有以聳動天下之視聽況處大變之後者乎自非舉綱撮要因事制宜則必迂緩不切何補於治卑職忝當言路不敢煩瑣謹以十事切於新政者具列於後一曰傅翼太子盖聞太子天下之本擇人傅翼實有國之急先務也賈誼謂選天下之端士使與太子居處出入生而見正事聞正言行正道左右前後皆正人不能毋正又曰太子之善在於早諭教夫心未濫而先諭教則化易成此古今不易之至論而治安長久之上䇿欽惟今上皇帝春秋鼎盛萬年發軔之始天地祖宗社稷之佑太子金玉美質天性聰明泰山磐石之基也當此嗜欲未開心術未定之時首宜選擇正人端士以傳翼之教之以祖宗寳訓并漢人文書使知創業之艱難治亂之成迹培養徳業習與性成則本一正而天下定矣二曰選擇長官盖聞家之隆替在於主家之人官之廢興係乎長官之責如中書之總機務樞密之握軍政臺憲之司風紀為之責者可謂重矣當於䝉古人内選擇老成歴鍊敦厚公忠者用之苟得其人又宜久於其任責之以必成則天下之事庶乎有濟世祖皇帝時為臺省官有終其身者故當時之治視古無愧其六部二品衙門行省行臺宣司為首官員俱合一體委任雖然此特末耳請以其本言之國家每用大臣未嘗不難其人盖以儲蓄培養之無素也深山之木必參天而後勝大厦之棟梁此豈一朝一夕之所致哉若急於用而以拱把之木為之不惟摧折不堪而傾覆被害者多矣培養之道無他在乎學校而已世祖皇帝用許魯齋為國子先生當時䝉古生員教育成材者何限至於集賽鷹房皆知所謂三綱五常今之學者不過粗識文字又復廢之使乳臭之子驟膺重任禮義廉耻視為何物惟欲保其富貴又安知君臣之義隳事隕身乃其宜也今後擬合令蒙古人員子孫弟姪必須入學培養教育使之有成而後量材授職他日必有出類抜萃之才出為國家之大用其至下者亦必知君臣之義此似迂而實切於事者也三曰宫禁通籍盖聞千金之子坐不垂堂萬乗之尊豈宜無備故深居九重宫室宿衛嚴肅周密者盖以預備非常為祖宗社稷萬年計也周官小宰治宫禁之法而刑綂闌入罪有等差我朝立國寛厚相承凡有朝賀雖臧獲之徒皆得直至廊廡縱觀行禮平居無事大臣奏對之時親隨吏卒皆得入内雖恢洪無外大示寛容而小人何知不可不謹其司門禁者惟視衣服之美惡而出入之朝士惡衣捶楚交下卒𨽻鮮服往来自如貴賤無分一至如此且禁之為言禁也禁人而使之不得至也今一切不禁而禁衛之設果何為哉擬合截日令省部約㑹合干衙門參酌漢唐之制立通籍之法其於事體闗係最重四曰削去兼領軍職盖聞總攬威權乃人主之事臣下責任豈宜使之有出位過分者故太平則注意宰相有事則責成將帥世祖皇帝立中書省以總機務立樞密院以治軍旅治民者不與兵事治兵者不與民事其所以防閑之道截然有不可犯者邇来漸至紊亂如元惡特實既為臺端又領軍衛雖包藏禍心固不易測而恃威藉權實由乎此常人之情手有鞭杖則思箠擊無是物則無是心也又如欲擊人者空拳赤體雖欲奮作人得以制一旦被之以鎧甲授之以兵仗則無所不至矣擬合照勘各衙門官員凡兼軍職領各衛者皆與削去以消奸宄於未萌且為無知小人之福五曰太平武備盖聞有文事者必有武備又曰有備無患夫天下之患莫大於無備山居有虎狼之患則髙其垣墉富家有盗賊之患則堅其扄鐍而況為天下者乎備之之道若治兵爾夫折衝禦武使四海為一兆億晏然雖大奸雄不敢輕發者獨係乎此而已承平日久恃其無用卒日以惰將日以鈍將帥襲其父祖舊部例皆膏梁乳臭之子聲色是務朘剥是習至有不能挽弓者士卒非老病則㓜弱非影蔽則僱代器仗之顛倒不知況所謂搏鬭撃刺之法其軍户消乏鄂囉官不知存恤管軍官日復侵削困苦疲弊無以供軍需應屯戌者滔滔皆是也天下無事則已一旦或用則何以哉擬合令樞密院講究拯治教習之法先自五衛次及天下屯戌去處必使官知調度士知戰鬭不可因無鼠而養不捕之猫此太平之先務也六曰逆賊妻妾盖聞有非常之變必有非常之法治之比者元惡諸賊蒙朝廷恩寵雖海嶽不足以喻其髙深而集賽之設又腹心股肱倚托無疑者一旦如此赤其九族未足以雪天下忿怒之萬一欽惟今上皇帝奮雷霆之斷盡殱梟獍襁褓之子殄滅無遺京師萬民鼓舞忭躍但各賊妻妾尚未區處各賊存日同享富貴其夫所犯盖歴代之所未聞天地人鬼之所共怒不以非常之法治之譬猶被萬斤重物之擊而以寸莛報之擬合將同謀諸賊妻妾一體論罪或流竄遠方分配流囚其諸人索要為妻仍享富貴一旦又遇禍變視夫家如傳舍狃翫誅戮恬然自安使綱常掃地痛宜禁止索者奏者俱坐以罪庶幾刑罰輕重適宜七曰頒詔以正前赦盖聞令出惟行不惟反此常道也不得已而處天下之變必欲泥於古而蔽於常則亦不通之甚矣比者各賊惡逆傳聞四方震駭物聽既而詔告天下除殺祖父母父母妻妾殺夫不赦外其餘如謀反大逆奴婢殺主皆與釋免百姓聞之不得不為之疑也豈知各賊雄據兩都或握兵權或操省印或在憲臺布滿要地號令百姓乗輿遠在數千里外朝廷一有輕舉則居庸之闗不守矣當時危急之勢易於反掌雖惡逆授首在理可必而兩都生靈先肝腦塗地矣聖上沈機遠謀宸斷有待不欲輕發貽害百姓故以寛恩而釋其疑使惡逆之徒有以自安不至狂肆或生他變及神機之發誅殛元惡特煩一介之使爾此自古聖王之所不及也然而先行詔書已徧四方百姓不知將謂謀反大逆奴婢殺主皆可儌幸獲免擬合再詔天下使知惡逆之授首以大慰衆心其有謀反大逆奴婢殺主者亦合復追入禁為萬世綱常之助八曰特們徳爾家産盖聞刑賞者人主之大柄有國盛衰之所由也近籍没特們徳爾家産生前所授諸王各人等鈔物金銀不可勝數其為奸惡不待縷陳姑以刑賞大節論之其殺實勒們伊勒哲伯當其罪者矜夸為功至於拜珠多爾濟賀巴廷天下皆知其無罪盜弄威權致之必死監察御史索約勒哈迪黙色觀音保李謙亨成珪雖以言事忤㫖而其子索諾木為治書觀音保又嘗發其劉司徒事是以父子表裏媒蘖使四人竟坐誅竄則嫁怨於上又復隂黨逆賊特實致先帝暴崩皆特們徳爾為之張本也近奉聖㫖免其抄籍聖上厲精圖治之初刑賞大節尤當得宜擬合依舊斷沒其諸子家産先因事發獲免之後分張别居足見預為三穴之計合依哈克繖子例一體籍沒仍將家屬遷發遠方以謝天下九曰籍沒以補經費竊謂臣下奸邪既正誅戮閭閻疾苦首宜講求邇者巨貪宿惡以次誅鋤籍沒其家動以萬計是為蒙蔽奏請無補經費監察御史建言明立卷冊撥付省部以助經費果有特奉賞賜經由中書明白奏稟然後放支欽蒙允許近為特們徳爾惡跡敗露籍沒其家本人之惡盖不待言其家人之富又天下之所共知者雲南吐蕃之殺奪中書宣政之掊克賣官鬻獄濫賞冐支其目雖多無非朘剥生民膏血而致之者因是而行惠民之道是亦惠而不費者也聖朝富有四海豈待區區鹽價方得豐裕舊價毎引添至闕已極矣本人要功言利再添一定致令其價翔湧百姓一日而不可無者坐令艱食鹽課因而恢辦不前又江南無地人户科著包銀每户額納二兩折至元鈔十貫雖曰驗各家物力品答均科解庫鋪席殷實之家固不為無而貧下小户何可勝數所開鋪席本錢有不及一定半定者例以無田地有營運科約實為不堪至治三年之數欽蒙免徴而其額故在特們徳爾及諸子并已籍沒實勒們伊勒哲伯哈嚕哈克繖實壘伊哷雅阿扎爾巴哈等家産又至大四年三月十八日至今應係賞賜臣下斷沒錢物田土房屋人口盡追還官計其總數共有若干撥付省部収掌却將特們徳爾續添鹽課剙科包銀放罷不惟民力少蘇又且各處鹽課易辨昔梁冀敗収其財貨减天下稅租之半㪚其苑囿以業窮民古今稱美今化瑟更張之時天下方拭目以待此其大者也十曰樽節無益之費盖聞去奢崇儉乃能化民節用愛人可以裕國朝廷之於財用盖一日而不可闕者雖自古極治之世亦莫非取之於民但取之有道量入為出故國無匱乏民無疲困中綂至元之初南供大軍之需北給防守之費方且廩有餘粟帑有餘財江南既平江淮之財用庫藏之蓄積暴露於外未聞一毫無功之賞一錢不當之費至大以来賞賜不貲造作不節與夫其餘一切蠧財之事不可枚舉而經費始有不足之患矣故累年以来每以錢糧不敷為患益求所以生財之道至於囊括繭絲不遺毫髪亦復不足者何哉特用之不節耳民惟邦本本固邦寧財用不節害必及民聖上踐阼之始當近年多費之餘承其弊而革之詔告天下但凡係官工役造作停罷此蠧財之尤者而先去之得節用之大者矣天下生民不勝幸甚宜令中書省講究凡如造作之蠧財者皆明白條具逐項撙節依世祖皇帝用財之道則四海家給人足此新政之最切者也辭治書兼侍書學士咨文卑職學非出類才不兼人補報毎慊於初心叨冐敢過於素分中臺承乏已懼不勝禁籞執經益無所取惟揣度之自審故去取之輙陳編簡前言或許細微之掇拾氷霜要地難容迂懦之因循如蒙止供侍書之職庶免瘝曠之責同王左丞請代咨文嘗聞佐天子理隂陽中書實機務之本列庶位招俊乂執政須才徳之人非天下之所共推則公議恐未盡愜當惟某等才踈學淺徳薄望輕偶際明時誤承重任或叨承弼於兩府或昌參贊於歴年雖竭力致身冀涓涘之有報而鞭駑操鈍终致治之無禆比者災異洊臻黔黎告困究其責任首在漢人既莫亮於天工又久妨於賢路尚兹保禄豈止汗顔宜從都省聞奏選人替代放歸田里公道幸甚至正集卷七十七
