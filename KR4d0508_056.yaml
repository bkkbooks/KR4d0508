body:
  text: 至正集卷五十六元許有壬撰碑志李氏新塋碣銘李氏自宋塋邢之堯山東侯里徙西侯里地復無隙泰定甲子其後曰之芳者即塋東一里而别營兆域焉遷其祖考新其封樹蓋將倡百世而再始於斯也其友孔君嘉甫以書致之芳語曰先世由宋歴金不去鄉土雖陵谷變遷譜次莫究而兩塋之内列封秩如樵牧無擾今隙不容竁義當改卜近而可究者自吾祖主簿始不有紀之後世子孫不知兩塋之纍纍者皆吾先也嘉甫故人也之芳子曰祚者昔嘗識之乃為之叙曰主簿諱進仕唐山縣三載恩信浹人娶石氏復盡内助用大其家子天禄中統初勸農司檄為屬官督邢民之不昬作勞者職卑而能盡其事一子即之芳親志未終者舉為之早以孝聞優游田里祚為太學生仕有日矣亦浩然歸養親治生雍雍如也噫人之生於世也時有否泰家有盛衰或斷嗣續或㪚四方世守邱壟王侯有所不獲聖人有不知其墓者況齊民乎李氏之塋滿近遷遷至再而不失其始可謂盛矣故系之云李本實蘩有植在邢不椔不翳支百其榮惟是深宮瑞慶攸并若泉盈科導之益清邇不紊叙遐不殊鄉松楸如雲鬱其相望嗟江之南忘親訹利遼或千里迷不再世峩峩堯峯綿綿來裔視此歌詩有永無替贈僉太常禮儀院事孟格圖公神道碑銘河間總管萬嘉閭貽書有壬曰先子太常公長千夫戍閩海而卒其不孝孤席世德致顯融旣䟽封矣辱知我深且樂銘人善者獨子爾逭不孝焯世德者子忍我拒哉有壬固樂銘人善而非能辭者也夙交最歡而相期以遠獨吾二人則是銘宜我屬也乃序而銘之序曰太常公諱孟格圖蒙古之凖台氏大父諱某國初以材武扈戰𨽻右手萬户駐廣平因家焉父諱呼遜驍勇善戰從討李璮身冐矢石俘七人詢知為所驅市人即釋歸使語其黨曰朝廷誅止首惡脅從㒺治無淪胥以亡賊聞者多解體鄂渚襄樊之役皆著功從攻廣西創劇不能甲遣子庫克楚代行戰死静江移師江右復遣其季黑山戰於洪又死焉平生百戰瘢殆被體而未嘗妄殺壽八十三而終以總管貴贈中順大夫同僉樞密院事上騎都尉追封范陽郡伯配欽察氏生庫克楚葉氏生公及黑山皆追封范陽郡君公勇肖僉樞先登陷敵視死不讋為大帥阿珠公噐重宋平以功授右衛親軍百户達嚕噶齊階敦武校尉佩銀符多致數善營造方築都城穿漕渠指畫督役人與其能納延之叛扈戰有功陞福州親軍千户達嚕噶齊階忠翊校尉佩金符戍興化軍民咸德之至大庚戌九月十二日卒於戍壽五十七明年二月葬廣平曲周縣闕之原贈武德將軍同知廣平路總管府事驍騎尉曲周縣子再贈中順大夫同僉樞密院事輕車都尉范陽郡伯三贈亞中大夫僉太常禮儀院事上輕車都尉追封范陽郡侯配欽察氏追封范陽郡大夫人二子長總管也起家山北照磨遂讓世爵於弟歴御史西臺中臺僉副各道同僉中政院事户部浙省正郎二茶漕入為户部侍郎改内宰尋除今官皆嘉議大夫所至有稱次諾海襲世爵以薦陞江浙行省都鎮撫樞密斷事官今鎮江上萬户達嚕噶齊階太中大夫孫男四人壽安永安定安寧安女六人托克托鼐額蘇掄索諾木適國子生旺扎勒巴哈延福提舉邁古岱爾太祝王敏行觀音努潤努庫庫楞未行女弟元努適右衛千户達嚕噶齊佛努生子海直登延祐辛酉進士第公束髮行伍累積戰勞至荷符節顯其先而開厥後兄弟皆殉國孑然養父竭力致樂在衛迎母就養以孝聞兄子閭馬女銕木倫教養而室家之雅尚儒術延名士以教其子故伯也以才諝亢厥宗仲也以篤慎世其禄流慶所及甥海直亦以科第顯嗚呼士子一登仕即捐其故習遑恤其後哉而教以鮮卑語事公卿為要道者在所不論也公出兠鍪而貽謀之方不以彼而以此其可訓也夫銘曰天造朔易材武惟家及常厥邑遂移於華强力攫攘挹波蹄涔導源詩書猶海之深子其佔畢我則服弭嗟我不及盍及我子朱幡隼旟實為甸侯崇居不寧恪乃聿脩䟽封范陽報若合符匪曰我能乃慶之餘宜爾後昆世濟其德永言孝思視此銘刻故資善大夫輔義公陳公神道碑銘輔義公安南陳公薨五十年猶子正議大夫清化府路宣撫使德潤以公菆漢陽城西馬湖地湫且隘購得善地於鳯棲山至元後戊寅十一月吉日遂更𦵏焉狀其行請曰先世父拔身安南竭誠内附世祖皇帝灼其忠藎爵以上公優以禄賜圖報未究天嗇其壽而又無子也銘其善使有聞不在德潤乎請旣切乃筆之曰安南昉見虞書漢唐皆郡邑之唐末為曲顥所據更數姓至李傳世差乆至龍翰不振為衆叛所圍出奔歸化江外戚陳勝與從弟審起鄉兵平亂龍翰復國勝以功官太尉審封快路侯龍翰卒子昊旵嗣以女昭聖妻勝子日照昊旵卒昭聖嗣位踰年遜位於其夫陳氏遂有國追號勝為大祖審為安國王審子肅敬為武道王武道娶程氏生三子長即公也諱秀嵈其國封文義侯世皇旣平雲南大帥烏蘭哈逹統師出邕桂道安南境將㑹大兵於鄂日照懼更名光昞納欵於我光昞卒子日烜不請自立召入覲以疾辭再召始遣從叔遺愛代朝制封遺愛安南國王命莊椿帥師送就國日烜不奉詔廢遺愛為庻人朝廷有事占城假道安南諭使給饟又不聽鎮南王以大軍壓境日烜守要害拒戰屢敗之王渡江受俘於其宮公昆弟請於武道曰聖元龍興萬國臣妾我家昧畏天之義抗拒王師與其覆宗社而靡爛其民孰若轉禍為福抱祭器以存先祀乎武道從之遂降進李女於王後生宗王日烜弟益稷亦率其屬降公奉父母北遷次邕州武道卒公從益稷入見封益稷為安南國王封公輔義公官資善大夫佩金虎符其屬授擢有差後復有事安南賜公弓矢從鎮南王還其國公以疾留來賔我師破羅城日烜遁王以暑潦班師公從歸子嘉議大夫義安府路宣撫使德漸卒於全州詔公居漢陽至元二十四年五月以疾卒享年闕娶田氏弟二人大巘其國封明誠侯娶黎氏生德潤嶑封明智侯皆先卒余聞昔人言交州多南金象犀其產皆竒怪而草木亦殊異疑陽德之炳燿獨發於是物而罕鍾乎人公生絶徼嗜學不減華人有萃山吟藁辭多悲壯豈非鍾陽德之炳燿者耶不獨詩也君子所以異於人者以其知天命而識時務也昔呂嘉相越逆命路博德率師進討身與越俱亡公所得視嘉不旣多矣乎然自出疆族黨凋落親殯未啟嗣子弗天故見於詩者其鳴不能不悲也苟有繼其志而述其事者其悲可以已矣德潤痛世父之無後而懼其無聞也卜厝有地顯揚有石植祠墓側省拜以時可謂猶子矣銘曰南交毓材有離其倫天誘其𠂻入為我臣何逺弗柔㸃蒼旣勒光炳効順有章其節爰及子烜乃敢不庭帝赫斯怒我師有征公其懿親謀也能淑匪亢厥宗實舉其覆帝曰咨汝汝公汝王居之漢濱以烝以嘗嗟嗟輔義甚禮而文踰越萬里流離一身胡導其來不昌其年孰啓孰完猶子有賢滔滔江漢鬱鬱松栢鳯棲之原永奠幽宅司獄杜君墓志銘先公在鄉校時獲拜緱山杜先生手録其詩挾之游江南有壬總角嘗受讀焉承乏參議中書先生曾孫秉彛實掾東曹先生薨有壬歸鄉里始納交秉彛父愚情誼尤篤至正壬午九月丙戌秉彛弟秉鈞卒於京師秉彛哭之幾絶哭已請曰吾弟公契家子也歸葬有日非公之銘則何以釋吾父之哀而灼吾弟之善乎有壬知其世為詳交其父又乆且深其誰宜銘秉鈞字德維安陽人曾大父諱瑛贈翰林學士追封魏郡公諡文獻緱山先生也大父諱處愿東昌路推官父愚以子貴封亞中大夫彰德路總管京兆郡侯母曹氏京兆郡夫人為人和易與物無競由世賞歴監當陞九品流官除彰德路司獄以眀恕聞春官辟為掾疾弗克赴命再下驛次涿州疾抵京謂其兄曰吾忍死見兄若可無恨然負吾翁矣醫療百至竟弗起得年四十二配林氏生子伴叔年十五卒繼師氏生女亦早卒弟四人秉直秉容秉一秉德嗚呼父母俱存兄弟無故一樂也父貴而壽康兄兩拜御史四僉司憲今中書左司都事為時聞人而君發軔敭歴駸駸繼踵矣孰謂天之可必者竟不可必耶壽夭命也仁者必有後理也今乃若是耶余之銘灼君之善矣其能己兄之慟乎兄之慟已矣其能己翁之慟乎若夫君之善灼矣則翁之慟可以已矣於是乎銘銘曰有材斯萌將以為棟楹植而揠楹㦳而傾曷慰其翁曷寧其兄太空𡨕㝠吾不得而名吾以為為杜氏子銘故朝請大夫山南湖北道提刑按察副使梁公神道碑銘黄嚴知州梁廷奉其祖考山南湖北道提刑按察副使公行實請曰先祖學積於躬孝聞於鄉忠著於官葬歴三紀而墓碑未刻敢告有壬辱與公同里閈聞長老稱公甚習竊有慕焉凡鄉先生一言一行固當搜攬掇拾為淑人計况銘公乎廷之請其敢辭公諱貞字幹臣彰德安陽人曾祖考諱立妣張氏祖諱滏妣石氏考諱璧善居貨客有持金鍍銀貿物者直以為銀斷視之乃金也追而歸之其信義類此少力學值金末弗克卒業而里行家法鄉閭是則嘗戒諸子曰學所以為人子為人臣也我生不辰有志不就汝軰能繼我志非特為孝子將不為忠臣乎公倡諸弟篤勵進修中統庚申大名宣撫使司推擇為左司知管明年轉中書左三部提控令史聞父疾六日馳千二百里至家已弗及毁瘠廬墓部符三至督起力請終制知不可奪乃檄郡加優典以勵風俗服闋授濟源縣尹始入境從者求田婦所負水飲馬婦難之公詰其故婦對地素艱水公曰吾無擾於民而馬先飲其水其可乃縱馬聽其所之馬前蹴地以待因識之旣視事鑿其地得泉甘冽民為立祠號梁公井境有濟瀆祠謁禱絡繹民罷於奔公毅然曰禱神而擾人奚福之有悉拒絶之貢尚醖米故事二政部輸郡以付公民勸公辯公曰就可福民何為而辭他邑以逋耗重責於民公獨挈贏以歸趙成訴虎食其牛乞蠲徭役公戚然曰令不善之所致也償其價未幾虎斃於叢祠敦本抑末禁姦戢暴力田務蠶條以諭之勸善懲惡箴以勉之立鄉校設師弟子員集孝弟節義等事使讀者有所興起三年間笞罰止二十七人蝗被河朔獨不入境歉周隣郡邑乃告豐文正許公兩薦公於朝時廷議治最者二人郡則衛輝陳侯縣則公也未終以疾去邑人思而紀之碑至元戊辰始立御史臺上御廣寒殿召拜監察御史官承事郎遇事輙言不事苛察不畏强禦凡建明平反彈擊皆犂然有當於人心者八年陞承務郎遙授中山府判官行河南等路行尚書省都事時有事襄樊贊謨給饟公力居多十一年授承直郎代州知州為治一視濟源而節目加詳司徒五教周禮六德六行之訓與夫先正格言家喻而户曉之勸農以豐衣食之本牧犧羊以助徭役之需引滹沱而磽瘠之地以饒正昏禮而論財之俗以革禁火葬而送終之禮以厚部使者薦剡沓上聲譽大振十四年擢奉議大夫江北淮東道提刑按副使行省有戾於法者未踰月而三劾之同列懷懼公處之裕如也十八年三月移山南湖北道階朝請大夫至是凡六轉官三以母老辭不允躬請行臺始克歸養二十二年太夫人史氏八十卒公旣免喪遂不出大德十一年九月六日終於正寢年七十有九十一月日祔郭村先塋弟桂楫梗樞配張氏先卒子男一莊女一適盖某孫男二長達早世次遷也女三曾孫男女若干有壬述公之行因有以見中統至元之治焉治不在法而在於人官不在地而在於行臺之始立慎簡至矣一令之賢廷見擢授非以素厯風紀而取也及其見諸事業猶輕車之就熟路何哉用得其人而人有其蓄隨其地措之爾公為御史治效已著乃出為行省底僚又三年始守一州又三年乃有淮東按察副使之命未聞以乆居朝廷為榮而亦未聞以風紀復官有司為辱也選格之通融士風之渾厚於此可見矣自今視昔豈不大枘鑿乎有壬傷今而思昔而又有疑於昔焉盛時多才固不乏用公喪母時年甫五十有七至其終也家居凡二十三年獨非遺賢乎使盡其用姑以休致為期則十餘年中其所施設不有倍蓰於已試六轉者乎然則廉頑敦薄於風俗蓋有補焉漏盡夜行亦有所警矣髙風勁節豈但儀範鄉里而已哉諸孫詵詵而遷方出守名郡慶源日浚矣銘曰相有孝子出為忠臣官而蹇蹇家而恂恂彼有捧檄匪親而躬聞呼走承强有弗從板蕩餘民禮義何居火親財婚田荒畜隳陳條具約三申五令爰格其心是曰予政九重面擢豸冠斯峩我行無事不暴不苛水能潤物豈局故地導之而行何往不利於邑於州或省或憲安其所遇有藴隨見惟是寸草欲報春暉爾不我從我惟有歸昔翁不及母豈容再怡愉考終生死禮備人生此世此外何物悠悠素心皎皎空谷侯樵侯漁雍容二紀世豈忘公天實成美我思君子志一時殊朂哉後昆世德其符至正集卷五十六
