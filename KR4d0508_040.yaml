body:
  text: 至正集卷四十元許有壬撰記五峯院記襄垣東北六十里山曰五峯巖岫深窈環拱可畫天朝丙申嵗僧道顏遊歷憩此目擊清勝慨然屋之因山而名焉法喜嗣居席舊無廢至政昌者遂侈其院而有加焉纍資峙糧撤弊搆新殿寢渠渠采絢焜煌金像潔新從神有位翼舍翬飛講筵靚深長廊結砌雨不泥屨齋厨廩庫百器皆備里社為之改觀因其邑人從余學者張䂮來請記夫釋氏為宏潤勝大之言以誘勸愚俗者非一而其徒尤長於侈屋蓋其設心之專強厲堅忍死復有繼故其成也不例人之所難且車廬冶栗韗雕陶范以辨民器工之事也畎畝樹藝磽腴雜殖以長地財農之職也廢舉懋遷通異待無以資人用商之為也是三者莫不盡力殫苦以衣其寒以飯其飢至於五畝之宅一廛之居晝茅夕綯勤劬備至而後有以僅庇風雨其傭隟共藩而居者又不知其幾人也今夫深山大澤人迹逈絶之地或巉巖峭立或洲渚浮出緇衣一顧曽未嵗月而巍巍千楹湧出於地豈所謂佛者果有以隂相之耶將倥侗顓蒙求欲如志而甘其誘耶抑設心之專有以成之耶佛之相吾不知以彼之求合吾之專屋不足侈矣吾聞世有偷容避役酗酒貪縱者雖棘生蓮産溜漫佛面而蔑不加恤政昌渾然其質而能有為如此蓋所謂設心之專而能成其事者也即其人書其實可無取乎曰政升政昊皆其徒也文明者又政昌之嗣云藝窗記瀏陽山水深秀實最潭屬文風士氣又軋湘部齊民工巧亦他郡莫及余早獲友其傑詢凡遊者遂習於聞卜君瑞卿世居七寶峰擅溪山之勝請記其室曰藝窗者士藏修一室已足固無事觀美也力苟可及清潔靚深非過也然一室帡幪不有開明晝且如夕窗有取焉故曰窗聰也於內見外之聰明也藝香草也何居乎其以香草之名其窗乎古人有圭竇甕牖束於貧也綾綺連錢訹於華也瑞卿華不至侈貧不至陋而託義又有比焉騷則留夷揭車申椒辟芷之屬昭其臭也藝兼用焉漢種蘭臺石室書府取其辟蠧也晉室乾八畦則獨取其臭爾瑞卿將取其臭乎抑取其用乎余因有以鬯君之學矣夫一室取明窗其地也一身取明心其窗焉衆緒紛紜而見於前萬事酬酢而出於中涵養不素則見有不蔽而出有不窒乎瑞卿觀乎窗必有以求諸心觀乎藝則不獨美其臭又將致辟蠧之用焉君之學於是周已雖然蠧書蠧之小者也聖人正學百家蠧之天民良知二氏蠧之生人膏血貪吏蠧之天下紀綱姦邪蠧之是皆藝窗讀書日所講求者也士一日出而用世亦思所以辟此乎瑞卿出五代司徒天倪後族至千餘家世多顯人余不獲考其譜而知乃遠祖在孔門四科者其思學之又將八面其窗伺萬物之蠧而辟之焉語非其職以過髙難行豫其悖哉為學者設也學舍是非學也尚勉之哉竹軒記士生世析圭儋爵獲攄厥藴至於晚節進退所以收幼壯之成功者尤不可不慎也禮大夫七十而致仕蓋憫其勞久力憊不敢煩以政士難進易退義苟當去浩然莫留各盡其道矣亷恥不張乃有膠榮而諱耄者其愈下者羅列選籍僥幸萬一於是有司逆計仕年大書其籍曰致仕至有廷辨謂筆吏考録之誤者風俗至是果孰使之然哉昔叨左司宰相稱吾鄉續公景明之賢擢禮部員外郎尋升懷慶路總管至則值嵗大飢勸分不足發公廩以賑國制粟弊無上文毫粒不出乃謂僚佐之尼者曰吾任牧寄俟得請皆餓莩矣有責願獨坐又止其租稅報下皆允天厯初郡直兵衝飛挽萬計軍興不乏西兵入境官吏星奔獨守境土遏流竄兵罷吏民既安堵即投紱歸而身未衰年未及也至順壬申以嘉議大夫禮部尚書致仕闢齋所居植竹數本扁曰竹軒竹之為植冰霜凌虐而色不改凡卉雕盡而守益堅有節若是故君子貴之人平居氣溢志驕才少摧抑隕穫殆盡遇變而不失其守者鮮矣尚書掾左曹已有聲若司程綺源覆實儀曹之剸繁知陵州之善政人能道之若夫遇變而不失其守時可安享而勇棄之則進退之際明矣嗟夫富貴多憂之資也世途設險之穽也道義不明而能保始終無悔吝者幾希鐘鳴漏盡而不止行百里躓九十者接迹焉則身未衰年未及而退者不賢能之乎然世有以官為家退無所於歸者尚書退有歸守先壟課子書又天厚其生而成其志也竹之稱古今實繁獨以其節有類故樂記之以為魯多君子之徵焉絅齋記古人不作無益几杖有銘寓戒也况施於身者乎士名而字後復益以號沿昔泛今汗漫一軌卒不能已取不悖理而已矣昔有名德俱盛門人後世名若慢之字若等之即其山川若名位而稱之己不自號而人號之也其取號者取諸山川指實也從而飾之務竒也説以自暴玩世也擇義可訓揭之室堂者自朂也號而擇義可訓以自朂者殆庶幾乎北庭納琳布哈登上弟倅潭之湘隂以字文燦乃扁所居曰絅齋雖不自號而人實號之矣於是請文以記君質美而濟以文年少而華以官燁如其光赫如其聲吾懼其外而不知其內也觀其所澤喜為之説曰易稱美在其中而暢於四肢發於事業又曰剛健篤實光輝日新其德則是未始不欲著也子思中庸末章言無聲無臭之極功六引詩而首以衣錦尚絅繼以惡其文之著也發之豈故欲蔽其光輝而立為異説哉誠以學為己者力求諸心知不知在人人所不知而能鎮之人所共知而能晦之猶衣錦之美雖有蔽之而文采日章非故蔽其光輝也致力於內不暇於外爾致飾於外而無以繼絺繢炫耀內實緼敝此君子小人之分內與外之間也吾聞君之為政也刋其華而力於實泯其迹而慎於行法公乎心惠及乎人上官不知不恤也其有得於絅之義乎彼中貪而外亷行悍而示慈釣聲名汲汲若不及究其實蓋漠如也夫珠在淵而川媚玉在石而山輝吾又懼君之實不能掩聞乎時而暴於天下將不滯於一州矣雖然此特末也君以經學起家絅之大者當自知之吾不敢贅言雲莊記至治辛酉有壬佐天官幕交一時達官竊置淑慝胸中當橫流奔衝瀾倒風靡而工部尚書約公正德人獨以不倚稱之俄除福建閩海道肅政廉訪使有壬同時為南臺監察御史由是契濶至順壬申有壬有事先塋正德由河南省參知政事改西臺侍御史以昔嘗二守吾郡因僦居焉馹請再三竟以疾辭居相去十里許過輒窮日不相舍於是知昔之所知才十之一二爾所居圖書不去手讀二氏書而擷其要援筆戲作山水畫圖遂臻其妙人終身功力旬月盡之嘗謂余曰斯土吾雖樂而無由為經久計房山金奉先縣山川明秀明昌間為清暑地北瞰居庸嶄絶雄偉西則太行如畫中多古剎琳宇在畿甸之內而窈然霄壤之異也邑南二里清泉縈抱林木果蔬土沃景勝豫結廬其間有田有圃時時出遊歸馬上望吾廬杳靄隱見在白雲中千態萬狀不可形喻而豫心若有所得因名曰雲莊將為莵裘也子其記之子復之曰雲之説有二悠悠太空自捲自舒邈乎無心者浮雲也視富貴不義者取焉起膚寸而雨天下回生意於枯稿者雲之用也不知正德視富貴如浮雲乎抑將自膚寸而雨天下乎正德世出貴胄鄂摩氏歷三臺御史十七轉為今官年方強仕雖恬淡樂間而世方急賢如渴望油然而作者不得辭也他日斂功而歸撫蒼松臨清流乘白雲而徜徘乎山林房山之英必不敢言欺我雲壑正德曰余所以取名於雲者為山中之景物爾二説余皆不知也豫曰知不知在公姑記其槩俟他日驗之存心齋記士為學一於己人不與焉至於處不順之際則學力淺深從可見矣夫不順之來其處之也有漠如浮雲倐如飄風泯然若不見而不聞者或實怠缺亦罔自反委物我混是非流而為荒唐寂滅之學為已者固如是乎復有致力容忍如飢禁食如砭受楚堅制不動而悻悻者故在又若懲忿而實非也欲去二弊莫若師孟子以仁存心以禮存心愛敬此施效驗佊著橫逆之至自反再三內省不疚在人者吾何與焉尚論古之犯而不校者顔子其成德乎若婁師德之唾面不拭不幾於矯乎呂蒙正不問毁者姓名以為一知則終身不能忘是不能消融以理畏避有聞寧不知之為愈也或一知之胸中之芥蒂將不復可釋矣不知孟子處之有至善之道焉廬陵王務先君子人也他郡知其賢以禮邀致館而師之先廬在鄉里為里豪所吞歸則舉室皇皇别購隟地盡瘁經葺始有以庇風雨即東室為遊息所托孟子處橫逆之旨揭以存心俾余發其概竊惟士為學觀孟子反覆之精密一有不盡謂吾仁吾禮若是足矣則橫逆為患非不幸也宜也則是舉妄人而施諸身也務先之自反審矣尚慮其悻悻者在未能渙然而釋也務先曰余每懷舊物不能不為之痛心鬱悒固若悻悻者在循名惟義所以自釋也又恐用力者有不至旦夕顧瞻而致察焉又所以自勉也豫曰不能不鬱悒者人之情也顧瞻而致察焉自反再三之謂也務先其善學孟子者乎彼蒙於忿欲者聞之獨無開明之時乎則其悔悟而反璧也有日矣務先則劉凝之乎為沈麟士乎豫又以是驗務先之學力焉記畫長安劉子允蓄古畫一軸女冠有承頥而行者持便面者簪者褰者手見者袖者而六人之冠三有冒焉道士肅迎者二人筐篚盤盂杯壺烓銚之屬錯列俎上下俎端據質而切者一人傍有􅋙顧不去袒割而回視者一人扶而挹者二人黃袍若王者持杯中坐一道士捋鬚坐王之左脫冠以簪搔者一人裸撫掌者一人坦腹而笛者一人捽僧耳飲之者二人杖而立者一人跣而舞者一人手籠餅來者一人一人蹲而杓飲於前一人袒踞促索其後一人袒跣而掩臯比一僧嚙杯而舞坐王右者一僧羯鼓一僧執拍道士掖琴俯坐者一人左杯右筯者一人露頂右袒跏趺而飲者一人加以冠且擁使引滿者一人坐而攫其肘者一人袒而阮者一人了而據地假寐者一人卧而曵之使起者二人醉乘騾足加其鬛者一人騾嗅糞不前持鞭而牽者一人乘牛者一人徒而扶者各一人執鞭而欲爭者一人牽􅐒而止其爭者一人女子垂髻攝衣奮欲鬬執鞭者一人女冠引其臂止之者一人立觀者一人負醉女携墮履後捧其足者乂三人為人五十王居其一僧四女人十二餘皆世所謂道士惟杖立者少異焉地無宮室臺榭茵半虎豹飲食之具六十有七與夫一木一石皆盡其妙余見而訝之知其為良工筆而不知其為何人持以叩人亦莫有能名者昔荒煬與僧尼道士女冠連席酣宴靡所不至煬不足譏也此何王也異端之徒滿前極諸醜褻威儀之喪乃至於是視舍坐號呶憣憣怭怭者又什百千萬矣古豈真有是耶抑畫師善戲而為之耶余病不博覽無從考識因思京師舊俗鬻扇畫事率隱僻相勝有十識其八者得一扇豫時少年意謂但不屑往爾往當日有得也由今觀之幸昔不往往未必有得也畫歸之劉記其概以俟博識者問焉德齋記吾鄉老成云逝繩武有待投劾歸思見其人而多病却掃交接未洽其居密邇而隱居教授者得陸君仲容焉仲容為人靜而專授徒草年不改業名齋以德請記於豫余固嘉其靜專及見其扁又知其為為己者也乃語之曰儒先訓德有二其曰得乎天而虛靈不昧具衆理應萬事者言德之本然也其曰德之為言得也行道而有得於心者修為以復其德者也德之本然唯聖人為能修為以復則學者事也之名也其有取修為以復者乎吾為子究言之天下之達道五所以行之者三蓋五典天之所敘雖天下古今之所共由然非其智無以知此也非仁無以體此也非勇無以強此也知而能體體而能強則五典之道各得其理矣是理也天之所以與我我所以為德者故曰行道而有得於心且得者失之反也得於心而不失乃為真得日一至月一至造其域而不能久謂之有得可乎雖然又不可躐等求也而有序焉學弗能力弗篤而弗措也此之謂進德一簣之覆以階九仭此之謂積德充實光輝而暢於四肢發於事業此之謂成德德之時用大矣哉仲容進而積積而至於成成而見於用而後為無負於名齋之意仲容勉乎哉至正集卷四十
