body:
  text: 至正集卷三元許有壬撰古詩代祀壽寧宫二首昊穹儆脩徳迪畏嚴宸衷薌幣亟將敬於焉達帝聰錬師功有素精誠假潛通通明闢晃蕩霞光破㝠濛羲娥叱順軌敢爾好雨風感民詛作頌轉嵗凶為豐天子謙不有㝠㝠歸太空上京據髙寒三伏凜毛骨况在虚皇壇當空掛明月沈沈清虛府練練水晶闕一𤣥但自守六合遂生白露冷簫聲脆風急旛影掣祝釐肅將命承乏愧調燮醮罷不成眠歌詩山石裂拜醮疲甚有感代祀踐真境愜心逺囂塵神仙足官府乃與人間均陟降堂復陛拜伏昏達晨熏焚竟三日疲痛叢一身嘗聞古有訓至諴能感神我身苟先憊我誠何由伸𤣥門守恒式損益誰為陳君恩大如天欲報嗟無因微勞敢有辭丕應庶可臻封香侑𤣥纁肅肅來紫宸堅心自格天真機寧假人叶氣回洪鈞時雍變黎民萬物遂生生萬拜甘踆踆午睡退食半日閒嬾與困相值强取床頭書披觀欲敺睡豈知睡有魔方冊乃所萃一卷閲未終瞠目遽有閉支頥始排遣脱腕旋擲置鼔勇時起行稍縦即如醉抗敵慙不武隠几聊曲臂儵焉溺愈深就枕遂成寐南柯在何許一造乃徑至憂樂忽兩忘得失混一致幾年事朝謁雞聲坐憔悴白髮身漸衰彤闈事多愧誰能羲皇上祗益宰予罪安肆日以偷居然氣勝志希夷心有託文過敢援例朽木糞土墻斯語今請事和虞伯生學士壁間韻在公抱隠憂出塞得奇觀青山萬馬奔龍門忽中斷地平豁四維天濶張一幔寄語鳴笳兒休驚暮鴻散病起漫述南烹習若性出塞勉隨俗老饕不慎口藏神畏多肉流歠引羱杯馬湩注盈腹河魚巧伺人乗間得肆酷暝作遂達曙腸雷殷空谷三日不能朝一餐惟可粥中年體易虛攬鏡笑窅目今朝氣漸蘇鼔勇出衾褥翰墨試短吟經史時卧讀朋來酒入務清話慰幽獨嗟予未聞道結髪事千禄素餐古有譏伴食今不恧士貴早知止聖許不逺復歸哉復歸哉瓦盂安脱粟養馬户次同年馬伯庸中丞韻時盡奪驛地馬户益窘盛冬裘無完豐嵗食不足為民籍占驛馬骨猶我骨束芻與斗菽皆自血汗出才釋鷹師鞍又服梵子轂邊聲或𤣥象去馬便可哭朝廷播政令黎庶供力役生兒甘作奴養馬願飼粟源源急星火金符出黄屋譬舟苟使覆載物其能淑百年具成規受他貧敢鬻粟麥被陽阪黍穄滿寒谷圃蔬接畛青樹果屯雲黑一朝化榛莽坐使歌成泣我身非土梗我馬非鐵石餬口有四方従渠安傳食宿臨湘贈監縣亦誠之北風櫓聲乾晚泊斷磯下雲岫浮脩蛾霜空入平野鳴鴈無處尋落日不可畫重岡護巖邑百里寄民社籍甚賢大夫居然魯恭化豐年足粳稻沃壤滿桑柘我如無心雲底事勞候迓爛醉得詩歸江山非傳舎題喬江書院朱張挹洙泗一滴沾澬湘源逺流不沱導之日以長黄子鼔勇出大川獨力航忍貧如鐵石悦道逾膏粱乃眷作人地舉仆菜其荒萬簣陻偃瀦數仞瞻宫墻銖積至山岳拮据十五霜為善名莫逃飛剡達廟堂署額等四院職教尊一鄉衿佩來濟濟絃誦聞洋洋遂令錐刀子薰徳皆善良食焉怠其事視此背負芒便當伐樂石紀功大書黄且以勗後承且以風四方湖南憲照磨王魯琦孝行用同年歐陽原功學士韻悠悠孤飛雲混混東逝水倏焉漠無迹何以親棄子出門事鉛槧附耳承音㫖時雖有行役猶得賦陟屺三釜何嗟及九原竟不起滄海拓土遲春暉寸莛靃表桓樹風聲天下資孝理平生幾多淚盡用洒蒿里發硎試妙割解衣睨衆史清芬播魯甸脩程肇南紀執法樹有烏宗廟彞有蜼揚顯更勗哉孝子事終矣題龍處厚所藏子昂畫馬并書杜工部詩書具畫原柢畫寓書象形詩於二者間神功毒而亭工詩豈暇畫能畫書或拙獨有鄭伏䖍當時號三絶湖州松雪翁清風玉堂仙三事各臻妙前身是伏䖍世知公書畫不知詩更雅時還寫杜詩千金莫酬價天厯初布尼雅實哩子謙以翰林學士承詔禱雨關中有應虞伯生學士作詩序子謙監湖南憲求詩皇威鋤䦧梗宇宙如再春關中號土膏其膏乃遽屯化為彌天魃毒燄煽西秦父且食其子天時獮吾民弱斃積京觀强奔劇驚麇九重動惻惻羣望驅踆踆膚使著脩潔御命出紫宸家人不暇辭一鞭清渭濱肅肅將淵衷憲憲孚嶽神靈湫素有物雲霧生逡巡甘澍被隴陜宿種爭青新窮鄉轉樂土蔽野開天囷歸來拜天子小臣事已竣乃知是為霖眷注邁等倫四道使持節冰霜照清真何當推厚澤汪濊周九垠題周元玉小像之子身輦轂思翁在山林畫圖記真趣茅屋老樹陰北山可娛目曲江可洗心攜従無長物萬事一張琴勿輕三尺桐中有太古音俗耳不解聽野猿時共吟甫云避俗駕穿雲深復深我欲問天籟翁其何處尋贈吳青陽氣在天地間正則能勝邪古人傳祝由末路攻蹈瑕亦惟有道者擷實刋其花札瘥乃莫干祅厲况敢加融為一脈春生生此萌芽是曰青陽子錫汝名維嘉曾桑流暖雲東天亂晴霞神仙謝禬禳蓬萊子其家游岳麓書院登風雩亭尋朱張遺躅用疎齋盧先生韻聖去書巋然道近人逺而蕪穢亦已闢倀倀曷従之大原出自天挹彼可注兹兹山昔受度㑹遇休明時朱張操大舟涉海示我湄孰云事游宴岡巒肅威儀行行惜芳草我馬不敢馳百泉流𤣥酒萬古供尊彞􅊱然發深省豈不豐我遺㸃爾見大意風雩本無為嗟哉二三子長育駢其椅其椅君勿輕庸立丕丕基泊樊田浦與楊廷鎮董仲達馬明初黎仲顒以澄江淨如練為韻賦詩分得如字幽討愜觀物遐心陋懐居衡湘佳遨遊乃是三月初泝洄既有舟登陟亦有車東風動槖籥生意彌堪輿望望滿花栁欣欣到樵漁嚶嚶鳴好鳥洋洋躍潛魚感觸悟妙趣江山豈蘧廬佳人一樽酒登鮭紛腊腒詩荒甚從獸萬里為周阹懐哉淵明語不樂復何如三月三日偕廷鎮何復初仲達明初仲顒諸君淨居巖流觴以崇山峻嶺茂林脩竹為韻賦詩分得脩字過雨發清朗惠風扇和柔薄言衡山來禊事兹焉脩淨居古洞天林壑阻且幽翼然有危構篆石分清流懸鞍出椰觴汎汎如楊舟注視幸瞥逝驚呼或夷猶我生本無心何事非天謀佳節適我遇勝地復我留雜遝來羣賢顧瞻隘九州于以雪滯慮于以資㝠搜但恐俯仰間陳迹不可求誰能更校此且復隨觥籌題王季卿蘭石用伯生韻猗猗九畹蘭鑿鑿一卷石石也無俗狀蘭兮有佳色停雲渺予望相思隔南國春風汎崇光秋雨漬寒碧三生老毛穎談笑出香澤此兄儼在旁拜爾吾不惜尚友誰同異守𤣥類堅白山林深復深誰哉發潛徳題廖氏青山流水之間亭泠泠澗下水巖巖天際山得一已足娛况在二者間動靜悟至妙樵漁濟幽閒莫謂獨樂園青雲杳難攀衡山回廷鎮送予至湘潭而歸緑紅専伻寄詩卄韻和以謝之老夢熟湘楚時時到南山一朝乞身歸飛墮紫翠間危搆矗鐵壁懸瀑分銀灣朝才發琳宇夜復栖禪關直造祝融頂歌呼破天慳靡靡薄月窟纍纍俯烟鬟窮幽不憚險重趼寧辭艱上及天八重下視海九環羣峯各爭奇信美無與班酒酣一縱目山鬼無容姦乃知天地間陋哉此人寰佳人山中仙七十猶童顔投杖拾雲磴躡屩披霜菅毒龍呪可降哀猿泪不澘勝游冠平生及此俱投門百卉閙淑景萬壑鳴清溪當年看圖畫何殊管窺斑云胡山下來便駕扁舟還悠悠湘潭雲回首去莫攀珎重二百言人間豈容删贈談命廖如川憸人不知天富貴矜自有顔含真達者性命立分剖頗訝昌黎公百代仰山斗云何銘虚中宛轉為滕口乃知窮壤間至理不容蔀之子得所傳摘異出淵藪觀物隱市廛萬事一揮手我方杜門坐懍懍日思咎君來諭以理端緒解紛糅誇嚴敢厚誣居易甘墨守酧君雖無䝪澹泊自相受他年黄鵠山談𤣥期白首觀髙竹樓太祝栽松竹栽松長及脛移竹萌附鞭竹生可坐待松長知幾年人生誰滿百枯榮遞推遷云何守毫末欲見髙參天大史十年計愚公曾復𤣥充器非梓漆佳城䕶封烟封殖逺樵牧邱山為增妍他日君倦游拂袖歸林泉風聲聽蕭瑟午陰坐清圓可憐桓司馬撫樹應華顛游髙武肅公祠其孫箴竹樓請賦青山去我屋相望三十里平生丘壑想圖障見亦喜深居忽涉嵗命駕行復柅一朝跨欵段徑造莫吾椅維時春始和風日助清美况有武肅祠松篁清邐迤後連不盡岡前渟有源水當年宋火熄天兵混文軌廣武號知兵終見墟趙壘従知大厦傾一木本徒爾投戈活遺黎綸綍豐碑記諸郎各膚敏腰犀間金紫桂叢連夜臺蘭孫萃繁祉太室侍祠歸追封及先妣喬木固多陰髙門真有子憶昔弱冠初泓穎實同几爾來三十年此㑹誰敢擬登覽何足云世美見橋梓願言播清塵家乗掇已燬當筆無我名為君脩野史和丁文苑同年同游漢陽韻武昌黄鶴樓勢欲吞沔州沔亦有秋興萬景遙相繆我思較二勝幽齋坐窮秋相攜得勇往兩袖風蕭颼空明盡纎芥中流放扁舟行窩更不凡南湖頻夜投張弛各有適齷齪徒增憂諸公酷愛客我醉聊乗流方外有青山人間多白頭東華塵土夢今日喚醒不題熊堯章擊壤同聲集放勲昔御極蕩蕩民無名如何擊壤老乃有歌謠聲聖徳大如天春生秋自成耕田與鑿井爾力吾何營康衢順帝則知識嗟已呈後來寂無聞所聞多不平聖朝復隆治萬彚遂厥生有人囿大和不屑軒冕榮自同擊壤老歌詠流鏗鍧𤣥酒陋糟粕至樂希韶韺古詩本情性世降體屢更能知發所樂天機自縦横世有采詩官君詩其大行和彭道原苦熱大暑真酷吏煩虐非所當乾坤舉為爐江河沸如湯區區晚學道自信冰雪腸一朝走畏途故山空草堂乃於尋丈地守株待微涼扇揮腕欲脱汗浹背負芒毛穎枯不神雲烟失淋浪紺天頑無風歊氛恣飛揚田野勢欲盡妖魃猶専場當年崐崙丘嶻嶭冰天長倦飛一戢羽夢寐時在傍回首望玉清岧嶤白雲鄉靜躁固不同寒暄亦何常蓬萊水清淺欲往愁褰裳秋風明日至却恐露為霜題澹然監司畫二首人間望明月似有山河影自非毫素真觀天機作井一峯倚空閒下浸溪雲冷良工乃爾豪尺許容萬景惟是澹然翁相看發深省真龍不受羈飛縻看騰踔千里自在心秋風寒垣道蒙莊得其天伯樂非取貎鹽車際遇難駑驥遂俱老所以澹然翁驪黄都不挍神龍卧沙圖去年旱太甚深蟄如不知江淮今盡水行雨無乃疲悄悄欲一問昧昧何従追明窓忽展卷晴沙照鱗鬐烟雲洲渚深五色驚陸離淵潛亦有地天飛豈無期胡為此局促獱獺爭相嗤清波咫尺間投足誰轉之自計彼方爾責望人其癡㑹有變化日良工不吾欺獨石和姚子中參政壁間韻北征日見山羈懐殊不惡凉飇生兩腋鳴泉清八鑿一卷突虛空大地貫脈絡維時霖雨行平埜注為壑特立看奔衝千秋壯沙漠彭蠡有大孤天星幾時落遙遙阻幽遐屹屹氣相若翠華嵗清暑挍勝誰敢謔效米欲拜兄時人定余噱題黄珏玉成字説後五瑞慎頒爵六器嚴禮天彼美乃有雙藏輝未渠宣恥為璞獻楚寧隨石名燕一朝遇雕琢百世無棄捐純淪固自若隨用非拘偏取言敢溢美奇實當共全勿云鮮不垢亦有垢爾鮮勿云堅不蹙亦有蹙爾堅洞洞劇奉盈兢兢戒臨淵惟是器已成操持尤勉旃李伯徵中丞奉東宫命作椎結請紀其故以百字頌而祝之總角習義方結髮事明主櫛縰豸且貂勤勞幾寒暑青皇一顧中遂與國人伍區别垂鬒雲岐分戢鴉羽昔我秋谷云爬搔淨寰宇象賢實無愧冠服儼前矩願言壽而康三握勿為苦它年麟閣上雪鬢照簪組何用拭肝石道貴隨所處老我任飛蓬謌詩美繩武至正集卷三
