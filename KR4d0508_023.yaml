  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0508_WYG_023-1a, image: WYG1211/WYG1211-0168c.png}
body:
  text: 至正集卷二十三元許有壬撰絶句題理宗御書中原榛莽日南國宴安時可惜揮毫處都忘采芑詩鵰窩驛次伯庸韻二首華髮憐于役青山笑不歸有詩留傳舍無杖叩巖扉中年愁遠涉出户即思歸驛路夜鞭馬家山晝掩扉分臺多暇戲書都事李雲卿案二首事簡心常靜簾垂日正長東窗高卧起來受北窗涼北來天地闊南望道途長塞草迢迢夢庭餘葉葉涼題蘇李泣别圖和謝敬德韻二首死節吾已矣生還又不如天王非太忍臣罪不勝誅親友生别去子復棄遐荒只道還家好還家恨更長次伯生韻二首齒髮年年改風霜日日寒誰知台輔客恰似廣文官酒腸時一熱詩骨自多寒智不如樗里文猶可稗官題姚子中墨竹為巴延清卿監司賦二首冷印枝枝月清含葉葉秋斯人有高節同在鳯池幽香雪寒不飛琅玕濕晴碧化筆足清風蒼生待蘇息管幼安濯足圖吾欲髠歆髮織作幼安履復憂穢賢足遂及遼東水息齊墨竹竹仙骨已蛻遺墨宛如新明月秋無價清風世有人次李沁州所寄韻八首陽光彌六合螢燐若為功頗喜烏衣吏朝朝報獄空繆拙遭明世涓埃竟莫增自盟惟一語休負十年燈皇恩大無外庸瑣悉爬羅好竭方剛力年光馬注坡量力慙叨祿懷家倦倚樓君恩如少報未老亦歸休銅鞮古名地靡曼滿城中還似當年否吾將賦惱公填臆愁無迹傳家貧有胎羈懷多少事晤語遲公來地寒饒寂寞桃李雨聲中莫為妍華惜山川有涸童紛紛椔翳輩初亦識春風寄與迷途子康莊處處通又次前韻窮豈詩為祟愁須酒策功雨來雲氣重花落鳥聲空安分貧猶富持身損是增卑官無長物風雨短檠燈編簡蟬空蠧門庭雀可羅松醪今日熟一笑酹東坡聨第陪鴻彥蜚英達鳯樓只將堅白志萬一答天休聞道幽居好遼山紫翠中返來猿與鶴頗怨主人公佳句不易得蠙蛛出蚌胎吾方信吾壘專待短兵來學道當無倦拳拳百嵗中彭殤君莫較天實壽終童思君不可見更忍障南風幸假詩筒便佳音得屢通逆風挽舟竟日才一舍而止二首人力已疲極飛廉有底狂老天相補報却作一霄涼一勺平安水翻成灔澦堆十夫牽不止姑坐待風回水是吾鄉水四首水是吾鄉水漳洹會一流如何容易去似我昔年遊水是吾鄉水洹清漳自渾去鄉無百里何事混吾洹水是吾鄉水泥沙不可烹洹溪明日至親為汲深清水是吾鄉水初非有愛憎漳流本雄偉我自别淄澠夜深酒渴光遠掃蓬雪沃崖蜜見餉此時此味世無有也作二十字謝之虀酸何足傳茶苦謾勞烹誰浣文園渴醍醐灌碎瓊醉中書江樓壁湘山春欲暮湘水清可涉佳人不我留歸帆動新月待泮昔聞輪生角今見舟在陸安得昆吾刀碎此一川玉次同年丁文苑韻四首花島晴雲不捲栁堤歸路都忘夢裡青帘搖曳柴門半掩斜陽長日惟閒最覺清風與睡相宜竹靜不教塵到洞深惟有雲知籬下幾叢黃菊樓頭四面青山最是夜蘭清絶澗泉和月潺潺樽俎霜餘登橘杖藜月下觀梅恰好山中酒熟先生政賦歸來黃葵長生殿裡仙子華陽宫中女師淡淡鵝黃衫子深深鴨緑裙兒贈歌者文林燕用魯子翬韻飛遍人間華屋來依天上瓊林任蹴舞筵花落休教緑葉成隂九日書原功壁重陽有菊無酒塵世多忙少閒京國年年白髮湘江處處青山題木唐卿旌表孝義卷唐卿西域人橋梓天殊棣有華良心初不間幽遐何年四海無旌表盡化忠臣孝子家子昻竹石老樹圖嫩篁烟潤翠扶踈老樹枝殘影似無下有石兄都不問四時堅坐看榮枯唐三學士奕棋圖褚亮蘇世長蔡允恭瀛洲花滿接雲霄盛世閒多早退朝喪亂歸來得真主忍將長日用碁消題鄭裕卿僉事黎花錦鳩圖雲月空明小院春粉香清拂錦衣新莫教喚起一天雨寂寞玉容如太真黃州烏監郡勤政堂惜因千古有良規一息因循事便隳厚養飽餘君試看索綯須是最閒時題韓國儀圖譜億之後也當時稱桐樹韓家以别相州韓國儀今居豫章東湖宋朝文獻跨隆古美盛更推韓世家斷簡一編三百載東湖桐樹又能華游青山晚坐水濱水光山影畫屏開萬樹斜陽兩岸苔獨坐魚矼觀月上撲天飛雪鷺鷀來和南谷平章題吕公亭韻四海茫茫一劔飛何年游戲漫留詩多應黃鶴樓前月曾見御風歸去時琳宫詞次安南王韻十首流雲洞闢列仙朝飛佩聲寒下紫霄天上豈知鳬是鴈人間虛說鵲成橋閬苑春多不惜春萬年風物一般新可憐塵土藍田路亦有區區種玉人雲窗留月曙光微瑶草含風露未晞却笑天台容俗客桃花零落又春歸涼入簾幃夜色輕瑶臺添月更虛明一壺天地渾無迹只有清風動竹聲通明殿曉侍熏爐還駕扶搖返故都風景便宜收拾取莫教滄海有遺珠山林活計只餐霞世事茫茫日自斜謫到玉堂無好况夜深猶草侍中麻人人開口說𤣥關翻使身心兩不閒老子年來惟解睡從教海上有仙山千金休買失船壺汲挽知須幾轆轤昨夜山房新釀熟一瓢和月泛雲腴神山雲矗碧天齊滄海如杯太華低非是眼高空八表世間何物不醯雞松筠扶翠護危樓涌出清寒萬斛秋回老乘風無覔處碧天如水自悠悠題趙秉彛所藏墨竹冷雲香霧濕霏霏翠影浮空晝欲迷何處秋聲最瀟灑玉堂風月鳯曾棲洞賓像為秉彛作三山引去幾萬里道在眼前人不知雲海從公定何日秋風先染鬢成絲織錦回文圖明珠金縷爛縈回香玉連環翦不開不把肺肝都織出將軍惟識趙陽臺春日漫興竹几團蒲懶最宜不知花影隔窗移鄰翁忽報小甕熟老子坐忘成坐馳玉關臨商德符山水商家滇蜀得山時心與山逢手豈知兔起鶻來君試看不從商學有餘師一犂春雨圖素餐無補合歸休但願人間嵗有秋昨夜東風能事畢三時消盡百年憂汝南郭晦夫割塋傍地為祭田有譏其非古者豫為解之亦取其不得已也猶僅可之意後世有伐塋內荆榛為爨燎之需而自給者視晦夫益遠矣古制圭田墮渺茫有家隆替亦何常孝誠未暇論多事一片秋風黍稷香和繼學南歸至鄂韻二首梅花零落柳條青人在孤篷月在汀明日瑣窗春夢覺祇應乾鵲擅多靈達人去就一毫輕看遍江湘眼倍明䕫府惠州詩有樣朱崖應是不虛行賞心亭賞心亭上雙柏樹看我往來今十年柏樹青青宛如昔當時游子已華巔蛾眉亭一代無詩萬象塵江山消得謫仙人騎鯨一去不復返空使雙蛾萬古顰昭明太子廟一編和璧間南金鼓動唐人著録心韓筆不推三代上六經事業幾銷塵鄱陽即事二首蠲稅輸金冀不苛永蛇為害更加多打門悍吏如狼虎銷盡鐶叉有幾何禁弛池湖恤困窮小罾敝笱若為功攔江數罟橫千尺却被豪家一舉空李正德御史分行廣西豫行廣東相遇滕王閣醉中次其韻二首紅樹青山照轡絲江南無地不宜詩秋光如畫天如水渾是京華夢到時遠浦浮空凝晚色好山烘日出晴嵐滕王閣上一分手人過梅關南復南峽江二首賈胡輕作數年留住遍江頭賣酒樓從此木綿成利窟主家兒壻定纒頭見說燕雲布價添久居輕别恨厭厭明年江口好相候定駕大船來賣鹽杜子美象刪後騷餘代有聞集成惟許杜陵人憑誰寄語沿流者流到江西不是春卧龍圖梁儀甫所收能辨人間大有年九淵誰道抱珠眠等閒莫似隆中起雨得西南蕞爾天題大别寺石壁禪師懷可堂老可而今骨已塵只留老壁翠嶙峋可憐懷可悠悠意多少人間未可人衡山王尉因蛙得疑獄邑人圖而頒之求題事當人力難盡處微物依憑庸有之司馬家兒誰喚起而今真可問公私鵰窩驛次伯庸壁間韻四首居庸無壘有人烟龍虎風雲俱上天漢家談笑中興了大勝天驕多控弦緑蕪千里動荒烟白鳥一行飛上天落日饑鳶呌平澤鳴䳌何處發驚弦桑乾水面晴生烟桑乾領頭青入天勸君過嶺莫回首歸心恐如矢去弦濛濛山色濕非烟四野窮廬垂一天去家幾時驗明月昨日上弦今下弦和曹子貞壁間韻桑乾高接碧天長五月松風灑碎霜馬上饋茶僧亦笑今年更比昔年忙至正集卷二十三
