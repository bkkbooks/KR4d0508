body:
  text: 至正集卷三十一元許有壬撰序陸宣公奏議纂注序鄿春潘仁彥賔為陸宣公奏議纂注南臺御史上其書且薦其才可職校湖廣省調寶慶儒學正而移其書中書下館閣校勘館閣題之湖南僉憲高昌赫公國寶尤愛其書請豫序將刻之余惟三代後賢相世有其人然匡輔之業功於一時謀猷之文功於萬世有其業而無其文者多矣有其業而有其文可施於一時而不可施於後世者亦不少也至於施之當時而已效用之後世而不竭㬭然與聖經賢傳並立於天地之間而不悖者獨陸宣公奏議為然爾東坡以為古今之精英治亂之龜鑑豈不信哉國寶始作邑即有聲為御史兩臺僉江東憲移湖南聞其能政而不及叩其所得及觀是舉則知其有得於是書深矣夫舉是書而施諸用君可以為堯舜臣可以為臯䕫稷契況一道乎國寶以其用之不盡也大其傳使人有是書得其位而施諸用則疲療尚何患乎不蘇風俗何患乎不淳而天下何患乎不治其用心亦仁矣余聞部使者率榜笞彈黜是急國寶獨汲汲於是蓋有見於遠者大者繼今樹立其可量也哉送陳季和序大德辛丑有壬侍先公官衡陽鄰安仁陳君季和館見其學與之交石鼓鴈峯花藥之勝時往必俱詠歌倡和無徒嬉也得薦待試季和又同剡乙巳余隨侍湘潭别焉季和取李陵詩努力崇明德皓首以為期為韻作十詩始以責善中以期待終以惜别有車笠不我忘寄聲長相思之語當時讀之已為悽惻丙子嵗始會京師俯仰之間三十二年矣人生能堪幾别哉而三十二年中江湖風雨悲歡得失不知季和有詩幾千百首能盡述之也余僥幸逾分中間父母兄相繼傾逝追思昔同逰時在其慶下讀書外百事不關慮其樂終吾身不可得矣故余雖樂曠久之會遇而又有深悲者焉季和歷邑郡校官當升教授教授員浮於缺數倍在昔有皓首不調之歎至治辛酉選部以巡檢則缺浮於員始議借注以八品借九品而當時執政且謂巡檢為流官教授在流外戛戛靳之豫時主事天官力辨於堂九品監當中州得借孰謂八品師儒且置要荒而反不彼若乎其議始允選部行十六年季和今借授寧都巡檢始釋褐矣聖朝列聖崇儒今上諄諄播告在天下耳目而姦人抵巇賢書遽罷天威赫怒罪人斯得成規治具駸駸乎復矣以季和之賢之學髮蒼蒼而方試一命局已定格不得施其長天下之知季和者莫豫若而豫又執政乃處之若是其愧於車笠之語多矣尚欲膠榮以妨賢路乎然而在豫則誠有欿然者在季和則何慊乎哉素其位而行抱關擊柝雖賤必敬況緑袍挾弓矢率求盜為人除害者乎使一方盜不作作必擒民得以安其田里是獨不可為政乎古之君子其取也亷而其效也博今之君子其取也肆而其效也畫季和為古之君子而豫為今之人也昭昭矣於其行為之列昔日之好與夫今日之可悲可愧者為序以餞之玉淵集序衡安仁陳雍季和奉其父翼鄉先生玉淵集請曰雍先世奕業擢第里人號所居青雲里吾翁有聲場屋世變隱居百念蕩滌獨不能忘情於詩幸哀而表之翁其託以不泯乎豫少在衡與季和遊獲拜先生先生頎然一偉丈夫蕭然有林壑姿聽其言藹如也李玉溪世傳得道先生從之遊得其學視世聲利敝屣之不若豫時甫冠不能問且鋭於進修未知世事之真可輕也今讀其詩而後知其人焉昔人言詩非能窮人窮者詩乃工然窮而工者多怨悴無聊之語雖強自寬釋猶賤丈夫忍怒形色有不可掩者今夫螢窗雪屋殘釭獨坐山莊野館風晨雨夜他人有不勝荒寒悽楚之態先生目之所遇心之所觸形之歌詠冲融蕭散無一毫抑鬱不平之氣始終卷帙無一章投贄奔趨之詩其所造不淵矣乎至於夢中談仁則於信道篤矣其於方外亦寓耳先生名一霆玉淵其自號也壽八十五而終季和能世其學先生不獨昌其詩又昌其後而詩之傳益昌矣奚必豫託而後不泯哉宣政使楊公行實序西夏楊公安扎爾布哈延祐間為行御史有大姦席勢惡竊巨位人重足側目擊之不報遷內臺又擊之所恃城社禁掖媒蘖為譴出僉憲入二長右司皆有聞監憲五道力農桑修學政勵風俗教戒家至乙亥七月上京有東門之驚由户部尚書拜治書侍御史俄除陜西左丞未行改同知宣政院事遂升院使昔嘗以母老棄官歸尋監河西憲無何改陜西行臺治書侍御史夏民惜其去有釋之者曰公之道行於此夏人被其澤行於臺諸道被其化立於朝廷則天下受其賜河西獨不在鈞陶中乎序其說以餞持以示豫曰之人之言豫懼其浮也不頌而規豫望焉嗟夫吕巨車舞世未易一二數宣政公自河南監憲召為户部自户部四轉至一品位益崇而心益卑名益起而心益修可與語大理矣士之生世官崇卑不校也顧稱與否爾然器之大者其受必大亦其宜也故施之高者其及漙發之力者其志遠使人器之而崇卑之效不能無别焉朝廷以西夷素獷因其教而柔之西若南幾千里戎馬部署分職大小皆付宣政弄兵竊發則獮剃之其任亦重矣宣政修敝舉墜人與其能豫復何規規繼今可乎宣政位雖高任雖重然外是則所施尼矣一旦置諸鈞衡首諸風紀以厚民生以正教化其重不百倍今日乎且昔之為憲或隘焉部若院或拘焉隘也拘也彼之宜此之戾也亦思所以宜於此者乎挈其綱審其機本之以至公守之以至誠吾之所施無適而不宜矣世之修飾為筌蹄獲其欲忘其器謹於取怠於成者衆矣宣政毅不可奪夫人知之而豫又及是者責善之道也以是為規可乎宣政曰命之矣因是以為叙贈寫真陳芝田序翰林揭待制曼碩序寫真者稱錢塘陳鑑如父子獨臻其妙余不識鑑如識其子芝田丙寅嵗嘗寫余真小兒始學語乳者擕而過即指且呼兒日見惟便服像乃朝服而瞥見識之於是知其得余之深也始余未相識人人稱其藝又作余像始知其能雖知其能而未敢許其至蓋余見識素淺且慮天下之大將無蹴其右者求卒不獲又得曼碩之言始挈余信以被之為之說曰志於道遊於藝藝固後道君子取焉者蓋有好道而盡於藝者也繪事亦藝也其天機之深物理之妙有非淺近之所能窺者就繪事中人物最炫目近習工之尤難人知芝田之工而不知其得於筆墨之外者且似者形也似之者非形也神也形外而神內也外而最著者面也形至焉內而最微者心也神出焉使心而見於面內而襮於外其為道不既淵乎故有得其形矣而識者不以為似得其神則雖眉目之有參差容色之有淺深望而知其為某也芝田好論人賢愚夀夭貴賤有人倫之鑑故其所造不例人之難蓋相之與畫名雖異而理則一得於相而不能畫者有之矣未有不得於相而能深於畫者也不得於相而畫者不過為肥紅瘠黑庸史之筆爾以韓幹之能僅得趙縱之形昔人列吳晉而下名手才三十餘人卓然可傳又不過數人則寫照為藝豈易言哉若芝田者蓋卓然可傳者已京師三十年畫富貴人不知幾輩得金帛積之可大富而散若土苴受知延祐至順兩朝才被一命世知其藝而不知其為倜儻人也故併及之送劉光遠從右丞朝京序衆星麗天而拱北辰百川行地而宗東海在人則朝覲之義也臣所以竭事君之誠君所以豁踈遠之蔽舉係是焉君臣之分立上下之志通朝覲之義大矣哉昔在唐虞五載一巡狩羣后四朝周大行人掌大賔之禮以親諸侯侯甸男衛要地有遐邇故見有疏數焉書稱敷奏以言明試以功禮春以圖事秋以比功夏以陳謨冬以協慮不獨執贄備禮而已也秦既廢古後時有聞不常也我元之盛跨軼三代親王守分土非有命不敢朝官守居外者行省十行臺二長官秩一品皆帷幄重臣朝廷有大事則徽集親王大會京師陳祖訓申戒約鴻謨大法有古不及饗勞而歸莫不感悅而安其世守行省臺則遣使入請臣某請入賀不敢擅奏可乃敢行或易人惟命得請率僚屬奉宴幣給繹既入見以宴幣上太官升辭為竣事饗賚之厚薄顧上之所知何如有壬官京師竊聞老朝官言世皇時外臣入見必問部內事甚悉部內事有利害可罷行悉敷奏之雖不屑屑四時而其圖事比功陳謨協慮之意宛然隆古時也今天子即位湖廣省臣以典故請右丞以上命行掾劉嗛光逺以選從且行請曰嗛昔計偕而黜雖入京猶未也幸今從右丞公入願勵不敏光遠進士除教授漢陽三年省臣才之羅致幕下尤為右丞知拔行輩中以自隨今湖廣控制地幾千里其最為民害者幾事其最為法蠧者幾條省以兵聞四方果如所聞乎猺黎猖獷飛挽方殷亦有道柔之乎右丞明習時務老於政者也此行見天子必有敷奏而行之光遠亦思所以助其言而推其知乎不然人人可以從公于邁也光逺是行觀朝廷之盛歷山河之雄亦必充然有得措之事業若夫往來僕僕目之所接心之所會但以􅓵歌詠挈巨軸歸曰吾文士斯可矣則非所望於光逺也擊壤同聲集序聲在天地間為雷霆為嵔崔竅穴為鳥獸之鳴與凡細蟲之可聞者為水之磯瀧物之戛磨雖重輕清濁和戾之不同其出於激一也在人為言而行不與焉言有喜怒皆激也而精者為文文之精者為詩聲而至是萬物之聲蔑加矣康衢之謡擊壤之歌其淳未漓其朴未凋其發於聲洪龎渾厚而自然之文實具於中及靡靡之聲作淫哇嘈雜天下化之雖以小雅不免怨誹况騷乎况降而益下者乎江夏熊君堯章讀書不仕喜作詩無愁憂促迫無聊之聲彚其所作號擊壤同聲集蓋言生太平之世安於耕鑿猶野人自樂擊壤於堯天而欲同聲相應於數千載之下也聲同矣樂有不同乎詩特其寓爾昔康節伊川名擊壤不獨同其聲直與之同其天與康節伊川同其天當自知之求豫序因以勉之壽慶集序豫至順癸酉記孫義方夀慶堂繼為文頌以章其孝者聨編纍牘義方録以寄豫京師豫因喜其母健而致文日富也戊寅豫南歸則其母已棄養矣其友萃為夀慶集求序其端嗚呼昔之夀者今無所見矣昔之慶者今為創巨哀苦矣則斯集也非蓼莪之詩乎世有養不待而為終天之恨者義方及養而母又夀逾九十有子有孫若可無恨矣然孝子之心失親一也寧計其壽不壽哉且及養而夀哀且若是則不幸不及及而不得終焉者其為恨詎有已耶則凡世之幸而及養者可不竭力以篤愛日之誠思其不可復者而先施哉豫永感之人追思昔時及而不及者多矣身不及矣而竊有望於人焉書以為夀慶集序大元本草序淳朴散而後人始疾醫藥盛而後疾始熾醫藥罪乎非也不明者之罪也醫必方方必藥而良惡之異性風土之異宜真贋之異用必本草而後知和扁神藝藥非精良疾不能已然則藥有本草猶辨貌有鑑出師有律其醫書之近而尤切者乎自一日七十毒後䆒心遺經三卷者梁之陶唐之蘇李蜀之韓宋之開寶嘉祐諸賢增三百六十種至一千八十二種可謂詳矣然梁限於江蜀局於西南宋畫於白溝唐雖一天下其讋翔漠一時懷柔不能一家也則異方物産有不得而悉者已開闢以來幅員之廣莫若我朝東極三韓南盡交趾藥貢不虛嵗西逾于闐北逾隂山不知各幾萬里驛傳往來不異內地非與前代虛名羈縻而異方物産邈不可知者比西北之藥治疾皆良而西域醫術號精藥産實繁朝廷為設官司之廣惠司是也然則欲廣本草以盡異方之産莫若今日也聞諸故老至元間嘗議及是而後不果明陽朱轅仲侔述大元本草求序其首書有三綱九目其明部屬謂舊本始玉石人部居草木後為失次萬物人最靈乃始人部餘各有次而終以鬼㾏人部首列內外景圖詳疏其下舉元命之祕生死之關昭揭諸世蓋欲使人人自知有此反而求之則養生得其本外邪何由而入扎瘥何由而至醫可不用矣其不能也則醫不得不用藥不得不餌而吾之本草不得不明焉始則教之以不病之要終則示之以必效之藥其用心可謂仁矣昔人窮一經且皓首此尤難焉詩人多識鳥獸草木之名其性若味未必能識也唐宋修書必集衆乃仲侔自少至老獨力攻此可謂勤矣又有外部餘部以其多産異方商賈所不售知識者少但録其名物治證而不暇有所考核此則豫之切切者也仲侔將奉此書上之朝廷竊意大醫使因是成書裒異方之産前代之未聞者萃為一書則可以軼宋唐而信後世矣是之謂大元本草至正集卷三十一
