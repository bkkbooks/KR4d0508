body:
  text: 至正集卷七十五元許有壬撰公移封贈照得延祐七年改元詔書封贈之制本以激勸臣下比因泛請者衆遂致中輟今命中書省從新設法議擬舉行毋致冗濫竊謂勸善懲惡有國之大經宣力輸忠人臣之常事然必勸之有道懲之有法而後可以使之身無遺力心無遺忠苟為不然雖刑罰日嚴終無以格其為惡而進其為善也朝廷舉行封贈使為臣者一身之貴上及祖父母父母下逮妻子天下臣僚孰不感激奮發思報萬一勸之之道可謂盡矣至於但犯取受之贓并行追奪雖有至愚無知見其父母已受之恩一旦奪去苟有人心豈不慚痛懲之之法不已至乎則是勸善懲惡未有逾於是者也朝廷此制初行在京官員七品以上就任申請悉被恩榮普沾存沒至於亟升亟請再贈再封者有之而外任職官例皆任滿給由方得申請適遭中輟不及沾被欽承詔㫖再許推恩中外臣鄰莫不欣戴延望逾嵗未蒙舉行或親衰耄慮不及於生榮或身迫暮年恐莫酬於孝思希望之情固不能已如蒙仰遵明詔俯憫下情早賜頒行不惟臣下普被天恩抑且勵忠勸孝其於政化實非小補丁憂至大四年三月欽奉詔書官吏丁憂已嘗著令今後許終制以厚風俗朝廷奪情起復蒙古色目管軍官員不拘此例竊惟治道必以教化為大經人道必以忠孝為大本教化不施雖有刑政不能為善治忠孝無取雖具形體不足為全人而況忠出於孝則是孝又百行之大者焉欽惟聖朝以孝理天下稽考典禮除蒙古色目各從本俗其餘居官著為丁憂之制將以美教化厚人倫為治之要道也所謂奪情起復者蓋有道德行藝可以範世謀猷材畫可以經邦天心簡眷人望素服或邊臣宿將久諳軍政智謀韜略可任邊寄似此必用之人謂之起復誰曰不然其或碌碌凡庸如馮翼霄才無過於常人行每乖於清議徒以諂侫憸邪亦復冒膺起復實玷風教宜明白奏聞除上位知識必用之人取自聖裁其餘人員并遵舊制其於治道不為小補吏員欽奉聖㫖節該漢兒吏道從七品以上休委付者教授秀才并職官內取的令史依舊例委付者又憲臺奏准監察御史廉訪司依保守令例每嵗各舉諳練刑名者一人注充推官竊謂一統萬邦治雖多術大經要道首在得人論材有長短之不齊立法貴變通而無弊故求賢擇善必自多門而趨事赴功庶臻成效欽惟我朝建元以來百度修舉惟科舉條目議而未行出官之制大率由吏而貢吏之法必以儒通吏事吏通經書然後補用在後奉行不至試補之間多不依法遂使賢愚混淆政事敗闕仁宗皇帝勵精圖治痛懲其弊而一新之由吏出身者限以從七不使秩髙權重得以縱恣設立科舉取人以德行為首試藝以經術為先求賢之方視古無愧但科舉未行之時以吏取人實學之士亦未免由此而進一概限之不無同滯且名器之設所以陶鑄人才鼓舞為善者也各衙門通事知印宣使奏差之類勞佚懸絶而出職反髙又得升轉獨於吏員待之既殊遏之又甚自非特立堅守之人亦何勸而為善耶目今中縣以上銓衡有乏材之嘆郡邑多闕官之所又欽奉聖㫖嵗舉推官一人推官從六品職必精曉刑名洞逹事理慈祥豈弟歷練老成之人方可任此不廣其途亦難選舉夫吏弊蠧政固不為少但科舉未行之前儒皆為吏其貪虐鄙俚之徒限之固宜而廉慎儒雅之才恐遂併棄合無自頒行科舉詔書日為始以前該降吏員量許升至三品以後入役者從五品止庶賢愚無同滯之患官府有得人之效糾副使哈扎等士居下位猶殫心力於公忠權二一司已極班行之清要苟守已或乖於彛憲則原情尤重於常刑況郡邑毫釐之私莫不扺法而奸邪什百其害乃欲治人論劾不明勸懲何在近奉臺劄江西守省體覆各道聲迹至海北廣東道體察得本司副使哈扎蔡衍不公等事謹按哈扎者心本貪邪才兼詭譎敗事何限黷貨無厭風聞肆威龍斷罔利有司之所罕見邑胥之所不為先任海南道副使延祐三年十一月到任隨時出司照刷石康鹽課提舉司文卷所欲既厭將分司印信分付隨行書吏於延祐四年二月稱病徑歸今除本道於至治元年二月到任至治二年七月二十日遽爾托病出廣其蔡衍者腐儒散材凡庸小器素無令望屢玷清班至治元年十一月到任奉公守法之微效未見營私違禁之實跡已明於至治二年閏五月十一日亦行稱病出廣若候聲跡通行具報緣各官俱已離職誠恐憲臺不知或加選擢實玷公論伏乞顯示黜斥用肅憲綱丁憂委差分職用才貴無天工之寄丁憂著令蓋俯從孝子之心故雖重任之在身并許居家而終制至於取受被問之際經值親喪亦聼服闋方行歸問所以重百行之源明彛倫之大既章孝治且將有以資其忠也近奉臺劄江西守省糾察非違等事至臨江路體知本路至治元年閏五月內承奉江西行省劄付發下太寧先生春秋計料刋板其儒學提舉司不照係已經國子監校正文字却行移文令某人校勘其某人者先任太常奉禮郎在任值喪還家丁憂斬焉衰絰之中被襟受委開設官署臨局督工瑣屑校讐往來造請忘不文之訓違讀禮之經當寢苫啜粥之時豈趨事赴功之日殊不思見任官員之事尚許辭謝既已離職居憂乃復應此無名差遣其於典禮乖莫甚焉宜令合干部分定擬今後凡丁憂官吏各衙門不得差委違者原委官司并受委之人各坐以罪庶少革澆薄之風或可補孝治之萬一陳酉娘臨江路新淦州人廖所瞻娶祖母之妹陳酉娘為妻有司以其成㛰二十七年生子復孫又是各姓中書省送禮部議終是各姓未有服制成㛰年遠生子見孫難議離異今來謹按刑統戶㛰律云父母之姑舅兩姨姊妹及外甥女女壻姊妹并不得為㛰姻違者各杖一百并離之議曰父母舅姑兩姨姊妹於身無服乃是父母緦麻據身之尊故不合娶及姨又是父母之大功尊若堂姨雖於父母無服亦是尊屬母之姑堂姑并是母之小功以上尊已之堂姨及再從姨堂外甥女亦謂姊妹所生者女壻姊妹於身雖並無服據理不可為㛰并為尊卑混亂人倫失序違此為㛰者各杖一百雖㑹赦各離之竊謂治雖多術正俗是先教有常經明倫為急况夫婦係三綱之重故經典著有别之文愚民雖出於無知明法不可以少貸苟行姑息恐愈澆漓其廖所瞻娶祖母之妹父之尊姨陳酉娘為妻在律明禁其娶姨在經深惡於蒸上其為尊卑混亂人倫失序也至矣朝堂每議為例事理率皆酌古準今稱停平允然後施行今若以為終是各姓未有服制則豈父母有服之尊而已以無服娶之為妻者擬合斷離以勵風俗況江南幸薄成風利其親戚之富多方承繼不問尊卑無以禁之則是不惟無救於既往之非又將大啓於方來之隙其於風化所係非輕擬合明立禁條違者斷罪離異庶於世教有補蒙山銀竊謂生財有大道豈小智之所能餘利不在民非為國之先務況有利輕害重人所共知法弊事隳下不堪命者若不懇陳其責有在蒙山銀場提舉司嵗辦課銀七百定辦納不前將提舉陳以忠斷罪體究得本處銀場在亡宋時官差監場十分抽二歸附後至元草一年撥糧一萬二千五百石辦銀五百定後節次添撥糧至四萬石至大元年撥屬徽政院每嵗辦納不前往往於民間收買回爐銷煉解納蓋緣歸附以來近五十年本處地面却能幾何所用礦料必取於坑洞薪炭必取於山林銖兩而求尺寸而伐以有限之出應無窮之求其地産不已竭乎加以言利小人如陳以忠先為連年虧額自願每糧一石減鈔十兩折收輕齎三十兩承認額辦因此致令徽政院易於准言濫受此職不數年間却又陳言欲行添及元數公然欺罔雖曰不准而前後數年每糧一石巧立名色收至六十兩稍或不從則以輸納遲慢監鎖箠楚山野之民畏之如虎斬木伐屋典賣妻子者比比皆是本人所畫之計不過為身所行之法惟務害衆為是本處坑谷已空薪炭已竭人力凋弊已甚侵漁已極逃移者衆連年虧兌蹤迹顯露計無所施勉强支撐中實憂悔既任其責欲罷不能是以又將興國地面銀場協濟煽辦移江西之害及湖廣之民及言寧州等處可以煽銀請於所屬改撥户糧造此妄言苟延殘喘鄙夫患失無所不至間之居民欲食其肉欽惟聖朝富有四海視此微利何啻毫末奈何容一介小夫之奸欺為數郡細民之荼毒使其害及閭閻得利十倍邦本所係猶不可為而況所得不敷所費者哉先以行省所委體勘官瑞州總管史朝列等計料所費每銀一兩該鈔一定一十三兩虧官損民不便今銀一兩雖曰止該官本十四兩然因礦炭盡絶燒煉不前俱係爐户用錢收買輸納已是添答鈔兩至於納官之時官吏庫子人等百色所需并帶納折毫諸班唆剝及官吏多答鈔數收受輕齎轉行買納其弊百端由是較之則每銀一兩本官十四兩外爐户又加一倍之費方能了辦民之所費皆其脂膏若謂此非官帑所出視如不費則父母之於赤子果有間乎近年以來坑洞日以深遠每入取礦則必篝火懸繩橫穿斜入竇穴暗小至行十餘里石之壓塞水泉之湧溺其為險惡蓋無可比加以山嵐毒氣旦夕攻侵枉死之人不可勝數興言及此誠可流涕耳目所及敢不力陳若以為國有常額難議除豁朝廷所用必不可無莫若革罷提舉司衙門將所撥糧四萬石折收銀七百定依江東諸郡金課例每年立限從有司徴收解納則是每糧一石折收銀八錢七分五釐每銀一兩該免糧一石一斗四升二合八勺官不失額民不被害回視剝其脂膏流無窮之害陷於坎谷殺無算之人而所得不償所費者其為利豈不百倍哉方今政令一新次第拯治於斯之時若謂設立已久恢辦有常憚於更張因仍循習則蒙山民瘼日甚一日未有涯涘也窮苦之極其害且有出於經理田糧之外者卑職親究其事義不容默如蒙早為講究施行疲民幸甚薦吳炳陳繹曽竊見處士汴梁吳炳業專聖學文造古人特立不渝真積力久忘情軒冕守道衡茒勢利不足以動其心貧屢不足以纍其志又江南陳繹曽博學能文懷材抱藝挺身自拔乎流俗立志尚友乎古人放志山林富貴浮雲但人既不自鬻恐後日或有遺賢如於文翰之職內不次徴用不惟攄其素藴抑亦可以砥礪流俗至正集卷七十五
