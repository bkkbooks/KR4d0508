body:
  text: 至正集卷十六元許有壬撰律詩七言五十三首和繼學寄分省諸公韻二首粉署凉多酒易消紫垣天近慣聞韶甘分桐乳朝承宴香惹爐煙晚退朝行殿日華明玉藻清灤秋影尉氷綃聖時扈從臣無䇿願棄樓船只就橋西掖梧桐一院隂太平官府靜沉沉敢叨紫綬承黃閣曽受青燈錬赤心漳水風煙千里隔蓬山宫闕五雲深小窗退食成佳趣恰好茶香月轉琴送胡宗文教諭崇陽教邑休辭展布難一方儀範幾人看但教多士有矜式大勝達官惟素餐梓匠不言能辨器泮池雖小可觀瀾聖門事業須加力更與乖崖締嵗寒宿程松壑月香亭秋興亭前秋已清月香亭上月方明人間臺榭如三島山頂笙歌徹五更醉客日中猶未起歸舟風急不容行新凉漸到平津閣誰信長江隔兩城青山醉中題詩芭蕉葉上海朝宗折歸解恕齊元帥賦詩見贈次其韻雲片輕明界緑絲揮毫真與墨相冝翠遮湖石八九扇清受主人多少詩老圃風霜休蠧毁騷鄉縑楮自神竒可憐顰蹙推敲處渾似羇窗聽雨時武昌出郭用解之昻御史韻風急天髙霜信傳江村回首思悠然雲生逺岫濃還淡路轉荒陂斷復連交友得陪天下士此生當作地行仙陽春白雪真難和目斷疏林一抹煙青山道中呈之昻抗走塵埃已厚顔杖藜猶未厭躋攀畫圖紅葉煙中樹詩句碧雲天外山釣艇逺隨波上下舊遊疑在夢中間眼前俗慮都排遣安得浮生盡日閒陽羅懷古用之昻韻憶昔天戈執未橦眼中已見趙孤降上遊先搗腹心地末路敢云脣齒邦自是乾坤開盛世誰言南北限長江登臨不用多惆悵詩滿奚囊酒滿缸登陽羅祠用之昻韻憑髙四顧水連天隔斷紅塵覺地偏風月一觴容我輩舳艫千里記當年大江東去終歸海炎徼南窮未是邉清世身閒亦多幸詩成須和不須傳舟中無寐呈之昻攬衣欹枕聽江聲殘夢茫茫續不成一棹觥船三日醉幾星漁火四山明遊心鴻鵠天邉去得句魚龍水底驚三老長年都絶倒南州吾客久無卿詠酒露次解恕齊韻世以水火鼎鍊酒取露氣烈而清秋空沆􅒭不過也雖敗酒亦可為其法出西域由尚方達貴家今汗漫天下矣譯曰阿爾竒云水氣濳升火氣豪一溝圍繞走銀濤璇穹不惜流真液塵世皆知變濁醪上貢內傳西域法獨醒誰念楚人騷小爐㳙滴能均醉傲殺春風白玉槽詠酒蘭膏次恕齊韻世以酥入茶為蘭膏恕齊取雞子黃入酥治酒形色甚相類而味則逈絶又謂之酒蘭膏云空房醜婦尚須求七碗何如釂一甌混沌黃中雲乳亂鷓鴣斑底蠟香浮不教焦氏稱歡伯誰信盧家有莫愁從此武夷溪上月好移光彩照青州之昻以七月望賞月有詩已而中秋果無月遂和其韻許大明光何處收當時清景若為留世間節序空膠柱老子襟懷在玉舟向使不為終夕醉真成虗負一年秋更憐病客書窗下風雨瀟瀟藥滿甌賴謙齊安撫以詩招飲次韻答之平生燕越遍遨逰不似晴川剩得秋便把漢江都釀酒要教塵世總無愁當年謬挽千鈞筆此去惟須一釣舟三徑寒香應未减鴈霜蛩月肯回頭飲淡香亭次恕齊韻四面松筠一徑苔兩池如璧繞崇臺沙鷗狎客不肯去野鶴橫江時復來身老山林惟有屐興深江海欲無杯蘭亭至樂有觴詠底用新粧燦落梅欲招樂府豫止之故云淡香亭散復飲月香亭因宿焉一日天教四美并淡香亭罷月香亭風髙漢水翻秋碧雲盡淮山送晚青有酒便從元亮飲無琴何用子期聽今宵大别多情月不似當時照獨醒同之昻宿郎官湖太白祠飄然樓主人黎東軒年七十三吹洞簫間以觴詠至四鼓始寐時九月十五日也半醉飄然樓上時眼中如見謫仙詩洞簫聲挾霜飛早瑣闥光迷月轉遲清話一宵無芥蒂美人千載共襟期郎湖留得黃花在一任蜂愁蝶不知飲謙齊秀野園松菊芙蓉左右通有亭都在水雲中遙峰入座輕顰翠落葉迎人慢舞紅丘壑一區真有分弓刀千騎竟何功我詩便為君圖取却笑王維是畫工題瀘州先氏書嵒王顛孟蹶蜀何堪何似先家復此嵒千古異端終反正一鄉多士見司南懷歸有夢驚華髮濟美無求漫緑衫更為諸孫申祖訓莫教喬木擅雲龕次韻髙堯臣太監二首堪輿俯仰一為人水有波濤陸有塵但使寸心如日月儘教多事似參辰平生行業非充隱到處溪山可卜鄰花栁前川寓言耳胸中自是一壷春風月無邉物外人可能人海抗囂塵青雲華貫慙書考白髮遺經益競辰道德幾年思尚友煙霞何日得為鄰試看老圃荒寒處須信黃花正是春分臺憶洹溪陪胡安常侍御晚坐因以寄之洹溪西望暮山稠山影涵溪翠不流松柏相望才二里萍蓬輕别又三秋霜臺多幸叨聮署野服何年續舊遊蟹紫菊黃應咫尺請君先為浣鄉愁題國子生葉恆父謙甫墓碣後逹材今古出成均恆也方期學日新甘廢晨昏思養志忍居天地遽忘親丈夫聞道死無憾生子作儒家有人片石青山足傳信肯教悝鼎獨稱仁次韻題湖廣參政實喇特穆爾詩卷萬古寃公若一辭人心真僞豈容欺義當為處戒無勇天未定時疑有私夢者覆蕉誇得鹿獵夫吹竹㑹逢羆東隅已逝桑榆在廷尉從教愧釋之題三原張周卿孝義卷人生孝義本天𠂻踐履當由學力充風化日回三代上春和今萃一門中繁隂已見滋芳桂餘潤猶能及轉蓬此去佳名藏不得涇橋明月照無窮髙麗僧無外扣馬求詩口占授之墨儒名行吾能别內外有無師自知萬里歸來仍是客衆緣消盡未忘詩雪泥留迹鴻飛逺雪海連天鶴度遲莫使雞林專紙貴好將新句寄京師送同年趙繼清赴潮州推官五十六人同擢第年來南北幾升沉潮陽合有文章士吾子初無富貴心驅鱷又當勞筆陳化鵬誰信困蹄涔君家自昔傳清節更要詒謀後視今送王從義赴東平總管東府多儒冠列州凋零今似葉經秋田廬復值連年水牧守定懸千里憂教養政思吾子去循良當向古人求政成自有如椽筆擬作歌詩頌魯侯如上京策騎年年遍兩京但慙無賦繼張衡出城便與青山㑹涉世惟催白髮生新雨煙蕪皆秀色嫩凉雲樹已秋聲尊空客散郵亭逺恰是思家第一程午日過桑乾嶺酒香蒲嫩負龍城却得溪山勝處行地入髙寒疑節換路逢竒絶更詩成緬懷勻水湛忠列何幸清時扈聖明眼底羇懷又無奈林間時聽子規聲題范彥升南野園心閒人境自無譁誰向明時學種瓜身外有求惟是酒園中無地不冝花山林捷徑難投足天地行窩便作家莫遣雞聲驚夢覺軟紅塵土又東華題昌平劉諌議祠一卷春秋兩鬢皤丹誠貫日口懸河䇿能匡世時不用天實厭唐人奈何自古大材多薄命而今我輩亦登科可憐薰腐俱塵土得似髙名永不磨六十里店飲友人帳內繡箔紅飄輦路雲竹櫺清度屬車塵天窗下㵼風如水月榻前留草作茵仙府瓊漿㪺沆􅒭太官珍脯擘麒麟醉歸躍馬桓州道誰信繩樞槁頂人宴慈仁殿周覽山川喜而有作纍朝仙帳似星躔咫尺鈞天别有天龍虎岡陵圍不斷鳯鸞樓殿鬱相連翠榆舞影交馳道紅藥飛香入御筵螻蟻小臣無以祝兩宫聖夀萬斯年從左大夫奉命郊勞右大夫太平王野宿灤都西北二十里地曰察爾吉摩多與雲莊治書同帳明發疾驅馬上飲湩有作斗帳帡幪僅二人薄氊藉草幾時溫夜深露逼身如洗天近星垂手可捫一盞寒泉均盥潄半囊餘湩了饔飱言歸自是人無勇茅屋空閒老瓦盆左大夫獵得兔大夫銜命下天墀小試元戎短窄衣風日半寒人半醉山川如畫馬如飛四圍逺勢周遭合一片歡聲得俊歸小校成擒何足道豺狼多少緩明威陪右大夫太平王祭先太師石像像琢白石在灤都西北七十里地曰旭泥白負重臺架小室貯之祭以酒湩注口徹則以肥胾周身塗之從祖俗也因裁鄙語用紀異觀石琢元臣貴至堅元臣何在石依然巨杯注口衣從濕肥胾塗身色愈鮮范蠡鑄金功豈並平原為繡世誰傳臺前斬馬踏歌起未信英姿在九泉謝右大夫贈馬王家騋幾三千撝贈賔僚日屢牽方念何功勞驛騎况承髙義薄雲天愧無詩謝如張藉只有驢乘笑浩然不用都人行且避看山吾欲裊吟鞭飲左大夫家有髙昌僧能琵琶合曲而又善謔俾佐尊焉柏霜花月勢相違紅袖何如破衲衣音響偶聞仍梵唄談言微中寓禪機一時遂悟忘形樂萬事無過盡醉歸未信色聲俱是幻更煩青塜弔明妃和間間宗師至上京韻二首建瓴天下奠皇都聖祖神功曠世無灤水清浮金闕動蹛林晴射錦雲鋪自憐簪筆螭頭近深愧盤空鶚影孤却望居庸南去路瘠田茅屋杳荆湖夷夏襟喉控兩都兩都形勢漢唐無埀衣已定千年治封事仍求萬字鋪香殿晝閒雲氣合瓊樓天迥月輪孤太平禆贊慚無䇿猶幸人間有五湖至順辛未六月見文宗皇帝於大安閣後廊甲戌夏重來有感而作修廊晴旭射紅塵燕坐曽朝蟣蝨臣靜憶玉音猶在耳絶憐金地只傳神橋陵弓劍成千劫灤水旌旗僅四巡大聖繼天春萬彚感恩無奈淚沾巾奎章閣先帝憂勞總萬機退朝遊息不宫闈球琳璀璨開𤣥圃奎璧森羅拱紫微圖史聖功方未已乾坤神器遽長違詒謀有道心無憾千古中天日月輝除奎章閣侍書學士中臺奏留戲簡閣中諸老盛世真材藹鄧林天容樗散厠餘音鑾坡風月無清福烏府氷霜豈素心空使羣賢留半席不教弊帚直千金萬年奎壁光如日嵗晚斯盟肯再尋龍岡賜燕以下二首和吳宗師韻至元新制漢官儀萬馬東西歷翠微袀服盛裝三日燕和鈴清振九斿旗明珠火齊輝棕殿上醖珍羞及布衣但願普天均此樂莫拘千里詠邦畿謁太子宫五雲東郭起青宫仙仗旌旗掩映紅少海波明花萼盛廣寒天近桂香通談經敢厠鑾坡客育德當延鶴髮翁恩遇等閒過設醴玉觴賜酒注新酮豫病止酒乃以玉杯賜馬酪龍岡侍燕和張孟功員外韻山川宫闕古無雙列騎如花簇葆幢一𣲖簫韻來月窟半空金碧啓天窗神仙畢至朝圓嶠寒素從誇燕曲江聖德鹿鳴歌不盡願言懷寶莫迷邦客舍漫題用前韻二首國士南金未易雙蹇駑何用逐麾幢誰家茅屋煙霞迹也到玉堂雲霧窗鴻鴈夜寒思楚澤鱸魚秋美夢松江羇懷正賴詩排遣曹鄶寧辭淺陋邦夢澤山田二百雙花為屏幛樹為幢朝遊常有雲隨屐夜飲猶邀月入窗半世謀身憐下䇿一時飛夢過長江愁來矯首西南望好在釣臺煙水邦分臺上京往來宿洪贊徐千户家愛其雅潔留詩于壁樹隂清入小窗幽洗盡風沙出塞愁桑下本無三日夏尊前忍負一庭秋山含晴靄青未了花謝夕陽紅欲流迹印雪泥聊復爾鴈程明日又神州白髮蒲栁由來不奈秋詩斑酒秃更相讎初如春雪微微見忽似昏星漸漸稠攬鏡甘投衰境去簪花難繼少年遊到家應被卿卿笑從此明窗鑷未休儀真寄王可毅參政鶴磯衝雪别君時欲浣離愁不計杯征纜已維淮甸栁小瓶猶插漢陽梅江山到處渾如昔軒冕何心又此來翠鵠峰前紫荆樹春風回首望栽培庚申除夕燈殘香盡更躊蹰須到雞聲嵗始除青鬢明朝三十五白雲南紀六千餘未能免俗聊尊爼豈不懷歸畏簡書兄弟無官常在側區區養志果何如至正集卷十六
