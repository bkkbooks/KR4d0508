body:
  text: 至正集卷二十九元許有壬撰絶句調趙子期二首玉堂學士日攻文不識郊原有好春得見杏花千百樹却因東郭送行人春來頻約趙崇文同避紅塵踏暖雲底事相逢却歸去杏花今日雪紛紛題經筵安同譯史新刻千文賜本二首藝閣風清晝景遲楮生毛穎侍多時吾皇游藝超今古能事猶推智永師隋僧變滅等浮雲七十三行墨尚新閣本重翻鐵門字聖恩均到石渠人題趙仲穆二馬圖曹韓遺跡已無多松雪堂中見小坡珍重雙龍莫飛去人間銅式久消磨房星淪彩渥窪竭神物誰令畫得成幸自天間異虞闕忍教立仗不教鳴題愛蓮圖用卷中魯子翬韻二首光風霽月不可見奔軼誰能繼絶塵看取芙渠菂中薏一畨花發一圖新昭昭無極發天倪底事之人路尚迷但使愛蓮知所愛世間何水不濓溪題段吉甫助教武夷山圖千崖樓閣濕青紅一水盤回萬壑通不為風烟有佳色紫陽道氣在山中題單父宋希賢孝友詩卷家貧身壯贅它門有志渾如不贅人致樂致哀終子職肯教秦法變彛倫和神保欽之御史監試上京韻四首蹛林雲霧護皇州貝闕珠宫逺似浮驄馬歸時人盡道槐花開遍上林秋灤水天家第一州赤霄樓觀紫烟浮因君記我昔此役二十五畨鴻鴈秋茫茫九㸃認齊州大地如舟日夜浮龍虎臺前新雨露人間無此一天秋醉眼曽空十二州肯隨人海共沈浮白頭不用悲陳迹木落霜清恰見秋次巴克實彥卿雪中見示韻六首曚曨曉霧勒晨光一樣隆寒兩月强欲和陽春呵凍硯老夫持酒手猶僵殘雪虛窗夜有光小齊清話意差强江南不寄梅花信冷眼空看萬水僵東華射圃接天光日日趨朝看晚强白髮無能思補報肯矜霜簡幾人僵曽向騷壇接步光將雖云老尚兵强莫言白戰無英氣百足商蚷死不僵晃朗江天炫日光玉峯寒立鬬高强自然有類昌黎筆籍湜誰能走且僵誰因景物競流光為學終身貴自强身立程家門下雪從知寒氣豈能僵題嶽陽樓圖為鄂諾參議賦憶昔登樓得句新君山湘水共無塵而今見畫思陳迹深愧先憂後樂人題滕王閣圖賜麻帝子久無聞南浦西山自雨雲遂使閣名傳不朽却因駢儷一篇文謝淮東廉司經歷馬九霄畫鶴見寄騎上揚州不可招一朝蛻影入氷綃凡夫豈敢留仙驥却遣銜書赴九霄題淡然平章鷂子西風涼動早秋天小雀何須畏杜宣見說微形多變化好為布榖莫為鸇題明初扇廣文庭下草青青絳帳秋風一夕生詩思莫教鄉思攪江湖華髮我同聲中秋可行招飲因誦東坡明月明年何處看之句座中請明初可行各和其韻豫得二首皆用三疊體仍命禎賦夜來風雨不成寒似念幽人在考槃老夫老態月應道明鏡明朝君自看夜深風露恰知寒風在絺衣月在盤一樽濁酒對明月千里佳人應共看題明初所藏暮雲樓閣圖倚空寒立翠孱顔樓在重雲縹眇間松下罷琴人未去夕陽應待鶴飛還題明初所藏青山白雲圖不成蒼狗不成衣添出峯巒一段竒雲去雲來山自若笑它前日作霖時溪上樓以下八首詠徐氏竹溪之景一曲清波不受塵倚闌長日玩奫淪風烟莫道翁收盡撞透烟樓更有人竹間樓高居已是脫卑凡况在蕭森冷翠間欲識此君清絶處盡遮塵俗不遮山扁舟亭陸居無屋舟無水得似先生屋作舟人海茫茫我何有且教滿載一天秋藍田别墅輞川邱壑蔓寒藤境異心同有此名見說主人惟種德不須石子玉還生桂墩翁家多桂鬱成堆幾度秋風幾世栽好是麟兒成宅相蟾宫又折一枝回釣臺石巖雲矗俯深溪下有清風動一絲我亦忘魚聊復爾可憐溫水誤昌黎石塢潭郿塢金多竟不存清堅輸與老雲根潭中鱣鮪知多少已有飛騰過禹門軍山昔年屯聚亦偷生今日柴扉夜不扃却羡此山能領㑹時危時泰一般青題子昻竹石坡仙戲墨是信手松雪晚年深得之兩竿瘦竹一片石中有古今無盡詩題班彥功山水扇圖錢塘江上又秋風老友淪亡夢不通勝槩肯教同羽化山河寫在月輪中作樂導水以下二十四首次可行圭塘雜詠韻洹溪混混源頭活分得枝流入小塘怪底凝雲吹不散管絃聲滿水中央檇榼落成一斚才空一曲隨胼胝今日頓忘疲年來懷抱須陶寫敢笑長安衆富兒栁下聽鶯萬條金縷裊長身勾引遷喬語意新休向建章誇百轉陶家門徑有餘音舟中對鷺禪定聨拳斂素裳豈知船上載紅粧主人有約休相負多少魚兒要汝忘荷觴酌酒野人飲具謝玻璃自有天然軟玉巵蕩漾翠濤擎不定有人謀笑任淋漓蕉葉題詩騷鄉縑楮寓芭蕉翠瑩尤宜運紫毫風致於詩真有助卯君才調况清高荷淨納涼栁隂多處著方牀萬柄無塵各有香危坐悠然受清供風聲摵摵更秋涼開窗看雨一時清響閙新荷其奈龍公不肯多窗外風光吾不校四郊禾黍定如何松隂獨釣半世京華困鼎茵高風時復夢𤣥真可憐緣木求魚者今日君其問水濵與客泛舟欵乃聲中動畫橈不須舟子更招招而今赤壁荒寒裏試問何人有洞簫日夕觀山林慮千仭翠巗巗罨畫工夫在暮嵐徙倚崇臺觀未足紅輪西北月東南西堤晚眺小亭何用赤闌橋細栁新荷緑四遭落日胡床更東望碧天如水月輪高雨中移竹山人聚景作池臺移得龍孫帶雨栽頃刻雲開晴日上便教隂過酒樽來月下觀梅空明雲水碧搖沙疏影尤宜竹外斜為我殷勤謝傖父莫欵繁李玉川家倚檻觀魚魚樂江湖自不知非魚非我敢相欺巵言我不如莊惠終日觀魚只有詩繞堤種菊紛紛紅紫厭相看老境才將蔗倒餐不向四堤皆種菊風霜誰與共高寒竹間開徑翠寒深處覆蒼苔香霧霏霏晚自開從此一笻雙不借尋詩迎客幾徘徊水口聽琴幽栖長物一張琴時對清流自寫心老子興闌童子去月明懸溜有餘音獨坐投壺緑隂清晝矢鳴壺慶馬何煩用酒娛有主無賔聊一笑却呼僮僕煮臯盧登臺縱目老眼常疑萬象低憑高逺景更萋迷只從此地觀吾圃便覺江湖是小溪調白蓮仙姿皎潔映圓臺真見凌波恣意開却是圭塘宜産汝朝陽東照玉成堆調水芙蓉不花南土風宜陸地蓮移根培植不能妍世間久絶司花手却道殷韓是偶然調湖石一卷千古碧崔巍閲盡人間紫與緋老子未能兄事汝醉來聊用掛絺衣聽筝氷絃轟列倚歌輕絃外無聲却有聲我自忘情聊過耳幾人聞此發狂醒酒間得口號二十八字卯君為我鑿圭塘荆棘化為雲水鄉昨夜荷香新雨過一年勞費盡銷忘大雨兩晝夜僮屋盡仆惟軒前新竹綽有生意得二十八字以為口號一夜銀河瀉欲乾桑田幾似海漫漫岸頺牆仆吾無憾栽活蒼筤數百竿雨後觀竹乃有陻墊摧折者數叢因用前韻憶昨移栽怕雨乾豈期平地水瀰漫此君於我真無負摧折猶堪作釣竿聨句盆菊霜卉日已腓寒軋層空澄有壬大明麗若木忽自東海升熙照我衡茅下南金爛稜層有壬密葉肥晚翠疏根瘦秋鷹熙眷兹貞淑質夙著隱逸稱有壬佳名豈易得高風邈難仍熙心將東籬興迹遽華筵登有壬美人遂幽討晚歲欣得朋熙誰令頳與紫亦復相依馮有壬黃裳本元吉間色詎能勝熙頎然挺尋丈欹傾待維繩有壬植以葛陂杖資以剡溪藤熙通譜品逾百口說為爾滕有壬宗既别大小祖亦殊高曽熙濃如胭脂沁潤如酥膏凝有壬鮮如翦朝霞清如裁春氷熙肉色映蒙絺體素動砑綾有壬百疊甃碎瓊千重蹙文繒熙鶯羽乍出鷇魚鱗駢有稜有壬亭亭矗巨杯灼灼開華燈熙長身不免弱擎重嗟未能有壬摘剔留數花花損氣益增熙出竒世豈眩奪巧天應憎有壬人力固云勝物性奈失恆熙平生愧學詩多識猶儚儚有壬不如坐對之政似羅豆熙真趣漸漸得香氣浮浮蒸有壬微吟慰晚節大滕哦松丞熙有花思陶潛無酒思王𢎞有壬南陽飲潭水壽者如岡陵熙所以遁世翁有樂在曲肱有壬傲睨風露表春花我方懲熙况為養性藥服之可鶱騰有壬當年與花别待漏常雞興熙縻爵夢三徑歸田剃荒艿有壬三徑幸猶存清興聊復乘熙庶幾韋表微千載驥附蠅有壬客來涉吾圃老圃喚不譍熙灌溉瓶屢罄詠歌筆已蹭有壬身雖老瓦託氣欲南山凌熙野人富勝事行有梅繼承有壬此盟未歃血此語已服膺熙又恐遠莫移健步勞屩縢有壬孤根豈幡然遂用玉帛徴熙彼蕙樹百畝妄以多自矜有壬芳枝愧真堅恐負騷人譝熙真賞各有適蜂蝶徒􅖇􅖇有壬詩壇戰戈甲齊晉壓杞鄫熙尚憐秋如海㪺之以斗升有壬從公丐一勺臨淵劇兢兢熙至正集卷二十九
