body:
  text: 至正集卷六十六元許有壬撰誄傳解銘箴賈冀安王誄元統乙亥七月制追封太傅冀國賈忠隠公為冀安王翰林行詞盡哀極榮子和哩台泣血拜命謄詞别卷於以揚先休礪臣節有壬與之㳺為之誄曰自古有死死懼無名機来萬形惟一於貞迅霆卒發䘮匕失據有幸而免有不幸而遇結髪事君靡勞不親而媢疾不聞梟獍肆毒麟鳯斯伏侯自貽伊酷鬰抑幾時其信無涯牖下弗臧黄壚恧而天休煌煌躋公而王昔人之幸勝歟今天之始定歟彼蒼悠悠吾何訊乎子力構穫孫復詩書彼譖人者天不可誣噫嘻哀夫忠隠復菴白先生誄先生名篤學字志仁復菴其自號少倜儻既乃從名師取端友益淬礪其行業而為儒尤以孝稱致表厥宅懿行休聞闇而日章用薦為教官師道以立其子守忠為丞相掾予熟其賢知其家學之有自也庚辰赴召道任城先生挈其季子守信過於水滸年已八十若五十許人徳容粹然益有以見其有諸内者守忠為中書檢校封奉訓大夫禮部郎夀八十二卒於任城之第墓中有銘士大夫有輓予識先生而又知其子之深也其忍不有以列其遺懿乎乃為誄曰先生世秦問道至魯冠仁服義生今學古落其芬華紹厥遺緒㳙㳙之積川決孰禦孝原百行以是著稱曰惟子職胡異我閎上匪下私樹之風聲畏名名即易俗俗成不卑職教有儼臯比先覺覺後顧不在兹夷考其善豈卒不施推恩男爵儀曹是宜有徳有齒無競無遺其光莫熄其堅莫澌嗚呼哀哉鳧繹之蒼蒼汶泗之湯湯實維講學之鄉胡為一旦宰木雲慘而宿草露荒悠悠我思其能不傷然謝家之芝蘭玉樹方蔚乎其相望吁嗟先生是為不亡嗚呼哀哉馬栻傳栻字敬孚姓馬氏楚王殷之後也六世祖􅡋始居衡州安仁考灝没逾月栻始生母熊依外氏躬教以書八嵗歸族利其産將擠之於淵若有捽其背訶之者始免外祖卒無所依乃復業國初賦役繁虐避於郴族有武斷者誘之歸嗾吏繫之歎曰財累人若此苟致力於學誰能奪之以田入武斷及僧寺復如郴益肆力於學問大姓黄妻之外舅金利母趙宗室女工文辭課栻業遂精進亂後無書六經四書史漢李杜韓栁歐蘇皆手抄性至孝顛沛奔走必與母偕武斷者死始奉母歸授徒山中僧歸田不受母卒居䘮君子以合禮稱黄氏卒再娶黄氏生子熈年已四十九榜書室曰棲碧山房因自號碧山居士世味澹然惟教子是務或謂君老而子業科文不可恃也不若為小者近者曰吾兒當師天下士以昌其學君之言不敢知善飲喜客醉輒歌歸去来辭人不測也嘗語熈曰學可恃財不可恃利吾財害吾身未有利吾學而害吾身者也又曰立志以上等人自期僅得其中期其中斯為下矣又曰辨疑析理必先難者難者解餘破竹耳又曰人惡言相加能受而不校者福也平居見饑者必輟飯食之故又語熈曰人能即此而推之仁不可勝用矣年七十八以疾終有漫録二十卷棄肋四卷熈學邃而長於文君子人也孫塈塾墾皆業儒贊曰士砥行立名惟篤於自信毅不可奪者能之貪夫攫人物卒卒恐後有舉而委諸人者乎學以成巳父師有不能致力者焉若夫孑然自㧞於蓬藋之中翹然躋隆於松柏之表非生質之美濟以定力能若是耶栻以遺腹子間闗連蹇而卒為醇儒其訓子之言可書而誦也太史公謂巖穴之士名堙沒而不稱非附青雲之士惡能施於後世有壬不足附以施於後世然其行若言則可傳必矣可不傳乎惟一解有為軒岐之學者黄其姓鑑其名明善其字世儀真仕鄂家焉資其藝習其来乃諉余曰鑑不敢墜世業而性喜道師鍊師談君自然若有所得師以惟一號鑑幸勵以辭吁君精於醫道不在醫乎不通乎天地隂陽非醫也通乎天地隂陽矣道有加於是者乎且受之而師何哉不而師問而余問也請益切援韓子告文暢師例為之解曰惟精惟一聖人傳道心法也是未易言也而師語子固不在是也其亦示其慌惚有象有物者使子守之不失以為一耶將使始終信之不令他適以畔其道耶余皆不可知以余知者告子書曰徳惟一動罔不吉以徳而言踐履之實也主一而言操徳之要也實者得於心要者致其力而中實樞紐乎敬焉主一無適之謂也識察之真操持之久不二以二不參以三推乎一本而萬殊之理通明乎一理而萬事之分立一之道於是乎至矣若夫他又有所謂一者君其問諸自然可齋解庚辰春約同年揚全州廷鎮逰衡山期於渌口廷鎮至不爽日且與其里人江珍伯俱既歸復送予湘潭廷鎮曰珍伯有書室額以可齋希一言以暢厥㫖又詳其居處以曉余齋有廷鎮銘剖析無餘藴矣言不必復贅也而珍伯請益堅乃謂之解曰字書反叵為可而有數義正言之可者否之對也旁言之可者僅可而有所未足之義也書之試可乃巳者不可曰可也而馬少㳺所謂鄉里稱善人斯可者則又自足之謂也珍伯之可將奚取訓其自足之謂乎士唯學不可以自足外乎學則患於不知足肥甘輕煖不足於口體聲音采色不足於耳目富貴利達不足於心志其有命而儌倖萬一滔滔者皆是也珍伯出從縉紳先生逰退則屐焉而山舟焉而溪杖焉而田園泉石之清姸亭榭之靚深不惟自樂而亦以樂人客至雅歌琴碁寓於物不膠於物隨其所寓未嘗求備焉可謂自足者矣老子曰知足不辱珍伯其有見於此乎則亦庶乎其可矣頥樂堂銘琅琊劉瓚文瑞官第四品其翁封秘書少監年今九十二母田氏彭城郡君八十有六余同年張内翰夢臣名其堂曰頥樂記序歌詩稱道瑞慶者至矣求余言無所容喙然彼頌也予掇諸公之棄為銘以規文瑞之後焉銘曰民之鮮能夀臻期頥偕老而夀亦孔之㣲康寧備福子復顯融乃髙我門乃疏郡封曰頥取象口輔是形何以養之滫瀡惟馨口體之奉兹惟小哉自養有徳厥慶乃来三釜及樂矧均華貴匪爵之榮伊徳之契抵巇偶獲謂已當爾作墉不基旋踵斯圮翁之有夀大實畀之翁之有樂子實致之不寧唯今尚論其繼支百来仍欲悉昌熾導其適從惟公是則無源不流無稼不穡墜懲燎毛慎劇履氷匪頌而翁唯朂爾承王安新録事白屋銘懐慶録事安陽王君安新既入仕尚扁其室曰白屋郡人許有壬為之銘曰士未一命圭竇蓽門曰惟白屋名實斯存彼淺丈夫青紫偶及旦髙其閎夕華其室古有晏子湫隘惟寧爰得爽塏卒不願更我樂我土我安我居青衫自新吾則故吾惟此一屋仍昔之白屋既昔屋名胡庸革我思古人於子見之清風百年視此銘詩介軒銘鎮陽石君事親孝親終遂不仕自號介軒余嘉其志為之銘曰悔吝無憂三公不易士志於斯是為定力尫攘徇欲猶水流溼孰柔能強孰懦能立我非世違轉則匪石萬鍾何加鼠腐遑惜人虞其過謂義為激我銘其軒方勵不及達齋銘姜君善輔世賞為監當官仕優而學扁齋曰達予既書扁且銘其右以朂其不及焉銘曰古士為學力於巳充而達而號何哉爾從質直好義察言觀色卑以自牧始終務實師也有疾聖人藥之曰求必聞似是實非鄒書亦云道在不離兹古之人勉於得志而達而號宜求諸身色取行違乃陷於聞有誠有偽學貴明辨道修徳孚天下兼善巳千齋銘為莱山書院山長張子玉作逸足駿奔不息可追有髙戾天我則數飛為山未成幾萬其簣宿舂之途贏糧以嵗世雖千載地雖千里我力於斯不遠伊邇孰柔不立孰愚不移達或未遇魯乃得之由千而萬唯一於敬我銘於齋希賢希聖時敏齋銘為龍敏夫作寸隂是惜終食無違大聖且爾我何人斯一間或易將抵其巇一息苟怠有乗其機泝流之篙力豈容弛為山之簣進不可止易著自強詩稱不已念兹在兹作聖兹始節愛堂銘為呉真翁作道千乗國節用愛人惟束於位其膏以屯斯道之要吾實洞燭不爽於邦以潤於屋揆入制出嵗常有餘飫我臧獲及我農夫一堂之春陶冶餘慶身修家齊是亦為政滋溪書堂銘為伯修蘇參政作聖遠教㣲道寓方䇿􅍥而求之舍㧞則獲維書維道維地維人弗肩我力曷裕我昆睠兹貽謀不邇伊逖一徑别墅三楹考室四世營度制弗加崇簡貤牘増山儲海容不寧遺安利博且厚徳基以植仁宅以構復壁玩物營塢積金蚩蚩之人亦獨何心滋溪湯湯有源有委進於盈科不海不止立本於書亦監於溪美哉斯室支百攸躋守約齋銘孟傳孔道三聖以承孟舍何人乃謂似曽因之養勇無懼為主擬非等倫氣象是取不能必勝是亦得要守氣一身寧久無暴反身循理是為守約猶網在綱猶機度括循循善誘亦惟以禮推而施博能事畢矣彰徳路刻漏銘燕呉秉彛守相舉墜理棼朞月就緒身施於政殆無遺者器闗乎治復有資焉惟相地劇民夥晨昏有禁鐘鼓之吏候驗以臆公私趨事遲速無節過悞滋敝吏則非矣亦由無所考質而至於斯也資糧屝履前政是急正儀審漏有不暇焉呉侯懼事之墮人之痌也旁諏其制則而治之八壺既陳一刻無忒屬銘於郡人許有壬以彰其勩以朂其繼以永其制吁可以觀政矣銘曰在昔觀漏水而制器也實惟羲皇開物混茫蒼姬秩職挈壺始彰興居無節瞿瞿刺狂沿襲曠代不胥以亡損益戾貞寒暑乖方制昧洪殺景差短長爰折其衷咨冶孔良金壺儲精玉虯引吭委於尾閭原於天潢盈科線出激電矢卬允符儀晷無間雨暘流珠適用聚柝靡亢析因夷隩安時吉康昏明示信率猶天常信則民立我治以臧焯茲永憲嗣罔不蘉亦山堂銘贈江淛行省參知政事北山徐公吾鄉之耆英也叔子漢臣掾中書以兄周臣入為參議改他官名與秩日起拜御史出僉兩道皆有聲周臣卒無子棄官歸經理其家且以子後之先塋久不治樹築有加表碣儀物礱石林立凡周臣賫志地下者舉畢之可謂能子弟矣遷浙西道以母老不赴日相過從承示伯生虞學士所為亦山堂記乃知漢臣抒義北山而自號亦山請益唯謹漢臣孝於親弟於兄根本既立而又有伯生之文蔑以益之矣辭不獲乃為之銘曰繄士為學奚假外求世美克濟厥徳允修家有餘師巗巗在前重厚其體振古不遷含雲蓄雨利澤由施在人取象子孫以之止而有容器車攸出皇皇乗軺以嗣以續吾翁此山吾亦此山於羮於墻有儼堂顔師不在人乃在吾翁義不在山乃在吾躬隐鄙捷徑産戒興寳跬歩或違壑譏峰誚朂哉繼志毋虧一簣山亦子名人亦子畏四友齋銘董君復初作小齋植松竹梅菊扁曰四友徴言於予復初出華族當盛年躋膴仕而能取卉物之清貞芳潔以寓其閒遠沖澹之趣其有所見乎京俗方締築栽植扇為芬華予知復初之不流於㳺也為之銘曰惟士取友責善輔仁况有損益慎擇在人古稱四友班班載籍或文或行或正或昵悉資於人豈物之求物有芳貞君子是猶貞猶吾操芳猶吾徳惟警則至惟玩則忒故觀於松也則知秦封之汚觀於竹也則懲晉狂之非梅當致商書和羮之用菊當繼宗賢晚節之詩則是四物豈特為吾之友實足以為吾之師苟不是求而酣娯之於其側則花中十友駢集於其室雖多亦奚以為剛齋銘地官主司觀君志能扁齋曰剛諸公剖析幾盡安陽許有壬發其未盡之義銘之曰惟士尚志志統乎氣曰惟至大剛實與配陽健為美隂柔則戾君子小人一反而異世方同軌笑言嘔嘔害則鼠竄利則水趨惟是為人流弊何極居而䘮徳出而誤國聖人有嘆未見其人慾焉得剛一語萬鈞桂林佐幕已見行事豈曰吾非吾剛未至珍重鄒書異辭同義直養無害充塞天地求志齋銘為徐君如周作相古先民學有體用用行舍藏時止時動動非人為止乃天謀隠不放言唯志之求厥求伊何於以守道達而兼善我志允蹈𤣥聖有惻未見其人伊吕不生斯理豈泯眇身堪輿道無不在物兼本末養交内外曰惟顔子亦庶乎此顔何人哉希之則是懋徳銘遼省參預尚虞仲字其左轄之子邁格曰懋徳懋徳介其友翰林國史譯掾呼圖克布哈希請其說於予予惟書言懋徳者六四主乎君而二主乎臣虞仲其汎言乎亦有適乎予昔長中書虞仲實西曹掾今亡矣無從問之希顔請不已乃為之箴曰予懋乃徳舜嘉伯禹懋敬懋昭實為湯語畢之於康冏之於穆一稱其績一資其朂至於懋官盖試以庸六事雖異而辭則同今也懋徳將焉適從惟士為學勉則有功況得於天虛靈不昧以其衆理以應萬事力苟不勉得且失之惕乎其戒確乎其持修而能復毋間一息進進有積是為成徳勿言懋官但修天爵人爵其從来不可遏伊虺畢冏事君允諧嗟嗟後覺爾尚懋哉至正集卷六十六
