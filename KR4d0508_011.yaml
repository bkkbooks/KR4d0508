body:
  text: 至正集卷十一元許有壬撰古詩七言二十四首簇蠶次明初韻上虞雨濕密用苫旁欲風透薄代廉夫桑何暇窺青簾婦飼已竟圓缺蟾蠕蠕掉頭與葉黏知欲作繭尋歸潛蒿薪玲瓏三日覘婦報姑喜喧風簷亭亭圍繳仍合尖行見絮帛周蒼黔拆曬併摘不可掩金銀堆積疑神仙鬻銘笑我無一縑構榖次明初韻衰容逐人到髮齒方知學稼歸洹水長安索米久招愆種粟而食今年始闕里率人以勤常早起一耕六杷不信耳闕首尾清泉淘種擇堅栗方斗流珠無壅底隴分不密亦不疏牛行戒遲復戒止何勞促促躡浮壤尺許石輪堪任使老農作勞滕口觜邀犒吾尊有春蟻黃埸細潤種及時一榖定得三千米江南多水稼下地秧稻若針青若洗深泥分插苦胼胝幸汝勞耘不勞耔鏺麥次明初韻南薰掃淨梅雨天漲雲一夕黃滿川摘鮮已漸入春磨便覺喜氣浮炊煙老農促收急星火逺客駭觀輟簡編如爭如竊窮日力辨器利便收功全壯夫舞釤曝將稿飢婦念餅喜欲顛風聲槭槭入箕斂刃光爍爍隨周旋丈餘荆籠附輪腳自牽猶勝為人牽一人日了二十畝少年鼓勇方無前大車繼運入場圃幸免荷擔頳人肩又虞化蛾迫碾治田家苦海無中邊嗟豫素餐未少報繁文署手空成胼觀農揣已發深愧顔如渥赭心如煎便當沽酒與農飲有麥不患囊無錢一百五日簡郭子敬祭酒小桃沐露紅娉婷垂楊梳煙翠鬅鬙一百五日好風景尋常萬事如春冰但尋祭酒時飲酒莫似左丞徒負丞提壺多情日喚我我耳不聾難不譍再用前韻春如時女矜娉婷老夫短髮憐鬅鬙惜春乃值春見笑好惡何啻炭與冰詩不能形欲求畫世無髙人王右丞春毋自恃行亦暮賴有幽鳥呼能譍和郭子敬春寒述懷韻白虛光憐天無月水玉不受昆刀切東風花事尚未遑且辦人間三尺雪玄𡨕功成宜勇退底事不與青皇别敢將餘力抗發生坐使瑶琴聽絃折凝陰頑守晛難消鍾作冰山橫嶻㠔樵蘇路斷但僵卧土銼蕭條晨未爇豳詩曾著二之日氣候此時當栗烈如何春已三去一不教解凍為澄徹鴻鴈流離久斷魂犬鼠紛紜方蹀血庇寒誰為拓廣厦效用何嘗儲木屑遂令赤子走林林一食莫充衣百結我知老子昔乘軺躬撫瘡痍扶廢蹩天上賢關莫滯留夢中牧笛聞嗚咽抗章一旦達九重吾年如此吾才竭榮華過眼固如雲惻隱根心寧似鐵宵人投劾得過從自信飲冰無內熱曾噓鄒律向燕谷弱步豐扛笑癡絶吾廬受凍乃所甘深幸調元有夔卨行看民物囿泰和肯使陰陽變妖孽山林嵗晚任荒涼却許松筠堅老節麥飯和明初韻瓶儲方歎無一粒有穬爭先登烈日穫而修治勞婦姑滑軟甘香過棗栗山人不辨異味重空齋飢吟坐髙舂一盂口分遂一飽功與薄持牢九同從今不歎魚生釡啼飢之人亦楚楚犂鋤臼杵出艱難猶勝無功索紅腐一人之飢猶我飢窮達有命天何疑可憐李嶽苦射利忍不分惠從施糜徽陵不灑董宣死因笑人生聊復爾休誇方丈具八珍至美中間有鈎餌不能不食如飛仙揣分亦不煩四籩但期雨暘致時若坐見四海均康年君不見何平叔湯餅汗流愧盈腹又不見吉士瞻夢欲徼祿充其􅑄豈知賦豫分薄厚強顔過望那能久吾園更有芋魁肥未許膏梁專恱口次白公嚴留題乾寧寺壁間韻因以寄之人間一棲不二雄山間寧食三斗菘夷神委命政不惡底用咄咄時書空翟公苦溢遂謝客自有佳人寫胸臆碧雲乂向瑶海飛老懷獨與秋寬窄瘦馬圖當年體如韓幹畫匹練吳門光照夜沙場鐵甲百戰功名都玉勒千金價而今身到伏櫪時可憐駿骨寒羸錐北風驕嘶一振鬛雄姿猛氣仍權奇盛殫其力衰忍棄主人有德宜終惠莫教百菣逢一菽食不盡材辱奴𨽻明年芳草春茸茸一旦充澤如遊龍龍兮雖老志不老猶能引導齊桓公李惟中學士自西臺侍御召入以未央宫瓦硯為貺作此謝之漢家作宫法紫微金鋪玉戶明華披甄宫陶瓦極能事鉛丹細搗咸陽泥一朝神雀去不返秋風黍稷驚離離谷陵且變此宜盡一二時出農夫犂人間購求作珍玩洗刷篆籀分毫釐西臺執法好事者礱磨為硯尤瑰奇體呈金璧徑尺許沼開新月才一眉堅如鐵石潤如玉墨聲瑟瑟松風吹惠然匣送感髙義但惜所與非所宜公才真是謫仙裔善事利器方相資嗟豫蕪學忝詞館雖有此器無能為世傳銅雀亦佳品搜刔黃壤今無遺髙皇垂統四百載老瞞何物敢等夷愛人屋上烏亦好况此適用逾端溪禇生毛穎賀得友坐令几案增光輝代言揮制固多愧玉堂風月猶能詩覃懷衡彥舉先生蓄李伯時九駿圖山谷題其後遊金陵傳觀淪失者二十年其子公輔良佐為掾京師購而復得求豫為詩衡公得畫世所無江湖常與琅函俱一朝羽化不知處扼腕拊髀時嗟吁翁有佳兒嗣弓冶直教合浦終還珠鬼神訶護二十載絹素無損仍無汙展圖知是伯時筆題品况有涪翁書羣龍雜遝各異態蔽虧回折分錙銖開元曹霸曾有此揄揚復得杜與蘇雄辭不泯畫已滅人間駑驥方齊驅獨憐洗玉池邊月還照當時九駿圖題蕪湖東川夏嗣德紅塵疏處紅塵可厭無處無山林差勝城市居有人營葺得佳地不求與密惟求疏天之蒼蒼豈正色野馬生物均以息誰言是氣不是塵政自混茫無所極問之山人初不知但言吾廬吾愛之清泉漱石風掃地纎翳不許緇吾衣東華軟紅髙十丈烏帽衝蒙憐俗狀不教疏處著疏慵日暮碧雲空悵望送朱公衡赴曲靖儒學教諭分題得點蒼山點蒼山髙幾千尺上有皚皚太古雪晝日無光爍不消遂令仲通坐失律我元肅殺中有春金戈一指凝陰釋巉巖天險成坦途區區段氏安能國百年恩德化狙獷文教涵濡有今日若人蚤負跌宕氣秦蜀家詔皆轍迹子長因欲窮幽奇不是中華容不得滇庠弦誦聲洋洋當時臯比僅半席渡瀘跋涉二十載一袍才似蒼山碧蒼山境勝行有詩便風慰我長相憶劉竹溪手植松歌安城竹溪劉先生兒時植松屋西今百五十年亭亭入雲矣曾孫志雲繪為圖徵言於豫志雲孝弟著於鄉精藝聞于時觀其松論其世其樹德者乎為之歌曰世方植槿務速滋種松待長知幾時槿花朝開暮即落松也動是千年期有人不作淺近計眼前便立雲仍基當時入土等豪末灌溉培護如嬰兒爾來一百五十載黑雲千尺寒參差勤劬封植已四世邱山深閟梁棟姿樹猶如此不用歎竹溪挺特羅孫枝老夫結茒太行下手開三徑勞鋤治有時松陰獨箕踞坐受瑟瑟清風吹因君此卷增感慨田園荒盡不賦歸來辭送吳雄甫赴肇慶經厯毗陵吳君雄甫蚤以藝受知當途出官福清州判官丁父憂不赴再調肇慶路經厯將之官請言於豫豫聞雄甫多藝尤長於龜卜即其所長歌以為贈天生神物聖所諶廬江貢後傳嘉林三王雖異理不異世逺誰復鈎其深楮先生者穢遷史乃欲㪺海歸蹄涔宋元衛平等俳謔那識聖賢天地心遂令舉世信矇瞽瓦石篿筳總能語豈知是理固有在曵尾泥塗誰探取有人學古知造端造荆不離行李間縉紳簪纓日滿座想像季主居長安黃麻又長端州幕緑水紅蓮殊不惡我知枯骨初無情萬事來前任紛錯臨岐一言子識之勿舍靈龜觀朵頥况復前賢有令躅三年一硯不持歸題王公儼雲松巢公儼今為山東廉使因寄之鴻荒無屋人巢居有屋不處端何如應嫌華麗欲返朴擇地更取髙而孤雲兮無心偶出岫太空浩蕩隨卷舒不為白衣變蒼狗宿留乃因髯大夫有人目得敻絶處致身此地如匡廬龜荷燕幕皆寓爾人間大厦從渠渠雲將行雨松且棟經營豫手良拮據厯下亭前好煙水故巢何日當歸歟餞彭大年真人代祠東嶽東海登太山小天下觀於海難為水吾師分香出黼扆岱宗東海在秩祀宸衷所及皆繁祉人間無物不沾被代祠茂典即竣事餘力應能究斯理峻極於天濶無涘升髙望洋竟何止莫論儒道有同異歸來試為吾舉似師毋吾靳憤吾啓要效涓埃報天子贈上人潤玉巖雪峰鷲嶺雄振古孱顔萬仞知何處宗門秀拔見玉岩不作山林在城府斯巖非石亦非土出自崑岡與玄圃即之溫潤磨不磷况復虛中納天宇人間標榜特寓爾身猶長物誰其主吾黨楊君廷鎮甫談禪長舌能覼縷萬法不似今有侣一真獨為吾師露又當聽我扣巖扉清風習習生談麈題劉文廷博士山水圖時方赴江西儒學提舉山人有山不容住成均幾年司律度愛山鎮日對畫圖一旦捲山遂同去人生有夢皆槐安我夢但在林泉間東華塵土西江水振衣細看青孱顔揚州騎鶴天不靳歸來仍佩文臺印滕王閣上雨晴時風煙觸目家山近蹇豫夙志在匡廬孔賔更有人相呼江山如此不勇往空羡劉家水墨圖宣政管勾黃仲綱居庸關奉迎有長句次其韻少年逸志輕奔走詩到居庸劇滕口往來倐爾四十年生對青山成白首洪荒有此森崔嵬雄勢逺挾祁連來想當草昧度兵甲立鼓元氣為風雷國家不恃山溪固汪濊龎恩均北戶此關設險由自然中開一線朝天路玉峯巖巖明晚晴下有琴峽流清泠梵宫新塔助偉觀宦遊陳迹傷多情平生北門與西掖何補蒼生百萬億烏臺適值柏繁霜白簡深慙筆無力瑞雲五色從六龍霓旌淡蕩搖祥風從官契濶又半載相見盡訝增衰容衰容已分妍作醜碌碌尚隨人十九不須門下戀三升賜觴已沃黃封酒題金岥圖用原功韻道人持畫來求題老子勞形日無暇今朝在告始展觀拈筆因之自陶寫平生性僻苦愛山歸夢時到長松下况兹金岥是仙境歌詩洋洋播華夏四時佳景列清供千里餘青入平野老檜長松有典刑瑶草碧桃無艷冶何當掣脫浮名鞿六月寒泉看飛灑興來為草步虛辭楚語猶能追變雅有山不歸空玩圖可笑吾儕無健者蒙莊逺意寓鯤鵬危言莫究程生馬題明皇按樂十眉圖次明初韻深宫肇亂胡旋舞孝經注後攻樂譜國經由是日陵遲蒼生憂樂忘察眉察眉文具寬大詔寤寐妖顰如窈窕麝煤螺黛一爭妍香䀶盡是危亡兆半天錦繡明驪山翠盤雙袖縈弓彎隋家長蛾我龜鑑兹乃十倍來承顔三千佳麗無一可有一於人足為禍如何叢斧伐乾坤馴致君臣盡逋播雨鈴腸斷非管絃才憶曲江曾直言旋聞追念復入畫欲心尚未澄其原穠華滿眼一鼓下英皇不見山徒赭粧成豈欲事他人棧道君王騾代馬歸來悽惻望都門橫雲却月誰生存等間頥指在李父太上僅得虛名尊古今治亂翻覆手穆王更詫西王母遂令健婦把鋤犂幾處耘耔廢十耦大慈壞壁貌不揚斷縑示戒留餘香蜀師胡不寫淚粧九原擬問蘇賢良僮屋為大雨所仆歌豐安坊西李氏宅締構甲子逾周天我歸我里却無屋割金僦居今七年中堂堅完遂龜縮傍舍草苃繩樞然諸僮環處數百趾分房戢戢蜂巢聮旱乾跨嵗三百日縱雨簷溜才涓涓伊誰賈勇恣傾瀉通衢一夕流為川坐令闔郡若一室藩籬剖決無中邊朝來異響忽震地連杗接棟皆傾顛抉泥出嬰幸免死庖厨竟日寒無煙昔知將覆不早治今日至此誰之愆萬間初欲及寒士此心已負歸宜遄家僮瑣瑣不能芘庭荒况説治其田作詩自笑實自愧敢效茅屋秋風萹嘉蓮歌次可行韻相攸西郭濵吾洹老病宜退非遺賢平生竊慕君子德池上種竹池中蓮蓮兮胡獨出奇異聮房蕊簇金絲鬈二妃同體面目異七澤移種根株連書祥史籍見厯厯走觀士女來闐闐人言培植久方盛一泓疏鑿未及年自知不作駭俗事兹焉誰握生發權形容敢勝周子説胚腪又在太極前亭亭照影欲輕舉凌波微步俱清便倦遊夢不到玉井歸來老屋安一㕓小池偶爾剃蕪薉池上敝亭木數椽酒從鄰貰已多債詩取意適誰令傳天公特與慰岑寂嘉瑞湧出如原泉卯君有倡阿買和僮歌况復清且綿欲為表頌僣歸美奈此懶痼誰能痊豫心真樂更多有傍花隨柳在前川至正集卷十一
