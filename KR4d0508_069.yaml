body:
  text: 至正集卷七十元許有壬撰詔制表箋疏啓命相詔視草上命眷命皇帝聖㫖洪惟祖宗遺大投艱于朕雖繼志不忘乎夕惕而圖功未底於時雍方今承平日久玩愒是懲中統至元而後暨朕踐阼以來播告申嚴良法具在而所司廢格上下因循馴至吏弊日深黔黎益困豈總於上者不專其任應于下者不能不戾歟若稽隆古之規惟重一相之選事機有統治具斯張中書左丞相伯勒齊爾布哈練逹古今揚歷中外忠貞久孚於王室寅亮已著於天工揆諸輿言實豫良弼今特命為開府儀同三司上柱國録軍國重事中書右丞相監修國史領經筵事董正百司修明庶務以端政本以厚生民易風俗之澆漓振綱維之弛縱首隆倚注力事率興表獨運於泰階新羣聼於涣號敢有隔越奏請中書政務者以違制論於戲凡我有官君子食朕祿而治政事者其各竭爾力殫爾誠以資佐理以副朕求治之至意故兹詔示想宜知悉贈攄忠宣力崇德守正功臣太師開府儀同三司右丞相知樞密院事西域親軍都指揮使上柱國圖固勒布哈追封永平王諡惠穆制東藩扈戰駿功已效於妙齡上爵推恩恤典宜增於沒世况生子方隆於柄用而易名可緩於褒崇具官某質禀竒英器推雄厚載考家聲之舊實基天造之初武校搜田念民饑而反斾秩隆內帑節國用以豐財報上以誠隨地而見致九重之遣使續萬命於更生蠢兹朔漠之震驚敢煩天討允矣天庭之練習實在戎行破勍敵而言旋辭厚賞而弗受讜言方進良材遽摧緬兹遺烈之若存爰質彛章而弗愧師垣進職示國家酬德之公異姓追王為臣子立功之勸永平王妻大都格加封永平王太夫人制疏王封而隱卒既砥礪其臣忠從夫貴以發滎用規繩於婦道某夙生淑德早配名門起家從儉素之風教子盡憂勤之力金幣昔觀其峻却遺訓克承衮圭今致於奮庸世勳益著傳芳有自錫命是宜伉儷雖均鶴髮擅人間之福幽明何間鳯毛炳池上之輝賀天壽節表遼州氣新天宇惠風廣吹萬之仁電繞斗樞華旦應重三之數祥開泰運慶衍洪圖中賀欽惟皇帝陛下允武允文克勤克儉柔遠自形於干羽守成專務於詩書綏萬邦屢豐年寰宇適泰登之世釐百工熙庶績賢才又大比之時躋民物於春臺納乾坤於夀域洪纎被澤逖邇騰歡某等職守一麾心馳千里録陳金鑑阻從稷契之班頌刻玉杯願祝松喬之算册皇太子賀皇帝表遼州主鬯承祧一索首推乎出震顯謨啓後兩明足繼乎重離位正前星恩均率土中賀欽惟皇帝陛下武能靖亂文克守成奄四海之大以作君為萬世之計而傳子眚災肆赦典刑薄五宥之恩賦稅寬征仁政寓九條之詔纂鴻休於祖訓詒燕翼之孫謀神器有歸皇基益固臣某等幸叨下郡莫罄歡誠日重光月重輪盛德已昭於雅奏書同文車同軌寰區永底於隆平賀登寶位表山北廉訪司出震承祧夙著重華之至行體乾繼統誕昭萬世之常經品物皆春神人胥慶中賀欽惟皇帝陛下聖由天縱敬克日躋尊太后稱太皇首明孝治任舊臣遵舊典益固皇圖深仁溥五宥之恩新政布七條之詔人心同乎舞獸神器安于覆盂綱紀修明規模宏遠臣某等叨居憲職幸際昌期日之升月之恆永接無窮之緒天所覆地所載悉歌有道之期賀太皇太后加尊號表山北亷訪司位正三朝極今古隆親之道文加二太見聖明報本之心慶集慈闈光增縟典中賀欽惟尊號補天著績夢日開祥贊燕翼之嘉謨際龍飛之昌運為天下母挈神器而置諸安契上帝心有大德而得其壽惟原柢之深茂宜位號之崇尊臣某等忝列清班阻陪盛禮徽音徽德幾年深教育之恩文子文孫萬世繼怡愈之養賀改元表山北亷訪司躬成大禮煥十二章備物之儀數紀初元張萬億嵗太平之本寰區均慶寶厯用彰中賀欽惟皇帝陛下輝光日新智勇天錫行封贈而勸臣下率興稷契之心蠲租稅以厚民生隆復唐虞之化無匹夫不得其所謂至治誠在此時名與實符事皆道協臣某等班違拜舞職忝澄清和氣祥風舉世咸陶於元造秋霜烈日微忱敢竭於精忠賀正旦表山北亷訪司春首四時鳯厯正三陽之序王大一統鴻基衍萬世之休懸政不愆履端伊始中賀欽惟皇帝陛下中和致理仁孝承先乾坤咸囿乎雍熙謨烈益祗于承顯奮英斷而端本風霆寓生物之心乘大明以御天日月焕敷文之治惟憲綱之力振尤祖訓之恪遵運際期昌恩均率土臣某等叨陪烏府阻序紫宸豐以祿榮以官懼莫效毫釐之報長如川峻如嶽願益恢宏遠之規承召病不能赴謝表具位臣許有壬謹言准中書省咨為臣有壬辭職欽奉聖㫖節該依舊勾當裏行者欽此伏以政府無功方擬復兔園之業使華將命洊令聨鳯沼之班撫已多慚陳情有請臣有壬誠惶誠恐稽首頓首竊惟乾坤定而貴賤位上下辨而禮義明或令或行有綱有紀惟臣有聞召不俟駕之義惟君有在病而豫告之仁是蓋察臣子之至情于以示天地之大德古而歷舉今亦多聞如臣有壬者猥以寒微冒登科第夙蒙殊渥兩參預於中書遄奉德音遂綱維於左轄固辭不獲黽勉以承若臨淵而履氷猶挾山以超海侵尋十載已昭績用之弗成瞻望九重乃宥迂疏而不責况以持身未至訓弟有乖不能儀刑于一家詎可輔毗於大政謝事以退明日遂行不謂遽徹宸聰遠承天寵紫衣傳詔既灼示於新恩白首拜嘉俾尚仍於舊貫臣有壬自辭職以來行藏雖決憂畏彌深思先臣松梓之墟復興至念以微臣蒲栁之質因致沉疴是以聞命戰兢仰天惕厲捐身固係乎臣職乞骸蓋屬乎君恩精力日衰報效弗加於犬馬材能輩出都俞方協於鳯麟固宜揣分以避真才求醫以延殘喘瀝忱至此負罪謂何兹蓋伏遇皇帝陛下克寬克仁無偏無黨經筵時御講明法祖之宏規聖學日新揚厲光前之偉績神武而不殺廣大以有容春育海涵天覆地載無一夫不被其澤使萬物各遂其生以至樗櫟之材亦均雨露之潤伏望益推曠蕩遠燭隱微察臣戅直而勿欺憐臣衰憊而實病放歸田里俾為盛世之逸民感寓聲詩願繼康衢之順則臣有壬無任瞻天仰聖激切屏營之至册皇太子賀皇太后箋遼州聖資備德徽音允著於思齊謀重詒孫盛典式遵於燕翼得名既正錫慶惟均中賀敬惟尊號寶厯承祥銀潢衍派以天下之本在太子佐聖君之治於內朝建嫡以定人心為億兆姓生靈之計主器而安宗祏啓千萬年社稷之休是雖睿算之難侔實自慈闈之有助臣某等職叨一郡歡倍羣情孝奉怡愈至養已兼於逢吉模恢宏遠皇圖益進於無疆賀皇太子箋遼州主器莫若長子宗祧衍奕葉之休繼明以照四方化日協重光之象誕膺顯命永視宏規中賀欽惟皇太子殿下睿哲在躬妙美居質夙著問安之孝宜承監國之權甲觀開祥和順英華備至德青宫翼善左右前後皆正人民生咸遂於春臺國祚益培於磐石臣某等忝分西郡阻賀東朝定本正名已接萬年之統上賢尊德行躋三代之隆正旦賀皇太后箋遼州祥開寶厯陽春均播於人間位正宸闈至養巳隆於天下有生咸遂無物不新中賀敬惟尊號勤儉聿修仁明夙著禀懿行而符坤順嗣徽音以致泰和靖難守成默贊吾君之治奉先迪後永為聖代之規德與日以俱升慶如川之方至臣某等沗司外郡阻賀內朝五福躬全久底期頥之夀萬年天啓益隆洪逺之圖賀千秋箋山北亷訪司大鈞播物四陽應節於中和少海澄波萬象涵休於潤澤慶關宗社喜溢神人中賀欽惟皇太子殿下性禀慈仁躬行孝弟本既立而天下以定名一正而神器有歸機務總裁贊聖明之政教言辭告誡聳臣庶之觀瞻接大統於無窮囿寰區於至治臣某等職叨持憲賀阻班庭監國撫軍九有方隆於付託參天兩地千齡允洽乎雍熙擬韓堅降授後謝表守東通州明初有擬謫韓堅制戲而甚佳因亦擬此年月日臣某降授炎州團練副使火山軍安置者臣伏以天道分消長之斯違天者蓋不可逭水利在通塞之際行水者是宜有辭顧坤隂素禀於冥頑而春陽遂稽於融釋平生清苦嘗與蘗俱僻地孤貞肯隨羔獻魚已負而未使之出狐既渡而益肆其妖馴致其來非自作於不靖好生之洽乃特見於惟輕薄示鐫移盡寬爍鑿兹蓋伏遇皇帝陛下正位凝命順天應人知其頗重厚而無心况亦因喜怒而致罪長萬里厚三丈未至於斯緩三尺削數階已適其抵然單辭乃往聖之戒而旁逮非釋巳之私解釋東風何遙遙而不至沍連北陸故皎皎以自持罰也各有所歸臣乃獨受其坐身投遠裔其何以辭言出至情亦所不免始凝而至初心雖悔於履霜不密之愆餘忿敢形於雨雹昔我履者甚若臨淵今身及之殆如入甕火山熾烈已甘澌燼之無餘凌室深寒尚冀收藏之有待修喬江書院疏道無遠邇猶水泉之行地中時有晦明如日月之在天上蓋人心或昧於物欲而天常豈間乎智愚建學使教育之有歸立師使知覺之有自若稽隆古遍閭巷與國都爰及聖朝由路府而州縣惟鄼鄙聼衆以興廢故庠序視人而有無斯民本堯舜之民何地非鄒魯之地喬江書院者經始宋季再建國初臯比之座既虛伊吾之聲遂絶星霜變易宛有故基風雨傾頺鞠為茂草義士窘於獨力學者嘆其無從主領黃文復先生以篤古為人師以興廢為己任買田築館弗遑寧居問道傳經漸知矜式一簣不止則九仞有終丈席僅完而萬間未構十室必有忠信况連袵之成帷衆流可為江河看盈科而放海將見風移俗易薰晉鄙而皆善良義重利輕化齊民而出俊傑共成盛事側佇羣賢霸州創建老泉書院疏霸州即文安縣在今畿甸之內老泉蘇先生主簿是邑湖廣儒學提舉李元鎮先生世居此土欲即其地創老泉書院以祠三蘇割己田二頃以奉祀事然先聖殿廡師生堂舍規模粗定未底落成且欲買經籍作樓庋之而其費不資當世公卿好義君子必有能相其成者伏以尸而祝社而稷蓋以章盛德之人術有序黨有庠是又育英才之地且君子所過者化寒暄未變其流風况文章可得而聞星日照垂於奕世故必有追古淑今之舉庶可為移風易俗之基眷此文安近居畿甸在昔有宋作簿曰蘇邃學雄辭冠當時而獨立髙標餘韵儼今日之猶存權論何嫌乎說兵辨姦有係於匡世一門忠義前後無倫二子聲名遐邇同著彼黃有東坡之位而筠立子由之祠天下知侈於幾區大老獨遺於此土典實明時之缺責其吾輩之歸湖廣儒學提舉李元鎮先生倜儻俊才浮沉冷職著書早徹於宸聽作事無愧於古人栖棘懷賢發三百年之浩歎維桑感義念六七世之故鄉慨然任草創之勞茫乎若綿蕝之設披荆棘構祠宇雖負郭二頃之巳捐市典籍闡黌宫正為山九仞之伊始宏規須倣四書院多助必藉諸名賢道域既恢義孰斯啓寒泉秋菊薦眉山父子之堂春誦夏絃興皇元俊造之士共成盛事肅俟芳題上右丞相啓伏以統百官以掌邦治方求連茹之征報一飯而辭大臣况遘采薪之疾在心有藴因言以宣竊惟涉巨川必待於蒸徒構大厦不遺於小木是以公卿之論道貴乎陪二之得人非藉真才曷毗大政苟有知非而求志亦當行恕以包荒恭惟右丞相閣下大手補天竒功蓋世負兩間之重大佩四海之安危豈惟救弊於一時蓋欲躋隆於三代奮庸實效名爵重而倉庫充報主誠心天地知而鬼神祐勞而不伐謙以自卑是猶海嶽之髙深尚待㳙埃之增益為國家而下士寧辭吐哺之勞使山野之陳人復與在廷之列有壬初無學術忝與科名本期州縣之服勞馴誤省臺之遴選承恩逾分苟祿招愆三玷兩司人已疑其辨幕四參大政身遂致於負乘在中書且二十年來遊辭知幾百輩每念出言之傷易常切自懲然逢持論之失平又循故習守法不回而忤物未免齊家多愧而佐政何禆慚伴食之無功幸投劾之有故斂裳宵逝養病野栖鳯閣朝元夢寐押班之上相鶴書赴隴收羅委地之棄材領清誨之渠渠重微懷之耿耿勿藥未占於有喜趨朝寧免於後時顒望髙明俯垂矜察小人乘君子之器自虞慢藏之憂大賢立邦家之基願頌有臺之樂敷陳語淺皈倚心長謹奉啓以聞至正集卷七十
