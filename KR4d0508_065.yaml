front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0508_WYG_065-1a, image: WYG1211/WYG1211-0456a.png}
body:
  text: 至正集卷六十五元許有壬撰説蘭庭芳字説冠而有字字依乎名禮也我朝肇造渾厚真淳之氣粹然古初名且強贅况字乎語隆治首唐虞臯夔稷契有字乎有而不傳乎臆説知其無也然則字之興也其亦淳之漓而文之盛乎我元太祖皇帝聞周孔教而基文運我太宗分四隊教子弟而一文教至世祖立胄館廣學校而盛文治百年來薰陶淪浹氣習不能不變也名而又字宜哉昔兩承乏御史國人同官者或未字同官必相與加之否則皆若有缺然者文治之漸溥矣乎而夏圃蘭蹊蚤以通才歷華貫擢湖廣行省正即行臺監察御史圖烈圖敬夫擷其名蘭以氏之推蘭之德曰庭芳以字之徵豫説以自淑焉卉之嘉而清者惟蘭見於百家詳於離騷而又以芳稱入其室久而知其芳者見其蓄也漸之則芳者示其益也不為不服而不芳者守其恆也變而不芳者憂其至是以託興君子之不遭也其曰庭者則謝車騎謂芝蘭玉樹生庭階義焉士君子道德植於身教令行於家而後功業及於天下傳於後世不但一家一時而已也盡吾之誠極吾之力於吾所當為名之聞不聞不恤也况實之所在名固從之則字尊於名矣夫儋人之爵當得為之時而或一毫未盡則字之為飾古人不我誣矣且天地之間義理無窮人之為學造詣有限一藝一善皆足以流芳一時一章一句皆足以資口給語其至則君子病焉庭其近也芳其微也由近而逺由微而著其亦培其根以遂其實乎公羊氏謂名不如字其在吾庭芳矣中南字説番陽洪紹祖介其鄉人高本齋請曰紹祖之先由樂平徙餘干十一世矣所居生聚蕃盛人名為洪方兵燬大父留耕主簿遷城北嘗戒曰洪方祖基九轉至我且近先塋慎勿棄也先子西清教授復徙安仁甫述事而沒惟祖訓不敢墜泰定甲子經葺始完遂歸焉前池後阜松竹映帶居山之中面山之南因以中南代名願誨不敏豫聞而復之曰古人既名則加以字而字則取義於名聖人以立名而字從之鯉之為魚回之為淵參而在與由而在路若稽載籍戾是者鮮若服祖訓力堂構紹祖名斯稱已而中南何居乎山中之居因地為之不得已也吾又因而字之字名之賔也身之章也豈好竒務新自同於山而以不同於人為美乎夫不同者山也同者人也可同而可不同者理之所在也彼逰方之外哆然標榜吾儒不取焉君世儒力學豫重違其請取其中而略其南而後有以告焉夫中主於不偏天理之極致也大如天地小至一室而各有中君子修身止於至善之地也君其致力於此使處心行巳之際無一毫過不及之差或南或北不恤也苟為不然則自西自東自南自北吾不知其稅駕之所矣所謂我知天下之中央燕之北越之南則將合蒙莊惠施之喙且不能喻矣君其思之彭宗建字説斗天樞機也屈平敘名字攝提孟陬首言其貞廬陵彭季斗父既名之師劉嶽申以宗建字之其有取於斗乎禮子冠父宿戒賔冠三加祝而字之字之則責以成人之道矣師猶賔也父師之道盡矣成人之道則在宗建焉亦致思其義乎斗在天中酌斟元氣平分四時自娵訾歷玄枵杓之所直生長收藏莫有戾者學者象之根於心者明修於家者至大本既立以之齊家而家齊以之治國而國治猶斗之建隨其所指周制各當而歲功成焉建之義章矣宗建入京探其學知其為成人勉而擴之且至聖賢况其下事功哉詩曰維北有斗不可以挹酒漿則非所望於宗建也約約思永字説西域約約大父嘗持憲數道世賞在約約以年未及學未充也日種學績文非儒生不交紈綺氣習濯刮殆盡豫與其外舅和叔監郡遊時從過豫俾賦詩每俄頃成且清麗不苟暇日請曰約約侍下風不有擊其蔀使服膺以卒其業與不及門承教等耳昆季為華學率以思冠其字先生幸字之豫觀世之人習於近而不究其逺狃於短而不求其長天下之通患也若世家子則此疾尤痼薰染性成知飽暖而不知有飢寒知富貴而不知有貧賤目前之利不知為身後之害一時之樂不知為百年之憂謂金幣可長有也用之如泥沙謂權勢可長恃也挾之以驕縱年邁家替日暮途逺輕則飢寒之戚嬰其身重則傾覆之禍及其族雖跬步不能前矣蓋不知思永之過也書不云乎慎厥身修思永言身雖謹而所思者不永則亦淺近而已矣故必謹其所修審其所思為逺大悠久之計則學成而行立矣故從其昆季之以思為字也而以思永字之敘其槩若此俾思而有以自朂焉丁愼之字説中書總天下機務帷幄佐史之屬鱗次於其下譬為巨室棟梁柱石之大勝其任矣椳闑扂楔之細亦莫不各致其良不以細而易之也一或非良雖傾覆不職是而損敗之患馴及其大矣國制諸國之人各有部以總其族衛戍之餘又各入其人於中書中書祿之秩視行人而又優其年老號諤德齊譏門以嚴省署從直以擁護宰臣備傳遽以宣布政命出官七品階是樹聲名至達官者多矣豫待罪中書分而畨直殆遍其徒從豫最久者西域扎瑪哩迪音愼而寡言若詩書漸習之有素者乎得請歸洹阡馳傳過再拜請曰細人事公之日最多習公之言誘人使為善者非一竊有感焉世西域而生中國又得親公之教敢不思所以自勵者幸憫而訓之字得服以自勵則是事公於終身也豫素愛其人不言得乎凡今華其短裾飛其駔乘事上則為便嬖使外則如達貴視齊民如草芥豗突撑觸謂人莫敢我復者滔滔也乃能斂其鋒鋭求所以自勵者且服役幾年所直幾官而獨有見於吾輩其可進也哉於是即其人之長字之曰愼之且語之曰若知愼之為義乎立身之要道乎愼於言而言無過愼於行而行無失無所往而不愼則無往而不得其志不但官日盛名日著將見日進乎善而為成德之君子矣愼之其益慎之哉名張䂮説襄垣張生質厚而氣清年甫二十負笈來遊居三年餘人日刮目余將北乃再拜請曰小子侍有日未有以名惟古子命於父禮也民生於三義無二焉幸訓之名生敏者也猶器之利者焉遂以䂮名之而以景耜字之且為之説曰士之立身行道齊家治國其本在學農之用時因利裕家富國其要在器故是之取而為生道焉耰鉏鎛銍皆有用於農而耜也獨見取者誠以發堅破埆俾播種有所施未有先於是者則是耜之器農也不亦重乎使其鈍不勝任將焉用哉詩所謂有略其耜者取其利也人之敏者亦然人矇已見人後已至業修德進乃亦有秋矣然而耜之利不用則無功性之敏不勤則無成悠悠歲月一暴十寒恃巳易能舉為不足學望而未見且謂巳能猶惰農不昏作勞舍利耜而不用雖利何以哉故聖人謂孔文子所以為文者以其敏而能好學也况前輩言後生才性過人者不足畏惟讀書尋思推究者為可畏爾䂮也不患其不學而患其弗思也不患其不行而患或止也䂮乎勉之名元氏子説君子不器以器待人豫其戾哉器有受貴而切於用者有受賤而緩於用者人而至於體無不具用無不周則善蔑加矣未至於是為器之受貴而切用者不亦可乎夫庾所以受穀也人以食為天世之貴者復有加於是者乎較多寡均出入大而太倉微而田家皆不能闕非切於用者乎惟人之身亦猶庾也君子小人初無異焉顧所受何如爾實之以道義文學猶庾之有穀焉發而為忠孝推而為事業猶庾之出穀以活世焉無以實之是空庾爾若夫納之以異端邪説充之以私欲凶慝流而為荒唐出而為毒螫降衷均善甘迷厥初則是以庾而受糞穢曾楲窬之不若也元君廷幹乞名其子豫既以庾名之又為之説若是俾庾也知所擇云余孝友政卿名字説降衷根性匪由外鑠明善復初則有待於學焉古之君子惟是是力它不暇也惟名猶服身之章也君子愼之而所心不存焉賢而敝緼不害其正不肖而華不絅其瑕冉耕曰牛匪嘉也而孔門稱德操以德字德有何哉然士之有志者因其名之嘉思有以稱則亦有益於學焉稱諸口書諸手惕然自警不愈於几杖􅌉盂之銘乎東魯余君名孝友字政卿居家不愧其名推而從政不愧其字其亦士之有志者乎他日君之子孫其母以是為諱也諱之言力之行勿使如退之者出舉名仁為人之説則又善矣名馬氏三子説豫友馬明初請名其三子説明初名熙從火其考諱從木祖從水取五行終始相生之義次當從土故名其孟曰塈字以世完仲曰孰字以世修季曰墾字以世勤古子生父名二十冠則賔字之豫不能拒而名之又為賔以字之乃為賔祝之辭祝之曰塈乎而伯子也世其家不在而哉則凡舉其廢者不力可乎孰世其儒墾世其業各有望於汝也家也儒也業也豈人各一事而已邪析而言之家貴以勞儒貴以學業戒其惰合而言之責以勞者不知儒與業乎責以學者不知其業與家乎而戒其惰者不知家與學乎兄弟異體而同氣三人蓋一人也一人必兼三人之事而三人必若一人之身則馬氏之後必大矣名賈氏三子説愚幼僑鄂知參政鹿泉賈公有大恩德於鄂人入京又知中書大參元播公雍容寬厚真公輔器詢其世參政子也中書子彥𢎞為安慶總管繼述有聞安慶之子曰棟字士隆今知陵州以愚悉其世也請名其三子且曰吾祖之諱從水棟則從木木之後義當從火蓋以五行更生所生之行轉相承也字書訓燁為火盛火生於木木盛於春象其德為孝名孟以燁字以惟孝南方揚輝執衡司夏為禮名仲以輝字以惟禮煴也者以火伸物也伸於資力力不自致有志以帥之名季以煴字以惟志賈氏鹿泉而下今五世矣上而四世兩至宰執兩為郡守而士隆年富膴仕所至籍甚前武未可涯下則三子也其承亦重矣哉孝原百行燁必待孝禮首四維輝必待禮有志事成煴必待志孝也禮也志也推是三者家有不昌世有不濟其美者乎三者不力徒曰我門大它不我敵則有柳先生鐡爐步志可不懼哉愚於三子聞而知其高見而知其曾交而知其祖若父故名之不辭而於取義也以規不以頌至正集卷六十五
