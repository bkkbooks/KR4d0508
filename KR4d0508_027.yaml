body:
  text: 至正集卷二十七元許有壬撰絶句竹枝十首和繼學韻居庸泉石勝槩多桑乾北去漸沙陀龍門鈎帶水百折一日驅車幾渡河草軟沙平無長泥踏歌飲别鴈行齊海青輕騎圓牌去金犢香車翠袖啼紅黄簇簇野花勻千騎騰驤不動塵圓帳風涼來月牖方帷日影䕃文茵邊民總總傒來蘇瞻望祥颷動祀姑透空何處一聲笛渾似春風聞鷓鴣健步兒郎似籋雲鈴衣紅帕照青春一時脚力君休惜先到金階定賜銀草色迎秋便㺯黄青山盡處暮雲長秋風闗塞迢迢路望㫁美人天一方野蔌堆盤見蕨芽珍羞眩眼有天花宛人自賣葡萄酒夏客能烹枸杞茶使者南來馬似龍一馳三百未高舂却笑牛車鳴大鐸道途狹處莫相逢有懐常擬賦閒居有筆當思頌二疏濯手清灤時一笑少年曾寫萬言書大安閣是廣寒宫尺五青天八面風閣中敢進竹枝曲萬歲千秋文軌同柳枝十首同前灞岸千枝復萬枝隨風嬌困力難支只知擅盡風流態不見清霜摇落時樹隂沙地白如霜偏拂柔條惹恨長灤水有人思翠嫵章臺無計綰絲繮昔時相見眼俱青未許霜風一葉零十五年來樹如此可憐張緒鬢星星龍岡照映兩三株恰似天河種白榆天河尚有鵲橋渡半載龍岡無寄書世有别離無可奈汝逢攀折漸成稀灤江却是多情樹不送行人只送歸龍沙五月恰飛花飄泊渾如客去家不化浮萍隨水去恐教浮蕩有根芽玉人金勒趂隂騎萬縷千絲故故垂行盡沙堤時按轡袖沾飛絮口頻吹江岸溪橋到處逢笑渠節操不如松而今僕僕黄塵道却對長亭笑殺儂雨後川原風色凄遠連烟草共低迷不聽黄鸝深處語夕陽惟有亂鴉啼越女吳兒盡識儂江湖處處可相容明朝共約梅花去不與爭春與作冬和繼學壁間韻莫道催歸無杜鵑數聲征鴈夜如年思婦多應挑錦字將軍休待勒燕然題武寧翁氏湧翠亭亭前山勢渾如浪勢自奔騰體自閒老子相看肯輕出江湖却有浪如山思歸思歸不惜歲如流日望西風早作秋只知倦客還家好不見秋風催白頭次賈伯堅左司寄來韻四首清風千里墨痕香琢出天球潤似肪已為郢歌飜白雪更將仙杵搗𤣥霜酒來宛國注紅香魚出涼亭薦雪肪多病浪仙都負此空哦清句嚼氷霜書室惟須辟蠧香鉛刀誰遣試蟇肪相思夜夜秋衾夢菊有黄花蠏已霜賜霑炰鳯玉脂香大笑輕闕服鴈肪華髪侍臣歸有日鴐鵝先報一天霜棃花鸜鵒扇頭贈李如淵言非鸚鵡莫譊譊力不能高忍爾庖白雪香中風日好愼毋踰濟更來巢和友人北苑馬上四首古木隂隂覆苑牆鴈程霜早碧雲長欲知聖德如天處最近來庭是越裳髙榆矮栁逺參差一幕秋空碧四垂莫笑從臣歸太急人間天上共秋期萬事浮雲一瞬過何勞辯口似懸河北風捲雨城南去明日灤江水又多金蓮紫菊帶烟鋪畫出龍岡萬世圖直使王嬙到青塚漢家當日有人無代書寄可行弟十首灤京尺素寄沙羡料理田園有事宜檢校便當勤檢校參知行欲自參知祠堂花木已繁隂見說栽培用力深南土常年秋喜旱更宜澆灌待成林叔季勤勞共相攸為予高坐蓄書樓先公遺後一萬卷明日投簮去校讐樓後樓前地有餘埜心常愛樹扶疎四時花木須栽徧更作蓮池就偃瀦漢川雲夢有租田今歲應逢大有年約束諸僮公出納羡餘留糶杖頭錢雙鶴廣陵來敝廬啄苔穿竹日相娛莫教忘却蹁躚態嵗晚待渠從老夫桂花初放小山幽更有葡萄映石榴食實折花歸有日休教蕪穢負清秋當年手自植栟櫚别後長添幾尺餘說與園丁宜善視老饕歸欲食其魚文竹移栽只五根來時無數長兒孫不因繁冗休輕翦要使清隂過酒樽眼花齒動鬢斑斑三十年來不暫閒多少家庭纎悉事從今先約莫相闗題善原道經歴所藏唐人曉粧圖錦帳春寒曉起遲臨鸞無語更嬌癡勻粧未了花隂轉已過農家爨饁時贈瀏陽連平山上人其人工裝潢平山山下連浮圖長日空門力有餘却是墨名儒者行肯來裝緝我家書題吳徳輝母貞節詩卷貞節千年詎陸沈傳芳猶欲託詞林吾衰不辦如椽筆深負區區孝子心題龍遜甫耕雲堂滿山深鎖白英英不解為霖但可耕只恐無心忽飛去埜人何處望秋成贈五星黄見心人心雖奥不難窺天地之心尚可推直待韋編三絶後恰知雷在地中時龍眠畫十六羅漢西方百萬億菩薩老李偏圖十六人八凱八元無覔處空中樓閣有麒麟飛鳴宿食鴈陣雲清落數聲寒飲啄江湖夢亦安莫到衡陽便囘去隂山春盡雪漫漫周岳甫雲山圖丹崖千丈杳難攀雲去雲來一様間底事老禪言不悟不觀雲氣只觀山題劉光逺林禽白頭公圖林深果熟足身謀爾復何憂亦白頭莫訝塵纓縳仕宦蕭蕭雙鬢早驚秋題鄒鍊師古齋十二萬年餘幾年人心世道日堪憐之人欲究先天意試看庖羲未畫前僧柿林墨蘭素紈如水汎崇光囘首春風九畹荒一自湘纍紉佩後深林辜負幾多香野園見碧桃臉霞消盡見清眞應笑崔郎不識人鄭重莫誇天上種深山幽谷一般春昭靈江樓即事翠幕紅旗拜嶽船凝笳疊鼓動江天千花萬栁疑無路一㸃衡峯在眼前壽寧宫白龜泉有築室祀軒轅彌明刻韓子聨句於上作口號以喻岫雲懶雲二提㸃不須聨句夜紛紜石鼎惟堪煮白雲若向衡峯問端的空同山叟是鄒訢昭靈江樓廷鎭招飲罷風雨中解舟泊西岸伏波祠下水澄澄急雨狂風兩半醒楚峽雲歸棹歌起隔江燈火看昭靈題廖氏西山用廷鎭原功韻二首聖時何用效夷齊修竹雲深鳯可棲政自不須勞手板清風明月互東西烟霞香靄隔夷庚新月斜陽畫不成萬里風來好乗便等閒吹上碧崢嶸息齋著色竹錦䙀新出玉亭亭便領蒼寒月一庭底事清風藏不得直教高節著丹青李遵道科石二首千霜凌轢百霆摧半是枯椔半是苔中有古春無盡意郊原誰羡萬牛來一卷蒼蘚頑不轉千尺冷雲僵不飛從知難勝柱石任爾厭山林何所歸題本齋用廷鎭韻山林雨露積微涓毫末行將薄九天仁義栽培正如此要知根柢在心田題乗槎圖環海周流不易時有人乗去欲何為如何取得支機石更問偷桃翫世兒寒江獨釣圖梅花無影水無漪舟入遥天晚更微收拾綸竿沽酒去又教披取一簔歸僧待渡圖落日青山遠欲無蒼烟深處有浮圖老僧不辦馮河力却笑當年有折蘆墨梅纔别瓈江萬玉飛又從豪素見横枝春風可是無拘束吹到人間第幾詩墨蘭騷鄉人遠未忘情莫訝無香浪得名九畹有魂銷不得巫陽招與楮先生白猿授書圖異途邪說騁榛蕪豈識人間有廣居河不出圖龍馬逝野猿傳授定何書至正集卷二十七
