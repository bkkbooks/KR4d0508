body:
  text: 至正集卷六十二元許有壬撰碑志故奉議大夫同知廣平路總管府事致仕羅公墓碑愚昔班太史中書知管差除掾羅吉請銘考廣平公碑時應制方殷不果作至正戊子吉赴河南江北等處行中書省檢校官道相迹其實請益恪愚早知廣平公復覩吉之能子也其又何辭遂次其語曰羅氏上世名數繋歸徳遷東平再遷鉅野曰忠娶張氏二子長士廉馴行聞於里年二十二卒以子貴贈奉議大夫同知東平路總管府事驍騎尉須城縣子配薛氏封須城縣君實生廣平公次士賢陽穀監當官配韓氏生文郁廣平公諱文煥字顯卿未晬失怙恃祖父鞠之資稟犖犖異常兒人薄其孤奮勵自懲依母族委已於學㳺東平郡庠會使者閱弟子員見解經融貫欲挈入京以未得祖命辭明年走謁使者乃掌環衛大官也聞其名於上補環衛掾使者使西域征宋皆從歴天官征東行省及格除膠州判官甫至廟圮毁倡衆新之有疑獄久不決司憲屬公果得情懐孟供億宗藩胥輩並縁假不歸貫不酬公為録事作甲乙帳去劵刮白著之弊行用庫胥嵗率徧擾應者必破産擇精識楮幣者十餘家以次應求輸稅於衛糗糧百費一主辦於已庾人不敢溢収歸有具獄盜金珠十餘人讞而疑之俄得真盜盡釋誣者小兒啼父母以公名怖之兒啼為止終更民立去思遺愛二碑陞順徳路經歴擢山西江北道肅政㢘訪司經歴簿領悉就繩尺目盲棄官愛順徳風土家焉改益都路經歴拜江南行臺監察御史皆不能赴屏居十八年目復明起為呉橋尹塑先聖兖鄒二公十哲繪兩廡像奬學申教里愉户懌縣西瀕御河嵗潦嚙隄為堅築百餘里人今賴之惡子私標牓樹朋梗治罪其尤餘悉渙走民為立生祠改武岡路推官不赴晚更號獨慎老人以奉議大夫同知廣平路總管府事致仕至元五年己卯二月二十三日卒於正寢夀八十有三四月廿一日葬邢臺縣白圭鄉左賈村書桉岡之原配嚴氏追封城縣君繼張氏孫氏吉以世賞為汶上尉改淮東宣慰司照磨歴秋官西臺掾除從仕郎武備寺提控案牘兼照磨擢掾中書秩承事郎為今官嘗捧檄過邢懇欲留養力遣之居闗中忽心悸求歸至邢公始捐館孝誠感觸庶幾黔婁乎大父洎東平府君俱葬鉅野合蔡里白㙮保公以地善潦謀遷未果吉恪遵遺訓而族人難之新阡但設東平府君名石公竁昭焉公㓜孤能自樹立謂天厚之耶間闗底僚中尼於目不大厥施謂薄之耶士一命可行志若倅郡司録佐幕作邑民不能忘至紀碑立祠豈人力勉強之所能致者哉况隆以壽復昌以嗣則天之厚之者厚矣銘曰育材企成惟古其難父訓内迪師力外殫志苟不致猶暴而寒睠兹顛木由蘖自樹不根家學不資友助孱其甫童克深厥慮鼓勇道遠間闗海隅一命及身我蓄遂攄弛爾榜笞倡吾詩書化流俗易若鼓應枹惟懐附治民事孔棘獄枉以信兒呱以寂雙碑嵳峩風雨不泐於郡於憲畫諾資成云胡尼之遽蔽其明十有八年復浚眢井餘光所照桑榆有炳天恩閔勞紫服被躬夀八十三茀禄是叢於胥白圭泉深土厚以妥其靈以裕其後鉅野之澤實唯胚渾匪流有沱泝洄一原百爾來耳念兹弗諼故亞中大夫福州路總管兼管内勸農事李公墓志銘朝廷重守令之選廣辟舉之路嚴連及之條所以必其才也愚長翰林法當辟一人以僉都水庸田司事李惟閏充尋擢福州路總管兼管内勸農事請使及門乃至正戊子十二月二十八日卒於正寢得年六十積階自承直郎六轉至亞中大夫猶子林奉行實請銘惟閏字仲舒其先臨邑人曽祖考諱成避地襄城徙潁之虹橋再徙彰徳家焉配張氏祖考諱衎兩試有司遂占儒籍經承事郎河東山西道提刑按察司經歴配陳氏張氏考諱舉以公貴贈朝散大夫秘書少監騎都尉隴西郡伯妣楊氏追封隴西郡君二子長知善敬勤幹蠱家用益裕次仲舒也宦學資給兄力居多由新城縣儒學教諭轉桓州學正辟工部令史歴太禧宗禋院掾史中書右司掾右司主兵刑掾執案牘得議可否會民有饋兄肉而兄以它疾死者姊婿利妻弟之貲欲并吞之誣肉中有毒官逮弟於理具獄上仲舒疑之詢得實白都堂送所司信其枉釋者圖形祠之及格除通政院都事改中書省管勾架閣庫拜陜西行臺監察御史陞本臺都事擢僉都水庸田司事在通政沿檄行河葺庾補居庸北驛户具有成績為御史持大體急先務華州獄囚誣承强盜讞而決遣西嶽道士陷民為奴釋而民之呉中山水佳勝水曹治焉未嘗事㳺娯退食杜門兀坐時乗驛舟視啟閉疏壅塞錢塘之役修捍尤有法居半年以病歸閉齋閣㓗窗几陳古書畫若將老焉福州閩海一都會象犀珠珍之所聚宣閫蒞之風紀睨之鹺司掎之為牧守者視他郡為尤難朝廷挈以付之知其才有素也天不奪之吾知其不負朝廷矣福之民何其不幸耶愚在政府仲舒實掾曹未嘗吏之也仲舒之賢故自可重況同里衎乎其歸自西臺呉中相從歡甚愚今年中臺歸仲舒雖病尚能杖䇿相過既而日革遂不起里閈舊㳺彫謝殆盡愚之悲葢有甚於福民焉明年二月廿九日祔安陽陽記原先塋配賈氏繼張氏皆隴西郡君女一未䈂銘曰嗟嗟仲舒㓜能讀祖父之書筐篋假途弗忘其儒不亟不徐六轉而為徹侯大夫令聞孔敷孰􅼛厥趨維蓄有瀦維擴有阹拮据卒瘏有嬰復孤其天也吁故中議大夫同僉通政院事致仕王公墓志銘公諱溥字亨道世為安陽盍遵里人祖考諱玘贈奉議大夫驍騎尉湯隂縣子妣程氏老氏俱贈湯隂縣君考諱安仁將仕郎淮西宣慰司照磨贈中議大夫禮部侍郎上騎都尉太原郡伯妣馮氏贈太原郡君三子長諱博仕至博平縣尹公仲也從父諱安貞終饒州路治中愚嘗銘其碑從其子今湖廣省郎中忭請也公一子明允纍然衰絰泣且請曰從祖考得公銘先子不敢例而先世父辱公厚先子亦公之厚也不孝忍死執事竊有望焉愚聞而悲之尚何辭公㓜穎敏習時務儒雅縁飾起家山南㢘訪司書吏入掾察院轉吏部令史流弊積久惟貨惟來而貧滯者譽之其守可知已擢樞宻掾陞提控俾總諸曹及格授供膳司丞改大都警巡院使輦轂民號難治乃以能稱歴太禧宗禋院斷事官知事陞大都路薊州知州撫民以寛繩吏以嚴嵗凶請賑於朝全活者衆除京畿都漕運判官謹出納明㑹計上官才之改知湖州路長興州抑末敦本勵農興學終更歸以中議大夫同僉通政院事致仕國家優禮致仕者兩沾賜緞至正己丑十一月十八日卒享年七十有三明年正月癸酉葬安陽司空村先塋娶裴氏封太原郡君明允䕃禮部鑄印局使女一人適柴炭局使張吉公懸車後請封考妣推䕃其子顯命沓至畢事考終可無遺憾矣愚七歸鄉里銘其墓者凡九人戊子之歸公適告老方喜得友而又為銘人之生世其可悲也夫或者欲以倔起自足傲睨里閈淺之為丈夫也哉銘曰吾里足賢有英而耆嗟我來暮及從其遺其遺幾人亦復長徃踽踽予行邈邈予唱得朋又喪甫賀而弔彼蒼䀜爽其究孰譙歸而考終貴而及親况世其禄恂恂有人夷考其故亦曰多茀惟是懐人亂我心曲佳城之陽洹水湯湯俾爾子孫枝百其昌故正議大夫兵部尚書致仕楊公墓志銘諸壻楊奎赴厥考尚書公喪且請志其壙以愚親而知公也乃迹其實而序之公諱煥字文伯漢大尉震之後先世由華州徙耀州再遷大梁金朔州順義軍節度判官我元贈中奉大夫䕶軍𢎞農郡公諱鼎者髙祖也贈昭文館大學士資徳大夫上䕶軍𢎞農郡公諡莊孝諱國維者曽祖也贈榮禄大夫司徒柱國諡文懿諱澤者祖也通奉大夫江浙行省參知政事贈宣忠守正奉徳功臣正奉大夫中書參知政事䕶軍𢎞農郡公諡忠肅諱敬直者父也妣圖克坦氏封𢎞農郡夫人實生公至元庚寅以儒家子宿衛春宫奉隆福太后㫖入學肄習釋褐從仕郎陽翟縣尹避祖諱改通事舍人轉太廟署令忠肅公疾棄官侍湯藥者八年管勾河南行省承發架閣庫歴籍田署令拜南臺監察御史移西臺僉江東湖北浙東三道㢘訪司事忠肅公年髙請便養授河南行省員外郎尋升正郎忠肅公薨廬墓側三年拜監察御史出副閩海道移湖南又移廣西擢江西㩁茶都轉運使居官五月年始六十八即請休致以正議大夫兵部尚書致仕至正九年己丑六月三日卒於揚州正寢享年七十有五明年三月某日葬祥符縣魏陵岡伯俞村先塋配郭氏先公卒繼完顔氏皆封𢎞農郡夫人五子長圭奉議大夫知湘潭州郭夫人出次奎次堅完顔夫人出也次莊次塏女四人適永康簿呉瑞平原簿史翬繁昌尉李構留司掾鄧洙孫男四鑄鐸七十三慶夀女二曾孫男一添夀公自為小官知無不為為無不盡侍儀賛禮成廟嘉賞有衣㡌之賜筦庫河南告饑廟堂不避大臣之怒至得面聖卒如所請籍田請植栁為薪免伐桑棗召見便殿有酒醴金綺之賜為御史南臺糾副僉不法者四人方面貪暴者一人笞逐憲吏之誤罷人官者二人其分司官亦自劾而去西臺按雲南省臣贓悉置之法中臺言官冗吏弊民貪財蠧切中時弊狂童馬馬沙為指揮聚惡少樹標榜妄肆笞箠治其黨四十餘人分臺上京賜楮幣中統五千緡白金五十兩金龍幣一弓矢刀鞍有差臺檄行水開水門造石壩以泄蔡河夏秋之潦復舊牐六導蔡水入圭河增新牐二以達於陳民賴其利僉憲江東發池州監郡之貪復太平西湖之灌溉撤采石橋之阻隘移湖北適蜀有警守阨塞鎖瞿塘不殺蜀使以逢其怒而省臣有蹈此幾致狼狽者衆始服公之明龍陽建三皇廟修夫子廟甓漢陽儒學宫牆百餘丈其不専於政而先於教者乎入閩貪吏麗法者幾百人胥𨽻三百人徵賦楮幣銀段皆以千計平反林信天之寃出南安尉之誣湖南徐萬六飢民為盜吏當之以强力爭得不死廣西用兵連嵗疫癘方作黜貪暴撫彫殘平寃抑雨雪大作民疾用甦𣙜茗歲課未登剔蠧利商未幾告足而歸志浩然矣築室維揚賓至觴詠終日談朝廷典故先正格言故家原系亹亹有據初忠肅公之在維揚也愚為轉運使每休沐必省之公有浙東之行愚以忠肅年髙諷之公曰俟到婺將求汴省幕職因奉老人歸鄉里愚竊不然後果得汴幕至汴踰嵗忠肅公始薨嗚呼人之所欲天必從之況為忠孝者乎然事機之巧鮮有是若者愚嘗舉似士大夫以為美談而亦論愛日喜懼不可盡望其如公也銘曰青宫􅉏御擇罔不欽繄儒家子恂恂其心囿之賢闗植之士林由璞而玉由丱而金是宜達財倍軼恒品釋褐出宰受敢不審家諱有嫌稱謂斯噤抗辭既慤休命為寢君子過厚器識可覘主以剛毅濟以柔謙三臺司察六道分㢘細民其蘇渠魁則殱𣙜利不苛議刑不濫天報宜豐存沒無憾嗣來泝沿原逢泉檻導而勿陻我銘爾鑒至正集卷六十二
