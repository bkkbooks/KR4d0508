body:
  text: 至正集卷六十八元許有壬撰頌辭瑞𤓰頌積善餘慶吉事有祥天人之理一也天不人不興人不天不徴太和薰蒸禎祥類生草木無知而有知者寓焉故蓂莢不出於昏朝而瑞芝不産於亂家也惟我外舅奎章閣大學士翰林學士承㫖中書平章政事涼國公迂軒先生雄才邃學典刑一世元勲績茂照映古今嘗擊大姦聞者褫魄天監丹衷竟履康吉天厯初爰立眷注百度修舉引年歸金陵使者召賚相望於道而公之志不渝矣勤勞五十年非優老有禄伏臘殆窘宰相能貧大節斯見醇和之懿蓄而必發至順壬申後圃之𤓰同蔕者五禎祥所出近在户庭方退然不居而多士已刻之石侍御史河東郭公記之矣盖公之克享天心感格有自福夀子孫綿綿如𤓰瓞者此其兆焉有壬以諸生擢科公實坐主行非鮑宣過辱桓公之知既厚且親是用再拜而獻頌曰太和氤氲旁薄堪輿槖籥潛寓無感不孚景星慶雲連理同穎形殊氣一機捷響影有蓏者實烝在樊圃黄中萃美駢瑞惟五珠聨璧合植物知仁靈貺效質匪天自人惟公植徳惟心其田秉鈞執法垂五十年位極人臣有籯不金角巾歸第一鶴一琴公曰斯禎天子在上休嘉克叶聖徳之暢篚包歸美老成是諛抑而弗宣頌聲載途其頌伊何伊公之休子孫綿綿百祿是遒刻珉惟肖傳信有史甥也作歌用播遐邇陳廷玉偕妻黄氏為母刲股頌倥侗顓蒙均是降衷其至孰同夫忱婦俱有格斯孚三而一符我膚之朘我天之全豈名而然彼獨何其誶語勃豀不其恧而致慤亭辭為梁彦中助教作茬之山兮幽幽茬之野兮沃以柔欝佳城兮其下慘風樹兮瀟颼炳精忱兮徹天淵以不亡兮視所天故隨地以感觸兮矧狐兔荆棘之荒阡爰作堂於佳城兮直宰木之隂森時思以安所止兮神恍惚其降臨繄我誠之自存兮惟致斯著著存不忘乎心兮夫安得不至於永慕彼較禮之嘈雜兮謂或墓而或家顧反虆之無文兮初何有乎紛譁使兹亭之無作兮豈吾慤之不致維兹亭之既作兮庶益勉其未至貽謀既底乎法兮啟厥後於日大亦善源之流祉兮川方至以汪濊霜秋兮雨春紛亭臯兮来諸孫塗茨兮敢墜其始百世兮敬事無止弔淵明辭憲史孫居敬藏淵明圖徴題無隙且及於予余惟是圖豈不以淵明風節超絶流俗千載之下想見其人而求其象耶然世方倀倀膠沐聲利顧委心去留富貴非願曽捧心效西墊巾慕郭之不若矧彷彿風節之萬一徒使縑素之象偕走塵俗九原有知其不樂於是也審矣述古人弔莊之意即歸来辭韻而弔之曰睠斜川兮山川故存人安歸邈天淵之寥廓徒敞怳以增悲究清規於既邁仰髙躅其莫追屬典午之訖籙慨國事之日非匪懐寳而迷邦懼塗炭乎朝衣方滄海之横流蕩皇綱而湮微顧世忽宋臣妾飛奔揚戈飈回坌塞天門屹然砥柱中流獨存道伸時屈浮沉一尊彼祼將之膚敏強重甲之厚顔斁彛倫以攘敓舉外恬而内安玩陵谷於反手恝天歩之間闗芬華劇於飄風灼穢跡以留觀班紛紛兮何拯豁羣往而獨還賴紫陽之健筆揭忠義之表桓吁嗟先生兮固遺世而天逰始絃歌以資貧亦未免於有求及不樂而徑歸信知命而無憂羗羲皇之上人曠今昔兮誰疇惟流行而坎止𣺌六合之虗舟世求肖於毫素視蟻垤為嵩丘盖知逐其聲而遺其實遂合汚而同流日挾走乎世途雖力憊而未休已焉哉先生来歸定何時祥麟威鳯世固難久留清魂悠悠無不之斷縑傳失真況與論襟期彭澤秫田在蕪穢誰或耔吾將摶元氣為先生之象磨崑崙刋先生之詩酌清風而薦明月洞萬古臣節而無疑哈噶斯哀辭哈噶斯取父字姓丁字文苑于闐人與予同登乙卯進士第倅固安州掾左司除禮部主事予佐吏部故㳺從為多改秘書著作拜監察御史又與予同官南坡之變梟獍黨與列據津要文苑喀喇子山暨予實同列遷戸部員外郎予在左司計事率相見俄僉浙西道㢘訪司事遂間南北予居武昌適移湖北新制憲官各色止用一人長憲者同出西域即日引退臺報不允文苑曰無例且退持疑文冒進可乎堅卧不起予跧居絶人事獨相往来鵠山楚觀之絶頂𣑽宫琳宇之僻地荒域廢壘村居野池靡不至焉時絶江登大别宿郎官湖賦詩談論無虚日一日把酒相屬曰人生離合有數君閒我退機適相投但恐造物見妬不終遂此先子監祁陽縣有惠政潛徳未彰子亟銘之予不獲辭焉未幾予除兩淮轉運使文苑移山北邸報同日至山北置大寧白霫地去京師東北尚八百里陸不可挈家水縈紆餘五千里扶病擁㓜殆不能為謀予官揚州﨑嶇来過曰我非瀆於進也主上新政不敢不行而老㓜累我且都而杭杭而鄂鄂又山北有力且疲况貧乎鄂不可留揚米貴亦不可居杭吾樂之榖又差賤且其人徳我吾謀定矣迺命諸子買舟而東獨挈一僕乗傳而北予留之飲三晝夜而後去酒中嘗曰我作事素勇今殊猶豫何也予戲之曰人改常不佳君豈厭世耶迺大笑曰昔温公記宋子才暴謔其言偶驗吾不信也因出臂示其堅實曰斧吾撃亦不死也於戲今迺真死矣盖時方大疫暑行至東平主僕皆病歸抵淮安卒於舟中至順元年六月念三日也郡大夫率其國人菆之予既為位哭遣人省其墓告其家子穆蘇迎柩歸艤舟餞别之地哭為之慟監縣公葬祁陽遠不能祔予欲蜀岡買地處之木屑曰杭西山先人所愛因可守也遂謀葬焉母子力不能舉漕司暨他官府若嘗往来者共賻之得褚幣中統餘萬緡既襄事餘可經理其家淮東憲長達爾瑪嘗同官閔其貧請賻於朝不報初文苑為固安𨽻京號難治民劉奉益横甚賽祈烹五十羊聚羣不逞震動里閈執而發其椎埋焚剽數十事度不解逸去反肆誣構詔大官雜問禁中辯析明直劉置於法築堤堰三百里河以不害兩道凛然折強暴如拉朽蜀兵未戢按部直要衝布置施為若老於用兵者統兵省臣薦其有將帥才可治邊事云内外持憲知無不言制吏輩噤不得出一語平居論事慷慨歴落一坐盡傾遇則奮發勇往無前長於觀人某邪某詐黙以相告後輒多驗作歌行豪宕如其人古詩清粹皆可傳也延祐初朝廷始以科舉取士天下之大才五十六人出官四方或懦於施或汚於賄厯歴在人得免詬議如文苑者無幾而天復中道畫之於戲惜哉予昔銘監縣公謂其多善未報當在文苑今文苑夀才四十有七賫志以沒此又何耶豈天又厄其身而大其後耶天道是耶非耶余益感矣嘗獨坐閱同年錄十六年間為鬼録者十七人矣尚忍以區區聲利置胷中乎或者視為四海九州之人恝然無情予不忍也木屑將狀其行實求予為銘而其狀不至為之辭以發其槩且以寫予哀云天之生才兮亦孔之艱前不知其幾世兮後復幾年何林林之百萬兮獨靳於賢器方適用兮陶復不堅雲未雨而掃蕩兮華未實而摧殘豈繒繳之在天兮惡有翼之髙鶱㝠㝠之中兮孰司其權昔君之北兮歌乎水壖今君之来兮丹旐翩翩藥膳匪良兮道路迍邅妻子暌隔兮良友棄捐我哀曷忘兮我言曷殫西山蒼蒼兮唯所便安玉樹森立兮澤流有源冀伸於後兮以報其前破不可完兮逝不可旋唯生無愧兮雖沒猶存修短有數兮吾其舍旃馬革牖下兮非蟻則鳶九原有知兮其然不然歐陽生哀辭歐陽達老年十九侍父翰林學士原功入京為内舍生學已有成越三年以疾卒至正改元春歸葬瀏陽先塋原功以書来曰兒旅襯行幸哀而辭之使與閩詹同不朽存沒可無憾余方悼亡不暇自哀而忍重達老之哀耶昔詹舍朝夕養將以為父母榮志未遂而死昌黎之所以卒詹志也原功為名學士無假達老之榮達老可無憾而原功不能無憾也余於原功為同年情義尤篤在江南聞其慟至於傷棄官挈柩歸有詔止之遂菆僧舍一年今年治行有日又有詔不得行不得已遣家人䕶之歸其哀不能釋也予忍悼亡之哀為之辭以釋其哭子之哀於此不用吾情惡乎用吾情辭曰天髙兮地卑㳺氣紛糅兮物萬不齊何盜而夀兮何仁而夭豕苓遂帝兮荃蕙化而為茅生之姿兮孔休生之業兮孔修志有樂兮離無憂養父京師兮以藏以㳺生之疾兮良苦生之沒兮道修以阻不忍委兮嬴博曷遄歸兮湘楚湘水兮楚山鳥羽墜兮虛舟還薊雨兮燕雪髪日白兮衣誰斑橋卬兮梓頫椿色悴兮桂纒宿莽伯魚無椁兮童烏有文嗚呼哀哉我思古人至正集卷六十八
