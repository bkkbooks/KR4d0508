body:
  text: 至正集卷七十九元許有壬撰樂府摸魚子鳯凰臺次湯碧山教授韻自蕭韶九成來後岐山猶是隆古嬴顛劉蹶相枕藉幾度狸號鰌舞堪笑處又蕞爾鍾山一霎神光吐鶴汀鳬渚問吳德何徴紫霄輕下天意竟誰許江山好老子狂吟箕踞千年考信無據多情只有秦淮月還照故宫焦土昏復曙浸寒暑悠悠老盡梧桐樹從今計取阿閣成巢朝陽應瑞椽筆為君賦二中都餞荀平叔都事赴大都正荒寒似逃空谷佳人又話離别風低白草天無際漠漠平沙如雪心欲折看落日飛鴻一線明還滅長歌激烈把湖海襟期關山風物取次付彈鋏毛錐子千古鑽妍搜刔誰知更比鳩拙仲宣不作登樓賦閒殺一天秋色珊佩玦羡公去鳴騶醉上長安陌豫懷轉結怕紫塞寒深碧雲暮合酒醒見明月三登洞庭廟連天樓和劉光逺作問樓頭幾多烟景長風千里吹送洞庭島嶼留殘雪依約玉龍飛動天故縱要老子南來添得詩囊重遙山翠聳更淡淡斜陽蕭蕭落木感慨古今共人間世何處祥麟威鳯繁華一枕春夢江湖無限閒風月待我往來吟㺯君莫痛看起舞紛紛踏破中霄甕深杯自捧便喚起湘纍汨羅江上沉醉是奇供四賦玉簪用明初韻笑人間圭衮何物此華良貴天與倚闌瘦立亭亭玉刻畫一生清苦人有語道不出藍田豈是真才具山人告汝正蓬鬢蕭踈不勝冠冕真者亦投去洹溪水洗盡眼中塵土天葩靜看齊吐氷壺凉月天如水塵柄肯論夷甫翁醉舞任蕞爾寰區共訝山中許搔風沐雨且受用清香古今多少富貴草頭露五賦雞冠花用明初韻笑山人木雞心事年來斂嘴藏距幽花細草聊娛目小圃更無閒土膏澤溥豈天為司晨偏與鍾奇古無人起舞對寂寂園池蕭蕭風雨竦立為誰怒三生夢猶繞户鄉棲處昂然幾欲掀舉挼丹蹙錦頭顱好葉葉舊時毛羽天已許待海日升時飛上桃都樹人間凝佇看吐白東方却來平地千載不容腐六次明初為壽韻算驅馳三十餘嵗只將光景虛度野雲本是無心物辦得幾多霖雨還自許量綿力粗才猶可松筠主天方見與把村落溪山風煙朝夕著在最佳處青年志萬一容禆當寧何慙與噲為伍歸來千仞岡頭看却笑甕天飛舞方學圃要摘我田蔬共和淵明句譊譊醉語道咫尺重陽登髙落帽休競汨羅渡七次郭子敬祭酒同賞牡丹韻記花王舊時名品共傳姚魏黃紫洛陽種治雄天下何日移根來此青鏡裏任淡抹濃粧莫挽春衫比人間四美更天遣舒郎等閒一賦千載共心醉清平調漫與東風料理繁華能擾天紀沉香亭上無人恨流入錦江春水安故里又何似吾儕聊復尊罍耳清歌且止怕檀板無知多嬌不耐驚得綵雲起八洹堂盆池紅白蓮開余適卧病城居六月一日始往一觀落者雖多開者方未已喜而賦此笑當年柏臺蘭省四時風景孤負歸來幸得身無事底又匆匆朝暮心口語是傳癖詩癯常把芳辰誤夜來風雨早練帨雲飄紅衣霞捲香滴翠杯露司花手無限芳妍留住凝粧為我延佇姑仙綽約如氷雪次第相從微步天不妬便失却東隅儘有桑榆路人間塵土看太華峰頭花開千丈吾老尚能去九明初賦摸魚子夀余既次其韻而可行塘成和之成什衰病枝癢亦足為十首買陂塘旋栽楊柳歸來此是先務它鄉故里都休校舊雨不如今雨鴻在渚笑爾尚南飛吾已安孤嶼黃花解語道人老宜秋身安耐酒此正有真趣鑾坡路大手深慚自許超騰又悖鍾吕但求閒淡如元亮却恨詩多奇句傾緑醑底須按樂天池上霓裳譜休論往古有三日重陽約君同醉老子築西圃十買陂塘旋栽楊栁閒官宜治閒務老天助我攻清淡兩月不遭泥雨規别渚更纍土為山留土分為嶼鄉人共語歎百嵗陻蕪一朝疏闢此去日成趣江湖願自是平生心許元英誰羡陳呂石渠細流鳴琴筑清似我家詩句杯引醑便收拾松風寫入絲桐譜區區學古愧竊祿無功投閒有分猶患不如圃十一買陂塘旋栽楊栁年來於此承務涼臺燠館吾何有聊芘一時風雨洲映渚向一片烟波鼎峙嵯峨嶼盤空硬語挽三峽詞源千軍筆陳不盡樂閒趣當年志為國微軀曾許青雲仍際觀吕從知弱步難勝重夢斷九天臚句時飲醑趂四序栽花綴作園池譜長歌弔古悵安得良田茫茫萬頃種玉闢𤣥圃十二買陂塘旋栽楊桞田園忙勝官務放魚種藕常無暇移竹又當新雨由近渚駕一葉扁舟時復還吾嶼花香鳥語況心上無營眼前多景絃外有琴趣尊罍小能費人間幾許荷香惟缺仙吕天光雲影清難寫盡日撚鬚無句池作醑要醉上通明傳取鈞天譜西山翠古任列壑爭譏攢峰竦誚難及野人圃十三買陂塘旋栽楊栁塵凡皆與停務半生醉夢人間世翻覆幾回雲雨歸有渚似真到三山縹眇紅雲嶼忘懷笑語任白鷺驚飛蒼苔不掃此去便無趣斜川路宇宙茫茫何許綺園肯附諸吕悠然一見南山後便覺世多塵句持此醑論心事中間異姓還同譜迂踈好古因藝菊栽松滋蘭植蕙荒了種瓜圃十四買陂塘旋栽楊柳散人不理他務桞栽近水先應緑底用等閒霖雨遵北渚看雙檜盤空倒影搖烟嶼千言萬語只今日投簪經年閉户便自得天趣真男子報國誰如張許論交仍負嵇吕我今但要閒陶寫幸免鏤章雕句村甕醑此真是交梨火棗傳家譜庭樹空古有野鶴時來衡門不鎖清徹地仙圃十五買陂塘旋栽楊桞歸農未免多務一亭四序饒風景且說夜來春雨香濕渚愛新樹依稀敷影連三嶼黃鸝不語怕曲几團蒲坐忘方定驚破靜中趣功名事却笑平生自許誰調陽律隂吕而今且向東君問舊句豈如新句開臘醑要醉喚石湖重緝寒梅譜榮枯自古趂九十韶華六旬餘力終日醉吾圃十六買陂塘旋栽楊栁清風淨掃塵務栁隂已見踈成密又聽緑荷敲雨鷗戲渚奈倏爾翻飛飛過崔嵬嶼形神自語豈世事相縈機心未息物我不同趣池亭小收斂風烟來許漁歌何愧鍾呂水紋瓦影相娛悅髙詠退之佳句荷酌醑有一曲滄浪不犯人間譜悠悠振古問誰似吾儕攻迂習淡為水廢場圃十七買陂塘旋栽楊栁眼中已辦歸務桞成修幹蓮成實均沐老天恩雨憐小渚敢氣象侵陵海上紅雲嶼神仙有語任涓滴蹄涔茫洋鯨浪各自適歸趣星星鬢鏡裏衰容如許西風又動商吕九原宋玉悲何及付與短歌長句飄泛醑縱不到箕山也是曽通譜由今視古看晝錦堂前霜天老月千載照韓圃十八買陂塘旋栽楊柳田家小小成務一年清景君須記大勝草烟花雨氷沍渚把一片玻瓈圍護瓊瑶嶼鈎簾獨語是天富吾家地輸清供種種出奇趣桑榆樂造物而今已許一竿自惜歸吕圭塘欵乃烟波曲却屬腐儒章句尊有醑是波也神湯世與詩同譜誰能復古且池上觀梅爐中煨芋燈下治書圃水龍吟過黃河濁波浩浩東傾今來古往無終極經天亘地滔滔流出崑崙東北神浪狂颷奔騰觸裂轟雷沃日看中原形勝千年王氣雄壯勢隆今昔鼓枻茫茫萬里棹歌聲響凝空碧壯逰汗漫山川綿邈飄飄吟跡我欲乘槎直窮銀漢問津深處入喚君平一笑誰誇漢客取支機石二題賈氏白雲樓次牧菴韻結樓髙倚晴空人間何限思親處白雲誰遣等閒出岫悠悠來去本是無心寧知下土有人延佇悵荒烟衰草九原難作空目斷邱陵樹見說大鵬變化趂扶搖又摶雲路朱簾畫棟關山綿邈夢魂良苦兩字行藏百年忠孝致君榮祖待更區屏翳溥為霖雨繼商家傅三至順癸酉九日秋興亭賦一亭飛出層霄昔人似為登髙辦雙眸千里茫茫宇宙滔滔江漢一片秋光青山紅樹斷雲斜鴈想人生塵世難逢開口但酬節何多歎細數年年今日娛清歡半因羇宦邇來心事無慚猿鶴更齊鵬鷃華髮新添黃花任笑烏紗頻岸且一尊傾倒不須醉後把茱萸看四趙伯寧中丞代祀淮浙過維揚徴賦五雲飛出蓬萊天香散滿人間世龍翔鳯翥千齡一遇明良慶會節鉞重來士民騰喜山川增氣想四方地遠九重心切都要見閭閻事寤寐天顔咫尺裊秋風一鞭歸騎昔年勳業烏臺倚重紫垣虛位自顧踈庸資身無䇿敢論經費但儒酸不改作醎充賦助和羮味五喜雨用鄭彥章韻四郊禾稼如雲方驚數日甘霖小吾皇有德老天能事非因人禱一夜風雷𤣥雲撩亂銀河傾倒問田家消息今年氣象更催得秋成早壓盡東華塵土湛氷壺九重清曉晴光漸放瀛洲波定御溝聲小緑野春回黃扉晝靜篆煙縈繞願魚羮有飯避賢歸去向山林老六甲申七月草六日偕王居仁王仲武小酌洹堂洹堂半月三來小庭日見添佳致蒼筤踈瘦黃葵髙潔玉簪清麗林影波光新晴景物嫩涼天氣對溪山如此田園歸去除詩酒渾無事爛漫鄉鄰雞黍比當年鼎烹加味古今都說浮雲春夢功名富貴何事迷途直臨老境才尋平地把塵寰休問菊花行綻請重來醉七次前韻此身就健宜閒莫教七十才休致招讒賈怨聲名烜赫文章雄麗三紀紅塵一簪華髮消磨豪氣有清泉白石實聞吾語吾衰矣無多事世故真如嚼蠟數年來已知無味尋常有句人為宰相閒方是貴洹水秋清無邊風月無窮天地看奮髯箕踞蒼苔濁酒為青山醉八平生人海風波謗書盈篋從文致歸來結構且圖跧伏敢求華麗朝暮娛人水聲山色栁隂花氣笑彤闈紫闥浮沉十載更幾載成何事好是西成咫尺秫田風已飄香味安排小瓮從今不怕鄰翁酒貴更築詩壇從君逰刃周旋餘地但有人來問金鑾舊話便昏昏醉至正集卷七十九
