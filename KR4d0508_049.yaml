body:
  text: 至正集卷四十九元許有壬撰碑志有元功臣曹南忠宣王祠堂碑至正元年二月乙酉中書臣僚言敕建曹南王阿喇哈祠禮部議視淮安忠武王而祠於集慶縣官給其費且請賜田千畝以奉祭祀制曰可既月王之子托歡由中書平章政事拜御史大夫行臺江南臺治集慶又得躬相厥役以迄於成貽書有壬曰子嘗承詔銘先王知先王莫如子祠落矣願有紀也讓不可乃本其狀擷其家世履厯勳庸之槩曰蒙古哈爾拉氏有贈定威佐運功臣光祿大夫司徒諡忠定諱博綽者王祖也贈宣忠靖逺佐運功臣金紫光祿大夫中書右丞相諡桓毅諱伊埒肯者王考也勳皆上柱國爵皆曹南王身皆死於戰有大功祖妣塔布妣摩哩皆封王夫人此其家世王沈毅善戰襲桓毅職中統四年錫銀章虎節仍上萬户至元十二年擢昭毅大將軍以上萬户權行中書省事進中奉大夫行中書省參知政事明年以參知政事行江東道宣慰使明年入覲升資善大夫行中書省左丞十六年進資德大夫行中書省右丞仍宣慰江東十八年入覲拜中書左丞相行中書省事階光祿大夫征日本次明州而薨壽四十九葬曹州濟陰縣郭村纍贈推誠宣力定逺佐運功臣太師開府儀同三司上柱國追封曹南王諡忠宣此其履歷嵗巳未渡江破宋師於隆興北山中統初討阿勒達爾琿塔罕於河西明年扈征額埒布格于幕北明年從宗王平李璮于濟南四役皆有竒功賜黃金金箙金鞍文錦恩數稠疊至元四年觀兵襄陽明年圍之越六年克之始走宋師安陽灘中綴宋師百丈山卒與䇿勳焉十一年略地江北奪郢州南門堡獻蕩舟之䇿渡沙蕪取鄂州泝江陵至鎮江十二年與淮安忠武王右丞相巴延分道取宋王發建康道與宋師戰屢敗之破東壩寨拔溧陽建平廣德西安長興闢獨松關前後斬首一萬五千級殺其將杜總管吳奉使許吳二總制及騎將二人俘谷總制張知府禆將祝亮等四十二人十三年三軍㑹於杭宋亡狥浙東降趙提刑等五百餘人追播福安僵尸四十里殺步帥李世達俘秀王與擇監軍趙由防禦使林德降安撫使王吉分軍興化擒宋相陳文龍降宋官二百餘人淮兵三千人江南遂平此其勳庸配托端庫庫楞呼圖克台並封王夫人子男二長伊蘇岱爾銀青榮祿大夫山東河北蒙古軍大都督集賢大學士次大夫也女五俱適望族有壬惟古者功臣受封之國先建宗廟於路寢之東所以廣孝而勸忠也諸侯之制二昭二穆與太祖之廟而五太祖百世不遷昭穆則親盡而遞遷之自漢以來諸侯鮮及十世身享崇爵而子孫不能保也廟制由是而弗講矣其有德及生民功施社稷者在朝廷則有圖形以寓其思賢念功之意在其臣吏則有建祠以盡其事亡如存之心亦因時制宜之義也諸葛武侯之沒所在求為立廟又請立之成都後主皆不聼民至私祭陌上以武侯之功尚何靳於一廟豈欲黜私祭以崇正祀邪夫所在立廟在禮若泛立之成都亦復不聼何哉至習隆向充之請始聽立廟沔陽則武侯之得廟亦戛戛乎其難哉皇上於忠宣既立之祠又錫之田思賢念功之盛德豈區區蜀禪之所知哉大夫祇順德意克篤前徽勸孝勸忠於是乎在皆可歌以薦者也乃為之詩俾歌以徹豆籩其辭曰乾元統天乘六龍宏才碩德如雲從忠宣天挺間世雄父菑子播昏作農帝曰來汝汝世忠奮戈無往不奏功方城額額暌皇風分兵犄角乘其墉沙蕪飛渡星月蒙順流霆擊無遺鋒義旗禮干趨獨松趙孤銜壁吳山空萬邦玉帛四海同台司兩轄昭報功虎符龍節行江東倭奴何物勞蒙衝魂升海隅心九重揚顯有子能始終哀榮典冊備且隆衮裳旒冕曹南封石頭城高江流潨新廟奕奕摩蒼穹圭田千畝畝且鍾維糜維芑紛穋穜舂揄釋蒸簋有饛醇醲載祼牲特豐備樂舞兮明禮容神保假兮福攸降象賢濟美垂無窮大元贈光祿大夫江浙等處行中書省平章政事柱國追封趙國公阿勒坦哈雅公神道碑銘江南行臺御史大夫阿爾斯蘭哈雅致政家居遣其子都水少監茂罕奉家乘請曰老夫賴先世餘澤竊祿位有年而吾父平章公墓尚未表非慢也顧盛滿難居功名鮮終恆懼不克負荷遺羞丘壠君恩如天幸賜骸骨養痾田里年且八袠吾知免夫子知我其銘之有壬讓不獲本其狀序曰平章公諱阿勒坦哈雅輝和爾氏世為高昌望族祖伊嚕阿爾斯蘭多木達多木達華言巨室也贈中奉大夫河南江北等處行中書省參知政事護軍范陽郡公祖妣伊特戩追封范陽郡夫人考諱哈喇阿爾斯蘭多木達當太祖皇帝肇造區宇國主伊都呼發兵攻金斬其長吏聞密實勒有異遣將命偕察喇四人馳告行在且具欵誠上曰果如爾言其告爾主以方物來對曰皇帝幸生活高昌高昌身且不敢有何有方物復命輦寶貨金織段以獻由是高昌內附因留宿衛從太祖南征卒於柳城贈資善大夫湖廣等處行中書省右丞上護軍范陽郡公妣雅克塔納追封范陽郡夫人公宿衛積勞除塔山屯田打捕提舉不就卒於京師昭回里第年七十一葬城西小南莊之原贈光祿大夫江浙等處行中書省平章政事柱國趙國公配巴爾呼塔噶封柳城郡太夫人卒於濟南年八十四大夫時長憲山東護柩歸祔子男二長大夫也次賽音哈雅同僉宣徽院事早卒嗚呼世臣大家上有啓而下有承得以世濟其美者公一門其庶幾乎公性恂恂而志趨超詣由近侍出官非其志也嘗曰我先人有大造於高昌民子孫必有興我不必為也夫以右丞之賢明畏天之義一介往來舉危亡之國而措之安遇知太祖天苟引年居高位享厚祿必矣乃鬱而不發蓄而不泄至公又植而不食必再世而後顯是蓋遲速之有時非人力之所能及而啓之於前者固已漨涌而不可遏公卒時大夫已拜南臺御史流澤之來浩乎其沛然矣其浮雲富貴優游以老宜哉大夫以卓越之才起家監縣為良吏入臺為材御史出亷諸道為剛明使者入中書分南臺為天子重臣歷九朝官二十七轉天下識與不識皆知其名而又躬服儉素衣無錦繡居無華飾榮寵方至退然若虛文皇嗣位聖眷益隆玉帶上尊錫齎相望至為玉刻署押以示殊遇當是時苟假寵於上為先世要美諡作豐碑亦何求不得顧乃自抑若不能加於其先有於其身者必遲回以待於致事又遲回以至於今日不請於上不謁於太常擇所宜為者自為之視世之朝暴貴而夕礱賜碑者有間矣二子長少監也次伊埒哈雅少監二子寶格寶山俱宿衛內廷公生世為賢子為賢父殁而享其寵嘉出於尋常身大官無聞者萬萬也其可銘也夫銘曰於維趙國作德於逸而小心以繹不柔以忮不競以亟以承其先烈以裕其𦙍息其先伊誰實為右丞孑孑其征屬屬其盈高昌之望曰命靡常主命不辱而天威肅將輦其金珍篚厥𤣥黃歸我聖皇以敉寧一方大夫繩武有逺伊邇右丞有孫趙國有子坦坦如砥矯矯如矢維天子使靡不極所止宜爾錫爾山峙川委繄來世之祉城西之原有樹有封刻銘豐碑百世可宗大元故翰林學士資善大夫知制誥同修國史贈推忠守正亮節功臣資政大夫河南江北等處行中書省左丞上護軍追封魏郡公諡文肅暢公神道碑銘泰定丙寅翰林學士資善大夫知制誥同修國史暢公薨十年矣制贈資政大夫河南江北等處行中書省左丞上護軍追封魏郡公諡文肅又十年加贈推忠守正亮節功臣官勳如故伯子江東道亷訪副使篤將侈君之賜灼公之善範後之承也諗其友許有壬叙而銘之碑叙曰公諱師文字純甫上世居汴公生洛陽大父淵贈中順大夫上騎都尉魏郡伯配田氏贈魏郡太君父訥參汴侯幕一府服其賢注地里指掌圖有詩名公幼警悟貧無書手抄口誦甫十五博覽經史弱冠謁魯齊許先生先生賔遇之髙弟若姚公端甫髙公道凝皆相推友善中原砥定慨然有志於世上時政十六䇿受知丞相安圖補右三部令史丞相巴延南征選為省掾從攻揚州常州下蘇秀臨安歸裝獨載書籍無一長物編平宋實跡上之初官承事郎行樞院都事重慶叛竭謀畫諾諸城相率內附安西王承制改四川北道宣慰司經歷尋除承直郎潼川路治中拔寒畯王朝綱王伯寧韓伯昌為府史後皆至達官修府治發地得白金五十鋌同僚分公十鋌公獨不受以修廟學傳舍餘作酒器給公用承制改同知保寧路事治尚平簡反側以安擢僉四川道提刑按察司事世皇知其賢詔所至毋敢沮撓給三傳赴上至則摘姦雪寃興學除弊風采一變有㫖若曰暢純甫不貪佳士也其令與臺臣伊蘇特穆爾為侣遂拜監察御史糾劾權貴憲綱肅然上所纂農書遷陜西漢中道巡行勸農副使置義倉教栽植闢荒田農事以興俄僉陜西道按察司事時按察改亷訪司精汰舊官獨副使盧公處道暨公仍舊興元監軍怙勢肆虐得其贓奏決之移僉山南道枝江嵗防水役衆往返四百里供給尤苦公以江水安流悉罷其役伊德呼駙馬之徒大為民害繩其尤者流之改僉山東道入為國子司業教育有規諸生服焉除陜西行省理問始至決滯訟三百餘事若右丞圖們岱爾之訟家財宣使鞏士安之箠折民齒開成同知張德昭之利女財而奪之歸皆强悍有恃官不能制者併置於法引疾歸遷太常少卿轉翰林侍讀學士知制誥同修國史成宗賓天武宗撫軍朔方仁宗淵潜覃懷而中宫屬意安西宰相知其不可乃集館閣議以察向背公與焉即揚言曰此宗社重事詎宜苟且衆皆默然又曰余病矣請歸調治遂拂衣而起仁宗入京始出視事草至大改元詔修成宗實録賜中統褚幣為錠一百加少中大夫請郡除太平路總管兼勸農事歲旱當禱公曰聞先旱必裒於民天可欺乎乃捐俸致禱不日沾足當塗民坐殺牛祈雨囚械者六十餘人公惻然曰雨暘愆期守令責也民殺牛致雨爾縱不愧於心尚忍聼其訟乎即破械出之舟有泝流觸㳂流之舟致溺其人纍讞不能決公亦縱之吏持不可上其議憲司卒是公議秩米收積盈屋公曰吾家人能盡此乎呼寒士小民恣其取去分憲至郡必謁公曰公治內無事此來行故事爾至屬邑曰暢先生治內何敢久留後守為之立祠於學召為翰林侍讀學士階中奉大夫奉敕撰王勃成道記序等文賜白金兩錠不受尋除燕南河北道肅政亷訪使視事五月歸中書遣編修官富珠哩翀奉翰林學士之命以請趕至汴以疾歸延佑四年丁巳秋主河南鄉試歸次襄縣西顧長安發丘壟之歎因感疾十月朔薨於縣之傳舍某年某月某日葬於襄陽峴山之原配伊喇氏上世遼貴族佩金虎符萬户某之女先公二十年卒兩封魏郡夫人三子長堆音廕淮安路判官轉將作院經歷拜西臺御史移南臺升都事除江浙省員外郎改僉山東道亷訪司事入為監察御史階太中大夫為今官娶李氏子六人勉國子上舍生年二十七卒勤劼勱績徑皆幼女五人次曰騫不仕娶成氏子績女一人次曰駿娶蒙古氏子四人朂勍助勝篤駿魏郡夫人生騫曹氏出也至元之初際興王之運得賢為監而文學之士措諸有政拔出流俗籍甚在世若魏公者混一來可數也公制行孤潔足以俯視一世立志高逺足以上追古人天下之人莫不驚嘆以為異人而不知者造訕騰議公亦不恤也若夫從南征而垂槖歸得地藏而用諸官屢辭上賜盡揮祿入雖公小節而其胸次為何如哉高公彥敬為山南副使移文言不可居公上者三謂公官五品先十餘年不可犯積薪之誚渡江孰不富貴至今家僅數口寒士無異勢利無一動其心高節清風殆不可及且兄事三十年義雖朋友愛如同生一旦岸然其上實不自安犯此三不義何以糾人之非即日辭去觀此則當時俗化之美士大夫風節之高公之所以致此者可知已朝為侍吏暮徼幸躐數級傲然為長吏為同列者聞二公之風亦可少愧哉公作守得古循吏體執憲有古遺直風至於立朝抗論不恤利害則其較著者也其為學宜專館閣備顧問而中外十轉始為國子司業又出為陜西理問入翰林才一轉官尋又出守再除翰林則老矣豈一時人才之多邪抑當時名爵之重雖如公者亦若是而已邪一技一能與不能操觚而專局至通貴未止者則又有命也邪然而列聖知遇多士推服太史有録太常有諡加贈有號而又承家有子則天之於公亦厚矣讀書一過目即不忘假友人宋長編不浹日反之友訝其易公曰豫舊熟之有忘者申之爾友記僻事數十驗之應答如響為文力追古作盧公處道以為似太史公而姚公端甫亦稱純甫實善文著述多而不存藁副使所粹才十一爾其見於世者不專於文也銘曰魏公之出際時浡興挾䇿見世淵儲遂騰宋木斯拔蜀蔓有艿簡牘既資贊益惟𢎞陶之不摦撫之不搄以隄厥潰以擏厥弸璧求簡編土視金繒皇皇使車爰七其乘善則爾揚愆乃爾繩學政聿修郡績載凝掌帝之制適天之夢大議不屈長江可淜名日山重家不縷增歸來自樂飲水曲肱有介如石有潔如氷峻如絶壁孤如秋鷹弛張玩世中别涵澠夷考其行不渝九徴聞公之風貪懦自懲宰木已拱恩光日升漢江茫洋峴首峻嶒元凱多事慮及谷陵惟德惟神有憺威稜景而前修昌而後承登世于千物莫我敢輘至正集卷四十九
