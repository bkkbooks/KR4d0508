body:
  text: 至正集卷二十四元許有壬撰絶句過安山家家門户瞰清流更向垂楊繫釣舟遠客多情無計住江山雖好只供愁郜信卿號洹溪以詩調之我愛洹溪作扁題不知君已號洹溪號從君取溪須論君領溪東我住西何叟青山何叟八十五能說王師徇鄂州子孫都不識兵革老我但思狐首丘龍眠踶齧馬圖平沙細草好相忘同類胡為苦自傷明日雕鞍響珂月九衢塵土要君忙郭乾暉鷂子霜風一夕淨雲林架上難羈萬里心莫怪主人留滯久要觀神俊不從禽鼠狼捕雀圖天飛穴處本何仇口腹區區苦見求休羡蛺兒搜捕盡又能媒汝上竿頭張師善恬齊氣機安處息飛潛虛自充盈淡自甜却是南華苦多事才言養智便非恬楊與可州判以道寓扁所居子山太監為之書亘天體物初非寓襲取無恆自遠之但看鳶飛魚躍處從知滕口不煩詩李遵道竹石老木圖石怪木老含秀潤翠竹却愛秋聲多一門毫素亦可念今日李家無小坡商德符枯木雙石圖二首千霜百霆摧不盡石兄歲晚能相從山人一見竒興發欲踞虎豹登虬龍石非攻玉木非材半委荒烟半是苔偃蹇郊原能事畢誰教收入畫圖來自得齊一齊風月浩無邊畢竟中間别有天若向筆端求此意斫輪父子不相傳題蘇昌齡集畫崑山𤣥圃玉抵鵲燕石可擲不可藏我不知書還及我又令雞鶩側鸞凰題思齊宣慰遠景圖霜空高閣捲疏簾天外青山見幾尖不為眼前無可樂主人心地似陶潛贈秋海樓玲瓏初日射雲烟俯看鯨波不盡天却被世人疑蜃氣豈知詩骨自能仙送盧教諭赴安化二首官冷從知不為貧古來師道重千鈞休言邑泮才涓滴中有斯文萬斛春湘寒嶽翠滿烟霞橘後江梅又作花羈思宦情都莫問好詩先出廣文家題墨梅橫披贈高納鄰參政氷霜為骨玉為姿卷贈佳人政所宜莫待雲山隔南北才憑驛使寄相思臨唐馬圖一早曹韓骨九泉圉人御策亦茫然典刑更到傳摹後不道房精已上天胡清卿寂然齊二首嚮晦深深踵息時天人到此總無為就中太極真形狀說與蒙莊未必知幽人一室靜沈沈靜室何如靜此心莫道無絃便無事室中今日更無琴上水石真源天一氣常浮海運黃宫在上游卷石底須分頂踵層崖千仭有懸流題錢舜舉三仙奕棋圖二首山林袒跣久忘形天地悠悠付一枰誰識旁觀三昧手支頥無語任輸贏商嶺仙真隱橘回手談隨處觸𤣥機人間柯爛知多少一老乘風尚未歸清江老樹圖霜餘澄碧晚悠悠老樹疏雲冷浸秋好段江湖清絶地幾時容我繫漁舟牛背觀書圖蒲韉盤膝勝安輿人訝形骸與世疏却笑徙居三十乘恰如牛背一編書畫馬惆悵孫陽世久無紛紛駑驥遂齊驅不教神物俱湮滅猶幸人間有畫圖送洪元振便養冷掾閒關不療貧白雲况有倚閭人從知後日千鍾祿何似藜羮一笑春翟志道永思堂孝思非但與生俱耿耿精成永不渝看取九原身後月蒼茫長照柏枝枯二驥圖為劉仲禮御史賦買骨千金世已竒雙龍何日下天池一鳴奮起君休惜不似當年立仗時送劉縣尹之宣寧寒暄有地從南北郡邑無常自古今寄語長人都莫問斯民三代一良心丙吉問牛圖肥充列鼎健充車厚養專為薄領驅千古清風梓人傳憑誰書繼丙家圖和喀喇子山韻四首洞深春早透蘭芽窗曉雲香亂海霞萬丈紅塵飛不到紫簫吹綻碧桃花草芳風軟小池濱花露沾詩字字新為問杜門緣底事人生難得是閒身落花飛絮亂濛濛縱更繁華瞬息中見說臨池揮灑處老懷無酒自春風風細流蘇揚繡毬珠簾斜捲柳絲柔日長靜對爐熏坐一穟黃雲暖不流范蠡圖平日千金土不如功成歸去固良圖扁舟若更無西子萬古清風滿五湖病馬圖將軍功就畫堂深伏櫪低垂老病侵縱使房星天上去涓人持骨尚千金松滋唐可臣提㸃得山谷三詩石刻求和苦竹泉在松滋竹林寺竹林寺竹苦如蘗却解涓涓出醴泉甘苦就中真味在愼毋燃竹把泉煎橙麯湯昔有洞庭春色酒更求湯液到金橙浮花拍碗醉不得笑殺街頭曳袋僧蓮子湯玉井經秋收翠蓋水仙分杵出𤣥霜可憐太華高千丈辦得華磁一勺香仙釋㑹飲圖紛紛仙釋鬬高閒占斷雲霞幾處山幸有濁醪宜盡醉莫留言語落人間米元章臨羲之帖郭才卿户部所藏浮雲鳥迹久微茫遂使王家號擅場屋下更來重架屋令人還笑米元章余蓬山墨竹四首興可乘雲去不還墨香傳印到蓬山胸中自可容千畝筆下時教露一斑天機傳到十分清曾向淇川印月明更被涼飈舞蒼翠眼中無葉不秋聲幾竿秋碧掠雲高風月幽林豈不遭底事一朝輕結實山巔朱鳯正嗷嗷老枿槎芽含古春一林寒碧自凌雲石兄不肯事攻玉只恐他山無此君稚川移居圖墨突不黔因救世君方逃世復何之妻孥莫憚驅馳苦會有雲霄拔宅時湘瀏胡子明大匠也誦子厚梓人傳甚習為余作屋蓋無愧楊潛者其歸也以二口號餞之大匠由來有相才心胸樓閣暗崔嵬山中宰相難論此曾見山中道士來十年鵬海漫遊遨今日鷦鷯恰有巢慙負堂堂鳯樓手數椽才辦蓋頭茅題張毅夫右司所藏捕魚圖用胡紫山韻二首達官底事賦休休見說人間窄似舟蓴菜鱸魚亦何有季鷹歸興不因秋當時曾泛洞庭春碧灔瑶翻畫不真三十年來京國夢政須傾海濯緇塵雪菴屏間有伯庸詩次韻二首拂天松檜護重門恍計幽居老樹村人海紅塵漲車馬道人庭院不能喧禪師西遊木已拱執法南歸墨尚新拂拭塵埃驚嵗月題詩更有後來人李陵臺謁左大夫二首馬馳如蟻散平岡帳室風來百草香羱盞泛酥皆黑湩癭盤分炙是黃羊李陵臺下駐分臺紅藥金蓮遍地開斜日一鞭三十里北山飛雨逐人來胡濵刺虎圖二首夫恩山嶽已葭莩不見於菟只見夫坐視青衣辱奴隸委身仇敵亦安乎一誠金石可潛通何物班寅敢爾雄多少良人苛政死夫人寸鐵若為功雪中觀梅圖西湖水月强傳神畢竟天機有未真直到一壺函太素中間才見未萌春至正集卷二十四
