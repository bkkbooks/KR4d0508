body:
  text: 至正集卷四十八元許有壬撰碑志劉平章神道碑功臣國有史家有傳墓碑有銘史則在公惟傳若銘志必是重托必其可修名偉績用底不泯焉有壬在少時知湖廣平章青社劉公已習晚識其子四川平章而不知公墓碑之未銘也四川薨其弟為湖廣行省參知政事始奉家傳請銘有壬以公名績如彼而託非其可辭參政請益切辭既不獲且夙嘗不揆不可而喜銘偉人乃核其傳而筆之公諱國傑字國寶系出女真烏庫哩氏歸我更姓劉氏曽祖諱延心金樞密使妣富察氏祖諱鎬金蔡息陳潁路都統妣圖克坦氏考諱德寧益都路軍民達嚕噶齊青難治且新造疑畏為設條約郡以治聞進龍虎衛上將軍卒官妣鄂囉氏子四人國秀國材皆居遼東國華早卒公其季也幼嬉即為行陳坐作狀工騎射從攻漣海有功擢隊長至元己巳天兵南下為新軍千户宋保障襄樊分屯萬山堡敵偵不備突至堡兵才數百公結陳直趨衆因乘之斬首四千餘級主帥嘉之賞白金百兩攝萬户略地荆峽深入轉戰俘生口萬餘賞白金如初數復戰城下多俘斬賞白金如初之半土城為藩蔽最堅作雲梯先登裹創力戰拔之錫金符階武略將軍敵圍久食盡張順等潛運以入公勒戰艦邀其歸路鏖戰五十里禽順樊城夾漢水潛杙其中盡拔出之毁其南柵湮其隍坎墉以登拔之俄拔樊城戰尤力呂文煥降甲戌奉詔入覲賜白金百兩錦袍弓矢鞍勒進武德將軍佩金虎符管軍總管我師次郢宋壁黃家原堡公以三百人徑奪之郢將趙文義襲我反擊走之文義敗死斬首七百餘級進武節將軍沙洋新城皆厄塞地先以五十艘退沙洋守兵進攻新城三晝夜乃拔賞白金二百五十兩我師自陽羅堡畢渡孫虎臣拒於丁家洲公以選鋒當前其衆自潰逐北至蕪湖始擢萬户是後纍功賞白金至千兩維揚之役詔壁揚子橋張都統率萬人夜寇備嚴莫能入遲明追擊禽之賜名巴圖國語驍勇稱也丙子維揚守帥李庭芝遁公帥所部追至泰州斬首千餘級獲之江淮平進懷逺大將軍入覲賜白金千兩錦袍弓矢鞍勒授僉書四川行樞密院事將行北有警制命公曰征者不力以其族屬懷顧望爾卿號陳力朕視卿如子當如朕躬行也行而敵已遁遷鎮國上將軍漢軍都元帥賜錦袍玉帶弓矢鞍轡褚幣中統五千緡俾戍青社戊寅徵詣上京統侍衛軍萬人北征慰託甚至公頓首曰臣粗習兵事惟血𠂻可以報國有功諸將力也萬一蹉跌臣自當之上為嗟嘆師次益圖大雪環車為柵穴地與士卒同卧起托克托呼犯塞輕騎襲破之樞密同知伯勒默色分道追敵敵已潰慮糧盡遇伏委輜重南奔為收其散亡而歸戍青海開屯田進輔國上將軍壬午召赴京師上欲復討日本公語稱旨授征東行省左丞練士治械於維揚閩盜黃華嘯衆十萬江浙為震詔公以征東士馬會捕直趨赤崖寨斬黃華縶其老弱購其餘黨同官語公不盡誅無以懲公曰黃華就戮詿誤已多况脅從乎彼方仰我生育忍更殺之但致期使自新足矣衆果自降初朝議恐賊不制發蒙古軍三萬濟討所過蕩然移文止之閩民德焉征東省罷改僉樞江淮又改四川俄復江淮征東省復仍為左丞詣闕上方略還維揚征東省又罷仍僉樞江淮東南賊未殄有詔一以委公改湖廣行省左丞湖南李萬一怙險莫制置郵為絶乘鋭平之丁亥駐桂林治交趾軍興四會獠出剽急搗其柵禽之詹一仔等冦衡永寶武張甚徵諸路兵慮饋輸不繼作屯於衡曰清化永曰烏府武岡曰白倉未半嵗皆自歸江西盜逾境會江西行院投蕭獠於陽山平懷集逋冦己丑廣東盜出沒扼其亢夷其柵焚其積聚殱其魁閻曾廖蕭嚴鑿山刋路搜抉殆盡樞臣請它官符上曰卿等忘劉二巴圖耶對曰劉已授上曰前以酬功今授俾延於世遣使持符即軍中佩之陳獠犯道連境遮擊之殺賊過半江西盜復逾境犯郴窮追獮之土人沿弊遵賊為惡得其狀皆戮之龍泉獠圍禾源下令往捕或謂賊未逾境不當行公曰休戚一體彼此何别且賊不意吾越境討之乘其不備破之必矣簡閲夜赴麾騎兵進步從之賊大敗奪所掠子女二百人還其家禾源窘已數日軍忽至民以為神皆爇香泣拜俘賊言南安鍾獠將出剽分兵猝至其巢獠衆錯􅌓自蹈藉奔潰萬户劉兵至賊已平矣出槖中白金以犒將士旋車桂東獠破酃縣大肆焚掠走壁龍泉分兵三路公由中徒步援蘿磴險抵其巢柵勦之擇酃要地置軍以戍永賊李末子七千殺其監郡呼圖公知賊素易官軍示以間暇扼其出路俾野無所掠逃無所之乃與降獠分道而進禽而斬之辛卯遷資德大夫湖廣行尚書省右丞廣東獠復叛聞公行皆自破散復湖廣行院公為副樞治盜舂陵盜又遁監郡貪虐下之理死郡人稱快紀之碑初公屢有功行省權臣抑不以聞至是行院始敘上之賜玉帶一白金五百兩時順德王逹爾罕以碩德重望行湖廣平章與公相得嘗謂公曰世間文字惟漢人之學為最惜我不知公曰以公之聰明任賢使能即是讀書使子孫留意經史即公自讀也王嘉納焉癸巳秋入覲上悅其來曰湖廣地重卿宣力多漢人每以老避事國人則不然目明身健即為不老卿亦未老將委卿大事卿還避否公對曰臣死而後已不敢避也上曰成哇既得復失卿盍為朕行對曰成哇指末物交趾掌中物也臣願為陛下取之上曰此事猶癢在心豈諸人爬搔所及卿言乃深合我意議典軍十萬公對曰十萬大費只須萬人上曰十萬多一萬少以畨漢五萬付卿公請近臣為監上初不許以示專任請不已乃令自擇時親王伊竒爾岱在側公以請許之授榮祿大夫安南行省平章政事賜錦衣一襲期諸軍會桂林甲午春朝廷有大故師遂寢成宗皇帝即位命公為湖廣行院副樞分院衡陽以遏嶺管江西賊犯攸州公搗大溪山四向捕斬賊為屏息施容羣蠻畔辰澧民不得耕畜地蓋狑獠所巢雜以貓猺數郡騷動公以土酋攻之有功者仍出槖中銀幣為賞應時破滅先是蠻恃山谷而吾士素弱公乃先涉危徑刋木闢路師行千里不扼於險渠魁田知州孟千户撒大王之屬皆就戮元貞乙未行院罷公為湖廣行省平章五溪郡縣唐宋以土丁捍蔽廢久賊遂肆公復之民賴以安又以道郴衡桂茶陵接諸獠擇要地樹寨柵草八以扼之入覲賜玉帶錦衣弓矢鞍勒御史臺奏出禇幣四萬緡以酬私犒之費上思州知州黃聖許叛命公討之身先士卒突其陳賊殊死鬬張兩翼馳之賊敗逃象山山界交趾多巨象獰獸林菁蒙密公料地樹柵亘數百里諸將分道入禽殺殆盡聖許逃安南撫其脅從徙慶遠郡不能自食之民耕其隙地為五屯因以為防奏上報可召入賜錦袍珍帽弓矢鞍勒上廄馬自是威讋南土矣大德辛丑召至上京灤水泛溢公董疏導之役和林有警命公出師將行會鬼國酋折節暨獠宋隆濟叛初右丞劉深言西南夷有所謂八百媳婦者沃壤多産可取朝廷信其言命之出師湖南北轉輸十不致一民為竭産役夫死者相枕藉折節乃渠帥阿那妻健黠而能兵師過其境不堪蹂躪遂叛遮深兵圍貴州朝廷患之亟命公往蒙古侍衛親軍都指揮使額森呼圖克副之雲南四川兵若深所統皆𨽻節制師次巴陵賊犯貴州急深敗績倍道赴之明年雲南又數告急議進止公謂蠻恃土産馬謂北馬不能險吾士馬既習其險易諳其變詐使賊不知為計不憂不捷次播州與四川汪帥兵合賊十萬且及境令諸軍畢入賊地分部攻擊蠻勢為沮時師行四千里天向暑糧且匱有旨須秋涼進發頓思播之境列營守禦申規約習戰射九日滇蜀軍二萬入鳥蒙芒部公所統三萬及思播兵萬人與元帥哈喇遜額森呼圖克分三道進公從中道節制諸軍賊所至為柵盛兵堅甲以拒公以客軍逺鬬非身先之無以作士氣崖徑斗絶即徒步雜士卒攀木而登遇其要害蕩滅無餘選射士列前發無不殪或設伏或縱擊竒謀間出出槖中白金為賞四十餘戰皆捷賊或降或匿且招且捕喻其酋以朝廷威德賊氣已竭以竒兵掩襲轉鬬千里抵雲南普安路境賊不復能軍癸卯二月己未折節就縛宋隆濟阿女等皆伏誅西南夷遂平召入朝將佐咸許上殿禮遇隆洽賜錦衣二襲玉帶一金鞍勒弓矢楮幣二萬五千緡御史臺又奏公出私幣賞功酬勞銀一千九百一十四兩楮幣萬五千緡二佐偏禆遷賚有差上御嘉禧殿顧公曰平宋至今百戰必勝可謂竒才公奏曰非臣之力諸將之力也詔過家上塜鄊里榮之至武昌疾甚語問疾者曰昔當世皇榻前誓取交趾願死於陳不願效馬伏波裹尸還葬也折節之役今上嘗預令署狀約日平賊否則藉吾家吾幸了此不纍子孫但恨不能取交趾以報世皇為終天之恨爾嵗乙巳二月乙未薨公生甲午壽七十有二贈推忠定逺效力功臣光祿大夫湖廣等處行中書省平章政事大司徒上柱國齊國公諡武宣先塋在遼東泰州普一路不知其世次矣公之考妣以至元己卯正月合葬於益都縣東北麻家營洱河之陽有翰林侍講學士閻復所撰碑公祔焉娶曹氏早卒繼李氏次薑氏王氏子三人曰托歡榮祿大夫四川平章也次某早卒次托出今參政也女若干適某孫男若干女若干曾孫男女若干至元初國家將囊括四海勝國岸然東南文恬武嬉勢不能不亡也及誘我叛臣縶我行人則其罪盈矣大聖御極順天應人大將一出江淮版圖固已在吾職方氏几上矣亦惟一時將帥之得人偏禆之用命際興王之運而各有樹立焉公以雄毅之姿奮身戎行其樹立亦茂矣哉天下甫定如大病始愈必有餘疾此才已而彼又見人或易之亦有能斃其身者江南之既平也閩中江西湖南黔中之諸盜廣東西之諸獠足以鼓動一時魚肉吾民是雖餘疾非良醫未易治也公乃獨任其責或獮剃或招徠而威名所及莫不斂迹南北萬里始終百戰可謂多矣最後小人啓釁於承平之時敗軍亡將於小醜之手至糜爛汗漫不可枚舉矣而又以屬公公年七十矣乃能奮不顧身以刷國恥此又收功而尤偉者也其怏怏賫志以逝者獨有未取交趾爾是蓋有非人力之所能為者世以為公之恨而亦以為公之幸焉公之薨三十五年猺獠之發不知其幾朝廷議將每難其人坐糜供億服未旋踵檄報又至則知公者其益可思也哉銘曰金源澤竭望族俱堙逖矣東土孰鬯厥屯薪傳不熄泉流有洑海岱鍾竒偉人奮出王師弔伐適逄其時結髮行陳死生以之萬山之役以寡勝衆錐穎既脫威名日重苦同在下勞為士先乘梯於雲拔杙於淵堅壁摧鐡飛舟趠空我惟不出出乃即功鬩墻有警讋於先聲茫茫青海沃壤可耕大風始息餘波猶蕩頑民弄兵有戮有放五溪阻幽嶺嶠險邃虺蜮起伏亦恃其地僕僕掃除甫東又西有聞即行孰立畛畦伏波矍鑠自視未憊吾忘吾身馬革何待嗟嗟小人談笑開邉乃血我師俾流為川不有此翁揮戈白首西南之夷幾非我有天恩優渥下遍將士玉帶錦衣照耀桑梓歸來林下不煩綏復匪公之志亦公之福眷兹洱陽百世其昌我志公功於戲不忘至正集卷四十八
