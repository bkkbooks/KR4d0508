body:
  text: 至正集卷七十六元許有壬撰公移辨平章趙世延伏以公論昭明見朝廷之政治正人伸雪乃風憲之振揚苟有見聞豈容緘默竊見光祿大夫前四川行省平章趙世延先任御史中丞倡率監察御史奏劾姦臣特們德爾不法一十餘事及中丞多爾濟等按問特們德爾下總領蔡雲因馮開平身死公事過付張五十三許與特們德爾中統鈔一千定本人受要説事錢二百定招證明白徴贓到官其特們德爾幸得脫免追印罷職因此懷蓄忿怒至延祐七年復入中書盜弄威權專務報復陷害忠良無所不至將中丞多爾濟并蕭拜珠織羅誅殺又以溫德亨嘗贊其事坐以減死之罪為平章趙世延遠任蜀省令人誘説伊房弟胥益兒哈呼將赦前千名犯義虛妄事情排陷陳告差人勾喚赴都對問行至中途遇赦釋免又行差官催促到部令伊門下心腹人尚書達爾瑪實哩非法煆煉勒要招伏鎖發前去三不刺復還大都凌虐枉禁前後三年意逼自裁本官剛明自負不為匹夫自經溝瀆之事其元告人自知誣妄不敢面對因此在逃根勾不獲為本官患病奏奉聖旨保管在外刑部議擬胥益兒哈呼訐告房兄趙平章逐項事理俱在革前元告人在逃百日之上依例革撥改正蒙中書省聞奏令還家養病兹者欽遇聖天子登極之初眷念忠良枉罹刑害如多爾濟蕭拜珠溫德亨等首降德音特與昭雪其平章趙世延即與中丞多爾濟等一體中外共知理宜辨正況本官廟堂偉器柱石良材省臺出入垂三十年叩瘁焦勞幸脫虎口似此老成蓋未易屈指也江南行臺已嘗辨明如蒙奏聞擢用允愜輿情辨廉使劉藻繩愆糾繆固為憲治之常美化移風尤係人倫之重故經典著子為父隱之訓而法律有許相容隱之文誠以教化乃刑政之原而名義又教化之本使其干名犯義訐證皆實其於治體所傷已多況有是非未分曲直不辨抱沒齒之寃者乎聖朝明詔天下著為定例承宣奉行者其可忽邪伏見前淮東道廉訪使劉藻皇慶元年因揚州路包辦酒課不便本官力言議減瓶花價錢遂忤衆意本道滿濟監司受訖酒户趙勝中統鈔三百定經宿却行齎至公廳喚到與錢人趙勝等取問指出上下官府錢一千五百五十定內劉廉使下家口周來安鈔五十定就令趙勝等具狀首告此時并無劉廉使名字為周來安出外本官自行根喚送官省臺委官追問狀外逼問供指曽令周來安將鈔一百定過付本使收受未見虛實將劉廉使監收之後才將周來安勘問勒指伊使本人不禁苦楚符同強證將劉廉使抑勒招承追贓到官事未結正欽遇原免延祐三年奉使宣巡撫歷淮東耆老士庶並趙勝等列名陳辨及淮東宣慰使孫通奉等洞知情偽皆為辨白於今有十餘年尚未改正竊惟劉藻揚歷有年報效無愧凡平居之自守亦衆人之稔知不幸枉被贓誣名節掃地含寃無訴垂老可憐假使元贓果有即係奴證其主不惟有傷風化抑且違别詔條甚非朝廷美教化厚風俗之初意況兼元狀初無本官名字即係節次狀外展轉供指數目即此二端則是非判然矣如蒙憫其無辜特與照勘改正庶幾誣構得明而公論有在也自劾竊謂君親無將既載必誅之訓路馬不齒又昭有罰之文況惡逆亘古之罕聞宜臣子戴天之不共如元惡特實等狗彘之所不伍梟獍之所不為富貴薰如自不勝其飽暖鬼神奪魄俾偶遂其凶邪雖養豢之極深曽冦讐之不若履霜失辨留虎自防致大行之暴崩實溥天之同憤傳諸道路蓋不忍言不惟詩書歷代之未聞誠為國家百年之大變卑職等風聞未審心摧已深春秋之法人得而誅風紀之中責斯尤重豈敢顧影自惜背義忘恩但以乘輿未來控訴無所欲論列而上達念通進之難期兼同惡方布滿要津恐無益而徒啓他釁是以含忿忍恥度日如年庶覲清光少攄積恨兹者欽遇今上皇帝奮出宸斷張皇天威肆諸市朝大伸邦憲神人稱快億兆騰歡使綱常復明於今日乃社禝無疆之福然元惡特實身為臺端妹為君偶其同惡之賊或寒微致相或宿衛承家休戚既同安危攸寄今擢髮不足以數其罪虀粉不足以報我仇止戮其身未快人意擬合將各賊照依古法盡誅本族其妹難居宮閫仍壞室汚宮以戒非常之變其餘但犯知情人等以次論罪卑職等為耳目之職任糾劾之司有所不知與知而不能得其詳及有所待而不即言皆合黜退糾中丞等人臣之惡莫大於無君春秋之義尤嚴於與國故漢誅梁冀而其故吏賓客免黜者三百餘人朝廷為空誠以惡逆之人無罪可擬其惡人之徒雖有輕重不同而在所必論者也先王立法壞其室汚其宫而瀦焉宫室何知必壞必汚而後已以逆惡之所嘗居也居且若是而況官為臺察出其門下者乎元惡特實其罪彌天今雖誅戮門下人數在百司且不可其在風憲如中丞某者自宣徽院與之周旋繼而援引入臺由侍御遞升是職比者本賊為惡之後將本官呼召馳驛前赴上都蓋親聞其事矣本賊既為知院幸而出臺又於九月二十一日盛其鼎烹赴宅相賀惡逆如此忍猶媚之經歷某諂諛輕薄素非歷練阿附進用遂掌憲幕監察御史某某某皆非風紀之才徒為本賊牙瓜而已其為門下衆所共知具呈聞奏區處施行遼王嘗聞書曰惟辟作福惟辟作威言天子可以作此也朝廷仁厚相承匹夫但犯死罪有司再三詳讞必待奏可乃敢施行宗王同姓為國藩屛任之固重至於生殺之大柄雖匹夫有罪亦不敢僭而況親族貴重出於匹夫萬萬者哉近按托布哈太子等嘗與惡逆此在聖上躬斷者尚且會集宗親共議處置比托克托遼王擅殺親族巴哩雅等實違太祖皇帝大法不聞有所處置內外無不憂疑若不早正其罪則號令倒置威權下移祖宗法度有所不行啓將來之釁實關宗社之大計者也卑職忝居言路義不容默索諾木嘗聞有功不賞有罪不誅雖唐虞不能治天下如姦臣特們德爾蒙蔽先朝專權政府包藏禍心離間宗室妄作威福誅害大臣使先帝孑然宫中以致賊臣特實等乘釁為逆其子索諾木與其事兼本人隂險狡獪陷害臺諌附凶黨惡罪不容誅已經糾呈聞奏今奉命乃令杖決物議喧騰非示極刑曷伸邦憲乞賜早正其罪仍命詞臣聲逆賊等罪惡昭告天下以快元元之心天下幸甚班丹等嘗謂倿人不遠實妨日月之明早辨或虧必致氷霜之漸近者姦臣特們德爾之子班丹因取受李文郁等鈔定事覺奉旨追問徴贓到官徼幸遇免及刑部尚書不達實哩徽政院使哈扎爾巴哈等俱經斷罷追奪竄逐得罪朝廷之人理宜屛棄況班丹之兄巴爾濟蘇之欺君弟索諾木之為逆俱已誅戮籍沒家資觀音努亦以贓杖一百七十一門之內父子兄弟險愎惡凶無所不為今班丹既以不敘布達實哩哈扎爾巴哈等各曽經斷追奪流徒當杜門不出悔過思愆兹乃出入宫禁密近清光􅟠蹇軒昻靦然無愧聖天子即位之初親賢論道思致太平而此等姦凶豈宜在側其餘似此犯贓經斷之人即係一體宜從憲臺照勘聞奏屛黜實防微杜漸之一端也又班丹弟索珠見任翰林學士同修國史朝廷實録理宜嚴密其父子凶惡如此豈不載紀而令其弟在中親與其事甚非所宜亦合明白聞奏廢黜及無令出入宫禁天下幸甚特們德爾門下等事竊謂刑賞者人主之大柄有國盛衰之所係也故刑一人而天下服賞一人而天下勸者當其實也苟有功不賞有罪不誅滔滔橫流日復一日其禍有不可勝言者矣書曰惟辟作福惟辟作威此言天子之事也臣而盜弄所作雖當猶至於害家凶國況顛倒錯亂岸然橫恣者乎聖朝混一區宇以來言大姦邪必阿哈穆特僧格之徒如特們德爾者兼諸人而過之今治化更新之日其人雖亡其流毒遺惡傷國體而妨新政者何限無以變之則其流害恐未易竟也至若平章王毅右丞髙昉等備位臺輔而以短少糧數倉官所職之事追奪所受宣敕尤公論之不愜者其門下同惡之人先因本官事發一一斥逐其再入中書朦朧奏啓一一徴還濫授驟升非其才而忝要職者有之各人含其私恩必不能盡忠於國昔梁冀既敗故吏賓客免黜者三百餘人朝廷為空蓋古今之共怒者也特們德爾之惡死有餘辜僥幸獲免雖是非邪正播告明白而天下之憤尚未少泄擬合剖棺戮尸將妻子家屬遷徙遠方以謝天下應被誅譴人數從省臺委官一一照勘有寃抑者即與昭雪沒亡者加以褒贈流竄者即與徴還黜罷者即與收録所追王毅等宣敕即與給付門下之人在風紀者其不可用固不待言其散在大小庶司職役者合照節次糾彈姓名並延祐七年取回各人文案內數目及當時見在兩都就用續用各人員取勘見數明示黜降其大師監修國史僚佐通事譯史掾史宣使人等無非以賄得之擬不敘録職官取充者止理舊資本府役過日月不與準算則天下之人皆知公論之有在天網之不漏是非邪正由是益明而姦邪之徒亦知所懲戒矣惡黨論罪近為特實惡逆狗彘之所不伍梟獍之所不為歷代之所未聞天地人鬼之所共怒止戮其身未快人意合依古法盡誅本族壞室汚宫遣逐其妹其餘但犯知情賊徒等苐論罪已嘗論列除特實之弟并子已行誅戮外其餘一切未蒙施行民心疑駭不滿所望竊謂國家有非常之變必以非常之法治之如特實者身為臺端兼領數職妹為君配已正位次先帝待之情過骨肉其餘各賊皆纍世富貴義同休戚而集賽官員又腹心股肱之托其赤子特穆爾微賤匹夫位極宰輔子女玉帛房室田圍不可勝數榮遇眷養無以復加縱不報效忍為冦讐自古宫闈之變未有若是之慘者興言及此痛心隕絶待以常法可乎且尋常殺人罪必處斬各賊所犯當何法以加之若苟且如此更無施行不惟神人歉望威刑失宜繼今以往何以為國區區臣庶之心亦知大臣必稟命聖上而聖上英斷必有以處之然而不可緩也為今之計當一振威怒顯示大刑凡與特實同謀之人皆合盡誅其族拆毁居室瀦為汙池其餘不係同謀而但犯知情隨者等第論罪其家屬籍沒若留京師亦非所宜合竄放遠惡地面女子分配彼中流囚男子在彼居作永不放還特實之妹係是禍根勿令汚染宫壼即日逐出從朝廷議擬區處應係各賊門下人員盡數照勘顯示黜斥如此則刑法適宜姦邪知畏神人稱快國祚永康矣聖上踐祚之初首宜以服人心安百姓為務此事既行則人心自服而百姓自安矣至正集卷七十六
