body:
  text: 至正集卷六十四元許有壬撰碑志先太夫人歸祔志生乙丑年太夫人姓髙氏世家彰德祖諱穆爾監衛輝路考諱榮承事郎萬寧縣尹太夫人幼淑懿祖妣王夫人愛過其女擇配極愼乃歸先尚書公家故饒田畜而我素貧安若習焉事姑宋夫人以孝聞周睦姻黨舉無間言先公為小官間關世途實多內助同官家芬華相矜獨罄簪珥延師買書嘗曰吾教子苟成當富彼百倍人但勵志安貧瀆貨其效應後自見也先公好客究力營給有佳飲食必蓄以待平生不私一錢聞親識有私藏者謂子女曰財出夫子私將焉用此態世多我不能為汝曹當戒也子女雖愛教不姑息故女克敬戒子不至辱其先者慈訓有素焉長子有恆治生於外太夫人總於內先公居家手不釋書迄終身無纎纍一妹適集賢直學士狄文忠南北間關語及輒流涕因為有恆娶其女尤好施豫逺近姻族或飬於家或資以生里巷病窶猶拯焚溺故舊有喪飲食為廢後有聞率不敢告見人憂患汲汲督諸子營救臧獲小過必掩衣履瑣屑每躬為之諸子止之曰彼亦人也吾以此消日爾其仁厚慈恕蓋出誠性至於女工精敏又諸族所希見有壬為兩臺御史封恭人湯隂縣君左司員外郎進髙陽郡君兩淮轉運使加髙陽郡大夫人至順二年五月草六日棄代於揚州夀六十有七嗚呼天乎乃至是乎有壬始官南北雖不在側而改官加封報不間歲尊慈殊慰以為酬昔言矣承乏詹事中議轉左司員外郎右司郎中又移左司皆在側也侍先公終正寢襄事居鄂服除有恆忽去世季有孚入㑹試而有壬迫赴淮漕叔有儀弃經筵檢討獨任家事尊意懸百口纍不肯出有孚登第歸居家待次乃甚喜有出意即迎至揚有儀從焉有壬召參議中書省事具舟將北太夫人鍾愛幼女擇歸有日臧獲病者十人乃語有壬曰汝妹事吾寤寐在念北則迂矣且病者留之誰託挈之舟隘暑蒸此幸屋大宜夏有儀又善事我汝當扈從上京京師屋難得汝先往求之别不兩月妹事畢病者復計我至京扈從適歸事當兩濟况使來三月不亟行恐叵測時往還諸公亦旦夕從使者聒聒相勉謂堂上起居康勝處事明當而有壬冒榮不孝遂輕信焉去才四十五日而訃音達上京矣嗚呼天乎果至是乎昔南臺同官言親年逾七十無兼丁溺官榮違奉飬者可禁指其鄰有任江西父病念其子而殞者有壬時同署焉孰謂一旦身當之邪呼天不聞呼地不知知是而懲而卒罹之豈非冒榮之過遘此大罰乎棺槨衣衾雖有儀能盡美而有壬為子病不得嘗藥終不得視舉尚名為人邪古人謂勿之有悔如有壬之悔非死不能巳也有壬及事祖妣夫人獲奉考終後草年父兄繼失荼毒雖極而夙夜堂上身心有屬今仰而望之無一人在上矣追念配德實四十五年生五子二女有恆大理軍民總管府知事繩繩夭長女適編修官趙彛將同入京先草五日卒病其基此乎幼安貞將歸人者後草四日卒天禍我家何其酷也孫男二寶山燕山女四明年五月十六日祔安陽武官原先公之墓初太夫人妣武氏若外祖考諱清外祖妣石氏皆老吾家萬寧公無子沒海南求其柩歸俱葬江夏治命當反鄉里謹奉而襄事焉敢述先德且聲不孝之罪傳為子孫戒焉嗚呼痛哉天地有窮而此恨無窮也亡兄大理知事公志公生於乙酉年四月十六日甲寅時公諱有恆字可久彰德湯隂人曾祖諱信祖諱毅贈亞中大夫彰德路總管輕車都尉髙陽郡侯祖妣宋氏髙陽郡夫人考諱熙載從事即㑹福院照磨兼管勾承發架閣庫贈嘉議大夫禮部尚書上輕車都尉髙陽郡侯妣髙氏封髙陽郡太夫人先公為貧仕祿入甚微亷淡樂道不知治生公幼從至鄂種學緝文通蒙古書未冠即奮勵任家事稱貸廢居傋水陸艱苦當途薦茂材除太寧路學正擢大理路軍民總管府知事驛符偕敕至公謂逺出不能為榮不若治生以為飬也由是不復留意於聲名矣先公之喪哀毁踰禮去大祥二日卒於鄂天厯己巳二月二日也疾革曰我才四十五數何短也事母再一二十年不為多也今不得事母矣嗚呼痛哉先公年甫强仕即得公力遂斷家事每當赴調公輒代行山川﨑嶇旅食蕭索不知也佐湖廣省理幕再至鄂公習風土便薪米因葺居焉有壬應舉厯官奔走無寧歲仰事之重非公不能出也先塋襄事侍太夫人居鄂囷庾之積鮭菜之微莫不有備己巳庚午之荒一門老幼賴以無餒公氣和而中剛斟酌世故曲折詳盡儉於自奉而豐於親朋早夜克勤內外秩秩娶李氏先卒一女小茶靜慧絶異繼狄氏集賢直學士文忠女無子先公嘗令飬弟有儀子寶山公既卒太夫人遂命後之初有壬登第季有孚方學公曰汝能繼兄當作雙桂堂有孚果登至順庚午上第有壬為兩淮轉運使遂參議中書省事加恩二代皆公之願惜不及見也我彰德公自潁來相積善未享先公太夫人承以碩德乃五子二女公其長也在親左右之日校有壬為多古人生願為兄之意蓋有契焉顧奔走四方廢溫凊定省萬鍾千駟果何有哉公之遂此天厚之也然以孝友天至而不終子職使太夫人髙年反服又若天之甚薄者天可問乎使公夀考則一門老幼可坐而無慮吾兄弟放浪四方可無內顧之憂而公之所以成就者可勝言哉公為子而能子齊家而家齊視食焉怠人之事者有間矣人之生世不獨官可行志也天降酷罰太夫人奄逝以至順三年五月十六日祔安陽武官原先塋公從懼其善之泯也忍痛輟泣而志之蓋至哀不復文也亡妹趙宜人志丙申泰定丁卯二月先公尚書府君諱熙載捐館京師既祔先塋太夫人髙氏視諸孤居鄂是歲十二月妹宜人諱巽貞從其良人翰林國史院編修官趙彛自洪州來弔彛官京師宜人疾作不能亟歸有壬為轉運使揚州太夫人篤於愛母子不能離且以有壬室未有繼年髙目力不洞妍媸宜人亦謂我溷兄久願擇嫂以報至順辛未遂俱至揚俄得卜趙門趙居金陵侍太夫人得畢其願焉未幾遘疾五月一日卒於揚州年卅有六有壬暨弟有儀輟哀治事棺槨之美衣衾之傋傾城府官吏士民哀送儀衛之盛太夫人見之割不可忍之愛而亦為之稍釋焉惟許氏為潁著姓大父彰德府君諱毅始徙湯隂淳德起家先公仁孝太夫人懿德克生賢女而我祖妣髙陽郡夫人宋氏柔靜淳淑貞節著聞宜人及事之起卧與俱故性行尤相類幼不遊戲未筓尊稚衣履皆出其手先公太夫人在撫州更病獨宜人與弟有孚侍勞苦備至迄平復始解帶既歸趙太夫人如失左右手事姑安陽郡太君得歡心其客我也念違養不釋口質簪珥為資以寄寒暑履物不絶待介婦有禮視前室子詵詵自幼及冠人不知為異出趙族大口衆老臧獲尤難御稱無異辭先公以宜人質美輯女教書授之宜人為婦為妻為母舉無悖也彛官七品得封宜人今名日起官日大宜人宜均其榮而一旦先逝天之忍乃若是邪一子綿綿實生我家得竒疾太夫人屏絶家事盡瘁保育幸愈而健有壬罪大惡稔太夫人暨幼妹相繼傾逝逾月彛至哭曰相我者世不復可得矣太夫人嘗子我我制雖緦心不緦也同舟至九江以神主暨二子去嗚呼痛哉命果至是邪抑醫藥之誤邪將金陵之行觸新暑疲起居以致疾邪兄不能盡友愛而乃以移禍吾妹邪窮天地亘古今之恨萃於一身矣明年某月某日葬安陽原從其先塋彛請志之嗚呼豫尚忍志豫妹也夫沈痛隕絶書其概而刻之亡室髙陽郡夫人趙氏志丙申七月一日生亡妻趙氏諱定永平樂亭人其先在金纍世擢科號進士趙家曰充者登大定草五年第終盧龍縣尹子震至寧間及第蔚州軍判軍判之孫兼善倜儻不羈日本之役諸兄為省僚慨然從行大風舟敗冒白刃救兄出掾憲司行省與長官齟齬輒棄去為景州教授而卒嘗曰吾力學為校職使人稱先生是不墜先業志願畢矣介直嗜酒嫉佞若仇故所遇不合娶戴氏生夫人端靜柔懿舉族異之嘗有象過門鄉鄰空屋蔽垣諸女即僵走邀看夫人才十三竟不一出時大家以詩禮名者聞之為其子求昏先生曰吾與世偃蹇栖栖獨三女而此女最賢且術者言當郡國封若世雖大若子未可知也其家恚而謝之有壬未昏走四方辟山北憲憲使庸齊劉公有人倫鑑與先生厚一日招飲賀曰府尊屢書為君擇昏君之昏未昜擇也今真得矣毋慊不告此實府尊意不可失而此昏尤不可失也先生亦欣然曰吾得壻矣况庸齊媒世無有也好言遂合皇慶癸丑五月乃歸於我每以未見舅姑為恨南臺覲省有日而督召復北夫人至垂泣真意有不可掩者先公太夫人入京始得行婦禮女工復盡巧緻太夫人稱善事焉平居服浣補弊一縑不自用時有賜給悉留以獻先公之喪夫人力疾蒞事送厝所十里不車幾斃焉歲時祭祀寢食必廢主饋未嘗以涓粒私其子視豫妹如兄弟奩珥有需傾委不靳與娣姒居無間言入吾耳始封恭人當進縣君皆以讓吾祖妣宋夫人夫人素多疾天厯二年九月十七日卒於鄂年三十有四太夫人如失愛女有壬為服齊衰期焉初先公既棄諸孤幼妹未有家夫人誓言當盡簪珥奉之以養姑志以恤其無父勿使人謂兄不如父也嗚呼斯言丁寧猶在吾耳也夫人孝慈敬勤宜享福祉而夀乃止此邪歸凡十七年未嘗逺相離惟應舉來江南涉十月為最久相從歷九官山川跋涉貧乏辛苦每同焉官任雖劇俸薄食衆夫人衣飾每不給未嘗少動於心豫為轉運使祿入稍優而夫人不及見矣夫人生失五子一女卒後又失一子豫年將半百憂患纒繞夫人有以知我之心為何如哉一子燕山能讀書矣女順茶姆謹視之繼夫人趙氏子之如己子夫人可無憾矣至順二年六月追封高陽郡夫人明年月日葬安陽武官原從先塋禮也為之志曰惟性于貞胡嗇以齡兮惟孝于姑乃貽以荼兮其儀可母子弗覩兮拮据成室不同適兮佳城埋玉夢則髣佛兮目存耳言終不可諼兮擬毁璧己酉女弟諱安貞生戊申十二月草九日幼多疾太夫人高氏疲心殫力調護有成為人寡言笑坐終日不見喜愠食飲美惡早晏自幼不計口先尚書公訓以女教警悟强記遂通其說又能楷書組繡裳衣各致其美見諸嫂理家即善握算父兄祿入悉付之出內無毫髮失慈訓日益性習俱至故女德近備焉生最晚太夫人尤篤愛至順辛未春在揚州卜擇始諧柔日將届而趙氏姊卒太夫人復遽見棄妹素孝敬值此荐凶哭出輒殞時又大疫遂成疾十日而卒六月草日也明年五月十六日葬安陽武官原先塋昔黃太史為女弟賦毁璧因抒其意以極吾哀以志其墓焉玉在石兮多瑕得維瑜兮成復嘉可聘享兮禮天弗一試兮胡毁旃濟美兮世艱女懿兮亦然撫育兮既堅姆傳兮既賢歸之易兮才違擇之過兮後時嗟嗟父母兮終始難之厥施不爽兮誰復敗而孝敬有素兮母姊長辭時雖不疫兮亦將自摧侍媵在室兮奩儀夙傋留之益傷兮棄復無地江之水兮東流淮之山兮幽幽旅鴈嗷嗷兮窮猿啾啾汝來何愈兮汝去何尤洹之水兮先塋相之土兮先里汝竁有位兮父母孔邇不婦於人兮終女於家是亦汝志兮我徒爾嗟瓊芝月露兮與汝俱潔汝兄泪盡兮哭汝以血至正集卷六十四
