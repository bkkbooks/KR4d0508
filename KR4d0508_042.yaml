body:
  text: 至正集卷四十二元許有壬撰記務本齋記士盍觀夫水之與木乎水由涓滴為溝池為江河而放乎四海漑漫功利古今不竭也木始毫末而拱把至昂霄聳壑大可梁柱明堂細不失為椳闑扂楔無不適於用者何哉有本而已矣士之為學其亦有所務乎士何務曰務本論語首篇所記皆務本首章聖人言學後即繼以有子君子務本之言誠以根本旣立如苖之於根由是而生有不期然而然者矣務本齋者宋故衡安仁馬亨復先生書屋也亨復從北湖姚輔之受易而歸北湖以朱子書務本洎誠齋著務本説為贈因以名其齋焉至元丙子燬於兵字若説皆䘮後至元丁丑孫熈明初即故基作屋介其友乞余書京師而明初未識也庚辰始識之長沙道同氣合遂辱留不忍去明初謂扁得於昔記不可靳於今也愚昧於剖析而不能拂其請昔子夏子張子游以有若似聖人曾子獨以為不可至有江漢秋陽之喻後之學者不能無疑焉然觀君子務本之言則其於聖人似矣人生有父母兄弟有子言務本始於孝弟則三綱五常悉由是出仁民愛物舉而措之爾此所謂本立而道生者猶水木之有本由是而至於其極也若夫天下事物有本有末則又對待之言也舎其本而趨其末者衆矣故愚因務本之説而旁及對待之言非悖也因有警焉故孝也者敬其本也養其末也未有事親以敬而不能養者也忠也者誠其本也事功其末也未有事君不欺而事功不立者也書以五經為本百家其末也通乎經則百家迎刃而解矣文章以理為本辭華其末也未有得於理而不得於辭者也引而充之有本則有末學者知所先後其亦有益於為務本之學者乎亨復不幸才三十而卒子栻敬孚世其業長茂而實遂至明初則道之生也生生無窮矣愚不能有以益之也然竊誦大學曰自天子以至於庻人壹是皆以脩身為本易曰復德之本也蓋修身則道立復則心不外而善端存故務本者又當先於修身而修身又當先於心不知誠齋之說如何何當一見而啓愚茅塞乎大名路重建銅臺驛記良二千石之作郡也其猶家乎古有之處官事如家事然後能盡吾之心㫖哉言乎若近而實遠推而極之則治具之大小畢張矣夫宣化養民固其大者而吾部内闗於政者一苟不備顧不瘝吾治乎民生粟布以禦飢寒屋以待風雨噐以適用未有闕而不求敝而不修者也何獨至官事而若是恝哉且羣居往來自非匹夫傭屋未有不規函丈地以肅賔者况提封千里上有王人下有報政四方行李之往來則館舎非為政之先務乎大名在漢為魏郡後周為州唐始號大名府而宋建北京今為上路實河朔大郡也郡視古諸侯館人所職固當髙閈閎厚牆垣以無憂客使而自後至元丁丑大水蕩圯賔至率假㕓邸至正癸未九月河東亷訪副使托迪來監兹郡視民所欣戚及事之病益民者悉罷行之惟驛舍之圯迨兹七年事上禮賔大懼弗稱即倡僚屬割俸金購材庀徒躬相厥役乃堂乃廡乃庖庫湢廏泊食飲宴息之噐物巨細畢具伻來願有述也余惟古者王使之至侯邦與夫承王命而為過賔者郊勞致館之儀饔餼芻薪之節官正莅事上卿監之諸侯以正事出諸侯之大夫士以君命出或戾其所止或道其所由授館展車各有攸司賔至如歸莫不懷愛我國家際極覆載悉入版圖舟車所通傳置交貫事雖因古而法制之詳實過之侯甫下車興廢補敝首復驛舎知所先後矣昔單襄公奉王命聘楚而經陳候人不在疆司里不授館有以知陳侯之失德晉文大諸侯之館圬人以時塓館宮室鄭僑誦焉近代有刺韶州以創驛堠而立生祠宰萍鄉以驛傳完葺而受知天使則侯之是役可以觀政矣孫譙記褒城驛而謂州縣皆驛者以刺史縣令任之旣輕變易又數其於為政則曰我即去何用如此則州縣真驛也彼視官如驛而侯視驛如家愚哲判矣故為記其顛末以示後之為政者菊莊記安陽地稱秀麗昔人引洹水注城内為園池環城之池晝夜湯湯民室酒壚擇竒據勝無慮數百區西南匯為陂溪山之輸委亭館舟楫之盛麗蒲荷葭柳羽鱗貍狐之饒益實最一郡水不修民生日蹙陂遂為陸而亭館為墟矣好事者或事築植胥徒一假館花蹂木戕器敗屋損供頓少弗愜有遂賈禍者故莫不恣其敝穢而已焉余歸方事遊嬉而無所於適送客南郭歸並闉闍而西㣲行詰曲桑榆蔽翳負城有小圃徑造焉地僅餘百弓㢝幽潔問守者曰此王君季貞菊莊也雜花並植菊最多故以名時方挺翠怒長羅列滿地愛之不忍歸秋風作花見餉十盆品色莫有同者莖髙尋丈花大徑三寸餘蓋培漑有時芟移有法半嵗勤動而後有成信菊之拔萃者也季貞知予同其愛介其友請言吾方慨吾鄉風物之非昔而嬉遊無所於適也能無情乎淵明曠達芥視軒冕乃獨愛菊屢形詠歌至與松並稱茂叔談道有取於蓮並稱者二富貴者在所薄菊獨以隱逸稱譜之詠之者又代不絶口其貴重可知已季貞其亦慕古人而有見於菊者乎人生之樂隨寓可得口體居室不與焉故不他其藝以見其志不侈其圃以納其侮百弓之地可游可樂胥徒藐之而不屑來没吾齒莫有睨而規之者求寡而獲豐身安而志遂是莊之德不亦多且乆乎莊田舎也田舍穀為稱首不莊於穀而於菊穀吾口之所切菊吾心之所樂吾口寧緩而吾心不可不適也心適矣視如京如坻漠如也古有午橋莊築山穿池竹木叢萃固盛德之宜居後之主者已墮屠兒墓園之譏平泉莊之鴈檜珠栢雖曰僅存尋亦蕪絶矣富貴田宅之不可恃如是夫九原可作吾其從晚節之老圃乎且吾為人莊而日就荒人為吾莊而不獲一稔獨幸得歸而時游王氏菊莊庶幾鄉賢之萬一焉記菊莊而及鄉賢者髙山仰止吾鄉之士其勿以菊莊為嬉而已也乾明寺記余謝事歸里有寺曰乾明主僧德訓時過余旣乃相告曰佛居西方以七寳為宮室中華事之每窮土木之役然茅屋越席神亦安之亦誠而已吾寺無貯儲業精者驕荒者怠驕與怠相遭濟之以貧寺日廢矣訓視髪事佛主講若壇信者禮施豐約不敢校歳乆積楮幣為緡萬五千有竒乃搆大雄殿像設藻繪堂室庖湢大小俱興經始至正甲申二月落以乙酉十月雖不足比隆傑刹計佛亦與其誠而安之矣且訓見吾徒競錐刀如市商惟私其身一旦捐衣鉢啓爭貽笑故就今尚健盡以奉佛焉公不我揮故敢以告其徒福祐德成復踵門請曰㣲師吾寺幾墜願紀於石相城故多寺由隋迄五季有興無廢周顯德中廢省存者僅二十而無所謂乾明者宋李囬作郡志始列乾明禪院豈宋所建耶易院為寺又不知何時唐賜額者為寺私為招提蘭若若山臺野色皆是也佛以清儉為宗其見勞人糜財果樂此乎昔之佛者斷薪續牀把茅蓋頭未聞以締構雄侈為賢也長蘆宗頤師謂梁武之禍由崇奉不能清儉所致詎不信哉訓也居而能儉積而能㪚嗇於身而豐於佛懲其徒而矯其弊亦賢乎哉今海内名山寺據者十八九富埒王侯有興作猶資於衆因而利之此雖大小不侔而得失亦判然矣佛之説髙者凌青天深者入黄泉其淺而近者曰不貧不癡訓也其庻乎余旣聞訓之言又重違其徒之請求其故掇其法之緒餘為之記俾嗣者有所徵焉樂閒堂記人物之生於世安於其素而不知其樂者衆矣魚在水獸在山不知其樂也處之涸轍縶之虞人而後知江湖山林之樂焉釋而從之俾復其故則其為樂始真知矣物皆然人為甚賤而服賈陸有摧車水有覆舟虎狼盗賊風濤蛟龍之險卒然遇之號呼丐命於須臾而後知平地之樂也而仕者又甚焉仕而達矣若可樂也而其憂苦方叢乎其前事有必争而不容巳者不争則獲罪君子貽誚後世争則彼方震以雷霆壓以山岳惑以簧鼓大廷列坐十九瀾倒而欲以抔土障之當是時也思得釋去重負歸為閒人則其樂為何如此憂也有苦焉造謁之疲精神送迎之勞筋力晨興趨府干請坌來折簡函丈手未及展繼者㳫至至擁馬不得前暮歸復爾寒暑不間休暇匿避若逋逃堅閉若自錮一接賔客遂終日不得食思得脱巾履偃仰牀第又如蓬萊之不可到也上則不能遏矢去川决之政下則不能厭蠅集豕貪之求憂苦雖極謗議蜂起矣夫人未嘗不知閒之為樂而真知者寡余蓋身履其境急遽疲極而後獲閒其為真知猶座中談虎而嘗被齧者也鄉人孫友賢受益居安陽銅冶治卓宛之業而以清慎聞於人集賢院降劄褒之曰樂閒沖素處士集賢握玉章司天下道教凡名隱者率號處士又華以冠之受益因以樂閒顔其堂乞言於余受益不游不試不險於途不困於責安於其素而能知其樂者乎其知不知予不能知而集賢標榜之其知其能知其樂也若是則華而不浮矣雖然受益又當讀涪翁之文知収其餘力而就閒之説則可以永此樂矣陜西行中書省題名記至正丙戌冬陜西行中書省平章政事托多公合其寮寀移書有壬曰吾省據要重以控西北南三陲者八十五年矣昔保釐長貳若廉希憲商挺賽音迪延齊皆蔚為名臣而無託以徵及今亟求已不可得乃斷自後至元元年得若干員刻之石識往行朂後繼敢以屬子有壬惟陜西當天下一面名雖數更地之雄劇則古今不異也我元天造立宣撫司以養以治中統三年始立陜西四川行中書省至元二十三年朝議分省四川咨答轉滯改陜西行省而四川自為省矣中更宣慰司者一尚書省者二尋復其舊此其大較也世皇宏規遠模立中書省總於中分省釐於外行省遵成憲以治所屬决大獄質疑事皆中書報可而後行則為行省若甚易者然地之所直有險易則任之所寄有重輕矣秦地形勝之雄建瓴東夏分鎮夾輔宗子維城臣工旬宣實任其重中統初廉希憲為宣撫商挺副之同寅行省治難為易繼以賽音諤徳齊山川之險適足以固吾之國故地之險夷視人愚哲朝廷慎簡宜何如哉則是保釐長贰之善可為法惡可為戒者皆不容泯此所以有待於題名俾後世得以指議也國家百年來法令明備遵之者福戾之者罰若殛隨所戾而至孰敢不畏然人情有玩於法狃於習而不知畏者於是法有所不行矣而其本然之善則未嘗泯可觸之機則未嘗息題名一刻俾一見之頃知某之為善使人歆慕若是我獨不能效之耶某之為惡使人嗤唾若是我獨不能戒之耶用是為政豈特為法之一助而彌惡遷善蓋有出於法之外者焉尚論古之人由周而來著績斯土者軌躅相接逖聽風聲皆吾師也若夫德於人而未忘迹於事而未熄率而踵武其文正乎平章暨諸公竭誠踵武罔俾專美矣斯石之刻又與人為善於無窮焉後之來者知其名之必列於斯也可不畏乎虛其石以待之𢎞齋記人生天地間以藐焉一身參而三之亦有道乎窮雖獨善若進德居業之富討論資攬之備大而民彛物則繁而酬酢日用莫不總括其理而積於其身及達而兼善也堯舜其君三代其民囿一世於太和以至鳥獸草木亦各使之遂其生育之道天下事物紛錯坌㳫莫不有以容之容之者何𢎞之謂也𢎞也者隘之反也此得彼遺即隘矣雖莫不有以容之亦莫不有以别之也夫子曰人能𢎞道言人能有知思可以大其所有之理也子張曰執德不𢎞言有所得守之太狹則輕喜易足有一善自以為天下莫已若矣道而曰𢎞我之力也德而曰𢎞我之量也聖人示人用力之方才髙意廣失於辟者亦有以充其量也承㫖開府公器宇汪汪若千頃波扁齋曰𢎞日與儒士講學其中蚤襲宿衛歷俸常太禧宣徽翰林宗正宥密皆有聲所以大其理守其得者已至矣噫士大夫讀書非不博也才氣非不贍也而其成就卒於無稱何哉患不𢎞爾聖人大管仲之功而小其器者豈不以其不知聖賢大學之道故局量褊淺規模卑狹功烈如彼而已乎公於是理講明已熟用力已至然任重道遠又有毅焉曾子曰士不可以不𢎞毅於事而求所以為𢎞者則内外交修本末兼盡他日見諸事業綽綽有餘裕恢恢有餘地矣公命為記輯先儒緒論而為之書至正集卷四十二
