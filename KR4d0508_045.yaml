body:
  text: 至正集卷四十五元許有壬撰碑志敕賜重修陕西諸道行御史臺碑至正丁亥十一月庚戌日南至皇帝燕延春閣御史大夫臣納琳等奏陕西行御史臺嵗久屋弊既徹而新擬御史中丞臣有壬文其故於石制可臣有壬承詔謹按其狀而筆其概曰臺治位今奉元城之艮隅且五十年罅不即塓橈不即易馴玩將不可支歲辛巳都事樊執敬言行臺據雄鎮具瞻重威廢乃若此今不亟修後費滋甚乃移文中臺再閲歲始報可於是市材秦隴得木山積瓦甓百需靡不具集而尋引斧斤稽而不用乙酉冬十月中丞韓嘉訥蒞止按視儲木暴露而衰朽已過半慨然率作俄復召入纍遷為御史中丞奉元無良梓人圬者以告中臺中丞為請諸尚方擇精其藝者乘傳而往侍御史沙巴爾李好文都事朱守諒輩得以僝其功焉丙戌五月庀工六月中丞都斯默色治書侍御史羅羅至九月正堂暨幕署告成且輟且作中丞趙得壽侍御史慶善繼之明年四月韓嘉訥復來為御史大夫八月侍御史實喇卜至後先協恭迤邐就緒入冬而落焉堂扁至公仍其故也袤深五尋有二尺廣九尋挾以翼舍麗以兩厦貫以修廊屬以圎堂東西曹局各二十六間過㕔前峙照磨所附其西位置秩秩察院若掌故帑藏不易舊貫他悉一新庖傳廄櫪各砥堅好堂北伐土泉湧因浚為池益以龍首渠水搆亭其上池隂東西各為亭基城東北作屋以􅊀登覽前三其門引映峻邃先是出入危巷狹隘迂折民居直其衝者願輸為道倍值酬之闢為通衢如砥如矢是役臺官總其上僚屬奉於下舉盡恪恭毫釐之費皆出臺儲以故工不知勞民不知擾考室度功名雖曰修而實則創矣我世祖皇帝至元戊戌建御史臺以清風俗以正百司而政之布報地之逖邇有不齊焉丙子平宋明年立南行臺總十道以按三省雲南則提刑按察司治之尋升行臺以按邊徼邊徼既寧相地之宜以大德丁酉四月移治京兆是為陕西諸道行御史臺按陕西甘肅四川雲南四省總陕西河西西蜀雲南四道亷訪司而節制於中臺焉關中東控中夏西南北極邊陲樹之行臺俯制部屬崇嚴之勢立則敬畏之心生敬畏之心生兹用不犯矣此其小者爾若夫消奸邪於未萌軋豪猾不敢喘氣使山川失險里巷不驚臺與地亦重矣哉臣有壬考其歲月因有以觀政焉廨弊已久始有修葺之議又七年始有成其不至傾圯幾希今也堅足以待歲月密足以芘風雨崇足以讋部屬為政之道豈外是哉建臺八十年來中外憲條無一不備玩而不舉亦猶是屋一有振起煥然截然故未墜也然臺有恆言謂之風憲亦有說乎風者天地之使也王者之聲教也故上行下效謂之風憲者法則也周禮懸法示人曰憲法則是風之與憲二而一一而二者也可相有而不可相無者也風主於教憲主於法上之行下有不能效者則繼之以法未有專主於法也我正而後責人以正我亷而後責人以亷苟不是求一以枉法惠文從事待若束濕視若冦讐不亦昧於風之為義乎故必先之以風而後之以憲二者不使偏廢則吾政之修與廨俱新且於其未弊而時葺之則廨與吾政其永無弊矣臣有壬為是說以答明詔庶乎古人作器有銘之義也董治寮寀中更非一皆刻名碑隂以著其勞焉敕賜興元閣碑太祖聖武皇帝之十五年歲在庚辰定都和林太宗皇帝培植煦育民物康阜始建宫闕因築梵宇基而未屋憲宗繼述歲丙辰作大浮屠覆以傑閣鳩工方殷六龍狩蜀代工使能伻督絡繹力底於成閣五級髙三百尺其下四面為屋各七間環列諸佛具如經㫖至大辛亥仁皇御天聞有弊損遣延慶使綽斯戩輦鏹葺之又三十二年為至正壬午皇上念祖宗根本之地二聖築搆之艱𠡠竒凌府同知今武備卿布達實哩暨嶺北行中書省右丞今宣政院使伊嚕特穆爾專督重修歷四年方致完美周塔塗金晃朗奪目閣中邊頂踵巨細曲折若墄平髹堊靡不堅麗精至重三其門繚以周垣煥乎一新縣官出中饒楮幣為緡二十六萬五千有竒費視昔半而功則倍之丙戌十一月七日上御明仁殿中書省臣奏閣修惟新不可不銘𠡠翰林學士承㫖臣有壬文諸石臣有壬拜手稽首而言曰天地運用之妙臣無得而名焉即其形迹近者言之風雷雨暘之散動潤烜發生萬物者皆自上而施於下源泉陂澤之流通行泄灌溉大田者亦由髙以及乎卑我國家興王之地俯瞰萬國大聖人首出庶物位乎天德引閡孳萌紐牙開闢而後蓄而未發之氣以資始品彚自上而施於下由髙以及乎卑故澤之流如髙屋之建瓴師之出如泰山之墜石功烈之成登三邁五漢而下莫我擬也定都和林造邦之基立矣太宗憲宗雖干戈間而以不嗜殺人為心聞象教清淨覺皇慈仁之㫖有契宸衷資其說以格蚩蚩之未格者非大示尊崇則無以為感觸之地而大聖人礨空四海撮土八埏囊括宇宙席卷河山之量實兆朕於是焉臣有壬生長熙洽之世朔南名剎罔不厯觀聞嶺北人談閣之大竊疑其夸質諸嘗行陕蜀江廣閩浙且仕嶺北之人信天下之閣無與為比也昔祗洹寺基八十頃一百二十院祗陀須逹二人成之我國家富有四海視布地之金特錙銖耳則此閣之締搆峻偉傑峙與雪山相髙鷲嶺侔盛宜也閣始無名但以大閣寺著稱皇上賜名曰興元之閣蓋經始之日實我元順天應人龍興之初名協乎實矣且和林自元昌路為轉運司為宣慰司又為嶺北行中書省丙辰迄今九十一年而列聖峻極之蹟雄都瑰異之觀無一人一言及紀述者一旦形諸玉音刻之堅珉遲速其亦有緣乎於呼休哉為大利益其可量也夫銘曰鴻蒙再闢世再初聖神立極卑黃虞建邦乃握天地樞俯拾萬國如墜枯嗷嗷赤子飢待哺后奚後我來其蘇天戈豈欲專天誅心以不殺人自孚顧兹象教非虛無與我異世而同符以大智慧明羣愚開極樂國􅊶寰區祗園方欲鳩其徒乘龍遽爾反鼎湖後聖繼作志不渝巍巍成此兜率居不宏其規豈逺模矗天拔地髙標孤中有屹立金浮屠諸佛環擁分四隅至大修廢走使車三十一年等須㬰吾皇法祖恢聖謨坐令金碧新渠渠龎恩覆幬均堪輿如閣容塔綽有餘中書有請帝曰俞汝臣有壬其大書不蹇不磷磐石如億萬斯歲綿皇圗敕賜推誠宣力定逺佐運功臣太師開府儀同三司上柱國曹南忠宣王神道碑銘并序曹南忠宣王薨六十年若乃祖乃父豐功髙烈墓道之石咸未有紀至元六年嵗庚辰十二月己亥中書右丞相臣托克托左丞相特穆爾布哈等以聞𠡠中書參知政事臣有壬為銘翰林學士承㫖臣庫庫為書翰林學士臣𤣥篆其額臣有壬承命兢惕而竊又自幸皇帝不以臣庸劣俾參台司而王之子臣托歡實平章政事世講誼篤當悉其家世飭其未至以章視來世矧威命有赫其敢以弱陋辭王諱阿喇哈蒙古扎喇爾氏祖諱博綽贈定威佐運功臣光祿大夫司徒上柱國追封曹南王諡忠定父諱伊埒肯贈宣忠靖逺佐運功臣金紫光祿大夫中書右丞相上柱國追封曹南王諡桓毅祖妣塔布妣威喇俱追封曹南王夫人忠定幼宿衛太祖皇帝服弓矢職割烹從征屢有功竟死於戰桓毅嗣宿衛事約爾珠太子從庫楚胡土克圖太子伐金遂侵宋以功升萬户尋以天下馬步禁軍都元帥副大將察罕征討察罕沒遂代之統大軍攻淮東西諸城至廣陵戰沒王嗣職統其軍巳未從世祖皇帝渡江破宋師隆興北山還上都賜黃金五十兩中統初詔將所部討阿拉克岱爾琿塔罕追至河西有功二年從征額哷布格賜金箙一文繒九三年從宗王噶必齊討李璮賊扼老僧口日夜搏戰走之奪其錙重進拔濟南賜金鞍文錦各一黃金如上都數四年春賜虎符銀章至元四年有事襄陽走宋師安陽灘賜白金衣物五年大軍圍襄樊分戍百丈山以犄宋師戰纍捷十年拔襄樊十一年略地郢復奪郢州南門堡視地勢可達戰艦於江遣色勒敏白大將自沙蕪口入江取鄂州泝江陵復遵陸略地至鎮江十二年擢昭毅大將仍蒙古軍馬軍上萬户權行中書省事駐建康與右丞相巴延參政董文炳為三道水陸分進期集臨安王以右軍取道獨松關破東埧訾至護牙山遇宋師手斬其將杜總管獲甲盾數百入溧陽界復值宋師斬騎將二人擒禆將祝亮等四十二人斬首三千級進拔溧陽獲首虜七千戰章步橋斬其將吳奉使斬首三千級進攻建平破之斬吳許兩總制拔廣德西安長興攻獨松關擒谷總制至柏市擒其將張八斬首二千級進中奉大夫行中書省參知政事十三年三軍㑹臨安宋亡九月狥浙東未下郡縣所至納欵降趙提刑等五百餘人追宋宗室秀王與擇於閩至福安轉戰四十餘里殺其步帥觀察使李世達於陳俘與擇及其子弟監軍趙由防禦使林德獲印章五器仗萬計安撫使王吉等皆望風降偏師入興化擒宋相陳文龍招降宋官二百餘人淮兵三千人江南平十二月以行中書省參知政事行江東道宣慰使十四年入覲進資善大夫行中書省左丞仍宣慰使十六年進資德大夫行中書省右丞使如故十八年入覲賜玉帶弓矢進光祿大夫中書左丞相行中書省事統師四十餘萬征日本次明州而薨年四十有九是年十月吉日葬曹州濟隂縣郭村之原初贈協謀佐理功臣太師開府儀同三司上柱國曹國公諡武定加進推誠宣力定逺佐運功臣太師開府儀同三司上柱國追封曹南王諡忠宣配托端庫庫楞呼圖克台並封曹南王夫人子男二曰伊蘇岱爾襲左手蒙古軍萬户天厯初有擁護功遂參預河南省三轉知樞密院出為河南省平章政事兼山東河北蒙古軍大都督入為集賢大學士進銀青榮祿大夫薨曰托歡起家同知蘄州路四轉為河南左丞由南臺侍御史再遷為西臺御史中丞毋疾棄官厯江西湖廣江浙三省平章政事進階光祿大夫拜南臺御史大夫改河南平章以母老辭至元六年拜中書平章政事在政府念母老而逺語及輒流涕南臺總十道按三省非重臣不可復拜御史大夫且便其養也女五人適管軍總管呼喇濟圭齊衛副使巴哈穆爾蒙古軍千户塔察爾真定路總管哈喇遜蒙古右手萬户額爾濟納孫男女若干皇元以仁武取天下艱難肇造與共事者惟國人耳而國人中尤賴以濟者若扎喇爾氏則四傑之一焉王之乃祖乃父無征不從無戰不捷而所部之士威信素著如臂使指無不如志天下既一俾率其部而世其職雜居腹心之地以制四方世祖皇帝萬世之逺圗也王明而恕謀而有斷始襲其部士皆樂為之用提兵鼓行指期制勝其追叛河西攻堅屢下力戰襄樊略地郢復可謂雄偉之績矣若夫卷甲沙蕪而長江失天塹之險分節獨松而重關若無人之境卒使宋主面縛海隅風靡則無沗爾祖而世篤有加焉日本之役未至而薨厥後蹉跌貽悔識者謂使王在當不至若是也皇元屈羣䇿以一區宇舊勞之臣耆艾熾昌者非一王暨祖考皆死戰陳以致寧敉乃身不享之昔賢謂世德之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福王壽不滿其德而二子佐列聖重熙之運皆致位崇極王薨甲子一周矣賜銘墓道哀榮益新又立祠建康賜祭田千畝世福蓋未艾也嗚呼崇德報功朝典縟矣歸美報上獨不在王子孫乎臣有壬再拜稽首為之銘曰於赫天造秉鉞四馳芟夷蕪梗以式九圍河翕嶽喬貴胄接武闞如奮出奔走禦侮桓毅之子忠定之孫率我舊部朂我鋪敦帝命南伐潰襄拔郢夷􅏤既塞我旅爰整嘽嘽匪車舟乃陸通投鞭斷江率滸而東三軍犄角分趣吳㑹遂起溧陽肆我禡類角崩稽首漿壺食簞廣德弗城獨松弗關大㑹臨安組頸道左乾清坤夷四方來賀蕞爾島夷乃敢不庭皇風播海長星墜營許許郊原鬱鬱王兆焯勤崇極申以廟貌既厯五紀盍文其碑亦惟天道遲速有時假寵九原追功未墜聿聲其休永錫來裔至正集卷四十五
