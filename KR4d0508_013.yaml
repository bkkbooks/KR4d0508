body:
  text: 至正集卷十三元許有壬撰律詩五言七十五首孔學文奉先世毅夫先生元佑五年召赴闕尚書省牒求題元佑才為盛之人獨滯留如何車下轍又到嶺南州玉樹三枝秀滄江萬古流珍藏徵往躅重為半山羞題張圖南怡顔堂深愛形愉婉真歡寄詠歌色難非孝也創鉅奈親何堂下餘風樹人間有蓼莪世堂求錫類莫作盻庭柯神仙雨山中日日雨松竹早知秋清響自深夜逸人無逺愁􅙘虚聞葉落林暗見螢流對景因懷杜江村事事幽六月二十一日坐田家場圃早稻已穫楚甸禾宜稑天應急早農三登知稔嵗一葉未秋風繼絶方晨穫嘗新已暮舂敢言憂國願一飽待年豐晚凉縱步用諸生黎仲顒韻二首隆暑晚才退東崦未惜遥穿林入田舍縁木渡溪橋有地堪容膝何心更折腰前湖直罨畫舟子正招招山吞紅日盡雲放碧天遥景與詩為地凉隨杖過橋胡床時憩足束帶久忘腰不怕叢條怒山英已見招立秋日次黎仲顒韻四首青山似髙士了不染塵埃龍去留雲在鴉歸帶暝來竹林清可掬稻畛翠如裁今日知秋至呼童拭酒杯祝融方肆虐時序報秋清火欲凌金氣凉先入雨聲雲間瞻疊巘松下得微行君看梧桐葉能催白髪生流光諳代謝雅志愧輕肥年已逾知命星方識少微靜言今日樂遲却幾年歸更荷隣家好山瓢問不違山中何所樂日日有新詩放脚探龍窟回頭愧鳳池懲羮尚吹冷居貨敢求奇野老從渠戇咸腓勝詭隨登後山觀湖漲時陰雨忽霽陰磴盤盤上枯藤得得來長楊半腰水老桂一身苔秋氣蛩先覺風聲鶴欲回山雲自行雨休為老夫開城中送冰出自凌陰閟來驚暑路忙針分全璧碎鹽接斷峯長清欲空渠椀甘宜沃蔗漿休教融作水分惠徧山莊得家書戲書其後家人怪留滯今日寄書來菡蓞實將老玉簪花又開兒書常負課我瑟已生埃亟喚理歸棹道人心未灰得請南歸送客皆乗馬予獨以病坐小車有語及韓子送楊巨源問車幾兩者戲成四韻不能陳力矣便可賦歸歟車坐但一兩人言非二疏幾難終日俟病過半年餘莫笑無金去行裝有賜書鄉人飲餞二十里外以詩留别樹影聮金勒鄉人恱我行春羔紅玉軟官醖翠濤輕桃李慚無分桑榆荷有情它年洹水上一一却相迎同茅紹之飲野人家蔬圃二首地僻人稀至凉生日欲西娟娟花覆井㶁㶁水循畦蔬脆供新摘醪香出舊携蓬􅙘殊卷入岸柳奈烏栖小店囂氛外茅茨只數間鳥啼槐潑翠蠶老椹垂殷老境惟宜酒兼金不賣閒興來詩自得真趣豈容刪觀麥田父逢人說今年麥異常花時無冷霧實後值驕陽眩目黄雲濶垂涎白雪香疲氓均一飽應有兩岐張魏縣道中京國行行逺江鄉處處幽崖崩和麥墜灘急帶沙流匡世無長䇿還家是勝遊不將詩與酒清興若為酬水冶人烟仍古邑村落帶清泉修竹雲千畝垂楊翠半天卜居多勝地沽酒驗豐年欲結雞豚社慙無二頃田宿水冶孝親寺永額僧知宋佳城石紀韓懷賢時拊髀弔古一凭䦨清夢雲龕靜悲歌野樹寒山川豈專美東北又豐安遊黄華始至其麓槲樕連山麓霜餘翠間紅架巖茅屋小分水石渠通漸覺烟霏重時疑道路窮升髙宜努力中止戒瘝痌過南齊觀丈八石佛僧云得之耕者始見其頂隨發隨出因作浮屠居之教已由天降人猶入地求生民困狂走滄海遂横流塔影千年月松聲萬壑秋考碑當紹聖文物正崇脩善應泛舟霜水清深處烟嵐紫翠間清風時信棹落日正宜山空濶凝絲竹潺湲響珮環道人磐石畔崇酒待予還出京寄王仁甫左丞六龍清暑去萬騎景從時顧我何為者懷恩欲報之計功慙傳食美盛有歌詩却憶髙唐老清風擅鳳池都城大熱午日至赤城夜寒不能寐步步髙無下炎威覺漸微山川限風氣冰炭劇天機孤館難為客重衾更覆衣只愁清不寐無夢到羅幃宿獨石孫希顔家書其壁獨石青不老行人鬢已霜四年叨政府三度上灤陽毫髪曽何補身心漫爾忙避賢歸有日來醉石兄傍雨後桓州道中雨後桓州道清無一㸃塵半天雲葉薄五月草芽新白雀能知曉黄羊不畏人懸鞍有馬酒香㵼草囊春即事土屋平無脊沙岡逺似重風爐懸馬爨木臼響車舂繫尾牛連犢謀生蟨待蛩醉歌喧帳影芳草正茸茸次上京望望龍岡樹行人欲解驂百年蝸角戰三仕鳳池㕘富貴人雖欲驅馳老豈堪預知今夕夢的的到江南省中石竹紫垣清晝永紅藥褪方華寂寂沙礓地娟娟石竹花香鈿金縷緑笑靨粉㾗窪細草聊相慰閒吟坐日斜洪禧殿進講日漾珠簾動風生寶殿寒明時求治䇿要道在儒冠聽納勞前席咨嗟感從官黄封頒賜後愉恱藹天顔七夕露坐因成駮雜無實之言别况經年慣佳期此夕逢終天為伉儷一水任西東人世非無鵲羇􅙘漸有蛩鄜州共明月應是憶衰翁風雨孤舟圖宣和筆也龍樓嫌富麗著意冒荒寒烟雨迷千樹風波恃一竿時移毫素在身老塞垣難玩物昭前訓誰將進縣官元統甲戌分臺上京飲馬酒而甘嘗為作詩丁丑分省多暇因數土産可記者又賦九題并舊作為上京十詠云馬酒味似融甘露香疑釀醴泉新醅撞重白絶品挹清𤣥驥子飢無乳將軍醉卧氊挏官聞漢史鯨吸有今年秋羊塞上秋風起庖人急尚供戎鹽舂玉碎肥羜壓花重肉淨燕支透膏凝琥珀濃年年神御殿頒餕每霑儂黄羊草美秋先腯沙平夜不藏解縧文豹健臠炙宰夫忙有肉須供世無魂亦似麞少年非好殺假爾試穿楊黄鼠北産推珍味南來怯陋容瓠肥宜不武人拱若為恭發掘憐禽獮招徠或水攻君毋急盤饌幸自不穿墉籸麴坡逺花全白霜輕實便黄杵頭麩褪黑磑齒雪流香玉葉翻盤薄銀絲出漏長元宵貯膏火蒸黑笑南鄉南鄉蕎麵黑甚熟則堅若瓦石田家元夕以代陶盞貯膏火蘆菔牲質宜沙地栽培屬夏畦熟登甘似芋生薦脆如梨老病消凝滯奇功直品題故園長尺許青葉更堪虀白菜土羔新且嫩筐筥薦分披可作青菁飯仍携玉版師清風牙頰響真味士夫知南土稱秋末投簪要及時沙菌牛羊膏潤足物産借英華帳脚駢遮地此物喜生車帳卓歇之地夏秋則環繞其迹而出釘頭怒戴沙齋厨供玉食毳索出氊車莫作垂涎想家園有莫邪地椒凍雨催花紫輕風散埜香刺沙尖葉細敷地亂條長楚客收成裹奚童擷滿筐行厨供草具調鼎汝非良韭花西風吹野韭花發滿沙陀氣校葷蔬媚功於肉食多濃香跨薑桂餘味及𤓰荷我欲收其實歸山種澗阿再用前韻答王仁甫左丞二首寒暑催浮影功名負勝時膠榮今老矣得酒且中之才不能匡世吾將任采詩藩籬可翔集何用刷天池青年無可畏况到二毛時嘯傲從元亮風流愧牧之莫談今日夢但詠古人詩已作家書去先開半畝池連雨有感秋來連日雨渾似熟梅時雲岫青才露風簷白又垂陰晴如善謔寒燠遽交馳㑹見驅屏翳清明萬物宜和友人寓居雜詩三首譾材寧適用奇貸本難居羇旅誰相慰親朋日有書看雲嘆舒卷閱市驗盈虚昨夜秋風起江湖好食魚心憐無所用道愧不成章上直才熊館從公又馬坊野風香列帳簷日轉迴廊天上歸來晚庭榆倒影長有謀長落落無事亦怱怱一代名何用千年論始公清風生筆硯凉月到房櫳亦有娛心處兵厨酒不空上京分省有大硯乙亥嵗嘗用之丁丑又日用知其美不知其奇一日滌去積墨文彩溢目背刻翠濤字亦精勁非一洗濯不知也積墨培光彩貞姿任涅磨浪花浮欲動池影淨相和有似懷才者其如眯眼何更憐當造命不解擴恩波鴈洲我亦隨陽者還來宿鴈洲蘆花吹雪盡水氣帶霜浮書載無餘地詩成有剰籌剡溪乗興爾不是五湖舟過嘉魚和劉光逺韻二首山寒遲見日松髪未全晞風土傳奇品烟波空斷磯驛連江杳渺縣入樹依稀不鼓南征棹幽人不當歸帆月隨風動篷霜待日晞水邊多酒斾山脚有魚磯嵗晚鴻飛盡江寒客渡稀郵籖程莫校老子欲忘歸禹栢圖我家近禹栢無句敢相形逺道得圖畫故人瞻典刑江湖雙鬢白宇宙一枝青行返大别去哦詩與栢聽發琅瓈而南閒人有㡳忙一舸又行湘風歛連旬雨花供滿路香領春心未老浮海夢初長應有停橈者吾歌繼漫郎隣舫小酌俄廷鎮同年至廷鎮即事口占笳皷響春江屬予足之行李詩連軸孤舟酒滿缸樓臺明夕照笳皷響春江不負青山約來賡白雪腔十年心萬里今日為公降泊昭靈和董仲達韻二首宿靄空天宇微和暢物情江春灘失險山晚燒添明白首容投紱清時正迓衡得朋多逸興無用計歸程雨晴春似海對景未忘情逺浦孤舟小斜陽萬樹明溪山涉圖畫風月入權衡却笑南歸鴈悠悠幾日程游南嶽黄庭觀東風如有意吹入白雲鄉一片飛來石三生結願香碧桃開洞府蒼蘚閉丹房欲訪芙蓉主乗春夢𣺌茫夀寧宫用閑閑宗師韻𤣥教嗣蟬聮辛勤五十年祝釐縻輦轂傳句記林泉雲氣來天上松花墜馬前懷人不可見辜負酒如川曽原道中二首幽尋老不倦春盡晚猶寒村逕窄容轎樹枝低礙冠鳥聲山寂寞花事雨闌珊風物今朝好詩成未覺難秧針青炫日滿眼是豐年山轉東西路泉通上下田林深纒宿露村逺見炊烟此境須身到屏圖未易傳貢院有懷省中友人帝遣提文印科場看策勲千年徒尚友一日便思君西掖春浮樹南宫晝鎖雲不知江海上幾句寄殷勤刻題必夜發題必早諸公連夕不寢列坐假寐予又甚焉觸響驚寤相顧大笑記以俚語重門嚴鎖鑰誰遣睡魔來塵尾忽墮地鼻聲俄殷雷有燈銀海暗無酒玉山頺莫作冬烘夢掀髯一笑開陪姚子中中丞晚生薇垣宜露坐月色淡蒼蒼黑去鑾坡樹清傳燕寢香縱談驚炙轂批卷聽哄堂莫作思家夢春宵苦不長早起觀諸公考卷閉門如井㡳春事近如何柳色寒猶淺禽聲曉漸多三場嚴獻納千卷困研磨有幸逢今日天開第八科三場試罷小雨京國春難雨沾濡忽有今聲連蓬島近寒入棘闈深聖治無遺䇿諸君待作霖東君辦花事行欲宴瓊林偕王師魯同年遊長春宫訪完顔真人不遇書其壁真人以是日出迎半年塵土夢常繞白雲鄉紫闥少休暇清談又𣺌茫竹聲來别院松影轉虛廊為問師何在乗風在帝傍投劾南歸宿長春宫用壁間韻呈完顔真人清景鎖塵思𤣥闗接帝鄉松筠寒淅瀝樓殿晚微茫香㬉雲生座鐘殘月在廊他年江海夢惟到老師傍過良鄉不見良鄉塔于今十六年我方添白髪爾自矗蒼烟風氣連畿甸春容動雪田雲麾石無恙賴此重山川旅邸夜坐書所聞白髪自爬梳青燈翳欲無厨喧僮守嵗槽響馬求芻村皷都無節鄉儺實有徒天風忽蕭颯清響入喁于元日詩思供行邁年華屬履端乾坤風日好羇旅夢魂安去國天猶近還鄉路不難白鷗盟有素回首謝鵷鸞問津衰病新投紱荒寒逺問津危橋時下馬小徑不逢人紫翠山浮夕青黄柳試春人間好風物此去屬閒身尋梅何以慰吾衰梅花秀發時晚香傳逺樹春雪避南枝林靜來差早溪深行獨遲與君謀一醉及此未離披至正集卷十三
