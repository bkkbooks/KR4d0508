body:
  text: 至正集卷一元許有壬撰古賦慶雲賦并序至治元年八月十一日仁宗繪像至自灤都有司備禮迎置萬安寺時有慶雲見百官無不見者有壬在班簿後獨以不見為恨泰定二年十一月十五日皇上御興聖宫命百官迎英宗像仍置萬安寺神馭至門百技貤進東南抱日五色雲見觀者驚嗟竣事方散有壬陪中書僚屬立衞士廡下始身見之信乎其為非煙非霧郁郁紛紛者也叅議王公繼學作頌志之二聖之靈皇上之瑞發揮悉矣有壬以不見於昔而見於今為幸忘其鄙陋亦作賦以紀之其辭曰昔軒后之御九五也國當浡興伊雲其禎事以斯紀官亦斯名皭萬世其未熄宛目擊乎瑞精逮重華之大聖復昭格之有徵百工相和而作歌爛漫漫乎莫形匪至理之丕應孰天休之或承聖王不作世降道傾治功鮮効於乗水嗣徳罔至於山陵於是為霾為霧為霠為氛或黑兆水或赤象兵喪則示白蟲則著青遂使書物辨祲有保章氏者出而天人一致之理委太空於㝠㝠於皇我元神功即天仁宗大孝視虞舜而不愧英宗勇智顧成湯而無前是宜聖徳之攸著同一揆於後先時也鼓吹雷動従官駿奔翠幢搖曳於鳳闕霓旌晻靄乎龍津山之木雖拱天日之表方新旄倪揮涕以哽咽盛美觸目而俄臻爾乃萋菲葳蕤蕭索輪囷綺藻成畫繁縟有倫錦裂繡褫紅鮮翠勻鏤金鏉玉翔鸞躍鱗動如海潮靜如漪淪碎如衮闕密如絲棼始炳丹以紺飾倏霞披而電分備五采以為絢變百態於氤氲攦倕指以莫狀竭般力而徒勤豈天孫之獻技播大巧於元鈞焜燿璇極浮動紫宸天章下賁萬物為春于以示九重之上瑞于以彰二聖之至神螻蟻小臣今見昔聞言之不足喜極沾巾従而為之歌曰天恒有雲兮惟慶則希軒虞世逺兮後孰有之我元二見兮天豈我私至徳交感兮符祉莫違千秋萬嵗兮芘我烝黎迷樓賦予總鹺政廣陵禱雨雷塘掾曺汝霖従歸途談江都廢興荒煬始末周覽山川闤闠樓居之盛而又及迷樓焉傷而賦之其詞曰有樂不縣積塵斷絃有美不御老醜備前於是前星晻乎其無光少海一變而為田矣天厭隋祚憂不在敵胎於心腹成於肘腋以五子一母列據雄鎮為可恃而不知大都耦國為禍之尤劇方荒煬之好學接士也固莫辨其真偽及其留麗華而怒髙熲則惡緒已暴於中外惜猛虎之不知竟為毛間蟲之所噬黄腸甫湊金合已賜麀聚居廬龍飛天位弛然自放於九重之上天地萬物無一物之可畏遂肆心於巡狩傅粉深宫笑江東之諸帝車轍馬跡將徧九州北巡榆林既讋其酋耀兵河右黷武東陬引汴水開邗溝置離宫造龍舟伊江都之勝麗詎一豫而一游天亦厭乎我民欲一旦而盡劉百萬億之蚩蚩乃生項昇之巧萃倕般於心匠委財幣於電掃按圖締構不日成之璇室愧陋摘星笑卑傾宫謝侈阿房讓奇章華姑蘇撮土何施建章栢梁廣猶可稽叔寶三閣華而不微軼古罔後舉莫我夷於牣靡曼於粲珎瑰寶帳散愁而延月複有酣香而忘歸亂晝夜於多景鬱煙霧之霏霏晶熒奪目孰辨逺邇縈紆掎足曷明東西巢燕亦惑乎網户車羊尤眩乎竹枝弄臣肆誤以資噱阿㜮雖習而猶疑入者罔識其所従出者莫省其所蹊一蟻逐肉林之臭一蜂憊花島之飛蠅遭拍浮而醉不可解舟入溟涬而維無所施又如鷦鷯不能悉鄧林之樹小鮮豈暇窮滄海之涯俊娥熟何妥之車錫名實來夢之兒下俚稚女孰究其姓字如侯夫人之死者盖漫不知吁嗟獨夫心蕩神疲尚能名之可謂曰迷昔在帝堯法官是作舜闢四門以撤壅遏明堂政令辟雍禮樂究義資訓徳修罔覺逺不軌與不物實儀刑之攸託三苗羲和昏迷致兵政教不迷在書可徵威儀卒迷詩具刺懲盤盂几杖微且有銘異哉兹樓以惡著稱謂真仙亦迷於此地何䖍通突至不迷于厥行向使中原無叛天復假齡殆將作七千五百里之臺而盡糜天下之蒼生矣人不知過或肆無忌苟知其非敢作而遂觀其引鏡念頭頸之且斫觀天識圖儂之將至既灼然而自知乃確乎其自棄盖柔終而無改過之勇厚極而有難開之蔽迷於心者若是其大迷於樓特其細也髙岸為谷深谷為陵樓傾土平傷哉蕪城乃為之歌曰蕪城蕭蕭兮草離離繁華澌盡兮瓦礫不遺昔之迷不可復兮無俾世迷弄田賦元統甲戌有壬承乏中臺嘗與議農政因語農官上林隙地可規治蓺五穀若古弄田皇上幾暇監農不易迂而實切其説既不行且有竊笑之者噫古制之不復者多矣豈獨是耶感而賦之其詞曰王政之大無以加於農乎林林總總以食為天茹飲俗變稼穡興焉唐虞至聖命稷是先蒼姬八百年之王業實基於生民之篇炎劉去古而未逺貽謀亦慎乎其傳未央宫中不事流連樹蓺有地是為弄田謂昭帝幼沖未能親於帝籍鉤盾近省姑試耕以為劇何考信之不覈致流傳之昧實盖祖宗為敦本而設雖曰遊弄而亦不忘乎稼穡也天下之治生於敬畏目擊之頃知農夫之艱難粒米之不易有不惕然而悟凜然而惴者乎其為弄也非奇技淫巧以斁常也非狗馬遊獵以導荒也非鄭衞哇邪以塞聰也非妖豔靡曼以作矇也非以人為翫若董賢鄧通也日底天廟土脈膏滋爰驅觳觫俶載其時耰而人立甚險竿之危播而子落若淵客之珠璣人牛前逝牽石後隨又如跳丸之飄忽走索之飛馳俄青倏覆乎畦畛何眩人之能為惡莠亂苗尤務去惡俄穎俄栗挃挃其穫盖始于舉耜而終于銍艾莫不可翫而可樂顧俳優之䙝狎器物之不軌魚龍曼衍之鄙吞刀吐火之詭何足以辱天視之一睨哉若稽耕藉有國大教王后供種太史播告秉耒一墢朱紘有耀神倉鍾藏冢宰舉要所以勸農民供齍盛而事天地與祖廟也三代共由之大典百王不廢之要道何周宣中興之哲王乃不藉其千畝至形虢文公之譙則江東之未暇又無足與挍也開元之盛種麥苑中太子侍登治並古隆是亦弄田之遺意惜其有始而無終於惟我朝登三邁五南郊畇畇有田千畝大臣代耕嵗事修舉而齋宫尚稽於享醴玉趾未親於舉武是以奮庸之士拳拳有望於復古昔周公之相成王也書有無逸詩有七月知稼穡王業之艱難丕顯文承武之謨烈率婦子而親觀宜詩人之播説臣願割苑中數畝之隙俾從事於播種備春秋之遊豫洊未央之名弄然後講三推之儀明五禮之重臣敢陋潘岳江淹之賦復有周之雅頌也鬬駞賦元統甲戌九日上幸後苑觀鬭駞有壬適有奏對獲遂一觀退而為之賦曰于嗟乎駞爾軀孔碩爾能實多龍斯夭矯山斯嵳峩生鄯善之絶域邈流沙而迅過日三百猶跬步輕千斤之負䭾方炎風之煽毒劇殱人於札瘥爾乃即沙滅口警候靡譌度磧渇水口塵莫呿迹蹋而鑿涓涓盈科其或脩程阻艱芻秣罔繼溲麫茹銜糾纒堅閉浹辰無飢萬里不㚄校他用之凡獸兹實氣稟之尤異者也蹏不分甲踣鐵其堅肉鞍㟪􅕲雙峯矗聨復有傑出一封巋然力倍恒品直當萬千其穹莫扳抑之即従弭耳伏地屈足漏空累乗駢坐奚婢塞童毳繩掣鼻自西自東昂首噴穢呼􅕫生風翠釡之珍其忍取供流湩甘頽馬酒釀醲墮毳紉緝褐被域中風土既習字育日豐板襁其雛稚紫茸茸冶銅象形僅得其槩疥不嫵媚劉文適類景純著贊論功遺大厯唐及宋紀述未備皇元御天西北首賓天竺效貢泉渠空羣魚魚連連列廄雲屯千乗萬騎灤水嵗巡負鼓先聲服箱後塵背錦糢糊絡珠璘霦鈴鐸殷地旌旓盪雲開闢而下有國之有駞者未有若我朝之殷也牧槖分職秩浮令丞負重致逺人知其能有知其出拔之奇搏擊之精者乎苑草未凋風日清美九重幾暇鳳輦莅止俯察品彚縦觀物理虎賁執繮兩兩相睨騰蹙傾奔砉歘徙倚待怒氣之既盈俄侵凌之漸邇脱羈發縦勢邁角觝始齧頸而躑躅復摩肩如委靡乍分立以伺隙遽挑釁於駓騃飄忽若風燕盤旋如磨蟻劃然踴躍人立對起波澒土墳雷轟電駃持久跕跕勝負未決貂璠聲援陛楯皆裂餘勇雖鼓虚驕已竭嗟兩雄之相戹卒不逭乎一蹶勝者植立揚揚自慊主矜調擾望拜蹩躃天為嚂嘘賜沓繒帛嘗聞單于祭三龍祠以是為樂龜兹觀七日戲以占耗息今始得以驗其説鄙哉季郈介金其雞杜鄠走馬時在側微開元南面何取於斯顧羽毛之瑣瑣瀆黼扆之巍巍而登床之舞馬亦不過示異於宴嬉又孰若大逾犀兕猛軋虎貙可以鼔佽飛之士激羽林之孤者哉小臣在列顧瞻震栗悸定而懌氣塞而釋目隘而豁足痿而力歸來人間塵土坌集袋馴白唐籠飼促織黄雀山鷓種種有敵下里何知小兒方劇觀於海者難為水曾何辱乎目擊然臣有芻蕘之言增渤海以涓滴大小雖殊翫物則一惟吾皇游六藝之圃徵勝負於往昔愚臣一第非手搏而得視試卞為期門之徒亦粗可以備顧問而陳得失也三臺賦至正三年九月二十四日有壬偕明初馬徵君游三臺明初有長句既次其韻永歌不足又作是賦其詞曰嵗癸未秋九月霜清寒薄天宇澄澈塗無長泥庭有積葉髙陽子逸興作呻畢輟趣膏秣事登涉壺清露之芳醖従白眉之佳客乃渡清洹税駕乎鄴覽山川之形勝弔陳迹之未滅客乃指顧而相告曰子亦見夫三臺之嶻嶭者乎氷井峙北金虎踞南銅爵巖巖中立而三若稽作者振古所慙欲祛我銜不能縷談子亦欲聞其凡乎髙陽子曰嘻昔有塗巷話古事及漢季小兒聞曹敗則大喜劉蹶則顰蹙而出涕盖人心天理之所同况怒其人而履其地因其跡而聲其罪不亦宜哉客乃言曰吉利之生姓不自知由嵩已冒夏侯何稽舞㦸禦捕啖葛如飴誑叔以疾拒客以泥睥睨一世岸然肆欺雖橋何之見異卒莫逃子將之譏謂興義以寧國致羣材之景隨爾乃刧遷乗輿地尊天卑彞倫攸斁大厦以隳及乎袁尚既敗審配亦摧黄星斯應赤精遂微入鄴領冀州之牧中天植不臣之基慮幾人之稱王乃居之而不疑幾簣幾杵成兹崔嵬子午梁貫愈出愈奇三山鼇戴雙闕鳳飛連甍複道相為蔽虧累棟山積周軒雲齊陽宫冬熙凌室夏凄審曲面勢有巧無遺衡漳浩浩乎其北隆慮靡靡乎其西收千里於寸眸萃萬景於一時卷山河而匪席指風霆其在頥應劉王徐唱酬諏咨登髙能賦家有陳思父子放志欲長若斯天道惡盈樂極則悲撫沖弱之季豹顧婉孌之蛾眉語託人而哽塞惟泣血之漣洏痛富貴之長違遽盡露其情狀彼一床之八尺容幾許之繐帳要脯糒於朝晡競聲樂於朔朢分香衣而造履組舉瑣瑣於屬纊其横槊賦詩之雄發壁弑后之威奄忽而俱喪匪不及乎簒代丕盖定於主鬯鎖諸妓於幽闃望西陵之莽蒼念舊寵而興悲抑茹怨而自愴霜鴈訴秋露花泣春宰木行拱几筵有塵哀絃急管其聞不聞事往跡存如惡不泯夫以精舎二十年之規欲媒蘖萬年之為君不知司馬家兒已瞠乎其側而恥於附其翼攀其鱗也徒為趙燕魏齊之張本因之增侈重困乎吾民幸疊障之不鏟俾表惡於無垠今吾與子效小兒之顰蹙申欺孤之公議傾壺中之清醇澆胷次之磈磊且以酹漢室征西之將軍魏家創業之武帝子以為何如髙陽子聞而歎曰瞞乎瞞乎如客之言則爾之罪窮天地亘萬世而不可貰矣然誅則以心論言不以人廢乃歌其歌曰對酒當歌人生幾何憂思難忘唯有杜康於是引滿竭壺興盡而返回望三臺渺蒼茫乎醉眼瑞麥賦大名為河北大郡開又屬州之大者也皇上新守令之法於是哈塔錦裕嚕元臣白守忠公嚴皆以郎官慎選出守是州未幾政化大行瑞麥駢生或一稃而二實或一莖而兩岐二君寄圖徵言於有壬乃為之賦曰靈芝兮三秀珍木兮連理萐蒲兮叢生嘉蓮兮共蔕是雖委祥疊貺之可書曾不足以弭枵腹之殷雷效粒米之狼戾睠兹澶淵芃芃大田觸凍寑生細莖揷煙四運周厯六陽氣全冷霧免殰赫曦實堅方翠浪兮漲陸倏黄雲兮際天乃軵我箱揮釤電旋京坻善收中有異焉金芒蝟磔珠實蟬聨一稃二粒若子之孿一莖兩岐若首之駢耄倪駭矚奔走喧闐念休徵之允叶盖有開而必先即影而求其形非根我黄堂之二賢乎二賢設施知所先後既基化於庠序尤盡力乎畎畝習福感其至誠坤靈獻其英秀漁陽張堪壽安劉懐之美寥寥乎無聞乃一旦而我有歸之二賢却不敢受歸之天子天子萬壽昔聞縑史兹應昌期言之不足故永歌之歌曰天人夐邈兮理則一機天不自為兮假人而為焉得九州兮皆若人斯俾我黎民兮永不阻飢雲莊賦為開州監郡裕嚕元臣作有趙國公子生輦轂綺靡之鄉游幽并豪俠之場名門疏大國之封少年為列宿之郎宜其習奢麗以成性乃漠乎與世而相忘視富貴如土苴渺神遊乎混茫遺情萬物窮睇八荒獨於雲而有得爰挈之而名莊爾乃登大行之孤岑立居庸之絶頂謝人境之囂湫覽天宇之髙迴以原隰為場圃以峯巒為門屏因翠壁以作垣挹清泉而寓井水光山色松聲竹影曉霞晚烟漁梁樵逕丹青不能盡其美但意㑹而心領於是行水窮處坐看起時始氤氲而如盖俄改變而為衣愛無心而出岫猶主人之忘機泊與淡相遭空與寂相依即號究實其殆庶幾乎午橋平泉豈不完美盛衰靡常孰裴孰李今也自舒自卷不亡不存邈乎無何之為鄉茫乎廣莫之無鄰方憑藉以自怡又何暇於贈君彼有見孤飛之白而思親望暮合之碧而懐人雖所遇之或異是皆觸乎目而融乎神者也若夫撝叱豐險起而従龍不惟呈五色以表祥瑞因二至而示吉凶盖將由膚寸而雨天下吾然後知是莊之有秋乃若是其豐也至正集卷一
