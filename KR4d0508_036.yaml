body:
  text: 至正集卷三十六元許有壬撰記懷坡樓記天之篤生大才於斯世也其有意於世乎無意於世乎無意於世不生可也有意於世則亦扶植之使舉其任於天者施於世則為不徒生已而乃沮遏摧軋至窮蹵頓瘁不斃之而不已者其亦有意乎豈瘁其躬而欲昌其道於天下屈之今而欲信其道於後世乎不若是而其道不昌不信乎惟其瘁之而後益昌屈之而後益信則吾一身有所不恤矣一身之不幸天下之幸也一時之不幸後世之幸也至於山川草木亦與有幸焉賢者之所至山若封而高水若濬而深景星慶雲之所燭春陽谷風之所及凡衣被其精光和氣者莫不孕秀發竒呈芳吐華以自異於尋常草木也況人之得於覩感者乎蘇文忠公文章在天地間後世學者無所容啄尚論其平生忠義而迹其出處有不能不為之浩歎者焉進盡忠論祗以賈杭之倅詠歌庸言乃以媒黄之貶翰林駸駸乎用復出知杭又兩入而出則恵州儋耳之謫遂終身矣其在朝廷始終不七八年倅守郡者十四年居貶所在道路者十三年臺獄之危殆如朝露夜碇漲海身厭毒癘所以沮遏摧軋者可謂極矣其自黄移汝也訪黄門公於筠道興國訪太守楊元素謁李仲覧識嵗月於璧宿石田驛南野人舍有詩仲覧力學精修登元豐八年進士第築懷坡閣里社旁乾道間端尹王十朋作懷坡詩淳熈間郡守林仁厚始刻公詩若十朋諸詩於石置百疊樓下閣與樓廢石刻故在至元三年嵗丁丑廬陵夏日孜為録事訪閣遺趾淪為民居請復於郡郡守佐賢從之直郡東富川門外作樓三間仍榜懐坡面勢之勝三則阻湖而環之皆山後抵於西萬屋櫛比竒峯疊嶂之錯峙琳宫梵宇之映帶湖近而瀦水逺而逝者莫不洞見經始戊寅十月落以明年四月廣隄而基固之以甓又為護隄植栁百株更閣曰樓猶昔百疊之意也夏君起家進士學道愛人不事土木務㳺觀者也懷公而有所興起焉昔公蒞政才七日風聲所被若歴年之浹洽所見楊元素李仲覧一二人而一郡之人均淑於今日遂使興國山川草木並聞於天下不泯於後世則黄五年恵儋六七年道路之所及忠義之所化光華之所賁至於今而未息者可勝紀哉所謂瘁其躬而昌於天下屈於今而信於後世者其益信矣竊嘗妄意公作韓文公碑盖亦以自道也其言所能者天所不能者人則文公之迹與公又大有相類者然文公自潮陽歸不出朝廷而卒於家公則間闗萬死而幸得歸席尚未暖而病遂不起此則又有甚於文公焉而其昌於天下信於後世者則二公等也夏公請記為述其概俾郡之士皆有所興起焉若仲覧者將軰出矣登斯樓者勿徒為㳺觀而已也謹正堂記聖朝既平宋山海之藏舉入内帑而兩淮塩賦寔甲天下乃立都轉運使司於楊即宋江都縣舊治為廨以總其政廨陋且弊運使張彬拓而新之西偏隙地規為園池踵武構築園又有堂天厯庚午三月有壬來承嵗大旱理棼補罅再閲月始一坐堂上幕僚以堂扁無謂請易以闗吾政而可朂後者於是取管子之文以謹正易之為之説曰國有財用人身氣血江河泉源也聖人疾務財者疾非其道爾古者以入為出取不苛而用不竭塩未有賦也后世以出為入利益浚而用益窘塩為厚利暴不可揜管氏昌之歴代和之禁網日密而毫髪不遺矣且管氏以是而霸齊後世因之而利國而識者猶深鄙之甚哉利源之不可啟以其一啓而不可復塞也自董仲舒言人已病之馴至今日病可知已我朝覆燾大極無外供億之繁有不容節者則管氏謹正之説不能無取焉故謹於取則不擾謹於積則不耗謹於出則不滯謹於防則不濫謹於禺商則不忒謹於周給則不匱正之道不一而舉能謹之則國之為利無窮而民之蒙利均矣兩淮自大徳改法世號精密歴三十年至大厯己巳庚午之旱澇而流弊積疴一旦呈露矣則謹之之道可不什伯哉姑摭其尤者言之昔人謂取利山海愈於取民然山海之利非民孰取牢盆之民勞有甚焉其或掊工本以利私逮無辜而鬻獄恣強豪噬㣲弱民既弊矣利何取焉登斯堂者亦思所以謹之乎扁之易也適中書從有壬之請降中綂楮弊十萬貫俾規營繕之費併舊有為十五萬貫月計贏息沛然有餘苟以資㳺宴而無節縱攘竊而不愧顧瞻堂扁尚謹之哉若夫官屬之建設賦額之増减煎儲漕鬻之詳備則官有常規此在所略世忠堂記予讀史至高祖功臣侯年表觀其誓辭則知國家未始不欲其永世無窮也然侯者百餘人至太初百年間止見侯五餘皆坐法亡國世禄富驕不忠以將卒致傾殄宜哉我元肇造區夏時則有若魯國忠武王穆呼哩昆弟豐功偉績史不勝書百年來子孫日益蕃衍蔚為名臣非相天下則長大藩持大憲其布在四方者又四方林立焉諸孫安圖起家襲萬夫長鎮杭十年擢八番順元宣慰使都元帥選格文武不相入惟治戎考最始有斯命由是而可憲可相而世之得者盖亦可枚數也太夫人年老尋解組歸構室所居翰林承㫖野齋李公以世忠扁其顔右室事佛養母志也天厯龍飛起為淮東宣慰使舊制使不兼帥不與軍政以貴胄居重鎮特賜虎符求文其堂曰不才席世澤至達官每業業不敢縱作堂養母得名世忠俾吾子孫世守而不墜釋辭其可予聞國初齊忠武王勲名者三人世號四傑至治間王之孫當國獨以忠死考諸事可見已人有百行忠孝為至其施若殊在理寔一宣慰公克孝其親其為事君之忠考諸行可知已若夫世忠不惟其先惟其身不惟其身惟其後先世勤勞王室繼繼承承是以有今一或有間則斯堂孰成矧有此名惟後之人世守此忠則逓一世可至百世而為堂之榮而與國相為無窮也書不云乎惟乃祖乃父世篤忠貞既見之矣纉乃舊服無忝祖考公之後尚有望焉上都分臺題名記官署題名舊制也司馬公記諌院其較著者焉世祖建御史臺劾省院百司非違諌議宫詧實總之省若院鼎足立臺政則省院無與其雄峻古所不及大駕嵗幸上京則分臺從大夫二必大貴近不去左右中丞下分員行夏涖秋還機務常沓至外是未遑也分臺舊無題名至順癸酉始榜堂顔元綂甲戌大夫銀青公既入視事謂榜不能容且積乆徧㕔壁不稱具瞻而上京艱石請於上得陛財礱而畫之為十八年地并其隂為三十六年往者兹無從徴且不勝書斷自癸酉託始今天子即位年書之繼者馳勒其下若稽建臺昉至元戊辰責大寄重有識共知六十七年章程具悉無庸贅及惟先哲言官事如家居近實逺今夫齊民搆屋作器必欲終其身及其子孫而勿壞政治之瘝有官之治其事不能如齊民之治其家也事去手則已為嵗月計者且不多得况有為世計者乎公之心可謂周已推此心也一事不如法一人不得平其肯因循而不恤乎繼者又能推公之心由三十六年至於百千年感激率興有功風紀其可量耶而某正某邪觀者得以指議知所擇從則又司馬公之意也斯石也其亦有補於風紀者乎歸來亭記南湖書院山長黄葵景陽奉考若妣誌銘請曰葵上世豫章豐城人迫禄養不敢擇間闗奉二親走冷職而後先不一紀皆棄葵以逝傷哉乎貧而不能從先塋也欲有待而恐後之不可知也得地武陵新安原吾先子塟焉吾母附焉地若無悔惟狐死坵首用戚戚不自安作亭墓左扁曰歸来庶幾見吾親而致吾區區之心也乆於庭而可訓諸後者子其哀之予不幸為永感人而重有感於景陽也古者人始終升屋號臯某復者招雖不復不以為具禮也然一時而已斯亭之作其復之終身乎孝子不死其親親之出也暮則必歸雖逺而異方乆而歴時亦無不歸也候門牽衣迎慰之樂為何如今入門而弗見也上堂又弗見也入室又弗見也望望皇皇如慕如疑未信吾親遽逝而不歸而必欲見之於斯亭也亭之搆在宰木間雨露濡榮風霜變枯四時倐更景物隨化觸目之頃有不思其親者乎朝而俟夕而俟歴嵗時終吾身而俟僾然愾然有不見其親者乎昔太公封營坵五世皆反𦵏於周士去國曰奈何去墳墓也古人重是尚已延陵季子塟子嬴博孔子乃以為合禮者禮之變也士大夫汗漫四方不覊於貧則家於仕欲有待而馴至不塟者可忍言哉景陽是舉其亦合於禮之變乎或謂古不墓祭而主有家斯亭果歸来乎噫精誠在天地無往不達親於子一氣耳子所在親固在也又豈知地之異哉彼有誣兆域訹風水委親幾千百里要利於冥漠不可致詰之中而或馴至不塟者又士所不齒也考諱泳涯號厓翁以文行名妣徐有懿徳景陽廬墓芝生於亭天道章矣抑孝有大者亭不與焉𨗳豐城之慶源發厓翁之幽光不獨歸来是亭而肯搆所在無乎不在也既為記之且為迎送曲以益其思而致其歸来之至情焉其辭曰翁昔来兮豐城御冷風兮息武陵桂之山兮逶迤翁樂逰兮遂忘歸翁飄忽兮焉往烟霞含悽兮林壑誰賞山之阿兮松如雲松下有屋兮屋有人思翁音容兮在天在淵望翁軒車兮心裂目穿翁之歸来兮淚柏已枯翁之不来兮俟與死俱心終古兮不死期石爛兮翁必至春方雨兮秋已霜我寤或憊兮我寐不忘人生有親兮駟隙非駛比望其歸兮盍慎其始慶州書院記資水之陽為益陽昔邑今州其隂為書院慶州居其中因名焉大徳辛丑里人莱山學録劉履㤗受命父彦瑞而作也世傳唐相裴公度讀書其旁宋致堂胡公南軒張公又嘗蒞止履泰父子慨先賢之過化欲後學之均淑也殿以祀先聖廡以祀先賢堂以隆師席齋以居諸生廨以治學務庖廥門墉靡不完美割田三百六十餘畆資其用地㨿高爽山林叢秀盖藏修㳺息之勝地也聞中書得署額因陞履泰為山長十一更為今山長廬陵康震始具其故請記愚惟古作器必銘重其始以勵其後也况若是其大者乎履泰階是為他官始不屬筆於人不自聲其功也其在繼者哉而四十年無及是者闕不甚哉厥初書院表章於宋者四我元綂一海宇學制尤備郡若州邑莫不有學學莫不有官尚慮其濬𨗳未溥而漸被未洽也凡先賢過化之地達尊之所居徳善之所蒞及於人而不能忘好義者出規為學宫以廣教育則為之署額為之設官秩視下州之正天下之大逺州下邑深山窮谷増設者不知其幾區也夫以増設之廣視宋有加人才之出宜亦倍宋自今視昔果何如哉南軒告岳麓多士戒其専為决科利禄計晦菴記石鼓謂博士弟子員受授皆進取之業使人見利而不見義其捄弊格言乎國家崇學作人延祐設科以徳行正術取士士因進取始奮於學固已可歎也科既格乃有因而怠焉者愚於是重有感焉孔子曰古之學者為己今之學者為人為己之學居而孝於親悌於長出而忠於君信於友猶飢之於食寒之於衣孰勸而使然哉見其飢寒而不知求而汲汲勸之使求者此君師之仁也此而明雖决科不能撓其志孰有視貢舉有無而作輟哉此而不明高科美官適足以覆其身爾昔學政不修士無所止故宅幽阻講習其中今天下皆學居之高明樹之官師食之既廩若履泰父子又能増設以廣教育是邦之人何其幸歟此而不力則是寒不衣飢不食而甘凍餒以斃也而震也又能葺學之弊闢田之荒發四十年湮沒不稱之實皆可書也雖然書功末也有本焉學者其慎勿忽先施堂記遼東控濊貉地數千里樂浪實古朝鮮由箕子教以禮義田蚕織作民不相盜東京失御公孫氏威行海外管㓜安以人中之龍蟠然歸之講詩書習俎豆三十七年民化其徳遼金崛起遂為内地雖教不逮古而士生其間蔚為名俊者多矣聖元建路治列聖涵育之恩守令之化意必有魁竒忠信之人出為世用而箕管流風遺俗或未泯也予佐憲山北遼海皆屬地也簿領是司行郡邑觀民風有使者焉則所謂古今人習有不得而稽者矣憲史呂文瑞嶄然有以自見一日謁曰小子不幸七嵗無怙母氏盡瘁教育以有今日所以曠定省走下役迫慈命也在先戮力甘瀡承歡有堂幸扁其顔用力不敏余方賢其人問其郷又余所欲稽者遂扁以先施且語之曰若知先施之義乎君子思其不可復者而先施焉曽子之言盖為事親者設也人生百嵗疾病老㓜有欲學不及者讀書至是若寐而寤若醉而醒苟有人心寕不惕然警懼耶夫耕稼後期有望来嵗學不時積死而後已事君蒞官接朋友畜妻子怠於前慎於後失之此取之彼見在有餘皆可復者也極天下之事不可復者獨事親焉愛日之誠一息或間雖欲負米其可得乎孔門之徒曽子稱孝惟其真知篤行故見於言也峻潔而警㧞有足以聳動感發人者子兄弟尚勉之言未既再拜請曰若是其亟歸哉曰余以曽子之言告子矣曽子之孝能養志者也故有在側雖無離憂而其心不樂者然孝如曽子孟子但謂可者豈不以生鞠之徳大無能名為子所盡但若此耳子其骨銘先施血誠養志則二者庶乎得兼矣曽何人哉希之則是管箕之流風遺俗顧不在兹乎既以是朂之又本其風土之所自俾郡人有所興起焉至正集卷三十六
