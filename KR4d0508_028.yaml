body:
  text: 至正集卷二十八元許有壬撰絶句仲達送豫至湘隂别後順風比晚行三百里悵然有懷作二絶寄之吾子才華我最知鬢毛回首各成絲汨羅江上一杯酒萍水相逢又幾時江蘺杜若滿汀洲騷國春來亦可愁一日順風三百里故人何處望豫舟無題去年曾約牡丹開同向花前把一杯今日花開人不見對花無語却歸來原功題馬宣使墨蘭二幅後云寄豫一笑因次韻書其側且寄原功畹香連水水連天人到湘臯骨已仙簿領如山空看畫江南秋色正清妍秋蘭香裏翰林家只寄新詩不寄花應笑塵纓戀京國豈知心在楚天涯題姑射乘龍圖姑射仙人昔住山乘龍飛去幾時還只知堯舜如陶鑄不道聲名墮世間題三教啜醋圖吾儒風味格堅頑二氏而今亦慕酸涓滴沾濡已如此鼻容三斗故應難貢院陪諸公夜話俄聞曉鐘燭花簌簌褪春紅睡思消磨語笑濃底事東風敗人意半天吹響五更鐘催諸公考卷添燭須教夜達晨繼茶莫遣睡欺人城南桃李城東柳政好聨鑣管領春雄飛和詩未至以二口號速之騷壇紀律素嚴明一幟撝風到處贏何事而今苦慳吝有人乘夜欲登城兩廳形迹馬牛風盡日相望杳靄中恰似蓬山三萬里懷人何處覔詩筒何國器以精藝受知出而徵入者數矣出守江隂尚慮其不果行也書以贈之華髮蕭蕭舊祕書木天圖籍幾勤劬莫教作郡江南去天子時時幸石渠過街塔原功名之曰雪竇又謂之名利關竇言其狀關言其實也過之有感賦二口號來往憧憧急欲飛此關參透古來稀老夫今日出關去却是罷參真欲歸石城瓊璧聳浮屠一竅開通作要途為問幾人能不竇更從竇外覔江湖歲晚喜晴窮冬長路遽踆踆風景彌旬暖似春造物見憐知有為平生真是負暄人車中戲作不是車中有布乎亦非客子事狂圖却須側挂一壺酒道路荒涼無處沽贈胡謙牧尋常公署復朝參會面何由一接談却是老天相補報直教聨轡過燕南獨樂臺用眠分黃犢草坐占白鷗沙為韻分賦得首尾二字踈慵閉户事高眠幾負郊原雨後天今日野心收不定馬家莊上好林泉濺濺流水抱村斜半入蔬畦半漚麻故里溪山足風物愼毋重踏一堤沙題仇公度總管首陽采薇圖史遷怨氣因舒泄吏部雄文痛發揮盡美未能兼盡善益知周粟不如薇吳道子周處磨劔圖長蛟猛虎不難屠大勇其惟改過乎拋却步光為善士方知自礪有工夫范寬積雪圖岡巒樓閣鬬清妍一段空明水玉天不到閬城東向望范家神妙若為傳薛思孝夢菊堂華胥鄉裏有東籬冉冉寒香步步迷政爾神交陶靖節月斜霜落忽聞雞題明道贊後房希文教授求題聖逺經殘道晦蒙茫茫千四百年中墓頭兩字形容盡未可尋常議潞公七賢過寒林圖為蔡仲謙運使作竹林陳迹已無稽作者千年復有誰榾柮爐邊不安坐天寒日暮欲何之溫子昻畫天王萬年麟史著尊稱底事空門妄欲爭尺許斷縑何足咎古來多少盜虛名李將軍畫馬用班彥功韻真龍幻出笑談間想像初離十二間只恐風雷終變化九天飛去幾時還寄李仲舒二首東門暫别已傷神驛騎何堪又海門明日洹溪桃李下春風誰與共清尊水曹清貴治吳邦更有風煙助錦囊後夜吳松江上月多應移照柏臺霜題崔鑑泉署丞作春山隱秀扇面半生給事五雲間慣作蓬壺富貴仙移入月輪收不住光風浮出翠孱顔米元章臨歐陽詢帖米家神俊不可遏時學歐陽險徑書只道叔敖無少異豈知優態未能除高宗臨王羲之七月帖帝王言道不言書况復時丁板蕩餘偶效右軍書七月中原王業定何如王右軍屏風帖宣和所收鼠鬚􅗀紙久消磨誰信王書世不多片楮多應有神護永和流播到宣和高房山青山白雲圖為蔡仲謙運使賦房山人品素高賢流出天機肺腑間一片氷紈才數尺幾重雲樹幾重山再用鮮于伯機郭安道韻題房山畫二首亂雲斜日遠冥濛樵徑縈紆一線通可笑無根滿林樹春風才發又秋風杳杳層樓出半山森森寒木護重關白雲不去為霖雨要與青山一樣間題李師孟嵩雲堂極天終古翠巍巍能聚隂陽贊化機寄與降神申甫輩出為霖雨莫忘歸甲申元日春帖雪消春意便暄妍靜看天機善斡旋試筆鯨川記風景青天白日甲申年題羣魚圖名品雖殊樂意均藻香蒲軟一湖春莫言惠子非知者猶勝臨淵羡汝人蘇彥良西野堂四絶春雲護雪未全消老柏垂氷冷不搖鴈柱十三絃上月酒闌香燼可憐宵玳筵紅袖不知寒春在歌喉暖響間我輩年來要陶寫好將西野作東山蒼苔滿徑樹連村中有幽人屐齒痕此去客來宜定約無詩無酒不開門築堂西野事西疇桃杏才春麥又秋愼勿下堂東向望禺商毫末拂牙籌安平孫茂實九十八不衰諸公有詩賀其高年耆德九十八年猶矍鑠百千萬事任浮沈郊原杖屨親朋酒此是期頥未了心題對鏡寫真圖用滕玉霄韻鏡中几上共三人為問先生孰是真自古聖賢皆不死楮生何足託吾身題千葉桃圖五出凡花一掃空萬重千疊裹春風連昌有竹堪為侣底事牆頭􅉡􅉡紅敗荷鷺鷥扇面葦折荷枯水有聲野塘斜日影伶俜鵷鸞班裏忽飛去點破西山一段青題和叔扇頭時坐登瀛樓樓居高出白雲間不為求仙只為山領取煙嵐無限景天教吾與子俱間天寧方丈題和叔扇頭涼飈深殿度颼颼老柏踈篁已報秋弱水波濤三萬里人間自有小瀛洲陪明初行獨樂臺溪邊得口號寒波清淺帶霜流不到溪邊不見秋疊嶂層崖三百轉樹梢擎出月如鈎次白公嚴韻謝其寄酒與柑任城緑醑侑黃柑遠寄山中豈所堪香霧噀人醒易解不教飛夢到江南題弄花香滿衣圖氷綃桂襡縷金裙浮動紅芳亂綵雲捲却六銖春沁骨荀郎無復事爐熏理宗書金丹詩以下四首題翰長開府公卷軸常笑秦皇與漢皇一生徒夢白雲鄉東南蕞爾垂亡國猶説金丹事渺茫杜子美騎驢醉歸圖田翁招飲不須沽時事多憂一醉除天子乘騾蜀山險浣花溪上分騎驢竹玉立蕭森幾百竿隂晴風雨各平安石兄節操不可轉宜與此君同歲寒虎畫虎不成常類狗伊誰畫狗却如獅世方取貌不求實猛獸滿山知不知城樓暮靄以下八首詠東城之景樓上煙霏暝欲無樓前車馬正馳驅幽人不為晨昏迫只看天然水墨圖杏苑初春玄都道士不栽桃却愛生紅閙樹梢此去東風吹不散仙家自有鳯麟膠灞蓮香雨紛紛轂擊復肩摩有此清漣萬柄荷沈水香中宜早賞秋聲不似雨聲多洞陽午碁琳宫寥閴子聲頻樹影初圓局幾新門外茫茫名利海可憐柯爛竟無人西圃晚眺秋容淡淡映疏雲聊向蒼苔散屐痕欲採紫芝心萬里斜陽盡處是崑崙延翠秋晴霜清水落靜無埃邀得西山入座來爽氣已供朝拄笏煙光更助暮銜杯女牆積雪千雉瓊瑶琢不開隱然凹凸混皚皚皇州寒盡春如海不似秦淮月過來寒林噪鴉樹梢斜日下遲遲啼破荒煙㨂一枝不為上林無著處寒林宜畫更宜詩至正集卷二十八
