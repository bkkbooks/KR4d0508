body:
  text: 至正集卷三十四元許有壬撰序青崖魏忠肅公文集序天地清淑之氣鍾於士而發為文章宜無時無地不得其正也然世運有離合教法有隆汙而經術之道有晦明之不同雖有異質不能不汨而變焉金源氏之有中土也設科取士治號尚文而天下分裂羣言亂哤士之氣習文之體裁有欲醇而不能不疵者也有欲實而不能不浮者也力雖勞而趨則近業雖工而道則虧豈非聲教有限而義理之學未鬯邪我元一文軌然後程朱之學大明於世造詣深者蔚為名賢推緒餘為文章亦莫不度越世習蓋理勝則文在其中矣有壬於青崖魏忠肅公之文竊有見焉公歿五十年監察御史上之請刻諸梓屬有壬為之序而得復讀焉其送尉生之序曰古之學者自小學入於大學自格物致知至於修身齊家舉程朱兩先生之學以訓之又曰讀經以治心為主不泥章句作文先大體而鄙雕刻嗚呼此公之所以為文也公之文若賦詠凡五百五十餘首又言事一卷皆可傳者也獨舉是者欲使學者知公所本而有所興起焉公丁混一之會經術闡明之時其為學也主於經而緝以勤力宜其所得若是其正也其敡歷也自編修官拜監察御史至中執法職憲餘二十年知無不言言無不當道無不為為無不力高風徑節人能道之則其為文不徒文也其有得於經術者乎孫履道拜監察御史有風采可謂無忝矣晋寧忠襄王碑序晋寧忠襄王有功三朝皇上閔勞勑詞臣銘其碑子中書平章政事旺嘉努以碑在灤京墓道後雖永傳四方或不知移刻諸梓為方册庸便流布徴序其端王之先世典環衛篤忠藎至王以沉毅詳審為武皇親臣繼事明皇於雷雨滿盈之際盤桓屯難草行露宿以濟艱貞佐皇上於乾坤清爽之時不危不溢宜享夀考而年才五十五未盡其報豈天將遺其子孫以未艾之福乎平章之心不徒顯揚又欲使天下舉知為臣子者效誠致命則君上報之之厚如此所以勸忠也於戲平章之心其盛矣哉有壬待罪政府王實平章今兹伴食又得與平章周旋世美之知宜有壬屬也故叙其槩不辭送蘇伯修赴湖廣參政序至元庚辰冬趙郡蘇君伯修由吏部尚書擢西臺治書侍御史大夫士分題賦詩以餞俄參議中書乃彚其詩屬豫序而未暇至正壬午夏拜湖廣行省參知政事大夫士又分題賦詩以餞以昔序不果而責償於余也豫不得而辭焉竊惟詩有六義賦若興為之緯直陳其義賦也因物起興興也賦尚矣而興之感人為尤易因淇澳之竹而見君子之斐因南山之臺而見邦家之光當時詩人非不能直陳其事而故為取譬之辭不如是則無以暢其歎詠淫泆不能自己之意焉後世分題之作其興之支流餘裔乎唐以來是體昉見我元詩氣近嵗號盛是體大行每見於贈别凡歷涉封部山川樓閣略著聞見者靡不搜舉興有未盡又從而旁羅泛及以致其極焉其故何也朋友五常之一羣居抵掌忠告善道於遵路摻袪之際以頌而不以規豈古人之所望於朋友者哉然規固責善之道而詩人為教則主於溫柔而敦厚也故必婉其意而微其辭奬其善以輔其不及使告者無失言之纍聼者有悅懌之美則分題託興之作其亦不可少者歟夫以伯修之才固不賴友而進學之功惟日不足誠若有望於友者不知詩人之告伯修其亦有說否乎湖廣地方數千里南包嶺海西控庸蜀其士質而秀其俗儉而野畬丁洞猺喜驚而嗜鬭羈州縻邑憚嚴而樂寬御得其道則狙詐咸作使自御失其道逢人困於干戈重湖疲於餉餽二十年於此矣參預地雖底而任則首洞其弊而藥其瘵於伯修深有望焉此非余言也蓋詩人之言而有未盡者也滔滔江漢南國之紀岐周之盛詩著於二南荆楚之衰騷鳴於百世亦多詩之地也余旦夕得請伯修必豫環而報政是邦大夫士又重其去而因物起興以寓愛慕之私分題之賦又將倍蓰於今日矣不又在豫哉送牛伯榮主簿序有劇盜蟠穴山東剽殺有年後至元二年乃出沒畿甸在官有通結者故得以速其避就屢更其名其究為辛李郡邑畏縮出輒傷敗兵馬指揮使阿爾輝遇害豫時待罪政府急欲得賊有薦烏努罕者不暇察其行請於太師丞相遣而始奏且令自擇十人與俱於是鞏昌通渭人牛伯榮與焉伯榮字仲和儀狀甚偉善左右射通文移掾吐蕃宣閫歷圖沙瑪軍民萬户府知事碉門萬户府彈壓適至京烏努罕熟其勇故與共事益以刑部求盜又益以衛士重其事也追至利州大蟲崖與辛李遇李介胄鞬櫜前戈者二人從而腰弓矢者四人婦而男服戎器者四人馬騎者牽者負者凡草匹望伯榮等罵曰若能與我戲毋怖走山險甚徑又狹且步且騎李陟山復下伯榮射之中其馬顛李率其黨舍馬而前㦸烏努罕右臂幾折射伯榮徹重甲貫膝骨拔鏃而進身被草餘矢相與力鬭者唯烏努罕洎求盜一人餘悉遁去伯榮射李中左額李拔矢不出以刀斷其笴再射之洞其背乃跽不動又斫其額腦出謂已死忽突起斫伯榮馬始躓而絶殺其黨三人餘奔潰翼日悉就擒伯榮驛至上京見太師陳其狀太師嗟賞酌以酒推食食之刑部議賞有欲攘功以爵其姻之在行者諷伯榮曰苟分其功可兩得不然均無成爾不得已推以左額一矢而聼其高下僅得潞縣尉烏努罕擢山東宣慰使賚黃金帶以讓伯榮曰微子吾其死矣子得尉而吾逾涯子不利吾物志吾愧爾強而受之潞京師舟車之㑹民夥俗龎素多盜既涖官悉竄去順擅漷香河寶坻之民訴盜以越境辭相率請於刑部刑部檄伯榮併捕至香河盜十六人騎而待伯榮伯榮率三卒衝入斬三首逸一人餘悉就縛郡邑㑹捕者見賊而走伯榮譙之將上其狀懇請乃已有四盜由潞境疾馳而西伯榮聞之追至楊莊一盜射伯榮中胸伯榮突前刺以槍肩為賊持以刀斷其首擊之鐫追刺一人幾墜射一人中背至光熙門馬􅉵而還翼日中背者死有司得生者知其狀深水盜潜歷潞境逐得三人終更刑部上其功議超二等有惜者豫為力爭於是超一等優一資擢夀春縣主簿官進義副尉有問伯榮以屢勝之道曰吾於韜略無所知能無懼而已噫孟子語孟施舍北宫黝之勇一以無懼為主伯榮所得蓋近於是者邪余嘗過潞父老言伯榮既受代家食將四載盜猶讋不敢犯內艱歸鞏昌潞民寢不安席至之日盜即逸去嗚呼使伯榮大其任捍禦之功如斯而已乎豫嘗薦之為中書行人俾當軸見其軀幹悉其英勇將速其成大其施然貧不能久於京夀春之秩饒力辭焉夀春有民社其亦漸有所施矣方今患盜京南白晝殺奪朝廷知郡邑之狃玩使者與衛士屢出而未底寧弭非盜之多也不能如伯榮之無懼也皆能如伯榮之無懼吾知其不足擒爾豫既不能大其用於其行姑序其實以聲其能以為職捕而懼者之勸張文忠公年譜序贈平章政事濵國文忠張公薨南臺中丞張起巖銘其碑翰林學士歐陽𤣥序其文江浙儒學提舉黃縉紀其祠三君洎有壬皆延祐乙卯公主文所取進士也有壬辱知尤深公之薨乃不獲致一奠之哀獨欲效片言隻字以答知遇而奔走睽阻又不獲陪三君之列竊有憾焉公之子祕書郎引年以公年譜俾序其端嗚呼此有壬之志也公文行履歷具諸碑而槩諸譜矣請以躬承一二言之公汲引後進如不及有壬初倅遼州偶免瘝曠書來奬勉有興斯文復古治語承乏中朝公在鄉里每小有著作達左右必喜而形之書蓋欲䇿其未至也尤慎許可獨稱緱山陳公曰邇來士大夫宜亟法此老蓋取其立朝謇諤進退明决有契於心以矯時弊也朋遊有為御史過於自保者公曰御史士大夫之洛陽也此而無聞無官可為矣拜詹事丞有壬迓之通州坐漕㕔語終日其略曰豫見舉人以書攫官而旋擲其書以官裕身而尋敗其官多矣子將不釋於用其勉之翼日入城則飄然歸矣自是不復一接焉公以布衣入京歷登樞要道不合即去優遊山水若將終身關中之飢人死殆盡西臺中丞之命一下慨然登車傾已財竭心思活垂死無算號慟感疾以薨發於至誠有不能自已者非勉強所能也或議其涖事大迫而疑其制行過高不知義之所在皆當為者也國家百年培養士類其學固足以支吾世用至於養其氣以礪其風節則若有未至者焉風節不礪而不殉於富貴者鮮矣惟豪傑之士挺然有見於世而頑亷懦立之機係焉若公可謂豪傑之士矣而其久退一出又有合於義之大者也於呼其可尚也哉劉楚竒惟實集序廬陵劉楚竒仕京豫始愛其詩未識其人識其人觀其氣又過其詩不但標格而已也楚竒永豐世家祖桂林翁學行冠冕鄉里得夀百有三嵗其百一歲時嘗序楚竒詩曰得道貴實楚竒服膺斯言名所為詩曰惟實集請余序文章以理為主理以實為主天地之間照臨錯布於其上流峙森植於其下君臣父子夫婦之秩榖粟桑麻水火之用參於其中者皆實理也一或虛空冥漠則無以為世矣翁其有得於此乎且實之義非一對虛而言者實之反也對華而言者實之棄也對名而言者實之賔也至於篤實充實又皆是理之極致推而行之隆古淳厚之治不外是也况詩乎楚竒氣盛放其言辭辭而切於理其有得於實矣乎詩凡若干首他詩若文不與焉其仕也歷教職入仕京出為湖廣儒學副提舉後徴入為祕書即朝廷熟其賢進未已也桂林翁又戒以勿忘其大者詩則實矣舉而措之事業則他日騰茂實者其在楚竒矣送王仲方總管赴兵部序民生休戚係二千石漢唐之君璽書勉勵臨軒册受其得圖治之要乎我朝責風紀辟舉慮其局隘又責內外官皆與課其薦重其選而屢易其法銓衡執筆尚恨乏才果乏才耶抑舉之未盡其道邪豫五陪中書幕議而待罪政府者十年天下之大固欲郡得其人而父母之邦未免尤致意焉持論之際端揆嘗笑而言曰此若不當知村翁坐場圃之議不在他人矣彰德實父母之邦三擇郡守皆與末議馮思溫公勵積皆三品以監察御史出守杜德逺𢎞道以左司員外郎繼馮王由義仲方以大都副留守繼杜三君皆未終更改擢公勵為刑部侍即𢎞道吏部侍郎仲方今入為兵部侍郎驛徴且就道郡士大夫以侯有德於人才二年奪去借冦不克而詠歌以餞之請序其端豫昔叨參預仲方右司都事同分省上京豫得請歸田里又時相過從情好非他比雖病辭不可釋也三守皆未終更入為顯官士民雖失望豫獨私幸昔陪末議之無愧又幸其位益起施益沛不局於一郡而且使天下作郡者皆效吾郡守能力於政以動朝廷速躅而進不又有激乎黃霸由潁川入為相今六部侍郎校古制雖不同然亦華矣仲方由是而臺而省將不為黃霸乎况公勵轉右司即中參議中書省事拜江浙參政改南臺侍御史𢎞道亦轉宣徽僉院改廣東亷訪使此其徴也仲方其益勉之哉檀叔寬遺藁序長蘆有業儒者檀其姓克裕其名叔寬其字卒七年子建奉遺藁介教授房純德請曰先子篤學尤致力於易詩若雜製作且三百首里閈則知之習矣未暴於逺也不有攸託以暴之是不知不傳獨無愧於悝鼎乎敢百拜請豫嘉其志洞其誠為筆其概曰長蘆古參戶地饒斥鹵我朝正鹽策實總治於此故其繁夥轢大郡肩摩轂擊莫不窮日力以事禺商而踽踽奮立其中讀書業文不有所見能之乎其致力於易遺言可見所著駸駸作者年五十九而沒惜哉建也不廢其業收緝遺藁不使片言亡逸能子哉參户比屋富饒鮮知教其子生而貫朽殁未骨冷而不肖揮蕩為溝中瘠者可知也是藁之傳有以見讀書為善者之有後而繼志無忝者之克昌其業昭昭若是使觀者有所感發其亦有補於風化者乎涅陽侯傳序涅陽侯傳衡陽馬熙明初之所著也豫三復而悲之蓋有感焉夫行不足以範世言不足以垂訓功不足以及人文不足以明理汗牛充棟可勝道哉而可傳不傳者又不知其幾人也人且若是况物乎涅陽侯枚氏自燧人氏而降功莫與京虞初稗官詩人歌詠舉不及焉明初慨然筆之其祖孫之遐邇族屬之內外隱見之始終名字之同異施用之功徴求之迹詳而核矣豫初居湘漢間但聞其狀至燕始識之特與砞爾其族類未識也太官若𣙜酤五十四大坊資其用尤多性不厭貧下乘車過市細人挈箕斗出三二錢即可致大坊抒竈有心未盡灰者貧子掇拾資其餘力焉京師百萬家不有枚氏則辛蘇氏馬通氏不能濟其三一焉思有以發揮其功書題於壁若冊者餘草年而竟未有以發之也歸鄉里始識其族而明初之傳出矣湘南栗穆祝嵩氏之族自昔柄用其地江漢則狄氏盧氏羅居水滸枚邈在中土人不知也後至元壬午始見於蘄黃山中遂乘舟入江夏狄氏盧氏俱為斂跡主狄盧者怨焉其亦不智哉承平久民生日夥枚氏不至江夏狄盧氏將不赤族乎豫方欲考其從來觀明初傳始知將烹𢎞羊時枚氏逺遁江南此蓋其裔也余投劾歸明初不以余不能有所成而見弃也方且相從教豫豫時出傑作以自樂豫愧於明初多矣序其傳而表之俾世之見者知明初有文才而不試又以見夫人物之遇不遇者幸不幸焉古今不幸而遇者多矣枚有幸而遇明初明初不幸猶未遇也雖然是傳之出識者見之明初其亦有遇矣昌黎先生作毛頴傳栁子且以為怪舊史無足責焉是傳也其文之有益於世者乎觀者其毋以虛烏有視之至正集卷三十四
