body:
  text: 至正集卷七十一元許有壬撰題跋恭題太師秦王所藏手詔文宗皇帝手詔今太師秦王中書右丞相持以示臣有壬俾識其後臣有壬恭讀蓋以兩都門禁遇有夜啓舊惟牙符申以織文不具而啓當以大辟所以嚴禁衛也臣有壬昔參議中書實出御劄而小臣數奇不一月憂去追恨不能有一字之補而切有說於今焉伏念人君之責在乎得人聖人有金城得人之謂也惟太師在天厯初當汴兵衝參謀祕䇿與奪如神使乘輿達京中原不驚今年六月又討不軌其難有甚於汴者其功豈但護一門謹啓閉而已哉宸謀淵深申畫周防古聖人重關擊柝之意也若夫任得其人則又君逸臣勞之大節焉臣有壬故敢書此以助聖君賢相擇人之萬一云恭題太師秦王奎章閣記賜本文宗皇帝逰心翰墨天縱之聖落筆過人得唐太宗晉祠碑遂益超詣蓋其天機感觸有非常人之所能喻者開奎章閣書製文刻石閣中摹本出天下聳觀揭如日月雲漢之賁萬物也當時霑賜非殊眷不與太師秦王中書右丞相奉賜本俾臣有壬識之臣有壬竊惟帝王之德業雖不係乎書然寸心之微衆欲攻之不惑聲色則荒遊畋萬幾之暇誠絶衆欲深宫靜几寓意乎書心正筆正出治之源於是乎清矣況記文所謂崇德樂道頌祖訓戒守成遠不軌不物所以陳王業貽孫謀者本末周密帝王之道盡在是矣誠厯代之大訓也題歐陽文忠公告文與道一而天下之治盛文與道二而天下之教衰經籍而下士之立言力非不勤也辭非不工也施之於用卒害其政者與道二焉耳昔蘇子以韓愈配孟子而以歐陽子為韓愈天下以為知言後世不敢有異議者韓也歐陽也推而逹於孔子之道也歐陽子曰三代而上治出於一而禮樂逹於天下三代而下治出於二而禮樂為虛名又曰我所謂文必與道俱嗚呼此歐陽子之所以為文而先儒謂自荀楊以下皆不能及者也有壬幼讀其書即知好之見其紆餘委備容與閒易初若易入望洋而嘆而後知其大且至也翰林直學士兼國子祭酒𤣥原功其後也登延祐己邜進士第名能為古文潁州後子孫散而四方能世其學者原功耳出所藏至和元年五月告身示有壬曰太師為龍圖閣直學士尚書吏部郎中留守南京時罹太夫人憂服除以舊職起此其告也陵谷變遷巋然獨存傳而至𤣥𤣥也歷胄館奎閣奉常太史幸不至墜世業子吾同年其為我識其左又曰子以參議中書省事母憂去官服除亦以前職召古今事有相契者其併記之有壬早讀歐陽子文得與其後同年而又相好故敢以謏聞識之若夫德業之不究而以迹之粗類者委之豈原功私我之深遂忘其擬人以倫而傷其知人之明耶將原功警我以希賢之學耶警我以希賢之學也則不敢不勉題鄭裕卿孝行詩卷庾黔婁為孱陵令父易在家遘疾黔婁忽心驚即日棄官歸家時易疾始二日余童稚誦故實及此雖未有知而竊有感焉年十三在鄂休日從諸生出嬉惕然有動於中意太夫人當暴疾有青竹立牖下必䇿竹徙倚亟歸視之果䇿竹以立言疾狀甚苦藥數日始愈於是益信黔婁之事為不妄以語人或信或否甚者謂索奇近名遂不以語人第默求之以徴人心之所同然者棗強鄭郜裕卿為仁虞掾扈從桞林至大辛亥正月草九日忽心悸意其母疾告上官得歸二月五日抵其家則母疾已不得語但泣下頷之是夜棄代倘非至情感觸奔走一見裕卿之恨窮天地亘古今其有已耶嗚呼銅山崩而鐘應春木花而栗芽物之以類相感者其捷且爾況子之於親乎子之於親身雖二而氣則一焉身親之身也親有疾痛身雖不知而心為變理之常也惟其篤愛日之至念厲先施之血誠跬步之頃不忘其親則氣之一者無所往而不在矣其終也羮且見之牆且見之齊且見之而況其生乎彼陷溺其心者則不然亦惟有是心者為然耳裕卿為三臺御史僉憲三道皆有聲生能養其志而沒能及其生其亦可以無悔乎朋遊知其事將播之歌詩俾余為之序嗚呼黔婁已矣裕卿無母且草五年吾母見棄亦五越嵗矣尚忍舉以為言耶其忍泣以書者庶後之觀此其亦均有所感焉題牟成甫作鄧平仲傳余昔漕淮掾廬陵曹汝霖出其父士𢎞先生志銘存沒贈挽序文歌詩因得其人焉士𢎞識遠氣豪博學強記僑錢塘宋餘黎獻名伏一時者皆稱其有史才最後鄧憲使善之袁侍講伯長直以宋史期之而士𢎞亦自任也陵陽牟成甫嘗作鄧平仲小傳濟邸事略寄士𢎞備紀述汝霖又以寄京師請識其末余既悲其年之不昌史之未成也而重有感焉國家得宋而天下始一三百年道學之明家法之正人材之多文物之盛三代而下無與倫匹其國可亡其史不可亡宋之史我之責也人亦有言列聖復有成命而宋之亡也又非與秦漢以來國亡而文不足徴者比天下之禆官野史碑銘家乘亦既搜致史館而因循六十餘年何哉竊惟混一之初故老具在此可乘之機而釋之當時士大夫不得不任其責焉大德初余讀書江南猶及見之從問往事歷歷可稽距今又四十年而雕謝無餘矣接父兄緒餘有志如士𢎞者豈易得哉匹夫奮臂而出欲負千鈞之重非有烏獲之力不敢也儋人之爵而職其事者乃不勝一匹雛可乎士𢎞沒矣宋史將遂巳耶天下之大寧無其人不論其職不職也固將釋吾悲而有望焉有為者出則今亟焉猶可及也過此則風聲習氣日以幽邈殘編斷簡日以廢墜雖有太史公出亦不免疏略抵牾矣有為者苟出成甫此作當有取也士𢎞之志其亦可書者乎題潭州李肯齊手書衡陽郡學實肯齊李公故宅開雲樓設公像垂魚正笏有壬幼讀書其十嵗時從師友拜樓上尚論風節詠歌追思三十二年學已久不知公像無恙不也故人陳君季和入京出公手書乃其復司農進直寶儲帥湖南時與其幕陳季文書也時國勢一髮引千鈞急賢宜何如方且斥公十年用復未究已傾而維湖南特一繩耳不待瀛封命下其不能國蓋昭昭已見矣宋之起公公之死宋無益一時之存亡而有功萬世之名教公之一起其功亦豈淺哉使起公早用公盡如公者皆得效其力則古無亡國矣是則天焉一書之微憂國之深敬君之至不怨不尤可槩見也宋逹官位重任劇箋奏書簡幕下士例為之而公之使人謙抑若是君子哉季文名億孫衡之安仁人登咸淳戊辰第為全州推官公辟之幕潭城陷從公死公書謂能道人心事真知人哉季和季文從弟也恭題胡震宧所藏今上御書布衣臣豫章胡震宧奉九霄二字示臣有壬日震宧遊桂林實得侍今上皇帝筆硯及見始作字時落筆如宿習每精意審訂然後奮臂一掃不復潤飾此則書以賜震宧者也臣有壬齊沐伏觀而竊有感於揚雄氏之言也雄之言曰聖人矢口而成言肆筆而成書蓋天縱之聖不求成文放口而自成文不求成訓恣筆而自成訓書以為訓有道焉字畫之寓有訓焉宸翰健剛端重渾然天成書家疲精力矻矻嵗月有所不能而性天超越一趨徑至非聖人肆筆而成書乎而九霄二字又有訓焉唐高宗為飛白賜近臣皆有比興其賜郝處俊曰飛九霄假六翮豈聖衷有見於震宧故不他書而擷此二字以賜之耶震宧其益進於學益勵於行養六翮以待一飛其勿急急於小成也跋髙宗小楷學記宣和父子皆能書而建炎小楷乃學記一卷治亂之機於是可見矣跋忠武王花押右淮安忠武王署押二紙皆薦魯郡文忠李公之底也昔王以雄姿大略濟以至仁取勝國兵不血刃歸槖不貯一毫勳德塞宇宙其協贊畫諾亦惟有一時之傑蔚乎其左右前後也文忠之子季凱請識左方竊惟聞王之風當斂袵肅拜况親見其心畫哉王國之貴種而落筆雄偉若老於翰墨者昔嘗於掌故簿領中間一二見見輒捧玩不忍去手况李氏家有之哉前剡舉文忠為樞密參議後者舉為江西宣慰使皆不果用舉者與舉之者若是當時亦復尼而不行耶文忠終於江浙省參知政事為時能臣王之明又可見矣季凱其什襲之跋雷天益所藏先公詩先公在江南嘗語有壬曰我讀書鄉校時同舍最久而最相得者雷起龍先生先生才甚敏學甚苦浮沉里閈今老矣嵗時話親故必及之聞之熟故知之悉至元戊寅有壬得請歸鄉里其子志天益者出先公手書詩一首乃嶺南和先生所寄之作也鄉思友義即詩可見伏讀哀感五內摧裂先公所作散逸甚多既録之東岡小藳而歸其本於天益俾存世好焉先生後更字伯通學充而不試者也跋晦庵寄馬㑹叔十一帖鶴山馬侍郎嘗有言曰時無孔子子朱子不當在弟子列觀十一帖則侍郎之賢愈逺愈彰而子朱子交友之篤疾惡之誠論薦之公進退之審可槩見也謂其徒持咫尺書干監司州郡朝至暮獲如取諸懷以陵篤縉紳者果何人哉百世之下邪正益判矣跋甲戌混補公據有壬幼讀書衡陽師蘭野吳先生先生諱剛中字景和勝國咸淳甲戌湖南混試終場萬七千八百餘人取合格二十六人先生試賦天地大德曰生通榜第二賦則魁也宋末詞賦尤工嘗誦其賦中朝士夫間殆如孫昌𦙍冠子言於鄉士其不怫然却立者鮮矣當時題名有石補入太學人給以據兵火之餘石且不存况虜乎第二十二人劉先生與詩子楚材獨保其據如新而第八人歐陽先生則有壬同年原功之父也原功既題其後又介陳剛以屬有壬吁宗之賢書蓋絶筆於是而其文獻有足徴者焉南來訪先師子孫於衡陽士子已無知者而幸歐陽之有後劉之有徴也二先生則彰彰矣若吾師輩不幾於泯泯乎歐劉同為瀏人而原功又為太史使二十四人不泯若二先生亦必有道矣題楊廷鎮所藏首科䇿題仁皇肇行貢舉親䇿多士人賜印題今全州總管臣宗瑞既擢第請請卷官集賢學士臣孟俯謄諸砑綾以仁皇之親䇿臣宗瑞之所對重之以臣孟俯名世之書信楊氏子孫世守之寶也臣有壬實階是玷前列十五轉遂待罪執政追思廷對時文運之亨如日方升不圖才三十年遽至廢格雖姦人藉進士瘝墨者若干以簧鼓上聽而不才適在政府封繳不武匡救無術有愧於七科五百三十七人者多矣尚敢以瘝墨者為辭哉而亦何面目復觀聖䇿耶讀卷臣世延等識于後莫不哀嵗月之飄忽君臣之奄棄世事之多變也哀則哀矣無愧也臣有壬則兼之矣謹書其槩而歸之題趙繼清覆瓿集後同年趙君繼清昔與計偕人已翕然稱之蓋學之固有者也有壬佐天官幕繼清調湖廣省照磨參議中書調國子助教皆與議末草年中凡三見之不久輒去故於文墨言未嘗及丙寅嵗在右司見其覆瓿集讀未竟取以南去甲戌嵗又見之始得盡讀文若詩凡六十餘首然後見其舂容寂寥之各適其當而益知其學之固有而有能進也豫拙且懶仕復多劇非迫諸人觸諸心不獲已不執筆積以嵗年存尚滿篋况博贍敏給十倍者乎則此集也其示人之一斑乎然而文貴傳不貴多余之貪於繼清者蓋欲見大方之家而極其學之所肆爾它日請之其尚勿吾拒也夫題李元鎮堯山樵唱集大德丙午冬識文安李元鎮先生于鄂豫落魄京華元鎮召入同邸忘年市飲無虗日朋遊唱和少年技癢恐後元鎮但轟飲不言時出一章硬語老氣見者盡傾尋去翰林遊吳楚閩海殆遍承乏按南海聞元鎮治舶事海資山積但攜一猿一鶴而歸過橫浦驛見所留詩思其人而和之豫仕京七年元鎮在江湖元鎮兩入京皆值豫出人生難合有如是哉提學湖廣年望七十豫亦髮蒼蒼而視茫茫矣握手驚喜亟出堯山樵唱集曰子知我者當有以議其端噫交遊二十五年始得其帙之全而知其為詩之多也惟其讀書有見故其言醇進退明故其氣勇土視貨利無一錢不蹙眉故其意適江湖之日多仕宦之日少故其體放元鎮少慷慨有氣節善騎射早官江南棄而讀書山中深造厚積入可以備顧問出可以為捍禦惜其壯而不用用而不盡今老矣才五品冷官豈天欲昌其詩而厄其官邪昔鄭谷梅聖俞皆為都官雖若過之在元鎮猶未用也豫恐觀者不知故叙其生平大槩而區區交遊出處因以見焉跋海朝宗玉枕蘭亭永和癸丑迄至順癸酉九百八十一年蘭亭一帖臨摹展促殆千萬億化身矣本來面目寧不變乎朝宗所藏校豫所閲蓋唐臨之佳者也第世無吳卒不知綱之果似芮否也跋納琳文燦詩士子持所能得一第為能事畢矣髙昌納琳布哈文璨則不然逮守湘隂歸汲汲問學猶未第時豫嘉其有志於逺到也出詩一帙求言甚切無已則復之曰三百篇後作詩而世傳者可數也評詩而世服者可數也後學望洋罔知所止愚敢以所聞進曰學曰師曰識曰力而已學以聚之師以傳之識以别之力以終之四者不廢一旦自得有不期然而然者矣故曰學詩如學仙時至骨自換夫見彈而求鶚炙見卯而求時夜已太早計矧彈卯未見者乎君見矣其力求之少陵復起不易吾言義首座自號仁峰題誦連軸為之跋曰韓子送文暢師言其謁吾徒來請其心有慕焉天寧首座義公既名義又號仁峰而又謁吾徒來請則其有慕也審矣吾徒亦有以告之乎仁乎義乎其亦慕其名而遺其誠乎而亦煦煦孑孑同其育乎揮之進之豫將究子於名號之外矣至正集卷七十一
