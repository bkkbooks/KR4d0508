body:
  text: 至正集卷七十四元許有壬撰公移言監察御史李謙亨等量移雷霆震怒終不廢於生成雨露沾濡初何分於美惡况沛九天之厚澤固宜一視而同仁凡仕清朝舉承殊渥豈容餘潤獨限遐陬欽惟今上皇帝以上聖之資舉曠世之典被服衮冕躬祭太廟制作鹵簿聳動神人大禮告成有生胥慶推恩臣下罔有崇卑內外四品以下職官普減一資至於至治二年以前入役者考滿入流日皆與優減天休所被踴躍難勝若有在官得罪而情或可矜者亦宜量加湔濯祭統所謂明惠之必均也比者監察御史李謙亨成圭以言事得罪欽蒙宸斷竄之千里地面獲全首領幸已莫量但各人適際昌期舉行盛事倘均沾溉益見恢洪若蒙發還原籍準復量移近裏薄示從寬不惟使之得以自新抑見天地父母之德宏大難名遠邇無間也風憲十事照得延祐三年六月欽奉聖旨作新風憲一欵監察御史廉訪司官凡利害可以興除軍民休戚切於時政者各宜盡心敷陳以憑采擇又至治改元詔書天下之大機務惟繁博采輿言庶能周悉自今內外七品以上官有偉畫長策可以濟世安民者實封呈省伏念卑職一介寒微屢叨甄録凡偉畫長䇿之可采豈淺才末學之所知既博采於輿言且下詢於百職況叨言責敢竭愚誠嘗謂天下之事非一設官分職各有攸司而官職之中風憲尤重所以糾百官之非違示百官之軌範故其用人也必當極天下之選而於行事也必當盡天下之公奉法持衡毫髮無間然後可以責人未有已所不能而責人之不至者邇來風憲之司或已有成法而不能奉行或雖有舊規而事當損益庭荒田治蓋所未聞故不敢他及而以風憲十事具陳如左取補書吏書吏名役至輕所係至重補用之法屢有變更所以不憚煩者必欲得人而後己也然而改法愈密得人愈難事壅法隳其弊益甚至使外而郡邑內而朝廷語及此徒無不顰蹙豈天下果無其人而立法終於不善邪盍亦究其所以然者夫天下之人才本難而憲司之事權實重事重則庸人力不勝任權重則小人挾以營私紀綱之廢職此居多苟能依例令管民文資正官從公保舉廉訪司官覆察相同面試中程然後補用如有不應元舉覆察考試正官首領官黜退該吏斷罪勒停則亦何患無其人哉今則所舉大率非強有力者不得覆察者符以虛文甚無謂者面試之日皆與符同公堂秉筆落紙成文者蓋百無一二也考試之官初亦豈有私意不過謂人身事辛苦至此忍使流離奔走不遂而歸意則佳矣奈國事何後來者又復如此久久相因是使憲司不終於得人也使其對面依例必試雖元舉覆察已完而其不實者則皆不逐而自退矣豈不革一切之弊哉至於敗缺往往有之而所謂黜斷者絶未聞也人亦何憚而不因循故常哉補用之法以此為綱始終相維但必行之人自得矣若夫節目之損益亦有不容不及者嵗貢儒人雖有明敏之資而遽為未試之事殆未易也今後須要年三十以上覆察完備先歷路吏一考三臺典吏雖案牘素所習學而資質既有不同工拙遂致迥異其應充書吏者亦合先歷路吏一考然後試補官既獲用彼遂達材亦將樂於趨事也奏差名役雖有稍輕今皆轉補書吏始由州吏取充較之路吏所歷既淺所進亦優合於嵗貢不盡路吏內舉察取用依例試補書吏若是則曰綱曰目交相維持申明舊綱參酌新目補用之初責以必試若有敗缺將元舉官吏必罰無恕人各有警而人才自得矣會議還司照得作新風憲詔書各道分司若不遍歷百姓利害官吏貪廉豈能周知除廉訪司使守刷按置司去處餘擬每年八月中分巡至次年四月中還司如不依期出巡及巡歷未遍托故廽還或依期還司不曽遍歷及應結絶之事而不結絶者聽總司申臺區處竊惟外郡遠邑小民茹苦含悲而不能赴訴汚吏竊時肆暴而恬然自安者憲司之官非身踐其地心誠求之蓋未易周知也朝廷立法謂舊制日月拘迫不能遍歷改擬八月中分巡四月中還司所以責其郡邑必遍而事務必辦也今則每至分司之時總司依時分道發印而各官因循宿留非半月兩旬不能出户總司未免催促遂至構怨生隙妨害公事至於文移之往來自有遞鋪必曰重事亦自有額設差乘驛往來或者又有必須議論面相可否之事須要經手諳知首尾之人則書吏固其人也今則每遇會議公事司官必領吏屬躬自還司驛馬祇應之勞費郡邑官府之送迎嵗月因循事務廢弛一行之間所失若是之多也又每遇詔赦不問條欵拘該如何指稱未奉通一例回還直候申稟明降方行出司雖有明白赦前應追會者亦漫不省視至於體覆體察之事與赦文了無相干一切付之不理此尤不可不論者且以已往通例考之即可見也今次遇赦不過照出先奉例文稱説合無比依前例一體施行省部擬議大率皆準舊格至於再四重重相因豈有假此為名遂謂無事設若一二新事舊例所不該者候奉明降至日施行與其餘蓋無相妨也推其所由一則妻子在家急於看視二則辭難避事玩廢嵗月因循苟且培飬資品而已百姓之利病官員之貪廉蓋漠如也夫外郡遠邑望司分之來若飢渴之待飲食一事未畢飄然而歸其失望為何如哉况有已經論告之人未曽究問者挾恨報讐適足以重吾民之害耳彼得以為辭者止謂無事而虛費祇應使其果無一事但監臨州郡所以消貪邪護疲瘵者不能盡言祇應之費其有幾何况會赦而可行者不可勝計除出司不依期及不曽遍歷已有明文外今後凡會議公事重者止許差書吏還司其分司官理宜禁止若遇詔赦亦合止於所分州縣聼候通例按行其餘合辦公事至四月中依例回還庶免曠弛文案稽遲風紀之設振肅綱維宣明風化鎮遏姦邪為重至於刷磨案牘特簿書期會之末然而刑獄之重輕金榖之出納舞弄於巧密之內包括乎繁冗之中故照刷之時尤宜介意且諸司文案憲司得以治之遲者督之使行錯者釐之使正隨其輕重而施其決罰雖一檢一劄之失行十日半月之稽緩蓋必較而不恕也至於憲司之事錯者遲者何限首領官雖有檢舉之名分司廽還亦有照刷之説而常人之情無所警畏習於故常狎於情好終於付之不問而已苟以照刷有司之法待之將何所措手足耶有總司立案候分司出巡施行之事分司回日或以還司日近或以巡歷不曽到彼或轉行委官却行卷連回牒總司明年出司又復如此搬卷往來有至二三年者本司如此而欲責有司之遲慢可勝嘆哉夫書吏權重上下之所共患而莫究其所已然者請因是論之夫分司之出也官吏三四人而已為之官者使皆熟於案牘精於事情則為之吏者雖欲髙下其手舞智作姦其可得乎其有髙坐堂上大小事務一切付之於吏可否施行漫不省録事權之重欲不歸之於吏不可得也為吏者雖欲避之亦不可得也况有所見之不同書吏所執雖是而不能抗官長之勢其不詭隨者鮮矣竊照按察司設立書吏當時議論事事周悉但用非其人不能無弊遂以為冗員革去今欲去事務之稽違削書吏之權重莫若每道依舊設立書吏四名巡行之時分道而出贊畫公論扶持紀綱還司專一分輪檢舉照刷文案其三臺察院亦合各設一員並於各道并行臺察院考滿書吏應任提控案牘及儒貢書吏兩考之上選充一考之後依例入流如此則案牘免稽遲之患而書吏之權不削自輕矣薦舉官員為治之要在乎得人取人之道必當極天下之公論而後能盡天下之人才薦舉之法固取人之急務然舉之苟不以道恐復有遺才之恨今日之事試以四事論之舉之未盡善者有三而導之使競者則有一焉所謂未盡善者一曰五事舉人之弊五事之目因循雖古實則虛文户口之增不過析居放良投户還俗或流移至此彼減此增之數夫何能哉江南之田水中圍種齊魯之地治盡肥磽雖有真才五終不備遼海之沙漠莽蒼巴蜀之山林溪洞龔黃繼踵能使田野闢乎欲盜賊之息者有盜匿而不申求訟詞之簡者將應理之事亦付不問至於賦役則上下貧富品答科沠自有定規盡能奉行亦分內事况實效茫然凋瘵日甚惟其必以五事全備取之則誰不巧飭紙上且例文明謂所舉但有敗闕罪及元舉察官今敗闕者何限而黜責未聞宜其玩習苟且非恩不舉也今後莫若令監察御史廉訪司官凡路府州縣官各舉所知不必拘以五事明言其才能事政著明實迹以備采擇嚴其同坐之科必罰無恕則人才將自得也二曰不明所長之弊夫人才古今所難人各有能有不能不可強其所短而廢其所長也比年以來每見所舉之文一槩無非可居風憲言路之人若夫治民用兵理財聽訟主文參幕考工明術者世豈無之見於薦剡者蓋百無一二也今後擬合各言所長至省部籍類以憑采擇庶銓用之際各適其材三曰連名舉同之弊監察御史舉人之際多挽同列連署滿紙同署之人復有論薦亦復要之雖有素不相知之人未免委曲順從殆如答禮蓋以平日往復之有素也夫人之相知各有淺深必欲同銜實乖公論今後擬合令單名薦舉果有同識其賢亦合别具薦狀庶革牽聨之弊其一事𨗳之使競者比見薦到五事備廉能官員憲臺既已除擢後又與之呈省遂營求升等減資且始言薦之以其可居風紀激勵貪濁俾居清要則是已賞之矣又圖升減不惟有礙選法實𨗳之使競也今後擬合將已經臺除者再不升減其已經省部升減之人憲臺若欲除用須待再舉無瑕然後甄録庶少抑奔競之風亷使頻除分職之在外者莫重於憲司用得其人則一道之間功效有不可勝言者况廉訪使職長一道權總副僉分司總司皆聽處決是以其職尤難其人苟得其人可不假以嵗月使之盡展其長乎今天下二十二道闕者蓋十常六七遍歷精選僅得幾人而到任未幾尋復改授夫天下之事非責之專任之久未易有成也朝廷定制內任以三十月外任以三周嵗為滿雖有明敏過人之才至於本末之後先輕重之緩急布置施為各有條序固非急遽之所能盡也語曰苟有用我者期月而已可也三年有成夫子大聖周嵗之月但能僅布紀綱至於治功必三年而後成子産相鄭一年而謗之三年而頌之今之所用果何人哉苟得其人則又或一年或半年或數月紛紜改易席不暇暖家資盡於遷移筋力疲於道路公務益隳紀綱不振職此故也夫省臺所職雖有不同機務重輕亦未易别大扺事體相需同欲致治而已今憲臺選用官員所至之處吏屬尚未盡識而省部論擇復與改除其省用者臺亦如之遂使一人之身一嵗數遷一或不除皆置不用人才固難而用之如此將何以責其成效耶今後廉使既得其人部省不請改用須待將滿却聽選除庶三年之間一道之事得以盡其所施也逺道闕官天下之大生民之衆撫之以郡邑綱之以憲司可謂治具畢張矣而遠邇之間有不容不辨者各道司官除廉使守司刷按置司去處其副使僉事分道出巡所至詞訟填塞公務紛紜推問不公審斷獄刑照刷文卷點視倉庫及體覆體察一切公事一有缺員則巡歷未至之地必有受其弊者今所至闕官或令副使僉事守司而按治州郡皆不暇及况腹裏邊逺事勢不同腹裏時有闕官郡邑官吏猶或有所忌憚設有縱恣不法而禮法之民有苦而已若夫邊逺地面山川溪洞之險阻徭黎夷獠之𡨕頑撫字或乖利害不淺官吏憑恃險遠率多貪汚漁獵繭絲無所不至非持憲之人監臨彈治使之有所警畏殆未易靖也今年廣西一道至今闕官令經歷權攝司事廣東海南福建悉皆闕人蓋是已除者托故不來而到任者不久即去迹其所由亦各有説人情孰不欲身之安佚以遂其仰事俯畜之心哉今則不擇其地之逺近人之便否一概授之雖嚴其不赴之罪亦無以作其必往之心也江南三省接連及廣海地面二品至七品官員可任風憲者豈無其人若將各道分相近地面官員有政績昭著曽經薦舉者遴選銓除庶人皆知勸可無闕官之患冗食妨政憲司設官置吏雖大小不同而人各有職豈有無事安坐贅員冗食不能少禆治理又復有蠧於政事者哉且司官首領官責任之重固不待言譯史則標譯文字譯寫表章書吏則按行照刷審理推問奏差則往來傳逹實為行人以至典吏之微亦各有事而通事之設本為蒙古色目官員語言不通俾之傳逹固亦切用之人然而今日各道監司大率多通漢人語言其不通者雖時有之而二十二道之中蓋可屈指而知也則是所用之時常少而無用之時多虗糜廩祿又與出身日無所事不過挾司官之勢陵侮吏曹俯視官府擅立威權恐喝有司囑託公事附帶買賣影蔽富民誠以安坐而食無所用心故其為己營私既專且精也舉世皆知書吏握事權重之弊而不知此曹雖不握事權而事實由之故其為害若輕而實重弊難盡除去其太甚今後莫若令譯史兼之各路亦合一體照磨雖曰職官皆重慎廉恥架閣承發付以典吏紙劄祗候遂為專司餘則無所事而安坐冗食亦合減去令知事兼之今各道照磨闕處不少未聞兼之而有失懼者也或謂寺監三品清間衙門皆設照磨通事此可減乎曰風紀之司一事之微皆當極天下之公論天下冗員不知其幾風紀之司皆當建白整頓縱不能此忍自畜之哉或者又謂欲此闕安置人員尤非公論孰謂風紀之司而有為此論者乎倘蒙詳酌議行亦有補於風憲銓除御史監察御史前代八品之職國朝官制為正七品選格內任一考與升從六外任兩考方進一等握算計資毫髮不貸至於憲臺除用歷御史者即除各道僉事正五品職內轉臺為都事必授副使正四品級非戾於選法也誠以御史非百職之可比庶務之利病皆得而敷陳百官之姦邪皆得而糾劾朝廷使之位卑而言髙者蓋御之有道也人之常情望其所未至則必奮發激勵勇於趨事刀鋸在前有所不顧位卑祿輕則易於棄去無患失之念去就既輕作事必勇若厭其所望滿其所欲則必委曲周旋保全遮護今也四品五品率皆除之甚有資歷已及三品而浮沉其中彼果何望而奮於立事耶故事之來也含糊模稜目曰老成鈐口縮頭號為持重迫晚景者顧影而自惜計子孫者留意於將來因仍改除遂為得計今後莫若先儘縣逹嚕噶齊縣令有治迹治次及內外六品七品才德堪充之人其資品髙者不必銓用庶無患失之心又比年以來每將集賽人員除充是職夫聰明敏逹者固亦不少而事務生踈者不能無焉亦合精選上等知識而明敏剛直能勝其任者為之庶幾適用於憲綱不為小補贓罰賑濟近承奉臺劄淮西河南廉訪司將贓罰錢賑濟飢民奏準今後若有賑濟沒俺文字休交動支切謂民以食為天遇時有阻飢之患國以民為本救荒實為政之先聖朝子育黎元鰥寡孤獨給糧養贍災傷水旱蠲稅賑恤至矣然而州縣非才奉行不至不幸有水旱之不時細民實獲其惠者未之見也而况經費不資帑藏有數嗸嗸仰給卒無以應之遂至鬻子賣妻輕則為道路之流民重則為原野之餓莩救之之道當如拯水火之焚溺也夫廉訪司所收贓罰錢物始則實出於民皆濫官汚吏掊尅聚斂之與其他用不若歸之且各處人民必見已飢而後陳報未有逆料將來而敢預為申請者也若待明文恐有不及如蒙詳酌若有賑濟附近道分擬候明降其餘遠道有司錢榖果有不敷許令支用庶望飢民不至失所農桑文册農桑生民之所天有國之大計人無智愚皆知其為重且急也世祖皇帝內立大司農司總挈天下農政各處正官嵗時勸課無成效者御史臺按察司糾察究治又立行司農司勸農司分地管領為是農桑已見次第併入按察司添設僉事二員後欲減省臺官一同奏準廉訪司事多依舊存設在後節次奏準管民官提調廉訪司體察未聞廢弛延祐七年四月大司農司奏奉聖旨節該廉訪司為農桑兩遍添官交依舊管行每嵗攢造文册赴大司農司考較夫責之廉司者蓋以勸課官知所警畏初不係文册之有無文册之設本欲嵗見種植墾闢義糧學校之數考較增損勤惰所以見廉訪司親為之然養民以不擾為先而害政惟虛文為甚農桑所以養民也今反擾之文册所以責實也今實廢之各道比及年終令按治地面依式攢造路府行之州縣州縣行之社長鄉胥社長鄉胥則家至户到取勘數目幸而及額則責其報答之需一或不完則持其有罪恣其所求雞豚盡於供餉生計廢於奔走人力紙札一切費用首會箕斂因以為市卑職向叨山北憲幕蓋親見之而事發者亦皆有按可考以一縣觀之自造册以來地凡若干連年栽植有增無減較其成數雖屋垣池井盡為其地猶不能容故世有紙上栽桑之語大司農嵗總虛文照磨一畢入架而已於農事果何有哉况分司所至去處公事填委匆匆未畢已迫程期豈能一一點視盤量兼中原承平日久地窄人稠與江南無異若蒙詳酌奏聞依舊巡行勸課舉察勤惰籍册虛文不必攢造民既無擾事亦兩成至正集卷七十四
