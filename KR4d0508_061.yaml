body:
  text: 至正集卷六十一元許有壬撰碑志元故中順大夫同知吉州路總管府事李公神道碑銘公諱克忠字公謹姓李氏麓泉其自號也世居青州曽大父諱松佩銀符山東東路樂鹽使大父諱楨知登州父諱顯四嵗孤祖妣張夫人挈以避難七嵗族有為帥者攜之入覲十四能騎射從帥征淮藝日益進帥器之任以機警擢千夫長歴鄒滕尉河南等路管民權府招集撫慰薄稅均役民徳之始徙滕家焉事張夫人以孝稱定鄉里義約以篤友助就養吉州過徐徐故治也父老迎而勞之有感泣者年七十八終於吉州官舍公㓜穎悟自知力學業成入京年甫二十八風紀詞垣交剡騰薦遂掾吏部朝廷遣使安南責以六事署安南國達嚕噶齊府知事偕哈尔薩哈雅等行至元乙亥四月也時江南未平由臨洮渡河源經土蕃涉麗水過莎車至牂牁逾南詔善鄯金齒水陸萬餘里至其國其人外雖恭而奉行未決移書責以大義諭以禍福取所貢物歸土蕃梗途行雲南新開道丁丑夏始達上京上親臨問録所經山川地里人物風土洎安南日厯國主問答上之賜金符擢奉訓大夫工部郎中兼計議俾再徃使江南已平道廣西差近至即得其要領己卯三月達上京尋命復往庚辰四月挈其使黎仲佗奉表納欵九月至京師而使事竣矣上嘉賞命為城守之長主者要一見卒不往僅除奉議大夫同知岳州路總管府事撫字發擿恩威并著命民藏氷初皆怨咨明年大疫得氷既愈播之詠歌改泰州尹未期擢中順大夫海北廣東道提刑按察副使二親不能往委貲於弟俾奉甘㫖甫一年聲實大振思親即歸鄒滕民羇滯嶺表者三十餘人給以食載之歸葢將終養焉廟堂熟公之能若夫均大名傳驛之偏拯河間鹽法之弊決山東獄内之滯皆承攝而著績者也改同知吉州路總管府事慨然曰廬陵詩書人物之府舟便而吾親可偕此吾禄養時也抵郡㓂盜方熾除攘之力居多葺郡學新大成殿諸生紀之石權府捐館哀毁踰禮奉柩歸滕廬於墓側親朋勸以母在始歸給從弟克明終其身安南盡出橐金贖歸鄉人之陷於彼者平生急於行義類此壽五十六卒母朱夫人夢吞天星生公卒之夕有星隕里門戛然有聲配賈氏封隴西郡太君男女各一人男希顔廕南昌縣主簿附省縣治人難其任而剖决如流科稅先完民有訴兒為豪子踶死者傷有足指痕詰之曰彼豪子著履來乎曰然曰著履安得有足指痕此必自踶而以誣人也訊之具服辟行省掾從捕贑賊文檄旁午處之裕如身親行間發矢命中録勲賞一等擢袁州路經歴部使者薦其能遷鉛山州判官署兼捕盜建亭曰簡聼昭盜弭也陞建寧路推官太君年邁不赴築亭種植優㳺仰事者十年自號静山太君服除除松江府判官驗力定役吏不得舞智嵗糧四十萬石痛刮宿弊致期預登省檄封海舶漳州染癘歸陞奉訓大夫温台海運副千户改太常太樂署令俄以疾卒壽六十有二配張氏女適陳孫男三人稷登泰定丁卯進士第今監察御史穡廕永嘉縣尉補江浙省行人穎先卒女一適孔遹稷以某年某月某日遷權府而下葬滕縣闕村之原狀其世徳請銘諸麗牲之石李氏自鹽使至御史六世矣鹽使鬱而未啟登州啟而未廓權府廓而未鬯至公鬯矣而天復靳年造詣止此有家之隆世固有人事業之大有志之士不能無望於公也愚謂公之樹立非炳炳較著者乎士生用世雖主乎學苟無氣以充之所就亦淺近爾持被入直三省顧婢子語刺刺不能休者滔滔也公視萬里如跬步三徃返如須臾移安南書及為詩八十韻皆激烈有氣主者要其一見將市恩邪抑求賄邪夫以視萬里如跬步三往返如須臾之氣而肯枉己以徇人乎故雖五品貳職亦足以行吾志苟一枉己崇秩華貫能直人乎愚聞有功而食報未盡者在其子孫御史仕日起食公之未食者審矣繼御史而迓續者尚有望焉銘曰仙李擢根有大其植幾世幾年而華而實踽踽攝府邁種惟徳故老之思見於垂白使乎專對豪傑以之南交萬里不測之夷曰三往返猶庭適逵帝曰汝能其俾長郡伊誰刓惜乃竊天柄我君我知我忠我職爾何人斯我爾私覿通守豈卑惟安所遇持節嶺海飛霜暑路岵屺興思鄉僑偕去奉常承家惕若敬勤官不貴大貴世有聞十年膝下萬事浮雲清廟禮樂吾可為矣倐焉長往曷云能止嶄嶄諸孫危科是掇續聞無忝繼志尤恪豸冠峩峩階是日升奕世流澤益肆以宏睠兹佳城松柏有光本支百世於乎不忘故浙西道宣慰司都事贈嘉議大夫禮部尚書上輕車都尉南陽郡侯鄧公神道碑銘公諱澤字潤甫姓鄧氏其先世居渤海五世祖諱某仕金為保州刺史始為蠡吾人皇元肇造國王穆呼哩既定蠡吾公之祖諱徳以才傑見知國王載與俱歸更其名赫爾根承制為管領河間深冀蠡民匠達嚕噶齊以卒父諱天瑞母康氏篤於義方之教故公㓜以孝謹稱於鄉里稍長讀書喜賓客善議論出入兵間習知兵事每䇿勵自許慨然有用世之志至元十一年秋王師南伐立行樞密院衆推公才諝宜在帷幄遂辟為掾省文檄調兵食綜理密勿大為主將所知而襄樊以南望風俱附矣會朝廷新置使宣慰黄州等路仍絀公為令史轉提控案牘未幾江南平授將仕郎黄州録事酬其勞論者少之而公不以屑意也十七年秋陳桂龍父子反漳州閩中騷動廷議以公前在軍有能名擢為行中書省左右司都事佐其軍討平之比還進階承事郎改浙西道宣慰司都事浙西宋故都民俗奢靡而士習巽耎少年惡子乗時縱暴為奸利者以什伯浮言胥動上下暌暌不相保公白上官悉取寘諸理而於扶微興壊賑乏抑奢所以勞徕安輯之者尤汲汲焉於是齊民始有蘇息之願矣二十二年宣慰司移治揚州公仍都事積勞當遷方嚮大用而病於杭遂不起享年三十有九實是嵗之九月廿三日也配張氏生子巨淵早卒次配朱氏生子巨川起家太子司經知印累遷為江浙行省都事入為太府度支監丞宣㣲資政院判官遷福建都轉運鹽使朱夫人卒服除改江西㩁茶都轉運使國制三品疏封二代公之父贈亞中大夫僉太常禮儀院事輕車都尉南陽郡侯妣康氏南陽郡夫人公嘉議大夫禮部尚書上輕車都尉南陽郡侯配張若朱封如其姑公始卒時朱夫人年二十四巨川甫三嵗守節自誓朝廷嘗旌其門年八十有賜幣至八十三嵗以沒巨淵子三人曰洛河間路鄚州稅使曰淇曰汾山東鹽使奏差巨川子五人洙大都留守司令史曰滈國子生卒曰淮環衛官亦里好温筆且齊曰泌國子生卒曰涇女二人長適河東㢘訪司知事康塤次適蓧縣主簿陳崇本初公之沒也旅殯於杭後五十有八年為至正二年七月十有七日始克返葬蠡吾先塋之次又六年巨川始以國子監丞李君黼之狀請為文刻其墓碑葢巨川仕而益貧久而後克信其志也愚交巨川久義不得辭竊惟我世祖皇帝之定江南也網羅才俊盡屈羣䇿以成混一之業小大不遺文武并用規模宏遠矣然當是時元勲碩臣既皆功在彛常世胙茅土至於羈靮之勞尺寸之效依乗風雲致位通顯者比肩是也惟南陽公結髪從軍參預籌䇿再平㓂暴綏靖南土使天假之年積累盛大其奇謀偉績必章章然有可稱者顧位不酬能身殞名沒可悲矣夫雖然吾聞畜徳晦善其施必達巨川踐敭中外聲名蔚然由其子之所立而後公之所以積慶自躬者庶幾乎可睹也國家推恩泉壤侈以通侯之貴生也弗食沒而彌章然則刻銘牲石以示久遠其誰曰不宜為之銘曰惟鄧侯潤父蠡吾之英學書學劍久知名我師大介歘以興下馬草檄如流星䇿勛儋爵得若驚南藩㓂虐削屢平國有新舊典重輕呉兒作姦吾是懲上官操割大軱經幕中畫諾實發硎一朝使節移廣陵署雖易地秩乃仍人期步武將青㝠拾級甫七隕厥登三十有九丁頽齡令子克似業以宏起家斗食至專城南陽啟祚世有承宜爾孫子方繩繩於躬不耀沒則榮惟畜不施抒也亨終古有考在兹銘故奉政大夫淮西江北道肅政廉訪使贈嘉議大夫禮部尚書上輕車都尉追封恒山郡公諡正肅布延公神道碑銘淮西江北道肅政廉訪使布延公卒十一年至正龍集丁亥子中書檢校官神保列行實請易名制贈嘉議大夫禮部尚書上輕車都尉追封恒山郡公諡正肅神保拜監察御史以愚同官中臺諉銘諸阡乃序而銘之公諱布延字君卿輝和爾氏世家髙昌曽大父諱薩里台初贈集賢侍講學士中奉大夫䕶軍追封恒山郡公諡孝懿大父諱布延圖呼蘭從太祖西征殁于陣贈資善大夫中書左丞上䕶軍追封恒山郡公諡靖忠祖妣燕按迷失追封恒山郡夫人父愛全受知憲宗莊聖太后尤禮之始命徙居鎮陽葢太后湯沐邑也贈榮禄大夫司徒柱國追封趙國公諡文靖公㓜敏達事北安王奏請悉屬之起家贑州路石城縣達嚕噶齊王封邑也時㓂蔡五九張甚發民與戍卒扼其衝復石橋為賊所撤者大疫躬督醫藥癘氣為息新公宇社稷廟學部使者薦五事備五年始代人不忍其去拜仁宗潛邸一見器之補東宫筆且齊典環衛文籍既正大寳詔御史臺除公御史繩糾無所避紐勒歡元帥伊哷森等受賕承詔往鞫正其罪正旦糾朝儀有二品立一品班首斥使退不從劾罷之上行幸次大口問宰臣御史七品布延散官正八何也對曰初任當爾乃特授承事郎擢僉河北河南道肅政㢘訪司事陛辭賜魚籃觀音像靈璧囚李殺劉繋獄獄卒嗾誣其兄指授文致之讞得其實釋其兄黜汚吏四百人舉才俊皆知名移淛西道平江民岳武斷吏不能制論以法佛者白雲宗蠧浙尤劇上其事朝廷為奪印罷之運使李英恃鹽法貪虐發其贓部使者牒公詣行臺行臺復屬公走中臺上已行幸又馳至上京事聞上深嘉賞酌酒親賜且命上方賜食勅臺臣中書擇能吏與本道雜問罪人得而淛人甦矣改燕南道黜牧守之不才者英宗幸定興五臺皆以行部進見賜賚優渥衛士不敢肆暴上有命公力奉焉陞河南道副使民熟公皆延頸以望信陽囚王蠻兒輩本農家傭嘗往来邵良甫家邵值盜主者疑蠻兒輩瘐死且二人察其狀釋之俄得真盜光州改奉元路總管葢罷吏騰謗聽者不察因以劇郡中公期年化行以疾去移守吉安大旱民食蕨本且盡至有牽妻子水死者葢公自作縣迄守二郡皆際大饑或勸分軍民或力請於上或鬻爵募民身所不及分官往賑急甚水火為粥以食不能自食築屋以居無所於歸極救荒之䇿誠之所至禱雨輒應奉元黍稷穗生槁節間前後全活不知其幾縣若二郡皆紀之碑召入遷奉政大夫淮西江北道肅政廉訪司俄致仕歸後至元丁丑八月三日卒於正寢九日葬真定東陽村先塋兄宗綂克哷呼圖嚕黙色仲兄昌國州達嚕噶齊碩裕實弟奎章閣大學士趙國文穆公呼圖克都哷黙色娶輝和爾氏封恒山郡夫人生子杭壘蔭承務即同知諸暨州事再娶呉兒生神保國子生釋褐歴贊憲幕有聲由御史僉淅東海右道肅政㢘訪司事女二人長適江南行臺治書侍御史布尼雅實哩次適江南行臺監察御史額森托音孫男三人女三人皆幼公起家藩邸試縣小割㳺刃有餘地文穆精輝和爾書位極清華上嘗憫公職不逮弟公矢辭誠恪益結主知要職華貫汨汨然來矣仕有崇卑然見諸事業者崇卑不與焉持憲為賢使者作郡稱良二千石始終一致完節退歸所就豈淺淺者哉自奉寡薄禄入賓祭之餘買田宅以處兄弟宗戚皆可銘者也銘曰髙昌釐土育才孔殷旁行專落實肇我文天造動闢用宏兹賁季也操觚譯潤芸閣叔也崎嶇牛刀甫割天眷一顧順流注壑矯矯持斧我豈人仇縱其蟊賊力罔有秋惟枉斯直惟當斯劉兩守大郡厄丁其㑹號饑顛連形鵠色菜我不爾急是我爾劊一道澄清浩然賦歸左圖右書雍容燕娯子孫詵詵兄弟怡怡七十有五夀斯謂得疏封惟崇易名有赫究其邁種猶稼而穡鎮土厚良蛇蟺於恒繚以滹沱中為佳城我銘不泐百世是徴至正集卷六十一
