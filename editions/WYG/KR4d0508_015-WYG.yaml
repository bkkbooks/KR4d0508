body:
  text: 至正集卷十五元許有壬撰律詩七言五十二首送黄文復歸長沙半生湖海夢依稀但誦湘南逺寄詩先友凋殘公獨健故園荒盡我方歸百年未滿常憂畏千里相逢又别離他日梨江松下路西州難似此沾衣次阿榮存初宣尉韻芬華刋落著才名曽見横飛白玉城雙節自歸修月手九天誰聽戛雲聲軒扉風露清無夢杖屨林泉澹有情莫道東山絲竹好顛崖囘首奈蒼生歐陽初心思亭節婦能收戰骨囘肯堂仍得寧馨兒九原難作身未殉一息尚存心不衰今古有知風樹恨乾坤無盡蓼莪詩更將致慤明來裔亭畔豐碑待刻辭南樓以下五首和王繼學參政韻江流天逺亂晴霞郭影雲深帶晚鴉長笛透空清似水健㠶飛浪碧成花石城瓊璧神仙府畫棟朱簾帝子家詩在好山濃翠處莫教煙霧等閒遮武當宫絳節摇山引翠幢誰開琳宇對清江雲霄路近在丹竈松檜影寒空碧牕方外洞天今有幾人間國士自無雙蓬萊弱水知何處且繼昌黎賦下瀧雪後登南樓徙倚危闌俯釣船空明金碧訝鈞天寒收江影澄拖練晴動山光濕帶煙萬里青雲孤鶴去一竿滄海六鰲連惟應聽罷南飛鴈纔信人間有醉眠沙武口望武昌煙樹蒼蒼不見城水禽驚起背人鳴舟摇疊嶂髙還下鴉閃殘陽滅又明闗塞夢寒愁逺道江山詩瘦苦多情好將身外無窮事都付滄浪欵乃聲途中風物過淮都入畫松筠當雪亦成叢乾坤已見來儀鳯霖雨多應待卧龍江路梅花千樹發海天山色四時濃圖南本自鵾鵬事不是人間不見容横山有髙竹樓别業留信宿始歸酒香牲腯主人歸正是猿驚鶴怨時梅影小池春入畫竹聲虛閣夜催詩世間真樂無多事身外浮名只費辭他日結茒容我隠一章先當買山貲望土門山逺峰天外碧嵯峨滿貯鴟夷信馬過堤栁雨餘黄著色野塘氷盡緑生波十年俗駕迷途逺一片春山勝事多却笑采詩仍習氣何如牛背夕陽歌登嶽祠正陽樓用同年李伯强留題韻青山髙處結層樓九㸃微茫認禹州煙浪逺浮舟隠隠天風清咽角悠悠仲宣多感空能賦元亮平生不解愁莫望長安西向笑蒼顔難繼少年㳺次竹樓韻勝地佳人邂逅逢一林行盡翠朦朧松聲帶雪清欲滴山色到樓寒更濃眩目敢誇龍虎榜論交曽嘆馬牛風對床醉卧誰呼起却是煙村曉寺鐘送曽學遜㳺淛平生㳺淛勞夢想羨子一年行兩迴越地春因修褉去錢塘秋及看潮來江山清境聊乘興今古盛時無棄才便好騎鯨窮汗漫海天東向有蓬萊和同年李芳齋縣尹韻牛刀何足展君長妙割雖多不用鋩彭澤秫隨楊柳種河陽花帶桂枝香當時文㑹人千里幾度月明天一方囘首茫茫又南北暮雲深處望琴堂題孫幹卿父褣寓公芝圖商山逺采竟無徴坐上天教見一莖風紀政刑真有感乾坤嘉瑞豈徒生紫雲墮地收不起玉樹凌空長又成此去百祥仍作頌髙門橋梓自同聲和繼學見寄韻憶昔乘風在帝傍珠璣紛落五雲鄉藍田夙擅連城價粉署曽分滿袖香歸去山林惟魯酒興來天地有奚囊江湖何日重攜手見説鱸魚味􅇰長送術士陳九山歸九華常記乘軺過九華撲人濃翠濕晴霞十年空作山中夢半世猶隨海上槎紫闥彤闈君盡友清泉白石我無家談𤣥便約同歸隠聽罷松風自煑茶安僧宣慰異竹移竹曽教竹不知附鞭蜩腹已端倪化工談笑出七子人力裁培無幾時地墳只疑龍獻角實成應有鳯來栖何須辯怪如歐老留作甘棠慰去思九日次趙秉彛韻平山雲樹錦斕斑人倚霜空十二闌公館簿書常負節海天風雨漸成寒人間有地容三徑身外何心戀一官應被黄花嗤我軰幾時同去釣江干風雨中憲司觀荷僉事鄭裕卿索詩小金山下水雲多一片秋聲萬柄荷霞臉雨香匀膩粉翠裙風急捲輕羅從知柏府開仙署肯放蘭舟發棹歌珍重此時清絶景主人無酒耐詩何盧仲禮知崇德州未月而頌聲作題其卷末報政曽聞五月程君侯旬日便蜚聲良心感觸無愚哲荒嵗施為繋死生才器每於難處見詩書真到用時明從今早備如椽筆擬待三年頌有成送書吏戴奎遷兩淛奎以學稱刻木像母事之塵俗紛騰鴈鶩行就中金羽自低昻詩人尚得官長惜孝子忍教途路忙像貌固知非土梗精誠隨寓是羮牆崇卑有分君休校姓字誰沾翰墨香題趙季文茶屋山人有屋不容花自笑平生只愛茶鄒子墅邉鴻漸宅洛陽城裏玉川家清風夢斷膏粱氣小鼎雲翻粟粒芽不用反闗嫌俗客五侯亭館自芬華挽曹士宏煙草佳城二十秋士林能説舊風流諸郎盡得書中禄此老應無地下憂逝水才華今古恨浮雲富貴死生羞碑銘傳滿人間世逺勝征西紀墓頭送相士周竹泉歸金陵可山當日剩過從神目秋涵水鏡空老子醉歌曽有贈阿戎多藝又相逢江湖嵗晚難為客天地詩豪不救窮好羨蔣陵松下路幾時容我一枝笻揚州李氏貞節歌吹繁華市井連就中氷玉自清堅身將同穴生猶死月不如人缺又圓宅里聲光重華表古今風教有青編子孫堂下森蘭玉天擁春和在暮年挽曹士由孝友先生不愛官詠歌歸去老儒冠誨人昔亦非佔畢矜式今猶未葢棺百世聲名毛頴重九原風雨鶺鴒寒虎山囘首松楸路常使行人説二難上都寄髙辛甫叅議同隂頃刻尚留連六歲同寅豈偶然世路徃來皆傳舍人生離合有機縁雲山煙水幾千里霜木星辰二十年不日中秋定歸去紫垣明月共嬋娟棗林閘待水河上桅竿宻似林河中流水貴於金雲泥咫尺隔千里道路尋常勞寸心風挾清寒猶作陣柳摇黄影未成隂人生偪側自為爾江海白鷗何處尋送劉廷正歸臨江士行多岐首孝亷誰能千里事虀鹽良才横棄天應惜㳺子貧歸母不嫌夜雨江湖詩更苦春風薇蕨夢方甜眼中盡是經行處誰信而今白髪添夀李秋谷平章黄鍾嘘暖挽春留緑蟻浮香帶月篘宰相得閒纔是貴人生有子更何求家傳文字五千卷身在神仙十二樓記取年年好風景雪松霜檜豈容秋王文煥三䘮未舉以詩道其意庻有遇焉秋風闗塞底踆踆聽罷行藏亦愴神父祖三䘮俱淺土詩書四世只清貧由來慕義推燕趙忍復無情效越秦送子空言深自愧世間應有麥舟人次王克繼憲副韻莫道乘軺老不任公餘猶及事幽尋樹隂壓屋日亭午花片撲人春向深吾道升沉真有命野雲舒卷本無心詩豪已作狂司馬長日官曹擁鼻吟主試遼省次提舉馬蒼山韻六年陳迹重經過曽鄙揚雄賦馺娑簪紱敢陪英俊後江湖空負水雲多當時塗抹已堪笑今日冬烘其奈何賴是西風知客意一宵吹夢到漁簔題張德潤孝行詩卷張奉親柩遵陸家人舟行值㓂而無怨也南逰具慶盡怡愉一旦歸來與影俱孝子惟知親不死瘴江先念事多虞終天有恨何嗟及古柏無情亦為枯萬里祖塋安厝了幾人漂泊愧黄壚送朱本初住玉隆萬夀宫春風煙水片㠶飛去去難緇鶴氅衣仙秩受來真是貴世途行徧正宜歸眼空雲海天無際心折京塵夢漸稀日拜旌陽憑致懇若孫方困簿書圍次石中丞敗荷韻葢敝衣空莫主張從知柔脆敢凌霜蝕殘老葉餘枯柄放出清波泳太陽光綴落蛩秋冷淡夢寒栖鷺月微茫但教七澤根株在一脈能傳不盡香和石中丞韻二首詩似天葩散異香學如瑶海引流長小巫平日誇神氣河伯而今見大方閲世壯心堅鐵石拂雲髙節飽風霜休將山色論歸興囘首安車恐轉忙西風吹夢野蓴香一舸歸來路轉長正賴韋弦調緩急敢離規矩妄員方月明杜若天如水秋入蒹葭露已霜好趂黄花侍尊俎明朝南海馬蹄忙送翟志道歸毗陵埋頭簿領惜蹉跎昨夜西風動棹歌豹管才呈一斑爾鴻鐘其耐寸莛何雲封石室𤣥無恙秋染蒼江翠不波囘首毗陵相憶處山川寥落月明多九日登石頭城詩并序金陵山水甲江南凡昔號勝絶著郡乘者徃徃可徴以息以游隨其所適而悉獲所欲若夫考古昔之廢興盡江山之形勢咫尺千里盼睞四極發竒胷雪滯慮非憑髙眺逺如東山之於魯太山之於天下則未易得其槩鍾阜雨花非不髙也而蔽虧隠見或得或遺求形勢之備得清凉寺翠微亭葢古石頭城也至治壬戌九日中執法石公持書郭公具酒殽登焉監察御史劉傳之李正德羅君寳巴咱爾文㢘公瑞阿勒呼木夢吉照磨萬國卿暨有壬實佐行時宿雨初霽萬象澄澈長江鈎帶風檣出没淮西江南諸山厯厯可數與夫川原之逶迤樓閣之雄麗雖一草一木不能逃也金陵之美斯為盡得起坐周覽清興横生執法公曰吾儕生承平位清要地勝事簡歲時休暇得與諸公聮轡以嬉豈偶然哉人生聚散雲萍飄忽昔者所與今誰此留而明年此㑹吾知其未易知也持書曰此不可以不紀也酒一再行二公督詩不已乃各誦所記九日詩率古作之傑出者相與大笑傾倒不知深盃之屢空也坐乆風勁不可留於是借僧室飯而歸夫欲考廢興之迹於一時有不得而悉者江山形勝固無恙也而石城之盛實甲金陵當佳節侍名公㳺勝地衆美具矣塵世一笑古且為難一日之㳺衆美遂具可謂尤難是冝有以紀之也顧沮縮於古人可乎精糧將見則糠粃在前有壬忘其陋而序其説且系之以詩曰一江環抱四山圍酬節追歡剰費詩鴈影不隨雲盡處秋光都在雨晴時當年玉樹人何在明日黄花蝶豈知便駐髙軒􅂸醉倒絶勝無酒繞東籬分行南海初發建康聖世要荒覆載均年年分節徧咨詢一鞭殘月馬如電萬里清秋筆有神南海雲霞先入夢西江花草更冝春但將平日清貞操歸獻吾君效野人秋浦道中秋浦風光世亦稀謫仙仙去乆無詩天邊九梓青未了山上五松寒欲飛結屋有心真落落乘軺無計可遲遲懷賢對景何嗟及又見行人指翠微黄花驛疎雨瀟瀟釀早寒荒庭寂寂掩柴闗秋聲動地滿前竹清氣襲人無數山十日已為千里客百年真得幾朝閒雲泥蹤迹初何意底用題詩傳舍間饒州光華樓輪奐飛空四面牕臨風暫得息紛哤民生盡逐魚鰕利郭影半涵雪水邦鴈足曳雲添暮景角聲吹月滿寒江鄉闗何處休愁絶湖海元龍氣未降曉登古步五通廟閤用察掾董仲達韻神鬼何須較屈伸倚闌髙興薄層雲日開混沌三竿上路入微茫一線分世故能抛皆樂土人生無用是多聞采詩未了催行役囘首山林愧隠君濛江驛灌叢樛木亂鬅鬆敗屋疎籬罨畫中沙石漾波清練練山林纒霧濕濛濛穿胷盡入堯天覆鴂舌能將漢語通問俗無功深自愧采詩歸去繼王風贈歐陽逕存次其韻到處公侯倒屣迎秪縁湖海有先聲長貧正坐詩為祟愽學誰教藝得名物外煙霞窮樂事人間花草任春榮一聲鐵笛飄然去明月秋江徹底清監試上都次栁道傳途中韻二首川原風色晚蕭騷發軔塵沙一日勞明世疎慵竟何補長途筋力謾相鏖天邊白草寒無際馬首青山近漸髙只恐稚圭今復有移文非我更誰嘲嵗寒沙蹟瑩無泥客子身心付馬蹄山雪斑爛僵樹立寒天空濶暮鴻低傷心臺上人千載想像河梁手一攜當日是非何足較躡雲吾欲挽虹霓㳺西山得疾同年焦德元以詩見寄次韻答之好山佳客正相資仰盡危巔俯折枝泉石豈能真作疾神靈應怪不留詩可憐隠几低埀處猶夢穿雲踊躍時若問維摩真疾否小窻危坐自能知岩翠霏微濕冷煙松聲浩蕩撼遥天從知勿藥本無妄畢竟到山還有縁短壑孤雲猶悵望清風明月且髙眠脱如謝傅攜絲竹應是參苓剩費錢至正集卷十五
