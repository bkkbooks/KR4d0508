body:
  text: 至正集卷三十七元許有壬撰記兩淮屯田打捕都總管府記後至元丙子嵗十月制以兩淮屯田打捕總管府昉世祖時闢漣海田募民耕以出膳材而總其治比嵗疲瘵逃徙武斷隠地常賦用逋其令中書擇人洎同僉宣徽院事賽音布哈徵括為籍以拯其弊於是中書檄令斷事官韓庭院俊偕行至則得隠地為頃三千五百三十四逃亡為户六千七百八十四逋鈔為錠六千五百八十賽音布哈躬歴其地洞其弊既竣事後條上利病凡建設源委供輸息耗吏姦民瘼靡不周息大較謂事夥員少任重秩輕宜増其員精選亷慎常流以列府職用江淮財賦都府例登正三品以重其職府控提舉司吏卒無慮數百皆繭絲吾民户為所弊盖三之一宜汰其半事分隣司府吏屬若所治吏不齒常秩禄且不逮貪肆宜也宜用路州秩吏食以俸人必自惜户役已重有司復科貧逃富困宜籍為三等九甲則賦役可均承平乆田野皆闢嵗貢鹿麞率逺地買輸四五月至京師車駕幸上京膳庫貯儲坐視蠧敗中原嵗輸給用宜聴折收中書紀之四年八月奏可於是府之事率作而興起矣盖升秩以重其體精選以重其職綱既舉而目自張矣汰冗司去苛暴吏有常秩户有定籍人無重困物無暴殄民力蘇矣其綱雖五其要使民力得蘇専耕種漁獵供輸之餘有以仰事俯育則人何由而亡賦何由而逋哉世為使奉一事行能盡事斯賢已懦者縮忽悍者豗突貪者攫攘蠧事一也能盡事而又原䉻其弊刮劘而振起出於使事之外者不才而能之乎中書知其才奏除為府達嚕噶齊同時選奎章閣供奉學士扎薩克為總管均其任和林倉提舉索諾木為同知僉山東廉訪司事金礪為副總管民匠都總管府經歴哈達黙色為判官枚江縣達嚕噶齊布爾罕和爾為經歴湖北廉訪司䝉古筆且齊長夀為知事蓋楨為照磨行其言也十二月改頒銀印國制二品印始用銀三品惟内上寺監等用外則江淮財賦府用之以其𨽻興聖宮列聖所以示崇極孝養之意而非他治所敢擬也淮府乃優給之待之可謂隆矣淮府走書徴記有壬求其故至元十四年姚演獻漣海荒田一萬一千八百十七頃既定封畛種者有牛官給種税十四牛種皆官税其半皆復其家水陸取禽魚以供玉食立府以率其屬屬分其治視嵗豐歉而登降其入焉廿二年併揚州打捕總管府入兩淮府廿六年増徐邳屯田八百頃府𨽻宣徽院嵗入粳有白赤精鑿若雜珠粉餅材麻菽薑濡槁屑薧腒腊脯腵修皮革之屬屬鉅萬計他錢又不下五萬定其任亦重矣哉國家立法未始不欲其百世無弊而不能不弊者勢使然也法一弊人則捄之猶舟之不能不或滯於淺車之不能不或柅於塗也善操御者亦使之行而已至於人病已革必求明醫付之苟非其人祇速其斃古人所以慎改作也明者知病所在投以良劑未有不愈者也淮府其明驗歟昔有進不由道而蠧其政者朝廷懲之精選而得諸君諸君之膺是選其亦益慎其守哉昔之法弊矣從而變之奉盈執玉則在諸君焉勿使後之人又有所變而凡後之人一守此誠俾永無墜此府之有待於記也於是乎書彰徳路儒學營修記彰徳路儒學正燕九萬學録許中行貽書有壬曰九萬軰非材其何以承學事主領敦勸郡大夫是頼嵗丁丑秋監郡荀公以上丁祀近獻官行事待次有幕而兹薄帷裀几榻之需嵗假於市不乾沒則褫敗之人用怨讟大非所以事神也乃命録事任允中董役作屋不浹日而東西建各五間祀永有次人永無撓矣明年五月又以廟門木朽不任啓閉仍命任允中撒而一新書閣之欹者正之周垣之缺者完之廟宫重嚴士民改觀六月總管杜公始殿謁而塗塈剥落容光穿漏亟命安陽縣尹趙時敏填其罅圩其墜尚懼不密復作承塵為板凡四百方士子安昔之翫異今之厪不敢小而畧也敢請有壬聞而喜曰善有小乎暴其小不益進其大者乎國制有司主學風紀勵其怠而天下主者視為切已一弊必修一墜必舉者有幾蔑教典習故常身雖至而目不一顧者衆矣二公之善非小也善非小也而其大者可不力哉詩人頌魯僖公能修泮宫盖嘗三復其辭以意逆志而竊有説焉其曰穆穆魯侯敬明其徳敬慎威儀維民之則又曰明明魯侯克明其徳又曰濟濟多士克廣徳心詩人因其能修泮宫而頌之不言其修而拳拳於徳者其亦有深意乎敬明克明則上之人以身為教而進修之功至矣推以覺人人人是效而多士則又克廣是心無所不至皆去其舊染之汚矣大學明徳新民之事也上之所以教下之所以學其備是哉泮水諸侯之學也今列郡之學是已學之學者皆學孔子者也孔子天也不可階而升也而見之詩書易春秋者皆學者所當致力可階而升者也泮水之詩明徳之要其當致力之先者乎上以是為教則僖公不専美矣下以是為學非魯之多士乎不是之求而或詞華之是訓功力之是趨作為以干譽縁餙以適徑則雖高其閈閎廣舎萬間無益也相古名郡也宋則忠獻韓公興設有成金季兵燬國初興修尋復隳圯至元六年己巳總管王遵重建繼之營修者時有人焉惜其不得燕九萬軰揚之也荀公名凱霖西域人杜公名徳逺定興人二公之有志於學士之歸美其上可書也書頌也頌無規可乎其益進其大者哉澤州高平縣河西里廟學記在昔盛時由國都以及郷黨無不有學陶冶一世而納斯民於至善之域其治隆俗美以是哉斯政不修聲教有限惟澤晋城當宋文明之極而不知學明道先生之為令也郷為立教擇秀子弟聚而教之督礪誘進學者日盛厥後應書者至數百登科者十餘人隣邑漸被學校大興金源百年平陽士遂甲諸道而澤又甲平陽先生之澤至矣乎高平於晉陽寔接壤曰河西里舊有廟學嵗乆為墟大徳辛丑里人張君汝明倡復舊規先聖有殿二程有祠師生有舎墾荒地四百畆供祭養士君出仕攘於豪右訟而復之敵喉當路入之邑庠假其名不可奪而實快其私也君自酃移訴轉達并憲躬辯於庭憲議邑庠既廩著籍有素河西里無田則無以為學與其剥無以益有孰若兩有之為善且廣學有制此敢廢乎遂决以歸君宰邑判州凡三代歸越七年而田始盡復始末一紀而經葺訖工於是標疆畔嚴簿籍強暴無得而覬覦祭有供士有養矣謁文刻石以識其故賢哉張君之用心也世有當為而不為者有可為而不為者當為職也而不為之矧非其職者乎可為義也遇則為之人已奚擇而人每難之至為不義則又若易者河西里非一人張君奮出卒復其舊是豈職之當為責之使為者乎有壬嘉其義而考其俗因有感焉世逺教弛俗善賽祈至假學宫以祭非其鬼瀆莫甚焉用是告其郷之人曰明道先生繼孟氏宗主斯文其教澤人孝弟忠信之事人道也今學修師立知所以事人則知所以事鬼矣妖誕雜揉之事委巷不為况陳於堂堂南面之陛乎若夫應書登科非儒大端亦教之一效耳效雖在是而有不在是者焉先生盖有不患妨功惟患奪志之訓矣或者矯激過高而使人過於偏採摭混殽而使人安於陋非先生教人之道也學者其慎思之異時出才超軼盛宋張君之善因附以不杇則是學為不虚設矣彰徳路創建鯨背橋記聖朝既平宋經畫遐邇大郡小邑枝䟽脉貫際天所覆猶一人身焉政令之宣布商旅之通遷水浮陸馳舟格梁濟荒陬僻壤無逺不達猶氣血周流百骸用康一或壅塞則身為之病矣故橋梁若道路路若府州縣皆専官董之嵗時行而察其廢修此朝廷著令示為政之先務也彰徳實古相河亶甲所居禹貢兾州之域也世有廢興邑有改徙而山川之流峙形勢之雄偉津塗之要衝有不得而變者焉我朝為路路則今制而名則昉自石晉宋若今皆因之郡直孔道駟傳屝屨歴渉尤劇郡北四里洹水所經夏秋受西山萬壑之流奔横駃悍滅防嚙涘蕩然四溢官舟濟人而要需阻尼上曝下淖負挈奔渡擠排蹴蹋􅆽漏中流惴惴及溺水涸作橋因肆掊歛聚良用惡薄覆弱搘行者杌􅑾莫不股慄嵗一修拆民大有輸締搆之用百才一二蠧財病民不知其幾年矣西域荀公凱霖嘗監安陽縣位卑力小有志未就余待罪中書適赴調京師嘗語及是慨然曰使不武長郡必作石橋余既從臾之且語之曰果成予為若記俄陞路達嚕噶齊至元二年嵗丙子春莅事首號於庭曰洹橋病民耄倪共知為永逸計非石不可且嘗請諸冬官冬官可之總管馮公思温繼至而同知阿拉判官穆爾沁暨幕屬諸君莫不恊恭賛畫乃相舊渡沙深水濶柢難為植䟽鑿引水人用重勞東一里水磑廢渠土性堅良面勢惟允基是締搆事半功倍相距幾舉武後先幾年莫有迹者目力一及若發蔀物出莫不躍然以喜地為天寕寺業世不可牟也乃召其徒以其法語之曰佛以慈航濟渡故凡世之𢎞益於人者多若軰為之且聞有所謂八福田者而橋梁居其一焉則是役也若軰宜為之况而地乎惟其力之有不及也其亦難強於而哉誠捐此地吾有司自為之福田利益其肇基於若乎師徒聞之聚而謀曰是誠吾徒之當為而不能為有為者出尺寸地尚可靳乎相與署劵入官約乆不畔既得地以府帑贏息募工搆財惟石之用以尺計者數餘二萬攻琢輸輓費勞實煩得石水冶近而易致盖昔非産地也甓灰鉄鋌靡不具集安陽縣尹趙時敏實集其材復董其役恪共朝夕用底於成經始丁丑二月凡四閲月而建其陿未廣而淺未濬卑未陻而防未堅者明年始克訖功其長亘十五尋碇基於淵兩端磩岸中作三墩折水為四而鋭刃其西以劈水怒四環順列一脊窮起植闌兩翼其廣可以行四車凡材假於民直有未歸者馮公入為刑部侍郎總管杜公徳逺適来乃共發帑悉酬之予得請歸二公率其屬請曰橋之成國家之福民庶之力子適歸而身履之昔之言今其酬哉予亦昔之冬履危而夏冐險者也紀功示後記宜為也况有言可食乎天下之事成於有志一僧孑然而出儲無宿舂植一標於荆榛瓦礫之埸而萬間金碧不日突起矣天下之橋以雄偉名者多其徒為之孰有儋天子之爵操得致之柄而反不彼若哉愚者不能黠者不為也其或勵志率作而同僚嫉之上官搤之自非先之以定見守之以定力奮不顧流議而勇於必為者鮮有濟焉初是役之興有言韓忠獻王三守相凡渠水之利莫不修復使橋可作則必先矣盖不可作也殊不知古人盖亦有不及為而後人為之者未聞古人事事盡為而後人無一可為者也昔杜預啓建河橋於富平津衆論以為殷周所都經聖賢而不作者必不可作故也預曰昔造舟為梁則河橋之謂也遂作橋成則知古人之立事亦未免譁於浮議而成於定力也噫作者之難若是俾其功勿壊而施於無窮則有望於繼者焉既為記之又採輿人謡為之頌曰洹水浟浟載伏載流始於濫觴俄而勝舟胡為悍肆奔騰喧豗揚於驚濤激於堆埼伻馳孔殷商途攸出乘危將墜濟險慮覆嵗狃日偷安斯匪今孰急其病而疚其心豈無徒杠亦有輿梁朘民之膏視為故常膏朘靡恤事功奚益枯株槁壤載胥及溺乃有長人職思其忠心匪石轉詢謀復同浮言譊譊謂古有賢而不此作豈昧於前我不爾咎爾亦匪誣利病誠切孰興孰除千夫運斤山石為竭曽不逾時橫空嶻㠔鱗集櫛比堅猶壘玉蜿蜿龍卧岧岧雲矗昔也江海而今堂閨傴僂絡繹晝提夜擕凡今之人盍究所適旦播未周夕求其實有為逺慮人即迂之惟略近效乆大可期繼今有位勿怠其成水厭横流㟁虞善崩洹水浟浟頌聲洋洋百世而下於戲不忘至正集卷三十七
