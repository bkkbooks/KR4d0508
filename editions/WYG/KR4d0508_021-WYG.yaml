  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0508_WYG_021-1a, image: WYG1211/WYG1211-0154c.png}
body:
  text: 至正集卷二十一元許有壬撰律詩七言四十一首哭甥緜寄秉彞并序至正壬午十月廿七日知甥緜死尚不知其何地何時也緜生吾家先妣鍾愛其女幸其有子鞠育勞瘁過諸孫有疾醫禱聞無不為費給不貲不忍其歸挈之來揚州吾妹不幸卒先妣繼之秉彛來赴與予同舟至九江予泝鄂秉彛挈緜入洪時四嵗頑健異常兒書來每稱其對客誦詩不聞其弱也予在上京使如洪因遣視緜歸言頑健勝昔歲己卯秉彞挈之過鄂年十二矣身雖修長而精神若不完者心竊疑而察其故乃知秉彛嘗與新夫人燕坐既箠之復使前跪至夜分不釋疾暴作仆於地數日始甦由是頑健之態不復矣此洪醫之言也又聞諸婢無不得毆之者飲食不時粗惡不堪號飢於諸僕僕有憐而竊飼之者必遭中傷叔母者視之頗謹尋被謗讟三事予亦未敢深信而鄂之目擊者多且以二小節言之姪女嫁王氏日舉室送于其家獠僮寅孫挹釡中肉汁而飲緜亦挹之未及口婢春蘭不罪寅孫獨連擊緜首而奪其椀此阿燕之親見者也有熟客過秉彞緜先與客坐王婢杜姐之小雛保兒突來坐緜上迫緜取茶緜意懶對客拳擊之而繼以數拳且捽其耳不釋雖小兒素戲其色與氣俱非戲者此葢習見諸人之毆不以為怪也即欲理究姻事方喧老夫亦被唇吻以故齧齒隱忍容今無恙不欲著其姓名恐遷怒嫁禍於人秉彛偕王族之將歸也緜旦夕泣訴於阿燕欲留武昌至言不留之便跳入江其言有條理不類騃者又喋喋泣訴於亡妻當時處之甚難百計甘㫖誘之使悦始肯就舟今思其言痛不忍舉似也秉彛亦知之乎秉彛為人慈仁寛厚在路人且不忍肯不恤其子乎先考妣待秉彛之厚天實知之雖無奩貲君子之於人取其心不取其物肯不善視其甥以存世好乎區區所以有遺憾者秉彞不明爾然父子之情豈不切於舅甥而况修短有命非人之所能為知此而又譊譊者念先妣盡瘁之無功而吾妹一脈之遂絶有不能自己者焉乃哭之以詩曰妹已云亡又苦甥肺肝摧裂淚如傾死生固是天無爽囂虐還因父不明兩姓世縁從此絶吾家宅相待誰成湓江鄂渚囘頭夢滿耳猶聞泣别聲盧溝橋盧溝橋下水無聲半是黄沙半是氷老子還家欣又過少年題柱愧何曽直教車馬通萬國不遣舟航泛一泓送客漸稀容少駐西山寒翠晚崚層途中即事二首風袂茸茸動黒貂馬行空濶不知勞天邉紫闥人漸逺雪後青山氣愈髙一飯忘君臣豈敢十年伴食罪何逃鴟夷傾倒休惆悵野店青帘有濁醪倦翼翩翩下九霄投林有路敢辭遥邦畿天近春先覺澤國風輕凍欲消牛背神光何咄咄馬頭歸興正遥遥行人不識庭筠句茅店雞聲近板橋馬上日暮郊原嵗晚眼増明雲樹煙村隔幾層人影漸長天欲暮烏輪未墜月先升冥冥逺意雲中鵠碌碌何功臂上鷹旅次不遥詩未穏儘教羸馬慢騰騰待泮三分春過一分期底事堅頑尚未澌土塌且為安坐計氷山行有自消時夢囘南浦添華髪目斷東風動碧漪恰似杜陵悲去國終南清渭更遲遲以皺皮靴贈明初皺皮精製出龍沙曽記遼人獻宋家素質寛柔裁稱足碎雲縈帶蹙成花不須一量煩曹操却笑三生是革華願子亨衢服無斁我方芒屩事煙霞龍虎臺迎接次焦德元韻三首昔人曽厭薛居州却聽江南領畧秋束帛丘園勞使節五湖煙水負漁舟病來元亮欲止酒老矣子長猶好逰早拜君王乞身去休教敝盡黒貂裘晚風吹角入凉州塵夢驚囘恰見秋雲壑周圍皆可屋霜溪清淺不勝舟眉宇深負元德秀欵段空懷馬少㳺賴有三升門下酒不須輕典鷫鸘裘自信山林已半仙山林囘首又茫然闗河䟦涉幾千里雲水嘯歌纔二年輦路雲軿花接軫故山茅屋竹為椽鳯凰池上恩波濶得似滄江理釣船同約伯髙尚書行昌平舊邑滿目郊原是舊逰賜環恩德若為酬臺髙龍虎擅多景地有螟蝗尚半收紫氣浮闗黄屋近錦雲縈樹玉峰稠山英多事今猶昔應笑重來兩鬢秋友人解之昂物故已三年矣昌平縣廨壁間見其為御史行部時詩感而次韻漢江觴詠杳難期底事飛仙不少遲敗屋尚餘揮灑處扁舟空記嘯歌時故家喬木有閥閲老境空房無扊扅泉下有知應少慰故人獨解辨哀辭偕杜叔愚王仲武章君錫可行逰馬廷彦獨樂臺山居廷彦出素屏求詩為書二首時九月二日甲子乆雨初霽郊原聯轡看西城况有幽人倒屣迎一曲霜溪環老圃幾層雲岫䕶佳城浮生少與良辰遇樂事今逢甲子晴自笑匡時已無策欲從吾子耦而耕獨樂臺邉孝子家耕田力學了生涯年豐不慮尊無酒秋老行看菊有花甓峙墓垣逾鐵石山圍書屋滿煙霞我來不結雞豚社試向清洹照鬢華陳公􅌂有亭在鯨川東里米元章書扁曰蕭閒外舎惜傳刻失真予既為書之且為詩曰鯨川東里近煙村小巧翬飛棟宇新不見米顛題外舎幾如囘老笑西鄰栁邉花塢浮紅出桑下蔬畦潑翠匀世務驅人行有日扁舟何處更尋春劉仲敬知州出其父同知公所書退之陳旱詩聶夷中傷田家詩求題其後羮墻無地不思親况此淋漓手澤新兩紙文辭有深意一門父子盡忠臣尋常考室真能構多少籯金反速貧大勝牙籖三萬軸轉頭都作蠧餘塵劉仲敬埜香亭薝蔔林中不學禪作亭容膝俯鯨川琅琊多景正三月參户有春同一天風送幽花清不斷煙和芳草逺相連醉翁樂處君應識更看流芳幾百年臘日雪次房純德教授韻四首一宵川媚更山暉簫皷聲中亂玉㽔天上風雲應三戊人間道路隠多歧春方欲動成佳節重不能擎愧老枝蜡酒醒來風味好鼎香融水煑茶時獵塲風勁日凝暉凍捲雲旓與翠㽔上苑花開詩一札中天林耀㦸千歧芳叢蓄潤冝萱草亂翠先春綴柳枝還記口脂霑賜罷馬寒如蝟踏歸時雲合璇穹冷不暉皚皚萬斛播芳㽔慕袁髙卧寧祠竈訪戴空囘勝泣歧面藥霑恩辭北闕宫梅攙暖破南枝吏民飲散天無夜是我衝寒得句時不用登臨歎落暉白虗光裏看葳㽔勞農持酒光摇面紀瑞濡毫凍作歧三白積成千頃麥六花開徹萬年枝土牛且莫消寒盡留暎書牕夜坐時寄明初四載周旋似蟨蛩如何遽作馬牛風年來涉世真嚙蠟老去攜家猶轉蓬月滿醬臺應䇿杖花開洹水定從公投閒儘有娛心處㝡憶相知一笑同房純德有詩贈别求和氷泮黄流暖不清風㠶催去笑浮生病方止酒難為别老不忘詩似好名無惠及人冝遯世有才憐子未登瀛鯨川漸逺洹溪近煙栁斜陽總是情次館陶寄韓伯髙叅政白頭心折軟紅塵歸去山田恰自耘千里幾囘思命駕孤舟三過得陪君酒香梅屋春如海詩入槐莊暮有雲好署新銜判風月只教毛頴䇿竒勲城居苦多客避之野栖來者亦復絡繹閏二月二十七日大風而雨始得獨坐終日乆困諠囂偶遂幽寂有不可名言之樂因成五十六字千嶂松檜一川槐槐底柴門晝不開風雨孤村無客至煙霞逺岫有詩來課童引水澆新樹力疾扶笻踏舊苔莫羨錢塘風物好洹溪春漲緑如醅三月十九日偕明初出郭天光明潤物華新黄鳥間闗隔岸聞嫩緑園林初過雨老青嵒谷半封雲閒人得計惟豐嵗老境論交有此君一壑一丘能事畢山英無事更移文相下酷暑不减江南明初方思鄉以此調之栽竹觀梅即故鄉羮魚飯稻亦尋常濕蒸著物霉生醭炎熱攻人痱作瘡傖地翻疑在吳楚馬君寧復念衡湘苦無一種還思否蚊蚋轟雷觜似鋩題蜀江圖誰收全蜀入丹青寫到夷陵至喜亭巫峽有猿秋寂寂陽臺無雨晝㝠㝠蠶叢開國不平水賈客泛舟如建瓴聖世無分南與北朝宗囘首逺滄溟白公嚴檢校自任城訪予相下首謁先公塋感其髙義作詩謝之扁舟千里淡相尋不愧前人命駕心嵗晚江空豈乘興調髙絃在有知音光増杞菊雙崖月香動松楸十畆隂村酒未醺詩未就碧雲紅日半規沉公嚴寓乾明僧舎夜坐誦洹阡新作次其韻今日禪闗為子開絶勝凢客暫天台佳人有約寧辭逺清興無窮未許囘取醉憑誰釀滄海忘形隨寓即蓬萊葛藤拈起三生句萬水千山得得來雄飛同年自杞縣來訪尊酒論文時雪適降林慮寒翠滴漳濵嵗晚過從感故人天下多才寧少我人間有雪更無塵錦囊滿貯瓊瑶句玉斝濃浮琥珀春湘雨燕雲論嵗月白頭休厭徃來頻夜坐與雄飛明初聮句就次韻天風浩浩鴈聲乾霜月娟娟鶴影寒有壬夢逺雲衢毛質在詩成雪屋篆煙殘翔十年黄閣雙蓬鬢萬古青山一鶡冠熙情話未闌雞促曉囘頭氷雪踏漫漫有壬硯池凝玉凍毫乾笑語生春頓不寒世路多岐雙屐在書囊無底一燈殘故人相㑹須投轄老境何求不挂冠學得屠龍將底用令人千古笑砰漫入春雨雪凡三浹旬乃二月九日甲子開霽喜而賦此春風彌月六花稠誰遣東風一夕收赤地免為千里旱黄雲應見兩岐秋隂晴何與山林事豐歉猶懸口腹憂明日西疇有餘力傍花隨栁徧吾州婢飼鴨逐鶴感而成詩鶴長鳬短乆難齊底事身長反受飢曼倩恃才方自售侏儒求飽欲何為九臯風露聞清唳萬里雲霄有去時臧獲凡庸那問此只知鹽漬卵纍纍有懷江夏别業翠鵠山前鸚鵡洲眼中風物夢中逰手栽松菊成三徑御賜詩書滿一樓勝地方將專相土老懐無奈憶并州此身天幸成閒散陸有輕車水有舟赴召入京諸公餞飲洹水橋柳拂輿梁雨漲波謁阡行稼幾經過又為擾擾馳名者其奈遲遲去魯何病後壺觴驚量减老來兒女轉情多慇懃寄謝漁樵友未許塵埃暗緑簑京師送馮景仲赴江西儒學提舉保釐江右重文衡多少師儒望典刑六載成均時雨化九科豪傑曉天星懷人南浦多新句訪古東湖有小亭我亦從君鴻鵠舉都門楊柳正青青送胡古愚致仕歸金華次其留别韻天上故人羅祖道夢中稚子候衡門君王深憫七旬苦忠義難忘一飯恩白髪朱衣相照映青山華屋兩生存便尋起石為羊處却笑牛車困子孫迎梅次楚寳臣待制見寄韻練帨飄飄翳縞裙雪天羅襪不生塵蓬萊宫裏才領使白玉堂前便有春叙舊正冝金縷曲忘情誰是鐵腸人素娥不訝吾衰老却羡詩成字字新送梅同前肯將氷玉混紅裙凢卉從教逐後塵南浦只今同是客東君何事不留春天涯逺意難為别夢裏餘香尚襲人好在西湖湖上路白頭相見更如新至正集卷二十一
