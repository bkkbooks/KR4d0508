body:
  text: 至正集卷九元許有壬撰古詩七言題鄒福傳福揭曼碩學士僕能小詩鄭家婢亦知讀書男子况得依名儒處身雖卑心不爾作事欲與髙人俱服勞薪水安所事王尼為兵亦何愧縢藏永保無羽化濁穢今真見蟬蛻衣冠巍然食君禄婢膝奴顔恬取辱一生醉夢富貴中趣向正自慙鄒福詩成主人手為抄肯使酤酒如王褒李仲山都事號梅庭主人求詩君不見韋表微裏行不樂拂袖歸松菊主人舍我誰淵明百世其庶幾梅庭主人清而温觀所為主知其人嵗寒萬木黯無色一脈獨得先天春烏臺翠栢翳幕府出山又與栢為主含英散㸃白筆霜擢幹皆為鐵冠柱懷歸夜夜夢故山佳人倚竹遲我還寧知要辦和鼎實蹤迹未免留人間西湖皓月前村雪萬古清香吟不徹相逢誰主復誰賔早脫塵凡見髙節贈解辰翁次卷中韻理世輕士如泥沙長人論人當棄瑕竹頭木屑且適用况犀有角象有牙螺江産才聞自昔我擷其實刋其葩歐陽昔以文瑞宋千載炫爛五色霞澹菴風節後莫比平園才徳史所嘉只今有人淹冷職滿頭白髪纔黄麻時無趙倫誰見怒官似鄭虔無用嗟何當汲引厲頑薄色可變紫聲變鼃從知君子志拔茅其如深文面削𤓰但令詩書世有嗣休羡人間燭上花力疾對呉閑閑大宗師象焚香危坐而成詩宵人本是山澤臞涉世政坐飢寒敺五年黄閤事何補鍾作老病叢孱軀灤京歸來十浹日藥裹不可離須㬰平生結客半寰宇未免操瑟從齊竽可人底事期不來承慶堂深誰可呼邇來亦復詩作祟清減益見風標孤杜門却掃難折簡豈意惠然來畫圖相看一笑但臆對妙契未許巵言􅆽清冰寒玉照林表和氣春風生坐隅齋居頓覺俗氣逺髙致已逼沉痾蘇我方歸思劇迅矢公自有分居方壺過從此去計必少夢中道路多縈紆便當卷奉江湖去願得始終如蟨驉謝庫庫子山學士惠藤花有賢大隠㕓市居開國相君遺此廬相君勲業照寰宇太祝有㕔才一區傳家不用金滿籝樹藝之外皆詩書春花未了秋又實坐看人世均榮枯東風一夕動芳簌老藤滿架青縈紆今朝紫萼忽爛熳頃筐采擷輸庖厨憐予肺腑厭塵土分甘來與華箋俱予非虎頭食肉相臠塊適足朘其膚眼明清供傾錯落老饕便可辭膏腴薄持一飽捫腹笑報之但愧無瓊琚西巖野逸歌為彰徳路總管杜𢎞道作西巖歌歌西巖浮空千仞青嶄嶄烟蘿為縢霞為椷設險不作殽與函黄精春荑蕃莫芟蕨香泉冽飫老饞世鼎那復知酸醎下視野馬紛塵凡埜人心逸陶至諴誰遣輕著從事衫方今登三五可咸忠藎連茹逺佞讒楩楠既收足檀欃縱有黄獨何由鑱鳳池烏臺冰照銜濟世欲藉為風帆憶昔與子同諵諵攻堅政府非鼓儳吾歸吾郡子復監勞不暇逸神所鑒山英它日敢子詀乃知子志因民碞西巖歌歌西巖西巖之石美若瑊我辭不佞君其劖題雲莊為韓伯順作山髙月小圖黄州江山如有待直待坡仙發光采嵗行回首幾壬戌二賦人間故長在當時泛舟挽椽筆奔走蛟螭泣神恠洪音蓬蓬號萬竅大塊茫茫歸一噫山髙水深人何歸獨有老月光不改孤峯嶄巖幾千仞下有清流鳴石瀨蒼龍呀口一珠寒軋輪上覺天衢隘此時清致似當時比竹誰能發天籟之人盡掃豪貴氣一片清紈收勝槩按圖三呌臂欲飛夢香舊圃元修菜題商徳符為韓伯順畫山水圖我朝善畫髙尚書一變即至商曹南九方相馬迹固異妙處均與造化叅韓家此圖更奇崛展看擈面浮清嵐山疑近薄忽窈窈水若清淺中潭潭望之如仙山中人便欲卜隣茅一菴紛紛道路何為者烟霞胡不窮幽探人間多事行可遣村社薄酒吾能酣滿天清興屬何處煮芹燒筍春方甘瘍醫許同僉求詩君昔市隠為逸民曾視軒冕如浮雲一朝金紫不容却東華塵土同朝曛斯民瘡痍未能瘳我不可愈宜求君宋清有道望報逺白岑秘方何足云題郭熙小景河陽老筆無丹青三生曾是山之英神機蓄久忽抒泄意所到處皆天成初猶跬步營丘行久乃奔軼天衢亨喬松大山聳物表髙堂素壁長風生有時歛束作小景咫尺已覺凌蓬瀛人間流落惜無幾好事只訝千金輕中郎未許虎賁擬具眼能與秋毫爭但嗟縑素日弊墜世無其畫空留名孔學文奉先世殽夫先生元符三年甄敘告身求題西江之水接洙泗三鳳嗷嗷鳴一世臨川有鳶苦相嚇不知鼠腐鳳所棄孟也攻詆不餘力文章荀楊乃其輩中天振古有日月黨籍豈容無仲季漢唐而下觀趙宋最號文明致隆治君臣舉措一至此有識未免為長喟桑田變海綸誥存巋然不與靈光異聿修世篤此縱無聖澤自可窮天地題獨照長老文殊問維摩病圖謂予不病形如削謂予果病神自若是在病與不病間我不自知人豈覺有來見問意固厚轉語才形已糟粕菩薩隨者億萬計丈室之中容綽綽將謂相逢說妙法掀簸乾坤飜海嶽不知此事到此際難舉衡嵩等毫末娟娟其妹來散花逢場豈亦資諧謔可憐弟子神氣微盡力去華華不落天人本非革􅇸穢色香一􅕿俱𡨕漠只愁丈室忽塞破億萬菩薩何處著小樓對閑閑宗師象因次舊韻寄之鼎食不解肥我臞多病亦為山林敺巾車孤舟往所適何往不可容微軀莫言五十未為老縱有七十來須臾今年兩耳得差勝飽聽萬籟吹笙竽閒人多事迫詩債埜老敗興時招呼小樓今日好風色目斷天末𡨕鴻孤一時幽興豈容負况對蓬島神仙圖篆烟凝坐共心賞盡醉更把空尊􅆽懷人未免有芥蔕處世已覺無廉隅分江小鼎煮粟粒誅茅别墅營屠蘇逺山但藉一枝杖中流誰辦千金壺菊籬秋香晚未減松窻月色寒相紆我行不武分歛迹安得甘草資蛩驉題米元暉山水米家世以書名世馳譽丹青乃餘事小米觸處是天機掃絶衆史庸俗氣家傳龍跳虎卧法分與冰紈作遊戯亂雲重重䕶幽峭半樹紛紛立寒翠連綿欲盡不盡間幾㸃蒼然入無際每因淺近寓深逺時出清雄變妍麗人間流落特毫芒好事偶得宜珍秘虹光貫日爛不收依稀尚有元暉字徐復初種雲堂翠鵠山中許道士偈來神山遊戱爾神山雖不是蓬瀛有竹萬竿斯可矣種雲堂深六月寒幽鳥啼碎青琅玕人間風日不到處階蘚印翠何年乾門前擺掗幾千畆秋豪吹香入新酒主人逺在黄金臺鶴怨猿驚亦知否我非山主苦愛山山不我厭那忍還欲言佳趣竟難冩試看日夕空濛間虎食隣豕疲氓一豕闗嵗計翁媪旦夕勞豢視敢思口腹資禦冬擬待今秋了租稅於莬乗夜夔其壁攫去怒嚼無餘骴豪家有羊過千百爾不掠剰寧有畏乗虚凌弱犬亦恥天賦爾質徒猛摰太山昔聞無苛政荒村今復増酷吏草萊蹂踐迹未冺是我昨日攀縁地卞莊周處世豈無畢竟爪牙何足恃靜師觱篥歌霜清萬籟于喁收老月軋露寒波流山僧具眼識野逸醉挾楚竹來鳴秋一聲透空石盡裂剛風不掃雲夷猶驚猿無地避清響木客為爾生新愁激揚初似士引角嬌滑忽如鶯囀喉驪珠熒熒細縷貫冰蠶繹繹獨繭抽傳燈應自龜年來翫世定是靈師儔昌黎不用誚髙唱形骸放浪為真遊松陰盤石月正午諸僧舉白紛獻酬歸眠禪榻有餘韻水聲㶁㶁風飇飇題彰徳監郡竒凌和叔登瀛圖瀛洲杳在弱水東世有舟楫無由通自非真仙具兩翼倐忽引去如輕鴻人間塵土幾萬丈誰知乃有登瀛翁集賢堂館去天近松雲華霧春𡨕濛景清池勝黙感觸神遊恍惚空明中雲莊游戯實其幻落筆便有神仙風望洋俯瞰萬頃碧振衣直躡千仞峯因知此境本非逺此心到處皆瀛蓬眼前有道自不見𤓰棗可聞那可逢秦皇漢武骨盡朽文成徐福欺愚蒙赤霄衝舉世誰見仙與人道將無同翁今分節守千里未許遐想求虚空政成但宜早解組西山儘可留吟笻人生至此即仙爾㡳用辟榖成疲癃翁聞儂語應絶倒他日此圖當着儂閔松蹛林喬松閱千古八百里滿知幾樹越從毫末至叅天不識人間有斤斧一朝混沌再開闢相宅龍岡來啓土梯山航海水赴壑官署民居須棟宇工師求木破天荒始聽丁丁就規矩樹藩板地徧郛郭萬億中才二三取生齒日夥資樵蘇沙磧岐岡竭榛莽遂移殃福及此林大鋸相加卧撑拄段分三尺已專車枝節紛披溢膏乳槎牙根柢抉至泉百年運載無時住山童地赭鳥獸悲陵遷谷變風雷怒偶憑髙閣一縱目萬竈炊烟欝𤣥霧漸染人人服盡緇薰燎家家壁無素燧人濟世固有力里巷亦療飢寒苦但悲明堂梁棟器及物之功正如許貞姿勁氣養不易瞬見成灰了烹煮馬基彘槽尤可念曰與蓬嵩同朽腐大材小用違所長多少傾欹無一柱昆吾精鋼忍作針天孫雲錦難為屨聖人委吏雖不鄙賢者伶官豈其伍嗟嘆不足形永歌聊為用才陳諷諭題趙幹江樓風雨圖人間蕞爾東南陬金陵李家無逺謀詞華欲繼後庭曲不見東風空小樓當時百事尚纎麗况在畫工專末技洪河喬嶽昧平生曲䦨幽檻窮清致石頭城下無重闗甲馬營中有佳氣九天飛墜曹將軍盡卷版圖充上計小兒造化吁可憐乾坤又到宣和年君王摇毫自塗抹片紙落世人爭傳坐看南北又分裂遂使兩家同一天偶從斷縑閱小景慨念興亡豈天定而今蕩蕩混一圖但少儂歸理漁艇赤壁孽瞞禍水劇趙女漢火餘光能幾許蜀方傳薪嘘未然呉偶束緼成一炬萬艘枯葦沃以膏空江如靻長風皷九淵鼎沸羮魚龍連營炭熾膰貔虎雄圖南紀成畫餅匹馬華容作窮鼠坡翁乗興賦赤壁爛漫天機湧毫楮偶從雪裏冩芭蕉又似驪黄不毛舉考圖求故此其地疾惡千年若躬睹江山蕭條嵗華晚興廢人間幾今古買魚沽酒弔阿瞞醉和漁歌短蓑舞遊君山岳州經厯善原道學正潘彦賓黄文復劉光逺同行蓬萊瀛海飛渡難世人可聞不可攀水環千里萃萬景天下奇絶惟君山湘君南去九疑逺淚洒修竹留餘斑祖龍肆毒赭不盡終天有恨埋烟寰長松豫章欝老翠攢列巖壑為襌闗梵宫蟠踞肇典午烟霞金碧爭孱顔三湘晝夜助勺水兩湖今古浮連環霜空木落快一覽坤倪軒豁呈天慳只疑六合總是水水外不復知塵寰滄波白鳥入滅没斜陽孤鶴才飛還洞庭龍祠縹緲見蜃樓千尺摇青殷長風有時駕巨浪掀簸百怪愁神姦操舟之人膽欲落回頭却羨山人間嗟予夙願今始愜捫蘿拾級寧辭艱要窮勝事更繼晷列炬宿鳥從驚禪房深處借一榻清夢已滌三生煩相從四子盡儒雅詞源萬斛傾潺湲飛吟亭中酒未醒岳陽樓上詩方刪片帆談笑又到此淋漓宫錦倒白綸五城携手飛佩去九霄清響流人間湖南監憲布延實哩子謙昔為翰林學士奉使祠天妃伯生有序送行徵詩其後古來漕法無十令我元𢎞撫恢自天至元天子一四海京師仰給東南田亂淮泝河畧汶泗逺瀛莫趨幽燕盪泥踰埭幾跋涉留連嵗月喧勞牽雲帆遼海聞自昔東呉秔稻曾輸邊九重聽言獲大利萬艘遂發呉門船晨興甫動望洋嘆暮炊已接蓬萊烟夜波陰火亂明滅神姦恠狀呈蜿蜒檣摧纜斷一瞬間骸骨立腐饞蛟涎天妃于時憫昏墊祥飇䬃䬃來雲軿漕官舟師續乃命遂使京國豐年年禦災捍患著昔典詔使涓潔嚴犧牷翰林學士北庭彦風骨自是人中仙候神將事盡誠慤坐致流澤如原泉都人萬億飽紅腐豈知顆粒皆危顛十年我亦索米者無功素餐尤赧然湘南邂逅識眉宇繡衣大斧光相纒紀功他日有佳傳我歌敢重青瑶鐫題周元玉北山堂北山主人薄軒冕五十歸來已云晚眼空塵世但覺隘却愛鷦鷯一枝穏有松萬壑竹千畆有菊三徑蘭九畹四時種植常不遑組綬難縈去往返生兒京國蚤蜚英玉磬清温明紀甗姓名籍甚在搢紳奮翼駸駸上林苑白雲一夕忽入夢歸心如水從瓴建功名身外等土苴􅎵瀡堂前盡愉婉惠然過我琅瓈山水陸跋涉不憚逺論文尊酒花柳間已謝遊春曲江幰我言子歸真得計鄙俗何知笑連蹇且求至樂在天倫但恐富貴來衮衮登祝融峯萬山南紀嶽乃衡祝融在嶽尤崢嶸諸峯羅列七十二凜如子弟從父兄欲窮髙險破曉去肩輿困處甘徒行不知石磴厯多少但見脚㡳雲烟生千巖競秀路忽轉逺翠已復來相迎人間韋社天尺五兹山去天尺不盈洞庭一勺見隠隠齊州九㸃紛營營我行正值好風景節序今日維清明幽禽逺近鳴欲碎野花濃淡開無名梵宫燹後僧未散鄴侯仙去山為輕危梁飛躡者誰子等閒命與顛崕爭入春淫雨日五浹天幸有此三日晴平生夢想偶一遂敢效韓子誇精誠刻名蘚溜盡漫泐朱鳳不聽嗷嗷聲太山未敢小天下嵗晚好繼朱張盟昭靈江樓分韻得法字湘江腝烟動浮鴨柔櫓半天來軋軋昭靈灘上夕陽中猶見祝融青一髮江樓酒賤花滿山萬斛好春天不恝散人今日百事無詩籌尚畏申商法徐叔清萬松嶺山人住山手自鋤當時種松逾萬株山人仙去松故在黑雲十丈寒縈紆十年種木昔有訓山人乃作千年圖子孫孫子謹封植休羨人間五大夫題徐叔清野堂野堂主人堂高原萬松嶺下五畝園幾年輕葺此數仞肯構有子仍有孫堂東書齋翳脩竹堂北水門羅清尊城中塵土没馬首聽我策杖時敲門至正集卷九
