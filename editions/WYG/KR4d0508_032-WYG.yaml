body:
  text: 至正集卷三十二元許有壬撰序如舟亭燕飲詩後序京師據山川形勝四方舟車之所會風物繁富古今莫加焉北腊西釀東腥南鮮凡絶域異味求無不獲九州風土所有土人未及一見而已飛聚於陸海矣士大夫良時擇勝治具合朋舊叙契闊勞勤苦滌滯慮信可樂也而牽於事役鮮克稱遂四時節令有不知而過者湖廣省掾汝南周子嘉出詩一軸十四首盖其在京師至順庚午嵗中秋重九會諸公如舟亭所賦也分韻者九人學士宋誠夫嘗與余同在左司少監歐陽原功實同年修撰謝敬徳同嵗得觧亦皆同時官京師追念昔時未嘗得此樂也或撥冗鼓勇強謀一歡摶沙捕風左􅇢右掎百端敗人意則此會之見於歌詠而子嘉什襲以為美談宜也就九人中原功又不與詩乃追而補之者也辛未予入京見三君不得盡一語而歸况燕會乎予則歸矣不知誠夫輩還數數得此樂否子嘉求書其後予雖當時不與斯會而附名卷末亦可以如原功矣王濯纓集序中原自宋播浙文教幾熄金源氏分裂之餘設科取士士氣奄奄僅屬而吾郷登第者餘五十人聖朝戊戌之試復其家者子孫於今頼之至元間一時名徳遂傑視他郡學者觀感日益以盛是盖山川清淑之所鍾濟以前軰承啓之有素非世變之所能易也若濯纓王先生頴悟力學聲華充溢拜南臺御史僉江東道按察司事投紱而歸讀書講道發為文章盖資之有源者也先生歿子植仲武索遺藁得古律詩並長短句若干首走書屬序將壽諸梓有壬毎恨弗獲親炙郷先生兩至先塋皆衰絰從事不敢有請仲武能不泯其親之善而揚於世可謂孝矣詩之雄渾而清健長短句之婉麗而飄逸皆可傳者也眉山長公謂君子用心固無所私愛而於父母之邦豈如行道之人漠然而已哉有壬喜吾郷文教之有素而又喜是集之出吾郷之後進益有所取法矣然非一鄉所得而私也有壬辱後進竊願附名集中是區區之私也先生諱可與字晉卿濯纓其自號云送馮照磨序仁宗皇帝之圖治也謂仕入多岐不基於學病治為甚排衆議出宸斷繼世皇之志始以貢舉取士盖中原自金源氏滅貢舉廢且百年故延祐癸丑詔下天下聳動思見徳化之盛復限吏秩廣儒用黙寓消長之機焉聖人之心其至矣乎亦惟秋谷李公懇懇於播越在淵時一旦爰立大議遂定上而大臣且笑且怒下而素以士名恥不出此亦復騰鼓謗議賛其成者才數人爾士出門持數幅紙始終綴文才十一首即得美官㧞出民上矣彼輦金舟粟費以萬計得一命尋復奪之而吾一毫無費也胥吏輩自執役幾轉而得禄少不下廿年始出官而吾自鄉試至竣事才十月爾則吾之報稱宜何如哉乙夘迄今六科内而才學名者可數也外而政治聞者可數也昔有人取凡敗於貨瘝厥官者列於朝繼自今有贓雖輕亦坐不叙其冒藉増年大非徳行經術取人之初意事君欺君罪莫大焉督風紀嚴察之且言四書賦題世已括盡宜兼五經為疑問又言首科士無宿備而號得人今為師者教人以獵等為弟子但事套括僥倖一中其學如此其施可知請大更張之主者雖隨事折之而當時大臣復有不悦貢舉限秩而用事者欲因而揺之周旋扶䕶而潜弭之一二人是頼盖設科来列聖首詔必有因而揺之者庚申之春則剥復之機係焉癸亥冬惴惴幾墜列聖仁明不惑邪説以有今日士之揚揚一第者亦知其難若是而思所以報之乎吁天下之大由是出官者幾人多岐而睨之者如堵也予亦玷科第官且十一轉非曰能之知行之之難能懼而已㤗定丁夘来鄂甲子進士馮君敬修為漢陽丞在府附治且密邇二大府不競不柔上與其能而下多其恵再為湖廣省照磨照磨秩視在朝非有聲掲於上不得也抱利器施會計間省有事假一割恢恢乎㳺刃有餘地也探其為學則宏而有源叩其為政則習而不拘其善學而有得者今又代去秩益升而才益有所施矣江西士淵藪也予恐其但知貢舉之易而不知貢舉之難敬修歸而試語之使教者知淑人之大學者無欲速之弊而仕者不入於可議則仁皇之心列聖之詔孔子之教舉不負矣吾元貢舉將無愧於前宋盛時之得韓范富歐也予與敬修同出是途故敢及之敬修毋獨為君子而已也朱本初北行藁序韓愈氏稱嵩高張道士通古今學有文武長才以平生攘闢之勇許與之慎而所稱若此送廖道士則又疑魁竒忠信才徳之民迷溺於老佛之學不出求其人如不及則知世之懐才抱徳寄迹老子法中者君子惜焉余早聞提㸃玉隆萬夀宫本初朱君之賢觀所作輿地圖知其問學之博考覈之精今年過我出詩文一編題曰北行藁者盖其乙亥嵗出山乘傳至上京徃来之所作也䟦渉數千里間山川風俗民生休戚時政得失雨潮風雹昆蟲鱗介之變草木之異可喜可愕可歌可笑大略皆盡盖其蝉脱聲利笑傲方外所持也専故所造也至若高句麗之諷諭無愧樂天景州賊捕蝗行諸篇皆拳拳不能忘情於斯世也後其家有示兒子楨詩夢寐其兄有相依諧脊令語則父子兄弟之倫明矣張煉師序謂老氏五千言皆治國治身之要飛騰不死之説無一語及之䟦陳秋嵓詩謂由儒入仙道故能窮理盡性知所先後若是則本初之於老氏其善學者乎心之所存身之所履則未始離乎儒也若夫絶去禮學兼棄仁義果何道哉世不乏才惟師其師學其學而不能一焉則泥矣自吾藩籬之外沃壤通逵目如鹵莽徃而不返卒淪於異其可歎也夫昔秋谷李公當國一見本初即勸其反初服本初以早奉父母父歿而不忍改也使本初用世必􅏎􅏎可觀不獨詩若文而已秋谷之長於觀人當益信於世也平生著述尤富此一歳之作爾書其首而歸之送蔡子華序都省握天下之機十省分天下之治然十省之屬自筦庫而上皆命於朝非若古藩鎮僚佐得自辟也得自辟獨掾爾而復確有定式六部宣司史外已官復掾者又居其半雖大臣保釐才徳兼人不如式不能録之也且已官者幸蝉脱矣復聴從事簡書者盖重其役而亦使人益自重也人益自重則事可不率而興矣盈考􅄖升俾為㨗徑人亦忘其重勞焉湖廣省號重鎮朝廷必慎擇省臣省臣必慎擇掾屬南徐蔡君子華由校官為汴省掾天歴初當兵衝時與敏給至順壬申予過南徐始識之今户部侍郎萬國卿實汴省郎中具為予言繼擢湖廣儒學副提舉改徽州路知事將行省臣才之又屈為掾曹務劇者率畀之震怖而不為之動紛紏而不為之亂聞於國卿者見之矣古下士而下雖胥吏嗇夫雖秩有崇卑莫不學古入官素其位而盡其事無殊軌也漢稱縁飾若離而尚未逺今則判然矣挾兎園册四體不自舉固不知修齊治平為分内事而筐篋剔刔自謂足以了天下務其佔畢伊吾至目能有識手能有執亦何從而得哉獲其榱桷而遂詬大厦濡其涓滴而遽訾滄海尚可望其能國哉子華儒也兩屈於掾皆以能稱事益練智益明吾知其有以服彼而自此升矣鄂士大夫惜其及格而去也咸賦詩以贈之屬予為之序予知其賢故不辭鄧彧之詩文序廬陵鄧彧之詩文予同年馬伯庸有序其里人孫義方又以委予逃暑山中挾之行始得盡讀彧之有異禀承家學濟以勤力㓜已有能詩名長復淬歛其文造益深而出益工矣方貢舉行躁者率撏撦苴罅罝罟獵科茫不知有他路世一以罪科善學者不爾也彧之廹養為科業不為苴獵其文可徴其言前世决科無聞詩人一語千載不廢盖有激焉科既格一乃心力增其已高濬其已深以極其所至將不啻詩人一語千載不廢苴獵偶得孰與吾得之多激有不平矣乎吾願彧之之益進於道也進於道舍栁子之所本皆末矣彧之進未見止故敢舉以為助他日尚能為君序之江漢集序江漢集者鄂省理幕湘瀏劉君光逺之所作也初光逺以碩學俊才得觧湖廣俄奏除漢陽郡博士一時有不及光逺逺甚得乃過之得而棄其業如遽廬而光逺職師一郡既以教人又以自益其文遂昌於江漢又能脱去科業氣習炳炳琅琅卒澤於理而能粹且潔也彼之得乃其失也而吾之得不既多矣乎而又求益不已不以望於人者望予予可孤其望哉夫文以明道而假乎辭也文而不至道將焉傳故有待於成焉本於經以立其體參乎傳而暢其支而必力於多以熟其途而後可以語成也孔明出師令伯陳情照耀宇宙動盪古今固不在多予欲光遠之多者多則熟熟則自得而後有以約於寡也多而不能約於寡者有之矣未有不多而能約於寡者也東坡言詩非甚習不工要須日作一首文猶是也坡之名世其亦以是也哉予他日將騐光逺於江漢集之外矣送劉光遠赴江西省掾序泰定戊辰始識劉君光逺於鄂時教授漢陽積習率牟既廪乃毫粒不私職日以舉湖廣行省器而掾之盈考貧不能赴調封所由寄予予待罪政府負天下寒俊其有基可植者則未嘗不力仕籍變化朝著為速主者尤靳非力取不可得光逺得湖廣行省理問知事中書復聽奏可治外而實視朝著也理總一省推鞠部内事不能决者舉資折𠂻其辨於幕人皆直之將代江西行省又辟為掾夫官坐而治吏立而趨官九品亦有立而趨其前者吏雖大府崇秩其勢不得不卑士不得已假途焉坐而治矣復立而趨何哉如制七品則推封其親光逺父母皆八十屈為掾則一躍可至他官非十年不可其志亦可憫也哉予不能指其行獨有以朂其行也學不間於仕不仕學優而仕仕亦學也上而致君下而理財治獄簿書期會之際質吾之學其不戾也然後行之則吾之學可騐而實矣光逺昔試藝幾千人中出金於沙可謂難矣况兩得乎其仕也所至以能稱推餘力益攻為文章其進盖未已也江西號多士可資以益學而其流俗以健訟聞仕其地者益不可忽予願光逺入於署則舉其事而資吾學入於家則繹吾學而待其事力有定而業不奪昌黎廢棄時日之好無功昏㝠之逃舉不能抵吾􅇖矣且言不辱於難而辱於易行不毁於鈍而毁於鋭是又原於學而委於是者也學之不已且至聖賢所以顯揚其親者大矣不但七品推封而已也光逺師視予予不敢好而亦不敢孤其請序以贈之周洲詩序詩難乎鄙人女子率爾成章詩易乎千百年文人才子雕心劌胃白首不能已率爾成者後世無以尚雕心劌胃而論者千創百孔漢魏而下可考也詩有時乎唐虞賡歌後有三百篇三百篇後有騷騷之後有漢魏有盛唐詩有地乎譜江西者雖曰人不皆江西詩皆江西四洪徐謝詩果皆江西乎謂形異味同味果皆同乎由是言之謂之難不可謂之易亦不可論以時不可論以地亦不可顧人心所得何如耳宋南渡放翁後詩可數及其季世溺於所習工者尤少而人心之詩未嘗冺也茶陵周栙洲先生當陵谷變遷之餘胸中之藴一發為詩惜其逸而不存也存才三十餘首莫不峻潔勁秀抑揚頓挫風神爍爍不可掩盖脱略難易不局時地而得於心者也其孫泉請予序一閲而為擊節三復而悲之世無采詩官逸者不少微泉不幾於俱逸乎杜荀鶴謂妙在一聫况三十餘首皆可傳者乎栙洲可無憾矣論語衍義序古經子傳註之未盛也人所以傳名家其從授諷誦者淪浹肌骨終身不忘沉潜反覆必有得而後已及剖析爛漫文益繁而道愈離學者恃有成書不求之心而悉委之目是故傳註盛而後學者始怠呻佔畢而習者且不可得而况有得於心者乎而况樷苗秀混涇渭知所擇從而至於道者乎河南二程夫子出而後聖經復明子朱子泝程源而上之挈百家紛紜之説擷其長而萃於正四書集註精宻嚴簡信乎為萬世不刋之書也其有機張而不示於度者盖欲學者自得引而不發躍如也昔之註傳可同年語哉學者誠能虚心切已不以㝷常易之則終身有不容自己者焉余觀柴君希堯著論語衍義十三萬言本之程朱申以證據斷質明盡可謂勤矣由傳註而有得且有以自見於世雖若架屋疊牀其視目傳註而怠者大有逕庭矣然而傳之逺者漓其淳言之繁者支其體希堯之先其學出於饒雙峰雙峰出黃勉齋而勉齋則親授於朱子所貴乎後之學者因其流而泝其源則不漓不支矣至正集卷三十二
