body:
  text: 至正集别集類四元提要臣等謹案至正集八十一卷元許有壬撰有壬字可用湯隂人延祐二年進士厯官集賢大學士中書左丞兼太子左諭徳致仕卒謚文忠事迹俱元史本傳有壬立朝五十年三入政府于國家大事侃侃不阿多有可紀文章亦雄渾閎肆饜切事理不為空言稱元代舘閣鉅手所著至正集本一百卷據其弟有孚圭塘小稿序云門生集錄繕冩方畢先生捐館猶子太常博士楨忽遭起遣倉皇之際輕身南行書籍棄擲稿亦俱亡是其集自有壬既沒即以淪佚無傳明宏治間其五世孫顒刋行圭塘小稿時亦未之見故葉盛水東日記載顒嘗言先公至正集一百卷遺失乆矣聞楊少師嘗收有副本就叔簡少卿求之少卿云書籍在太和有無未可知也此本不知何時復出而尚闕其十九卷據黄虞稷千頃堂書目所載卷數正同葢相傳祇有此本其即楊士竒家所藏歟中如箋表傳状書簡諸體並闕又有録而失其辭者詩十一篇樂府八篇有孚序有稱其論天下事嘉言讜論見至正集而此本疏稿實無一篇則其散佚者亦復不少然觀元史本傳載有壬於㤗定初言特們徳爾原作帖木迭兒今改正之子索南原作銷南今改正與聞大逆乞正典刑平章政事趙世延受禍尤惨為辨寃復職及上正始十事諸大端皆見是集公移類中亦足窺見崖畧而其論特克什原作帖實今改正之妹勿令汙染宫壼更人所難言本傳顧未之及是尤可以補史闕矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五至正集目録别集類四元卷一古賦卷二古詩卷三古詩卷四古詩卷五古詩卷六古詩卷七古詩卷八古詩卷九古詩卷十古詩卷十一古詩卷十二律詩卷十三律詩卷十四律詩卷十五律詩卷十六律詩卷十七律詩卷十八律詩卷十九律詩卷二十闕卷二十一律詩卷二十二律詩卷二十三絶句卷二十四絶句卷二十五絶句卷二十六絶句卷二十七絶句卷二十八絶句卷二十九絶句聨句卷三十序卷三十一序卷三十二序卷三十三序卷三十四序卷三十五序卷三十六記卷三十七記卷三十八記卷三十九記卷四十記卷四十一記卷四十二記卷四十三記卷四十四碑志卷四十五碑志卷四十六碑志卷四十七碑志卷四十八碑志卷四十九碑志卷五十碑志卷五十一碑志卷五十二碑志卷五十三碑志卷五十四碑志卷五十五碑志卷五十六碑志卷五十七碑志卷五十八碑志卷五十九碑志卷六十碑志卷六十一碑志卷六十二碑志卷六十三碑志卷六十四碑志卷六十五説卷六十六誄傳解銘箴卷六十七贊卷六十八頌辭卷六十九文卷七十詔制表箋疏啟卷七十一題跋卷七十二題跋卷七十三題跋卷七十四公移卷七十五公移卷七十六公移卷七十七公移卷七十八樂府卷七十九樂府卷八十樂府卷八十一樂府
