body:
  text: 至正集卷三十八元許有壬撰記扎拉爾公祠堂記延祐丁已制贈輔國上將軍浙東道宣慰使都元帥扎拉爾公奉國上將軍江浙等處行中書省叅知政事護軍東平郡公諡桓肅子安僧立祠東阿黃山走書諗有壬曰先公塟有兆祭有家别業有祠又用郷人意而永吾孝思焉子熟我家記其勿辭按桓肅公諱呼嚕固圖伯祖穆呼哩開國有大功略地中原首降東平封太師國王祖達蘇封東阿郡王考圖們岱嗣封公夙著才識世祖命攻蜀嘉定諸城降之賜金符再統蒙古軍五枝萬人至元五年召歸擢監本屬兄扎爾呼征南萬户戰殁丞相巴延奏公襲其職征未下州郡鎮維揚十五年以昭勇大將軍兼揚州路總管府達嚕噶齊官制分遂復舊職進昭毅大將軍又進昭武浙東楊震龍冦擾公討之賊聞風降監真定河南上萬户兄子舒温真長慨然歸之行臺薦其行除福建閩海道肅政亷訪使不為苛刻按部肅然八番部雜民夷時時弄兵元貞初選公為宣慰使都元帥鎮國上將軍建議立葛蠻宣撫司招徠之錫布喇台乞即落東等畨恃險怙終躬平之部落歸者三千户設教條明戒賞俄龍平連思婁浴暮梅求那諸夷皆願受約束明年蠻酋羅陳羅何羅亷部其民五十户降公領其酋入覲成宗大喜賜金織衣且官其酋大徳二年移廣西兩江道猺獠柔梗不常靖以一之戮稔惡者易奚晚高仙道遂深入左右江溪洞經畫明年地州守羅光殿今羅伯牛天州守羅仲顯各率所部降者三萬四千户司憲薦最七年以輔國上將軍移浙東道為政益務寛簡有古長人之風焉八年丁太夫人憂歸東阿十年正月六日以疾終年六十塟柯亭之原子四人長佛寶東平郡太夫人邢氏出寧國路總管卒次阿勒坦布哈早世次安僧寧國母弟厯八畨淮東福建三道宣慰使秩通奉大夫次博囉東平郡太夫人黃氏出今兵部尚書秩嘉議大夫惟扎拉爾氏功烈在世蓋與國相乆長而王封魯疆習禮義之化子孫華學世濟其美百年涵濡於是郷其土而家其俗矣其流風厚徳人不能忘且將祭之於社况其子孫乎君子將營宫室宗廟為先禮壊教弛王珪之賢且為執法所紏宋文之盛文潞公始倡衆為之則知世之䧟於簡其先者多矣士大夫家力不及者有之殖第産不及其先者何哉世有篤於親者君子與之廟制之不存文末之從違有不校也通奉公本之於孝而無違揆之於禮而不悖掲先烈之休垂後昆之訓俾逺者不忘而来者可繼是維世澤深長子孫之賢軰出亦詩書講貫之力有以𨗳其至也既記之且為之詩俾嵗時歌以祭焉其辭曰東平王弟王東阿歴世斗印纍紫緺有孫繼出揮金戈祖訓豈曰予戰多結髮攻蜀何畨畨勁氣已欲推岷峨廣陵新國撫札瘥我但以徳相漸磨兵不敢肆民為歌世操憲綱事網羅行其無事誰犯科獠夷彼自深其窠昔年將者猶用囮一誠格之術靡他鬼域係頸来逶迤三為潘鎮鬢已皤眼中富貴浮雲過哭母涕泪方滂沱一身遽逐東逝波諸郎金犀鳴珮珂玉樹晃朗交枝柯嵗時蒸嘗藹至和奕世熾昌理不磨要見帶礪如山河胡氏塋門記㤗定戊辰春封翰林直學士亞中大夫輕車都尉安定郡侯安陽胡公卒子彛卜地郡西北孝明原併遷祖考妣為新塋三年安定郡夫人王氏祔彛廬墓三年護封樹躬灌溉矻矻營治靣􅏿手胼足罹兄䘮始一跡城願惟兆域演迤宏廓匪大厥閎曷稱山形迺求木咨土作門塋中兩柱屹立負重若山穴石容祗刳地深入侑搘四石皆壕餘二尋百夫挽絙梓人運機疲力竭智始克麗柱黝堊弗施華采溢出輪奐翬跂中實堅朴渉二年而發焉東西之廣五尋南北之深三分廣之二而高視其廣又加尋焉有壬先塋洹水陽去僅千步嘗掲原四瞩于胥斯原西挹太行倉翠揷天突兀綿延絺雲繪烟右挾連岡復屏其前而洹水鈎帶乃於其北新雨塵空山川亢爽巖姿林樾晻曖竒變亦妥靈之勝地也繚以周垣扄鐍無施限防虧䟽樵牧是虞則有覺之楹不容不度也昔翰林公懿行培積固宜高其門若于公之必於天者彛由工部侍郎擢陕西諸道行御史臺治書侍御史今起為江西湖東道肅政亷訪使未逾月改戸部尚書天與善脗合矣而一門之作不於其家於其塋豐其親儉其身也詩有迺立臯門臯門有抗乃立應門應門將將言高而嚴正盖諸侯之門也卿大夫宫室制度藐無可考况門乎况坵墓乎然聖人取綿列雅豈不以得為而為可法後世乎人子報親心罔不至故不得無財皆不可為悦在制不僣力復可為而不為謂孝可乎尚書孝門有無不與焉而其心以為不若是不足以致其尊崇嚴事之誠也視富貴自恣委坵園於茀草榛藂而華屋麗服豐其身儉其親者不有間乎有壬於尚書世契也識其成匪頌斯箴嗟後之人伊尚書是程弗希而増惟恪而承節彼西山若塋斯固嗟嗟後人爾尚知前人之艱夀慶堂記廬陵孫義方僑鄂搆堂扁夀慶奉母請書若記予聞義方孝故樂道之夫人子愛親之心萃古今之辨未足以喻其至故凢極天下之物者不過甘㫖輕煖口體之養爾盖有極天下之美人之所甚欲者焉極天下之美人之所甚欲者而吾得之則人子之心亦可以少慰矣箕疇五福夀居其首人無知愚所共欲者也一觴相接必用是祝况子之於親乎然天下之人欲其親者雖同而人之得於天者則異有賢子孫富貴而夀考者固盡美矣有賢子孫富貴而無夀以享者可勝道哉况有富貴得不以道使白首煓煓有官婢之恐則夀雖期頥何益焉義方之先有碩儒高祖履齋先生尤為周益公禮遇義方業詩書不墜其世母歐陽年八十有六聰明康徤得於天者可謂豐矣雖榮不九等之列養不三釡之禄而其為榮為養有世之高九等過三釡所不及者其為慶也舉天下之美蔑以加矣然則夀之為慶顧子孫賢不肖何如貴賤貧富不與也聖朝敦老老之政求忠臣孝子之門孫氏世有潜徳餘慶所鍾將有不能迯者矣斯堂之扁不獨為今日之夀而已也孫氏子孫其念之馮氏書堂記君子為善窮則獨達則兼獨若隘不得已也兼則同於人聖人之心也地有不同亦安所遇爾士有不至於窮而亦未至於達者其在二者之間乎使善足及人而心足自愜抑亦逾於獨善也孟子曰分人以財謂之恵教人以善謂之忠夫分人以財有時而匱則亦小惠爾教人以善利益無窮豈解衣推食所能彷彿萬一哉許下馮夢周士可買書千卷搆堂蓄之以待里之不能有書者為之約曰凢假者恣所取記其名若書目讀覺則歸而銷其籍損者不責償不歸者遂與之以激其後缺者隨補之士可之言曰夢周㓜失怙育於兄早從鈆槧就令自力於學而近貧禄仕沐膠不可解也兹欲懲吾肓而欲人人之察秋毫也懲吾聵而欲人人之聞蟻閗也不有教之恐里之不悉而約之或渝也嗟夫事有用力小而及人大者人每委於不知而知者安於不為士可此舉可謂忠矣其及人之善庸有既乎昔王充閲市遂通衆流李邕假直秘書而為名家古人困於無書而自力如此豈有具而待之者邪士生非通都大邑富者書不皆有况貧者乎美才在所不乏坐是困尼在士可里者何其幸歟且假粟帛者既靡弊矣營而歸之勞且費也書則不然淺而擷其華以為文章深而酌其源以蓄道徳舉其帙而歸之固無恙也里之士豈有惮而不假者乎士可歴官八品辟湖廣省掾他日位通顯其為善不又有大於是者乎兄士啟今湖南宣慰副使觀其志母壙述家譜人可知已他日里之士燄燄軰出不愧二難其亦知所自乎記選目吏部治銓政而總於中書從七品下迄從九品聴部擬注正七品上則中書自除然覈其功過覆其秩禄定其黜陟必具於部而後登於省彚貤為籍宰相具坐始共論校嵗一或再而不必其時部則月為一銓御史審可乃合其僚而擬注焉謄上中書執政一二人暨叅議左司覆聴都堂地之逺邇秩之高下用之從違按其籍而校聴之少戾則駁使復擬其皆合也執政於手牘人署曰准乃入奏奏可而後出命焉底留掌故手牘則歸於私家此銓除故常大較也劉嗛光逺兩㨗郷闈職校漢陽掾行省始入八品流内銓其調湖廣行省理問知事也余適承乏執政獲與覆聴焉尋常手牘率為廢紙光逺得一紙共四人而光逺在焉盖余季弟可行得之廢紙以貽光逺光逺得之喜請曰此公署於都堂者不肖名適與存苟著其故將遺子孫嗟夫天下之大才不乏也年勞格行皆困於吏部而又有幸不幸焉彼三人者因光逺遂表而出山林之士弁於時者多矣幾何而能若三人之幸者哉其有不當廢而廢者幾何而能若片楮之復出哉光逺業行日修登崇伊始雖覆金甌亦儒者分内事况名在八品乎余待罪最乆弃者不能取廢者不能起瞶聵循故常守廢紙猶望其自幸其可恥哉因手牘而重有感又以勵光逺云廖氏園亭記予蚤聞渌江廖為右族莫徴其實同年楊全州廷鎮亦居渌相從㳺衡山舟中語廖始悉且諗予曰廖有奉先堂虞侍講伯生為記而記其世綵堂者則吾同年歐陽侍講原功也其園亭之勝實冠一州表其勝則有待於吾子焉予惟廷鎮文軋虞歐居且與廖同里其誰宜為辭不獲即聞諸廷鎮者述其概廖世積善曰應龍雲祥甫國初為宜山縣簿尉棄之歸力於行義多子而耆年㓜子興元字晉福克世其業䂓郭西之山為園亭年甫四十而卒二子麟孫驥孫嗣葺有加精舎曰渌西庋書籍也亭曰青山渌水之間者據其勝也曰山間四時者著其備也曰秀野者得其廣也曰流觴曰梯雲曰翼然者紀其用而表其高出也泉出山峽貫其中𨗳而為磵瀦而為池花卉風物之芳潤泉實為之渌之治為醴陵始邑也户繁而渌居渌水之陽渌水東来環州而北西山峙其右盖一州之勝萃於西山而西山之勝萃於廖氏園亭此其大較也天下之事聞者不如見者之為詳是記不幾喻日以鉦而或以聲為日哉然未見者地也可見者理也宜山位不究施者達官不及晉福天不引年有子繼志為善之徵不亦顯哉予因有以告二子焉園亭㳺息地也而精舎有書可藏修焉張弛有時我學用昌擴父祖之善而充之嗣葺之大不在兹乎園亭不葺而葺矣苟為景物役而一於㳺揷架觀美手不一觸則園亭葺而不葺矣麟孫字彦時驥孫字彦良彦時彦良其亦有起於吾言矣善餘堂記松江儒學教授張景山宋文定公十一世孫也南渡為荼陵人其大父名堂善餘俾有壬擴其説以勵其後易不云乎積善之家必有餘慶説者謂天下事未有不由積而成者所積者善而福慶及於子孫然必積累而至非一朝一夕所能成也洪河長江㴞㴞蕩蕩輸委不竭儲者厚来者逺故及者無窮潢汙溝澮自給不足尚何望其逺及哉文定公一代偉人治獄多所全宥子孫世世有聞也子孫有聞非富貴之謂也富貴得不以道重而圯族輕而辱先謂有後可乎身白衣而詩書之訓不息使人目之曰某也某賢之後也謂無後可乎景山博學有文章嘗為儒學正武昌力舉其廢及格擢松江不赴舘閣知其賢薦為湖廣儒學副提舉中書報可而畫於新格性孤㓗一飯食不苟精軒岐之學有愬者風雨寒暑赴之貨糈不入於心世之及人切者莫若醫明者或失之貪否則負藝偃蹇不屑貧下明而不貪且能救人之急予獨見景山耳故樂為之記而又為之竭其説焉餘有二義饒裕也殘賸也饒裕則文定之見於今日是也殘賸則所為有限用之隨盡矣昔文定公為良相活天下景山以儒為良醫活人相為終始善餘流慶又將權輿於今日景山併以語而族使皆為善如景山以充善餘之餘勿使人以鐵爐步志見詬則善矣至正集卷三十八
