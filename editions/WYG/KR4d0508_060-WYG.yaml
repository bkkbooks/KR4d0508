body:
  text: 至正集卷六十元許有壬撰碑志安伯寧知府墓志銘至正六年八月十二日丁巳朝列大夫沔陽知府安公卒於家子承衡致其兄承規之辭以狀來請曰先子辱友公有年矣今不幸至大故志諸幽以昭示無極者舍公其誰幸哀而賜之銘公於有壬父執也先公為㑹福寮屬公實都事有壬居江夏去沔陽甚邇公之政日有聞銘復奚讓即其狀叙之曰公諱禮字伯寧起家河南憲史歴掾中書除徽政院檢校覆料官改彰徳路經歴入為㑹福院都事官文林郎擢户部司計出為大名路治中陞知沔陽府蒞官以能稱其在大名沔陽尤為可稱者至順初朝廷慎擇郡邑官有聲於京者徃徃外補是以有大名之役元統初詔辟守令臺憲交薦是以有沔陽之除大名王邸在焉部曲三千人若居器餼廩芻粟或給諸官或假諸民規約有方吏不得並縁為姦王嘗欲擊毬於宣聖廟隙地公進曰此風化所原非戲所也王為止又嘗以行事得失問公公極言其失王怒公徐曰王問當以正對諛以陷王不義可乎王悟改容謝之傅尉者有罪遇原朝服出迓公叱曰汝囚伍也而與命官列乎斥去之别駕程之沒也養子脫因冐世賞再受命矣嫡孫安童既長乃誣以罪公釋之且歸其䕃他如監輸租則費大省市織緞則直先給止導川之妨農息牧地之構訟皆表表有聞此大名之政也沔地卑濕民重網罟而輕蠶桑公程有司教以樹養之法且諭之曰一時之勞官若强汝無窮之利官能汝奪乎期年有成民今徳之新廟學作祭器廣生徒置書籍得學租隠者州若縣為石二千五百有奇河南行省檄公經理徳安屯田軍民之訟遂決朝廷遣使分道決囚公承命分江西以平允稱此沔陽之政也二郡皆紀之石公平生嫉惡太過故所至與物忤雖怨之者不免一一而公論的然以公為是者林林焉晚年以霜溪自命夷猶鄉里種花蒔果手題其軒曰歸興曰涉趣志可見已得年六十有七葬汲縣觀頭原先塋也上世居滄州樂陵考始占籍於衛祖考諱實徙葬焉考諱國平贈中順大夫同僉太常禮儀院事上輕車都尉追封武威郡伯妣許氏顧氏贈武威郡君配王氏封武威郡君子男六承規其長也承矩早卒承權刑部令史承衡承度承量女二長適梁桂次未行孫男三恂忱慥女二銘曰嗚呼伯寧自古皆有死公豈獨靳其生胡晝而晦胡夜而明晦明相禪胡虧胡成世固有久生而無益又孰若速朽而有名伊公英英遹蜚厥聲閎於沔水張於元城城復於隍無損公之剛水涸於陸無陻公之肅維彼黄堂維此泮宫豐碑峩峩於以載功晚嵗歸休左右圖史以畊以學貽厥孫子収英斂華韜光沈馨矢於霜溪永保堅貞凄其長往嗚呼伯寧吾不知死生之相承吾知吾銘黄巖知州梁君墓志碑予居鄂聞岳巴陵尹梁公彦升有善政且知為同里人予㳺湘中君為船户提舉始識之粹然古君子也既而請銘其大父按察公碑倥偬未遑越四年始克銘又三年為至正丙戌公歸自黄巖一再見九月廿九日卒於家以十月廿六日祔安陽郭村先塋姪友直孫楚來請銘嗚呼銘其祖石猶未樹又銘其孫弗忍也然悉其世熟其賢鄉人莫予若也安得而弗銘公諱遷相人也考諱莊妣郭氏大父諱貞終朝列大夫山南湖北道提刑按察副使妣張氏曽大父諱璧妣史氏君以祖官䕃望江縣主簿移英山改萍鄉州稅課提領陞巴陵縣尹天臨路船户提舉黄巖州知州兼勸農事官自進義副尉四轉至奉訓大夫為令若守為政有可紀者焉其佐邑也大旱致禱而澍雨應沿部使者檄讞獄而寃致平其作邑也弭劇盜平金賦終更民弗忍其去其作郡也修學校均鹽課足倉儲民方詠歌其惠而公浩然引年去矣年甫六十有七配楊氏繼張氏贈恭人子男一溟先卒女五俱適名族孫男四楚麓餘未名公有兄曰達達有子曰友直友聞公之考既卒按察公尚無恙治命曰遷其後我再傳則歸達之子公歸即以䕃歸友直而不私其孫可謂善繼志矣公喜讀書寡言笑鄉里稱善人為政綽有祖風而又有二異焉世有年逾七十而匿年冐進者公力辭於未及之年一異焉世有不幸卒官而道路阻修遂不得葬公引年歸躬具棺槨若預知之者二異也不可以不書銘曰惟按察公孫彦升治民家譜善繼承蹟著淮甸彰巴陵黃巖惠愛尤可稱世今民帥未足憑剛者猛鷙劇虎鷹柔復脂韋罷弗勝不絿不競政乃恒我銘爾祖惟其能我銘彦升惟其繩繩武有要先競競侵晨餐蘗夕飲氷繼世守之世以興大元贈奉直大夫大同路應州知州飛騎尉追封大同縣男傅公墓碣銘公姓傅氏諱仁義世居代郡祖諱琪金兵馬大元帥父諱徳貞祐兵亂徙雲中大同縣占籍禁軍娶刁氏二子長良臣次即公也良臣三子二孫子逸其名孫蠻子下津閭公娶張氏五子斌瑞璉瑄琦斌為河東考牧官娶師氏二子克誠克復三女適崔李楊瑞娶張氏一女適王璉有幹局起家奉常知印除將仕郎大盈倉副歴鄄城縣丞武州判官南倉監支納富寧同提舉陞奉直大夫兩淮都轉運鹽使司判官課登有金緞之賜初娶李追封大同縣君子赫克女適今參議中書省事李述彦古封隴西郡夫人繼潘若齊生子皆㓜卒田一子克昌瑄娶劉子克强琦娶郭子克柔曽孫男曰元曰亨曰貞曰禮曰智曰信曰敬女四人公性稟端莊涉獵書史不與物忤雖匱乏不妄干人惟力田以自給以子貴贈奉直大夫大同路應州知州飛騎尉追封大同縣男張氏累封大同縣君祔焉判官剛直而敬慎鹺司貨利淵藪少不慎若衣素縞行塗炭鮮有不湼者富寧民凋瘵積弊非一日宿額酬入嵗必取盈乃能潔其身而不湼登其額而至盈可不謂能乎人謂應州之教有素也既休致首拓兆域礱石儀凡可以奉其先而合於禮者舉為之介其婿彦古請銘其墓道之石余昔過居庸并塞西北山川風土可得而稽焉惟代自昔著稱至漢地尤居重雲中氣習大率近似慷慨豪俠之士實生其間㛰姻葬祭之禮兼南北之宜而揚其親於不冺質諸禮而不悖者傅氏有焉自其先兆域石刻班班可考豈獨示法奕世而一鄉之化於一家者由是可徴矣應州力田自給以義教其子判官敬慎自持以禮顯其親是銘之刻三善具焉使雲中之人知立教之要以勞不以逸一也知教子之道以義不以利二也知顯親之實以禮不以俗三也風移俗易顧不在兹乎編修官拜特穆爾既志應州之墓予因有考而叙其世又系之以銘曰惟代山川據雄峻介子之裔世登俊金火一熄無留燼吾土吾身不容殉雲中乃徂勞不僨椒聊繁衍墜復振祖風獵獵流諸𦙍謹正於官著忠藎疏封及親秩有郡載礱樂石欲傳信俾翁世有無窮聞平生所植徳惟慎善源吾啟後其濬于嗟汨汨流無盡故元處士徐君墓志銘承事郎湖南道宣慰使司都元帥府都事黄常仲綱狀其舅氏處士徐君行實請銘於予予讀之竟壯其辭自足為銘奚復余請辭不獲則本其狀而筆之曰徐氏世有聞人至鉉之孫祖禹刺饒愛樂平永豐里風土家焉厥後簪紱蟬聨君諱舜臣字熈載曽大父文蔚大父體仁皆濳徳曠寮父一龍博學能文尢深於易宋末舉進士而谷陵變遷矣國初薦遺逸擢將仕郎寧國路旌徳縣尹敦廹視事未期月以視親歸累徵不就卒於家娶王氏二子君次也髫齔如成人才復敏甚侍郎談公應斗僉判詹公載采連騎過旌徳君試君書義援筆立就辭采可觀二公大異之年十五失父又四年失母從兄居喪克合於禮屬時艱虞雖未卒業而應酬事物洞乎有見渙乎無滯演析名理聽者忘倦既長益自樹立里有為不義者必顯責之雖熟惡亦畏戢其或見絶於君即衆不齒有過者每自恐曰徐君得無知之乎扶義墾菑無間疏賤邑有武斷吏不敢詰它日一守至將繩之武斷煽其黨賂行部文致其罪守素清慎君慨然偕百餘人詣行臺言狀氣直辭激一府感動守賴以白與守無素也守來謝君曰吾為義不為守避不與見然善善急而惡惡亦不緩負才不少自下故所至多落落年五十屏跡不復出鑿井種竹治具娯客客去則琴書自適視軒冕漠如也一日顧諸子曰吾以明日晡逝矣有遺言可書於簡凡十餘則大要訓以孝謹俾不辱其先及期果如所言家人環泣復張目曰毋亂我言訖而絶闕年闕月闕日也享年闕葬闕娶許氏故宋提幹大琮之孫京諭志徳之女長沙通守李公睦之外孫也其歸也舅姑已卒嵗時有事哀誠如逮事者處士好客傾匳槖相治不靳卒祔處士墓三子希旦希奭璉二女適方崇文陶泰璉洎陶女他姬出孫男五澤潤清澄挺女三昔王烈以義行稱鄉里有盜牛者至謂刑戮自甘願不使王彦方知予嘗恐後世不復有如此人者今處士其庶幾乎身雖不仕見之行事仕所不及與守無素能直其枉雖古豪俠蔑如也使效一職於所當為有不為者乎世有受人之寄於所當為而恝然不肯為視處士獨不愧乎仲綱至順庚午進士仕而益昌於學力於為善葢有舅氏之風焉銘曰惟士為士拔乎齊民或出或處歸善則均云胡鄒書處乃横議况盜虛名遂薄於世特立有人剖破封畛不事詭遇不為充隠我無横議我不盜名惟義所在我其力行蛇蝎可殺芝蘭可植苟適其便孰忍不力謂非我職實善之賊積徳厚大振振繩繩况得陽元蔚乎才名太史秉筆覈善而書千載而下知有樂平之徐大興國寺碑浮屠氏之教入中國千二百餘年歴代尊信金錮海浸無隙可抵無堅不浹我元以不殺一天下而慈悲之說黙有符契既建都邑即貤及其居日新月盛金碧煥麗環拱宸極萬姓仰瞻如囿祇園兠率是宜其徒男僧女尼莫不因佛慈悲廣上徳意思致崇極於以祈休賛化焉蓬萊坊大興國寺者今住持大師比丘尼監藏巴所創也寺承制賜今額請記於予按師姓常氏真陽信都人大父榮有巧思尤善製鞍因近侍博囉進見世祖皇帝上嘉其精藝命直宿衛從幸上京至黒峪紅寺上謂榮曰山林延袤若此宜多良木朕已詔有司禁樵採者四面各十里汝可留居嵗取材製鞍獻之上京勅其子策丹濟爾噶岱代直宿衛䇿丹早卒濟爾噶岱拜監察御史師策丹女也八嵗召入宫上憐其㓜命皇后子之性聰慧謹恪善迎順后意日見愛信俾掌鑰司出納年十九后上仙移事嗣后寵信尤篤年二十四奉㫖適近臣翁吉喇特匳具之費悉資内帑歴成宗武宗仁宗三朝睿眷益隆賚貺無虚嵗翁吉喇特仕至資徳大夫㑹福院使然師早慕真如深懼滿盈重惟聖祖聖后天涵地育恩徳罔極涓埃思報舍佛焉依英宗即位懇請上前始聽出家詔役監藏官帝師受具落髪仍為易法號曰監藏巴既契夙願遂盡出衣資藏畜竭力以圖營構闢地鳩工掄材伐石爰作爰謀屢閱寒暑天厯初賜楮幣中綂二萬五千緡且勅后妃藩邸將相大臣各有所輸得凡十五萬緡平生賚貺若匳篋諸積舉以資締構之費其費不貲矣經始某年某月迄工某年某年中樹正殿後列法堂重門邃深周廊迴合齋庖庫庾罔不畢備像設有嚴鐘皷有節師身率徒衆昕講夕誦寓華封之祝年八十有六聽聰視明無異常時益謹戒律獨超覺海滋殖福利六宫敬禮簡在宸心今上皇帝顧念世祖舊人無幾而師巋然獨存是用錫之嘉名以昭殊渥嗚呼休哉昔無染區區不忘其本君子有取焉若師者可無述乎余故具列懿行著銘兹碑且俾嗣其傳者知寺之所以成教之所以大銘曰我觀世間人具佛性一念之微無量感應念有萬殊善惡何分惟忠惟孝迺善念根婉婉女師究大秘奥昔聞佛言受恩思報列聖在天澤厚仁深何以報之象教足欽捨身匪吝構宇有赫慧日監臨臣心無斁朝仰白毫夕禮金容願施法雨振我皇風佛力無邊帝徳廣大億載同符爾徒克賴爾徒孔多遵是法門梵唄洋洋永報國恩至正集卷六十
