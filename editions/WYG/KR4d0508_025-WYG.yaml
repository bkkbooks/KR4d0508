body:
  text: 至正集卷二十五元許有壬撰絶句上都歸口號嬌兒幼女逐山妻爭解行裝看賜衣顚倒海圖被短褐絶勝杜老北征歸和王左丞仁夫見寄韻二首退食偷閒晝掩門時看風葉墜繽紛盛時自有為霖手何用無心出岫雲未能祖道設都門聊引芳尊自解紛好把胷中浩然氣因風吹入華山雲題張陽岡竹間精舍二首草木雖蕃竹最清竹間仍有讀書聲更觀淇澳青青意多少英才待作成清風萬斛屋三間要與夫君老嵗寒只有好詩藏不得興來題上碧琅玕題林和靖工部帖梅花已入詩三昧工部今如魯兩生一段西湖心事了先生何意擅書名題臨江陳道翁所藏乃翁司理宋公差考試文移時方罷科六十年來墨尚新古今良法貴相因汗顔不敢徵文獻我是登科執政人居庸道中萬壑清風吹酒醒居庸闗下短長亭囘頭不記來時路馬上春山四面青冩家書纔緘復拆意躊躇迴首山川萬里餘羡殺朱陳老田叟一生不識寫家書觀野花龍沙七月野花開淺白深紅間草萊休羡一時顔色好疾風明日送霜來中都八景和王受益教授韻龍庭瑞靄天兵疇昔起龍庭道契成湯始葛征千古興王天府國紅雲常䕶九重城梵宇晨鍾鴻音杳𣺌曙光微有客孤窻枕半欹喚起十年江海夢姑蘇城下酒醒時天橋夜月長風吹月夜澄澄虹背光摇玉一泓題柱未酬空感慨何人横笛起三更碑亭暮烟扶蘇墓也子道能全任殺身後來多議不求真君看易水悲歌處風色蕭蕭愁殺人閭山晚翠斜陽著意染閭山淡紫濃青杳靄間望眼欲窮詩未就野雲還與鳥俱還蘭水晴波石齒􅉿􅉿潄碧流曾基王業振貔貅坐令四海澄清了依舊黄雲白草秋高巖異卉牡丹一本千花凍未全消草未芽雲收霞卷放千花世間久絶殷韓手誰信髙巖有此華蕁川春色紛紛花草簇晴烟想象江南二月天我欲重嘘鄒子律偏教沙漠似蕁川酒惡行麗正橋水濱四首時有勸余止酒者攻愁取醉恣狂歌作惡其如醒後何畢竟濁醪功有在醒時愁比醉時多我生竒策三十六第一歸田次醉鄉歸計未成元有為麴生風味忍相忘得錢沽酒政竒事投刺向人徒强顔麗正門前好楊栁杖藜知去不知還天橋流水碧悠悠徙倚吟笻數過舟酒惡詩成殊不惡淡雲踈雨漸成秋次高辛甫韻四首士衡入洛筆如神文采風流適二旬千古彈冠還自笑一時彈得幾多塵平生誤事多毛頴嵗晚論心有此君閉户高眠聽春雨從知補拙不須勤一别江南越幾秋雙瓶時夢到沙頭栁花滿店春醪熟常記吳娃對客篘同塵鉛槧分賢勞時泄天慳擬楚招底用譊譊更多事他年公論有芻蕘二色菊圖嫩黄排粟㸃鉛華小鈿浮香綴紫葩因識流形生發處一般秋氣兩般花題毛女咸陽妖鏡透肝膽三十六年愁守宫不為餐松飛骨去脫身灰燼事重瞳信筆二首造物知余素愛山一官故調萬山間山深民朴官無事却為觀山日不閒掃除習氣却詩魔奈此青山怪我何說與吏人休報事重陽詩好怕催科寄友人荒城如斗足栖遲更有青山不廢詩官况如何君莫問一貧今似冷官時九鷺圖題曰九思者忘魚禪定野塘空撫卷時資省察功璞朴要明疑似處休因鴻鵠又援弓仙女奕棋圖琪樹風清玉筍寒一枰相對意俱閒山林儘有無窮趣休說輸贏到世間寄高元用兩鬢烟塵朝共爨一窻風雪夜同衾為君拈起當時語應見相思萬里心冬夜即事二首妻融雪水為烹茶婢爇松明課績麻容得野夫成懶散團蒲危坐誦南華紙窻鋪月白溶溶爐火欺燈照室紅萬籟聲沈人語定好詩都在杳㝠中鞫事洪洞途中憶小兒一旬不見小嬌兒已作歌詩寓渴思便准不才承罪狀雙親正是倚門時小園八詠葵一串猩紅高出牆薫風吹雨為催粧主人不是愛顔色憐爾傾心向太陽枸杞仙根嵗久轉滋榮萬顆珠璣綴紫莖我自去家無用處靈龍從此不須驚菊十年干禄走天涯却愛人間隠逸花坐對短籬心語口高風端合讓陶家石竹叢叢翠節散芳妍淺白深紅簇小鈿博物未能聊遣興何勞精究麝香眠牽牛萬藤纒繞一籬秋露浥芳姿翠欲流好趂西風忙結子幾多民瘼待君瘳鷄冠蹙錦挼丹巧逼真恍疑缺合作傳呼絳幘人蔧鬱鬱成叢密並畦清霜昨夜老繁枝掃除有用材無棄正是山家打穀時水葒離離繁穗糝輕紅裊裊長身立瘦笻老盡秋容人不顧只應騷客識游龍讀順宗實録茅廬心事幾人知未捷何須論出師千古效顰堪絶倒叔文高詠少陵詩畫兔二首身總機衡恃兩州披圖重為古人羞從知三窟非長計細草幽花且占秋五車身後未沈淪還染丹青自寫真莫效張龍輕變去世間多少守株人莊子觀泉圖梯空鑿實寓真筌汨汨真如水有源不假尾閭常暗泄世應無地著巵言宫中魚水聚扇圖舒卷清江懐袖間蠧殘猶作畫圖看秋風棄擲深宫裏曾恨君恩比目難行縣書所見二首漲潦留泥糞稻畦石渠分水灌麻池醉翁社散忘歸路行過柴門尚不知洒水鋪穰碾不泥築場如鏡積如隄老癃已謝服勞事暖日抱孫來䕶鷄次班彦功教授韻四首烏奔騰挽不囘青山還見古人來梅花都道春風早辛苦年年最後開詩翁下榻許頻過駑鈍無堪柰我何攜得瘦藤歸去後小窻人少月明多松舟檜楫緑蓑衣夢裏烟霞赤壁磯想像風光吟不得一江烟雨片帆飛醉吸蟾光肺腑涼江湖豪氣未能忘釣鰲滄海男兒事安得綸竿萬丈長玉樵陳君藏舊帖書法精勁有傳為宣政間許右丞者辨論紛紛未得其實吾友張夢臣又譏其徵租買物故及之買物徵租未易輕且從書法看專精王嬙一見知傾國何用區區問姓名題錢舜舉相馬圖伏波銅式久湮㣲轉覺人間具眼稀更向圖中校形似真龍元不傍人飛劉商奕棋圖老樵柯爛不知還一局輸贏未判間滄海桑田囘首變仙人元自不曾閒林慮南樓西山為我曉烟開正爾癃鍾造物衰更欲細看隂態度老龍將雨出山來至正集卷二十五
