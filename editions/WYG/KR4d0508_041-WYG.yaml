body:
  text: 至正集卷四十一元許有壬撰記記遊宋柳仲塗居蕩隂聞桂林僧惟深言林慮天平山泉石過衡岳逺甚及同游始信不妄余幼讀書江南旣服役狂走中外雖兩歸鄉里而憂患荒迷世故縈繞望西山如天上不得至也至元四年戊寅嵗得請歸九月三日甲子曁監郡西域荀公和叔始為林慮之行午出西水門過孫平邵村芋區蔬畦星布彌望柿林如江南橘黄時逺近蔽虧歴流寺固縣俄水冶士大夫廵徼監當官孝親寺僧皆來迓晚宿寺沙門西溪年八十八尚能欵客明日拜魏國忠獻韓公父諫議公墳讀富鄭公撰神道碑銘碑亭皆完石極大而美隂有樹形若水墨畫大塚皆甓甃兵荒中僧紀奮身捍蔽卒頼其力宅兆形勢風水家圖為式憑髙周覧髙下隱顯與圖不異也顧豐安魏公兆域寺煅於兵僧徒解㪚豪右伐木野人盗甓殘毁幾盡則紀之功可念也昔魏公以大功德為宋社稷臣兩兆寺皆勅額以之主視而一得一否亦人力之所不能及者乎小酌遂行林州知州李祐之延率其屬迓止州萬安寺又明日謁廟學游黄華山和叔祭其故人不能從别駕梁思誠仲信諸生李冕約約輩陪行十餘里至其麓皆小石槲􅈪是日大霜水皆氷人謂髙寒較他地早一月槲葉青紅可愛路漸髙聞水聲灌叢亂石中旣深入山益髙壁益峭路益險水聲益大峰囬路轉掩抱重叠使人應接不暇澗皆磐石髙下為級泉流其上懸而為練激而為湍飛花旋碧喧豗飄灑其瀦而為泓者清澈如空纎介可見又十里抵慈明院山僧三四輩問以古皆不知石柱刻張商英詩言髙歡清暑事蓋清暑殿基在院西北插天峯下而亦不能必其是否也他柱刻多漫滅不可盡讀大率多崇觀間人院之南仙人王津母墓若祠在焉少憩遂入山觀水簾一僧前導山民十餘持斧鍤剪椔翳掇碎石僅可投足馬不負人且不能登陟憊極又騎不幾步又下若是者逾三里許遂不可騎矣始見懸瀑如練於半天騎留林石間相率牽擁而登焉樛木蒙密亂石犖确峻坂㣲徑如梯而無級頼健卒紤練於前挽之而進因憶東漢封禪記語蓋近似焉數問僧以僧言逺近為喜畏又三里許逾公主闗始至加遠蓋不能進矣石屛突出四無所屬其髙入雲曰浮圖峰金王子端詩所謂掛鏡臺者也臺前有盤石疲甚坐其上仲信年六十懼不任登陟留之院俄亦縢屩掖兩卒至又迷路枉里許石上望瀑北僅如匹練濺崖飛白始濶西崖垂白亦不過丈許意昔人傳誇過實俄從卒持氷柱長五尺許云得之瀑下盛言其偉始欲即之發火煮酒引滿遍飲從者乃緣南崖㣲逕迤􅆔而西坡極峻草石皆氷跬步惴惴至西崖下仰之目力為極始見崖瀑飛灑㪚布踈密匀整下至澗長不知幾百丈濶蓋百餘尺光明透澈去人尚五丈許昔人號迸珠簾不能盡其竒也負崖坐石仲信又跼蹐以酒至力稍甦攀援而北仲信不能從也獨遣其卒挈酒脯以從北有巖容數十人瀑長過西而東又濃厚時如團雪投墜連屬不斷加以動搖如玉龍飛舞他與西同兩簾皆清寒襲人時時飛灑如細雪著人面下沾細草皆為清氷日夕凝積或聳直如玉笋或扶踈如珊瑚蔽崖彌澗竒形異狀不可殫紀瓊田瑶草殆謂此焉信天下之竒觀也西崖望掛鏡臺則培塿矣兹山竒峰重叠如展畫屏不知髙掛鏡臺又幾百尺周圍環抱而開豁其東臺如門屏而位置偏南臺上石墜者皆方平為水波狀臺前之山一遮一掩又不知其幾百重也始坐磐石疑瀑之小蓋遼遠空濶掩映巖石淡然如無加以老目茫茫故也歸途趨下差覺易僧醉喜甚捧氷如珊瑚者前行騶卒皆折紅樹負之而趨至繫馬所且乗且步俄至院坐山門前大磐石取山果如丹砂者與僧持氷若紅樹羅列於前清泉泠泠過壺觴閒且漱且盥且觴且詠非廹於暮不忍歸也和叔率州官載酒迓出水簾泉瀹茗飲之又明日偕和叔之延判官張士謙子敬游墨竈山寺殿東椒壁有梅軒佚老貞元癸酉嵗題字文皆竒惜殘缺過半石柱皆宋人題名緣石磴登方丈鳴筝小酌從者得雉為炙以侑觴題詩東壁出遂至谼峪山寳嚴寺寺東二里支提龕琢石崖為之開元十九年蔡景撰碑劖刻甚精寺前泉石不减黄華山門有白松皮葉皆異巨槐廕地數畝聖燈寺在西北絶頂望之隱隱見其殿宇僧云蓋四十里之遥舊傳聖燈誠禱則見張商英有説後見者多自矜和叔云某官大觖人望禱亦見余不禱也歴石磴登方丈望五松亭方丈西古松下坐磐石得山尤佳竒峰叠嶂競秀環峙上摩穹蒼錯以紅樹罨畫所不及午和叔治具張樂夜分始休泉㶁㶁循殿階流夢囬清響滿耳可以消酒戊辰刻名後殿石柱夜和叔入浴余獨乘月登陟坐盤石僧普静精觱篥終日獻藝至是挈其徒按羯鼓笙笛鏗鍧震蕩交奏迭作月明松影中清風䬃然山鳴谷應不知此身之在人世也長老勝祥又進數尊而歸寢視歐謝遊嵩山見汪僧雖静躁不同而所遇皆可樂也山之秀拔在黄華右若夫水簾竒偉遮掩環抱重叠深遠則不及焉二山之泉皆去山數里洑入地中己巳將遊棲霞和叔謂無大竒遂東囘過諸翟翟曲宿下洹九日登鳯寧山山在洹水隂峭㧞如鳯聳石為兩翼各有亭山巔又為亭亭上又架屋兩重金泰和間作祠三神女山多古栢路尤峻坐其巔俯瞰二亭若井底風急不可乆過南齊觀丈八石佛有紹聖間刻石度槎牙嶺不可騎和叔徒步憊甚間闗至善應宿儲祥宮明日登西樓和元裕之詩得鯉鯽活躍几席前泛舟觀泉泉皆洹之洑至是突出有若歴下趵流而清澈過之登龍祠祠下泉出尤怒飲舟中道士又携酒俟水濵遂至醉又明日道人方擊雲璈侑觴盤桓殿廡二人報大尹杜公𢎞道軰迓已二日不得已遂歸往返九日游歴四百里清賞之餘則有從者弦歌馬上疲憊則聼和叔劇談可以遣睡餘力所及得詩凡二十八首姑録之以志歲月昔仲塗述遊有記魏公有䟦而魏公凡三守相竟不克往予竊自幸多矣所不足者和叔謂天平險甚且經大雨不可行栖霞又尼於猶豫而玉泉澤陽諸山皆西山之勝未愜窮歴張本於是尚有待於他日焉漢陽府學新築宮牆記治之要在學學之要在人師儒也風紀也我元建學徧天下師儒教之風紀勵之大而成俗出才細而繕葺悉任焉苟非其人細亦不舉大復奚望士為學有地地之治不見人之謹惰漢陽學垣昔皆土築霖潦嵗圯至元辛卯知府戎益教授劉必大易以板屋木乆又腐鷄犬不禁天厯己巳夏僉憲楊焕謁廟嗟訝力欲繕完商工計材費等剏作乃議甓址而瓦覆之費雖加倍校以嵗修吏因為弊省反倍百時學廩告竭命判官夏文炳倡率其屬教授劉嗛適至協志經營凡五閲月百堵俱興學南地隘神人一門出入瀆甚作學門於東牆西地偃瀦穢入泮池甃石為防池浚而廣北泄以溝牆之費悉資他助門池則半出學廩廟有嚴而學始完矣今夫齊民之家必閈垣扄鐍以為防也聖人南面而頽垣敗壁豈稱王居旣廩祭養慢藏其可斯役蓋不容已也况土而木木而甓歴數政而後討論始盡遇其人而後有成天下之事可易言哉士子謂紀今範後子宜有辭有壬於是因有以告吾士焉記以牆作請以牆喻子貢稱夫子之牆數仭言夫子之道也學者必求其門入而有見則其為學也至矣不得其門未有所見其猶正牆面而立也與若夫糞土不可杇者聖人之誅至矣吾士其念之哉牆縱五十丈横半之楮幣為緍四千五十瓦二萬八千九百甓四萬二千塹二萬二千四百垔雘榱桷瓦礫之屬稱是木工六十六圬之工三百一十築㧻之工五百六縣尹程杰實相斯役云禜門記至元後戊寅夏杜侯來守彰德方旱禱而雨槁苖用蘓秋大雨乃不止田將没洹之漲且及城八月四日侯禜於城東門雨俄息翼日遂霽按祭法雩禜祭水旱也歴代典制州郡縣苦雨各禜其城門雨而禜門古禮也長人者以禮為政則觀感而化者深矣世之為郡邑者遇水旱未嘗無禱而事不師古俚俗是徇以禮為政非學於古訓者不能也侯學儒者也歴階通貴出守一郡禱之不淫一事爾而有見其為政之大節焉士民合辭請曰侯之雨公記之五龍廟今兹滛而止猶昔之旱而雨也旱而雨有記淫而止無記其何以彰侯之休侯聞而辭曰禱雨我也禱晴又我也我不職召沴而屑屑凟夫造物者尚敢夸哉余曰昔旱而雨天也今淫而止亦天也惟其有侯之禱則有旱而雨淫而止之天也㣲侯之禱寧知不旱而旱雨而雨乎苟無此理則周制不著於春官歴代不見之典制矣侯為今守惟古是師使跳巫舞覡之風不見於吾鄉挈民視聽舉納於正以其平昔之所存施於一念之所用而又合乎典禮之正天道不遠矣郡之人不能忘侯而予不能拒鄉人之請書以朂後來者疇齋記益陽袁君名其齋曰疇來徵余言余按字書疇本作耕治之田也象並畔之形引而伸之則為疇類之疇洪範九疇是也又為誰何之義疇咨若余采是也兹齋之顏也其耕治之義乎士之為學蚤作而夜思勤力而勞心猶農之治田用天因地昬於作勞則樹藝可施焉仁義禮智根於心養於未發之先察於已發之後除惡務本揠苖必戒苖而秀秀而實矣傳曰五穀種之美者也苟為不熟不如荑稗人事不齊非疇之罪也人一已百愚明柔強况膏腴沃壤濟以勤力乎其崇如墉蓋有不期然而然者矣博學而約取厚積而薄發余尚有望於君焉萬國良九思齋記君子有九思思者為學之要所以審其知而肇其行也天生蒸民有物有則聖人從容中道固不待思賢以下臨事必思使各當理當視也思不以一毫私意自蔽當聽也思不以一毫私意自窒正顏色則思温動容貌則思恭出辭氣則思忠至於執事思敬有疑思問臨忿思難見得思義皆詳慮審處以求真是之歸焉然思之目亦非止於九而已也天下之事萬變不同此心之㣲衆理所具耳目之官不思而蔽於物心之官則思思則得之思曰睿睿作聖思乎思乎其聖學之要知行之樞機乎雖然九思之目昉於夫子一時之論而實原於洪範之五事也五事之思偏言則一事專言則貫四者夫子因貌言視聽而推廣之且揭思之一字以為致力之地其示人之意深矣有志於希聖者奚可外思以為學哉萬君國良以九思名齋蓋嘗致力於思者請言於余余嘉其筮仕簿領發無不當其有得於此者乎序其槪以勉其進晉寧路鄉賢祠堂記治民有政化民有禮政雖不可弛聖人不急也禮則不待親炙而有得於私淑者已惟其不得親而炙也世之君子汲汲有事於前脩往行者所以寓淑人之機焉古鄉先生没而祭於社鄉先生之德鄉人心悦而誠服者其秩於祭宜哉世遠禮墜著於令有不舉者况咸秩無文乎然其廢舉亦視所遇何如人爾鄉飲酒禮主人就先生而謀賔介主人謂諸侯之卿大夫先生謂致仕老於鄉里而教者大夫則就而謀之又卿大夫飲國中賢者諸侯卿大夫猶能致禮於鄉賢之生者天子牧守獨不能致禮於鄉賢之没者乎祭於社之制不可考附廟學作屋而祭之者則見有之矣晉寧在河東為古今名郡廟學罹地震仆而復建講堂西四賢堂故基獨蕪穢不治今總管仇侯理棼舉墜勸農敦學嵗復告豐治㨗桴鼓顧瞻隙地慨然捐俸金倡僚屬而復為堂焉經始至正二年孟春迄功二月乃取隋文中子而下凡若干人設主以祭前國子司業王君走書京師請記於愚愚惟萬物並育而不相害道並行而不相悖物之所以育者道也道之所以行者人也道之統在聖而其寄在賢或晦或明或絶或續有不得而殫論者大抵先王承天之道所以維人紀於萬世者禮而已矣禮之目有五而祭統乎吉然而有公於天下者先聖先師是也有專於一鄉者各賢其賢祀於其地者是也公於天下者以其道被天下也專於一鄉者道之所著莫先於鄉而鄉中人之所感視衆人為尤易由是而國而天下矣王豹處於淇而河西善謳綿駒處於髙唐而齊右善歌曲藝且然而况為聖人之學者乎晉當變風變雅之餘有憂深思逺之意俗美且厚人生其間雖德之大小不同而位之顯晦亦異要其所至有足以任斯道之寄者若隋文中子若唐裴文忠公宋司馬文正公其出處勲德為何如他如裴𢎞中趙元鎮之相業陽元宗司空表聖之節操趙伯循孫明復之經術與夫金源百年以迄我朝其行足以範世而軌俗其風足以亷頑而立懦其學足以垂後而淑人不待親炙而有得者多矣鄉先生之功不亦大乎生為晉人没為晉神其秩於祭宜也然其中有從祀孔廟而又班之斯堂何哉從祀公於天下者也斯堂專於一鄉者也使薰德而善良者益寓其没世不忘之思非黷也昔魏杜畿為河東太守開置學官執經教授郡中化之以多儒聞其功不在蜀文翁閩常衮下而未聞有祠今舉而祀之可也夫以陶唐之故墟際皇元之嘉㑹魁竒材德之生蓋鼎鼎也明其晦續其絶廓聖人之學而任斯道之寄者豈無其人又有祀而秩之者已侯燕人名濟字公度化民有禮其杜畿之流乎司業名士元字善甫則郡人也至正集卷四十一
