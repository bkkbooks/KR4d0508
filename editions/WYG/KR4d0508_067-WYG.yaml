body:
  text: 至正集卷六十七元許有壬撰贊文文山畫像贊有壬早慕文山公風節與其孫富㳺嘗序公傳而未拜公像意其雄傑峭異若太史公疑張子房為魁梧竒偉也富弟容奉圖求贊始遂瞻拜乃温其如玉焉然其栗而㢘者不可揜也仁者必有勇公之謂也贊曰精金不蝕貞玉不磷昆岡火炎乃流乃焚不流不焚孰為乎真摧折百至而力不衂間闗萬狀而氣益振走淮之心有如此水我人我民我疆我理獨有入海萬一振起天實厭宋臣力竭矣慨慷就俘氣言愈厲談笑燕市取義得義一言一動足為人師若曰父母有疾不可以難愈而不藥則百世之訓彛厚顔鄙夫偷生一時死何所遺壤腐氷澌公乃不死孰得失之可疑見諸圖繪固秋霜烈日之梗槩而景星鳯凰足以慰後世快覩之思也勅賜呉宗師畫像贊特進上卿𤣥教大宗師臣全節生至元六年己巳越後至元四年戊寅年實七十集賢臣援其師開府儀同三司上卿𤣥教大宗師留孫例奏圖其像勅通奉大夫前中書參知政事知經筵事臣有壬贊曰宻用襲常大方無隅淳和内融光華四敷挹之其淵持之若虛執道紀以御衆有世不能喙其心而但迹其膚學硏古先業豐詩書人以為仙臣以為儒盖遁迹於清浄而㳺戱於世途竹宫桂館玉佩霞裾天威不違顔咫尺餘五十載扶正議引善類隂芘於衆庶有當軸之所不如而見之祝釐者特其土苴之餘當杖於國益健而腴昔李少君自謂七十嘗見老人之大父豈誣人而自誣而松喬之有筭方自此而權輿將從猶龍於反景日室之山握青筠而與五人者俱顧帝心之簡在示殊渥於繪圖豈望仙乎恍惚殆旌賢之遠橅天子萬年臣敢不竭報以一愚也哉澄上人龍賛今上皇帝躍淵桂林報恩寺時釋師澄實住持宸翰超詣師有功焉皇帝即位之三年召入朝恩數隆渥可謂希世之遇已有壬奏事明仁殿始識之將歸出墨龍求贊有壬既榮其遇而復有感於龍也為之贊曰九淵神龍屈信惟時有天者隨龍不自知其屈也獱獺皆得而嗤亦莫得而我危其信也飛在天而雲行雨施萬國咸寕而一物不遺怨不爾報徳必爾追是盖善善急而惡惡緩又天心之仁愛而實寓至公之無私使子髙而有知九原之下寕不深愧於我師也耶杜緱山畫像贊淵乎衷粹乎容謂秋而栗復春而融慨見盎其莫形惟至和之積躬方淫哇之沸土發希聲於鴻濛工而去華博而有宗帝憫悾恫挈臯比以付翁爰暢而聾爰豁而蒙雖用世之不充而流澤其未窮有孫亢先峩豸躍驄貤爵疏封實大且豐若夫羨盛徳之萬一非敢為里巷之私盖以示天下之公也贈陳謨贊治功臣金紫光禄大夫太尉上柱國追封趙國公諡忠襄鄂摩克公像贊宻雲未雨佳木未實蕩而戕之伊誰我戹然澤之蓄者其時出柢之深者其枿植維鄂摩克為國之望盖有拯一時之烜赫漲於昔而涸於今又孰若昔之嗇而今之溢秩登三公封疏大國靖言思之實昌以徳子孫孫子千載一日贈光禄大夫司徒柱國追封趙國公諡宣定鄂摩克公像贊鴻濛剖世坱圠啟春結繩易俗羔羊肇文控弦悉材載筆惟人帷幄不出謀猷是詢器可受大天胡遘迍厚徳所泊孫而復身恩崇地官益著人倫裕後無斁有說有振廬陵劉須溪父子三人畫像贊讀其文於生識其貌於死接其子弟於世而拜其父兄於紙求兄以弟求父以子雖無丹青盛美彰矣况翁之文方流傳而無止也白澤圖贊白澤像世謂可厭不祥雲莊侍御為龎允中提舉圖之余為贊曰有生賦形孰操其鈞或偏而漓或正而淳是吹萬之不同而受化之所因曰神斯龍曰靈斯麟復有在理靡常舉世無羣慌惚有無而不可致詰則又精氣之奇變非牢豢之可馴禹鼎象姦而或遺齊諧志怪而未陳奔走魑魅清敉户庭桃茢無功巫覡不神見諸圖繪其績且爾况一旦突出而得其真者乎淮曹知事劉之彦出其先畫像五世三軸求贊五世祖諱撝字仲謙號南山翁金石州刺史匪鄉而化匪先而傳窮經起家披荆力田其所以魁多士開来裔者夫豈偶然惟積之深猶水有源故椒聊蕃衍之中見四世八桂之蟬聨滿床之笏亦無足羨者書香一脈常不斷而緜緜人皆知其為劉氏之祖而不知其為渾源山水之仙也髙祖諱汲字伯深自號西巖金翰林應奉曽祖諱侃字雅川豐王府文學祖諱從政字直卿昭信校尉監海縣稅猗與先生芥拾危科聲華四馳赫奕鑾坡曾未衰暮飄然巖阿敝屣聲利沖融太和放辭粹古沛如決河世崇義方其遺孔多子能襲桂林之芳孫復衍慶源之波觀眉宇之清温風度之逶迱而一門慈孝之氣象盖百世而不磨若夫丹青所不能寫者則有西巖之歌父諱亨字仲通鄧均總管府經歴氣邁而和學叢而治際時可為用復我違宰邑佐府百未一施乃昌以年田娯里嬉子克紹家夙夜思勵遺訓有嚴流祉未替我先之積我徳之泰我官之卑我後之大僧格實哩監司豸􅃣像贊任法象服制敬惟欽直盖所性觸非其心有敬主内有頍著外仇視佞人徳遇善類勿謂至堅佞則爾摧勿謂至柔善則爾維我昔斯峩人與其稱烱如清氷玉壺輝映秩秩憲紀矯矯藎臣風霜示肅閭閻以春惟其有不觸之觸使邪自正而屈自直此其所以為大過人也興子初憲副林下小像贊處讙求寂處煩慕清惟適之安亦人之情寂而求讙清而慕煩彼宵人者何適而安我一而安汝廹之移遇不可釋我儲汝施乃身車服乃心田野并介重輕雖用猶舍悠悠浮雲矯矯遐心杖藜幅巾招鶴抱琴此而痼癖彼而僂俯清泉白石實聞斯語興子初豸冠像贊昔有神物朔方孕精臯陶作士且不自明正邪紛糅孰究其極爰資爾靈以别淑慝法冠象之讒佞斯伏北庭之英實稱其服不假堅銳濟吾之私彼獨何心惠文治之有鏘葱珩若若者綬嵓廊步趨周折左右化霜為雨易秋以春勿但要跪坐敬事而以自神也赫僉事豸冠像贊有美且鬈屹乎其標美錦夙製璞玉用雕西南之勞江湖之遥氓陽春姦摧巨猋賜環伊邇天衢趣軺又將頍太室以肅大禮峩螭首以懾百僚草木之微遂其繇條于嗟豸兮其騶虞之招乎超爾子淵御史畫像贊玉琢其章春融其天栗而孚尹温而塞淵刷羽天池蜚英青年歴三臺而一節行無事以繩愆入為養志之子出為匪躬之賢而况伯仲叔季簪笏後先韋之舉代揚之并居不足以比其盛而陳之難為馬之最良又以見世美之蟬聨其冠峩峩觸不直而咋不正夫豈恃銳而無前惟大體之是存肯束溼而恒弦將康濟天下之民而易之以珪衮貂蟬也自然贊自然者錬師談君號也君始從𤣥教宗師閑閑呉公學出提㸃武昌𤣥妙觀其徒黄明善為請贊閑閑余友也其取必端明善謹飭士也其事必賢雖不識知其賢矣夫善言自然者莫若猶龍氏其言天法道道法自然天也道也自然也不離而三矣乎天外無道道外無天天也道也一自然也始於天而終於自然所以明其如是而後為天與道也一而三三而一其示學者指歸乎於戲賢矣哉是盖不可以禬禳小數言也贊以辭不自然矣豈不自然而亦有自然者乎乃為之贊曰蒼蒼生覆孰識其機日往月来其誰廹之沖漠無朕氣行理隨林林與三而孰自知心也其天身也其人不求其心不取諸身惚兮有物恍兮有象舉以授子巳涉勉強伊小數兮將無同白日生羽翰兮子其余從勿以功成事遂待百姓之皆詗趙仁卿同知畫像贊出而趠厲居而淳渾積勞皈章不緇不磷從容懸車矍鑠八旬逢涌之澤各逮於褆身兹非仕宦之老成郷里之善人乎蘭石贊為憲史童安卿作揚揚其香漸漸其質香無人而不歇質振古而不易肯紉佩以寄怨孰攻玉以自泐清貞相資允矣二益培我馨徳堅我定力蘭與石與君子是則呉明徳畫像贊謂山澤臞青胡為紆謂聲利徒標乃爾孤將同荷衣浮㳺江湖抑欲拾芥易紫若朱仕耶隠耶并與介與子盖審於知命而浮湛出入於兩途者乎可與畫像贊直而有容剛而有制汎而能别儉而能施承家則獨肩其難施政則獨手其墜既優厥兄亦勝其季即兄季間兄又為不武之最弭耳而苟祿張口而待飼岸然其上但縮恧而增愧也孫吾與畫像贊士林之英胄館之髦書香世澤禮薰樂陶就道負笈希光沃膏培其已實增其未髙有渟未抒有銛未操匵韞不售賈用㑹遭將聲聞於天而一鳴於九臯也蔡仲謙運使雲林小像贊氣清而神完外癯而内腴御暴嬰難持志無撓剸繁治劇㳺刃有餘身已瘁於剔歴友方樂乎樵漁經費需才鋒車突如曾未期月山積海輸鳯池訏謨其席屢虛吏垢待刮而民瘼仰蘇清泉白石雲樹茅廬胡為乎歸與房先生畫像贊昔主并試得俊曰房因梓之良悉橋之昻梓植日茂袍青鬢蒼橋也昻藏兩表郡庠告老賜緋八十四霜生違接歎沒瞻餘光有作滿家有述繼芳伊作伊述汾流與長如愚先生畫像贊仇侯公度守晉寧政成而歸燕燕其里也復命典大郡力辭於未及之年平生慕古人假古物以寓其意又自號古愚聞於時一日貽書有壬曰吾友胡助亦古愚也兹以古愚獨歸胡而更曰如愚客有工繪貌余惟肖徼子一語其勿吝夫名而字古也復冠以號今也滔滔雷同焉得而避之昔有同姓字於一時若杜子夏者未聞易而避之也字且不避况字之外者乎何獨公度介然自别於胡哉始聞而疑之即其號求其志而後有以見公度之力於進修而其志有在也末世滋偽聖人發古愚今愚之嘆以其挟私妄作又不若徑行自遂之為疾也如愚顔子也聖人與言有聽受無問難盖其真積力乆觸處洞然但見其不違如愚退省其私則見足以發明夫子之道然後知其不愚焉公度慕古人者也非古之愚者也慕古人而師顔子有餘師矣自古愚而為如愚自如愚而為不愚得之於心有不可名者也號與字云乎哉贊曰謂其不愚黯乎其外謂其果愚皦乎其内以為古之愚則思不暗昧而行不自遂生乎今之世尚論古之人而無愧左圖右書以㳺以藏淵而時出絅而日章樂不可名號孰爾臧殆將造夫心齋坐忘之鄉者乎白菊坡昆季畫像贊檢校白君公嚴自號菊坡曰閒雲者其從兄公博也曰秋山者弟公固也廣陵李容璋繪為一圖境宇幽夐風致閒逺使人有超然物外之想安陽許有壬為之贊曰雲飛太空不閒而閒有黄者華坡香露寒涼風作秋萃清乎山之三子者敢問所安盖託物以成趣雖異稱而同觀泄友愛乎壎篪寄襟抱於㳺盤觀無心之出岫豈一時之怡顔東籬之下悠然之見曠千載而相闗若夫雲之澤物菊之夀世山之興寳其無愧淵明伯仲之間者乎張天師畫龍贊為董此字作吁嗟靈物時屈時伸其隐徳也淵潛自珍肆有獺而笑有獱及乎茫洋𤣥𣺌變化無朕孰名其神方在天而滃雲雱當旱而作霖雨於以蘇百萬億之生民也崇文監丞姚貢夫畫像贊豐腴而清睟和而貞皦皦貴介巖巖老成聲華藏室藉甚在庭及乎珥筆督刺躍驄按行不以觸噬而示力不以發擿而儌名曾日月之幾何固已騰茂實而蜚英聲圖書東觀英纒次登自公退食衣若不勝曰豈巳能世澤是膺昔我牧闇先生實主文衡徳沛淵泉言炳日星是宜名父之有子亦子之克慎於繼承崇徳象賢尚亢宗跨竈而莫之與京也雪樓先生程楚公小像贊有壬昔来京師雪樓先生楚國文憲程公在翰林嘗一再見之奔走四方不得日侍筆硯而知先生與議貢舉之有力也至正丙戌十一月諸孫世京奉小象示有壬俾贊其左不敢以蕪陋辭也贊曰楚郢故墟有樓巖巖世半不知修阻孰探由公著稱嘉名遂洽乎朔南公㓜為學演迤泓涵曾未施抒勝國已戡楚材晉用乃能獨挺夫楩楠持憲中外人革鄙貪掌帝之制音叶韶咸和不徇物剛不来讒引年勇退秋風片帆塵空萬事之擾擾雲䕶一室之潭潭松隂入坐爐熏自參宛清揚其如在耳肅肅乎名談昔舉貢之始行一廷議之二三天荒盡薙乎薉茀鵠袍倐忽而朱藍顧區區之不才至襲公之氷銜雖拜圖懐人希彷彿於萬一而度徳量力秪足以重沙礫之慙也達實宻彦修雲溪小像贊厭膏梁之腴而采山釣魚舍鮮華之服而博帶長裾拂朝市之塵而居巖壑之僻刷貴介之習而為山澤之臞自非重於内而輕於外得其精而遺其粗孰能栖神於澹泊㳺心乎詩書長松䕃庭春酒在壺人間富貴之樂有及此迂疎者乎政恐不免於用世而亦將為一琴一鶴之徒也馮公勵集賢山居小像贊難進易退士行大較用世不免塵纓遂縛而吾心豈忘乎山林吾身實寓乎臺閣爰因紈素想象真樂華貫已至迷途云覺風波有涘崦嵫復薄幸天假以夀康俾進退之綽綽䇿枯藤而徜徉觀浮雲乎寥廓平生之歡遂於今日人間之景聚乎一壑按圖大笑與汝無怍謂余不信有如此鶴沖𤣥輔道凝素𤣥教真人成存劉公畫像贊珠冠錦裳陟降帝傍雖祝釐有命􅂱乎其章而松姿鶴骨邈與世忘人知其跡託之禬禳不知其胷中之天自有雨暘烈烈祖師昔友國殤厥宗五傳師也允臧訏其濫觴實源吾鄉維桑與梓必恭敬止况交㳺之契且卅霜挹春温而接餘光者耶濵州知州蕭克復畫像贊小漢從華族姓日蕃世遠寖泯流風故存矯矯總戎出際聖元餘慶之抒至於𤣥孫善源渾淪璞玉粹温紈綺席世詩書是敦奏刀歴宰神遇劇繁坦履優績爵弁以鶱黄金横帶有朱其轓一朝政成肯蕪我園又將邈乎命巾車於林慮棹孤舟於清洹也至正集卷六十七
