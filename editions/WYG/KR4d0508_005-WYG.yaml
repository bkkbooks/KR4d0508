body:
  text: 至正集卷五元許有壬撰古詩入夏四旬不雨駸駸成災五月二十四日沛然一犁民以為不足越五日大作盈尺喜而為詩余髫事泓穎嘗有喜雨詩而於可喜處藐然寧真知去年忝充賦射策班龍墀黄封醉未醒承恩倅夷儀民事足纎悉毫髮慚無裨豐年或苟安奈此將阻飢恒暘亘朱夏田拆紛如龜稼穡人所天播種力已疲禾苗既出土豌花亦葳蕤曽無旬日間青青變黄萎麻黍皆寸許蕪穢傷不治野夫指相告天欲朘我脂髙地饒甌窶潟鹵荒其卑雨暘悉時若嵗事猶難期况兹魃肆虐枵腹行奚疑我心焦若焚重以膏沃之何由訴真宰坐視空嗟咨曠職咎有在斯民焉取斯又訝爽惠罰好惡遂逆施豈知隆平世夀域開無涯一機黙運轉萬象回雍熈神功太穎脱風雲隨指撝須臾顧平地黄流蓄如陂拔苗驗燥濕新根生玉絲輿情尚未愜謂此纔微滋龍公果不靳天瓢竭淋漓黄萎復青青垂死逢良醫官府洗罪譴閭閻息流移今朝吾所喜真知匪當時胥輩言囁嚅雨皆山神為重糈兹已具盍往酬神私搖首謝吏曹别駕方撚髭作詩志吾喜㝠㝠何暇推從賈師敬假琴宓子尚清靜政化鳴琴間景仰固慙徳民淳幸多閒舜桐如見假趙璧却全還未能效昔人且用樂溪山哭劉庸齋游京早識公一見辱青顧踵門常倒屣肴核往輒具公為山北憲飛章引庸孺操觚侍益親造請無旦暮每逢冬仲時歌詩頌初度别來未三年忽復賡薤露良材今其椔天髙莫哀籲粹温瑚璉器秀瑩珠璣句力能勝重逺色不形喜怒十載厯名藩在在歌五袴芳名臧獲知豐碑鬼神䕶攬轡遼海秋澄清了平素姑蘇勞卧治春風滿嘉樹深惠竟弗終民瘼今安愬百身寧可贖長往不少往功在死猶生脩短自天賦但悲如伯道傷哉漫三娶天道是耶非有徳乃弗祚城南公先塋蕭蕭白楊路當年屢従游豈意公今祔臨哭嗟無由微官拘跬步作歌寄予哀用作貧者賻觀躬耕秋地行郊攄滯慮目至意已適黍實敷如扇禾穗長過尺我飢雖有涯垂涎勢已逼舉室百趾餘盻盻朝復夕有官不療貧勞心且勞力昔賢起躬耕車従坐傳食牙緋既通守耒耜尚未釋但期嵗有秋如坻見露積豈惟弭腹雷庶免刺不穡宴安隠鴆毒侃也猶運甓無愧食乃安一飽皆君徳𢎞襄王希賢齋扁誠意乃弟希憲郎求賦堪輿大無際眇已乃中處與參非此心傾欹孰撑拄虛靈妙不測捕影竟何所念慮一發動昭晰露端緒實力少未殫圓方亂規矩是猶虞機張括度斯釋弩充盈皆至善毫髮絶過舉遂令天下平推極效乃許彼美三槐裔𢎞襄見翹楚起廢學已神稽疑逆如覩扁齋資警省實副名有取窮達命自知含光樂環堵觀乎卜醫中誼也聞自古難弟尤可人清風振烏府談兄滕頰舌徵題滿縑楮何年遂獵纓詩成先備糈送馬州判歸冀州維轑僻在山民朴易為理庸才獲已多得朋况兼美君侯冀右旋髙門映桑梓天戈昔南向驍勇萃蜂螘若翁奮臂出風霆入鞭箠元戎資出奇長江遂平履洪惟世皇朝一命不輕委酬功嗟獨異世禄倅鄉里跂仰勞夙心天教見吾子協恭無少疑三年事如水公餘日相従聨鑣窮磈礧漳濵春釣魚箕嶺秋射雉為歡未云足歸騎亦何駛人生貴有别脩程此伊始行山莫憚逺香風簇桃李同官古所敦相思有雙鯉秋丁隆興廟學釋奠營洛奠神臯改邑民用遷睠言兹黌舎廟貌仍儼然經筵餘敗壁土榻寒無氊儒服二三輩薦享來聨翩多儀固未備至誠即牲牷羊存禮斯存隆殺時有權漢興未綿蕝過魯猶拳拳聖朝尚文治新都萃英賢成均不日建道徳行開延洋洋齊魯化坐看周八埏送張教授歸省沍陰地無春况復當窮秋霜飛白草盡野迥蒼烟浮嗈嗈度寒鴈游子深鄉愁匪厭官冷去倚門憐白頭孤雲西南飛行邁心悠悠鴈門接太行山川鬱綢繆朔風吹征衣清笳動離憂臨岐復屏營君歸我仍留贈言冀遄返魯泮行當脩次髙辛甫出都城韻余年昔未冠南紀窮迢遙胸藏史遷書氣靡相如橋長吟洞庭野天逺風蕭蕭自知有毛質奮欲摩層霄太行拔萬仞醉筆雄相驕云何遂局促弭耳居今朝屈信道有在奎璧行昭昭寛河道中次前人韻人生在羇旅百感日咸集好山獨相慰馬首青岌岌地寒春不知萬木凍僵立悲笳咽荒烟牛羊散平隰反瞻孤雲飛鄉思杳無極青精不成采坐睹憔悴色奕棋念往事俯仰成太息三年尚不飛負此排風翼逺意良悠悠天耶果人力灤陽早發次前人韻行山不憚逺破曉陟危峻崖懸水成瀑雲出山有暈商聲發寥廓吹萬氣方振艱虞復有樂詞源日加濬關河一錦囊風霜兩蓬鬢但慚抱堅頑犀革未易皸搖搖課脩程茫茫付天運懐哉山中人南鴻杳無信謝劉彦昇惠猫及詩含光事賤役醉夢迷簡牘贈我千兔毫獲此升斗禄鼠輩不相貸恣飫飲河腹瓶罌藏幸堅百態互起伏跳架嚙我書走椸穴我服君家有貍奴二子報新育買魚擬禮迎惠然送弊屋副以雲錦篇五色爛雙目且云防内耗寓教深含蓄竊時何足道行見赤其族珍重養生言拳拳請三復送州吏張恕赴憲司作憲需羣材有類構室堂棟隆固勝任椳闑仍資良余始倅郡來吏進鴈鶩行披塵鼔凡冗亂目紛厖涼恕也居其中意氣獨軒昂一見已足懽細較兼多長身卑趣甚髙事得常加詳柏府掲冰鑑取善及毫芒公論出莫禦霜風肅飛章爾今蜕濁穢變化猶蜣蜋願爾勉效蟬風露非膏粱慎勿小易盈奮臂劇怒螳養爾拂雲翮萬里竚一翔貧者無贈金有言當莫忘陳芝田寫余真對之小酌戲成今日我與汝相看各華顛亟呼尊酒至我飲汝茫然它年我長往酒但酧汝前悟此一大笑沽酒休論錢題張圖南松風亭吹萬不同處従知非為風有木無竅穴何聲來半空清寒灑飛雪哀響吟老龍莫將大夫爵負此大王雄劉須溪父子三人畫像翁文幼所嗜但恨昧平生嵗晚遇圖畫眼明瞻老成季也篤孝弟老猶従父兄世儒有若此何用羨徐卿徐復初種雲堂種雲事幽討邈與世相忘只可自怡悦更為誰飛揚出岫本無心為霖亦何傷慎勿陽臺下朝朝従楚王至正壬午二月復科知貢舉有感而作文運如日月陰翳容有時長風倏掃蕩光彩曾何虧又如泉始達有物或窒之一朝混混出萬古流不衰聖皇復文治碩輔登臯䕫今年適大比充賦來無遺南宫舉百廢部署嚴諸司主文號具眼妍媸析毫釐小臣親奉詔肩赬力難支回思三十年試藝實在兹竊禄愧未報鬢髮嗟已絲作者七人矣碌碌予何為但期歌有臺太平此其基他年至公堂萬一徵予詩和劉楚奇浮雲道院二十二首名實劇形影有實寧無名義利判金羽義重利自輕真知加定力首在明吾明之子學有得雲哉聊寓情壘空在大澤眇已參兩間廣居闢髙明正路辭間關漠然空中物何與吾堂顔于以况不義將無同我閒達人本無求所求在真樂致身戒卑汙空中好樓閣秋實成昬勞春花早刋落如何穹壤間蠻觸有兩角昧道徇利禄醉夢迷黄粮醒眼見大意㸃也初非狂千金等棄屣六藝供潄芳大聖有明訓知微萬夫望進徳貴不息豈羨六十化水哉非浮雲過續無晝夜誰令墮眢井自棄尚自詫君看一撮土振海仍載華上天賦我形所期不愧天暝途逐利慾膏火攻相煎嵗月難把玩俯仰已百年况復非其招紛紛亂旌旃雞山屹堂上鷲溪走堂下天與景已豐而吾又多暇所以村酒甘到手即空斚説似輕薄兒我豈東山謝山川託深厚貲産無盈滿予心日休休世態自冷暖神仙多官府禮法足條欵歸來捫吾舌談道未遽短達觀宇宙内巨細森萬有有形既不同孰妍復誰醜來者方無際往者不可咎浮雲爾來前爾今在吾手淵明初無營偶爾植五栁戲作標牓之千載駭黔首吾心不在物思古惟尚友九原如可作還肯下交不一身要歸處萬事皆偶然道院有佳趣春風四時天不見恃恩者中道多棄捐求魚江海濶従此木休緣因書欲求道倏爾成白頭未免日謀食嗟來肯承羞賴此自勞力倉箱見豐收樂哉復奚疑一壑仍一丘淳風逺黄虞烈士薄殷周世降得㓜安奮身到龍頭可笑植橘人未忘千户侯予身亦多事酒盡須更謀大明麗中天春意盎萬國區區衡茅下一飽皆君徳出門便多虞避言且避色嵗寒誰相知鬱鬱澗下柏浮雲吾語女人謂女無心胡為曾作雨世事乃欲任我屋本無女清泉抱幽林待女時粉澤悠悠何處尋力田冀一稔攻書篤三餘幸有二頃田復蓄萬卷書村樂亦云至時讀時耕鋤故人來共酌摘蔬登土酥素位非出位得侯還失侯由來豪傑士有志難盡酬小人願為圃得飽不得秋寧當作焦尾慎勿為焦頭人言世間事十九不如意在理此亦常得友姑與醉清風明月天假爾同此世宜乎歸來人涉園亦成趣東風昨日至滿目發紅緑今也何有餘昔也何不足平生多因人詎敢辭碌碌百年未可知且樹十年木少年江湖行波濤足震怖歸來念同游太半已物故因之悟已往何往更不悟忍將好嵗月漫浪付道路年來頗好淡醉中亦逃禪開口但納酒搖尾休乞憐燎原固熾烈難使寒灰然咄哉爾浮雲爾去吾觀天至寶不可棄奇貨不可居桑榆既容收何慚失東隅富貴如浮雲况不浮雲如若究雲之極須與天為徒王仲方總管餽麛未能飲齕以羊乳之相従如母子感而為詩后稷字牛羊子文穀於菟聖賢天實相且示與物殊北平詫貓乳同類宜相孚董家雞哺狗降瑞動鉅儒蜾臝取螟子羣鳥尊鵑雛是雖萬不同皆非人力敺林廬富叢薄春麛走山隅野人捕得之不忍烹㓜孤脱胎却幾日未省水與芻牂羊方有逹脹乳流膏酥捫角俾字之牂怒麛趑趍日月既積狎遂與母子俱麛逺牂必求牂逺麛必呼只恐麛漸大跳梁莫能拘豈矜字乳功念牂老而癯恰如伏鴨雞與牂等勤劬鴨行自入水百匝勞跦跦人事有時窮天理終不渝感物為興悲往訓不可誣其心非我類能免其冀乎題韓醫梅齋韓知太素脈之子心太素復愛梅清妍自知心與梅同有太素天水月影中影乾坤𤣥外𤣥相逢莫多語且醉梅花前晚行周氏小園閉門作書蠧好春都不知桃花落已半棠梨開幸遲步屧及斜陽胡床俯清池放志欲忘返林樹月參差失鶴瀛海得雙鶴稚翎猶未全買舟偕南歸待之如二仙𤣥縞日以長丹砂日以鮮銜筆恣攫攘學舞爭蹁蹮明初尤愛之日夕相周旋致陰旋栽竹供飲専鑿泉為爾呼庚癸玉燦明珠駢一朝一忽去棄侣何恝然月明照隻影踽踽殊可憐欲鳴誰與和欲舞誰與聨豈爾不安分適衛求超遷或遇爇琴人見爾流饞涎烏有已七日華表如千年邏求疲僮僕徵卜勞莛篿消息竟無聞憂心殆如煎作詩慰明初用繼亡猫篇鶴去十四日而歸因次前韻養鶴事幽討世事難求全一留若戀主一去如登仙念之不能釋對食忘肥鮮乾坤大無際何處容蹮蹮恨無列子術御風叱回旋雲霄勞夢寐景物孤林泉昨宵燈有花來慶肩應駢扣門忽抱送見我鳴戛然乃知值拘缺至正集卷五
