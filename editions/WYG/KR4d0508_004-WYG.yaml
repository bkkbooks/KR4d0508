body:
  text: 至正集卷四元許有壬撰古詩送孔氏五十二代孫吉夫教授𤣥聖立人極功視天初終銀潢流華裔汨汨來無窮汗青今亘昔碩徳代不空布韋奮私淑猶足新顓蒙一脈况真傳豈與時汙隆清朝急象賢殊科日尊崇君來典學政千里開盲聾臯比幾何暖歸騎仍怱怱倚門夜入夢關山隔飛鴻升斗安足留勇退由吾衷綵衣拜堂下一笑春沖融人間外鑠物鼠腐特無同祖訓始要道百行源其中勉旃事聿修浩蕩揚休風送李謙甫僉事赴内臺御史乗軺正吏虐終嵗無暫閒歸興秋方濃天書忽徵還生平心鐵石每進常自艱辛苦三十年所露纔一斑遼海控濊貉郡邑紛愚姦伯厚號疾惡霜風掃枯菅驄馬去何速飛鴻杳難攀聖朝達四聰虎豹閉九關封章明日上風采凝朝班勲名屬耆舊澄清徧區寰塞垣嵗華晚相思隔雲山惟應第一義傳布到人間臺掾趙仲文家譜維人位兩間發源自鴻蒙别生見載籍述譜聨始終兵戈既蕩析繼續仍愚沖遂令一身後坐與途人同軒后植本深枝葉日以豐仲衍開分土公輔懐西戎遙遙㡬千年奄奄及吾躬逺者湮莫究來者方無窮在昔苟有作時乃詒謀功由今勗後裔親盡情皆通歐公痛禮廢峻語驚矇聾云何世論隘反欲操戈攻于嗟趙有子孝誠出天衷寄言嗣述者百世延清風曉出順安站望九華山遙峯隠初日佳氣旁四馳明發甫云倦乃及觀山時輕紫冒深翠濃淡紛相宜出奇迎馬首澗谷來逶迤横雲半平林千里俄紛披舉頭萬象明晴光發巖姿青松沐膏澤錦樹光陸離逺烟濕不散多露行方滋兹游諒有樂攬轡逢吕期敢求慰詩癖政爾憂民痍夜至横石驛以火照壁見李元鎮詩次其韻行役日皇皇獨飲不成樂斜日艤斷磯横江見孤鶴我舟月亦無風浪従噴薄人生自不歸青山豈難約監試上都次楊廷鎮韻客京已云逺出塞仍北去行路已云難隆寒况凝沍我居豈不懐簡書苦相怖荒荒雪曉衝杳杳河夜渡風褰裾成帷冰結髯垂素衣單僕告痡坡峻馬自住人生難滿百太半委道路徒令傳舎吏旦夕煩視具疏理不耐寒辛苦欲誰語嘉鮮惟及時幸未薄遲暮清朝右文治遺賢深所懼當年收楩柟樗櫟還備數弱步勉馳驅遐躅敢追慕淵明止一邑曼倩多掌故涓埃既無報卜築定何處但期得真才持用拯黎庶風俗回雍熙帑庾日豐裕區區野人心獻芹復充賦試院感舊呈廷鎮脩撰栁道傳博士二考官弱嵗事佔畢嚌道慚未飫世故不我紓飢寒迫馳騖投身筐篋流弭耳恬衆遇仁皇詔求賢頑礦煩冶鑄墨瀋宥已多朱服仍郡署恩隆報曷稱才短進徒遽佐部冗莫治司言益無措適當化瑟更賔興切宸慮龍沙鄒魯均槖籥一機寓塗抹念昔狂盛典欣再與驅馬出都門凌寒劇膚愬顛風入虛牝萬竅恣號怒重裘力不勝毛髮尚淒豎賢勞分已甘得友况同趣彼美關西孫洒翰紛玉露文采照士林問學森武庫而我河東公星鳳夙騰譽冑館尊軌範鴻音發韶濩靈臺寶鑑懸五色詎迷誤蹇予獨何幸浹日聨髙步夜闌聆炙轂亹亹有根據騏驥受蒼蠅蒹葭倚瓊樹得竣須遄歸天墀待鵷鷺話柄留它年山林陪杖屨任城馬氏塋三百年矣諸公有詩請同賦漢陵鞠為墟唐冢餘茂草摸金既著稱飯含劇電掃伏火熄無光藏兵謾機巧而况齊民流盜發宜紛撓幸存復委去一再已莫攷任城有望族訶禁竟何道厯嵗三百餘松楸亦安好隆替運有移諷誦日淵浩猗歟曺翰林椽筆為摛藻勉哉求令猷來世庶永保次伯庸同年遷居韻卒嵗利深隩盛夏宜髙明相攸既兩悖塵闠仍前横况復游道廣雜遝來冠纓有庭馬難旋有齋筆難耕衣黔夜燎蚊腕脱晝揮蠅五畝數仞堂一朝羣美并堂後滿姬妾堂前羅聖經俸優食可肉是樂甘曲肱故園昔手植脩可換纎莖筋力人幾何盡用輸官程東山豈不懐顛崖奈蒼生従知金與紫何足為君榮天下多寒士萬間施須平可憐三十載韓子屋始成送王儀伯叅政赴遼陽省用王繼學叅議韻明良啟昌運英髦來百朋有美蚤馳譽不待文王興士林炯清致月露秋澄澄仁皇識偉器瀛洲快先登積厚出宜溥淵渟遂波騰霜空碧萬里見此脱臂鷹位崇節愈勵食蘖渇飲冰中朝著敭厯東維待規箴含生澤未洽大任須賢能途平矧車良天髙可階升我昔來京師夜雨惟寒燈相知辱最先讌談時或承既叨升斗禄祗覺予負丞清時猶海嶽涓埃詎能增躁進敢自省豐扗本難勝虛名百年苦燠室常凌兢何當有羽翼髙附南飛鵬題萬安劉桂平義塾作事驗行已當宜是謂義及物號若殊歸善實一致如何世有人食焉怠其事萬安夘金子獨善深所愧儒風嘅非昔挺挺以身係念兹士藏脩何異工居肆構築得爽塏爰作長育地兹山富清淑千古藴道氣渠渠出輪奐靄靄集衿佩登篋來不拒庖廩日有繼何民非堯舜何水非洙泗它年見達財慎勿忘所自題阿巴齊英甫山水圖嶄嶄翠摩空繹繹寒潄玉三生痼烟霞心賞非耳目浮雲不澤物乃此蔽空谷蒼髯五大夫似悔受秦辱應甘老巖壑世態任飜覆小橋俯清流有路儂所熟行當具扁舟沈竿測春緑雨中呈察院諸公雅志足衡茅軒纓非所安七年江湖上心與天水寛仲脰倏受羈又復逾桑乾遐舉負清時就列慚素餐用兹惄如飢并介良俱難鳳凰復我池獬豸仍我冠六龍狩灤水屬車接鳴鑾已甘眊筆誚答効誠曷殫退食坐環堵羈懐常鮮歡長風送雨來六月毛骨寒馬嘶􅦕菽薄僮怨衣裳單摵摵窓紙語瀟瀟簷溜殘佳人隔咫尺積潦生微瀾晤語遲不來浩歌成永歎獨坐念往躅挑燈清夜闌何當放疎慵洹水求釣竿子昂馬圖良馬可喻賢百駑不一驥銅式未易索紙上時目至涓人骨千金生者遂坐致世情好厚誣無馬談何易黧黄别皦皦求色不求意垂耳分鹽車幾與孫陽值趙公法曹韓拈筆出遊戲家法無不知喟然心有寄劉譯史所藏山水圖觀山有若無觀水無若有天機有無間著此三昧手衆史疇意領輪扁子莫授秋清纎滓盡勢逺凝睇久絶壑工窈深驚雲亂奔走浮天見洲渚擘石出林藪清游夙所貪塵濁動相蹂江湖迹已周嵗月坐白首端居念悠邈頓解營欲紐歸來復歸來山中有春酒樺陽谷以下十首次杜敬甫左丞山居韻世途劇羊腸坦夷隠詰曲幽人甘逺引茹草倚脩竹况公屬功成皇恩久深沐是宜拂袖歸髙與千峯矗大才生不偶蜿蟺鍾嶽瀆勤勞五十年芳蹤竟誰續天游寄遐心超萬立於獨有形皆土苴何物為利禄所以丘壑中翛然脱榮辱清泉潄鳴琴絶壁立寒玉不須在箕潁悟悦意自足行藏全兩途明哲保多福遂令樺谷名聾瞶聞亦熟林下拜老龎何年遂吾欲養浩堂萬物備於我悟此方為儒自反戒不縮舜跖皆吾徒聖人本無言得已寧有書後來口耳學鑽研成蠧魚豈知非外至天地吾本初正路舎不由安宅曠弗居揠苗謂得計蕪穢彌新畬先生積有素舒卷隨所如相業昔告成長嘯辭公車平生動合義天下知明謨世已蒙厚澤山林實良圖持養猶不替扁堂示區區堪輿自今古是氣無盈虛招隠亭激波象緑野峻嶺如山陰松檜昔手植兹焉鬱成林蕭蕭庭户間繹繹山水音以兹函丈地寄我萬里心北海尊不空日有朋盍簪子期已云逝甘對無絃琴淮南異趨向桂樹空清吟而我已了然但惜居未深誰能皓皓白坐受緇塵侵寄言膠榮輩斯樂直萬金歸哉勿遲暮蕙帳秋沈沈向日齋廊廟迹已逺葵誠殊未慵屬兹嵗律晚晴旭升曈曨靜翕絶兆朕天濶顔無風誰鞭火馭出忽以春易冬昔年事朝謁萬馬象魏東晨光射觚稜炫爛迷青紅九重一洞達六合皆沖融歸來斂手坐安此丈室中丹衷老益著翫愒嗟凡庸負暄豈菲獻調元有豐功想當俯前軒悠悠思無窮還將金鑾事説與田家翁貯月溪小溪瀦清深萬景入涵泳幽人心無營一笑知水性善淵耿不波相對兩俱靜誰於泓澄中復置透光鏡初疑磨爛銀又訝琢琇瑩廣寒在水府髙下巧輝映鵠臺多美人弄影鬭端正馮夷形莫逃吳質力已病相望咫尺間仙凡遂遼夐子知水月乎為子試究竟魄死明斯生川逝來者應觀變吾不知至理本素定長風吹野服恍若醉夢醒欲辯苦難名忘言遣幽興靜芳池緑池大㡬許水氣清書堂中有荷萬柄髙低互軒昂妍媸較顔色千載嗟六郎皭然君子徳淨洗時俗粧况復汙不染傳清逺逾芳濂溪説天口愛惡非尋常世間凡草木紛錯誰短長化工果何心不惜萬斛香桂棹碎聚萍菱歌促飛觴醉來咽花露錦繡新肝腸主人少陵後麗句分天章倡酬悉名勝吟幟來央央明年還此花未用愁秋霜比徳泉巧中逺媒蘖脩途謝推轂放情丘園中花草紛紅緑石泓出清泉天教潤喬木散流逺逾大百卉沾膏馥有孚君子徳取象豈惟玉月明咽清響宛若秋擊筑江海動能至須眉靜堪矚湛然猶我心纎埃莫能觸有時𠻳甘寒大笑謝領餗清濁付自然奚較纓與足彼有名以貪千載示泉辱而我方自脩貪㢘豈泉卜逝者如斯夫吾儕更宜勗代竹園此君不可無此語聞王郎千載與侯等貨利吾久忘但思貞勁節蕭蕭拂雲長風土奈異宜塵俗生門墻遂令偽攝真名以人遂章未觀花吐白先喜籜隕黄坐令尺五天化作王家堂薰風舞蒼翠陰敷酒樽凉世無鄙弱質河廣猶能杭豳風備蠶事曲薄材最良即用較名實初何愧叢篁平安不必報秋霜愈堅强鬬槲軒雙木老成魅偃蹇蟠蛟虯鄧林不肯往奔騰此來遊意若爭長雄相瞠何時休怒劇雷破山勢驅海横流又如新野戰犀象犇平疇剛風助驍勇白日山英愁前却久未分挺立誰拘囚念兹本散材匠石棄弗收老仙一題品勍敵真無儔八公使有此萬木應抽頭幽軒得奇觀作氣常颼颼霜飛巨葉隕棄甲鏊窮秋救鬬不摶撠忘懐為遲留貌此偶成詩誰令傳九州肄射平揖讓世云逺鳴鏑紛沙場百發信奇中教射誰在傍矢鋒羨相觸墜地塵不揚周阹亦失㫖鴻鵠難髙翔大禮肇三代名存猶餼羊侯明罔聞知士也甘面墻九京不可作矍圃嗟荒涼詭遇羨多獲孤睽眩先張憶昔親扈従此藝推精强一發貫雙飛萬騎空騰驤歸來東山卧左肘生垂楊爰求寛平地用作和容堂徳成藝可游教徳真義方方今闡文化盛治卑成康顧乃復事此不使鞬櫜藏珎重老成意居安危莫忘送蕭孚有歸廬陵并序先公官衡陽交邵陽羅巨海甚洽巨海宋進士國初嘗移書文山海上欲率義以従事覺下獄幾死出不復輕與人接但為義倉賙族里終其身宋衣冠論人才不少推讓獨稱廬陵方崖蕭公不釋口且言其分使安南以不辱稱僉廣西憲出部内贓汚殆盡平生當事奮前毅然特立力行不惑人譏其過不恤也有壬甫弱冠在侍下數數聞其語承乏御史南臺今平章趙涼國公居晴溪評前御史亦謂方崖最稱盖涼公昔以治書分臺浙省嘗與之俱劇地抨治尤悉其才曰升字孚有者其幼子也今年冬過予武昌春温玉潤出所著多可稱予喜為善之有後者聞之有徵也又悲昔之不識其面而幸今之識其子也孚有歸請曰先公辱知若是不有贈言是升見猶未見也予惟士大夫平居論議若甚可信一躋人上首鼠苟禄相師成風若翁之力行不惑可謂特立者也孚有惟父行是式為孝子為忠臣有餘師矣方崖壽才三十八展布未究而孚有弟兄皆力學膴仕諸孫玉立娟好天與善不已豐乎巨海行已無愧古隠君子其言可書也涼公視孚有昆季不替昔好而有壬於涼公又厚且親是宜有以贈之詩曰巨川有餘波喬木宜繁陰獲報期百年植徳天所歆行秋號肅物春陽發幽深慶源肆接派玉樹駢書林扁舟嵗年晚天涯有知音江漢霜已冰魚龍駭清吟倚門忽入夢奈此寸草心遄返固所宜遽别情豈任世業貴繼脩昭代無陸沈勗哉養器識毫芒竚千尋至正集卷四
