body:
  text: 至正集卷五十元許有壬撰碑志河間路重修孔子廟碑化民以學校承流以牧守治道之要者也四代庠有上下序有東西學有左右東膠虞庠之制雖質文家之不同所以明人倫為民極其義一也聖人得位而行其道於天下也則亦以是諄諄語人為千萬世之計焉後之人若不以師道自任而任於人任於人而近民者其唯良二千石乎古有之二千石千里之師職在宣美風俗夫宣美風俗舍學校何以哉而所為師者猶師之教弟子循循善誘化其質而發其善不務出是而惟獄訟榜笞是務是為師而讐其弟子可乎昔蜀有夷風文翁修起學官由是大化閩未知學常衮設郷校風俗一變夫以蜀閩之陋而二公一至翕然丕變况内郡熟先王詩書禮樂之化者乎河間古冀州之域今為甸服大郡總管非敭歴焯於時者不輕畀至元六年庚辰實皇上復科舉之嵗户部侍郎萬嘉閭出守是郡丁文風中微之餘士氣萎薾弦誦絶響慨然欲振起之相舊孔子廟殿宇卑陋配侑無所於設且堂構百年摧圮不支將撤而新之而施設有序明年為至正辛巳監郡塔布岱來起家胄館右文其素也故其議克協剡其事以請朝廷從之仍給楮幣若干侯復倡割其俸以佐不給僚屬和者相屬緡合二萬五千有竒或以嵗饑請緩侯曰食可去聖教不可一日廢况民食方棘而興作以資末技亦昔賢救荒之一道也於是市材庇徒傭直有加盛暑躬莅厥役吏抱牘就咨郡事口酬手署不少怠再踰月而落焉崇加一仞廣視舊増三之二黝堊丹碧不質不華配設有容左右秩秩翼以兩廡繚以周垣崇嚴靚深妥侑惟稱又為精舍以處師生時課其業諸生相與謀曰完矣美矣微侯廟其圮矣貞石之紀其可已矣乎走狀屬記辭不獲則語之曰夫子所謂聖人不得位而不能行其道於天下者也不能行其道於一時而能行其道於千萬世者也尊為天子富有四海宜享宗廟萬世之祝堯之藝祖舜之神宗文武之世室求之禹跡芒芒之中邈乎其不可考也其或廟以某地祠以某時官無常規禮雜不經吾夫子家而闕里國而胄監散而天下郡邑象設有宫蔵事有時盖其立教之功人報之隆與天地相為無窮我朝列聖致崇極之禮視古有加恪遵垂訓設學重教皇上方圖治儒術作新士氣宜侯之疲力秖承而不敢緩也新廟奕奕諸生在庭亦有感發而興起者乎聖賢之道具在方冊口誦心維身體力行勿怵於近利勿安於小成窮而獨善人且薰其徳達而兼善天下受其賜使世之人指而稱之曰某河間士某河間士是侯之望於諸生者也諸生其忍蜀閩之不若耶嗚呼侯豈自鳴其功者哉春秋書興作重民力僖公修泮宮常事不書然泮水之頌夫子乃存而弗刪豈無意乎則是役也不記焉不可也於是乎書故承務郎江西等處儒學副提舉葉先生墓碑承務郎江西等處儒學副提舉致仕葉先生諱瑞字宗瑞逺祖祖洽宋熈寧間廷對魁天下曾孫廷秀由邵武徙建昌新城春秋擢第官至朝請大夫知梧州言事忤㫖仰藥卒子逺宣教郎奉柩歸次采石而溺孫茂祖甫四嵗母饒夫人抱以依姑趙趙居而教育之因為金溪人中鄉貢進士舉娶趙生四子先生其叔子也幼尚氣節致力經學以及百家皆得㫖要其為舉子業不蹈時習或戒以希有司㫖先生曰吾為是區區而悖吾師説乎益篤志為己之學進士公卒先生甫冠貲產悉分弟妹而躬耕以食趙夫人卒兄弟四出先生獨力營泊久乃幡然曰昔親在不敢離親亡矣充吾學為揚顯者不力可乎歴甌越㑹稽瑯琊渉汶泗過潞入秦道晉以達幽朔無所遇最後至遼東世臣洪氏以好儒聞闡義學方難其師有以先生文行言於平章君祥右丞重喜者及見大悦館而師焉諸子彬彬以文學濟其世美遼東之人翕然知向學者先生力也朝廷以右丞薦授遼陽路儒學教授再調大寧路陞將仕郎江州路湖口縣主簿攝尉事盗久逸者皆獲之憲司檄按徳化縣疑獄即得其情覈虚糧決滯訟縣以治聞轉撫州樂安務提領俄請老授前官至順二年十一月二十五日以疾終於家壽八十有五某年某月某日葬某處娶趙氏生子順女適孔景仲繼黄氏生子升寕都州夏河寨巡檢女適湖口縣典史杜復亨繼王氏生子大有廕宜春楊橋務提領女適高安白沙寨巡檢孫鐵柱孫男三人縝綱繹女三人先生年五十始出卒能致官而行其學迹徧海内乃得返鄉里至於休致而終於正寢雖用不盡其施而教之振於東善之淑於人者多矣遺文四十卷庸學提要六卷周易釋疑十卷於戲博矣哉中原貢舉廢將九十年江南亦四十年有士少時先公教之曰金源分裂不事貢舉國家之大未有不行但遲速有時爾力學以俟當有際也時混一才二十年故老尚多幸及從學粗有得也尋以校職從事山北憲貢舉詔下乃弃而應薦先生實主文遼陽科制廢乆内地有所不悉遼陽在東僻有司一切昧於奉行先生纎悉教之盖江南内附時年已三十餘矣習於場屋條制者也監試憲僉田時佐曰微先生幾不能奉詔有壬既獲薦又入禮部經問之奥䇿問之切見者莫不駴異先生在湖口方鳴金鼔行江有壬歸省臨江遇之中流歡甚至順庚午有壬為兩淮轉運使先生惠然肯來年八十四矣飲食起居猶昔也手書大學中庸二書注字如蠅頭以與小兒留月餘歸明年遂没又八年升來武昌請銘將刻之阡兹銘也其誰宜為銘曰於戲先生志一學醇友善行道恥為鄉人昔隘分裂佔畢苟安四海既一我轍乃環有韞未暴賈用不售爾不我知我不爾覯晚慕㓜安片帆遼東有命自天皋比畀公俊造賓興墜緒孰繹紹逺選公張此東僻樂育嘉惠侏離伊吾糾邑司征曷究我書八十五年口不藥劑視身所遺根茂實遂旅無所容道路屏營歸來正首於戲先生故奉直大夫僉河北河南道肅政亷訪司事贈朝列大夫秘書少監騎都尉高陽郡伯韓公神道碑銘并序公諱居仁字従義姓韓氏般陽長山人曽祖而上兵亂譜逸祖諱温配段氏考諱國寶配劉氏三子居真居中季公也㓜耿介年且强仕郡守移刺曰舉孝亷二千石事吾封部有人敢黙不聞貢之司憲緱山陳先生長憲山東熟公為人禮致之行部必以從轉察院吏部益自砥礪大徳間朝廷勵精圖治慮澤不下流而情不上達也遣奉使宣撫天下故翰林學士承㫖中庵劉公分遼陽嶺北擇掾尤慎而公在選竣事多不職獨遼陽最他道陞御史臺掾轉中書右曹臺銓必流内官嘗試者掾屬他轉未出官不與公起家除山北遼東道肅政廉訪司經歴山北地近法不給傳公名貧苦特給之遼東控濊貉萬里事簡而重同官不慎者動輒齟齬裁其鋭鼓其懦和而屈之事以平允遷刑部主事時揚州總管兩淮運使構獄二人號嚚訟朝議擇才而健者鞠之公承詔偕省臺官行至即屈伏徴贓餘十五萬緡還拜監察御史賑濟南饑吏不得作姦民實被惠改樞宻都事尋僉河南道肅政廉訪司事按部衛輝推官者誣平凖官劉榮伯歐詈因擊萬嵗牌破墜入以不敬械獄中公明其枉釋之蒙古軍劉呼圖克岱爾爭畔折人兩脛醉縛舅氏截其一耳聚徒黨縱射獵毒里閈官不能禁督執之正其罪閿鄉郭女已妻李里豪馬賂其族誣先有約官將奪之公至而明葉縣民王女約嫁張嵗歉欲渝約女誓死靡他召二族諭以禮致期歸之按行至均州以疾卒於官舍延祐七年七月四日也積階自承直郎至奉直大夫得年六十有四平生之官不挈家為易退計捐館日惟子希范在側希孟奔赴奉柩歸以是年九月丁酉葬傒家里先塋配郭氏淑而能家公宦游祿僅自給夫人躬蠶督耕家以温飫子四人希孟中書掾及格歴工部主事都功徳使司都事中書省檢校皆有聲拜監察御史階第四品贈公朝列大夫秘書少監騎都尉高陽郡伯夫人封長山縣太君進髙陽郡太君希夷廕新城尉今㔌平主簿法當廕長子孫希孟讓也希曽肇州儒學正希范未仕女三人適張劉李皆士族孫男四人長克勤餘未名女四人長適段氏餘尚㓜皇慶壬子有壬以教官辟山北公寔長幕退食講誦休期登覽一日不相釋嘗曰子朱雲誰敢相吏公監廷試有壬登前列喜若已得沒十七年希孟具行實請銘嗚呼有壬尚忍銘公也夫而忍不銘公也夫士修已治人不患學之不博而患行之不逮也不患政之不達而患守之不勵也昔緱山明經為政終始不悖髙風勁節特立一時浮華違實依阿進熟雖累百於世世亦何望哉公始從緱山有餘力則講習問難卷帙不去手老亦不倦所造日深故觸事洞然盖有得也為人寛厚礪以亷恪自為吏危言直聲在人聼訟莅事恂恂開諭而恐人之納於過也風紀狃習徴罷號能一逮於臬枉直俱困公惟良惟情濟以哀矜謗讟騰鼓不恤也故能矯狃習之弊而直人之枉有古良吏之風焉至於風節毅然終始不悖其善學緱山者乎銘曰繄士為學匪博而華盍擷其實而刋其葩世方一軌狂奔景從我日斯邁惟理是同蚩蚩之氓諄諄之惠惠文束濕寕獨不愧稂莠斯㧞嘉苖培之威豈爾仇恩豈爾私按部有方歛此徳惠胡不究用俾大而沛軺車煌煌遽易以轜良心感觸誰不涕洏先塋既妥餘慶無畔表世益章用朂鄙懦故朝列大夫同知京畿都漕運司事王公神道碑銘并序公諱述字繼先姓王氏世居順州髙祖同善生殖金季貲饒一鄉雅不飲酒壽日人强之為釂得疾語其子慶常曰吾已上四世皆一子吾又一爾家財雖數世用且不匱所懼者子孫單弱爾吾聞惠澤可以徼福人貸於我者其貸書盈篋爾於吾前燒之明日卒慶常監順州東門歸聖朝為懷逺大將軍僉順州安撫司事三子瑜瑞琪瑜始徙燕四子天永天祜天祿天澤天祜封奉訓大夫大都路順州知州飛騎尉昌平縣男贈中順大夫禮部侍郎上騎都尉太原郡伯配馮氏追封昌平縣君進太原郡君三子長恭孝弟善治生㓜成早卒次公也㓜自振厲宿衛隆福宫積勞除利用監資用庫提㸃轉通政院判官中都留守司經歴同僉通政院事院罷改萬億騎源副提舉京畿運糧提舉禮部服闋起為大都路判官擢同知京畿都漕運司事積階朝列大夫至順辛未十一月四日卒疾革召姻族暨凡交游貧者散金有差得年五十八祔宛平池水原先塋配朱氏繼爼氏封闕太原郡君男六十九年十二公生長京國不汲汲於進起家五品迄捐館才四品嘗曰子所以仕急養志耳封澤及親足矣又曰予筮仕來四時九族舉在目前惟扈從北至上京繼仕中都南未嘗過盧溝不知人間有羇旅憂天地間幸人也所得既多故取官不敢復多取不負官而已占籍京驛為通政不私其宗中都始城大臣長溜鑰首擢長幕一時巡幸供擬坌沓刺割閒雅騎源出納鉅萬同僚嫉其潔欲誣構不能汙也京府實父母邦行所無事親若疎舉無怨言始終九轉皆以能稱交㳺多儒生禮法是咨悼世次之湮没請於清河元公作家譜知源流之所自多而不亂逺而有稽焉構亭蓄書畫古玩器賓至具肴酒必盡歡有壬為冷掾中都公實推轂謝之則曰子他日陶鑄我者也公之調後幸與焉承乏㕘議中書公已病有壬憂去而公遂不起爼夫人遣女奴挈其孤請曰同知將屬纊猶念念問公孤未有知未亡人聞諸族老不没惟銘知同知者莫公若也嗚呼有壬誠知公者也公之善非一其大則孔子所謂好禮老子所謂知止者公有之矣惟其有則有壬之銘之也可無愧矣銘曰千金比都鮮克自持矧家於京紛華蕩馳折節恭儉服膺訓彛不有定力孰堅不隳人亦有宦道途駸駸束帶立朝至於横金不出國門族華以歆養恬一室左書右琴大賙親朋談笑而逝念我睽離垂絶不置今我來思故人星霜過里懷舊云胡不傷禦務多賢族無急難永利爾孤公其益安至正集卷五十
