body:
  text: 至正集卷六十三元許有壬撰碑志武昌路武當萬夀崇寧宫碑銘武當均州山先名太和道流謂其峻極秀絶非𤣥武神不足當故更名武當勝國端平甲午兵摇襄漢均民走鄂深神徳不能忘鳴於官行武當祠於鄂為沖霄壇制使孟珙禱於神有齊安之捷易壇為觀葢復崇寧額也我元至元庚寅升武當萬夀崇寧宫地據雄峻鶴山亘其後大江朝其前雲闗扄深石磴梯危大殿髙堂傑閣危亭長廊縈帶通樓環匝百神胥宇羽流栖息壇壝鼓鐘學館庖廥轇轕錯布仰觀樓閣玲瓏在五雲中絶頂俯瞰萬間鱗集煙靄蔽虧若洞庭觀波濤目為之眩而山川形勝闤闠盛麗金碧丹雘髙下相輝玉京十二樓不得而見之此亦人境之洞天也泰定甲子又改作玉皇閣髙凡十二丈深廣相若由甲午迄至正甲申一百一十一年壇而觀觀而宫若葺故若建新幾人幾日幾工幾木而甲申之五月戊午掃於一炬洞真明道沖妙真人住持提㸃兼領諸宫觀事羅君大震職宫事餘四十年勞瘁已至時當弛擔而彼所謂刼運乃丁其㑹常情體解氣沮方偕其徒曹大坤等以已貲率衆力任其復而威順王實鎮是邦主贊尤恪重起兩廡甲子樓三十一間以其下内半為雲房嵗丁亥三清殿成深廣十尋髙九尺如舊制三之一又建𤣥天上帝殿聖像侍從供器靡不僝功而又作亭礱石以紀綸綍運機為藏以待禬禳餘凡締構日以就緒矣昔閣之成嘗屬予記亡友𤣥教太宗師閑閑呉公亦屢為言時待罪政府多事因循遂至今日乃己丑八月書來告其掇捨煨燼有成仍命予志夫所謂刼運者吾儒有所謂數也天地且有數人力之盛神靈之託有能出天地之外者乎其成其毁有不必究者已𤣥武之祠昉宋真宗我朝至元己巳龜蛇見於髙梁河以為𤣥武之祥為築昭應宫於武當之山若増而髙矣是宮之名雖主𤣥帝而巍然南面朝五帝者實主玉皇𤣥帝五帝之一也若夫北方七宿為水之神寓形龜蛇者世飫聞矣主之大者盍鬯厥㫖玉皇禮家所謂昊天上帝也以形體言謂之天以主宰謂之帝以功用謂之鬼以妙用謂之神主宰者不離乎功用而能妙用者也日月之運行風雷之鼓舞山川之流峙人物之生息皆功用之著者闔且闢於斯徃且來於斯視之而不見聽之而不聞則有妙用存焉先王之有天下也以為萬物本乎天故祀帝於郊圜丘以體其形蒼璧以象其色樂九變以著其數猶曰維天其右之其之為言不敢必之辭也不特此也羣祀亦然或求諸隂或求諸陽不可方所徴形狀索也自神仙好樓居之說行遂有作崇臺傑觀以俟之者嵩呼之聞巨跡之見真若可以形聲相接而像設濫觴於此矣其始也施之羣祀其卒也於上帝亦冠裳而宫室之矣聖人以神道設教上智昭昭無幽不通下愚蚩蚩既顓而䝉孰為民彛孰為帝衷可使由之而不能使之知也今號於衆曰帝以主宰言其不啞然笑者幾希孰與樹中天之華構揭上帝之髙居使瞻而仰之者舉首加額曰上帝臨汝無貳爾心由是而舍惡從善之心油然生矣是宫之建顯命靈躅祝釐芘民者固自有在而使民觀感日遷於善聖教之助不又多矣乎銘曰岷江東涘鄂城西壁疊巘嶟嶟崇宫屹屹天闗失守灰飛瞬息剥𦙍碩果復根定力嘘蜃倐樓琢璇俄室三華屹崪九光赫奕雕梁龍矯文瓦鱗集棟吻雄鼇䦨腰䳄霓疎櫺綺結飛簷翠濕碧霞騰虛流雲洞闢屛翳擁幢豐隆列㦸桂漿釃素蕙肴蒸碧靈霜清厲廣樂翕繹瑶草肥露玉華酣日紫芝已甲蟠桃行實祥鸞朝朝瑞麟夕夕𤣥龜左顧靈蛇右翼山川開朗神人愉懌物具阜康世允寧謐丕冐神休永奠人極伊尹二程祠碑嵩古伊川郡隋唐為伊陽縣我元仍金為州至順庚午知州李徳恭即縣舊治西偏建義學因地伊川祠二程夫子後至元庚辰幕官鄭文曽以祠卑隘又以伊尹之伊葢原於是謀諸守倅擴一祠合祀而倅州張𢎞贊之獨力當縣治中為堂三楹中像伊尹左右列二程工未迄者嵗壬午判官李禎収功焉翰林待制呉炳牓曰伊尹二程之祠𢎞請記其故於石夫聖賢廟祀當通祀者人不得而專也當專祀者人不得而通也通以道言專以地言若夫位不同時復不同合而祀之亦有說乎道同也地復同也則位與時在所不論已上古聖神繼天立極道統之垂尚矣堯舜禹湯文武以君兼師而接道統者也周公位雖隆盛臣也孔孟又位不及周公至於道統之接則均焉周公而前以道自任者伊尹爾處畎畆之中樂堯舜之道既而幡然任天下之重以斯道覺斯民一旦相湯伐夏救民任道行道與周公等韓愈氏原道言周公而不及伊尹何哉不獨伊尹也若臯陶傅召之為臣皆接夫道統之傳者而皆不及之葢歴序往聖冐於其君爾孟子後千四百年而有程夫子出得不傳之學於遺經辨異端闢邪說使聖人之道煥然復明於世孟子之後一人而已是雖叔子序伯子之言而叔子之道不異也兩夫子者有以接乎孟氏之傳所以繼往聖開來學其功又不在伊尹之下者焉禹稷顔子跡至不同孟子以為同道況伊尹二程道既同矣地復偶同則合祀一室禮亦宜哉學者希賢希聖行道而使天下被其澤守道而使後世有所述孟子曰近聖人之居若此其甚也是祀不獨崇祀而已焉有元故中奉大夫陜西諸道行御史臺侍御史宋公墓志銘至正庚寅九月十七日已巳侍御史宋公薨於滑之里第子訥走伻致辭曰先公將屬纊遺筆曰吾身後當求銘於安陽許公公實知我慎無以他人為封有日訥不敢違次敢以狀請昔公嘗介識者徴文不果為至啟手足猶惓惓於愚愚惟知生者弔知死者傷弔傷皆致命辭公父子雖不一接而皆知之銘不倍百致命辭乎公諱崇禄字夀卿其先由衛山陽徙滑白馬縣永寧鄉中東保林子里先塋在宋胡寨世不可考改卜里西原為永寧阡曽大父諱殷妣張氏而上皆葬舊塋大父諱徳仁累贈嘉議大夫禮部尚書妣孫氏追封京兆郡夫人始葬新阡父諱宣累贈中奉大夫河南行省參知政事䕶軍京兆郡公妣孟氏封京兆郡夫人公甫冠入京為故相康軍國左丞何聰山器重掾中書除同知樂平州事他境事難決者行省悉屬公復松江豪民曹孟炎瞿陶等匿田租四萬五千餘石錢三萬餘貫活常州饑民二萬餘户正饒之貧民代大姓輸納之苦調處州路推官甫閱月決囚數百平反陳明六曾崇三之寃擢江淛省都事嵗旱疫死者殆半沿檄入閩預収鹽課勸誘疑者得米三十八萬餘石以賑入為户部主事升員外郎節濫賞斥冗食言生財裕國之道樽節金穀以百萬計時議汰冗員公方自以冗辭中臺奏為都事屬省部事稽滯無筭臺奏遣御史檢治柄臣不悅因中傷公既直前枉復職以親老辭擢燕南㢘訪使有文綺之賜罷監縣之巧斂者一郡守之不法者二出清州民張仔等四十餘户之産於僧寺言斷事官之録囚失宜蒸収之敗禮傷化時論韙之災異封事言尤剴切遷潭州路總管三月決滯訟九百餘事用刑尤慎若保定黒驢之盜糧父白於吏潭州蔡千一之殺牛妻出其皮律同自首公皆釋之改都漕運使潭民詣闕請留者三十餘人拜江南行臺治書侍御史改山南道亷訪使威令行以親老歸除户部尚書不起親喪毁瘠踰制作新塋立世徳碑葬宗族貧不舉者十四喪服除除㢘使四川復改江西皆以疾辭畎畆中言時政七事闗陜旱荒起為西臺治書侍御史賜金緞以寵其行言荒政七事進中奉大夫侍御史時方限吏銓衡乏人請展吏至三品以通滯才未幾力請休致臺臣奏給半俸分給宗族及凶喪貧乏者年八十五言民瘼十事葢未嘗恝於世也疏封及親立石先塋構亭曰介夀日閱載籍事可法者手抄成帙纂東郡志十六卷紀史奇蹟十五卷出師表附録二卷公私宴皆不造㛰姻喪葬風雨必往肅賓客終日不倦教子孫以孝㢘節儉勤學睦親未病以所愛杖散親友薨之前二日取家傳歴履手自刪定付訥疾革櫛髪整衣端坐而逝享年八十有八是年十一月二十一日壬申祔永寧阡娶張氏追封京兆郡夫人生子謙世賞累官奉訓大夫上都萬億庫提舉先公卒繼張氏封京兆郡夫人生訥國子生戊子㑹試終塲臨州儒學正女二人長適邢臺縣尹李熈能盡歸道次適李寧早寡守節養姑孫男五人孝祖大名府史希祖領鄉貢南樂教諭彰祖廕太常禮儀院檢討衎祖鄉貢進士復祖甫冠女三人一有從餘在室曾孫男女各二皆㓜洪範五福一曰夀言有夀而後能享諸福也有廩禄為富無患難為康寧樂其道為攸好徳順受其正為考終命揆公自丞相掾踐歴中外至第二品中間退居者十三年懸車後又二十年優㳺鄉里著述自娯廩禄終其身夀濱期頥蓋五福之備者也而追榮前人孫曾繩繩又有出於五福之外者已銘曰浩浩昊天仁覆閔下俟於戩穀獨靳弗假翼而兩足角而去齒在理惟恒亦任厥委盈天地間總總而蠕有賤有殍有夭有鮮伊得其備百萬而一天豈而私天實而徳質今有人籍甚東郡根以天資濟以學問貳郡佐幕作牧持柄裕財濟饑獄寃以雪白頭畎畞敢忘帝力知無不言言無不悉校其忠藎不間仕已乃知在官當行肯止懸車養恬恂恂鄉閭春誦夏絃左圖右書天祚其誠夀幾其頥鄉為矜式士有質疑有亭翼然人去亭存藏萬卷書遺爾子孫書固公遺盍求公心我銘不浮公頌爾箴故處士劉君墓志銘諸生劉瓚昔從予政府葢欲蛻齊民而顯其親也俄以親老辭歸其父處士卒拜而泣曰瓚不仕無以顯其親志吾親之善使不泯獨非顯乎且瓚身自執事而後行故敢以凶服請余聞而悲之按鄉貢進士張冕狀處士諱士亨字希賢世居安陽孫平里祖父諱望配李氏父諱成配曰張曰李曰張曰程五子處士出李氏次特聚光祖尚絅處士矻矻力田父母年八十夙興必先省問而後治事未冠任家事衣敝食糲引洹水溉田樹畜以滋嵗入視舊倍蓰重然諾慎取與貨人不急徴遇親戚子弟必教以孝弟勤儉年踰耳順始構亭植竹為娯老計宻邇城市未嘗輕入孫平田多膏腴視它里直十倍嵗時歌鼓嬉㳺習俗好侈處士深自摧抑不為所移子弟有衣華服見者駭曰吾家素質何用此伏枕彌日衣者懼棄其衣始與語集賢檄為孝節處士至正庚寅八月十四日卒夀六十有四娶朱氏先卒繼娶趙氏子四長瓚也次璋瓊璣皆讀書女三適張吳郭孫男三尚㓜是年十一月庚申葬孫平里新塋嗚呼世俗欲顯其親者不過以仕孝子仁人之心不在是也修其天爵人爵從之顯在其中矣不量已力遺親遠出徼一命而卒不可得雖或得之而父母之産為之蕩然瓚幡然歸養怡愉以終其天年人道得矣瓚之得此處士之訓有素也銘曰力足以力事而獨施於田善足以淑人而獨及其子不事王侯是為處士編氓蚩蚩何敢與齒矧兹有託處士不死至正集卷六十三
