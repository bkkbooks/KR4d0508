body:
  text: 至正集卷七十二元許有壬撰題䟦䟦賀宏逺墓志永新賀宏逺沒其鄉人馮君敬宗出草廬呉公所為誌誌其童時能直叔枉疾不應科擬其文不愧中者司帑教邑舉能有為天苟引年當樹立大有可觀此誌者之不能不悲也予獨愛其事親而能娯失母而能䘮無愧於心矣無愧於心壽不足悲也敬宗諸書以慰其子又出其詩跌蕩清麗讀之如見其人予所謂不足悲者又不能不為之悲焉䟦鄭氏蘭亭蘭亭序世言右軍醒後更書數千百本莫有及者一手且爾則知後之木石傳刻者不能不失其真也余南北所見無慮數十手而同者纔一二豈昭陵本世不可傳所摹皆醒後書耶抑後之善學者自為之耶晚得鄭氏所藏本為差勝然不敢作退之大言姑書以俟知者䟦髙本齋詩藳仁皇懲吏百司胥史聽儒生為然而儒實者不屑為為者率儒名也承乏所寓即扣實者果無幾天機鼔動盖欲一掃宿弊且戛戛若是則人材之難不間于大小也予㓜僑鄂見掾於省者多俊偉士人望而重之由是而分藩持憲者相繼而見三十年來望之者日益輕僻居時見朋㳺盛言本齋高君之賢扣之儒實者也而又飄然謝去扣而實者益無幾矣將行出詩稿求書其端觀其詩益知其實詩之長行之潔諸公序之悉予獨有感於本齋者為書所見而期之䟦周益公而下廿四人寄馬會叔四十七帖周益公而下廿四人四十七帖皆簡鶴山馬公侍郎者也侍郎與晦庵友善徳望伏一時簡所稱非溢羙也而廿四人者林栗京鏜在焉尺牘徃來人情有不能免焉者非有私於子我之私也鏜後大拜而侍郎止法從予因有以見宋之不綱焉陵谷變遷國不能有其圖籍而馬氏傳守遺墨寶襲如新至侍郎𤣥孫之子武昌郡博士泰之又能表襮於世可謂賢矣泰之之子孫其尚保之哉䟦張子湖寄馬㑹叔侍郎三帖唐以書取士書以法晉故多造精玅宋人不及唐者不獨人不専習大抵法唐欲泝洄至晉而有未至焉李建中後蔡蘇黄米皆名家南渡稱張子湖朱子稱其不把持愛放縱九原不可作無從一問不知書法果如斯而已乎是三帖皆與同年鶴山馬公者也吾同年劉壽翁不能忘情者有以哉䟦劉莘老書金剛經劉忠肅公出處大節王嵓叟奏劄可見其平生剛鯁豈徼福於不可致詰之地者其貶所書佛經豈昔人所謂逃禪者乎觀者勿以日誦十部一語遂疑公也若夫是經之玅古今贊述備矣予雖未學佛長人豈欺我哉題舊寄高元用小詩至大已酉予旅食京師與洛陽高君元用共爨以食天大寒嘗複衾而寢有兩鬢煙塵朝共爨一忩風雪夜同食之句君笑曰此他日話柄也俄皆用茂異調校職元用餞予北而後南焉予赴遼州倅遇便郵繼以為君拈起當時語應見相思萬里心為四句寄之後雖踆踆南北有便必書而迄無報章每念一日見之當詰其後其弟元博佐興國幕謂予忘也謄以見寄予㳺長沙其子萬里持以來拜倒指二十六年元用奄逝亦十八年元用長予一嵗相從時才二十四沒時才三十八余癡頑閒話視元用所得不既多乎鄙言散四方人裂弃不少而戱語片楮什襲如新盖敬兄執弟也敬父執孝也孝弟萃一門有不熾而昌者乎予方悲元用之不壽而有喜元用之有悌有子焉元用不死矣題劉氏族譜長沙劉彦恭奉家譜請言由其本求其支茫洋棼錯殆不可知精索締視則某先某後皦乎其各有合也士大夫家貴知其族及蕩於兵宰相世系之隆子孫有不知其自出者况齊民乎士大夫家能有其譜者百不一二也彦恭之先世有聞人考明徳業進士有聲早卒彦恭相其弟某㓜沖于成譜之蔓衍後又可知己歐陽子用太史公史記表鄭𤣥詩譜畧上起髙祖下止𤣥孫多而不亂逺而無窮彦恭其亦究此乎予嘉彦恭能子故進之士子講學此其先者也彦恭勉之題劉先生所藏予青山詩元統癸酉七月予避暑江夏青山髙武肅祠有十詩書以遺友人劉君光逺同年歐陽原功既為䟦予京師歸光逺又請予自題其後癸酉距今七年年非甚逺而予中間待罪政府最乆上負聖天子下不能推毫髪利澤於人又不能自安其身於伴食之地當其鬭横議而孤立也若乘小舟而渉大海若抱漏瓦而沃焦釡蹂拂百至氣奄奄靳屬者屢矣原功學士議事常在列盖親見者也當是時也思青山之逰其可得哉賴天子明聖大臣包荒不加以罪釋之使歸得見舊跡為幸多矣既以自幸又因以自勵焉詩非佳也光逺不投之江為我藏醜乃什襲之則凡後有所作其敢苟哉非欲持是又以求售也覬其頗工以歌頌太平於山間林下不徒為山水之役而已也昔約原功㳺衡湘原功歸而予在政府今予歸而原功在翰林光逺其里人見當為我申之約苟踐詩當百陪青山矣姑書此以俟題歐陽逕存詩訥庵中執法口歐陽逕存不釋謂能候人脈審貴賤吉㐫無爽予既識而徴之益信其術之異一日論方技及星命學則又所精者屬有采薪憂推原精㣲指授湯劑所苦尋愈談𤣥養生皆號有得雖己訝其多能而直以術者待之最後出所著詩文一帙丐一語表其勤文古而法詩清而腴始知其為儒而㳺於方技者也噫世以一人之毁譽一時之見聞遂以為盡其人其不合者衆矣逕存所著當代名筆叙之詳矣予特哀其不遇而以為長育人材者勸庶有合焉逕存曰吾老矣將歸賣藥鄉里不復出矣予曰世之如君者可勝道哉觀是或有激也逕存曰唯題羅善先赤壁賦漢嘉羅慶善先予為淮漕時掾也儒雅縁飾翹然如野鶴之在雞羣嘉木之在蓬藋衆人遇之不忍也除建寧照磨地官辟掾善先曰與我跼蹐凡穴培植一級豈若安吾一命盡吾所當為者哉即日歸待次維揚予嘉其去就之審而復自喜昔者遇之之厚之明也予南歸迓予召伯埭從至儀真日且浹予將泝江出東坡赤壁二賦四軸前賦則困學鮮于公書後則松雪趙公書請曰先公在江南名勝争内交此二公駢竒合羙以奉先公者也公沒慶昆季在㓜賦遂失㳺金陵見之王氏家上書先公字如新不覺泣下加其原直而得焉徼一語記之後子孫將不敢墜失予聞知書者我朝字畫趙松雪號獨步至於行書困學實轢而過之松雪於是極力頡頏而世之議者盖自有優劣焉二公皆一時書學宗匠也乃共書二賦以奉羅公其所與可見矣公名光錫字漢臣號玉泉子少力學負氣節至元間為尚書省都事轉兵部郎中與時相不合即退居西山耕牧自怡構亭玉泉扁曰拄笏其寓意有在也㳺江漢呉越終于江南予嘗悲世家子先世丘隴有不得保者况圖籍乎父沒而不能讀父之書手澤存焉爾况父之字在其上者乎手澤在焉字在焉委之他而不恤則亦忍哉禮遺書藏之廟孝子仁人之所甚重者也若善先者可謂孝矣孝而移忠吾又知善先之能顯其親矣能顯其親視字之在書者益彰彰矣善先其勉之題莆田黄氏族譜宗法廢而族姓之辨興氏族之志立無乃違其原柢而即其支流乎經殘禮壊其亦愈於已乎人一身其來尚矣少而至於多近而至於乆則不得不分分而益多以乆至親盡而為途人勢也使多而不紊久而不迷則圖譜之作可少哉唐宋士族亡其宗譜名門右族莫究世次宋歐陽公因采太史公史記表鄭𤣥詩譜畧依其上下旁行作為譜圖百世不易之法也雖其言稍過於激議者取其大可也而乃指擿詆訐猶法家括索真少恕哉武昌水陸提舉莆田黄君出其族譜自晉晉安守元方而下迄於今簪纓世家絶無而僅有者也世逺系紊固或不免視世之漫不能究其先者有間矣諸黄自叙其譜者元豐而後濟濟有人因其語而有以與之夫世之能世其世者世其徳也非爵禄之謂也富貴烜赫未必華其宗而謹徳力學不墜世訓者休光可百世也惟其發之於既盈不期而至不得已而出措諸事業而不悖揆之世訓而有光其庶幾乎若夫少不齒仕流為憤恨以譜圖為入仕急務非所望於黄氏也提舉試以語諸族人將有感於予言者也䟦胡安常所藏坡字坡公論顔魯公書謂古今之變天下之能事畢矣而天下後世之識者不能有異辭匪服其人服其公也坡公此帖盖有得於魯公者鮮于伯幾以為魯公争坐之流其真知者哉六一翁辨瘞鶴銘不類羲之筆法而類顔魯公知此則知坡公此帖有契於魯公也思陵以㝠合天矩觸塗造極歸之通儒而世之以優孟為孫叔敖者又不可同年而語矣䟦盍正甫所藏元裕之諸公手簡正甫提舉所藏前軰墨迹元公裕之姚公公茂王公以道杜公善甫凡四家皆與其先世手簡也三復之餘竊有感焉若元公之學王公之才杜公之逹固無間然矣九原可作吾其從雪齋乎題歐陽同年叙祁母傳古列女無傳傳列女自漢儒始厥後述者凡一言一行可儀表閨門者悉紀録之以備史氏之采擇其或史氏采擇有所不及則亦託於名能文辭以附傳後世若祁母劉氏之有傳是已余雖未見其傳而讀歐陽同年叙可悉其為人未嫁則履前言以修内行既嫁則承宗事以謹婦道不幸而兩失其所從則樹碑表墓以究其再世弗克為之志平居訓其子若婿則曰富貴不可以驕人唯力學為立身之本璽書復其家則曰往役義也不可以苟免嗚呼可謂賢矣先公為女教一書以婦徳為首若劉氏之言之行亦吾家書之不可少者哉故録歐陽序藏之而提其要若是云題許彦栗琴道書院卷右琴道書院記䟦賦詠凡十三家抒其深發其蔀各有説焉末及予拾其遺者諗之曰昔桓譚善鼔琴著書十六篇號新論末篇曰琴道未成但有發首一章肅宗使班固續成之則是知琴道者莫譚若也然光武令譚鼓琴好其繁聲宋𢎞青之至謂鄭聲亂雅非中正者則譚之於琴道如斯而已乎予方無從質疑而得彦栗焉而不知彦栗之於琴道也琴而道乎道而琴乎判而二乎合而一乎譚謂琴通神明之徳合天地之和若然則道蔑加也繁聲果能累之乎必有所折衷也昭氏之鼔琴也昭氏之不鼓琴也譚不及與之語而有望於彦栗焉題蘇伯修治獄記世之為爰書訊鞫者亦知有所本乎典謨尚已西京號隆治而廷尉府盡用法律吏賢如兒寛謂不習事不署曹然而決大獄也雖以張湯之愎不能不博古義者其亦不能違所本乎予觀伯修叅議治獄記而重有感焉伯修儒也為御史南臺録囚湖北寃者信罪者得為右司都事治夏秋冬官其重在秋其畫諾平允宜哉愚復入待罪掾抱案議三事一謂居停盜或寓其物若它罣逮捕吏乘隙攫其財不可揭以不得舉他事當聽其家人告一謂囚有指逮而他治不即追捕致盜逸獄滯當定其罪一謂辜限有定制不當用近例破成法法司可之以布中外乃伯修為吏部尚書時所陳者也於是益知伯修之賢且能丁其會則為之身有所見則言之在朝哀矜根諸中欽恤見於外不有所本而能之乎昔譏儒不習事今尤甚焉譏者非也來其譏者何也使皆如伯修人皆譏之乎國家患條格樷冗莫知適從有勅刪修伯修今叅議中書實在其列是書之成尚有望於伯修也愚昔叙名臣事畧以為有出事畧之外者盖以史期之今也又有望於條格之外者焉可與言而不可與之言失人伯修以為何如䟦首科貼黄皇朝貢舉啓于太宗定于世祖申議于成宗而決行于仁廟乙卯首科得五十六人而臣有壬忝其一殿䇿復玷前列中實駭怍賜宴玉堂知貢舉乃讀卷平章政事臣李盂讀卷叅知政事臣趙世延集賢學士臣趙孟頫皆坐禮方洽呼臣有壬前平章指叅政而語有壬曰始子䇿第高下未定叅政言觀此䇿必能官請寘第二甲吾不許寘上復掇下者至於再三又指集賢曰學士見吾輩辨不已乃立請曰宋東南一隅每取尚數百人國家疆宇如是首科正七品取多一人不多也乃從之吾謂此卷何人而使吾數老人争論終日拆名後當觀其面目吾非市恩掠羙也使子知其難耳子其勉之臣有壬謝而復坐然亦莫究其詳焉得請南歸監察御史臣宋褧行部過鄂出廷對卷讀卷官擬進貼黄凡廿九帖而臣有壬在焉始知以䇿切於救荒也視貨校直益重悚懼切惟愚縁階是十五轉遂待罪政府曾不能報其萬一而國家百年論議二十年已行之盛典一旦廢罷數竒罹蹇適丁其會尚欲膠榮靦面見天下士哉聖賢在上一時為覆盆之蔽者亦已就殛文運其不逺復乎復不復未可知而七科已得俊傑不少必有能収功桑榆非與臣有壬憒憒苟禄嘗試無效縮手而歸者比御史甲子進士也方年富力强顧不在兹乎臣有壬衰且病矣山林之下獨有拭目盛事詠歌太平爾臣有壬題此卷之明年朝廷更化科舉取士詔中書省集議舉行召臣有壬復叅知政事既視事問所謂集議則具案故在而其為集也如摶沙然及其集議不啻聚訟今丞相爰立其議始决臣驟由西臺都事入為翰林侍制㑹試御試臣有壬洎臣褧實皆與聞其燕而竣事焉回思始題卷時可謂幸矣山林之下詠歌太平此其時也故再叙其概於後云至正集卷七十二
