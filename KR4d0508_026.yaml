body:
  text: 至正集卷二十六元許有壬撰絶句謝祐之桃花折枝天台不折一枝歸晴日明窻有所思流水亂山迷去路按圖無語看多時令狐學士金蓮圖九天光彩動金閨輦路風香樹影齊却笑漢家恩數薄只教天禄待青藜和李惟中僉事行部十首湯湯十里失津涯兔穴盡為魚所家援溺慙非濟川手海天猶幸可乗槎滔天巨浪幾千尺郡邑隄防亦漫修畢竟為魚天不忍而今四海總安流水可亡人亦糞田官曹日見簿書繁欲令讓畔囘澆俗虞芮誰能作九原聖人在上不為災巨雹從渠挾暴穨消遣閒愁須藉酒年來多病不勝杯林深逸足逝無蹤不遣周阹一掃空赤手於菟猶可摶山棚誰道便無功弓矢禁嚴乃課民納獐鹿天家食貨定丕基封畛雖分貴兩宜水部大農猶可念莫教條例及三司露處風餐飲犢丸繡衣行部不曾閒但將一念求民瘼休問九重深帝闗謫仙詩筆千鈞力方救飢民席不温囘望林慮好山水一機雲錦負天孫昨夜狂瀾復舊流一方才免陸沉憂朝廷有道民輸力水部微功不用謳號飢萬口久嗷嗷撲火猶能未及焦使者眞如洞民瘼清風明月播天朝次解之昻寄來韻二首塞垣霜露報寒深誰識羇人去住心縱有重裘且難禦敢將絺綌受攻侵消磨歲月雙蓬鬢收斂風烟一草堂千載是非眞可畏墨卿無口解評量題遺山樂府墨迹銀蟾渝魄景星微閒殺天孫織錦機囘首蓬萊三萬里綵鸞猶傍五雲飛錢舜舉漁樵對話圖水碧山青罨畫中維舟弛擔忽相逢人間話柄知多少只恐烟村有暮鐘太乙宫待張彦輔錬師不至和繼學韻二首聨鑣日晏出黄扉目㫁長空倦鳥飛不是道人歸不早我曹多事自忘歸京國三年負草亭眼中空翠擁雲屏琳宫今日見秋意風色蕭蕭月滿庭右二絶句丙寅歲八月十二日作丁丑四月彦輔請再次前韻以記歲月故山林樾鎖岩扉誰遣沖天試一飛明日桑乾逢杜宇多應徧告不如歸時予將分省上京歸去求田旋築亭醉來乗興自書屏仙人知我思家意不遣雲山出户庭題趙閑閑書東坡太白贊謫仙人品世無倫况得坡仙重寫眞千古懐賢寓竒筆不應更有捧心人宣和乾鵲科石圖宴安遺鴆九重虛吮墨含毫思有餘奪盡天真才小巧苞桑磐石計何踈李唐春牧圖花鳥春風藹筆端趙黄胷次不酸寒李家却解陳三業只畫春郊黒牡丹贈眼醫杜仲文老禪生具正法眼外物幾時能晦㝠只有阮家煩妙手莫教為白只為青陳元達鎖樹圖極諌能教必我從按圖千載想英風都俞吁咈勲華遠却使王臣效匪躬贈梅隠氷玉叢中著此身世誰充隠復誰真暗香莫遣輕吹去見說人間無好春題息齋竹經進而賜臣下復歸於李氏者曾捧清風上九闗人間驚睹翠光寒不知雨露深多少直到而今滴未乾題張圖南思齋操持有九舉其要念慮至三將反疑試看如愚坐忘處幾多功力到無思題趙秉彛所藏宋好古竹千畝雲深幾萬竿月明留影印琅玕佳人心事誰能識日暮西風翠袖寒雪窻水墨蕙為秉彛賦一幹勻排五七荂紫檀心緒碧雲襦世間不具涪翁眼誰識山林士大夫淵明漉酒圖平生心事在黄虞豈意人間有寄奴歸去一巾猶漉酒宋家冠冕定泥塗神山雜詩二首山留殘雨濕拖雲竹引鮮飈細漉人詩思清如寒水玉休教落紙恐沾塵窻扉九夏鎭長開一榻無塵地有苔怪底山禽栖不定竹林風雨送涼來次黎東山鳯栖别墅韻四首風漪翠舞躬耕稻雲錦紅酣手種花杖策尋君迷不得有書聲處是君家松氣遠侵書几潤竹隂清過酒樽涼有兒能了家庭事何用紛紛更五莊七里原頭營别業三間堂下有東籬霜林不盡天如洗都是山人未了詩書傳諸子有萬卷産比中人無十金老瓦盆空猶不寐霜飛月墮覺寒深贈龍明初山泉始出清如許山下塵泥變濁流要見泓澄鑑毫髪直須窮力泝源頭題廖如川雨竹洗玉池邊秋滿苔濕雲香滴翠痕開此君豈識為霖事惟待丹山老鳯來都門柳都門四十里青青幾度迎人幾送行老子有言來汝柳只煩相送莫相迎書所見二首陵坡野菜緑如鋪膚受方期宥老榆菜少人多挑掘盡有榆從此盡無膚田園賣盡及兒孫少壯流移老病存一段昇平好圖畫人間惟欠鄭監門雨二首雲漢方憂日藴隆神功誰辨笑談中歸人不是天涯客一任蕭蕭夜打篷烘衣婢子嗔篷漏挽索傭兒怨路泥口腹累人猶未免老農方此望雲霓夜次館陶二首三老趨程不憚勞船頭坐看月輪高烟村漁火微茫外一簇人家是館陶浦雲林霧鬱蒼蒼水面無風晚自涼今夜蓬窻應不寐計程三百是吾鄉即事二首幾家門繫釣魚船一陣風香燎麥烟畫出太平村落景酒旗多在緑楊邊遠浦客帆明冉冉前村牧笛響嗚嗚園桑葉盡蠶成繭庭樹隂濃燕引雛舊縣觀水迹二首千里郊原大水餘偶教磽瘠變膏腴只言二麥連雲秀不道田廬蕩已無浩浩湯湯記去年樹梢留得辨桑田千村萬落乗舟去直到大名樓閣前出郊見柿園如江南橘林落日郊原秋滿烟煌煌星火爛將然一時喚醒江南夢恰似洞庭霜後天同克哷和叔游西山途中口號二首人人載酒具盤飱盡說監州昔有恩和叔嘗監林州底事當途羅几案只愁旌斾過柴門城郭囂塵厭徃還出城依舊不能閒野人豈識予心事只羡丹墀第二班題墨竈寺方丈東壁四圍嵐氣濕人衣五馬行秋弭節時莫遣鳴筝響空翠恐驚猿鶴怪歸遲次雪山上人韻雲埋墨竈久無烟散作晴嵐簇馬前白石清泉有今日黄塵烏帽笑當年出山次前韻黄葉紛紛落滿衣山僧扶袖下山時莫嫌款段非良足老子行山正要遲谼峪寄可行弟千巗萬壑鬱蒼蒼葉正殷紅菊正黄莫訝荒遊倦囘轡要因高處過重陽遊善應宿儲祥宫次元裕之韻五首絲休羡附蓬麻鳯鳥還來訪竹花昨夜山翁宿何地水雲深處玉皇家溪山好筞一枝籐學得襟懐淡似僧舊習掃除猶未盡留詩聊用記吾曾幾處青旗映小橋村醪時用慰無聊我來本是逃名姓莫為題詩更自標猿鶴烟霞日漸親黄扉人已作山人只應堂下潺潺水能洗東華舊染塵琳宫夜靜覺寒生霜碧澄澄浸月明滿耳驚湍不成寐四山雲樹更秋聲善應泛舟郡西風物皆吾土十二年間恰兩迴不棹􅘑船醉今日溪山渾似不曾來傑古愚上人奉詔歸山墨名儒行迹雖殊進退中間見讀書一覲清光便歸去古人政自不曽愚康申題馮致遠畫卷丁丑攜以來謁次韻歸之世情物態日悠悠一别囘頭七八秋畢竟人間有歸處江湖初不厭予舟半生蹤跡徧堪輿與世求踈尚未踈可惜淮南招隠賦不知中散絶交書至正集卷二十六
