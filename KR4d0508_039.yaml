body:
  text: 至正集卷三十九元許有壬撰記靜庵記中臺總憲分二臺西南而錯置廿二道於天下其任若地莫不重也道之置直行省者六直宣慰者七直路府者九而鎮有宗藩者四宣慰下皆按部省則抗矣加事大藩則任若地益重矣有抗有事惟滇與鄂爾滇遐裔而治聽稍簡鄂據山川之重當荆蜀之㑹人俗慓悍司憲繩紏尤難其人髙昌相閣實理世榮由奎章閣學士長憲湖南尋移湖北任若地益重人方觀其設施而乃不專威刑不煩文詆治其内而外自化行乎上而下不犯不知任若地之益重於前也燕坐有室顔曰靜庵請記其名靜之為義淵矣乎寂然不動者其體也無極未判不見兆朕而萬化出焉故冬不閉藏則無以遂三時之生成夜不晦冥則無以發平旦之清明專而後直翕而後闢持之以敬養之以無欲則酬酢事變泛應而曲當矣一接於欲能不撓乎撓而不已則去道逺矣冨貴利達之鬬於中聲色貨殖之眩于前鬬而能以義勝眩而能以理遣者鮮矣善乎周子之言曰無欲則靜此入徳之要也且事物之來紛紏膠擾白黒短長曲直之未形衆喙啅噪簧鼓于其側萬狀顯晦鬼昧乎其前耳目不為之變心志不為之掉者幾何人哉當是時也存乎吾者湛然虛明猶止水不波鬚眉可燭路雖千歧而惟正是適棼雖萬緒而惟一可理靜之功亦至矣乎故曰不能靜者不能動惟靜者而後能動也世榮早歴華貫在奎章予實同官尤悉其賢當廿二道最重之任而行其所無事其有得於靜者乎推此道也鈞軸機務之繁皆有以應之况一道乎管子曰靜而能制動靜而制動管仲猶能為之而况不為管仲者乎樂善堂記天生蒸民其情莫不就福而避禍以福可樂禍可憂也心非狂惑孰肯就憂而避樂然世之儚儚焉日趨於憂而不悟者何哉私意蔽其中物欲誘其外也嘗念人生百嵗雷電不足以喻其速所貴於生者樂爾而世之樂者或紓朱懐金髙牙大纛而不思盡其職或拓田華第厚殖珍貨而不思取以義或任俠跌踢意氣自負而不能檢以法或狂誕遺世虛無髙逺而不能揆以理不盡其職則責繼焉不取以義則怨萃焉豪而不制則敗放而不反則亂曰責曰怨曰敗曰亂其為憂至矣聖人疏食飲水樂在其中顔子學聖人簞食瓢飲不改其樂道之在理之得也士之勵行者毫釐之惡不萌於心跬歩之頃不離於正則吾一身豈不體安而氣平乎事親而能孝事長而能弟撫下而能慈則吾一家豈不上和而下睦乎其施於人也大而陶宇宙於泰和小而一郡邑舉受吾惠至於窮居不見講道讀書俯仰天地亦復終日欣欣盖所為皆善則無所往而不得其樂也東平王蒼之言曰為善最樂此之謂也鹿崖邢公蚤著才諝歴臺閤出典大郡歸因世居撤弊搆新宏敞合度題以樂善徴文其中有壬佐吏部鹿崖為正郎能盡其職者也其得為善之樂者乎晚始得子風骨可愛易曰積善之家必有餘慶則又將及子孫而無窮為善之樂庸有既乎書以為後人勸瞻緑亭記蘄水東橋曰緑楊蘭溪掎之清泉迤之眉山長公游訪地也山曰鳳棲乆庵潘君隠焉居之隙悉樹以竹子西溪搆亭其中扁以樷翠西溪子仁彦賔請于迂軒凉國公公大書瞻緑以易其舊於是持以來請曰仁得公翰墨為榮元老尊嚴不敢復有請願剖其義有壬伏觀公之筆法遒嚴而又窺其取義之逺也其有取義於衛風瞻彼淇澳緑竹猗猗之義乎竹之為植君子貴之所寓不同焉得其外者昧其内識其粗者遺其精一碧萬竿沐烟滌雨氷玉不足以喻其潔逃俗之士棲遲寄懐者取焉不過為景物役爾昔之扁是也其體之不撓節之不渝善若至矣而大者未盡焉若夫觀感之頃資以進脩其詩人之㫖乎昔衛人美武公之徳見竹生美盛發而為詩不徒美而已也繼之之辭曰有斐君子如切如磋如琢如磨謂其學問自脩之進益也三百篇一言以蔽者心法也六義多草木淇澳之竹獨以興為學者教法也猗猗而青青靑青而如簀其進有漸而其成有至乎所以示學者入徳進徳明且要也子貢引之而見稱大學申之而為傳其示人之㫖益深切矣古之為學一日在世一日不已武公年九十有五猶箴儆于國以求戒訓其學者百世之師乎彦賔壯年進進方未已瞻其緑則思其興之託惕然自警景物滿前不能吾役也今以注書為風紀知薦調寳慶儒學正惟斆學半仕優則學予尚有望焉南山亭記貴溪夏君明進既葬其親南山之陽遣子元棣走京師請曰南山去家財五里山形廻環風蔵氣完良田下抱清泉流潤冬夏不竭左右暎帶嘉禾脩竹竒峰怪石不可殫數作亭其側以為拜掃休息之地一言之則榮幸及地下矣余聞而復之曰而父卜宅兆而葬其親禮也予尚何言然予習於葬者也試為子言中原地厚而夷易措也大江而南山水居地七八甌窶汙邪又居半故必慎擇其地一域之内僅一竁或二三爾否則必有水泉螻蟻之患嵗時展省東西馳騖甚有至他郡數百里外者其亦不得已也哉昔朝議欲天下通行扶葬之制而區區抗論以為不可者其以是也孝子卜擇得佳地逺近不校也得佳地又近其居若明進可以為說矣若夫嘉木脩竹竒峰怪石亦有與於是乎人子有終身之䘮四時變易隨地感觸况見荆榛蔓草酸風苦月有不為之心摧肝裂者乎木也竹也峯也石也亦有可說者乎昔人以思名亭朂其孝而益其思得名之正者也南山之名因其地也親葬之地聞其名親斯在焉况即其地乎即其地與親邇矣况登其亭乎况觀其扁而提撕之助益有所感乎則南山之名其有益於孝思者哉若是則木也石也竹也峯也不能撓吾之思矣不寜不能撓吾之思也將由南山之扁亦有以發吾之思矣顧孝子之心所存何如爾元棣歸以語而翁請以是記之如何元棣曰唯書以畀之一中堂記吳君之文佐郡有特操作邑有惠政任劇有剸割之才為兩淮轉運判官予實都轉運使俄入叅議中書其自脩之功不知也予自政府得請南歸其子允拜予汝水之濵以昔尹文安去思碑拜而請曰翁歴履此其槩也維揚終更僦屋以居有堂題曰一中所以自脩而教不肖者不敢弛也徼教言歸獻翁必樂允庶幾養志萬一哉余善其請且知之文之自脩不侈於小成欲進乎道義之域為之說曰一也中也聖賢道綂之所係也果有見於二語乎將有見於一之中乎抑用力而一於中乎若夫有見於一之中則邵子所謂一中分造化者也一為主而中其内也用力而一於中則中為主而一其力也之文其用力而一於中者乎中者無所偏倚無過不及之名也存乎内者得其正發之外者無不中矣存乎内則造次顛沛之際念兹在茲無少間斷是之謂一也發之外則飲食起居語黙舉措無往而不合於中一其力以致于中致于中以驗其一希賢希聖事也况淑一家而效一官哉世之耄於鉛槧而汨於醉夢狃於薰習而安於淺陋者未有問道於是途者也其有問道於是途不以其道之正告之而姑就其所能使之𡨕索背馳以終其身者則亦不仁之甚哉語不云乎可與言而不與之言失人予於之文不失人矣追逺堂記亞中大夫彰徳路總管致任盍公旣葬之四年子承務郎襄陽等處營田副提舉可大即其居作祠堂顔曰追逺語不云乎慎終追逺民徳歸厚矣懿哉名也可大能慎其終斯能追逺矣然逺非一義也况族大而逺者乎盍氏自隋唐居上黨五季板蕩遷臨漳莫詳其世六世祖浩至彰徳公秩然有序而上黨馮村坵壠故在地為磴級與山髙下凡百餘畆老松五百餘株碑剥落不可讀子孫尚四十家可大嘗往展省㑹其族而不能序其次也臨漳田村之兆喬木古柳鬱乎蒼蒼浩生琡琡生鉉鉉生圭仕至彰徳總管府經歴葬安陽司空原六子第三曰居仁生渙彰徳公也守磁州有惠政盍氏之先居上黨不知幾世而遷于臨漳自臨漳又至安陽兩塋之族不知其幾人又舉上黨之族而計之則不可勝計矣臨漳吾族也上黨亦吾族也舉不可勝計之族而泝之則其始一人之身一人之身而至於千萬人勢也推千萬人而至於一人則其為追逺至矣固不可以服盡親盡論也説者謂追逺者祭盡其誠此可大之能者又曰逺者人之所易忘也而能追之厚之道也以此自為則已之徳厚下民化之其徳亦歸於厚此余所望於可大者可大年冨力強致力於是其志可見已故予不敢以常人望之而摭其家乗之要申以追逺之大者為之記以復其請焉後之追逺者將取法於可大矣一真堂記達為良相窮為良醫地不同活人一也非其良則殺人亦一也人病不同惟良醫為能知其冝故在膚而汗滿實而瀉虛者補之髙者越之慓悍者為按摩滯痿者為導引寒奪者為炙􅌊攣痺者為鍼刺實結者為砭不仁者為醪醴而血氣凝泣者又有熨藥焉盧扁既逝法多不傳行於世者獨藥與針爾又有趨其簡要獨事針刺者其言曰藥有真偽人有貧冨地有城市田野之殊時有兵荒寜謐之異必藥療人是求三年之艾於一時為此言者明其術亦足療人視古毉道則未備也太師竇先生之未遇也懐其學無所施憫人札瘥針法極其妙施諸治療莫不即愈兵荒中活人不知其幾及見世皇陳三綱五常之道人道旣立相安而並生其為活人又什百千萬於針矣天下之言針者一以太師為宗而標榜求售者皆自稱門人焉因多病得請歸首以詢醫為事卜居上夀里有牓其門曰毉者方自喜幸俄白首儒服携酒來行里門之禮乃老毉博文張先生也博文之師教授鄭璵子玉者嘗館太師于家真得其傳而博文則親傳于子玉者源之正流之不沲故施於用其效可必也家人有病者博文診之曰此不必藥當自愈又曰吾藥攻病無病不可用也凡毉必出藥為攫糈計且曰無病當備吾藥可預服也有當病而不藥又教以無病不藥者乎博文其賢矣人言博文喜用酷烈劑聞而質之乃曰遇其疾即用其劑遇其病而不用其劑則與無病而強之以藥者等矣予聞而益賢之有堂扁曰一真請為之説真之為義大矣哉針法得其真則治病不謬診病識其真則用針不忒製藥得其真則施用不悖無所往而不一於真而又始終濟之以一心之真則活人之功又豈下於相哉余待罪中書久盖深有愧於博文者也書其實以為記且以識余愧云筠齋記泰定丁卯先公捐館京師先在江南者夸山水之勝勸扶匶南且賙以地京師者則曰西山有佳地子南北無恒産不幸罹荼毒於斯斯亦妥靈之地也亦有指以地者而鄉里士大夫則不然其尤有意者至忿然曰子欲子孫浮華則南欲因京師富貴則北我知者父母邦爾荒迷中神魂無主三議鬭胷中太夫人泣而言曰我平生作夢無一不在鄉里兒其决哉議遂决既藁殯走湯隂拜先塋不獨苦澇而亦狹不容竁矣從教授緱君允中改卜焉安陽城西山水靡不履歴始得武官原洹水之陽今阡而定畫遷措皆允中為之允中學儒者也盡去俗師荒唐禍福之說壬申太夫人歸葬得其人益詳蓋外方内恭安命之士也戊寅予得請歸請記其齋曰筠者余知其安於所遇而驗其才可施用束於冷局也扁筠之義其有不可自揜者乎古今人例喜言竹居必種植詩必記興其性若節言之備矣以言其用則簡牘箭笴篪簫笙簧筐篚篾席䌫維縢絡之屬皆事也而其用之尤切者筠焉記言竹箭之有筠筠竹膚之堅者也竹寒暑一致守雖在節禦捍襲護使不能干其内則筠之㓛焉若篾席筐篚䌫維縢絡獨析其膚爾肉則薪也而簡牘箭笴箎簫笙簧雖膚肉俱用膚或有損則為弃物矣人謂允中幽閒曠適託於竹而已不知允中可施於用若竹之有筠也余不能施允中於用念其有力於先塋記其詳以志其交之始聲其才以待世之用者焉皆山亭記昔宋之不綱也權臣握國軸以軋善類鉗天下口盡斥異己者而人心天理詩書功力浹人肌骨有雷霆不能怖賁育不能奪者焉當時時文弊極世因一以爲無用之學特庸人急禄者所為爾豪傑不屑也故有假對䇿以痛斥時政力詆權姦死生禍福有不恤者謂時文盡弊可乎廣信熊松能信甫咸淳辛未中省以策忤賈不預廷試賈旣敗以國子正字召辭至元後戊寅其曽孫光來京師始奉家乗求記其父皆山亭余因得其世焉信甫從湯文清公讀書交謝叠山以氣節相髙既為賈擯隠居石梁山下着書誨人學者尊之稱為石梁先生先生生應制伯韶甫丁南北始一之㑹以琴書娛其親或勸之仕而屈以吏辭而歸石梁先生没作樓所居之東號曰對山盖石梁在其前對山如見其親也伯韶没子子良仲英甫作亭曰皆山亦以志其孝思而名之之意則主于石梁焉龜山龍蟠在其東西山雙峯在其西欝乎在其左右前後也孝子之心身之所在親之所在也故于羮于墻皆見焉况親之所居名之所屬而日接于目者乎自石梁而為對山自對山而為皆山皆山之望對山對山之望石梁皆此意也而天下之山皆可感觸雖無山之地亦猶有山焉非與世之役景物而標牓自髙者比也余聞石梁之髙不過數十仭有泉出其麓流而為溪灌田為膏腴者五六十里其亦有所象乎初石梁先生以正學勁氣不屈於世而能力詆元惡召為國子正字不就而流澤汪濊子孫蕃衍詩書世濟其猶石梁之出泉乎而當時諛者子孫盛衰吾雖不能悉究而亦可必其不熊氏若也熊氏自江陵遷洪曰宗尚志甫者政和中登第仕至中奉大夫樞宻院檢討南渡後又自洪遷廣信信甫其五世孫也居是者二百年至光則九世矣又能章父之孝詩曰永言孝思孝思維則則熊氏世有之矣至正集卷三十九
