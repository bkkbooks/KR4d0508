body:
  text: 至正集卷五十一元許有壬撰碑志贈中大夫僉太常禮儀院事輕車都尉追封樂安郡侯諡惠肅孫公神道碑銘并序河東山西道宣慰使高唐孫公致仕家居年七十七矣其子亞中大夫江北淮東道肅政亷訪副使天正卒於官既葬有司上其行實請易名於朝宣慰公走書屬有壬曰我族蕃衍而我惟一子我幸健俾仕四方雖不在側志樂也今則我當死不死吾兒不當死而死矣情之所鍾殆無以自釋獨有可以垂之不朽者得所托焉吾其遂可少釋乎吾兒昔與子遊子其銘之按孫氏其先益都壽光人諱嗣翁者金末戍襄鄧遂居洛卒因葬焉配張氏生德遷高唐生殖日盛徙洛葬髙唐故又為高唐人配胡氏生居仁宣慰公也起家新昌丞平大盜知名踐歷華要階中奉大夫纍贈嗣翁嘉議大夫濟南路總管上輕車都尉樂安郡侯張氏樂安郡夫人德中奉大夫山東東西道宣慰使護軍樂安郡公胡氏樂安郡夫人天正字夢符妣宮氏贈樂安郡夫人繼母蘭氏封樂安郡夫人始生宣慰公兩夢神人授白麻丈曰宣付孫天正因名焉為人狀貌竒偉嗜學頴悟宿衛於仁廟潛邸大德丁未立東宫僚屬擢從仕郎受文庫副使選補太史掾監修國史掾除中書省管勾承發架閣庫宣尉公為右司郎中例避改都護府都事蘭夫人卒河東泣血奔赴毁瘠骨立護柩歸葬廬於墓側服除知沂州三皇廟湫隘至三日命改作民吏難之既而規置有法不三月而訖功臨沂縣去州逺吏得延緩為姦徙之州左捐俸倡率以賑歲飢立法均役以革吏弊墾闢荒田招集流亡朔望率校官諸生講誦廣社師以教都鄙季月舉孝弟力田怠惰遊食各一人春秋行縣躬核之臨沂民妻徐甫二十喪夫自經以徇有司四年不以聞得其實上之報下旌其閭嶧州豪曹誼奪細民田凡三移不為直郡以屬公立決之既去州人刻石思之去五年益思之又相與請文刻石政遼陽省左右司員外郎揚歷治效灼不可掩於是臺除僉山北遼東道肅政亷訪司事廣寧劉大使誣承殺人辨而釋之人稱為神明俄拜監察御史劾權近斥竄之文宗嘉其直每進見字而不名擢江北淮東道肅政廉訪副使行部多縱弛犯科將大懲之而一疾竟不起至順四年二月二十七日也得年五十以某年月日祔先塋元統三年春贈中大夫僉太常禮儀院事輕車都尉追封樂安郡侯諡惠肅配劉氏贈恭人繼張氏贈高唐縣君今夫人董氏封高唐縣君二子曰琮曰璋一女尚幼嗚呼豫悲夫天之生材成之難而毁之易也又悲夫子不得銘其父而父乃銘其子也孫氏三世同居而惠肅又能睦於族孝於親出為良牧守入為才御史宣慰公之樂世無有也惠肅嘗欲敘次宣慰公行實未果而在其身者一旦反以纍之以垂老之人罹兹荼毒其可傷也夫雖然得之天者吾不得而必之修之身者苟無愧焉則期頥不為多而五十不為少是蓋有幸不幸焉君子不校也銘曰孫源𨗳洛實猶濫觴浚而擴之滙於高唐至河東公日底昌大惠肅承之舉以沃溉惠肅之生天兆其祥受知仁皇受文為郎二十七年於中於外雙碑植沂百世遺愛驄馬載驅豸冠復峩清濁自彼吾其靡他茫茫淮甸荆棘塞之我銍始揮云胡折之易名以諡隱卒以封施用未究子孫其逢哀哀老親遽委而去存沒無愧修短有數於昭斯銘貽訓將來父兮子兮是亦可哀故忠翊校尉廣海鹽課司提舉贈奉訓大夫飛騎尉漁陽縣男于闐公碑銘先子佐永州幕祁陽監縣于闐公實同時其子赫伯舍登乙卯進士第有壬實同年同仕於臺又同僑于鄂一日請曰赫伯舍不幸早孤先人功烈幾泯矣幸及故老十得一二而墓碑未刻子其銘有壬惟世交義不敢辭公諱喇嘛丹以字噶瑪拉丹行于闐人也于闐自漢通中國至公始為氏焉祖諱鄂爾伯什斯巴薩哈見為諾爾罕牧民官父諱穆爾阿里大名宣課提領至元十三年宋平擇守令大臣以公見世皇稱曰巴圖宜邉境用命監永州祁陽縣縣接蜀廣多溪洞頑梗所冗稍失御即跳梁攝尹土豪羅飛素橫常有功守將劉匿不上十四年遂弄兵襲劉嘯衆至十萬公間道赴州遇賊四至射刃七人馳出從者數十人獨周保持馬尾免守州南門賊攻北門敗之獲其佐周遷三十人飛環而攻我既却守將追之公偵知有伏約炮發夾擊俘戮殆盡擒陳瑞於木皮寨賊起五月參政呼圖克特穆爾始至公率先深入繼以大兵獲飛戮之實其皮以徇賊所署令簿尉以次授首主帥將屠縣力爭得免命招撫得户一萬三千出石空步匿岩穴將死者四百餘人十九年飛黨黃如瑞稱宋年據縣西躬入降之得户一百四十初飛欲害公公已入郡如瑞殺公假弟納蘇拉迪音姊壻堪布及降不校也四望山界四郡林谷阻深二十二年賊賀九六盤穴其中四省兵討之公焚山堙溪身為前𨗳詹一子據黃羆嶺作亂兵將因欲屠之公曰脅從且免矧良民乎我其長也當先即刑主帥許生致渠魁當免乃赤手步入賊始未信刃槊以迓公徐進無懼色鋒擬面尋閣兩肩公曰我以身保汝出即兵解不信留我以質賊投兵羅拜曰天活我也留從者唐正以其魁出師遂還建議也種鳥符大水戍低城大橋棑山息饋輸鎮險惡從之湖廣省臣貪虐意公竒貨下獄幾殆既縱復攝邑父老爭餞飾小兒歌聲公之寃省臣誅遂已公以黃羆嶺極高險當驛衝暑行尤困作粥食過者自夏迄秋嵗不輟主帥憲臬屢上功輒寢調廣海鹽課提舉大德元年三月二十日卒桂州年五十有九治命葬祁陽北原娶伊爾根氏先卒繼蔣氏賢而讀書事公姊如姑討賀之役陰遣勇士張甲率五十人給兵以從後公十年卒二子沙海布迪音出周氏蔭道州行用庫使赫伯舍出龍氏四嵗失母蔣氏子之為御史贈公飛騎尉漁陽縣男蔣氏龍氏皆漁陽縣君僉浙西憲移湖北階朝散大夫公身長八尺餘勇而有謀蹈危不懾為縣十八年人號長者撫而活者户萬三千六百四十為鄉民長子孫可勝計哉然壽不六十位才五品爾僉憲按黔中當蜀有警諭土酋止還卒招鄉兵伺變守險號令精明人謂有父風焉諸孫種學日大以蕃嗚呼天道之有知者固自若也其有功邑民家能道之戰陳之詳則遺老無幾僉憲自浙歸及見張甲暨老兵鄧義輩得事為詳又尋病沒甲亦老矣豈非功烈之在世天實不欲滅之而使僉憲及聞也不愈於有善而弗知知而弗傳者乎銘曰惟天生才惟才用殊才可大受而用或拘為邑孔卑遊刃有餘頑獷鴟張我長乃攎弦歌未洽戈戟若林捍患禦災我力我心嗟嗟赤子亂豈性常獸驚波傾乃底滅亡免胄攖鋒赤手搏虎彼心亦人其忍豫侮誠感機應厥角若崩萬命嗷嗷垂死復生于屯于戍于田于耕十有八年惠浹政成降年不永有藴未究豈嗇於身以大厥後民子而孫何日忘之我不公忘公無我遺故僉書江西等處行樞密院事贈樞密副使護軍雲中郡成毅公神道碑銘并序仁皇御極敕太史傳功臣罔俾湮滅復下令訪索遺逸家許自陳遼州達嚕噶齊額森特穆爾上其父僉書公行實且請易名於朝致和九年贈鎮國上將軍樞密副使護軍追封雲中郡公諡成毅妣欽察氏楊氏皆從封雲中郡夫人乃詣有壬請銘請碑謹按太常之議而筆之曰公諱伊德默色杜爾伯特氏父諱台世役宿衛世皇徇鄂公以驍勇扈行有警必前賜白金綵段名以拔空攝阡事征李璮以勞入侍上嘗陰視諸衛士腰帶見公所佩精備命佩刀糾諸士息州將請督戰官宥密臣枚舉不允賜公虎符海月符金鞍玉帶以行宋戒嚴金剛臺衄其鋒戰捎箕窩中流矢墮馬易騎復進大破之所向克捷遣子納琳請城浮光召入面畫可之賜金鞍一授昭勇大將軍光州等處招討使光既城總十二萬户攻陽羅堡分鎮黃州立驛抵汴徙潯陽以扼江西下南康瑞昌德安分攻洪州章江門不克呼敵諭名將親登城敵請入約降日公自往譙其久抗王師其守列槃曰大江已失此堅閉畏罪爾明文示宥當即解甲為請於帥如約受降撫州援至敗之土坊遂入撫並下建昌撫賊張青阻險莫制偵知賊娶賜宴所居夜趨七十里破其柵獲青俘其族脅從輩悉縱之樂安詭降既入兵亂出窗户退則凳几填塞里巷前却創甚竟獲其首崇仁宜黃皆降偕它帥分道取閩約集建寧所至如破竹三日約兵始至黃人叛公方赴贛帥府以公舊鎮威名素著俾總江西兵往討復之麾下無敢縱掠民感德為生祠初湖廣兵屯樊口公言形勢不利其將鄭不聽果為賊劫溺死公之入也得其虎符賊中奏報遷鎮國上將軍廣東道宣慰使進輔國上將軍江西省參知政事同官誣搆左遷昭勇大將軍招討使入見自明賜給豐腆校𨽻賞擢有差為罷行省改鎮國上將軍江西道宣慰使以直前枉移參閩省尋復江西往來閩廣平邵武取漳州潮陽番禺下汀梅循惠分寧董竒樂安貴早小洲黎德弄兵蜂起悉敗獲之上欲立行樞密院徴天下省一官入議公對稱旨遂僉書江西等處行院事院革入朝上深撫慰議以名城休老會疾作不起至元二十四年三月二十日也春秋七十葬定陶鐵渠原子六曰拜特穆爾後衛親軍千户曰竒爾濟蘇特穆爾曰納琳襲公舊部明威將軍萬户達嚕噶齊鎮建昌曰囊嘉特能左右騎射曰額森特穆爾始監解州移遼州改同知咸平府事封奉議大夫曰布格蔭昭信校尉同知江陰州事饒州路判官孫闕人公為人持重性尤敏悟譯傳剖決纎悉曲當有壬倅遼熟監州言先烈南臺行部過庾嶺居人往往能道公事雖驛郵移置靡不有法昔宋不綱我師之南也曲長偏校皆將帥才况佐元氣而握元機者乎公早以才器受知世皇謀濟其勇樹勳赫然其生而顯榮沒而崇異宜哉銘曰皇元繼天盛德朔基維春始艮動闢以時淳渾鍾才景從輩出有若成毅桓桓惟朂賚恩匪私曰能是任拔出偏裨簡在帝心帝曰往哉息師汝監裹創摧敵城光蔽南郡邑望風降畏不先何獨彼洪孤壘岸然我戰爾知我名爾熟沍凝晛消顛危命續黃人鼓疑渠魁乃殱畝棲不驚廟祀孔嚴伊閩與越指期蕩攘紛紛螳怒轍敢臂當于蕃于宣功浮厥位原抵深茂流長實遂播美有史隱卒有章我詩既同百世其昌贈嘉議大夫濟南路總管上輕車都尉追封博郡侯鄂通公神道碑并序惟鄂通公在女真為貴族世居遼東天朝混一立賢無方揚歷華貫者接武中外廣西道亷訪使呼圖嚕既位通顯制贈其祖鳯住亞中大夫東昌路總管輕車都尉博平郡侯父高山嘉議大夫濟南路總管上輕車都尉博平郡侯祖妣舒穆嚕氏妣二王氏皆博平郡夫人乃出其家乘請銘諸碑按濟南公髙祖呼沙呼金兵馬統制都元帥以功封澤王戰殁曽祖呼嚕內外點檢權樞密院祖薩哈鎮國上將軍京西等處兵馬都元帥考即為東昌公襲其世官穆昆從宣宗遷汴壽八十一卒三子公以長襲穆昆義宗播蔡邑行察平僑東平主帥録其世時其衣廪東昌給地五千畝宅而居之承制除高唐知州東平控郡邑五十四金谷户口棼不可理檄公稽糾宿弊一洗為州有惠政嵗丙辰卒官年五十有三葬聊城之柏林娶王氏先卒繼王氏子六人曰納丹珠山東道統軍司知事曰瑞童曰慶童曰安童曰文敬曰武略將軍同知漢陽府事致仕曰呼圖克婁起家衡山縣達嚕噶齊轉臨桂興安尹治最拜西臺御史移南臺歷簽副凡六道廣西言岑雄無叛迹制為寢兵而雄竟招出朔北辨死獄杜宗起二人寃江西折分寧若磑之害舟楫者十所浙西賑糧虛十萬石民吏雖壞産莫償為盡釋之彰疸罷行覆迹屢最擢佩虎符廣西宣慰司同知副都元帥改本道亷訪使一年棄歸中道有旨若曰鄂通為得用人縱年高衆不為例其勿致仕賜金段二升正議大夫而明哲知止去志浩然矣子托克托蔭承事郎同知常德路龍陽州事孫男曽女若干人嗚呼盛哉昔金源氏奮起東北奄有中夏亡且百年世無其史故家遺俗存復無幾稗書間見非龎失真則暗不彰好古之士慨焉公之先由統制而下世繼樞要其豐功偉績計必炫耀一代史之所録不得而知之公再啓厥家至亷使又能推恩九泉表揭世次其所以揚天休播先美者不在於兹乎銘曰宋綱解紐金職夏盟苗勃水沛孰遄厥成曰惟景從扞禦輔檠云胡百年寥闐莫稱懷襄胥溺有孑維禎自天迓續顛木斯萌錫田啓家分牧著能嗟彼文獻吾猶及徴混混其源翼翼其承於粲繡衣脫節益貞顯隆敢専及先乃榮大哉亭毒逝者猶生百世川至繁祉是膺勉旃繼序監此刻銘至正集卷五十一
