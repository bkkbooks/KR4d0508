body:
  text: 至正集卷八十元許有壬撰樂府念奴嬌中都送韓岩夫歸大都南鴻過盡正龍沙嵗晚嚴凝時節朔吹翻空沙石走一夜坤維凍裂宇宙茫茫山川杳杳千里飛隂雪停驂囬顧壯心未信如鐵京國十月先春杏桃無數破煖應開徹此去佳㳺知不負醉裏雕鞍南陌糞火爐邊簡書叢裏肯念飄零落故人欲問此情正待君說二賦螢更闌人静正滿天晴露半庭斜月時見飛螢三四㸃樹影依稀相隔暗地偷明微形自照冷熖明還滅有時分亂殘星流下天闕應念造物多情翻騰變化腐草還成物多少黄萎隨土壤争似超然飛越我正清貧寒窻寂寞頼爾成勲業案頭乾死也勝零落霜雪賀新郎登滕王閣用稼軒韻陳迹空鳬渚悵繁華等閒一夢便成今古佩玉鳴鑾人如畫何處為雲為雨只明月還生春浦帝子當時無窮欲奈浮雲回首渾非故天有意肯輕許江湖襟帶雄呉楚更翩翩三王文采儷章駢句一旦飛来韓家筆才見龍翔鳯舞漫千載懐人延佇豪傑紛紛今誰在笑世間華屋争寒暑瀛海遠去無侣二次呂叔泰南城懐古故壘空如渚杳無蹤朝臺暮榭燕歌趙舞為問人間繁華夢幾度邯鄲炊黍只燕子春来秋去太液勾陳何由辨似咸陽一炬成焦土興與廢竟誰主滿川芳草迷烟雨悵平生楚騷心事更堪羇旅野水芙蓉香寂寞猶似當年怨女長嘯罷中天凝佇滄海桑田尋常事附㝠鴻便欲飄飄舉回首後又千古滿江紅次湯碧山清溪木落霜清水㡳見金陵城郭都莫問南朝興廢人生哀樂載酒時時尋伴侣倚闌處處皆樓閣對溪雲試放醉時狂渾如昨沙洲外輕鷗落風帘下扁舟泊更寒波摇漾緑簔青箬為向九原江總道繁華何似今涼薄怕素衣京洛染緇塵從新濯二次李泌州見寄韻徙倚危闌愛四面嵐光翠濕回首見踈雲黄葉遠林平蹟老眼都迷秋遠近壯逰已徧天南北有一官更比在家時添幽寂人間世天涯客喚李杜招元白問鳬因誰損鶴因誰益有酒直須拚醉倒古今長短嗟何極笑韓非孤憤若為多常填臆三同前一夜繁霜便染得乾坤澄寂秋滿眼蕭蕭雲樹淒淒風日山色偏供羇旅恨年光肯為英雄息只寒華不減舊時香天應惜官況薄勞耕織詩律在森戈㦸更山城容我清尊瑶瑟不是皇家勞結網姓名底用人間識喜使君時有一箋来雲烟濕四和郭子敬夏日村居韻一曲清溪収拾盡風聲月色還自笑六旬將近數椽方葺已分封侯非燕頷儘教有地争蝸角筭人生難得是清閒吾今得離離黍芃芃麥覩此景皆真樂更葵花未謝榴花仍發繁劇只因詩有債迂踈却喜門無客問小亭盛暑不容人今秋月石州慢次張凝道韻足跰塵囂目厭紛華擾擾蜂蝶撃壺未了長歌又聽陽闗三叠平生湖海可憐牢落新豐蓬山回首烟霞隔鵬鷃不同天任焦明蚊睫愁絶停杯為問羲娥幾度東生西滅俯仰金臺陳迹千年誰接天空秋老倚闌南北悠悠暮雲汀樹人長别想見苦吟時滿呉江楓葉二送牛農師赴石州學正少日襟期不信儒官能把身誤長歌拂袖南来眼底雲霄平歩黄金㪚盡三千流落京華區區又上并州路官冷坐無氊任虀鹽朝暮今古男兒萬里封侯休嘆雲萍羇旅我亦倉皇明日携書北去居庸闗下蕭蕭風振柝鈴酒醒夢覺君何處畫出斷膓時滿斜陽烟樹金菊對芙蓉宿程松壑月香亭次韻曉夢初迴餘醒未解月明猶掛踈桐在月香絶頂穏駕天風喬松勁竹髙寒地還容得幾朶芙蓉霜空放眼水㾗褪碧山色添濃休問衰老詩窮把烟嵐奪取也是豪雄問今来古往誰異誰同老懐陶寫惟絲竹有捧觴林下丰容傍人任笑踈狂不減我輩情鍾齊天樂天津橋次韻深宫傅粉江東主肥鮮養成嬌嫩軟北望中原自分秦越儘付馬蹂車碾神州天遠笑六代封疆一毫無展更著荒淫月明瓊樹照同輦長虹誰架千尺要等閒盡跨人海深淺名襲東都侯封違命嬴得興亡流轉年光冉冉又走馬南来片時宫苑獨依闌干夕陽鴉萬㸃滿庭芳偕詧士安馬明初登荀和叔廣思樓沙路無泥栁風如水嫩涼偏入吟鞍廣思樓上雨後看西山回首炎氛千丈便長嘯跳出塵寰青天外斜陽淡淡倦鳥竟飛還郊原秋色裏望窮霄壤倚徧闌干問神仙何處獨占髙寒樓下悠悠洹水為㡳事不暫休閒吾衰矣休將舊手遮日上長安二槐院風清蘚堦塵静日長鎮掩衡門葛帷藤簟石枕竹夫人不作南柯癡夢要来往月窟天根花隂囀間闗幽鳥啼破一牕雲起来盤膝坐松風鼎沸花雪浮春便洗除胷次多少凝塵更喜秋原有秫快準備小甕清尊東籬下黄花香裏顛倒白綸巾三庚寅正月十六日夜獨酌戲成韻學本迂踈才非明哲天恩偶聽歸田良辰美景相遇更欣然細數人生行止或城市或在林泉都評過忘形適意惟是在尊前只今頭盡白但憐飲量不似當年甚糵痰媒渴無事招愆時有親朋来勸學康節微醉為賢先生笑偶當乘興又作飲中仙玉燭新題李伯瞻一香圖次韻清風林下寺愛三友聨翻世無能四凌波仙子香魂散此地是誰招此萬紅千紫惟礬弟梅兄二子堪共領嵗晚髙寒来成花部新史佳人玉潔氷清縱彷彿肌膚異香難似醉吟無次花應笑彼此消融渣滓春空鴈字不帶到江南情思還自笑今日相看袁家有姊玉漏遲同前次張夢臣韻雪晴天似水風清月白蕭然三子天巧難名鏤玉鎪氷無泚却是同心異種解歛聚山林髙致誰不喜花中隠徳人間真味邂逅粲者相逢似瓊珮霓旌九霄飛墜移入銅瓶付與野人􅑀几滿意按香嚼蘂有濁酒微吟相繼休喚起明日此觥重洗望月婆羅門引偕王仁甫左丞賈伯堅左司朝罷過李廷秀參議因觀盆梅遂成歡酌廷秀求詞醉中賦此紫宸朝罷東風吹到謫仙家貂裘抖擻塵沙一室牕明几浄人境獨清華有息齋名畫殿帥髙茶主人意佳道分手即天涯何事相逢不飲戚戚嗟嗟黄封旋拆有鵞腊雞朐與兎羓公不飲辜負梅花二雪夜宴沙班良甫家時為湖南宣慰使人家十萬春風先到使君家天公更助芳華盡把樓臺粉澤瓊樹映横斜要歌宜白雪暖借流霞呉姬趙娃亂銀燭影交加不放行雲歸去敲碎紅牙可憐杜老肯飛送江頭只岸花争似我夜醉長沙江城子次韻懶於沙鳥拙於鳩為無求得無憂㡳事踈狂却效子長㳺畢竟無求何用出求不得亦宜休西風真解釀羇愁試登樓望南州黄葉踈雲摇蕩一川秋更被誰家多事笛吹不盡思悠悠二飲海子舟中班彦功招飲斜街以此答之桞梢烟重滴春嬌傍天橋住蘭橈吹暖香雲何處一聲簫天上廣寒宮闕近金光朗翠岧嶤誰家花外酒旗髙故相招儘飄摇我政悠然雲水永今朝休道斜街風物好才去此便塵囂行香子同李元鎮晚酌張氏小閣碧月香雲小院重門辦詩愁多是黄昏梨花淡淡桞絮紛紛對古銅爐神品畫靚粧人半醉多羞一笑欺春有丹青描寫惟真秋波側媚雲岫輕顰是蘂珠仙巫峡女洛川神鷓鴣天次韻李沁州寄酒滴困檀槽碎玉聲青州合喚沁州名髙風未論陶元亮豪氣應吞阮歩兵明老眼慰浮生人間勢利一毫輕羇愁如海都消盡細和清歌帶月傾二同前甘滑端能壓蔗漿芳華初不藉山薑可憐太白分餘瀝遠與文園浣渴腸青𤨏闥白雲鄉百年誰與校閒忙何如常對松岩老萬事悠悠付一觴三縷篆烟消月滿簾青綾香減夜寒尖鵲橋誰駕銀河渡蚪漏應將海水添天漠漠恨厭厭不成鴛夢睡空甜一春多少相思恨瘦得腰肢分外纎四伏臘歸寧已愴然天涯回首路三千倦遊久賦王孫草寫恨應歌相府蓮天也老月空圓鐡心難受夜如年麝媒閒殺春風手想像顰蛾更可憐南鄉子醉書月香亭桂几老子分漁樵說著登山氣便豪天外長江流不盡迢迢脚㡳青雲歩漸髙兩手敢辭勞右有深杯左有螯我似淵明多一字陶陶明日黄花笑二毛二贈軋二絃胡琴髙才甫錦瑟思華年底用嘈嘈五十絃兩線清絲千萬調能傳句句分明字字圓髙藝擅華筵多少新聲出自然更著趙娘歌宛轉相聫消得詩人筆似椽三山水緑相紆好箇依山傍水居不是隆中髙卧處茅廬直挽岷峨入壯圖匡世䇿全踈只合歸来坐守株鄉里小兒從笑我非夫却勝携人共泛湖四波漾石粼粼浮磬依稀類泗濱回首林慮千萬丈嶙峋不效脩蛾一㸃顰幽討日方親林下何嘗見一人便把清流都洗盡緇塵領取羲皇以上春五次可行韻二首薄宦苦營營半世長亭復短亭一旦結茅當疊障雲屏朝暮隂晴幾様青濁酒瓦盆盛農父無才却有情好雨知時公到此安寧話到盆空月可庭六小隠遠民廛草舍三間栁作椽圍繞佳城才二頃山田便覺胷中綽綽然世態自争妍老我壺觴業自專地濶天寛容醉舞回旋又似偷閒學少年七和明初鶴飢韻四首淅米劒頭炊枵腹雷鳴出險詩詩客眼髙輕視鶴如鷄終是鷄羣有等威供飼不如期奈此瓶儲告盡時也勝劈琴饞俗子充飢窮餓相從更怨誰八沙礫不堪炊華表髙歌乞食詩不為啄腥甘趂逐羣鷄為伴書癡老竇威萬里在襟期㑹見青雲奮迅時吐故納新元有術偏飢奉瘞佳名却付誰九暑室困蒸炊呼鶴前来聼咏詩鶴告不餐空碌碌隨鷄諸僕無恩但有威雲海夙相期忍使清齋十二時主者不才今遣汝調飢騎去揚州定屬誰十塵夢黍方炊白鶴空中漫誦詩飲啄適時争得似山鷄敢效妖狐更假威曽與老仙期衛國遭逢彼一時千六百年才不食無飢我欲推窮倩阿誰臨江仙瓈江萬梅方吐而予来長沙風雪十日晴復大霜有懐而作十日惡風三尺雪繁霜又滿人間梅花誰與問平安玉肌清似削争奈許多寒夢繞琅瓈江上路竹籬茅舎青山莫教芳酒滯歸鞍黄昏無限月待我倚闌干踏莎行贈相士黄鶴樓前胭脂山上敲門有客来相訪自言閲遍世間人要觀塵俗酸寒狀闗塞氷霜江湖風浪歸来幸得身無恙君言雖應我方慚山中道士何勞相至正集卷八十
