body:
  text: 至正集卷十九元許有壬撰律詩七言五十七首省中對雨獨坐風土迎秋便作寒隔簾飛雨更班班可人几榻清如洗終日情懷淡似閒窗影天開千丈闕墻頭雲放一分山腐儒獨坐成何事寫出新詩亦强顔寄秉彛從軍苦樂不難明肯使毛錐負此生鐡騎蹴雲秋校獵油幢敲雨夜論兵髮應瘴癘催全白詩為江山助益清詔下凱旋今有日阿綿聞已候門迎紫菊和伯生韻天付幽妍處士花誰將朝服苦相加薇垣有露沾秋色芝嶺無霜抗日華蟹出更冝彭澤酒笋香誰羡建溪茶坡仙一語誰唆口鬲蔑只在姚家與魏家崇真宫葵花繞砌亭亭晝影閒相逢幸及未開殘紅粧洗露尤冝曉素性傾陽不畏寒聖化薰陶等燕越仙家培植有殷韓江山信美非吾土且向西風笑倚闌宿洪贊徐千户家再用舊韻半生塵土阻尋幽常羡幽人不識愁花卉地寒多及夏軒扉山近鎮含秋謀身未辦三間屋濯足何須萬里流此去此懷休戚戚好從髙士老南州喜聞可與至京鶴樓東北望燕城幾處關河幾日程四載三回勞逺慰兩都千里尚難并開書報喜身常健見我應憐老可驚咫尺對床風雨夜此懷多少待君評鶴磯解舟二首年來心迹已蹉跎尚恨閒門雀未羅夢裏雲開衡嶽曉眼前水落洞庭波三山黃鶴九天去兩岸青帘一棹過此去不煩漁父問酒闌當和扣舷歌沙羡湖上有漁簔又買南舟意若何城逺愈觀樓閣好天寬惟覺水雲多江山窮勝心猶壯塵土迷官鬢已皤不怕寒燈挑夜雨羇人今入散人科金口驛和董仲逹壁間韻二首不須荆棘歎銅駝且對溪山卷白波千載文章誰屈宋一天風物苦隂何詔歸自幸猶身健賈售從疑貨未多安得之人挽椽筆為豫揮灑醉時歌仲逹進士南臺察掾工於書從豫按廣東鄙作多所謄故云休笑劉才似疥駝却曽學海飲餘波老來拈筆聊復爾身後得名能幾何彭澤田荒攜酒少漢江船小載詩多故人若問南行事要續瀟湘欵乃歌宿鴈州和黃文復韻二首久佩葱珩從八鑾故人今始接餘歡蕭然華髮已呈老敝矣黑貂猶耐寒嵗晚江空知己在調髙絃絶嗣音難天涯儘有荒凉處政爾幽人興未闌透空漁笛一聲飛天水迢迢醉眼迷萬頃蒼煙沙鳥沒半規紅日竹雞啼徇名今古有薏苡行路江湖無蒺藜但得魚羮了心事等閒誰更析人圭泊茅步和文復韻二首少日身名恐陸沉因成漂泊到而今腐儒何預世路險故人不來江水深白鳥破煙三四㸃紫崖崩雨幾千尋茅舍竹籬梅正發天寒日暮負登臨一舟窮日走三湘忙每思閒閒又忙水帶雪來巫峽近鴈拖雲去楚天長賦歸後世知元亮干祿當時笑子張底事鱸魚偏得味幾年沙漠飯東墻茅步和劉光逺韻二首已知行潦愧長江猶抱初心不自降半世有詩多在客萬言無䇿可興邦霜風寒奪茅柴味澤國清傳欵乃腔珍重湘翁招我隱已栽松竹近漁矼片帆十里泝寒江湖海元龍氣未降萬頃風濤縻客棹一天煙雨畫漁邦瓶梅為我香浮坐尊酒著人春滿腔醉墨淋漓隨廢擲不煩為礎復為矼發臨湘和文復韻二首霜空鵰鶚任橫飛飛倦知還尚未遲商嶺老來芝可采葛陂歸去竹堪騎徜徉方外無何境收拾人間不盡詩坎止流行隨處樂何須三匝揀寒枝宋鷁從人笑退飛湘君有約怪歸遲雲間鳯鳥難羅致天上麒麟好借騎騷國幾回悲落木君山明日要新詩梅花樹下旗亭酒莫羡江珧與荔枝登嶽陽樓半空輪奐壯巴丘消得騷人一繫舟雲氣逺攜湘雨至湖光寒入蜀江流山川信美非吾土天地無窮有此樓三十四年如夢過可憐華髮賦重遊君山阻風兩日肩輿興未闌孤舟留滯亦成歡洲添沙出寺逾逺風卷水回湖欲乾醅蟻緑浮春破臘燭花紅落夜驚寒天將增飾君山景要我明朝雪裏看喜雪隂風翦水夜霏霏似愛遊人不遣歸山學湘君為縞素霰疑淵客獻珠璣花開萬木春難畫雲壓重湖凍不飛水玉光中棹歌起此行竒觀百年稀宿澧河口和文復韻二首白頭新自日邉來却愛荒寒野渡隈澧水縈紆龍尾動湖天空闊鴈聲哀煙霞紫府髙人去風雪青燈好夢回我欲長沙拚夜醉莫教名利定三臺勝事關心得得來繫舟長傍白雲隈已憐韓子懷孤憤更笑陳思賦七哀楚國凋殘騷筆在君山遊遍酒船回江湖儘有歡娛地莫問狂奴借釣臺黃陵廟黃陵廟下草萋萋水逺山長聽竹枝末路不求同死處重華寧有再來時霜筠苦淚留千古野樹愁雲接九嶷珍重韓公修廢墜却憐徼福類神私泝湘日遇順風或弭楫遊覽則風為之轉蓋偶然也光逺形之詠歌次其韻以矯之朝艤旗亭夕釣磯溪山佳處故遲遲酒清酒濁皆可醉風北風南初不知敢效精誠韓吏部還如落魄杜分司吾將弱水蓬萊去莫引扁舟又逺之送吳彥皋歸瀏陽可人相見惜分離屈指同舟一月期萬卷豈為干祿計雙親正是倚門時溪山踏雪真如畫道路逢梅便有詩莫把壯心縈一檄青冥勳業舍君誰題張子玉湖山堂洞庭湖上君山在人愛湖山不暫忘為問錢塘貯歌舞何如騷國擅文章世間塵到尊罍少天外雲沾翰墨香更向瀛洲方丈去回頭觀日出扶桑庚辰元日李文逺判州訪余琅瓈越三日同入長沙值風雪不能進舟中兀坐因次文逺見贈韻十首落魄三生李謫仙丹墀曽見掃雲煙偶無具眼甘懷璞㑹有知音莫絶絃風雪扁舟茶當酒江湖清夢夜如年不因同值東潭渡誰寫瀟湘水墨天投紱歸來尉已仙山林隨處領風煙詠歌行辨三千首陶寫何勞五十絃江水帶冰留别浦梅花衝冷報新年子長要盡追游興不為朱陵有洞天昔在通明䔏列仙袖香曽惹御爐煙輸贏難盡縱橫著緩急空調上下絃自信襟懷如白水却憐勳業負青年鉛刀已試慚當俎何處龍光徹九天憶昨神遊挾羽仙世間遙指是非煙而今北海同樽俎何物東山更管絃已遍九州知禹跡好專一壑老堯年東山骨朽長沙近雲樹微茫水拍天盧家茶碗未通仙目斷旗亭幾縷烟水調還冝緑簔舞吳歈何用檿絲絃石瀧寒瀨如三峽澤國春風又一年但恨清漪亂柔櫓不教都見水中天勇退人言即半仙地偏尤喜接江煙野春殘雪開雙屐窗午清風散七絃蓬島夢回仍是客汨羅魂斷不知年笑歌本自忘機事鷗鷺怯人飛上天交逰已謝玉堂仙榾柮爐深暖不煙司馬家貧猶有壁淵明琴在任無絃驚心華髮成衰境回首青雲付少年飛出甕來還自笑醯雞今日恰知天莫訝詩癯似浪仙却冝危坐看香煙山杯不畏深如海歸路方知直似絃遊止正當終九仞飛鳴多愧養三年振衣便駕長風去天柱峰頭尺五天處處江梅間水仙茅薝飛雪濕茶煙一時清興難回棹半夜尖寒欲折絃道路荒凉勞逺夢光隂飄忽歎華年定知天末相思苦人在危樓月在天琢句功夫似學仙丹爐真火久無煙雨空野馬雲收幕目送飛鴻手在絃客路等閒成好况水程時復問長年後來記取論文地共對蓬窗一片天天臨索録事出伯庸詩求和伯庸薨三年矣當年筆陳掃千軍要繼先秦兩漢文孤塜此時多宿草九原何處覔停雲紀功力疾猶能賦種德詒謀不待耘底事房精遽淪化世間凡馬未空羣送丁學録郴州用原功韻鳯鱗臺閣愧何成鷗鷺江湖却有盟千載盛時須禮樂六經餘事到功名我歸老境方從學子去修途莫計程早晚春風滿芹藻肯教郴泮月空明同年張雄飛僉事見訪醉後作詩贈之鶴磯相見遽相違渭北江東苦夢思四海同年幾人在三湘春水片帆遲踏開雲霧來驄馬驚破煙霞聽老詩桃李正濃風日好不拚沉醉更何時藕溪候雄飛飲柳塘花塢净無埃翠霧紅雲撥不開命駕每勞千里夢乘軺應挂一壺來從知月下詩成苦不似山隂興盡回多少風光先攬得杖藜行遍滿園苔贈風山書院山長何明初青山華髮分幽栖愧子贏糧若我私竒字不知勞載酒清標初試勝觀詩鶚林春色連紅杏鳯嶺雪香有紫芝萬里修程先跬步春風歸騎莫遲遲長沙北十五里瀏水至此折旋稍南而復北名駱駝觜俗傳圓則瀏陽得魁延祜初其形嘗圓原功瀏陽人果為魁人益異之今貢舉中止豫實與聞南遊過此感而為詩瀏水東來北折旋人云竒應在同年奎文一夕忽飛逺沙觜何時再得圓背錦糢糊晴樹亂峰雲突兀逺山連世間萬事非人力鸂鶒金沙更偶然泊靳口和仲逹韻二首湘山湘水兩無塵更值陽春播大鈞心到懶時多好况天教佳處著閒人吾生已分為農圃此去何勞問鬼神布襪青鞋能事畢不煩華轂與文裀回首髙軒愧後塵從知苦窳負洪鈞山川俯仰皆陳迹湖海過從只故人病裏酒杯能作祟老來詩筆更通神王孫底事愁芳草政要青青當舞裀過湘潭江邉楊栁翠縈回栁外人家罨畫開一夜東風花落盡千年華表鶴歸來暮雲山出逺浮黛春雨水添濃潑醅莫艤扁舟訪陳迹白頭懷抱易生哀過洲頭驛和仲逹韻一琴何用鎮相隨多事猶思遇子期好句尋常無處覔希音今古幾人知江湖春色動杯面風雨夜寒生被池此去衡南訪泉石蒼崖應有少年詩廷鎮約遊南嶽期于渌口豫先至艤舟而待因和前韻二首衡湘風物要追隨忍負虞人一㑹期豈有鵷鸞倦髙舉應憐猿鶴未相知春山暖待穿雲履夜雨清留洗玉池不為軒車故遲暮渌江何日見吾詩莫厭鴟夷到處隨百年光景幾相期老來仕不愁三已閒裏金猶畏四知船尾夜寒魚撥剌墻頭春暖燕差池碧雲回首湘天暮不道相思剩有詩深口普庵堂聽廷鎮談佛皂蓋朱幡老釋迦山林來治舊生涯清隂滿座日移樹精義入神天雨花塵事已知皆土苴山僧誰訝不袈裟欲將洛詠從謑語又恐春風去我家次昭靈和仲逹韻呈廷鎮十載南枝與北風而今才得一尊同人間勳業非吾事嵗晚江湖有此翁雲岫煙波醒醉眼野花汀草負春工勝遊收拾奚囊滿才信詩人道不窮廷鎮倦於酬和作詩督之早據文場擅老師相逢何事倦吟詩同年今日無多矣美景良辰忍負之衡嶽半天雲捧擁湘江千里栁參差艤舟好就旗亭醉禪榻茶煙誤髮絲衡州道中二首髙明未到祝融峰一路風光已慰儂修竹老松三十里遙岑疊嶂幾千重燒纒宿莽晝不滅花噴逺香春正濃莫訝藍輿隨處歇老夫行色要從容一舍嵯峨見五峰出竒呈秀似邀儂雲深春護嵒姿潤日午人穿樹影重不遣山瓢隨我去却教村酒為誰濃少年陳迹無尋處只有衡君識孟容祝融峰與廷鎮觴詠有懷原功蓋嘗約同遊而豫不能待其歸也載酒窮躋最上峰嘯歌聲撼海濤風得陪五馬二千石獨少三生六一翁為問北門紅日下何如南嶽白雲中寄詩幾欲申前約無奈人生似燕鴻廷鎮三十年前為南嶽書院山長今兹來遊豫得侍行因成鄙句三十年前楊洞主禹門飛去一聲雷白雲青嶂闕林在皂蓋朱幡虎竹來歷問故人多不祿絶憐喬木是親栽而今芳躅誰能繼塵滿臯比地有苔贈南嶽萬夀宫文天爵提㸃用間間韻事才過眼都成夢心但忘機即近仙弱水風波三萬里蟠桃花實六千年有人獨得道中樂無術敢為天下先為我寄聲承慶老江南春在白鷗前至正集卷十九
