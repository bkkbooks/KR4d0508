body:
  text: 至正集卷八十一元許有壬撰樂府鵲橋仙同李雲松宣慰過思齋宣慰值出書其壁雲松仙客箕山道士来訪思齋老子思齋何處未歸来想只在翠紅鄉裏風清月白橙黄蠏紫一巷笙歌紛起良宵不遇負佳賓都不念人生有幾二贈可行弟花香滿院花隂滿地夜静月明風細南坡一室小如舟都歛盡山林清致竹簾半捲柴門不閉好箇暮春天氣長安多少曉鷄聲不到江南春睡三贈相師周可山春秋七十江湖萬里老子閱人多矣兩朝名勝一囊詩道渾似當時袁李紅塵陌上白雲堆裏擾擾浮生行止我非燕頷虎頭人但詩聖酒狂而已四宴胡安常侍御家清香華屋黄葵紅葉正是新涼時節文園久病不勝杯辜負殺一庭秋色珍殽紛錯玊醅芳烈醉倒江湖狂客涼天佳月即中秋更有箇今年閏月五心閒勝貴身閒勝富已往而今始悟来言精力未宜閒此俗子便宜推去秋風鷄黍春山杖屨盡是幽人樂處儘教鬢雪飄蕭總不礙銜杯琢句蝶戀花九陌千門新雨後細染穠薰滿目春如繡恰信東君神妙手一宵緑徧官橋栁樓下蘭舟樓上酒沙暖蘋香渾似来時候說與可人知信否傷春更比悲秋瘦二以變白方贈朱亮卿聞道卿卿僝愆損花落深閨無限傷春恨天上靈方吾不靳為君細染三生鬢鑷白從今閒玊笋坐看丰姿潦倒還髫齓洞裏桃花應錯認劉郎乃爾添風韻三一片白雲迷楚岫風捲青秧迤邐波紋皺馬上推敲詩未就回頭不覺雙山堠漁父樵翁常邂逅問我何求無事空奔走我固蒼黄慚二叟少年有志還知否四萬象森森天漠漠吹徹殘更聲咽梅花角牕外月明無處著暗螢沾露隨風落夢裏詩成渾忘却起傍屏山涼透紗厨薄静中悠然心自樂蓬山不用乘黄鶴五丁亥正月十三日親朋治其醉中賦老子行年過耳順蓬鬢蕭踈人道猶風韻領畧風光元有分賞心又喜燒燈近薄雪初消寒欲盡詞館久閒時得陪英俊莫訝連朝為酒困東君已是傳花信漁家傲訪畢雪亟不遇木落寒林山骨瘦湘江風細波紋皺何處携琴何處酒惆悵乆亂鴉啼斷烟中桞茅屋蕭蕭連甕牖半簷寒旭閒清晝歸路梅花香滿袖詩未就青山笑我空回首二歌圭塘四時四首氷盡泉香雲縹緲韶華隠隠浮林杪酒在葫蘆魚在沼清晝悄好音時復来黄鳥管領風光心未老衰顔却怕清波照有酒可斟魚可釣能事了東風一曲漁家傲三窻影脩篁摇翠葆墻隂幽徑連芳草驀地雨来荷葉閙香更好亂煙浮動紅雲島稚栁千條絲嫋嫋栁邊宜著蘭舟小世態紛紛何足校収桂棹嗚嗚且和漁家傲四露洗璇穹青杳杳年光紅入灘頭蓼翠盖撑烟吹半倒霜信早一奩寒影磨清曉早是軒扉塵不到好山更與供登眺酒債積多詩債少翻水調西風幾叠漁家傲五落日崇臺寒力峭登臨恰似尋安道有竹何人能徑造吾不誚相逢要遂掀髯笑雙檜淩空龍夭嬌有知定訝人枯槁珍重嵗寒氷雪操君自寳老夫但和漁家傲太常引武昌别墅胭脂山下老農家看雲樹翠交加香透小窻紗是昨夜幽蘭放花引泉澆樹破苔移菊更種故侯瓜一笑有生涯便休嘆清霜鬢華二用同年歐陽元功韻贈相師陳壺秋年来詩筆尚能神但無奈舊時貧天地一閒身且不在青雲後塵壺秋眸子野人心事相對好敷陳山酒正清醇要茅屋朝朝是春三速可行治具小齋瀟灑頗宜貧清有竹静無塵俗子不敲門只風月烟霞是隣古瓶清雅寒梅踈瘦昨雨忽紛紛尚有一枝春快報與南㕔主人四同前忍寒搜句意何如政因我腹焦枯茶竈火慵嘘髙陽侣元非姓盧佳章聨叠新醅寥落飛夢繞兵厨新釀取来無要親與梅花餞途五至正辛未春環樞堂海棠開偕溤公勵參議陪紫清夏真人飲其下今年范發事務方殷欲尋舊盟跬歩牽縶堂西潄芳亭甃方池種芙渠連嵗約觀而皆不果六月初日禱雨一過則紅衣落盡翠房森矗矣口占長短句奉紫清一笑潄芳亭下小方塘清㪚水芝香回首翠成房忍不待佳人奉觴紫垣朝暮紅塵車騎遮斷白雲鄉老我重尋芳又渾似今年海棠六次王居仁為夀韻進為卿相退為仙歎今古少能全抛却祖生鞭且占取烟霞洞天遥峰罨畫清流潄玉故里好山川黄菊正鮮妍便沽酒休論幾千七登樓觀栁雪消春氣恰和柔先到栁梢頭數日不登樓笑青眼窺人尚羞清明近也老夫耄矣其忍負歡㳺飛絮便生愁儘都變浮萍去休八烏克莊杜徳常寓所二松可愛醉中賦此以贈二君二松如葢偃中庭向朱夏作秋聲摇影動踈櫺掩映得苔㾗轉青西清博士西臺御史相對又雙清咫尺到蓬瀛休認作藍田縣丞九丙戌次舊韻寄紫青真人道宫城市勝林塘松竹滿芰荷香煮酒出丹房記相見怱怱一觴雲萍飄忽仙凡懸絶翻手又殊鄉何日潄餘芳看華髪詩人許棠十再用舊韻寄紫清詩成春草夢池塘相憶託𤣥香常記飲仙房笑一舉曽蒙十觴百年行止幾畨離合吾老且吾鄉聊與領羣芳漸開到江頭野棠十一圭塘四首圭塘種藕已多時貼水曉星稀生意一朝回便萬柄紅酣緑欹連宵驟雨透空繁響清絶不容詩對境寫襟期要無愧夷子皮十二幽人早起赴池亭看初日照娉婷風盖露珠傾又勝似前時雨聲水沉鄉裏錦雲深處雙檜揷天青一葉釣舟輕似野渡無人自横十三四堤楊栁接松筠香破水芝新羅襪不生塵笑畫裏淩波未真紅雲飄緲清風蕭䬃半醉岸烏巾不是葛天民也做得江湖㪚人十四雲舒霞捲萬粧濃倒影水天紅池轉小臺東又一種娟娟玉容仙肌綽約奇芳清遠浮動水晶宫一笑對衰翁好同赴廬山社中清平樂登北山閣感懐賦鍾山髙處又結層樓住山自蒼蒼江自去萬景一時収聚平生湖海詩豪更傾五斗香醪不信人間好句不教驅入霜毫二瓶梅膽瓶温水一握春如洗斗帳怯寒呼不起嬌滴粉雲香裏誰教淺笑輕顰恰如鏡裏傳神不用瑶天雪月眼前瓊樹常新三避暑神仙詠桂樹堂前雙桂雲潑交加翠天老金柔花尚未且愛清隂滿地秋風一旦花開天香吹㪚亭臺却被花神見笑先生未必能来四和可行梅竹韻二首平生愛竹到處縈心曲一日相違人便俗栽滿水邊茅屋誰知嵗晚空山佳人能慰荒寒莫論和羮結實且看髙節停鸞五賞梅觀竹不暇鑱黄獨白玉吹香連碧玉富殺山人林谷幾年行路艱難眼明今日重看便結嵗寒心友休教夢到槐安六天寒日暮百繞梅花樹萬斛清香藏不住都在一花開處可憐月堕霜飛不知踈影来時誰報雲川老子翠禽先在南枝七題郭思誠山居西巖仙老身在蓬莱島竹月松雲塵不到况有清風自掃霜溪淺碧摇沙烟村落照明霞說與門前鷗鷺仙家又是漁家憶秦娥和希孟張中丞韻山人笑人間不識山間妙山間妙嵐光浮動半江殘照移文莫待山英校烟霞曽結三生好三生好白雲深鎻葛洪丹竈二山瓢飲太空為幕雲為枕雲為枕松聲萬壑月明風冷人生未老宜先省塵寰儘有清閒境清閒境孤雲野鶴杳無蹤影三山花舞巖姿能笑禽能語禽能語百年心事一犁春雨神仙䕶短多官府老人只解為農圃為農圃乾坤休問幾畨今古四山鷄唱少年中夜心悲壯心悲壯世間何事不来眉上迷途未遠奚惆悵五湖烟水春摇蕩春摇蕩誰知平地怕天風浪五送牛農師二首春山碧詩成馬上應相憶應相憶盧溝橋畔晚雲如織人生有别休多惜但悲後會知何日知何日暮雲心緖斷鴻消息六長安陌東風楊栁花如雪花如雪青條無數為君攀折少年剛道輕離别臨岐未信心如鐡心如鐡舊懐新恨滿梁殘月菩薩蠻寄都下友人慿髙日望金臺路黄沙盡處空烟樹嵗晚足蕭踈雁聲無夜無簿書臨俗態人道儒酸在何以慰相思半年無好詩二宿造口用稼軒韻月明江濶天如水夜深殘燭縱横泪㡳事不求安世間多好山一杯君且住萬里人南去倡汝莫要予山寒無鷓鴣三寄中書諸公三司笑面鞾紋皺鹺官憔悴非詩瘦紅袖寫烏絲誰曾夢見之淮鹽真是白染得須成雪何處有神仙能教白復𤣥浣溪沙脩黛横愁苦愛顰頳霞亂玉更宜嗔嗅香挼蘂奈何春織就回文難會意寫成離字亦傷神他年不及卷中人二花露濃沾桂棹香桞風輕拂葛衣涼放歌深入水雲鄉荷葉杯中傾緑醑𤓰皮船上載紅粧都堂何似住溪堂三㳺善應崖上留題破紫烟巖前瀹茗挹清泉爛㳺三日酒如川有水有山髙士宅無風無雨小春天人間真見地行仙㸃絳唇病中偶成酒病詩愁好春三月常辜負開門春暮新緑迷雲樹一片飛花綰住㳺絲舞東風妬等閒吹去㪚亂隨紅雨二次呂叔泰韻雲海茫茫何人尋得春歸處年年遲暮不遂春歸去何日真歸歴歴江湖路舟横渡青山無數醉吸荷心露如夢令墻角黄葵都謝開到玉簪花也老子恰知秋風露一庭清夜瀟洒瀟洒髙卧碧紗窻下二為問蕃釐道士今日瓊花開未老子偶然閒要向花間㳺戲㳺戲㳺戲莫待清隂滿地三饒徳明學士収踈齊詠竹二首求和誰把清風領受尋得嵗寒三友霜月玉亭亭恰似老夫詩瘦詩瘦詩瘦無奈碧雲懐舊四嵗暮天寒時節滿意相看氷雪不遣野人歸誰慰此中清絶清絶清絶天上一方明月五桃李東風不耐好在西山如黛䇿馬看山来政爾青青相待無奈無奈却被暮雲妨礙六一片蒼苔鑿破百折清泉分過長日午隂圓自挈胡床来坐斯可斯可從此閒身屬我七昨夜庭梧隕翠詩思尤便爽氣無事要生悲可笑宋家多事衰矣衰矣但校隣翁酒味八火榻只疑春早紙帳不知天曉枕上問山童門外雪深多少休掃休掃収拾老夫茶竈九次郭子敬韻四首三日瓊瑶飛灑天巧豈容摹寫佳客不曽来有酒定從誰把文雅文雅應笑珉多玉寡十老子風神清灑好句自然傳寫立雪賦梅花更折緑條成把閒雅閒雅莫道吉人辭寡十一門外雪花飄灑坐上烏絲方寫秋露白泠泠更著玉人親把三雅三雅取醉莫論多寡十二有淚緑窻偷灑有恨錦箋難寫消瘦不勝春玉骨都無一把風雅風雅正值文君新寡長相思夢揚州到揚州明月長街十二樓珠簾不上鈎為誰憂為誰愁愁得春風人白頭見花應自羞至正集卷八十一
