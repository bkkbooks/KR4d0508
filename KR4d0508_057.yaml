body:
  text: 至正集卷五十七元許有壬撰碑志吟竹先生墓表天臨儒學正顔士穎奉大父吟竹翁行實請曰大父葬三十二年多難奔走表於墓而未能亦惟僻左未獲攸記託其在今日乎余燭其誠序之曰翁諱奎字子俞吉州永新人唐魯公十九世孫父某迪功郎監南嶽廟母某氏迪功沒益勵於學咸淳丙寅以書魁湖南漕而不仕進文山文公嘗延致幕下德祐間文山起兵汀贑以書來招為之感泣而竟不起築室以居寓書文山扁曰觀遠至元丁丑故邑殘毁挈家避地百丈山鄉鄰多從之庚辰參政劉奉命來宥過刑故衆懼俱焚公奮袂曰人既豫依則其命在豫辭難其可偕進士胡幼黃深衣謁轅門抗論不撓劉為改容豪右詿誤且死雖素有隙者皆隂活之南北既一徜徉里閈復泮宫倡學者與須溪劉辰翁中齊鄧光薦輩遊居雲外别墅自號雲外山人門有萬竹日嘯詠其間學者稱吟竹先生至大戊申夏五月草二日疾革誡子孫曰吾年七十有四過人多矣安能仰藥求活吾所謂不可以訓汝曹當孝悌謹飭私勿傷義貧勿廢學喪勿事佛謹識吾言吾死無憾矣言訖而逝明年己酉十一月朔葬琴亭雙塘原配談氏先八年卒三子長居安士穎父也以經行為人師次資深逢原皆業儒二女孫男八人士穎其長平生尚氣節家無餘蓄而性好客物雖素好人欲之即與不吝歌詩跌宕可傳酒酣浩歌舞劍以泄其磊磈之氣豈齷齪場屋之士所可比哉宋以文陶冶一世其亡也文士不負國家炳炳若文山輩可數也然文山有位者也若子俞者無位而有志者也方患難中奮出活人豈忘情於世者乎其不應文山之招知時之不可為也然其磊磈之氣又有不能自掩者焉亦叔世之竒士也銘曰嵓嵓魯公萬古此忠慶源其潨邈乎雲仍由枿于楨靡任不勝天胡棄材山巔水隈余其歸哉四海一天乃誦乃絃以逸耆年有清維河有卷匪阿傷之如何雙塘之林鬱鬱其陰悠悠我心贈通議大夫大都路都總管上輕車都尉清河郡侯諡莊惠張公神道碑銘贈通議大夫大都路都總管上輕車都尉清河郡侯諡莊惠張公幼與先公同師王汝舟先生先生歸黃州先公最長為諸生服故嗣教其徒公與焉公兄諱世豪娶有壬姑先公獨一姊往來尢數公地則班也一為師生敬事不少怠赴德安軍民屯田總管謁先公於鄂先公棄代躬致弔賻鄉親師友義死生不替卒十年子宏請諡得今贈請銘諸碑公諱世傑字漢卿先世上谷人髙祖誠徙彰德湯隂曽祖諱實千夫長殁於陳祖諱信有文行贈亞中大夫彰德路總管輕車都尉追封清河郡侯考諱崇好施豫贈嘉議大夫大名路總管上輕車都尉追封清河郡侯祖妣李氏妣尚氏皆從封郡夫人初製國字學者通其字率難其言公入胄監習其書又精其言甫冠從戍北庭辟帥府蒙古吏轉河南行省及格授同知潁州事官承事郎未終更辟中書史擢朝列大夫稱海宣慰使司都元帥府經歷升中順大夫淮東道宣慰副使泰定甲子以嘉議大夫遷德安天厯戊辰進通議大夫同知察罕諾爾等處宣慰使司事副都元帥佩金符至順癸酉三月日卒官壽六十九葬湯隂西百里配楊氏封清河郡夫人宏廕忠翊校尉南陽府同知嵩州事今河間縣尹次曰本曰敬曰紀女二皆適士族在北庭適都木達冦邊從戰有功潁地善潦治溝洫嵗以稔修宣聖廟作兩廡青海戎務方殷應接無滯戍卒多鄉鄰貧不能歸者贐遺之淮東經賦營繕甲東南視成有法韓姓者毒殺其姪吏受賕誣其繼祖母趙氏汴省命讞之趙氏得白屯田課樹藝時稅斂歸豪右隱田三百餘頃增糧二千餘石西邊嵗饑鴻和爾部落從水牧它徙邊民為搖請賑得楮幣七十五萬緡始遂生集構三皇廟免公廨就祭之䙝此其為政之大槩而仁民愛物之實也論治國者必先於齊家而仁民必始於親親公事親孝待兄弟友愛宗族貧弗給者周之失嫁娶者為嫁娶之此親親之實也親親而仁民仁民而愛物有本者如是夫嗚呼稱人之善必本其父兄師友名言也公曽大父以忠著大父以學著考以義著季父懋德尹二邑有惠政而世母趙氏又以孝節旌其門一門之教有素故其造就若是之懿也銘曰皇元肇文金篆玉書誕敷煥章漸被海隅易得者字難肖者言心樂不融但窺其藩學惟基儒空是占畢因其警悟濟以定力胄徒雜遝乃獨邁倫其聲於辭宛然國人洊更司譯始官倅郡力殫溝洫以教為政朔漠開閫距天萬里行間幕中戰勇佐理副節淮海于旬于宣爾賦惟期爾民弗寃屯田有方曰耕與守峙我廩庾壯我甲胄招亡飫枵無沗使節且使其民順帝之則篤念吾翁嵗晚弗弛生省卒賻跋涉勞止屯膏未施偉績弗究孰顯其先而開厥後蕩水流潤松柏彌阡茀爾子姓方至若川故朝列大夫饒州路治中王公碑銘祕書典簿王忭奉亞中大夫僉浙東海右道肅政廉訪司事杜秉彛狀請銘顯考饒州路治中公碑有壬幼僑江南聞鄉耆名願承教不得而其仕江南蜚聲騰實若饒州公者乃熟耳考信者也返鄉里與汴遊春盎玊溫學專行修益信其家訓有素考信不戾焉乃序而銘之公起家江淮宣閫掾除江浙行省理問知事升台州路經歷辟掾江浙行省擢永嘉縣尹入為工部主事宣徽院都事出知崑山州遷饒州路治中卒職七轉官纍進至朝列大夫其在永嘉地濵海饒鹹鹺豪户若民通島夷貿鬻官弗能制軋於運司總府前令職是失職者相望公戒嚴條禁察尤者置之法姦僞以息或誣張明一為盜逮三十餘人獄具察其寃釋之同官固爭公曰理寃令職也苟失出令自坐未幾得真盜其人相率繪公象祠之作邑七年如初至臺剡上賜官一級白金五十兩由是入朝著尚書省方變法冬官事尤棼糅酬决惟允有爵秩金幣之賚皆不受宣徽上玉食恃不考計並緣為欺公毫髮不貸衆忌之奏朔漠稽部落户數以重遠中傷之即日就道廷議優擢以老疾請郡遂有崑山之命時核田江淮使者暴急有司承風㫖抑民虛承江淮騷然公沿檄分核慨然曰民瘼極矣吾豈能愛一身而置民死耶上不便數十事識者韙之損虛糧萬餘石州治更徙廟學未作乃倡衆曰京師至下邑莫不有廟以祀有學以教况賔興有詔而吾州藐藐何以克副上意乃作殿廡門墉齊舍廩庖靡不完美以舊學為玊峰書院又建三皇廟社稷壇除蕩田重科摧抑兼并小民以寧上考書最饒大郡也席未暖而沒惜哉平生砥行立名風儀峻整事繼母卅年奉寡嫂至沒不衰亷而好施祿入無餘彰德鄉里廟學祭器簡闕買銅備鑄數千里致之其設施章章若是而夀止六十有二其乞補外時年五十餘非老病也朝官速化補外鬱滯常情怵所利忍恥力求老死旅食而不悔者接迹也有畀之而不受强之而力却者乎若公者其有所見乎豈內職雖利資級浮沉底僚懲其已施知其設施之難而一郡之專有以行吾志而及吾民乎吾志苟行資級利不利不校也嗚呼若公者可不謂賢矣乎公諱安貞字吉卿安陽人卒以延祐七年某月某日葬以至治元年三月十二日里曰司空從先塋也大父以上金亂譜亡考諱某贈奉議大夫驍騎尉追封湯隂縣子妣程氏李氏配張氏繼閻氏並封湯隂縣君閻恭儉靖嘉訓子有法後公十年卒二子忭以才諝聞駸駸其進矣愷其次也女二銘曰于嗟王公半刺考終孰導其始孰軔厥止素履不愧濯濯進退匪難匪急惟行是即有鹺病源有汗萃寃嚴明政舉爾釋爾愈郡疑底信軋者以振拔之內列震來不讋窮漠有稽我馬騑騑閔勞奚腆職也宜勉損下益上為損之象實由肆毒我躬遑恤欲薰善良乃廟乃庠生罔易守有沒無朽移忠由孝盍食其報清修不忒有子實則西山巖巖洹水其南祔藏無忝五福斯斂流澤溉浸三槐有隂我銘弗誻百世是法故通議大夫江西等處𣙜茶都轉運使萬公神道碑銘公蒙古凖台民人小字萬嘉律長因為名國俗也既華學友字以國卿其家廣平蓋曽大父天造初𨽻右部分戍地也大父呼遜從討李璮攻襄樊鄂渚皆有功贈中順大夫同僉樞密院事上騎都尉范陽郡伯配欽察氏葉氏皆追封范陽郡君父孟格圖右衛親軍百户達嚕噶齊佩銀符升福州新軍千户達嚕噶齊佩金符贈亞中大夫僉太常禮儀院事輕車都尉范陽郡侯配欽察氏追封范陽郡夫人德善履歷具神道碑公守河間有壬待罪政府江西茶政不修擇習而健廉而通者為都轉運使以拯之公嘗二其司有聲乃薦之廷議翕然既奏可傳符至郡俄以疾卒至正二年四月二日也五月二日葬曲周縣先塋壽六十有五明年九月孤壽安走安陽謁銘哭不能禁拜已出行實復咽不能語有壬交公厚望其孤巳泣又洞其慤誠益為之動遂相與大哭久乃始克讀其狀其善狀不能悉也公居嫡長世祿當襲以讓弟諾海服勞宿衛除山北道肅政亷訪司照磨兼管勾承發架閣庫以太常憂歸服除調山東道賑饑有功南臺辟為行人俄除利用監知事又改南臺管勾承發照磨兼獄丞拜西臺監察御史論列剴切僉雲南諸路肅政亷訪司事麗江宣撫達嚕噶齊揚珠布哈橫甚逐同官激叛部內朝廷知之始懼而亡匿公以計誘出罷之復其同官叛者以息行部建廟學凡二十四所修廢驛二十二歸省太夫人京口及侍其疾扶柩至廣平復如京師遷祖考妣合葬先塋改僉江西道又改燕南皆以憂不起服除改河南道天厯之警行省臣與廉訪司協議公謂潼關守不可緩承制除河南行省郎中出守潼關文皇道汴録其勞除河南道副使潼關失守夜馳至行省發蒙古軍四千餘人又借民丁出帑資假富室以足軍興鼓行而西遂復奪之㑹朝廷遣使退其師還卒掠民子女皆奪歸其親賜彩段上尊初額森努爾將兵禦西師屯彰德約備芻粟已竭宿留不進士卒將大肆掠公開諭以理遂移衛輝境蓋始約有備之地一郡幾亂賴公以免擢同僉中政院事理財江浙仍有金帛之賚改儲政院判官拜監察御史按覆諸道風采肅然為户部郎中楮幣壅滯督焚以通之倉儲積弊立法以核之閩中去京遠選人間關故事三年遣使即江浙省銓授公以選行就除行省左右司郎中茶司復立授同知江西等處𣙜茶都轉運使司事分治湖廣江西江浙課以登商旅以通官庶以不擾入為户部侍郎復通州倉糧三十萬石行蜀拯鹽法之弊人謂得宜升內宰甫月改河間路總管兼諸軍鄂囉總管管內勸農事首建學宫若干楹百廢修舉胥畏民悅𣙜茶劇任知公者咸謂必稱而倐焉長往惜哉積階自將仕佐郎至通議大夫配沙卜珠氏封范陽郡夫人又娶趙氏在南臺每憂無子有壬解之曰以子之心不患無子後果生子壽安也願而有立室而有出公可無憾矣女四人適國子生旺扎勒布哈江浙行省理問瑪古岱爾宿州同知王敏行一未行弟二人諾海自襲官有聞四轉至鎮江上萬户府達嚕噶齊階太中大夫曰達春宋氏出也公幼有志節襟度宏朗滑稽微中機鋒叵測分部上京它曹官莫不舍其署雜遝相從其為人悅慕若此而疾惡若仇辭色不能隱亦用是來議者之口焉左警巡院判官王克觀洎其家五人相繼死為具載歸葬之道髙郵十路都萬户府知事龍寶臣出使卒殯水濵捐金顧江道士遷其柩歸葬曲周顯官有放其子者孫且十嵗一日過之因言父子天倫甚至乃蹙然問曰君子有幾嵗公曰尚少當令來拜明日挈其孫往其人撫愛不釋公曰此兒與君有骨肉親錯愕久之乃語之曰此君之子某之子也遂大慟奉楮幣銀酒具為謝受之還遺其子卒為父子子今亦顯微公則天倫或幾乎絶矣其篤行行義若此與大權貴舊而狎不敢遠亦不近之免趨附之迹其讀書好文蓋太常教之有素而復天姿穎悟喜交儒士灼然有見於道義故確然無間於吾徒也山北南臺暇必相從有酒必共先太夫人棄代維揚自京口來賻南歸過之戀戀不忍别騎送至金陵東郭始泣而歸中途宿旅邸疲甚而寐必嘂撼使寤笑談達曙目不少瞑翼日神觀不少昏疲京師僕僕多事亦撥冗過從又同扈上京交遊厚且久它人不及也銘復何辭銘曰有紫其服有金其符賞延在身乃及友于視其不取見其有餘紆青幾時冠鐵衣朱逢涌孰禦載馳載驅投紱滇池萬里接淅嘗藥視舉獲殫子職衰絰洊命禮經是式分節河南邊聲孔劇力障其衝旋復其失兩為地官不競不求廩􅑎而充泉擁而流惟瀛大郡實為甸侯先教後刑學宫以修昔二茗政衆與能事俾長𣙜司以修厥廢軺方脂牽奄忽云逝聞者䀌傷矧豫夙契子銘不愧子善實多剛而不虛從而不阿不膠於習不流於和有美承家其冠已峩曲周之澤發於盈科刻文樂石百祀不磨至正集卷五十七
