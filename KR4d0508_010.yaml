body:
  text: 至正集卷十元許有壬撰古詩七言二十四首分題賦燕山雪送蘇伯修赴西臺居庸嶄嶄青萬疊一夕陰風出髙潔龍盤虎踞屹金城幻作三山白銀闕山下有人方逺征斯人斯境同一清楊華擈帳豸冠濕瓊杯逐馬軺車輕終南太華幾千里斾旌悠悠畫圖裏踈狂豈似剡溪行要領清寒肅西鄙不須戰白為子歌舉白浮以金叵羅兹溪他日更乘興添築雪堂留小坡贈道士楊山南天台山南楊道士却從山北來幽燕東華塵土西風起煙霞不見山南天明當排雲跨黃鵠歸向山南結茅屋莫作東西南北人山南村醑春方緑薌林石吳越間號至珍本宋向府物為監憲廉公所得今又入其甥萬戶齊家授經郎周伯溫圖其狀求題泗濱奇石大如斗巖竇盤紆開戶牖化工賦象豈娛人故作洞天似廬阜向子得之名薌林廉家異世同此心從知石兄頭不點坐見二子俱消沉人間尤物竟誰有一朝又入湯元手勞心記姓終散落地下奇章亦知否我生政欠匡廬行畫圖一見眼為明紛紛得失校未了又遣石兄依楮生太乙宫劉真人傳道於吕洞微真人請題其卷洞微真人洞賓孫道眼已入衆妙門行年七十知所化欲從靜裏觀乾坤乾坤善讓不自大四序功成各求退膠榮固寵良近癡道貴有傳復何待天台玄客拜下風有為物母無為宗桃花流水杳然去吾見老子其猶龍曉來雨過西山麓夢裏白雲生兩足嶽陽樓上袖青蛇鐵笛一聲山水緑和原功早作聞雨韻開門松竹有餘􅅹一夕龍公布膏澤玉堂學士不能眠起坐濡毫灑玄液已欣卉物回春榮又念鵠袍欲令碧右文拔茅心獨苦夜夜中庭看奎壁同年有人強任事伴食碌碌難塞責但教有雨無遺賢一任頻移北山檄孫鼎臣儀齋孫郎踐厯專句臚衆誇音吐鴻鍾如齋居揭扁有深意要從枝葉求根株聖人制禮本太一條分漸至三千餘叔孫所得僅一二上下分已天淵殊可憐不聽魯生語遂使漢治慙唐虞我元制作法隆古精鑿登用粳粃揄孫郎習此不容釋一生朱紫攻相紆儀哉儀哉爾不忒齋中更究周公書送舒嚕存道師雲南天戈渡瀘一文軌萬里滇雲去天咫宿師開閫張皇威虛位幾年誰稱此西山豪傑翯野翁毛錐大劍均策功京華鶯燕留不住金菟逺嘯蒼山風蒼山春翠明如拭猶帶淵龍香霧濕徼蠻銷甲已歸田襟略囊韜貴蘇息開邊功利古所懲通儒事業宜知兵犢丸取水盾鼻墨好向轅門歌太平李平叔雙泉圖其子請賦髙人小數早袖手問學曾師魯齋叟一紆紫綬置臺省還夢青鞋繞林藪西山勝處在雙泉泉碧沙明淨無垢衡茅煙霞專一壑疏竹風霜傲千畝岡陵引勢護佳城黍稔崇墉足春酒水邊盤石平如砥石上松陰大如蔀當時奮力爭國是豈意人間多掣肘何如來此暫解紛坐閲浮雲變蒼狗囊琴不鼓非傲物要與知音論然否翁今仙去名故存豈待畫圖傳不朽燈花夜如何其夜未央燈花報喜爭煌煌應將蘭心紅一點傳作舉子眉間黃眉間黃時爾何若聖君待汝蘇民瘼他時萬一負科名却教人道燈花錯至正壬午六月望大都留守星公吉甫以故事率其屬啓廣寒殿視或罅敝而填葺之有壬待罪政府法當與觀適中使至自灤京賜留守正尊因肆筵太液池上既醉留守謂不可不詩乃賦長句記一時之盛而終以規諷庶幾風人之義焉人間炎暑無地逃神仙何處追六鼇一朝凡骨忽輕舉乃得天上參遊遨乘風徑謁廣寒殿不知腳底青雲髙三庚清氣凜毛髮况值宿雨增蕭騷瑶臺瓊室光射目藻井盡出昆吾刀西山形勢壯天府下土品類森秋毫蒼龍捲水噴遙碧玉階㶁㶁鳴銀濤一簾瀑布散空濶兩亭瓴建懸周遭驪珠跳躍奪不得千氣萬力徒相鏖石分輦路隱巖壑松挂蘚壁愁猿猱紅蕖太液幾千頃水仙雜遝雲錦袍宫官導我坐翠樾清風颯颯吹二毛上林貢餘有珍果中使日下來醇醪九重殊眷在留鑰豈期邂逅及老叨賀蘭公子素奇士習氣正愛詩人豪自知綱轄非所任宴享適足彰吾叨世皇基構示宏遠吾君繼述當勤勞願因登覽念世訓萬年盤石隆神臯分賦天目山送馮公勵參政赴江浙省天目山苕水出諸錢銷沈天水覆深谷為陵岸為谷山仍蒼蒼水仍緑天家開藩奠南服浩如泉源湧金榖重臣分釐聮軌躅參預乃獨操度律今年杭城困回祿煨燼遺黎將子告西湖歌兒自冰玉宵旰焦勞子所獨詩書之效置郵速吾子行矣吾拭目苕水出天目山吾子行矣何當還貞元朝士倒指難需子入簉蓬萊班應制天馬歌臣聞夫聖元水德正色在朔方物産雄偉馬最良川原飲齕幾萬萬不以數計以谷量承平雲布十二間華山百草春風香又聞有駿在西極權奇俶儻鍾乾剛茂陵千金不能致直以兵戈勞廣利當時紀述雖有歌侈心一啓何繇制吾皇慎德邁前古不寶逺物物自至佛郎國在月窟西八尺真龍入維縶七逾大海四閲年灤京今日才朝天不煩翦拂光奪目正色呈瑞符吾玄鳳鬐龍臆渴烏首四蹄玉後醫其前九重喜見逺人格一時便勑良工傳玉鞍錦韉黃金勒瞬息殊恩備華飾天成異質難自藏志在君知不在物方今天下有道時絶塵詎敢稱其力臣才罷駑亦自知共服安輿無覂軼哀棄兒雪霜載途風裂肌有兒鶉結行且啼問兒何事乃爾悲父母棄之前欲追木皮食盡嵗又飢夫婦行乞甘流離負兒逺道力已疲勢難俱生灼可推與其疐尾莫我隨不如忍割從所之今夕曠野兒安歸明朝道殣非兒誰父兮母兮豈不慈天倫遽絶天實為十年執政雖咸腓發廩有議常堅持昔聞而知今見之倉皇援手無所施貌行不顧寒日西哭聲已逺猶依稀送蔡士安經厯次馬明初韻士安扁其讀書齋曰巢雲松紅蓮緑水地有餘野逸不受朱衣紆遊心逺慕有巢氏雲松况復如匡廬少年攻書安甕牖華屋何心豐厥蔀但將幽興寄髙間萬物藝藝自芻狗朝來酒熟清而淳雲松勸我不我分雲今作霖忽飛去松陰留此庥吾民我初出京心口語欲作憐巢老吾土誰知咫尺玉堂遊地位清髙隔風雨偶閲可行書見其印章曰洹溪釣者戲為野語道士只合山中居釣者只合溪中漁不山不溪朝市趍人輕爾厭重爾誣彼道士者尤迂愚妄欲躋世為唐虞平生動為鬼揶揄况負且乘招而呼山耶溪耶盍歸歟山有美茹溪有魚醬臺行并序僦居鄉閭即巽隅為孰以居明初馬先生孰東地多隙積壤其南久與垣埒穹然如臺晚涼散步時一登陟思有以名之而未得其宜也家人治醬醬利炎暴而屋近樹密相為蔽虧獨此敞豁朝暮得日乃夷其顛而置甕馬明初笑曰臺之名得矣古有將壇壇猶臺也兹非醬臺乎豫方病暑無悰喜糞壤之肇錫嘉名也為之大笑且為韻語以識之歸來庸夫莫吾騃一畝之宫僦非買幸多隙地可遨嬉况復天成臺有灑質雖糞壤若可賤朽腐神奇理固在赤曦西去涼颸生散策時還升畏壘愛之強欲加粉飾此質何由發光采談言微中亦偶然塵且可同紛自解聖人食品常貴醬老叨口腹尤有待熟宜烈日屋多陰抱甕欣然得爽塏山人玩世一見之錫爾嘉名俾永賴人疑取聲不校字畢竟此聲不容改又言間朴遂訝璞亦似怒解仍及蟹彼帥三軍此微物比而同之豈相紿彼雖雄貴足摧折此則適口何尤悔山人蔬蕨資用後一飽胸中無磈磊若教筆陳戰風月便是金臺前郭隗古來多少難具言且言彭越還為醢題仇公度總管所藏李伯時六駿圖瑶池八駿聞自昔詭異寧容按圖索唐家監牧足權奇六駿當時最超逸虯虯孤矢騁空濶掣霓奔霆倐無迹或牽或騎後四人有馳有驅餘五匹雄姿殊相各臻妙考驗知是龍眠筆開元善畫稱曹霸斷縑留世傾金璧龍眠雖不及師承却似韓家能入室三人既逺畫亦無九方不生驥誰識驥難卒得畫幸存主人為我加珍惜和明初種竹韻二首此君相看凜冰雪凡卉莫動心如鐵市㕓何處延清風擇地乃得書齋東南枝不迷帶宿土蔣王應讓山中許七竿五本惠然來天與其時適陰雨坐看翠搖金戈清陰已覆蒼苔窠荒寒一旦得所主不遑寧居其奈何小庭陋室因物勝課童灌溉疲奔命來賔正待人撫視直造不妨吾嘯詠等間人境隔塵凡有徑底用開三三世云汝醉實誑汝汝固不醉吾方酣昨非今是今始覺汝不託吾吾汝託知心幸得白眉公助勝復有青田鶴杖之化龍望已癡萬一結實療鳳飢嵗寒霜月安幽棲明年出筍應甘肥人間萬事翻覆手千畝等候亦何有七賢六逸不可呼與子相從為二友洹溪有濤如捲雪洹溪有岸如削鐵良時有月仍有風底事㕓隱來南東佳人憐我汨塵土植物之中薦巢許斸雲移得碧琅玕便似江南聞舊雨此君入室不操戈清泉供飲安臼窠似賢政自要培殖草木縱妬如君何靜觀天道悟善勝此君有善亦有命一從衛國美武公後世詩人幾歌詠凱之作譜特其凡樂天記德才二三寧知一體具衆美不似柳暗荷花酣幽齋衡門楹無覺地幸寬平根可託主人愛爾忘肉味何况其陰有鳴鶴即爾酤我殊不癡軟飽大勝抗老飢布袍芒屩相依棲小兒裘馬從輕肥逺林等間一分手風月遂為城市有直須長養拂雲長慎勿翦移如賣友和明初三臺懷古匡朝本是人中豪誰令倒海流滔滔炎劉火力盡資土簣進欲與天俱髙谷陵變遷劇改井乃有殃池尉遲迥狂圖一旦雖幸成惡迹千年豈容屏臨江率旅空若林銷沉兵甲江水深只言拊手天下定不知吐哺誰歸心當時徑敵無吳蜀蹴踏乾坤勞一足果然蔓草猶難除傾矣天仍不為覆漢家病已深膏肓不能王人人自王坐令流毒遍四海重為屠戮輕為瘡荀公初信退讓語􅅹膽披肝陳覼縷夀春仰藥固可哀帝且綴旒方播許莫將基禍尤黃星亦教遺臭為髙陵十功九錫成算在地維遂裂天柱傾奮威死後無健者身不遭誅骨遭罵至憎甚欲及儲胥底用更求臺上瓦發邱摸金將遺誰敢擬舜禹真其兒荒涼餘址圯未盡更煩漳水消磨之秋風蕭蕭動衰草天幸無情天不老鳩居幾換未暇哀翻手周師戈又倒和明初讀韓陵山溫子升碑清秋行山村酒薄弔古興懷不成樂文章驗世有可悲賢聖之君久不作青衣行酒塵再蒙草萊躍出皆姦雄渤海智囊括幾重奪馬乃謂防山東人人欲化家為國滄海橫流無畛域老天豈亦厭生民獨使姚興應熒惑區區圖陳成功難千年為爾一永歎前衝後躡又橫出勝負遂判須臾間髙摶因上九萬里珍重韓山親舉趾刻銘淪地復銷天永播殊勳窮萬年晉文浮華劇雲煙宇文尚欲扶其顛南朝淪習尤綺靡百家堙滅一二傳麟兒未是文中虎肆罵輕為駭人語若見蘇家大誥文未審為金為糞土元統甲戌春芝生于衡安仁馬碧山先生塋其狀秀異雕繪所不及先生子熙明初乞詩於安陽許有壬有壬惟馬氏世有隱德發為禎祥宜有以歌之也乃為之歌曰衡湘清深多隱德漱芳擷英久充積沖和一旦發禎祥鍾作三秀備五色不生庭戶近媚人直以神光賁幽宅亭亭小蓋出半身大蓋乘之如翦刻珊瑚森矗十三枝一一分岐呈挺特紫幹堅貞戛寒玉繡絲旋繞明圓纈先生昔藴道德懿不肯人間輕枉尺流芳已見世有人作善今知天可必謝家寶樹足英華咀嚼餘香輸綵筆願言培植成休徵罔俾商山專曄曄洹堂小圃黃瓜有合歡者明初賦詩過褒可愧勉次其韻以寫衷曲我生賦才匪王佐有腹無謀仍負我深虞覆餗走循牆營口老猶資果蓏夏畦雨潤翠色交離離結實懸瓜匏瓜鍾土德與匏異走藤滿架縈枯梢碩蕃雖出人修葺降瑞生祥豈人力形如連珏巧削成占云老圃其逢吉老圃本是草莽臣園作師矜道尊冒榮逾分退宜勇一飯未敢忘吾君讀書首貴安貧賤食肉封侯非素願平生所遇皆偶然政似此瓜今此見黃臺不歌抱蔓歸白頭獨善甘野栖吾君萬夀時雨雪明年更我釐牟詒和明初考定武禊帖伏梁墨妙懲艱得但許臨摹入鐫刻可憐片石本無脛乃逐兵塵走南北德光不惜身為豝席卷晉物歸其家遂令此石贋俱售何如荒煬初不有江左善書豈無人不觀其字觀其身髙標峻誓抗塵表蘭亭宜擅千年春夷門不見長安日却從晉主效銜璧購求又至瑪瑙亭轉使髙人薄蕭翼力能全璧無相如天下不復知同書中京廣陵幾秋草歸宿無真存莫保家雞野鶩爭賞音移形蛻影傾千金更疑摹印幾千百不聞舒賦劖其陰米狂哆然稱博古定武雖真猶不數人間真迹竟茫茫支機石亦淪風雨至正集卷十
