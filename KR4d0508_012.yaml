body:
  text: 至正集卷十二元許有壬撰律詩五言八十一首游青山十首至順癸酉七月三日避暑青山髙武肅公祠墳其孫江西省掌故箴竹樓暨湘鄉别駕髙昌海朝宗從游率爾成詩十首書其壁炎氛漲畏途一舸遂憑虚埜濶天疑近江清暑自徂勝游三日約陳迹五年餘不待秋風起文園病已蘇地僻心逾逺林深曉更凉竹風芒屫快松露葛巾香緑蟻新開甕金鱗旋出塘人生行樂耳何處是仙鄉逃暑無逃處違家一舍遥柳陰清入座湖水暗通橋涉世今成老投簪豈待招幾多蕭散意得句寫芭蕉雅志便邱壑微行徧稻畦瘦笻隨竹去幽鳥避人啼嵗月憐華髪塵埃認舊題山靈應見笑明日又東西健步從幽討藍輿㡳用乗山腰縈細路石角冒寒藤物外何蕭爽人間自欝蒸松風灑不盡松月又鬅鬙放曠文明世徜徉武肅祠杯摇山影動坐逐樹陰移晤語宵忘寢佳人夙有期興來真不淺吾亦愛吾詩斜日班荆處漁梁古㟁隈人移蘭櫂去菱滿竹筐來真樂閒方得幽懷淡自開欲知機事息鷗鷺日相陪避俗方無䇿尋幽肯計程巖姿留曉潤泉響扙秋清撫樹時時立看雲緩緩行樵夫頻反顧應詫誦詩聲風烟盤古磴步步入髙寒帶月傾雲子分江試月團松間華表出石上翠苔乾清夜聞天籟身安夢亦安喬木如霜木今餘幾故家鳳來竹有實蟾老桂仍花地脈符陰徳天恩照相麻寄言蘭玉輩好為䕶烟霞沙湖道中城居如坐井出郭始知春草色纔翻燒禽聲便可人逺山來邐迤羸馬去逡廵喚醒三年夢東華足軟塵田家對雪野老能留客柴門便反闗落梅㸃衣上飛雪墮杯間地僻偏宜竹窗幽更對山自憐真野逸瓶罄不知還石山廟行山無逺近佳處即徘徊竹雪迎人墜松風拂面來黄冠形類鵠畫壁影留苔可惜清虚境𤣥闗扣不開題彭道原拙存齋拙存存底事大巧寓其中鳩羨巢無費鼯憐技有窮山林留晚翠風雨罄春紅要見真知處歸舟月滿篷送張大隠相逢席未煗行邁底踆踆館閣頻虚位江湖有逸民夢尋松菊約歸及柳梅春好在扁舟月詩家自愛貧題友人山水卷其人徵索甚急故萹終及之江湖多脚債見畫記當年千里纔盈紙三山不避船松杉深隠屋洲渚逺浮天鯨錦須還客題詩豈望傳送洪莘野赴江西儒學副提舉西江士淵藪命子挈綱維湖海游將徧牙緋老更宜落花三月路行李十年詩莫道榮歸了清朝樂育時夜至櫓港桴皷逺籠銅前驅列炬紅星芒寒拂地江影淨浮空聽語漁村近連航水驛通不才慚傳食鮭菜足為供荻港早行水國宜秋晚羈愁感嵗華清霜醉楓葉淡月隠蘆花漲落髙低路川平逺近沙炊烟青不斷山崦有人家餘干州廨小憩訴牒紛紜用察掾董仲達韻風景足溪山怱怱道路間如何窮日力不遂暫時閒虐吏元多事吾民豈素頑萬言臣有獻虎豹九重闗夜行潤陂蕩蕩唐虞世區區蟣蝨臣露餐烏攫肉夜渡馬知津危棧依山盡微行到水頻風霜儘䝉犯庶用答涓塵髙安接淅窮朝暮圖南興未闌松髙山寺古稻熟野塘乾畧彴才容騎茅柴不戰寒太平真有象耕鑿徧岡巒晚過韶州世去重華逺名偕二石存溪寒清見㡳榕老亂垂根埜色偏宜晚民居近似村曲江人已矣楚些擬招魂横浦登舟南征殊不惡樂事總相闗馬上行思句舟中卧看山盡收烟景去滿載月明還何往不自得浩歌天地間宿清逺縣北十里黄茅叢竹下風雨夜維舟古㟁懸將墜衝波亂不流有懷嬰世故無夢託鄉愁記取蕭條景他年説壯游送山長陳京仲歸天台廣文官號冷亦復滯留人羇思歸方愜親闈樂最真夢闌鍾阜月詩到浙江春好在斒斕服無氊未是貧游崇因寺和白巖長老韻二首禪闗謝塵俗風景助詩才濃翠筍添竹亂紅花覆臺山林憐獨樂魚鳥喜頻來野興真忘返方池絶㸃埃問俗來山寺尋詩愧不才松陰拂樽俎池影倒樓臺竹亂㕘新舊雲閒任往來回頭見城市鞍馬乂塵埃次伯庸雪中見贈韻四首雲合天無隙窻虚硯有冰畫圖山杳杳水玉夜澄澄得句時呵筆懷人獨剪燈兎園君自到才薄我何曾茶烟融半濕簷筯已垂冰銀漢餘波逺瑶天萬象澄春生小甕酒寒入短檠燈安道何須見清游但記曽占嵗欣宜麥書經貴有冰兩間虚自白四海穢皆澄茶鼎親融水書􅙘遂罷燈燕山見如席吾與李俱曽梅花香不減瓶口滿清冰綺戸時凝睇秋波欲共澄寒深宜㬉玉吟苦謝孤燈嵗晚新知樂如君見未曽送李理問之雲南且過家焚黄滇池雖萬里稇載聖恩迴儋爵辭天闕携春到夜臺蒼山寒玉潤瀘水瘴雲開更有綏懷術圜扉任草萊贈吉安徐明逺用卷中偰世南趙秉彛韻二首昭代無遐棄青年有勝游酒方彭蠡月詩又漢江秋黄卷休停手朱衣待㸃頭贈言須自勉野水正横舟匏𤓰能不食多事作聞人杞梓雖儲用松筠豈媚春幾年勞涉世萬里要知津莫把窮通論儒冠不誤身挽熊伯韶琴書真可樂鉛槧復何為地有見親處山無作礪時舊書留祖訓餘澤到孫枝却見庭前竹誰能不爾思題鄒福勤耕亭力學能沾禄勤耕或阻飢埜人都不校素分但安為心事三春雨生涯一卷詩有師當卒業負耒更何之劉太保辭翰真主開天地蒐賢盡顯幽慈航憐病涉滄海障横流管仲慙當國張良足運籌長歌撫遺墨老淚泫難收題張方先生傳張子生不顯九原名始揚傳銘雖可記道徳自難忘泉石三生夢詩書奕世香人間多富貴湮没復誰傷送方子敬之潮州知事久客歸已樂青衫况有成鵬雲萬里近鯨海片帆輕儒貴知時務人毋忽旦評請觀韓廟月千古照精誠牛羣驛同雲莊治書登市樓清秋宜縱目野曠更憑髙遂得尋詩地都忘出塞勞乾坤同是客湖海尚容豪却被青山笑兹游已二毛題司程巴拜所藏天厯宸翰御書如日月合璧照乾坤一介名何幸千年蝕不昏清光常在上真寶重詒孫却望橋山路孤臣欲斷魂紅橋遼海隳東障居庸洞北門紅橋一線水白刃幾人魂亡地天時幸生祠像設存古今三世將珍重道家言奏事紅禧殿賦殿前芍藥灤京朱夏半紅藥盛開初天欲留春律花應待乗輿一臺香霧濕千朶錦雲舒立轉雕闌影愚臣有諫書臺治有榆一株巋然蒼翠愛而賦之厯厯天河種誰移執法庭地因無勁柏爾遂似祥蓂皮抗冰霜黑枝留雨露青誅求鑽遂者瞻望敢干刑臺府獨坐二首老僧鳥寺住獨坐竟成癡草色催寒早榆陰轉午遲庭無搒掠事案有倡酬詩但負風人意素餐非素絲吏散階除靜時清簿領稀癡蠅旋筆坐馴雀入簾飛風濯絺衣冷香縈縷篆微蓐收來咫尺又迫鴈臣歸居庸道中次韻翠壁懸樛木蒼松掛女蘿霜清天宇豁林瘦月明多漸覺趨時嬾猶能對酒歌建瓴東列國休羨漢闗河岩扉如罨畫濃翠濕烟蘿雲影和秋淡泉聲入夜多擬賡黄竹賦還憶紫芝歌萬騎陪明發霜飛月滿河中都出郊羸馬不勝䇿摇摇西復東天低雲易雨地曠日多風寒草分山翠秋花散野紅悲笳起寥廓回首見驚鴻挽張師戰没二首御史良卿父也全勝饒奇䇿其如不用何英雄惟有死今古亦無多名最平蠻傳魂悲上屋歌通川祠下水千載溢餘波齠齔聞征緬知公獨殞身西平賢嗣在太史特書新深也非臧律天乎竟不辰忠誠來有素珍重裹屍人迓憲使晚回地偏心自適木落眼増明雲氣寒縣雪溪聲夜到城推敲仍習氣奔走負平生膚使清如水何慙束帶迎曉游宋氏園畏景宜清曉微行出繚牆曙分烟柳色凉滴露荷香熟果時聞墜栖禽忽見翔主人好事者新韭薦黄梁秋日宿宋園不宿招提境來親山澤臞蛩寒聲漸澁螢濕影如無糠燭偏勞剪村醅不待沽夜深清徹骨松杪月輪孤冀寧温氏五世同居詒訓傳無替承家慶有餘一鄉推孝弟五世共田廬世逺氣常邇根同枝可疏雲仍惟念此忍字不煩書寛河道中山行三百里吟思滿征鞍殘雪藏春信野風生暮寒闗河南北逈道路古今難回首京華月故人空倚闌赴臺回留别諸友尊空燕市晚回首各西東千里鴈聲月一天霜信風功名蝸角上嵗月馬蹄中窮達非難較年來句頗工撒河道中浪游成野逸詩與景無窮雲岫雙蛾翠霜棃半頰紅馬嘶知驛近牲腯識年豐嘉我方清鬢無勞問轉蓬曉發漁陽和夢起怱怱醒心聽逺鐘風清天欲曙月淡露方濃野逈遲良驥莎寒泣暗蛩飽嘗馳騖苦愈覺貴疎慵送陳雪崕學録歸洪都清朝誰自棄韞匵價難酬世不逢青眼吾將分白頭塵埃無㬉席江漢有歸舟會徙南𬈑去黌池願少留送孫幹卿赴武義尹筮仕得美郡還家猶故貧一途無改轍百里定回春邑小琴能事官閒筆有神他年淮海月應照錦衣新送盧仲禮知崇徳州昔賢榮作郡作郡復如何見説江南雨都成壟上波子應諳浙俗我政困淮鹺它日循良傳先聞五袴歌隴西田氏志節呱呱周歳子蝺踽未亡人宰木已勝器堂萱才見春青雲華表出白髪綵衣新滿眼桑榆福寒燈不誤身過胡安常治書倚廬涉世初何意微官本為親一朝成永感千駟等纎塵猿鶴能留客烟霞不妬人惟應舊心友知我此情真次傅殷卿助教韻二首事業慙明世光陰逼暮年誰知天遯客却作地行仙迹任時人笑文須後世傳洹溪足清興何用買山錢江湖三十載今日是歸年鄉國猶為客身心已是仙境清無世累詩好有家傳明月清風滿何曽費一錢清明日登樓借友人韻六首隠市俄三月登樓得四郊檻花栖落蕋牆竹出新梢勝日宜尊爼孱軀怯酒殽歸耕今已遂桑扈聽咬咬樹色晨烟重池㾗宿雨盈至音求土皷荒獵謝山棚難字從人問新詩信口成誰家競春事柳院沸銀等賞花辭上苑栽菊擬東籬畏病時停酒銷閒剰賦詩年來輕節序事往見襟期㡳用歌壺缺吾方知竹枝倦鳥方依樹祥麟已在郊開簾納山色俯檻見松梢江水甘宜茗畦蔬美勝殽禽聲闗樂意終日任咬咬春光時顯晦天道寓虧盈方外神仙境人間傀儡棚讀書期自得學道愧無成俯仰吾何怨桓伊豈解箏畫出幽居景踈梅暎竹籬歸田平子賦招隠太沖詩勲業非無意風雲自有期春工多巧思付與背陰枝牡丹始開值雨小人傾善類怪雨妬花王國色嬌含潤天葩濕吐香太真初賜浴孫夀慣啼粧富貴吾何羨開晴謾一觴桃源雅集圖削玉千巖合蒸霞萬樹開漁郎迷路至先世避兵來洞裏常春色人間幾刼灰可憐劉阮輩更復説天台周氏園二首出郭才幾步芳華聚一亭雲迷花作洞路轉樹為屏老圃烟蔬翠微行雨蘚青小車來莫厭吾自掛雙瓶狂遊常徑造殊勝得城東木老千章合花深一逕通石盆留宿雨竹牖度清風詩思方泉湧芳尊莫放空同劉光逺盧正卿遊青山途中即事麥秀雲初合花濃露未乾山光晴亦潤春色晚多寒嵗月歸田樂詩書用世難䲭夷有餘酒隨處駐吟鞍和正卿韻二首十載纔三至餘生得幾來好山迎道路新雨歛塵埃澤蔌晴方茁巖花晚尚開明朝風日好容我坐莓苔清境至已幸可人期又來軒扉皆有竹几榻自無埃泉脈池分過巖霏日射開君其回俗駕愛惜一庭苔寓昌平縣廨謾述畿甸三秋末乾坤萬象澄度闗初見鴈喧坐尚多蠅雲薄難成雨霜清欲至冰居庸差可喜湧出翠層層至正集卷十二
