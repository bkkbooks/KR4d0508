body:
  text: 至正集卷三十三元許有壬撰序送黎東山遊廬山序余自幼樂登覽所至有山撥冗必往讀樂天草堂記太白歐蘇詩知匡廬之勝恨臂不翼而飛至其下也延祐乙卯有臨江之行舟中望五老如碧蓬懸瀑如玉虹時以久曠定省且同舟非一人勢不獲留私念歸日或可一償所願而同舟益衆兼夜趨程順風下流檣飛如箭一時懷抱不啻如逺行客過故鄉而不一少息也至治壬戌承乏南臺分行江西遵陸南邁回按江東路與山左則廬山又不得而至焉自罹荼毒僑食武昌九夏炎蒸小屋如甑矯首悵望神爽飛越越南黎公景高居漢陽絶江來請曰往年逃暑廬山如在天山今將從一子一僕輕舟順流尋我舊盟秋盡而後返諸公歌詩送我子其為我叙之噫天地間事無巨細豈造物者不厭瑣瑣皆自有以制之不輕以畀人邪世謂人一飲食前悉有定余當薄而不取豈真有是說邪抑不得於此則得於彼二者不可得而兼之邪何余一逰之不偶若是而景高欲行則行沛然莫之能禦也景高蚤知尊中國來四十年著述自怡樂易好客四方知其賢朝廷優以秩不縻以事故得厭飫於山水豈非不得於此而得於彼者乎余不能從公遊公其為我挽瀑布濡椽筆盡寫山川之勝以歸誦而和之是亦從公遊也漢雋序韓子答李翊非三代兩漢之書不敢觀三代尚矣兩漢惟遷固為稱首雖後世論有優劣遷之後獨有固爾固文贍事詳讀者記事托文供文字之用至於形勢利害事情得失有不暇考者况義理之精微乎宋括蒼林氏托其精語為漢雋五十篇長沙黃秉彞序而刻之以公於世噫昔模印未盛世苦少書手抄率全書也天下多書乃復有厭涉淵浩而工於數得者何哉蓋林氏之書為事而設者也為事而設則提要鉤𤣥非苟於簡也比類釋義使異名竒字一閲可悉固見古人言辭之工焉抑雋言味也嘗鼎一臠謂之知味則可謂之飽則不可讀者由此而遡班史之全由此而求義理之精有得於文贍事詳之外則秉彛公世之心為不負矣性理一貫集序理學至宋始明宋季得朱子而大明前輩言天限南北時宋行人篋四書至金一朝士得之時出論說聞者歉竦謂其學問超詣而是書實未覩也文軌混一始家有而人讀之科舉行以經術取人詔首崇用又人人治之矣然昔之讀者為己今之治者為人昔之讀者由博以說約今之治者求捷似約而不知所以約捆托說經歷歷可聽其於躬行心得果何如哉宋進士葉叔經編性理一貫集廬陵王務先表而出之節抄以授其徒序者謂使學者易知而易行愚竊謂易知者未必易得也學者誠能因書而求之心驗之身則一言之得終身有餘况要而實備者哉不然徒為决科捷徑爾雖若愈於昔之未睹者得不愧於讀者乎先儒有言志於道德者功名不足以纍其心而况富貴乎知此則知務先之用心而讀者治者為道德為富貴從可驗矣林春野文集序貢舉未行士之力學者積厚資深發而為文章决江河涇溝池至即盈溢利祿一啓人重得失始有欲速而求捷者假步蹈律寸跬模倣爨而始糴規規乎其不裕也今試格一日之目有古賦有詔誥章表近循習多用賦則賦當日盛上不追騷下亦不失為漢魏矣而失反有今不逮昔之歎何哉蓋昔之人有式不擬直以所學充之後之人無學可充而惟式是擬也長沙林春野出所著古賦有作者風文雅而潔年踰耳順所謂積厚資深不待貢舉而後學者也視執柯而睨者大不侔矣然而再試再黜於有司豈公明不足彼得而此失耶將論高涉迂而今之學者為是耶抑春野之命有以使之然耶有問余者答曰余方論文得失吾不知也阮冲逸復姓詩序子繼父以啓來裔人道之大也世不幸有無子者則為之後者古有訓焉惟族次之當者是取宗法不明始有以他姓繼者中土俗猶梗質抱族子褥襁中長且有掉聲去者楚俗恬不為怪利其富厚雖壯者亦施施往後他姓先子嘗佐永州幕永俗尤可嘆有子者亦養人子己子復以與人若是十九時未有禁告總管樊子明禁之樊賢而善謔曰吾永民其猶菜乎南方法異中土必移栽而後茂是固宜禁而不可勝究也可禁其未來者上其事不報厥後始有著令而郡邑廢格視之若無余往來江湖求能復其自出者得塗之阮冲逸焉冲逸喪其父從母適人遂冒徐姓一日喟然曰父不忍棄徐無子義也吾弟後之矣阮今無後我其歸哉遂復阮姓士大夫美之噫姓氏之訛尚矣未有盛於今者也余嘗病永俗之大繆憤著令之不行舉而止之未能也冲逸自幼從母養於人以有妻子其後徐不得已也非若世之後它姓者也乃能奮起而復其宗阮氏之餒鬼一旦有食使其事暴於天下則世之取非族次其先不歆者知所適從而貪人之富忘其自出為它姓後若亦可以少愧矣是宜書春秋集義序春秋由三傳而下世之存者可考也范氏探經而為集解啖趙考三家短長為統制伊川以傳考經之事跡以經别傳之真僞皆號精當而世之讀者無幾及胡氏傳出學者翕然宗之聖朝設科遂與三傳並用諸家之說幾無聞焉向會試以五經發䇿至有不知名家名氏者况有考其短長而折𠂻為書者乎且聖人之意當時門人有所不知世傳左氏時代不一要非親受於聖人者宜其辭勝而失誣也公羊榖梁傳聞逾逺諸家之說各尊所聞其能盡合聖人之意乎朱子謂春秋大㫖誅亂臣討賊子尊天子抑强藩貴王賤霸而已未必如先儒所言字字有義也如此則傳注之說其可泥於一偏乎豫章張君立擇諸家之論或全或略疏於三傳胡氏之後名曰集義擷衆長而萃於一歷歷精至觀其自序蓋欲學者因是以求諸家之全戒其厭煩務簡而取足於此則君立所得與夫所以教人有可見矣欲觀君立之集義當先觀君立之自序遍取諸家優遊涵泳交暢旁通一旦有得自知去取廽視集義心目瞭然與聞人之說襲而取之者異矣康節云春秋盡性之書也傳注而已乎送廖如川序日者之說尚矣自稽疑叙疇太卜列官世有見焉古之人疑不能决則稽之蓍龜上而建邦下而宅兆買妾産子舉聽之則其學未可無也賢如司馬季主卜長安東市則其人未可卑也今筮法故在龜卜之學傳者無幾世盛行而樂信者有所謂三命星數無慮數十家人欲預知貧富貴賤夀夭謂為知命去古人稽疑之意逺矣而君子知命果如是乎就所謂命若星數校之其精者復無幾唐侍御史李虛中深於五行書蓋三命之說也以人始生年月所直推人先處其年時百不失一二學者就傳其法初若可取卒然失之後之得者可謂難矣豫少自信日接其人而不之問及倀倀世途亦欲得如李虛中者問之以决其疑不能自决者而所遇率誇嚴虛高之徒為要請計爾武昌識廖如川其學虛中之學也取交遊年月日所直試之先處其年時言輒多應迂陳之迹亦與有數焉江湖二十年若如川者蓋不一二見方將挾其術遊四方請所以為贈者豫恐世之不知也書其槩為所至紹介云送相字吳心鑑序世以術言禍福者不知幾家在古有徴相差近理豐下豺聲興滅歷驗唐宋而下能者迭出其說可考也何則人賦形天地萬各不同終身貴賤夀夭則定於其賦一時吉凶則動於其色分有定而賦實見之心有動而色實先之能者考驗宜有合焉荀子且謂古人無有學者不道也今乃有授人一字而終身貴賤夀夭一時吉凶舉能言之可謂竒已廬陵吳心鑑以此術行江湖雖十人書同一字亦無有失者叩其說則毫釐假借欹正濃淡節解縷折莫不中理他人效之則擊風捕影而無從也斯術也果孰為而孰傳之耶凡人之心思慮未動鬼神莫知凝寂無朕吉凶何有一念既萌萬事生矣故文字者心之形也發諸手達諸目謂之書然則書之所出不亦淵乎夫身之形在外者也心之形在內者也得之外者有時而失得之內者若執左劵無往不合豈非內者重而外者輕乎中庸曰至誠之道可以前知見乎蓍龜動乎四體一字之教亦動乎四體之小者豈非心鑑至誠所得有心察者內而驗其别乎昔人以八人為火九禾為秀三力為州松為十八公一行有相字詩謝石以朝字知徽宗則斯術之傳其亦有所自矣士大夫異其術歌詩贈之豫叙其首靜樂居士傳後序靜樂居士安南黎侯以僮阮勤久釋而民之愛其子慧教若己子袁氏口六主握質劑復鬻為人奴罄簮珥脫之使為民如阮袁請傭報謝遣之景君德載傳其事居士曰吾憐阮勤久不忍老之何有於仁袁六人泣訴情哀勢迫見牛堂下一時不能已何有於義豫聞而喜曰兹其所以為仁義歟昔賢謂天地之於人物一也咸不欲失其性奈何制服人以為奴婢乎不幸陵谷變遷則係纍者人得而奴之人方幸其不幸役其父及其子孫而不已其亦不仁之甚也阮未老并妻子舍之非仁乎彼一毫不拔在族屬恝如路人而一見之頃若拯焚溺垂槖不吝非義乎豫病世之不與人為善也在官有確乎守已勇乎為治者良吏也而世曰彼好名者也里巷有緩已急人至傾資倒廪者與夫治橋路散粥藥皆仁術也而又曰彼有心而為者在隂德無取也嗚呼斯言其為善之賊乎如其善好名可也有心亦可也使好善有心而為善者無取則世之不好名而無心者不亦鮮乎好名有心乎且取之况居士恬退不競非好名者也有見則為非有心者也其為善不又多乎書以為靜樂居士傳後序瑞竹詩序蓂萐之生於世也代不一見華以瑞稱匪誇也竹常植爾何哉茲所謂瑞者穹壤之間有血氣斯有知人獸是也冥然無知者草木是也而其生榖戒商同穎美周桑之興劉蒲之兆苻謂無知可乎歐陽子之辨怪竹也有知不宜生廡下無知乃能避檻而曲全其生以人暨蓍龜蚓水參綜極言有知無知皆不可知然後可辨則辨矣特為怪竹發耳愚於瑞竹則必其有知焉夫竹之為植本固性直心虛節貞白氏與其似賢非常植之可偕也矧有出於四德之外者乎謙齊經歷監縣石首政平惠周秩滿深居斬竹樊圃明年春附枯出新枝葉日茂當時觀者靡不訝其不根而筍也居無何拜南臺監察御史又數年則蔚乎成林而公復召入內臺出僉兩道遂在南臺噫斷不復生冥然無知竹之常也而生於已斷禎祥吻合人力能之乎公之先世樹德惟滋吉事有祥竹之有知天道之有知也抑公之雅操直節以同相順以類相應有孚而見又瑞之常以瑞名之蓋無過也歐陽子謂怪竹有知無知皆不可知然後可愚直以瑞竹為有知將無不可續卷徴題俾相人許有壬序其首經濟編序宋亡死節卓然在天地間千萬世不可泯者文文山而下便到肯齊李公尚論其世則文肅公經濟一編其詒謀之大者乎文肅肯齊之曾大父也豫讀其書為文嘆曰理原於天事散於人明理治事一也岐而二之可乎及問學敝於記誦詞章事功撓於權謀術數二者遂戛戛不相入矣文肅師胡文定張忠獻以講求修己治人之事其體立故其用行其綱正故其目舉胡公以為有經濟之才朱子以為行事如履繩蹈矩無一事不合於理論事如絲麻榖粟無一言不適於用非溢美也家學之正傳肯齊臨大節而不可奪前詒謀而後無忝矣益陽劉用孚將刻梓淑世屬豫序豫所願不復辭也其易學之深與夫平生歷履朱夫子志銘備矣五峯文集後序五峯胡先生文集凡五卷南軒張先生序之矣益陽劉用孚將刻諸家孰且徴豫題其端豫惟世之深相知者莫若師友先生之集南軒之序詳矣豫何人哉然其引而不發者愚不容訒也先生資質純粹根乎天性講貫精密得之家傳於六經則沉潜反覆取道之原於百家則參考亙訂必是之歸其涵養見於知言一書而性命道德之微無不貫其說施著於皇王大紀而禮樂政刑之用無不該議論慷慨輝光宣著千載之下猶想見其風采至於發言為詩抒言為文皆修齊治平之實也先生避地衡山結廬五峯故嘗造祝融之峯以求先生之遺躅而深山大谷雲烟草樹邈乎其不可求也獨取先生之書伏而讀之其亦萬一私淑者乎用孚刻其書俾大行諸世其用心亦仁矣哉張雄飛詩集序延祐首科國人暨諸部列右榜者十六人幸獲魚兔委其筌蹄與夫不以一得為足汲汲所未至者亦各播人耳目有不得而掩者焉唐元氏張君雄飛首科右榜有聞者也不以一得為足益礪其學尤工於詩往往膾炙人口佳章竒句不可悉舉拜御史西臺按巴蜀越巂足跡殆盡西南履少陵之躅黔有契焉移南臺行嶺海窮極幽險僉浙東憲過錢塘登會稽探禹穴天台鴈蕩之勝舉在心目得江山之助故其詩益昌而多也夫言之精絶者為詩然昔人有文章妙一世詩句不逮古人之言亦有文章不傳獨以詩顯者工部三賦他無聞焉非無文也以其所長掩之也雄飛既礪其學而詩又其尤長者乎移僉湖南過余琅瓈山中出其藁古律詩共若干首屬序其端愚因得以悉其多也且作邑而有惠佐臺而有聞司憲而有為礪學又不已不獨資以為詩將澤於道德仁義致其逺者大者其可尚也哉吾同年之得人可不謂盛矣乎至正集卷三十三
