body:
  text: 至正集卷五十五元許有壬撰碑志教諭王孝卿墓碣銘武卿王誠從余游一日出行實致其兄進之語曰進兄弟不肖而得忝顔士類以自異於鄉民市商肆工者親之教也先人德善不可誣恐久遂泯重進不孝敢以為請按王氏家沁州武卿縣長樂里曰現當金末從軍有官勳子興參元帥杜公幕次曰信善治生家以不窶信娶元氏生忠字孝卿進父也孝卿早失父元氏誓志秉節督家人力田桑躬治絲枲平居毫釐不輕出至延師待賔則豁然不復靳儀範􅊚族孝卿性頴悟力學不倦土俗當冬隙羣居終夜斷麻取膚孝卿以膏火不繼焚麻取光且斷且誦自餘手不廢卷經史百家靡不研究下逮隂陽方技佛老之言亦致通焉事母盡子職族無遠近嵗時交歡物禮俱至隱居教授執業滿堂郡博士知其賢辟為邑教諭令邑民皆得矜式雖孝卿亦自喜將階是以發其光也大德辛丑元氏年六十七以病終孝卿克致其哀明年妻焦氏亦殞上無恃下無助又二年乃卒得嵗四十有八葬西山先塋子三人進其長也初孝卿之喪母也葬祭一凖文公禮不用浮屠不恤傍議進之喪父也恪遵遺訓有嚴無替治家儉勤遂致饒益視昔百倍立祠華不逾制而時祭盡禮曰德曰義皆孝弟克家祭統謂銘者一稱而上下皆得焉進之知此學也力人可不知教其子乎是可銘也銘曰王世右族翕闢替隆有居沁鄙樹德惟崇帝降而祥匪金匪珠俾生子為儒以華以腴翁也早殖但聞其喤母也拮据竟玉于成嗚呼孝卿生得母以為賢子死有子以為賢父雖死猶生蘄黃宣慰使咱公夫人田氏墓志銘夫人姓田氏利路西和州長樂人故四川安撫使德實季女正議大夫兵部尚書蘄黃等處宣慰使咱德威妻田世右族曽髙上俱以武功為宋顯官夫人及笄歸宣慰舅湖廣行省左丞治家嚴夫人相宣慰以能婦稱宣慰早卒子榮甫一嵗不以㷀㷀子而専於慈推世賞與諸子俾為學以世其家治家以勤老而明健談往事厯厯可聽女紅一日不去手至順四年八月十四日卒于武昌之第享年九十有一女一人適趙植孫男二人先進先升女二人先惠適鄭文監先熹未嫁以闕年闕月缺日祔公安先塋文監致其外舅榮之狀請曰咱門欲傾而支絶而續者母也力痛念冲愚先子德善多逸吾母居孀五十年節義炳炳忍復湮沒幸哀而志其壙夫人女公卿家夫在而能婦夫沒而能母執德秉義天昌其夀子且五十而諸孫亦詵詵矣豫因有以見為善之多獲也法三十前夫亡六十後不嫁表厥宅里脫不幸逾三十賢者固不敢誣凡庸之情念法已不與去耄尚逺遂分不齒豫嘗竊慨與善之狹也然法不局則冒有志於風教者亦究其本何如爾夫人守節五十年凛凛然在世者固不係乎表之有無也銘曰有營之豐有殖之蕃嗟未亡人若可飫溫彼呱者孤不季不昆茫茫百年敢豫固存慮勝而往校利有奔彼市道交天叙有惇天厚其報將百斯孫我銘其幽永示弗諼贈承務郎天臨路同知湘潭州事朱君墓碣銘君諱士心字奎仲姓朱氏世為湘鄉人曽大父用舟大父應龍宋進士父斌以子玉誠貴贈從仕郎潭州路安化縣尹配周氏贈宜人君生宋淳祐庚戌卒延祐己未至治辛酉十二月二十三日葬七都鹽井之原娶袁氏繼陶氏子合班秩承務郎武昌路蒲圻縣尹兼勸農事君贈承務郎天臨路同知湘潭州事袁氏贈恭人合班欲揭之阡屬銘惟慤嘉乃為親而筆之君為童不喜弄性恬淡諸弟絡繹入仕徙居湖山獨事樹藝事安化君不少達左右作童稚狀曲意承歡安化君年八十五卒君六十七矣哀毁踰少壯友五弟怡怡分田取其磽器取其敝夀七十子四孫二十二生為孝弟人沒追榮六品子曰璣曰琪曰瑾琪瑾出陶氏合班則璣瑾琪之兄袁氏出也通國語積勞譯掾為今官賢而能政者也豫見大家類喜官而鮮克由其道惟貨是求得亦失之是猶作墉而不堅其址楨幹一釋仆不旋踵爾安化君父子積善于躬而合班投足正途不徑不竇以底于成蓋植於前而實於後也然豫聞黃大史言吾儕衣冠而仕豈已力哉皆自髙曽以來積纍偶然冲和之氣在此一枝耳嗚呼世之自以為能而秦越其族者亦回視其始之一本乎亦推其原之所發而偶然在我乎豫竊有慨于世而重有望于合班者又將逺其澤于方至也銘曰人不愧天天不逺人彼難之獲惟致之馴熄而有光邈而益振賚恩蜂涌由葉溉根不菑何畬不耕何穫吾菑吾耕匪今而昨天昌其門流慶未已椒蕃瓜綿子孫孫子鹽井之原鳯山直焉匪山而人後其勗旃副使談生甫墓碣銘南陽書院山長廖則逢嘗斆寧鄉亟稱邑人談生甫賢狀其行請曰世達官聞人則逢不及識而識者山林中人也子名喜善達官聞人豈得專子之銘敢致其子朝貴意徼銘其阡豫憫其意遂從而叙之生甫名應發吏部端潔公後早事鉛槧作稅官不樂棄去為人踔絶好賔客娶易氏生男朝榮女懿真易氏卒葬萬善里荷曄塘生甫夀五十卒葬溫泉鄉景龍里朝榮懿真既婚嫁相繼卒朝貴本李氏子朝榮未生生甫養為嗣泰定丙寅遷景龍之葬于烏江建廟立祠割田以奉祀事邑庠摧圯獨作禮殿學庾不充割膏腴百畝入之嵗歉發廩捐直且飲食來者徙李氏塋佳地教其子姪晚乃舉四子此其狀大較也豫聞楚俗鬼殫財土木事非其事名教所出職者且不知恤况非其職而傾財力任者乎寸土一木訟結纍嵗况百畝乎嵗歉閉廩騰直乘時為富則損直而又飲食之不明乎義而能之乎可謂善變其俗者已世有為此必聞諸官而表厥宅里朝貴則力拒之然而人之稱以義者不戒而一樂善之天人心之同然也使世有君子將出亦必不靳而與之此聖人與人為善之盛心也其後談也勞筋力以立其家養生送死以答其德者固已無愧若夫泝其源㳂其流則朝貴之義又有大於是者焉豫銘生甫而詳朝貴者所以右談也銘曰應發名生甫字世寧鄉談其氏藐督征屣俱弃櫝軼材䪥厥肆生丙辰卒乙巳鬱多美李乃嗣義之實善攸取細克充大斯舉江有沱泝洄窒馴弗安沍則釋我為銘理不忒本支百視此石故進義副尉元氏縣主簿馬君墓碣銘君諱顯姓馬氏世為遼山人祖罹兵亂莫詳所出至旺娶李氏生君君少孤有志節形質魁碩不妄語笑見危難急如在已聖朝既平金平陽太原郡各一王遼山和順故𨽻平陽與太原接壤守臣主彼者率其徒劫二縣民籍之民從違相半遂自為敵日千百鬭擊君甚不平謂衆曰聖天子既定封民各有屬此王之民而為彼户可乎録其版白諸府府畏忌不果行㑹滅薛二輩行斷事官往訴其狀尋奏復之因檄君為和順令至則興治補弊安輯流散民甚德之在官十年治最一路伊蘇巴哈王嗣封與語嘉之佩以銀符衣以錦襖一蹙紋繡靴一雙銀五十兩至元己巳調天下官君自以治蹟不下任其銓授除榆次主簿君受命曰令與簿雖有髙下職王事則一也欣然赴之秩滿升進義副尉保德州判官民女有貧不克嫁者出俸資之戰骨蔽野為大塜收葬之移元氏主簿丙子嵗五月十三日卒于官得年七十九皇慶癸丑始祔于四里堠塋娶趙氏子八人長同其母趙兵亂相失次天牧天翼天羽為儀曺掾卒天祥天佐天輔天祐皆謹願克家女一人適周氏孫曾四十人於戲君逃亂孑遺而能卓然有立厯官盡忠若子若孫蕃衍若是安知他日無挺挺髙出其先者乎銘曰位奚崇卑克稱斯榮事靡難易惟志竟成匹夫崛起而能回事之難者以為易處位之卑也而如崇是知非齊民之流名豈與死而相從伊農昏勞有秋其豐植本其茂支百是叢堅珉表阡逺君休於無窮廣西憲史熊君墓碣銘廣西憲史熊君諱文煥字用晦致和戊辰六月六日卒十一月二日祔江夏西興鄉長樂村先塋其弟文照介湘隂通守納琳巴哈致其父克昭之辭曰我家三世業儒祖澤是賴有子五人仲子文煥讀書入仕矣乃先我而逝我哀其慧而夭也思有以異衆人之澌盡泯滅者且昔嘗拜子金陵文而碣之則衰朽鞠子之哀得以自舒矣蓋豫至治壬戌承乏御史而君為湖南奏差南臺控十道伻來絡繹一人接對能否立判時已多其敏捷而期其可逺也而止於斯也君先世居鄖曾祖諱天錫宋寶祐己未省試第一人祖諱季永咸淳丙寅補太學上舍始遷武昌克昭為歸州巴東教諭配劉氏君在昆季間文采郁然積勞湖北憲及格為奏差尋遷湖南升書吏遷廣西以疾歸遂不起年三十有五娶李氏一子慶孫選格出官多途拔清貴速化者科舉下即曰憲屬一為憲吏則迤邐至中書掾出身第六品其不至者班資雖卑亦變化易反手謂其風紀已試無施不可也然路貢儒吏府州拔胥史百間一得又有操觚憲司服勤執役不知幾年始與班祿又不知幾年而為奏差而升書吏得惟艱哉慮居久人狎則兩道易遷從使者繩糾郡邑望風若畏死居下盛權故疾之者衆朝議屢變選補法至其權則勢不能輕之也但嵗以御史覆其迹而去留之君廉介稱於人人不疾之御史不去之可謂適用之才已夫以適用之才服艱得之役當方剛之年有垂白之親而一旦夭卒於呼天之在冥冥者果何如哉聞者哀之况識者乎識者哀之况父母兄弟妻子乎故系之銘曰寒爾衣饑爾食鑿爾愚充爾質爾祿我養我門爾髙弗養非髙天乎劬勞豈爾愛親喜懼逾常而遄于亡於呼百世而下曰此熊君之藏孰不爾傷贈中憲大夫河東山西道宣慰副使紐公墓表聖朝孝治天下錫有位以及其親是與人為善也人有殫刑不率而格於不僇之僇者蓋有以觸其為善之機焉至大中始行封贈推恩世數視職崇卑有司不謹三格始復皇上率舊諭飾周詳久可不弊幽而泉壤昭而家庭存沒均洽其或不慎則舉而委諸掌故之藏人非喪心鮮不自勵勸懲之道於是兩盡余甫冠知河東紐君賢致和戊辰會于江夏則已休致矣一日謂曰克讓結髮筮仕卒勤四十年先人中憲公既疏縣封日愈恪慎懼或失墜今弛擔世途吾知免矣而先人又進郡封不表之阡則君親之德不才保守之難吾子孫藐乎其不知也子可無為我筆之夫自封典一行姦貪且為循廉矧素賢者其益進于忠益顯其親宜哉惟紐氏在後周有曰因者暨子士雄俱以孝稱他無見焉晉有鈕滔吳興人豈紐轉為鈕若鞠之為麴乎紐今著郡吳興豈滔亦其先邪世逺譜亡莫詳所出有居汾州之孝義者族大以蕃至用始遷介休生中憲公諱文敦厚樂易教子以禮嘗曰吾無過人者循理安分使鄉閭稱善良差可無愧用是沒齒志願畢矣至元乙酉六月缺日卒於家享年五十九葬城西先塋克讓守龍陽贈奉議大夫冀寧路總管府治中驍騎尉追封介休縣子配王氏介休縣君克讓以中憲大夫湖南宣慰副使致仕加贈中憲大夫河東山西道宣慰副使上騎都尉追封汾陽郡伯縣君進汾陽郡君三子長克忠季克恭克讓其次也為掾廉為理幕賑湖南饑活人多雪雷州李妙生三人寃賞一資嶽武昌皆劇郡為推官用法平恕其去龍陽也州人紀之碑娶陳繼張封皆郡君嗟乎孝其親則思榮其親孝則在已榮則在君克讓兩及其親卒完晚節不孤聖朝與人為善之至意矣余故併叙其說俾後裔皆有感焉孫十人曰端者方世其祿銘曰古士所事皆竭能致惟行之恆匪率亦至世不古趨率之始行昧厥宜有謂賢謂能伊率之久而格之多一機混融八荒太和彼紐有子在汾之滸視誠欿然允示繩祖至正集卷五十五
