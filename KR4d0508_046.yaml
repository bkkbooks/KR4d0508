body:
  text: 至正集卷四十六元許有壬撰碑志敕賜崇源寺碑主實喇鄂爾多皇后巴爾圖言夙侍武宗皇帝被恩務報而智力靡它作崇源寺資薦冥福請記諸石以昭臣妾事主之誠中書省以聞臣有壬承詔當筆即其狀筆之曰巴爾圖克哷氏年十三入宫武宗潜邸早受知遇及正九五賜內帑楮幣俾作梵宇以踐矢言工欲庀而宫車脫駕矣事太皇太后益著恪恭英宗熟其賢命立太祖皇后完顔氏鄂爾多三年徙居世祖皇后凡實喇鄂爾多譯言帳殿也國制列聖賔天其帳不曠以后妃當次者世守之實喇則又序於諸帳之上者焉其徙居於是也地位益榮賜賚日裕惟被恩未報是懼爰念國家尊崇釋教嚴飭寺宇于以祐國芘民者殆遍天下女人知力有度越如是者乎初仁皇居東宫賜昌平縣史村田七百畝乃即賜田力事締搆為報恩地地形爽塏閈閎邃嚴正殿位佛後殿栖經翼舍其旁武宗神御冠其北而方丈拱於後殿西為雲堂東為香積周廟以居其徒帑庾庖湢靡不華備作於泰定甲子三年迄功俾崇孝僧恆照主治今恆湍繼之楮幣計緡三十餘萬不資於官不假於人勞費亦至矣臣有壬竊聞佛之教大彌六合細入無形顧臣固陋何足以知之而所知者則佛以報恩為第一義故佛書有報恩經首稱波羅門子孝養及須闍提割身肉以飼父母𢎞衍其說以及報恩之義厥有㫖哉夫所謂報者不獨子之於父母也若臣之於君也妻妾之於夫也弟子之於師也凡人之於所遇也有所得則報之不以多寡計也吾儒亦言受人一飯之恩而不忍忘者其為子必孝為臣必忠一飯之恩至微也而不忍忘之則其受人之大者可知已世有受大恩而恬不知報一旦有事乃身先退縮不啻路人亦獨何心哉况固藏嗇用女人之常雖知其卒無所用寧終其身以付後之爭者而不肯捐一錢則盡捐所蓄以報既往之恩不賢能之乎斯石之紀使觀者有激其亦可禆於世教且使學徒不專於虛寂而凡致力於人事之實擴而充之佛之向上者可漸得矣臣有壬既紀其實又效其說為之偈曰佛有大方便經典演微妙報恩𢎞至理布教及無量含靈皆具性感觸隨所見彼姝者貴人淑秀著宫壼受恩雖錙銖欲以山嶽報况得山嶽恩我報宜何如永矢言旦旦幽明倐殊邈志堅事竟成傾篋力搆築山林爛金碧奉祀極蠲潔冥冥既資祐且盡未來際佛慈無所擇散福遍沙界皇祚綿無疆慧日光萬劫民物苟有願佛悉從所欲凡我林林生學佛當念此為臣勿忘忠為子勿忘孝人而忘忠孝雖在天地間是不與人等我願推此道普度一切人俱為忠孝者俱到大智岸敕賜順聖寺碑昔我武宗皇帝之在潜邸也今實喇鄂爾多皇后巴爾圖實侍左右既乃從太皇太后於覃懷武皇賔天仍事興聖宫慎畏自持性強記詢往求故應答周悉聖母嘗言覃懷獲歸宏濟聖業非祖宗在天之靈默佑曲護罔有今日故力事崇構資福於佛為祖宗報巴爾圖日聆聖訓而復厚沐撫視乃效聖母報祖宗者以報聖母出奩蓄楮幣三十五萬貫有竒買地都城咸宜坊作順聖寺三門夾峙大殿屹立後建重屋奉聖母神御西為十二楹連甍有閣竊自為侍祠之地東規如西而殺其後用庋藏經雲堂香積秩秩有位周廟連屬宏麗靜深際通衢為屋三十間取僦資以助恆費經始至治壬戌之春欲極工緻而監者不稱凡三撤易厯十年而後有成焜煌絢爛照耀闤闠遇者聳觀買田千畝俾永有食擇比邱尼管旃卜主之不紀其故恐後遂湮沒以告中書庶幾上聞而有所屬也省臣敷奏詔臣有壬為文臣有壬詞臣也有命弗敢辭臣聞佛之教宏大精微其要惟欲人同歸於善有不言而自信不化而自行之妙焉其徒學者女人為比邱尼蓋百不一二佛以女人多疑惑執著結業纒縛不能自出不使入佛法中而憍曇彌著卒能奉行袐教宣說微妙所謂身無常身命念念遷滅代謝不足財衆緣所共無有真主其言亦淵矣乎巴爾圖之報聖母也慤誠追慕老益不替亦善女人信敬佛法而知所先後者乎身命奧㫖將究其極若夫舉所蓄而傾委不靳則已有得於財無真主之言矣昔聖母御興聖宫受二子十孫三帝極天下之養始終十五年中間受厚恩而極富貴者不知其幾人未聞有一人奮出知報者巴爾圖以女人淑柔之質而能若是蓋有關於風教宜有以紀之也皇上孝治天下事佛之宇列聖神御在焉聖母既有所矣巴爾圖復此締搆非瀆也至誠展布隨地而見况及事親密從殉無地乃得一睹睟容與紫金之像白毫之光相為炳耀則孝敬之心油然而生佛之不言而自信不化而自行者實寓乎其中矣既述其槩若是且頌之曰象教若海孰挹其深世玩其迹盍求其心匪今斯今罔有不欽其屋如星其徒如林山臺野邑知幾萬區曰兹都城鈞天帝居寶搆突兀鬱乎相輝國帑海嶽㳙埃是靡踽踽有人毫積絲纍至於千萬猶水壑委十年營度始盡厥美聖母在天監觀有赫兹殫之力實母之錫陸海洶湧出此兜率東瞻徽儀殿閣咫尺肸蠁來臨神御有侐聖孫御天治隆孝敬淑媛有請天休丕應小臣載筆聖德是紀以彰聖治以鬯佛㫖惟佛之㫖在神御祀祐我聖嗣承承繼繼子孫孫子與天地終始敕賜故資德大夫御史中丞贈攄忠宣憲協正功臣河南行省右丞上護軍魏郡馬文貞公神道碑銘并序至正六年七月丁丑集賢侍講學士通奉大夫兼國子祭酒臣天爵言故資德大夫御史中丞贈攄忠宣憲協正功臣河南行省右丞上護軍追封魏郡公諡文貞馬祖常早擢髙第厯踐要途始終五朝有文有政宜錫碑紀德庸示報功集賢院臣以聞制可命臣有壬為文臣𤣥為書臣起巖篆其額三人皆文貞公同年進士而有壬託知尤厚始以學士被命繼冒承㫖皆在紀述其敢辭公字伯庸世雍古部居靜州天山有錫哩濟蘇者髙祖也金季為鳳翔兵馬判官死節贈恆州刺史廟賜褒忠子孫因官以馬為氏曾祖烏呼訥從世皇征宋留汴掌饋餉纍官禮部尚書贈推忠宣力翊運功臣僉樞密院事諡忠懿祖世昌行尚書省左右司郎中贈嘉議大夫吏部尚書父潤朝列大夫同知漳州路總管府事贈中奉大夫河南行省參知政事追封梁郡公妣楊氏追封梁郡夫人梁公官浮光因家焉七嵗知學得錢即以市書十歲見燭欹燒屋解衣沃水滅之人歎其異蜀儒張公􅓄講經儀真公未冠質以疑義數十張公竒之科舉詔下鄉㑹試皆第一廷試第二蓋以國人冠也授應奉翰林文字承事郎同知制誥兼國史院編修官拜監察御史仁皇久正宸極猶居東宫近侍利燕飲得售所請公抗言當御正衙立朝儀御史執簡太史執筆雖有懷姦利巳乞官賞者亦不敢出諸口承天地祖宗之重當極調攝至於酒醴近侍進御當思一獻百拜之義英廟為皇太子請慎簡師傅下至臣僕亦宜精擇時大姦當國公首知其盜觀國史洎同列疏其十罪仁廟震怒罷之黨與之布列要地者皆論列黜之端人昔與抵牾而擯斥者請拔用之秦州山移公言山不動之物而今動焉豈在野有當用不用之賢在官有當言不言之佞大臣皆家居待罪薦賢拔滯知無不言改宣政院經厯月餘辭歸起為社稷署令罷雜事於泉南大姦復相左遷開平縣尹欲中傷之退居浮光大姦死除翰林待制泰定建儲擢典寶少監太子左贊善尋兼翰林直學士成均釋奠陳太子視學之禮內出禮幣命公助祭除禮部尚書祖母張夫人卒護喪歸起為右贊善復禮部尋辭歸天厯初再使召為燕王內尉仍入禮部兩知貢舉一為讀卷官時號得人參議中書省事參定親郊典儀充讀祝册官禮成賚金幣拜治書侍御史錫犀帶及御書奎章閣記內廷宴服七襲金玉腰帶各一改徽政副使拜南臺中丞今上即位召議新政賚白金為兩二百楮幣為貫萬金織綺為端四改同知徽政院事拜御史中丞以公疾特免朝禮命光祿日給上尊知經筵進說必陳經史大義參以祖宗故實持憲務存大體西臺御史劾其僚禁酤時靣有酒容以苛細黜之山東憲以孔氏訟聞以事關名教不行按者亦引去司憲有以貪墨敗沒入其田廬請歸曲阜陵廟從之拜樞密副使居無幾辭歸復南臺中丞遷西臺疾不赴積階自承事郎至資德大夫至元四年三月丙午薨於光州之第得年六十是年四月壬申葬州北平原鄉西樊以里有司以聞有今贈諡配索氏封梁郡夫人子男二武子承務郎湖廣行省檢挍官文子徴事郎祕書監著作郎孫男三女二公言事剴切嘗建議國人暨諸部既誦周孔書當遵諸誨以厚彜倫兵家子驕脆有辜任使庶人挽強蹶張老死草野當建武學武舉儲材以備非常時雖勿用識者韙之至於論刑則一本哀矜常言死罪遇赦且原減死流徒未蒙殊渥當驗情寓恩內徙漢人滿百執弓矢獵者死不及百者流條格已有禁弓矢聚衆之條又復為此是錯綜網羅之誠恐愚民舉足蹈罪至論建德民妻之不首夫死者則當以必死其得用法之意乎國家涵濡百年譽髦斯士公先世已事華學至公始大以肆為文精核務去陳言師先秦兩漢尤致力於詩凌轢古作大萹短章無不可傳者與修英廟實録譯潤皇途大訓承華事略編集列后金鑑千秋記略若干卷至順間龍虎臺應制賦詩有玉食之賜嘗進擬藳為之歎曰孰謂中原無碩儒乎文集若干卷臺檄刻之揚州郡庠仁皇始行貢舉國人而下列為四色國人洎諸部為右榜試目視左榜差優公雖右列左列及之者指未易屈焉且其為學初不為貢舉也以挺特之資丁文明之㑹裒為舉首馴至達官威重足以鎮薄俗文章足以追古作議論足以正風俗設科得士不得不以延祐之初為盛也不幸壽僅六十未究其用悲夫銘曰元大一統六合同風南臺北萊芃生其中部族有儒文貞伊始文貞之世翼翼廟祀後承聿修講學諸夏延畀至公大有無摦嶄然異禀幼不事弄濡衣撲燎智劇碎甕益習以進益混以翰不溺不流而登於岸先秦兩漢華咀實擷天籟泠屬石湍激洌天子有詔乃興乃賔實三其魁一推國人甫試館職倐峩豸冠以爾枘鑿安我考槃遐心浮雲束帛空谷春坊翊贊經筵啓沃皇格於天公司其度俊造鑑衡風紀砥柱龎恩異數川委充溢云胡修途六十而柅既易其名亦大其封於光之原賜碑崇崇賜碑崇崇於赫厥銘同年之紀考信匪譝維爾部族文貞有躅叙倫敦典益介戬穀敕賜贈中奉大夫河南江北等處行中書省參知政事護軍追封渤海郡公吳公神道碑銘至正七年八月癸酉皇帝御慈仁殿中書省臣奏江西行中書省參知政事臣吳秉彛既封其親請刻銘以昭天休制可詔御史中丞臣有壬為文臣有壬竊謂凡為人子孰不欲顯其親然祿不逮養雖萬鍾五鼎有不易其風木無涯之感者矣國家隆推封之典無間存沒庶幾追其不可復者以慰人子之心所以嘉惠臣下篤於古矣貤恩隱卒君之仁也立身顯親臣之孝也仁孝胥盡猗歟盛哉謹按贈中奉大夫河南江北等處行中書省參知政事護軍渤海郡公諱良字良卿世家於燕大父諱榮父諱德信贈嘉議大夫禮部尚書上輕車都尉渤海郡侯妣錢氏渤海郡夫人郡公早以孝稱未嘗一日去親側禮部患疽齊沐禱於神日祝以愈兄弟三人友愛尤篤兄貞監太寧路瑞州酒稅當輸納於府州扼山瀕海溝港沮洳方六月暑雨迫官程不敢緩與弟用子秉𠂻偕行道出兩山間溪水卒至貞半涉為暴流所汨秉𠂻走援用繼之皆溺死失尸所在訃至禮部哀摧幾斃蘇復不食郡公仰天慟哭而慰其父曰兄若弟姪之不幸命也兒必得骸骨而反於是徒跣求之暑途淫潦不逺千里泝㳂溪澗凡波流旋折沙礫隱起靡不刔索號泣水際日益不懈物色衣屨果盡得三尸歸至大庚戌十月缺日卒於家壽五十有二配髙氏追封渤海郡夫人繼宋氏男一即秉彛女二適崔升髙秀皆士族貞一女齒齔失父遂子之每曰吾兄遘酷禍遺𦙍止此當擇壻以嫁後適董繼升仕至江浙省參知政事封隴西郡夫人孫男一庸國子生孫女一適應奉翰林文字劉佐平生樂施與宗姻朋舊有喪葬不能舉子女不嫁娶者悉助成之卒之九年秉彛始起家為河間路興濟縣主簿纍遷懿州知州懿附治遼陽省剸割梗阻秉彛居七年名籍甚拜監察御史由兩部京府出典兩郡亷一道入踐厯宥密憲臺中書遂參預行省距郡公之卒三十有八年矣嗚呼吳氏之先其世有隱德乎何其後之盛而報之侈也郡公發不自躬委祉後人為善之效章矣秉彛嘗守臣鄉郡郡人念紀其善於石未果而承詔銘其父碑夫豈偶然者哉銘曰吳為周宗實始泰伯長沙在漢仍啓王國世逺族綿布濩四方為士為庶或隱或章有家於燕逖聽泯泯淵泉時出厥後以振亢宗匪爵詒謀維義手足三人遽失其二哀哀猶子俱為湘纍翁將殞絶兒忍孑遺骼􅟆不生猶愈暴棄矢言卒踐與匶偕至行修於家仁施於里貴壽弗有以遺其子其子其承聲實非欵踆踆賢勞席不暇暖酬功孔渥渤海啓封匪恩之私維報之隆邦畿土良幽宮是宅朂爾著存視此銘刻至正集卷四十六
