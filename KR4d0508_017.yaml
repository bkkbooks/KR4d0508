body:
  text: 至正集卷十七元許有壬撰律詩七言五十四首巡山次王君實户部韻鬱蔥佳氣藹神都千騎熒煌日出初禾黍封墟無犬吠風雷嵒壑有龍居清時僚佐冝尊俎明日塵埃畏簡書最是忘歸竒絶處白蓮如畫碧潭虗題林春野草堂湘煙勻染緑蕪新著我闕茅管領春竹淨花深常閉户詩成酒熟便招賔杜家西郭今誰主戴氏東池又得鄰此去不煩王録事郡庠應有買山緡送李裕天厯初曽守北門兜鍪家世見儒冠投筆猶能赴急難南紀風雷旗影動北門霜雪柝聲寒牀頭轉眼金隨盡盾鼻蒙塵墨已乾却有人間真樂在夀萱堂上好承歡題明埒棟阿平章玉溪亭次劉楚竒韻二首玉驄久已倦沙堤丹鳯來因覽德輝富貴未間無足羡驅馳將老要知歸春風北海尊常滿夜雨西湖水正肥宇宙此亭心事了古今明哲貴知幾曽作人間濟海匏歸來端欲老西郊田皆種秫資鯨吸手自栽松待鶴巢尚恐山川難入詠焉知圖史不為譊髙情已分門羅雀却許儂過仗䇿敲昌平觀光樓樓前馹騎漲紅塵樓上嵐光入酒樽肺腑幾重圍上國襟喉一路控中原帝王不恃關河險玉帛常隨輦轂奔要看煙光凝紫翠闌干倚遍待黃昏遊昌平憩縣學歸過朱都督碑木葉凝霜水不波偷間今日遂婆娑清秋林壑斜陽好豐嵗郊原樂事多秦塞已隳仍郡縣武城雖小有絃歌却憐一片朱家石千古涇原臭不磨居庸關老子觀山亦有緣居庸來往涉三年清泉翠壁俱無恙皓首蒼顔漸可憐輦路雪霞秋冨貴離宫花草晚暄妍大夫不辦升髙賦自作移文第二篇再宿洪贊徐千户家用舊題韻四面雲山一徑幽停驂真可釋羇愁鄙人千里回俗駕此地兩年逢仲秋無䇿不須干北闕有懷都合付東流故鄉莫喜并州近松柏佳城在相州白志仁教授孝行公嚴檢校父也士生為學學何為百行皆由一本推竭力但思共子職明倫方可作人師乾坤恩德心無盡宅里光輝我豈知自是慶門流澤厚已傳書種到佳兒送胡彥誠赴陜西憲使彥誠為雲南參政朝京值代俄有是命故家喬木與雲齊奕葉流芳幾折圭滇水鵲巢鳩已據岐陽烏府鳯還栖百年勳業青冥上一夜關山紫氣西驄馬繡衣行莫止秦州黃草漸萋萋過宣德一簇人家映酒簾平沙漠漠草纎纎疏雲漏雨只數點逺樹隱山餘半尖春盡詩因愁裏減地偏寒比夜來添眼前亦有娛心事遍野酥香酪正甜簡秋碧孔林管勾修殿有勞諸公請作詩美之一檄何曽緑爾袍便馳聲譽動時髦事逢強力難皆易官在聖門卑亦髙自是寸忱殫職守敢煩多士頌賢勞因知天相斯文意如許靈光但野蒿漁陽天寶君王日醉眠孽臣遣此握兵權金蟆皤腹思吞月鐵騎驣雲怒射天靈武功成凶已盡曲江人老世空傳撡撾聲斷千年恨荒戍蕭蕭起暮煙曉過九弓嶺長途無處避紅塵泉石相逢意便親路轉好山常在眼林深幽鳥不驚人半空雲樹斜撑月滿地煙蕪細染春慢裊吟鞭看青壁此行尤比畫圖真曉過神山山色冥冥驛路長天光雲影曉蒼涼荻花噴白夜經雨黍葉半殷秋欲霜男子未應嵒穴老山翁休笑簡書忙却憐作吏妨幽討辜負奚奴古錦囊次薊州野風吹盡舊昏祅懷古長歌慘不驕紅樹郊原秋瑟瑟黃雲關塞晚蕭蕭驛程三日馳千里樂事百年能幾朝髀肉暗消時自笑不應詩瘦沈郎腰江西察院梅不到江南十五年眼明初見玉嬋娟天寒嵗暮人如削月落參橫骨已仙既遇風霜為真賞從知花草敢爭先廣平漫説心如鐵一賦清妍逺更傳中秋偕魯子翬御史飲僉憲張允謙宅張以中字為韻徴詩賦二首好景天教二妙同興深殊覺酒無功月涵萬頃水雲裏秋散一庭風露中此夕清光遍天下他年佳話獨河東不須更上神仙去氛翳而今已掃空良時一笑已難逢况復尊罍得侍公樹影涼篩吟席上桂香清浥酒杯中碧雲不嘆人千里玉漏方催鼓二通怪底詩成清似水憲臺元是廣寒宫偕監州諸君獵山川談笑了官程射獵銷間喜得朋日薄寒清人力健草茸坡慢馬蹄輕老狐脫網還逢犬狡兔傷弓尚避鷹政恐名藩無此樂燎毛燔肉醉班荆送可與回武昌昔人臨别強忘情不道中年百感生洹水先塋時拜掃沙溪新屋待經營已知肯構為賢子慎勿膠榮似繆兄早晚君恩聽歸去鶴磯尊酒好相迎贈寫真徹上人禪師胸次玉壺氷閲盡妍媸寓典刑正法眼供三昧手長明燈取萬殊形直教對面人忘畫却是無心筆有靈老我莫為朝貴看雲山冝著鬢星星次秉彛見寄韻蠻獠猖狂敢弄兵細民水旱不聊生一時匡世無良策萬里催歸見至情老屋有書甘獨善扁舟何日遂相迎近來物理真參透拋却浮名事事清送湯同知之寧都鬱孤臺上望寧都但見青山畫不如山接越天雲有瘴地非衡浦雁無書蘭舟夜月明雙鑑竹馬春風待二車休把鋤姦號能治至誠真可及豚魚送張伯康降香龍虎山修天夀醮用間間韻官栁搖春驛路長紅雲飛護御封香九天箕翼開玄象萬里風煙翳紫凰境勝冝闕祝釐地松隂應滿讀書堂遄歸好賦山中樂莫使啼鵑歇衆芳寄題信州真慶宫用間間韻五峰倒影碧搖空聚逺儲精擅一宫山上神仙司下土人間水旱待竒功結巢盡是沖天鶴題扁猶存貫月虹山有晦翁書溪山第一故云它日煙霞最深處半窗應許住詩翁寄題程氏斗山歸來亭世途多險更多岐只有歸途最坦夷欲領溪山寧待老試詢猿鶴已嫌遲風軒月榭時時酒茅店花村處處詩寄語歸來亭上叟有人千里共襟期送陶靜隱錬師歸陽平錬師蒙古人從祖母姓又因性慕𢎞景圖句曲山以歸句曲陽平俱好山山人新捧璽書還髙風自出族類表逺景旋移圖畫間性慕隱君真有見心於元亮更相關披荆早構琳宫了却伴雲霞盡日間和胡安常亷使盆池紅白蓮韻十首小瓶添水濺絺衣捧擁雙花炫碧漪霞臉勻香臨寶鑑仙肌凝雪出瑶池便移七澤來堂下底用孤舟泛水湄見説文園詩作祟相看吟到月斜時不采芳華不製衣只憐幽潔濯清漪施朱傅粉各有態剜璧甃雲為此池羅櫗更誰懷洛浦觥船猶復夢湘湄便當力疾酬觴詠莫待風霜搖落時淨友同心異色衣聮芳駢美照淪漪一泓便有滄洲趣千葉如觀太液池掌上風姿清可掬眼前煙景浩無湄古來材大難為用不羡花開十丈時錦服亭亭對素衣圓窪涵碧灔風漪從知城市無多地只許鈞陶作小池月影誰移廣寒上野情真到孟諸湄老夫更和􅋯仙句直待花邉爛醉時水宫仙子捲霞衣搖曳香風亂縠漪對鏡舞空鸞綽約出簾流影燕差池逺煙不隔人千里斜日猶銜玉一湄老瓦濁醪先醉倒那知方口釣魚時靚粧還逐紫綃衣共愛寒泓翠不漪湖石縈圍連島嶼碧瑶翻灔似園池莫嫌髙蓋無千柄亦有浮萍蕩四湄昨夜雨聲秋欲碎對花那忍負良時紅粉娥娥擁緑衣淡隨姑射玩瀾漪日華動影搖書几夜吹飄香到墨池尺地貯雲無盡處纎鱗環水不知湄莫嫌盆盎人間隘畢竟天涯有到時玉佩霞裾雲滿衣水奩聊共弄寒漪書齋自笑有蛙井相府不須誇鳯池坐久清風生兩腋夢回明月印重湄人間震澤空如海未是花神際遇時曳杖看花振紵衣不慚霜鬢照紋漪蓋雲擁翠浮杯面盤露分清與硯池拍岸小山渾倒影護階幽草亂交湄老翁肯作兒童態却是青蛙得意時西風未忍裂鶉衣且助妍華細作漪常笑孀娥專月窟誰教仙子共雲池華峰青璧憐無路坎井蒼煙自有湄把酒對花仍好客主人還似鄭當時貴溪倪俊仲作生墓築室其傍多種竹樹扁曰慶源道院日居其間以待終焉人生七十古來稀過此誰能必後期泉下春風無盡藏世間華屋有傾危清隂可愛偏栽竹習氣難除剩賦詩一視死生雖曠達眼前尊酒亦相冝宿遵化驛呈同行友人簿書奔走了皇華已信鉛刀勝莫邪京國五年三出塞羈窗十夢九還家愁眉常蹙詩頻草喜事不來燈自花酒盡更沽君莫惜人生分手即天涯秋田未登連日不飲陋城春事易闌珊連日無由一破顔晴少雨多花不耐量寬盞窄酒常慳渴心幾欲雄吞海醒眼應教細看山便效淵明多種秫髙情千古自相關病後縱步閉門十日謝紛譁驚見郊原換物華嘉穀偃風斜吐穗老葵經雨卧開花瓜茄健啖新拋藥杖屨安行足當車便好偷間了詩債鼓聲明日又催衙題番陽胡氏嘉樹軒隱君夢不到槐柯獨愛楓林日撫摩百嵗故家喬木在一門隂德善人多吳江謾假詩傳爾漢殿其如世變何便好續為嘉樹傳慶源流溉有餘波題杜縣尹義塋生且無情死益輕豈知埋胔著前經君侯不展春風手逝者誰寬烈火刑已辨治功書上上更推隂德到冥冥老天報施初非逺三品諸孫已刻銘題弼城鄭志道義學禮殿巍巍俯鱔堂都教晉鄙化賢良澆風自可回千載善士誰云隘一鄉但念人心皆孔孟豈憂今代不虞唐維桑與梓猶恭敬况見君家此義方馬家洲望大别煙波目盡渺茫間已認青青大别山山下故人應久待天邉倦鳥恰知還喜瞻禹柏凌雲翠却笑吳霜染鬢斑寄語舊時詩酒伴此來真得共髙間詠可行手栽牡丹書其壁花是星郎手自栽鞓紅玉板滿層臺臺中幾朵已半吐天外片帆猶未來歌管春風間繡幕門闌夜雨長蒼苔背隂留得芳華在應待同持瑪瑙杯雨中登樓二首夢回黃鳥語間關喚得幽人不暫間曳杖去穿花下路登樓來看雨中山天浮逺樹青無際雲挾長風暝不還樂意滿懷詩滿眼小園春色正斑斑柴門雖設却長關客少詩多恰是間徹地深情開月沼可窗濃翠著雲山撫松藉草時行坐踏絮披花自往還午睡覺來銀鴨冷香薪旋削鷓鴣斑間居雜詩四首鬢髮蒼浪齒動搖自知冝退待誰招茶餘引鶴消春晝酒醒聞雞記早朝肥截玉肪羮縮頸香翻雲子飯長腰尚嫌門有徴詩客時與山人破寂寥半山雲樹接修篁鎮日無塵到草堂甕牖風來書葉亂膽瓶花落硯池香壺觴自酌教微醉松竹猶存及未荒護果灌園常不暇誰知間裏更多忙鵠山東北接郊墟郭影嵐光畫不如九十日春朝暮雨兩三間屋古今書庭花紅礙經行處園竹青回翦伐餘滿地蒼苔愁踏破年來深喜故人疏竊祿多慙號具臣歸田何幸作間人登山臨水今非客病酒愁花又過春夢斷紫霄黃閣逺眼明青鏡白頭新芥薹竹笋來相續不道茅柴味更真至正集卷十七
