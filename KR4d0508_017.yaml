body:
  text: 至正集卷十七元許有壬撰律詩七言五十四首廵山次王君實户部韻欝葱佳氣藹神都千騎熒煌日出初禾黍封墟無犬吠風雷嵒壑有龍居清時僚佐冝尊俎明日塵埃畏簡書最是忘歸竒絶處白蓮如畫碧潭虗題林春野草堂湘煙匀染緑蕪新著我闕茅管領春竹净花深常閉户詩成酒熟便招賔杜家西郭今誰主戴氏東池又得隣此去不煩王録事郡庠應有買山緡送李裕天厯初曽守北門兠鍪家世見儒冠投筆猶能赴急難南紀風雷旗影動北門霜雪柝聲寒牀頭轉眼金隨盡盾鼻蒙塵墨已乾却有人間真樂在夀萱堂上好承歡題明埒棟阿平章玉溪亭次劉楚竒韻二首玉驄乆已倦沙堤丹鳯來因覽德輝富貴未閒無足羨驅馳將老要知歸春風北海尊常滿夜雨西湖水正肥宇宙此亭心事了古今明哲貴知幾曽作人間濟海匏歸來端欲老西郊田皆種秫資鯨吸手自栽松待鶴巢尚恐山川難入詠焉知圖史不為譊髙情已分門羅雀却許儂過仗䇿敲昌平觀光樓樓前馹騎漲紅塵樓上嵐光入酒樽肺腑幾重圍上國襟喉一路控中原帝王不恃闗河險玉帛常随輦轂奔要看煙光凝紫翠闌干倚徧待黄昏㳺昌平憩縣學歸過朱都督碑木葉凝霜水不波偷閒今日遂婆娑清秋林壑斜陽好豐嵗郊原樂事多秦塞已隳仍郡縣武城雖小有絃歌却憐一片朱家石千古涇原臭不磨居庸闗老子觀山亦有縁居庸來徃涉三年清泉翠壁俱無恙皓首蒼顔漸可憐輦路雪霞秋冨貴離宫花草晚暄妍大夫不辦升髙賦自作移文第二篇再宿洪贊徐千户家用舊題韻四面雲山一徑幽停驂真可釋羇愁鄙人千里囘俗駕此地兩年逢仲秋無䇿不須干北闕有懷都合付東流故鄉莫喜并州近松柏佳城在相州白志仁教授孝行公嚴檢校父也士生為學學何為百行皆由一本推竭力但思共子職明倫方可作人師乾坤恩德心無盡宅里光輝我豈知自是慶門流澤厚已傳書種到佳兒送胡彦誠赴陜西憲使彦誠為雲南叅政朝京值代俄有是命故家喬木與雲齊奕葉流芳幾折圭滇水鵲巢鳩已據岐陽烏府鳯還栖百年勲業青冥上一夜闗山紫氣西驄馬繡衣行莫止秦州黄草漸萋萋過宣德一簇人家暎酒帘平沙漠漠草纎纎疎雲漏雨只數㸃逺樹隠山餘半尖春盡詩因愁裏减地偏寒比夜來添眼前亦有娛心事徧野酥香酪正甜簡秋碧孔林管勾修殿有勞諸公請作詩美之一檄何曽緑爾袍便馳聲譽動時髦事逢强力難皆易官在聖門卑亦髙自是寸忱殫職守敢煩多士頌賢勞因知天相斯文意如許靈光但野蒿漁陽天寳君王日醉眠孽臣遣此握兵權金蟆皤腹思吞月鐵騎驣雲怒射天靈武功成㓙已盡曲江人老世空傳撡撾聲斷千年恨荒戍蕭蕭起暮煙曉過九弓嶺長途無處避紅塵泉石相逢意便親路轉好山常在眼林深幽鳥不驚人半空雲樹斜撑月滿地煙蕪細染春慢裊吟鞭看青壁此行尤比畫圖真曉過神山山色冥冥驛路長天光雲影曉蒼凉荻花噴白夜經雨黍葉半殷秋欲霜男子未應嵒穴老山翁休笑簡書忙却憐作吏妨幽討辜負奚奴古錦囊次薊州野風吹盡舊昏祅懷古長歌慘不驕紅樹郊原秋瑟瑟黄雲闗塞晚蕭蕭驛程三日馳千里樂事百年能㡬朝髀肉暗消時自笑不應詩瘦沈郎腰江西察院梅不到江南十五年眼明初見玉嬋娟天寒嵗暮人如削月落參横骨已仙既遇風霜為真賞從知花草敢争先廣平漫説心如鐵一賦清妍逺更傳中秋偕魯子翬御史飲僉憲張允謙宅張以中字為韻徴詩賦二首好景天教二妙同興深殊覺酒無功月涵萬頃水雲裏秋散一庭風露中此夕清光徧天下他年佳話獨河東不須更上神仙去氛翳而今已掃空良時一笑已難逢况復尊罍得侍公樹影凉篩吟席上桂香清浥酒盃中碧雲不嘆人千里玉漏方催皷二通怪底詩成清似水憲臺元是廣寒宫偕監州諸君獵山川談笑了官程射獵銷閒喜得朋日薄寒清人力健草茸坡慢馬蹄輕老狐脱網還逢犬狡兔傷弓尚避鷹政恐名藩無此樂燎毛燔肉醉班荆送可與迴武昌昔人臨别强忘情不道中年百感生洹水先塋時拜掃沙溪新屋待經營已知肯構為賢子慎勿膠榮似繆兄早晚君恩聽歸去鶴磯尊酒好相迎贈冩真徹上人禪師胷次玉壺氷閱盡妍媸寓典刑正法眼供三昧手長明燈取萬殊形直教對面人忘畫却是無心筆有靈老我莫為朝貴看雲山冝着鬢星星次秉彛見寄韻蠻獠猖狂敢弄兵細民水旱不聊生一時匡世無良策萬里催歸見至情老屋有書甘獨善扁舟何日遂相迎近來物理真叅透抛却浮名事事清送湯同知之寧都欝孤臺上望寧都但見青山畫不如山接越天雲有瘴地非衡浦雁無書蘭舟夜月明雙鑑竹馬春風待二車休把鋤奸號能治至誠真可及豚魚送張伯康降香龍虎山修天夀醮用閑閑韻官栁摇春驛路長紅雲飛䕶御封香九天箕翼開𤣥象萬里風煙翳紫凰境勝冝闕祝釐地松隂應滿讀書堂遄歸好賦山中樂莫使啼鵑歇衆芳寄題信州真慶宫用閑閑韻五峰倒影碧摇空聚逺儲精擅一宫山上神仙司下土人間水旱待竒功結巢盡是冲天鶴題扁猶存貫月虹山有晦翁書溪山第一故云它日煙霞最深處半牕應許住詩翁寄題程氏斗山歸來亭世途多險更多岐只有歸途最坦夷欲領溪山寧待老試詢猿鶴已嫌遲風軒月榭時時酒茅店花村處處詩寄語歸來亭上叟有人千里共襟期送陶静隠錬師歸陽平錬師䝉古人從祖母姓又因性慕𢎞景圖句曲山以歸句曲陽平俱好山山人新捧璽書還髙風自出族類表逺景旋移圖畫間性慕隠君真有見心於元亮更相闗披荆早構琳宫了却伴雲霞盡日閒和胡安常亷使盆池紅白蓮韻十首小瓶添水濺絺衣捧擁雙花炫碧漪霞臉勻香臨寳鑑仙肌凝雪出瑶池便移七澤來堂下底用孤舟泛水湄見説文園詩作祟相看吟到月斜時不采芳華不製衣只憐幽㓗濯清漪施朱傅粉各有態剜璧甃雲為此池羅櫗更誰懷洛浦觥船猶復夢湘湄便當力疾酧觴詠莫待風霜摇落時净友同心異色衣聮芳駢羙照淪漪一泓便有滄洲趣千葉如觀太液池掌上風姿清可掬眼前煙景浩無湄古來材大難為用不羨花開十丈時錦服亭亭對素衣圓窪涵碧灔風漪從知城市無多地只許鈞陶作小池月影誰移廣寒上野情真到孟諸湄老夫更和􅋯仙句直待花邉爛醉時水宫仙子捲霞衣摇曳香風亂縠漪對鏡舞空鸞綽約出簾流影燕差池逺煙不隔人千里斜日猶銜玉一湄老瓦濁醪先醉倒那知方口釣魚時靚粧還逐紫綃衣共愛寒泓翠不漪湖石縈圍連島嶼碧瑶翻灔似園池莫嫌髙蓋無千柄亦有浮萍蕩四湄昨夜雨聲秋欲碎對花那忍負良時紅粉娥娥擁緑衣淡隨姑射翫瀾漪日華動影摇書几夜吹飄香到墨池尺地貯雲無盡處纎鱗環水不知湄莫嫌盆盎人間隘畢竟天涯有到時玉佩霞裾雲滿衣水奩聊共弄寒漪書齋自笑有蛙井相府不須誇鳯池坐乆清風生兩腋夢囘明月印重湄人間震澤空如海未是花神際遇時曳杖看花振紵衣不慚霜鬢照紋漪葢雲擁翠浮杯面盤露分清與硯池拍岸小山渾倒影䕶堦幽草亂交湄老翁肯作兒童態却是青蛙得意時西風未忍裂鶉衣且助妍華細作漪常笑孀娥專月窟誰教仙子共雲池華峰青璧憐無路坎井蒼煙自有湄把酒對花仍好客主人還似鄭當時貴溪倪俊仲作生墓築室其傍多種竹樹扁曰慶源道院日居其間以待終焉人生七十古來稀過此誰能必後期泉下春風無盡藏世間華屋有傾危清隂可愛偏栽竹習氣難除剩賦詩一視死生雖曠達眼前尊酒亦相冝宿遵化驛呈同行友人簿書奔走了皇華已信鉛刀勝莫邪京國五年三出塞羈牕十夢九還家愁眉常蹙詩頻草喜事不來燈自花酒盡更沽君莫惜人生分手即天涯秋田未登連日不飲陋城春事易闌珊連日無由一破顔晴少雨多花不耐量寛琖窄酒常慳渴心幾欲雄吞海醒眼應教細看山便效淵明多種秫髙情千古自相闗病後縱步閉門十日謝紛譁驚見郊原換物華嘉糓偃風斜吐穗老葵經雨卧開花𤓰茄健啖新抛藥杖屨安行足當車便好偷閒了詩債皷聲明日又催衙題番陽胡氏嘉樹軒隠君夢不到槐柯獨愛楓林日撫摩百嵗故家喬木在一門隂德善人多吳江謾假詩傳爾漢殿其如世變何便好續為嘉樹傳慶源流溉有餘波題杜縣尹義塋生且無情死益輕豈知埋胔著前經君侯不展春風手逝者誰寛烈火刑已辨治功書上上更推隂德到冥冥老天報施初非逺三品諸孫已刻銘題弼城鄭志道義學禮殿巍巍俯鱔堂都教晉鄙化賢良澆風自可囘千載善士誰云隘一鄉但念人心皆孔孟豈憂今代不虞唐維桑與梓猶恭敬况見君家此義方馬家洲望大别煙波目盡𣺌茫間已認青青大别山山下故人應乆待天邉倦鳥恰知還喜瞻禹柏凌雲翠却笑吳霜染鬢斑寄語舊時詩酒伴此來真得共髙閒詠可行手栽牡丹書其壁花是星郎手自栽鞓紅玉板滿層臺臺中幾朶已半吐天外片帆猶未來歌管春風閒繡幕門闌夜雨長蒼苔背隂留得芳華在應待同持瑪瑙杯雨中登樓二首夢囘黄鳥語間闗喚得幽人不暫閒曳杖去穿花下路登樓來看雨中山天浮逺樹青無際雲挾長風暝不還樂意滿懷詩滿眼小園春色正斑斑柴門雖設却長闗客少詩多恰是閒徹地深情開月沼可牕濃翠著雲山撫松藉草時行坐踏絮披花自徃還午睡覺來銀鴨冷香薪旋削鷓鴣斑閒居雜詩四首鬢髪蒼浪齒動摇自知冝退待誰招茶餘引鶴消春晝酒醒聞雞記早朝肥截玉肪羮縮頸香翻雲子飯長腰尚嫌門有徴詩客時與山人破寂寥半山雲樹接修篁鎮日無塵到草堂瓮牖風來書葉亂膽瓶花落硯池香壺觴自酌教微醉松竹猶存及未荒䕶果灌園常不暇誰知閒裏更多忙鵠山東北接郊墟郭影嵐光畫不如九十日春朝暮雨兩三間屋古今書庭花紅礙經行處園竹青囘翦伐餘滿地蒼苔愁踏破年來深喜故人疎竊禄多慙號具臣歸田何幸作閒人登山臨水今非客病酒愁花又過春夢斷紫霄黄閣逺眼明青鏡白頭新芥薹竹笋來相續不道茅柴味更真至正集卷十七
