body:
  text: 至正集卷五十四元許有壬撰碑志故封從仕郎武昌路武昌縣尹萬君墓碣銘愚昔在京聞咸寕萬君隆師教子季弟有孚就學其家辱視尤厚天厯戊辰識其子國鍳明年季冬娶於咸寕始識君而登其堂焉至元四年戊寅嵗七月戊申君以疾終於家己卯十一月庚申葬邑北雙鴻灘湖白諸子請銘其碣按宋有諱思杞者齊郡無棣人為江西提刑因占籍豐城君逺祖也至高祖炳游鄂愛滏川山水家焉曽祖諱必大妣范氏祖諱從龍妣劉氏考諱文舉妣宋氏君諱希孟字醇甫生七嵗丁勝國訖籙從母逃難俘至沔州西邂逅世姻張叟説其將得贖歸則故基餘廪舉為豪據宋夫人攜君訴官僉省鹿泉賈公方事撫定檄主者皆復之長益刻勵奉母孝謹部使者將表宅里固辭乃已表姊良人呉誣構下獄事急質田於君約三年贖事俄白即請贖君急歸之母黨曰濂者田將淪於質君曰可易契業不易創奈何棄之吾念世戚非利之也假緡出之嵗入其租及其直即反之舅氏前進士楊溪先生掖君於立楊溪病以二子託既卒挈歸教育經理其家天厯己巳大旱有儲者皆閉遏以俟翔貴君發廪平其直出入斛不二民有李賈各棄田若山林易穀直有成約明年春直増倍差二子始來如元直給之邑屢災後先三千餘户户賑穀一石所識窮乏者倍之居直火衝者再四隣煨燼而居獨巋然人謂隂德所致郭徳方死無以斂遺之杉材其子伋酬直千緡君曰吾與爾父分雖舅甥義若兄弟忍利之邪監縣巴延坐誣就逮以屋居其孥巴延卒為具棺衾資其家使歸作徳新堂儲書延蜀老儒王履佐才八年佐才捐館躬治含禭棺斂將擇地葬之其子欲葬鄂不能止乃厚賻之復求明師勉諸子終業且語之曰甲戌秋吾祖挈三子十三孫避地舟居吾最孱弱後獨吾母三人歸不意有今爾曹一乃心力庶幾無忝枚舉其名因其才而教之後皆如其言用子國鎮官封從仕郎武昌路武昌縣尹既受命而終壽七十二娶孫氏先公三十三年卒子五人曰國鈺能世其業曰國鎮起家荆南宣閫知印湖廣省行人除黄州録事曰國鍳中延佑庚申鄉貢進士舉曰國鉉曰國銓皆儒業女三人長適李得潮次適呉􅙫幼未字孫男六沬沂淵汶濂渭孫女四君莊慎有識度楚俗鬼君獨不謟豪家子率汎習君獨教以詩書殖産雖豐而衣不兼采食不重味賑災惠乏乃復不靳其齠齔孑遺脱身來歸舉已墜於陵谷變遷之餘既復其舊而又有加焉者其有以哉嘗患世人必官而行其志官固行志之具也不官他果無具乎力不能及人而不能行其志宜也力可及人也獨非行志之具乎惟能推吾之有餘以濟彼之不足其及人不博矣乎食人之禄而受其寄者有所不及也况従而朘之者乎君之榮於生而昌於後宜也銘曰仕食其職不職其憂受人牛羊芻牧盍求貪夫徇財死易一錢周室秦越人何望焉不官我身幸裕我蔵忍乗爾危遂搤爾吭提㩦傴僂形鵠色菜不易吾不力吾概災户三千户凡幾人露處嗷嗷而腹我囷昔君之來踽踽其迹今君之老子孫蟄蟄有朱斯服由葉溉根何以致之經籍教敦雙鴻卜吉嗣承惟賢支百伊始其昌其延故成全郎諸路醫學提舉郜公墓志銘公諱文忠字信卿姓郜氏世居河南業為醫金亂昆弟四人北渡河亂離自給其諱成者公之祖也占籍濟寧尋遷彰徳因家焉妣闕氏考諱闕妣闕氏公㓜讀書師紫山胡公以儒為醫故所造詣視世之專門而局於其術者有加焉擢大都路醫學教授恪盡其職太醫院知其賢不使出而浮沈郡邑也累陞成全郎諸路醫學提舉秩第五品太醫院總天下醫政而考覈課藝薦擇校職提舉實握其要雍容其間以稱職聞致仕歸築别墅洹水之陽自號洹溪野夫日與老友詩酒相娯樂至元四年戊寅嵗閏八月二十八日以疾卒於正寢享年七十有六配王氏子四人長曰元早卒次曰𢎞業儒出官除闕郎利用監知事次曰中曰恪皆為彰徳路醫學正女三人長適李闕次適王闕次適郭闕孫男三人女一人俱㓜以是年十一月闕日祔安陽清流源先塋𢎞請志既按其状叙其世若履歴矣他及知者湮沒可乎公為人純和而舒徐與人交無少長皆得其懽心自其為醫官里之醫苟能效一藝随其藝髙下皆推轂使其不為齊民先公捐館京師歸葬之議未决公厲言主鄉里之議不敢忘也予得請歸蓋欲載酒相從而尼於塵事者數矣其生也不能盡平生之懽今没矣可以泄吾悲者獨銘爾尚敢辭哉銘曰粹其著懿厥禀引年歸曲肱枕土維稼洹可飲未予卑均五品七十六得已甚生治世卒正寢子服官迹方闖慶源肆日已浸清流原澤不滲銘幽宫子予審故嘉議大夫廣東道都轉運鹽使贈通議大夫户部尚書上輕車都尉追封髙昌郡侯哈喇布哈公墓志銘公諱哈喇布哈高昌人其先曰􅚐欲谷者助討安禄山封忠武王數傳至克斯布哷公高祖也遼錫號阿達都督曽大父岳弼大父亞思弼世有竒勲皆國相父約羅特穆爾慷慨自植兄伯勒齊爾布哈柄用既隆殺西丹僧稍監復有功左右忌而譖之不能自明乃同歸我朝太祖皇帝待以殊禮而留為質焉傳皇弟幹真以孝悌不殺統治中原従平河南監軍民總聽斷化行盜彌以壽卒官公㓜奉母鄂通夫人居益都慨然趨父官所請學父竒其志授輝和爾儒書性警敏誦輒不忘李璮叛母夫入迯難相失公晝夜號泣從父行省薩竒蘇平賊購獲奉歸行省器之薦入宿衛使益都立四脚山冶以勞授金符都提舉尋譲厥弟天兵之南擢行都漕運使饋輸以濟宋平上守成䇿大要存國體勵士節定官程厚民生昭舊族撫新民時論韙之江南漕秫米二十萬石由刋溝達河舟覆損十之一斛之出納復有大小之耗責償舟人公抗言多寡有量水覆非人沒責償非宜請獨當其責報罷時相憤嫉黜監寕海路遷江西宣慰使改廣東轉運鹽使兼領諸蕃市舶私販之徒連萬人作亂行省檄公暨招討使達實密捕之渠魁既殱親抵巢穴悉招出復業條鹽法不便革之劾按察托歡姦利罷之盗歐南喜破城殺吏衆十萬公圖上阨塞并攻取䇿分兵搤之功最諸將占城之役護餉道遇賊歐鍾鋒甚鋭公慨然曰軍餉重事退縮誤國可乎率先力戰矢竭馬創格鬬踣數十人氣益厲兵寡為所執賊欲奉為主公大罵之遂遇害至元甲申二月十九日也年三十九屢見神異越民繪像祠之某年月贈通議大夫户部尚書上輕車都尉追封髙昌郡侯配希台持勒氏賢操夙著後三十五年壽七十二卒封髙昌郡夫人二子長曰偰文質以其先出偰輦傑河因偰為氏焉守廣徳治最諸郡累官通議大夫今佩金虎符同知廣西兩江道宣慰使司事副都元帥十歳刲股愈母疾人謂忠貞孝萃一家繪三節圖傳之次曰越質倫早世女一人鎮江呼圖克哈適霍哈雅孫六人曰偰玉立延祐戊午進士朝列大夫濟南路治中曰偰直堅泰定甲子進士承直郎同知新昌州事曰竒徹圖廷祐乙卯進士奉議大夫南臺監察御史曰偰朝吾至治辛酉進士承直郎枝江縣達嚕噶齊曰偰列篪至順庚午進士將仕郎湖廣行省管勾皆文質子曰善著泰定丁卯進士將仕郎淮安録事司達嚕噶齊越質倫之子也孫女四人曽孫男九人女六人公少有志節器可大受用兵理財纔一節爾而履閲所施人視為法至於見危授命則大節可知已延祐設科今六舉公六孫舉輒中一人唐宋監時儒家世科未有如偰氏一門兄弟之盛天下傳為美談不知其先何修而得此於天也觀公之行則天道可知已然亦竊訝天之屑屑然若有意於報公秩秩然猶舉器而列置於地者豈以科名之貴實出至公不於彼而一於此以必天下後世之信於為善邪抑公之忠義在天地間百世不泯精誠之至則與天一其必於天者自有在也於戯偰氏其益顯矣某年某月某日改葬公滕州禮教鄉清溝原使來請銘竒徹圖於有壬偰列篪於弟有孚皆同年義不敢讓為之銘曰惟偰輦水太古未漓其鍾為才天下之竒流祉在昔盛迺萃今繄尚書公曰大是任純孝生知忠貞有自王師弔伐允資餉饋六合既一守成異宜大攄厥藴以昌聖時督漕𣙜鹺寸莛巨鐘民死而生民盜而農力戰無前蜂蟻敢兵沒當厲賊首離豈懲嗟嗟越民廟祀無斁匪公之異實公之徳天之報公曰惟顯哉諸孫聮科鄧林取材東山卜吉土厚俗善帶以清溝猶昔闕慶源再啓時出其淵刻銘納幽何千百年故奉政大夫鉛山州知州兼勸農事元公墓志銘髙平元利甫始識於京實大徳丁未春距今至元壬申凡十六年至治壬戌承乏南臺御史行部江西利甫為𣙜茶判官泰定丁卯先公祔安陽先塋利甫先卜築吾鄉偕鄉人致賻惟謹今年鉛山代歸又及先太夫人祔既襄事六月二十九日拜賻於其居郡東北張見里潔衣肅迎喜動容體謂其居陋宻邇右丞文肅韓公别業假屋延欵三起視其具平生歴履資格崇卑子壻性質外家隆替若耕織纎悉悉以相告予方撰屨利甫忽召僮急求水飲已曰我胷中躁俄左臂足不隨但云頭痛者再僮欲扶歸已不能履若將奄奄者夫人子女皆城居予為之撝叱僕婢分走求醫來已不及矣以九月十八日葬張見西原其友封禮部員外郎杜愚状其行挈其壻馬緒致夫人髙平縣君韓氏之辭曰元門一旦至此所以圗不朽者其孤未有知未亡人是責沒雖不幸幸適有遇志其壙他復誰託予憂患中不輕出出際若是不少後先且告言覼縷若將有託焉者是亦果有不偶然者乎按元氏世為澤州人祖諱寶妣齊氏考諱琇累官承務郎樞宻院都事贈奉直大夫澤州知州妣姬氏追封髙陽縣君五子曰闕大同路行用庫使曰闕兾寧路總管府判官曰享利甫也曰孚沆州路總管府治中曰闕髙平縣務使利甫㓜侍親讀書京師通譯書國語補武備寺史除將仕郎武備寺承發架閣管勾歴夀武庫副使利器庫大使選補中書省史除中書省架閣庫管勾轉奉訓大夫武備寺經歴母憂服除起為彰徳路總管府判官京師嵗所需物郡邑例買於民其直曠欠不給給則大半入貪吏手名為和而實白深懲其弊先付以直民甚徳之橋道圮壞率皂𨽻應其役民輸粟倉吏狃嵗弊取贏繩治如法横費為省郡雖家居私謁杜絶分憲行郡或託士求舉叱之曰身苟不慎虚譽何益而憲推廉能乃為舉首秩滿有彰徳等處鐡冶副提舉之命未赴改奉直大夫江西等處㩁茶都轉運使司判官茶法病民郡邑尤窘釐不便者數條課亦告登舊弊出額取分利錢官吏恬習謂當受猶俸禄然一切却之風紀舉堪守令遷奉政大夫鉛山州知州兼勸農事嵗大饑出禄米五百斛倡大家賑之和者至萬石人詠歌不能忘閒居樹藝方為嵗晚計而溘爾長往可勝嘆哉得年六十有三夫人文肅女恭儉柔懿相家於成初文肅與澤州公同在樞幕愛其淳慎而女焉文肅老子㓜果能相其營葬而經理其家二子長觀音努八嵗㓜甫兩月一女馬緒妻也噫人有死雖同而有大不同者或牀笌曠嵗竟亦不免生者無悔逝者毒焉或遺世食頃生者不及進一劑之拯留恨無極逝者安焉是蓋得於天之不同而或者遂謂此愈於彼豈理也哉惟正命全歸聖人之所取其庶幾乎二氏為宏勝誕夸嘗預告人以聳動愚俗而静修之士原始反終亦有前知而不亂者如利甫者其知乎方校資格有望將來其不知乎告言覼縷若將有託焉者何也豈動乎四體有不能自已者乎其知不知予不知也獨悲夫族屬至親無一在側而予呌呼救療雖終無益而區區之心亦勞矣其偶然乎其亦彼有遇乎如有所遇也則予之銘之也不容辭已銘曰有齡匪鮮六十又三有官不卑守爵是儋為薪火傳則二斯男疢恒楚極逝乃笑談馮生芸芸及是斯可緒使狂奔躅石途左豈其自知告言𤨏瑣猶針投芥銘實在我我銘孔昭宅幽諧卜利爾後人以似以續至正集卷五十四
