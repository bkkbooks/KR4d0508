body:
  text: 至正集卷七元許有壬撰古詩七言二十三首許國文穆公東封加食邑告身其九世孫湖北憲行人吕伯溫求題攙搶掃盡五星聚太平舜日方禺中有龍渴睡忽驚起八荒雷雨天無功平生學術匪黃老但以清淨恢皇風三持鈞軸一夾袋四海人物歸包籠功成勇退挽不留洛川雲卧春冲融祥符天子當東封慶成霈澤均臣工進封加邑恩固渥此心已逐冥飛鴻汾隂歸來駐六龍門闌炫耀霓旌紅老臣已分先犬馬擇相為君言至公至今綸誥有神護世變不與浮雲空天章鸞錦爛五色想見捧出蓬萊宫耳孫令器試憲屬祖德種厚收宜豐青氊何物且念舊至寶肯使塵埃蒙由來世守在聿修願言什襲傳無窮題南谷平章畫象河南王孫謫仙人騎鶴來玩人間春控搏萬象筆有神清氷寒玉誰能塵貂蟬圭衮推世臣顧乃寬博烏紗巾良工寫意不寫身蕭然印出蓬山真它年霖雨周無垠歸來南谷秋嶙峋烟霞為友風月賔野服坐挽羲皇淳漢家政爾圖麒麟觀漁篙師百趾悍如獺數罟汙池圍四匝小魚幸免醉渾濁大魚勢窘鳴撥剌健者逃生時鼓勇登岸噞喁鬐折摺老鱖空排棘刺銛巨鮎難恃腥涎滑江河出入豈不慎鮮槁兩途才一霎鼎宜薑桂登腹腴方丈飽餘惟小呷任公夸誕已素知如棠況有春秋法區區口腹敢纍人養小因循成好殺蒙莊誰道絶物者我見濠梁心不恝主人笑我何小慈乘舟更射春江鴨贈相師沈湖雨我聞西湖天下竒風景晴雨皆相宜有人厭晴太妍麗却愛風雨昏冥時天工一夕辨歲事紛紅駭緑春離披先生醉卧忽驚起妙趣不許他人知竹枝蕉葉送清響簷花簾影搖清漪乾坤一段真水墨勝處可與浦仙期盡收清氣注雙目所遇無復差毫釐江湖汗漫二十年短篷窗下還聽之倦游舊隱頻入夢便欲踏浪尋吳兒西湖它日我亦往君當携雨來催詩題李國瑞雪洲逺游早作觀光客十年慣看燕山雪廣寒宫殿倚天開晃朗瑶臺連貝闕北風吹落銀河水一夜乾坤變虛白瀛洲俯瞰島嶼空山下皚皚成一色小臣給事曽上天凡骨翛然清欲徹南來苦熱願恆寒每恨無氷愆歲律今年人道定豐稔臘前三白將盈尺幽人髙卧鵠山下起看鵠山渾不識却從山頂望鸚洲大素無垠玉無隙此時心境忽有㑹但覺清風生兩腋忍寒不顧玉樓粟方喜詩從天外得雖非孟浪剡溪游習氣頗有王家癖從今便號雪洲人已具小船青箬笠牧菴姚先生贈相師梅淵泉詩淵澄如止水泉活有餘波梅到清香處君應風味多商德符既為畫之且求豫詩云牧菴老仙善游戲贈詩專詠君姓字夀巖喜畫今獨步又寫姚詩入縑素姚詩商畫真二竒有聲無聲人自知梅君挾走半寰宇玉關豪傑皆識之怒人及蟹世固惑惜君真與梅無别萬里歸來舌尚存七旬向上頭無白江湖眼力老更神品題也到山中人山人無意問利達見君但問西湖春題商德符為梅淵泉畫清江圖秋江千里快一㵼目盡雲林認平野眀窗展玩為釋然況是當年身見者若人自非詩中仙定知胸次無此天可憐衆史恣塗抹兔魚未得空蹄筌我登鶴樓望江漢恰似夀巖圖上看有時風止水鏡平便棹酒船游汗漫梅君收斂江湖蹤過我翠鵠烟霞中他時若見夀巖老不妨添我為漁翁東澗講主代額森宣慰為沙門參香山晉老有所得游廣陵歸歌以餞之聖元世臣東平王勳庸滿世笏滿床有孫稚節見翹楚椿萱愛之期夀康人言西佛操厥柄身名幾欲見緇黃邦楨誰忍坐朽腐才實天不淪荒唐乃聽其徒代祝髮却為衆生變其法盍令救世行慈悲究竟世尊心不恝愛烏自是余情真其徒況復真可人歸舟天地有明月行腳江淮無好春題詩為向香山道山門苔滑今誰掃人間難事龜脫筒等閒莫效俞清老題玉關雪中竹石老木圖郊原觸目荒寒天中有清致誰能傳此君特立節素著枯槎亦復回春妍僵龍攖雲欲飛去翠鸞曳風寒自舞蒼頑虎踞不記年一霄變化誰玉汝笑談萬象歸神竒天工能畫自不知是中有隱隱佳句却彼玉關先得之俗師用色勢益窘林下風姿豈脂粉玉關佳處色是空為君重作丹青引題李元敬照磨眀妃圖臂香骨沁守宫虐金鎖重門怨銀鑰深宫有眼不識春晝長時聽雲間樂平生所見惟監宫今朝豈期見畫工君王知畫未知妾薄命已分如秋蓬黃沙漫漫天無窮驚飈吹老紅芙蓉穹廬眀日又何處此生遂負南歸鴻和親納侮號上策建議詒謀婁敬責妾身雖苦免主憂猶勝專寵亡人國關山寥落夢亦迷嫁雞正爾隨雞飛人間生女莫望貴只可近作田家妻琵琶聲斷霜天月青塜至今青不歇後來却有蔡文姬千古胡笳辱哀拍題咬雲莊侍御為龎允中畫山水障山人夙有愛山癖拄笏憑闌竟朝夕市朝一日不見山便取畫圖張素壁吾鄉好山冠河朔萬丈嶄嶄倚空碧維時秋清宿雨收百里浮嵐手堪挹昔年鼓勇踏其麓已悔東南多履迹隆慮深處有仙境塵事無端苦相厄南征馬上幾回首夢寐於今悵如失題封倐爾到江湖撲人猶覺烟霏濕恍疑著我洹水上西望太行才咫尺題詩便當歸來萹請君光掃松間石雪蓬歌贈廖楚村山長人間塵土何地無道人自愛居江湖江湖佳處寫不盡且復想像陳其踈有舟如葉君勿笑氣象乃欲吞堪輿四時風景皆可樂歲晚獨與天游俱青山昨夜忽遁去萬象一色涵冰壺眼界疑墮清虛府心境直造鴻荒初道人箕踞受竒供但訝光怪生籧篨霜筠露籜政不俗更欲緣飾為瓊琚湘江清碧俯見砥嶽麓倒影寒縈紆興來不省有物我短簑獨立歌吳歈可憐翠被秦復陶但賈憂患來攻驅莫言雪盡蓬遂廢敲雨承月仍相娛寄題新建鄭同甫書帶軒康成山中草如世因强名為書帶雲仍取扁豈徒然學業欲與康成配帶為書用亦所宜書不用帶腹貯之但教長養莫除去風月無邊當自知用原功韻餞陳衆仲提舉七閩山水天下竒唐舉進士繇詹始清淑蜿蟺發有時紹興而還不勝紀我朝混一幾百州聲教漸被無荒陬陳家有人尤秀出弱冠衆已推名流淵珠千仭出一綆從此光華孰能褧六年樂育席為穿眼砥諸公自臺省五兩風順歸舟遲滿舟載文皆璧圭希聲直掃靡靡盡正色上矗蒼蒼齊兹行小試穿楊手未許垂楊生左肘欲論心事奈别何江海一觴期白首題雲莊青山白雲圖白雲舒卷初無心青山之青古復今雲兮於山何損益自是幽淡攻相尋昔年下土旱肆虐有力足可為商霖長風多事不相假悠悠歸來林壑深猶能粉澤作景物怡悅方外供清吟雲山之人素知雲清氷寒玉眀胸襟偶從拄笏得爽氣肯與衆吏爭浮沉村墟野屋暮杳杳風霜老樹秋森森小溪幾轉訝無路懸瀑半天如有音雲舒雲卷目盡處一㸃隱隱浮遙岑九衢塵土沒馬首安得此地投吾簪便當携手共歸去披雲醉踏長松隂牧牛圖峥嶸春烟四十角已任秋成在人目曉耕課足得少休付與東風一川緑飲齕奔眠各遂天餘力猶能事攻觸牧兒心迹兩相忘鞭策不施伊自服撝叱如羊攀角上負涉嬉嬉似遵陸服勤縱使骨羸錐乳蚳嗣勞仍有犢犢兮更為慎芻牧公家租稅何時足問喘燮和吾豈知詩成聊備耕田曲張騫乘槎圖世言天河與海通浮槎歲來秋適中有人好竒贏糧從源幾萬里吾其窮城郭何地倐此逢雲煙宫室相冥濛見美而識雲鬢鬆西有癡絶牽牛翁問之蜀嚴能識儂又言張騫昔使戎乘此直泝崑崙東得石歸可夸兒童曼倩侮世如瞽聾君平更躡虛無蹤茂陵方急開邊功抵巇宜得博望封昔躬所無後乃叢豈非致此由鑿空稗官之靡棟漫充千年孰抑荒唐風流傳幾時到畫工鉦可喻日聲非容酒多且㫖殽且豐萬事不用研初終安得畢卓吾將同送劉安禮御史歸棘津昔年旅食京華春劻勷塵務窮朝曛相逢一語不暇盡況得杯酒攄殷勤南來與君實同寅同方逾月仍袂分人生離合劇萍水世情好惡從蕕薰羡君讀書早樹立峨峨法冠聳惠文風霜肅物未終考已辦事業流清芬神羊天遣觸邪佞有羝突出甘敗羣皭然公議炳星日肯使玉石真俱焚俗方任耳眩名實牛鬭驚蟻雷疑蚊行藏有道且有命飄然我自樂我貧親闈咫天躬滫瀡綵衣獨速人微醺世間真樂此無比身外富貴徒紛紛但恨多病疏麴生一尊何由傾倒君扁舟眀日應回首日暮江東多碧雲池州驛有王君陽所畫老木滕玉霄跋語二君皆故人為作數語何年髯王來此驛怒磔蒼髯挽椽筆想當奮筆一掃時亂擁槎牙出東壁千霜百霆摧不盡坐使根柯成鐵石誰謂毫端一寸鋒辦此人間萬牛力玉霄狂老亦可人蛟蚪繚亂雲烟濕芳醪萬斛醉不死愈覺吐辭清可挹當時京國俱從游滿幅持來渾不惜天涯一見眼為眀相逢況復曽相識我今妄受車服維所至規規專一室跫然不待足音來二妙真堪慰岑寂行建德縣民有訴作橋罹害者作徒杠行霜餘溪湍息奔鬬農隙維時梁可構往來恐有病涉人官著恆規誰敢後邑胥承帖來鄉里鄉民見胥如見鬼督材斬木到丘壟致期視成驅婦子人未安行力已疲冬無㫖蓄雞先死田家雞盡真可哀邑宰旦夕行橋來吁嗟此役本為利誰知為害翻百倍老癃傴僂訴且泣莫遣吏監民自力治貪問瘼乃吾事去甚痛懲尤所急老癃又言官試聽今日所知百無一我聞此語憤填膺不可勝誅空太息安得落落寰區間盡是龔黃二千石臨江見大船宏麗異甚賦賈客樂鼓聲震蕩馮夷宫帆腹吞飽江天風長年望雲生長嘯穩駕萬斛凌虛空主人揚州賣鹽叟重樓丹青照窗牖斗帳香凝畫閣深紅日滿江猶病酒錢塘女兒靜且姝臂金盈尺衣六銖憑闌飯飽觀戲魚清波照影紅芙蕖江城到處時弭楫遍買甘鮮窮所悅千里携家任去留一生為客無離别敦農抑商昧逺計遂使素封輕得意握籌狡儈俯承命危坐咄嗟收厚利田廬雕弊君知否終歲勤勞莫糊口夏稅未了秋稅來三十六策惟有走安航齊清江老人心休休宴息作屋才如舟人間論險莫逾水刳剡有藉安浮游等閒覆溺政不少有家幸免斯何求乃知平地足波浪大厦泛泛猶輕漚爭如容膝一齊小泰宇凝寂天光收百年居險能脫險人海一葉隨沉浮弦歌宛在水中沚竹樹不減滄江秋舟居無水陸無屋一笑千載同悠悠若孫肯構恢萬斛欲事康濟攻藏修健帆風順更勉力直須擊楫窮瀛洲太乙宫瑞荷為真人吕公賦天地有水即有荷生意無盡根株多風人澤隰詠未既一旦秀出濓溪波中通外直寓至道比德君子無偏頗非常之産亦時有駢花合實誰𢋫歌豈如仙壇出竒供盆池一勺融天和初疑扣盤合蒼玉又似夾袋裁青羅呈祥應陋朱華穠定巢只許𤣥夫過清風時來香襲人不用船藕痊沉疴天涯太華幾時到漫說十丈髙嵯峨當年太一乘此舟煙波蕩漾游無何此宫固宜有此瑞老仙異世真同科便從太一共乘去奔霆瞬息窮天河至正集卷七
