body:
  text: 至正集卷二十二元許有壬撰律詩題駐蹕頌後翰長開府公請賦明良千載一相逢駐蹕原頭耀國容華表不歸遼海鶴雲車應逐鼎湖龍元勳世豈碑傳信厚德天教子亢宗回首西郊瞻宰木懷賢誰道涕無從至正丙戌十一月草三日瑞雪盈尺明日恭遇太子千秋節稱賀于徽儀閣翰長開府公惟中右轄徴詩即席賦五十六字甲觀嵯峨拱紫宸瓊瑶一色瑩無塵前星正次千秋節瑞象先開萬彚春已兆豐穰在來歲肯教疵癘到吾民詞臣不獻梁園賦育德方期日日新題武衛段指揮書林相府深沈書若林牙籖插架列森森千枝萬葉本根在二帝三王雨露深椔翳斯文功利學棟梁來世聖賢心經殘百氏紛紜出愼勿輕栖惡木隂題廣平何文美養浩齊操舍存亡貴自知一齊容膝有餘師神龍淵底潛珍處文豹山中隱霧時要使尋常塞天地休教物欲間毫釐相門堂構非難事希聖功夫在有為用原功韻贈衡雲上人衡湘曽聽棹歌聲夢裏雲烟畫不成京國秋風添白髮楚鄉春雨負黃精浮圖桑下寧無愛道士山中素有情何日霜華約歐子三人相對話平生天山牛文貴母王氏貞節皇元聲教洽無垠節孝章章萃一門百世天存遺腹子九原魂屬未亡人有生恨不識父面罔極安能報母恩御史作文今太史汗青應見特書新省掾郝志道父潤甫慶八十五壽滄海橫流獨奠居子孫枝葉日扶疏春秋介數八十五桑梓歷年三百餘郎署聲華聊簿領家庭隂德更詩書聖朝行有蒲輪召莫羡鄉閭下澤車追和文山丞相題珩夫劉先生北莊詩韻既以弔文且以悼珩夫之不用于世也鄒魯望請賦國勢中流待一壺策廷蚤已見雄圖北莊歌詠聲未絶南海播遷塗又殊賢士傷心多草野神州回首遂荒蕪千金墨蹟宜珍護斯世斯人更有無鄭畋檢討母李氏孝節終身氷玉凜操持已見笄年翦髮時華表撑空旌大節蒼天福善與佳兒於陵但取居容膝德耀惟知案至眉珍重傳家遺稿在靜方豈是等閒詩前衛張指揮母郭氏貞節節婦天常豈過稱皇家彰善樹風聲百年偕老已無望一子未朞今有成鈿軸金泥光暮景雪松霜柏見孤貞板輿周覽王畿近多少春和在栁營偕拔實彥卿奉使光熙門外觀荷帝城東北水雲鄉馬上清傳十里香萬柄雨聲秋信早一壺天影月波涼紅粧翠蓋無窮意畫省烏臺有底忙雪藕調氷鮮鯽膾人間何物夢黃粱題齊河訾氏壽慶堂椿翁八袠少三齡九九萱親不杖行已見一門鍾瑞慶誰能多壽復康寧春融蘭玉增華彩雲矗桓楹揭姓名不有賢郎事揚顯他年編簡若為青題山隂丁錬師陽明樓追和間間宗師韻人間朝徹對扶桑不比中庭月一方白日青天當正午碧桃瑶草被餘光雲間萬象無陳迹鶴返三山有報章咫尺蘭亭遺址在好尋仙子共流觴和神保欽之御史監試上京韻二首王室銘勳有景鍾更於韋布索英雄百年人物誰名世萬卷詩書要策功聲教真機朔南暨文章公器古今同棘圍見說清霜滿餘力成詩字字工寸筳未許扣鴻鍾筆陳那無一世雄蜃海曉騰文有氣鴈霜寒早酒無功朝廷求士方如渴道路論心久益同安得真才出連茹一時分布遍臣工和原功鈞臺寄李好古韻延祐求賢致太平朝陽曾記鳯凰鳴百年世路傷離合一代斯文係重輕江海相望添白髮山林高蹈奈蒼生可人幸遇吾鄉彥袖得清風入帝城追和王繼學韻贈韓久成水貴藏魚亦貴清舟須容物又須行六經三尺相終始一羽千金各重輕事業期人陋東晉文章老我愧西京紫垣星月薇香裏應記霜風翠柏聲題臺都事石文禮孝行詩卷孩提失怙母勤劬三釜才登恃又無創巨始知臺上峻淚漫都入柏枝枯身名顯後今猶及桓表凌空本不圖自古忠臣有原柢孝誠先著德充符和黃雲川韻送盛啓宗歸長沙陸有關山水有波子行豪氣不消磨跳梁偶值猱升木訛舛終明豕渡河杉柏色隨新宇盛藻芹香入舊池多却憐萬里衝寒去欲贈綈袍愧兩娑題鄱陽張文叔樂壽堂愛日長思不我延當時毛檄亦徒然有田底用求三釡致養惟知盡百年結屋地兼山水勝承顔天賦子孫賢何當推此堂中樂四海人家共一天題李好古浴雪齊厨傳蕭然閲歲華守官何暇及生涯浴兒肯用人間水束緼旋融天上花自是蒼黃時便手却成清白世傳家勉旃好應豐年瑞更篤忠貞玉不瑕題鄭州霍彬卿遁齊諸君談易極𤣥微老子惟知遁是歸兄弟在官吾亦貴田園成趣嵗無饑逃空已分譏迂僻充隱由來有是非莫訝題詩人未去白頭萬事已忘機題胡安道詩卷奕世窮經只布衣諸孫毛質漸橫飛故人落落悲年邁孝子拳拳欲父歸氷雪嵗寒椿未老家山春暖蕨應肥蹇豫綿力慚推轂未忍隨人和式微題朱舜咨總管德政詩卷魏公三至福斯民今見真才繼後塵千里秋原均樂土一時寒谷便回春空教渤海傳龔遂爭似吾鄉待買臣竊祿逾涯歸已晚受㕓何幸作閒人次韻癸未留題獨樂臺二首萬疊西山畫不成飛嵐馬首故相迎之人松菊有三徑何處雲霞更五城門外清波浮石出天邊紅樹照霜晴白頭已是歸來晚敢戀皇家祿代耕一生奔走歎無家才到山巔與水涯無秫可供千日酒有園須種四時花已從野老鋤黃菊更學仙人咀絳霞老馬同歸誰忍遣幾年霜雪立東華題善應郭思誠山居次杜德常左司韻老仙不肯住城市只在西巖深處藏靜院晝閒苔不掃小園秋盡菊猶香有田種秫如陶令生子攻書勝陸莊便好相從結茆屋休教夢到五雲坊和黃仲剛韻三首公道會逢天定日倦游姑憩嵗寒時故人叨貴奈無位吾子不窮方有詩士論聲光高北斗春風消息到南枝老當益壯况未老莫和淵明歸去辭乘流我惜經時别過坎天教數日留有路御風歸閬苑無人看月在鄜州驚回曉夢猶如見勘破塵緣不用愁但使此心無愧怍孰為稷契孰巢由知己相逢差可樂浮生多事不須論青雲場屋傳三策華髮江湖付一尊朝暮詭言憐草賦古今癡夢笑槐根感君高誼均同氣衰病何堪擬玉昆千户蒙古敬臣棄職養母幾年弓劔戍龍沙忍見堂萱夢裏花身老有親供子職人生何福似君家但將綵服娛黃髮底用金符照白麻嗟我同庚成永感洹阡風樹滿啼鴉滏陽唐伯春義門滏水悠悠照紫荆一枝枯悴兩枝榮春風能使花如舊㽕蘖行看世有萌今古彛倫星日在田廬遺産羽毛輕勉旃繼嗣承先訓莫遣謡傳粟布聲送張囦亮錬師并序豫養痾鄉廬簡出入獨謁阡不免阡距城西北餘十里道北郭實南北孔道每為驛使識陪留多事故出入必以星至正己丑三月二十一日謁阡歸過洹橋數騎追及天已星猶懼其或我識側帽緩轡道左以俟其過前驅已前俄聞揚言此中丞邪亟來見乃囦亮張君錬師代祠武當馳驛而到此也明日過豫出京師餞章詰曰出京時念必過相一見虛前紙請言幸勿靳豫交間間太宗師與其徒多熟囦亮主京師東嶽祠園杏千株人境俱勝送客東門若自公有暇即造焉囦亮修潔能詩見則徜徉忘返别一年矣當豫避客時轂擊肩摩中天復已暝乃邂逅相遇豈偶然哉遂不忍以疾辭贈之詩曰杏園陳迹夢暄妍馬上相逢豈偶然每憶可人如隔世不聞新句又經年花迎驛路飛紅雨香到朝山散紫烟王事遊方歸有日遲君洹水白鷗前和董此宇錬師寄來韻茶餘扶杖聽幽禽荷貢清香柳送隂無秫在田猶嗜酒有絃供耳未忘琴仙山雲霧夢才見人海波濤晚更深何日代祠因過我林中同看翠千尋大雨後行洹堂逺岫雲銷凍雨晴溪旁村落徑初成避人白鳥一雙去留客黃鸝千百聲林杪浮槎懸不墜岸邊高栁卧相撑伊誰一問田家苦土釡無烟屋盡傾送蕭克復赴濱州知州次留别韻憂民寧恤甑生塵一郡安危繫一身筐策但知三尺法詩書須作萬家春交游去我年年少事業期君日日新早晚政成應峻擢直教風節過埋輪用楨韻二首城西風物擅安陽鄉社而今債已償自笑衣冠成野逸更從花栁看時粧酒沾松露涓涓冷詩入荷風字字香莫道年來無事業等閒成就一天涼半畝方塘學紫陽道心未瑩賞心償蝶飛已悟三生夢蓮褪猶存半面粧四座賓朋連日醉一朝風雨滿城香人間政爾愁炎暑誰信吾亭有許涼七月二十五日圭塘獨坐二首我作圭塘未及年眼中生意浩無邊三秋未半荷沃若一日不來心歉然自古人生求適意只今先務是歸田管絃何似塤篪韻此去新詩幾百篇西郭園亭近市㕓市㕓雖近足風烟陶家事業惟栽柳周子襟懷託愛蓮莫向人間為白眼試從水面照華顛悠悠千古滄浪意時上扁舟自扣舷次韻可行對景書懷觥船時泛一橋通詩壘誰能四面攻官業向來慙柱下仙遊隨處是壺中風聲細細來雙檜波影澄澄見七松笑傲滄洲人老矣功名付與黑頭公次韻可行鄉友具宴相望不隔一牛鳴樽俎過從見至情荷露清涵芳酒氣松雲寒遏艷歌聲高車駟馬初無意白酒黃雞舊有盟醉晚烏紗從露頂絶勝前日縛塵纓次可行侍行韻卜築何如履道坊千紅萬緑浸銀塘要回衰境為全盛却使閒人號最忙活水清圍容膝屋新篁高出及肩牆烟霞遮斷塵埃路才覺山林白日長游秋口趙文卿窟室次可行韻冗居雖隘此心寬敢學溫公但自安巗腹蝸廬穿窈窈山腰蛇徑上盤盤門無魚鎖墉無鼠泥有龍蟠棘有鸞我更巢松洹水上從教鄉里作竒觀秋口小酌用可行韻山林朝市馬牛風今日歸途信不窮犬吠雞鳴兩村近水光山色一尊同荻花經雨半垂白黎葉未霜先試紅但惜親朋凋謝盡碧雲回首又江東食螺老叨饑腹未成雷何事搜窮及互貍器潔殼鮮明錯落針銛肉細出縈回周官曽用供王祀離象還能作我膎縱乏魚羮心亦足敢求香甲共鸚杯次韻可行偕故人泛舟駭浪船歸百技收回頭人海自沈浮幽閒時作蕩舟劇踈懶猶能與客遊紅蓼白蘋鷗鷺國清風明月鳯麟洲諸君更約源源會不泛黃花不算秋庚寅嵗新正信筆萬事無心綽綽然不知寒暑自推遷園池才治三三徑嵗月俄驚八八年晚境偷安難報主瘦田謀食尚祈天圭塘觴詠多餘力時為西山一著鞭七月二十二日與明初教授同車游圭塘一别音容嵗兩除圭塘今日遂同車竹生晚筍方無盡荷送秋香尚有餘清景迫人宜杖屨嫩涼隨雨入郊墟朝游夕話君休倦明日湘江託鯉魚和蕭克復寄來韻身退心閒地復優崑崙何用訪神州寧教愚婦侮季子休作具臣如冉求田少誰供千斛酒臺高天與四山秋幾時同鼓圭塘棹盡洗懷人兩處愁次韻可行久雨松竹皆黃誰教淫雨害吾松更偃窗前竹幾叢晚景盤桓方取友經年培植已成功堅貞未許移天性光霽行將藉曉風珍重嵗寒心事在却憑孤月照霜空明初畜佳猫愛之甚至舟次漷逸去作詩唁之槖方告穴又墉穿聘得貍奴小似拳膝上手摩過子女案頭躬飼輟肥鮮初來跳戲旋牀側漸至凝冥坐窟邊守器保衣皆有效偷雞溺屋總無愆論功除害均鄰室隨主還家暫客船豈意騫騰才一日虛勞調養已經年盂存殘飯愁其餒座見餘氈憶爾眠雖豁大觀諳失馬尚縈癡夢在含蟬詩書委積將誰護道路分離亦可憐湘水魚多嗟薄分漷村犬惡恐難全空陪義甫柔為害不及昌黎乳有傳才子多情人莫訝蓍簮今古共悽然至正集卷二十二
