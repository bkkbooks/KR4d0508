body:
  text: 至正集卷十四元許有壬撰律詩五言律二十二首五言排律十六首待泮愁裏時時醉春來日日隂無謀能解凍有句且娛心陶去憐儲粟疏歸詫賜金還家均一樂餘事任浮沉聞泮喜成思鄉思附翼彌日苦相稽忽報氷為水仍傳路有泥篙師拿畫鷁河伯插金雞去去休回首歸途更不迷買舟小甚戲成四韻紫闥三年夢清江一葉舟遂心甘局蹐容膝儘優遊犬卧須蟠足鴟蹲尚打頭伊誰乘萬斛自有濟川謀訪郭子敬祭酒于稻田山居醉中作詩贈之攬轡澄清遍登瀛笑傲還意長殊不醉身健更當閒茂樹疑無屋崇臺盡得山卜鄰吾有願疏懶政相關再用前韻二首世路辭登涉鄉居事往還莫為千日醉渾得幾朝閒溜雪明懸筯香雲亂博山詩愁誰喚起春鳥正關關雲凝猶出岫鳥倦恰知還我夢已驚覺此身惟愛閒白留窗外雪青愛水中山俗客從今少柴門莫返關憶可行秋征曽有約十月便歸來南國鴈已盡東風花又開酒缸連月備詩擔幾時回手種洹溪柳青青滿釣臺臺翁旌髙年耆德妻亦同夀夀域開無際禔身得最多子孫三釡養翁媪八旬過桑梓駢華表門庭䕃緑波風人重偕老吾為爾成歌汪叔志堪老園有地皆堪老惟鄉老最堪生涯都不校祖德幸無慚野景收全勝村醅取半酣吾衰今夕夢應與子俱南番昜周吉甫師張君采為僮所殺吉甫擒僮殺之師讐遂復子暾為應奉求賦世有逢蒙後仍聞不義侯彛倫因盡斁滄海遂橫流白刃吾能蹈青天志竟酬悠悠千載下方識報師讐淳熙御書次其韻翰長開府公請賦宴安懷鴆毒板蕩任鯨吞南土饒風景中原失本根無人扶帝胄有句及漁村一旦天戈至潮聲遁海門雲州劉氏貞節貞節不為石龍門氣與髙一天孤倚託三子立劬勞彛典期無斁桓楣愧有褒詠歌誰復靳傳爾在吾曹東安竇敬祖妻梁氏貞節夫人胡不辜無子且無夫舅也弗能履叔兮方待哺一心如白水萬事在黃壚孝節關風教聲詩播海隅用王繼學韻題近仁御史雪林小影松與雪相冝松風更細吹始知天放樂多在嵗寒時逃世衣冠古看雲杖屨遲無緣遂終隱峩豸出京師送知事王安中赴樞密掾辨幕忍咸腓人從奈我違苦辛容蘗蓼急緩節弦韋欲見詩書效能教簿領稀鴻樞有公論一鶚看橫飛圭塘獨坐二首我屋來西圃輪蹄二里遙晚風收菡蓞秋雨長芭蕉有酒容開口無官免折腰柴門莫堅閉恐負野人招地僻心逾靜詩多意轉長隂森穿竹徑甘脆剝蓮房魚長已堪釣醅香先自嘗敢言誇晝錦聊復此圭塘漫書誰謂豫多蹇年來儘遂心作池通活水栽竹值連隂景物源源出門墉步步深從知非大隱有此小山林有舟有舟維老樹欲動恐傷蓮遂使成虛器何由濟大川錦雲香捧擁煙月淡留連泛泛行無礙霜清八月天新秋即事莫踏蒼苔破茨門晝亦關林風秋入樹波日晚搖山原野蒼茫外煙霏指顧間更教安一榻月夜不須還秋隂秋隂冝沼上蘚翠不曽乾聽雨朝欹枕觀雲暮倚闌地寬人自在松茂竹平安天遂閒中樂年豐酒不難次可行即事韻􅐕田秋半熟香入小磁缸霜水清浮簟煙嵐翠可窗酒添詩癖重茶戰睡魔降笑問登山屐吾生費幾雙排律登越臺問俗來南海休期上越臺際天迷莽蒼拔地出崔嵬五管衣冠府連城錦繡堆勢吞蒲澗逺氣壓海珠摧嶺嶠橫卷石滄溟瞰一杯人驚塵世隘鳥盡碧天回霧列蕃中國雲摩舶上桅黑風鯨浪立紅日蜃樓開市貨煩重譯蠻琛盡九垓緬思魋結子徒困島夷財下瀨才分節雕甍又劫灰秋郊猿狖泣春草鷓鴣來形勝渾如昔興亡不暇哀我行求古迹天遣度詩材誰慰襟懷惡多慚繡斧陪薄寒收毒癘微雨净浮埃蒟醬冝椰肉頻婆薦麝醅簿書聊棄置風景屬徘徊長笑魚龍駭遄歸鼓角催壯遊心未已東北是蓬萊泰定乙丑閏正月七日同伯庸少監捧御祝香祠天寶宫以苔色連修竹為韻分賦得苔字秩祀神宫閟鳴騶甲觀來爐熏分黼扆佩玉響蓬萊八景中天降流雲午夜開簫聲清入骨燭泪冷成堆感格風生幕昭融月滿臺松擎𤣥鶴舞霞擁綵鸞回介福應駢集新詩得細裁陽坡青動柳隂壁紫凝苔天運當昭代官寮愧譾材願持今日志庶用答涓埃史顯甫治書父慶八十夀用曹子貞尚書韻舊植生芝樹新開種玉田庭闈盡鳬藻簪紱出蟬聮俯仰身無愧開承世有賢明時推盛典綵服照芳筵烏府秋如水青雲地近天郡封三品貴鄉飲一堂專夢笑非熊異心依顧兔圓車因探闕坐袍為賀正攐鉢重金攢荔茵香錦泛蓮人間得如此何處更求仙送魯子翬赴西臺御史弱冠名先振髙風士久歆文章追古作韶濩發遺音大器成非晚盈科貯已深旁通嗤墨守約說謝書淫下榻驚詞匠擔簦藹子襟銀潢輸學海玉樹照儒林鼓舞非吹萬登崇匪枉尋溟鴻摶直上儀鳯瑞當今小展鑾坡步還司憲府針支傾堅柱石藥病富苓參元惡腥區宇龎恩息斧砧倡言陳慷慨進疏竭忠忱遐裔隨編置彛倫免陸沉五車勤始效衆口噤如瘖昔也勞推轂兹焉遂盍簪主文推半席敝帚致千金行水知無事登車豈有心皂鵰騰肅肅驄馬去駸駸此日瞻卿月他年作相霖嵗寒情勿替分路念同隂次伯庸上都寄來韻文章君瑞世交友我忘年典璽當機要求人得俊賢一封新獻議三黜舊繩愆甲觀通金闕山房冷石田嘉徴應鱣集高躅看鶯遷只有傷心處歌聞相府蓮遼州髙士賈師敬以延祐三年六月捐館明年四月過其墓以詩哭之山林多隱逸夫子獨超倫養志官旌孝居鄉俗化醇雪螢嚴進學氷蘗凛持身明月過頭杖清風折角巾愛閒誠有樂守道更誰親詩酒窮元亮煙霞痼子真甫云待清誨遽爾掩黃塵命駕期千里傷心未六旬山英悲蕙帳朝議緩蒲輪有子家何慮無官志亦伸百身寧贖死三縣遂無人書葉藝香冷墳垣樹影新音容猶倣佛蹤迹已沉淪不用招魂些書名繼逸民遊蔣山次李五峰韻道途雖僕僕得暇即登山有樂來金地何心夢玉關雪餘梅噴白霜重樹留殷畎畝無遺秉郊原有敗菅泉香龍已去松老鶴初還好作菟裘計分雲住半間和王務先見寄韻理世足英豪同書貴俊髦士生知孔孟時至或䕫臯髮敢千鈞繫絲憐獨繭繅官瘝費料理技癢負爬搔白首曽何補黃扉豈不遭風雲亰國逺煙雨楚山髙厭事惟中酒忘憂謝擬騷本同多病馬偶似賦歸陶君子幸無責故人仍見褒魚箋來傑句獸錦炫仙袍笑我徒重趼多君拔一毛江湖幾年夢文史半生勞道域應深造朋簪愧素叨相期冝努力學海看波濤遊青山途中值雨四郊將告旱一雨適投機敢恨妨窮勝方欣免阻饑鷗邊初細細馬首漸霏霏路浥塵皆净衣沾迹尚微加鞭投草市假館憩柴扉急吹鳴嚆過重隂突騎圍白煙映空走銀箭滿山飛繁響傳巗谷清寒襲布韋如麻從達曙有酒自忘歸收斂功何逺遨逰願不違地平波緑漲枝重果紅肥嵗事了禾黍時芳及蕨薇敷腴均品物明潤動晴暉志喜慙椽筆疏狂謾一揮贈萬國卿郎中并序廣平萬嘉閭國卿皇慶壬子為山北憲照磨燕山庸齊劉公實憲長長山韓從義為幕長國卿幼尚未冠庸齊忠厚長者有人倫鑑謂當超軼逺到而不才亦辱薦焉治具棋局或休期登眺必三人俱而不才每與焉承㫖御史南臺國卿適為臺照磨握手歡甚而庸齊從義九原不可作矣對酒語舊未嘗不為之流涕也俄國卿拜御史西臺僉雲南憲改江西河南升副使入歷臺院部出為浙省正郎於是庸齊之言始驗至順辛未秋投紱居潤絶江來揚州致先太夫人賻壬申八月草七日余北歸過之感念嵗月相顧錯愕蓋國卿山北時年甫卅五余草六今國卿髮無一黑而余亦蒼蒼矣出諸公詩文曰子我舊過諸公可無為我紀之余惟草年朋舊凋謝觸目傷心存而幸㑹合者有幾况舊且密莫吾二人若則此㑹可不謂難乎可不有以紀之乎其紀之之言曰昔在徒陽日俱當少壯年夙心欣所遇晚嵗守何堅幸辱明公厚仍逢幕府賢笑歌無芥蒂出入每蟬聮暖縱沙堤轡寒同土屋氊宋園閒即到韓墅醉曽眠借馬僮偕樂分羔肉每偏看山寧計路沽酒不論錢繆荷推三益多慚共一㕓夜談常逹曙公㑹更移筵俄索長安米尋乘建業船蟨蛩欣再合鴻鴈遽相捐秦樹和天逺滇雲捲雨旋軺車清國步烽火靜河堧善搏非攘臂豐扛貴息肩扣門驚倒屣分路忍先鞭世事應難料人生自有緣一心如白水萬事已華顛夜鶴應無怨春鶯任屢遷虛名何物耳好作地行仙至正改元四月十二日戊子皇帝御龍舟幸獲聖寺中書右丞臣特穆爾達實參知政事臣阿嚕臣有壬扈行樂三奏命右丞前特授平章政事參政進右丞臣有壬進左丞懇辭不允惶汗就列平章右丞曰今日逰騁之盛恩遇之隆不可不紀也悚懼之餘為二十韻以獻宇宙承平日邦畿壯麗鄉宫中無暇逸湖上暫翺翔鳯輦重雲降龍舟萬斛驤風霆隨桂楫日月運牙檣五衛分翬羽千官列鴈行長年花壓帽仙妓錦連航絨繂初徐引鑾旗漸逺揚黎靬呈曼衍僸佅遞鏗鏘玉食傳麟脯氷壺出蔗漿魚鳶知永蹕鶯燕逐餘香夾岸金戈翊彌空繡幕張汀回開瀚海天近勝錢塘翠閣峨雙島珠簾護兩廂九霄披瑞靄四表覩朝陽補助資逰豫登崇貴俊良不圖推朽質亦復被清光左轄綱維地中書政事堂出謀慚不學好樂願無荒喻水民堪畏從橋䇿最長濟川非所任歌詠獻巖廊途中除夕贈胡謙牧今夕知何夕征途適嵗除素餐驚曠日清議敢寧居已驗軒容鶴真成鼎柱車靜言思往者只有賦歸歟山好來天際塵空值雪餘幾程投逆旅一笑愧茒廬村酒磁甌淺柴煙土銼虛承恩無報效出畫莫躊蹰良友煩連轡髙談實起余詩成拈秃筆真是不中書桂林翁挽詩并序廬陵永豐百三嵗人曰桂林翁劉叔正者九十三嵗時豫章熊先生朋來記其堂百嵗時近而鄉郡逺而四方至于京師紀其德歌其夀者知幾百首孫鶚楚竒裒為家慶集泰定甲子二月翁卒同郡劉春常嶽申銘其墓附集後楚竒請發其未盡而其紀之詳歌之盛無不盡者已獨念翁之生也紀若詠詳且盛若是其卒也獨劉一銘爾其沒而不能忘者豈容無辭以寓其鄉人無窮之思乎嘉楚竒之學作挽詩十六韻以補其闕云百嵗古云少翁年又過三杖鳩奚用闕天爵復何儋足正儒門立功深理窟探浮雲常過眼積雪久盈簮月午琴三弄花春酒半酣闕山輸逺淡鷲水挹清甘佳趣人誰識虛名我豈堪化鄉非獨善種德見多男景迫仍安健仙遊等笑談死生皆有得俯仰更無慙子姪紛垂白孫曽盡出藍詩章留亹亹堂構委潭潭繼世誰能象遺編保不蟫生存形善頌飄忽散晴嵐鄉社如咸秩先生實可參懷賢嗟不及飛夢大江南次韻可行坐嘉蓮亭有感懶是平生癖歸田始克勤灌園時汲井學稼曉耕雲窗取山千疊舟巡沼四濆倦遊當稅駕勇退免移文誰識豫心樂都忘俗務殷圭塘清見底銀海浩無垠潦倒惟營口迂疏愧致君天開方外境塵見隙中曛酒欲連宵飲膏須繼晷焚讀書嗟坐廢娛老却冝醺園綺知髙祖巢由負放勳至人先大節餘事及多聞詩少慙工部鞋多笑領軍郊原諏嵗計風露逼秋分且曳泥中尾休空冀北羣崇臺還一上萬物正藝藝送馬明初教授南歸詩并序後至元戊寅豫得請歸江夏别業明年冬遊長沙明年二月安仁馬君明初來見於琅瓈山其人溫醇其文粹精傾蓋如平生同遊南嶽更倡迭和遂同歸江夏甫七日復參知政事命下以小兒纍之又同北焉至任城明初舟覆幾不免間關跋涉不忍豫棄用中臺翰林薦堂除緱山書院山長及格擢右衛率府教授始釋褐衛官若胥卒皆國人明初請收書教其子弟為華學官屬從之鳩俸檄明初買書江南因得歸省其家焉過豫相下將别請言吁世俗之交翻覆雲雨况延之館孰者其為友不又密乎饔飱之不精不時也供侍之不慎不及也脯修之不腆也汲引之不酬也為主人者有能不犯於是者乎人情久則狎狎則慢慢則隙生焉賔主至是而不失歡者鮮矣而明初與豫十年如一日始終無間言有德君子哉述其槩為詩以餞之其詩曰吾子昔傾蓋琅瓈古渡頭袖文驚蜀錦懷寶重天球心既同金斷膠因向漆投有邀須共往無倡不為酬南嶽朝聮轡湘江暮艤舟屐窮峰頂寺詩滿水邊樓訪古由來喜尋芳到處留遂移衡浦隱便作武昌遊坐席何曽暖招旌遽見求髙情安旅次遐躅又神州道路多嘗險山川只薦愁掃雲髠兔頴鏖雪弊貂裘善誘兒何幸深藏價未收忽看鴻鵠舉甘效蟨蛩休洹水寒偏瑩林慮晚更幽誰知三仕已相纍十春秋公道先揚善真才自拔尤恩袍明翡翠教鐸振豼貅行役仍清淡言歸藐阻修臨岐惟一語音信莫悠悠至正集卷十四
