body:
  text: 元史許文忠公列傳許有壬字可用其先世居潁後徙湯隂有壬幼頴悟讀書一目五行嘗閲衡州淨居院碑文近千言一覽輒背誦無遺年二十暢師文薦入翰林不報授開寧路儒學正升教授未上辟山北廉訪司掌書登延祐二年進士第授同知遼州事會關中有警鄰州聽民出避棄孩嬰滿道有壬獨率弓箭手閉城門以守卒獲無虞州有追逮不許胥𨽻足迹至村疃唯給信牌令執里役者呼之民安而事集右族貪虐者懲之寃獄雖有成案皆平翻而釋其罪州遂大治六年己未除山北廉訪司經歷至治元年遷吏部主事二年轉江南行臺監察御史行部廣東以貪墨劾罷廉訪副使哈只蔡衍至江西會廉訪使苖好謙監焚昏鈔檢視鈔者日至百餘人好謙恐其有弊痛鞭之人畏罪率剔真為偽以迎其意管庫吏而下搒掠無全膚迄莫能償有壬覆視之率真物也遂釋之凡勢官豪民人畏之如虎狼者有壬遂擒治以法部內肅然召拜監察御史八月英宗暴崩於南坡賊臣特克實遣使者自上京至封府庫收百官印有壬知事急即往告御史中丞董守庸守庸謂宫禁事非子所當問有壬即疏守庸及經厯多爾濟巴勒監察御史郭額森呼圖克阿附特克實之罪以俟十月特克實伏誅泰定帝發上都御史大夫聶赫先還京師有壬即袖疏上之及帝至復上章言特們德爾之子索諾木與聞大逆乞賜典刑其兄弟勿令出入宫禁中書平章政事王毅右丞髙昉橫罹奪爵而四川行省平章政事趙世延受禍尤慘皆請雪寃復職繼上正始十事一曰輔翼太子宜先訓導二曰遴選長官宜先培養三曰通籍宫禁宜别貴賤四曰欲謹兵權宜削兼領五曰武備廢弛宜加修飭六曰賊臣妻妾宜禁勢官徴索七曰前赦權以止變宜再詔以正名八曰特們德爾諸子宜籍沒以懲惡九曰考驗經費以減民賦十曰樽節浮蠧以紓國用帝多從之泰定元年初立詹事院選為中議改中書左司員外郎京畿飢有壬請賑之同列讓曰子言固善其如虧國何有壬曰不然民本也不虧民顧豈虧國耶卒白於丞相發糧四十萬斛濟之民賴以活者甚衆國家舊法每以積分次第貢以出官執政用監丞張起巖議欲廢之而以推擇德行為務有壬折之曰積分雖未盡善然可得博學能文之士若曰惟德行之擇其名固佳恐皆厚貌深情專意外飾或懵不能識丁矣議久不決三年六月升右司郎中其事遂行已而復寢獲盜例有賞論者多疑其偽有淹四十餘年羣訴於馬首有壬曰盜賊方熾求疵太甚緩急何以使人但經部使者覆核者皆豫官俄移左司郎中每遇公議有壬屢爭事得失汛掃積滯幾無留牘都事宋本退語人曰此貞觀開元間議事也明年丁父憂天厯三年擢兩淮都轉鹽運使先是鹽法壞廷議非有壬不能集事故有是命有壬詢究弊端立法而通融之國課遂登至順二年二月召參議中書省事未幾以丁母憂去元統元年復以參議召明年甲戌拜治書侍御史轉奎章閣學士院侍書學士仍治臺事會福逹嚕噶齊旺布藉丞相勢宿衛東宫其行頗淫穢御史劾之旺布藏御史大夫家有壬捕而遣之九月拜中書參知政事知經筵事帝詔羣臣議上皇太后尊號為太皇太后有壬曰皇上於皇太后母子也若加太皇太后則為孫矣非禮也衆弗之從有壬曰今制封贈祖父母降於父母一等蓋推恩之法近重而遠輕今尊皇太后為太皇太后是推而遠之乃反輕矣豈所謂尊之者耶弗之聽中書平章政事察爾特穆爾挾私憾奏罷進士科有壬廷爭甚苦不能奪遂稱疾在告帝強起之拜侍御史會汝寧捧胡反大臣有忌漢官者取賊所造旗幟及偽宣敕班地上問曰此欲何為耶意漢官諱言反將以罪中之有壬曰此曹建年號稱李老君太子部署士卒以敵官軍其反狀甚明尚何言其語遂塞廷議欲行古劓法立行樞密院禁漢人南人勿學蒙古輝和爾字書有壬皆爭止之重紀至元初長蘆韓公溥因家藏兵器遂起大獄株連臺若省多以贓敗獨無有壬名由是忌者益甚有壬度不可留遂歸彰德已而南遊湘漢間至元六年召入中書仍為參知政事明年改元至正有壬極論帝當親祠太廟母后虗位徽政院當罷改元命相當合為一詔冗職當沙汰錢糧當裁節如此之類不一而足人皆韙之轉中書左丞二年囊加慶喜八及博囉特穆爾獻議開西山金口導渾河踰京城達通州以通漕運丞相托克托主之甚力有壬曰渾河之水湍悍易決而足以為害淤淺易塞而不可行舟況地勢髙下甚有不同徒勞民費財耳不聽後卒如有壬言先是有壬之父熙載仕長沙日設義學訓諸生既殁而諸生思之為立東岡書院朝廷賜額設官以為育才之地南臺監察御史茂布喇實緣睚眥怨言書院不當立并搆浮辭誣衊有壬并其二弟有儀有孚有壬遂稱病歸四年改浙江行省左丞辭六年召為翰林學士既上又辭監察御史纍章辨其誣俄拜浙西廉訪使未上復以翰林學士承旨召仍知經筵事明年夏授御史中丞賜白玉束帶及御衣一襲未幾復以病歸監察御史達蘭布哈銜有壬時長短之奏劾甚力事尋白十二年盜起河南聲撼河朔間有壬畫備禦之䇿十五條以授郡將民藉以安十三年起拜河南行省左丞朝廷遣將出征環河南境連營以百數一切芻餉皆仰給之有壬從容集事若平時然十五年遷集賢大學士尋改樞密副使復拜中書左丞時以言為諱有壬力言朝廷務行姑息之政賞重罰輕故將士貪掠子女玉帛而無鬭志遂倡招降之策言多不載有僧名開自髙郵來言張士誠乞降衆幸事且成皆大喜有壬獨疑其妄呼僧詰之果語塞不能對轉集賢大學士兼太子左諭德階至光祿大夫有壬前朝舊德太子頗敬禮之一日入見方臂鷙禽以為樂遽呼左右屏去十七年以老病力乞致其事久之始得請給俸賜以終其身二十四年九月二十一日卒年七十八有壬歷事七朝垂五十年遇國家大事無不盡言皆一根至理而曲盡人情當權臣恣睢之時稍忤意輒誅竄隨之有壬絶不為巧避計事有不便明辨力諍不知有死生利害君子多之有壬善筆札工詞章歐陽玄序其文謂其雄渾閎雋湧如層瀾迫而求之則淵靚深實蓋深許之也所著有至正集若干卷諡曰文忠子一人曰楨
