body:
  text: 至正集卷四十七元許有壬撰碑志敕賜故中憲大夫嶺北等處行中書省左右司郎中贈集賢直學士亞中大夫輕車都尉追封真定郡侯蘇公神道碑銘中憲大夫嶺北等處行中書省左右司郎中蘇志道既卒之十七年為至元二年丙子嵗制贈集賢直學士亞中大夫輕車都尉追封真定郡侯明年正月丁未制詔臣有壬銘其碑陜西諸道行御史臺中丞臣祖常為書江南諸道行御史臺侍御史臣起巖篆其額從臺臣請也蓋志道子天爵為御史臺都事臺臣熟其賢核其父之實而臣有壬待罪中書天爵右司都事是亦熟其子而知其父者皇帝孝治天下臺臣職風教勵臣子是有繫焉臣有壬其敢以蕪陋辭乃本其狀而筆之曰公字子寧真定人曾大父元老金亡不應徵辟年九十卒妣孫氏大父誠善治生妣畢氏父榮祖纍贈中順大夫禮部侍郎上騎都尉真定郡伯妣吳氏追封真定郡君公年十四居禮部喪廬墓側又奉母十年事葬以禮平陽姚天福守真定舉府吏方旱從決獄而雨辨盜馬成獄之寃辟河東憲吏入為察吏行和林楊州良家子訴直賣三易主御史逆詐斥去公曰詐自抵罪訊之果實民而復其里轉户部令史浙西豪民以佛為標榜相煽為姦衆至數萬號白雲宗握印章以總其屬公私病之詔禮部侍郎髙昉治其獄以公從京師五往返始竣事沒資産巨萬歸良家子女出詿誤數百人擢掾樞密選籍積滯悉舉而行從樞密臣行邊歸掾中書尚書省立勢盛中書掾爭趨之公獨安焉尚書省尋罷乃釐其濫銓起家承直郎中書省檢校官陳便益正愆繆黜姦贓吏核濫出金穀若干六曹吏為悚畏御史咸薦才宜風紀有尼者或勸一往曰謁得御史尚何以御史為哉改刑部主事刪條格便比傳盜有蔓及無辜主者欲盡逮力止之盜內府金獄未具時相亟欲殺之公曰獄未具殺之尚書省所以敗也時相怒會樞密院奏為斷事官經􅍓而解軍士護視金銀器又遣他往比還失之將論以盜公曰此失耳俾償而免關中之警和林失守和林百年來生殖殷富埒內地至是並塞之民奔潰四去天復大雪至丈餘畜僵死且盡人並走和林乞食時倉儲僅五萬石米八十萬錢強者相食弱者相枕籍死優秩除吏率難其行公毅然請往擢嶺北行省左右司郎中既至愀然曰天下之事復有急於賑飢者乎白其長發廪賑之人大者三斗小六之一又贊省官為文請於朝曰和林根本之地今倉儲無幾餓莩山積賑飢人則失軍餉專軍餉則坐視飢死事不兩立揆其緩急已便益賑之開平沙靜差近請髙估募民致粟次募四方以先後至為差厚酬其直民必爭赴而邊儲可實朝廷從之制致粟和林者以三月至石與五十萬錢四月至減十之一五月至又減其一至即給直於是民果爭赴而邊儲之實如舊為考核法使繼者不能為姦諸王泛索持法一不與王怒使人譙公對曰府藏軍興也有司守之非軍事誠不敢與皇子安王以衣褒之吳王豫名馬受而歸其直時酒禁多犯朝議謂法輕使然更奏論死令下三日得趙仲良等五人酒有司論以死公曰酒豈三日可成犯在令前當用前法設當坐亦宜復讞奏報乃決豈得擅哉上其事法司議當用前法五人得不死即孔子廟延士講經史率僚屬往聼夜分乃休廟故丞相順德忠獻王建未就而薨捐俸成之邉民列公政績上之御史而同列多異遂辭歸至京師卒年甫六十延祐七年二月壬戌也三月乙酉葬真定縣北新市鄉新城原先塋配劉氏纍封真定郡夫人後四月卒子男五人其四夭一天爵也國子員釋褐薊州判官厯館閣至右司遷刑部郎中遂佐臺幕今禮部侍郎官太中大夫女三人孫男一人昌文女一人幼公為吏二十載始得官官四轉皆佐幕而見諸事業若此是知士之生世官不貴大而貴其行事不務多而務其急故下僚有浮於上官而一事有勝於百千者君子之觀仁必於其大者焉公自弱冠諸父析財不能止獨取薄田遺書其仕也不肯私謁以求為御史至於和林之贊荒政則茂績也嘗觀古人列傳或載一事或一二事足以見其人大節況著見若是者乎蘇氏之先自行唐而欒城欒城而真定閟之者翕故發之者闢導之者逺故流之者長至公啓矣而猶未暢又一傳得天爵階三品始疏侯封而貤及大父焉天爵仕日崇疏封未巳也古之人臣服寵嘉而銘器物者不惟章君之賜示不敢忘也天爵推恩其親恩至渥矣而又賜銘墓碑紀休永久其不敢忘而移孝為忠者其益朂哉銘曰猗嗟子寧父孰究其諝片言折獄若不能語徑氣拔距若弗克舉不鄙郡史從讞則雨恢恢遊刃匪越其俎姦人借佛蠱我士女禮部擇人于殖于去金山稱海百萬其旅不資贊畫曷張我武崑岡火炎委局趨附曾不踰時我奪我豫廷尉持平文智敢舞天子有法相國何怒伊誰教言私謁進取失將千金得未一羽眷兹和林實我天府百年生殖馳馬布野天胡怒之長驅貔虎蹂我旄倪蕩我牧圉天雪縷縷飢食無所流民如水積骸如堵拜郎給傳往佐其撫藩臣孔賢有善斯取總總黃僵卧待哺有如赤子遽得父母馳牛挽輸奔走髙估庾廪充溢國本以固方期用世一夕今古公則不死有子仕膴天子有詔刻石表墓於永其垂新城之下敕賜故光祿大夫大司徒釋源宗主洪公碑銘至正七年八月戊寅皇帝御慈仁殿集賢大學士臣五十四言故光祿大夫大司徒沙門法洪逮事纍朝其德業有足稱者願刻石以示永久有旨命御史中丞臣有壬製文且為書翰林學士承旨臣起巖篆其額臣有壬於洪公非有支許之分而其為學又異宜不足以知之者然天子有命其敢辭謹按其事狀擇而書之公姓劉氏隴西鞏昌成州人生有異稟九嵗入鄉校日受書纍千言輒成誦不忘年十二窺釋氏內外典有契遂辭親禮州之興化寺武公總攝而祝髮焉又八年從金仙律師受具戒乃發足遊方謁少林法主參決心要即廓然自得時真覺國師松堂公居大白馬寺公往依之松堂沙門上輩負海內之望與語大見器異留侍左右為之發揚宗旨周密微妙遂能窮極法源卒嗣其業承記傳衣之日靈鶴翔其庭松堂喜曰是必能大吾教矣大德中總統司請為釋源白馬寺長講號大德法主武宗皇帝在潛邸聞其名特命住持秦州大聖壽寺至大改元復命即秦州開演長講敕有司月給衣糧焉仁宗皇帝臨御之明年宣政臣奏旨起公住持白馬寺未幾賜號釋源宗主驛召至京師沙囉迦八哈失首見推重請主西山龍泉寺尋奉敕翻譯諸菩薩經撰大元帝師帕克斯巴文廟碑文成奏御嘉賚甚厚遂詔公住持新建大永福寺涖事之日三宫賜白金中宫復製紅衣以衣之英宗皇帝時居東宮已虛佇信嚮數嘗引見既即位即授公榮祿大夫司徒已而進階光祿加大司徒刻銀為印食一品祿承制總選名僧校讐三藏書領江淮官講凡三十所於是貴幸莫比矣會壽安山大昭孝寺成詔以公主之大都𢎞正棲禪上都𢎞正等寺皆𨽻焉大昭孝寺者英宗之為太子嘗至其處喜其山水明秀左右或言此山本梵剎也後為道士有耳目屬意焉至是以鈔二萬錠賜道士使别營搆因觀基煉石鑿闕大起佛宇功德無量欲資以慰薦祖宗在天之靈旨意甚鋭惟公具大善知識願力堅固簡在宸𠂻其膺是選亦可謂非常之遇矣於是車駕臨幸置酒流杯池上丞相東平王及公侍天顏甚懌顧左右若曰朕有賢相又得此竒人至可樂也因手簪花其帽諭所以畀付之意故事官寺方丈每嵗望幸主者不敢居特敕大臣設宴命公入處以寵異之他日丞相就公問所以為治之道公舉儒者經權之論以對丞相喜曰吾今乃知公有濟世才非徒空言而已泰定初或謀動搖壽安者微公慧力足以攝之則將不得免焉至正二年今上皇帝御龍舟遊幸玉泉諸山至夀安以公先朝耆舊特優禮之初天厯中嘗賜鈔三百萬錠以其二買田飯僧以其一視規息為國家修建佛事其後官府稍見侵奪至是丞相托克托公以公故奏請復之比車駕還宮復遣使賜上尊為公壽其被遇纍朝光顯如此四年春三月六日卒壽七十三為僧凡六十有一年大臣以聞天子憫悼敕有司致賻備儀衛祖送如禮既闍維門人三分其骨瘞壽安白馬及陜西之興教寺而建塔焉公度弟子十餘人得其道者曰允中為昭孝法主與公同日殁嗣法者以百數曰德政主白馬曰道傳曰慧潤主永福壽安則又所謂傑然者也公為人軌行嚴峻識度開朗其於禪乘律義既究極無疑而於孔老百氏之書又能鈎引貫穿從橫出入乎其間故其平生論撰多涉獵經史娓娓可觀有雲麓集十卷行於世云臣聞西方之教以空洞為實以有為為妄儒者謂其有體而無用異於聖賢之道也惟大司徒始能以真如三昧啓迪其徒空術既顯及其樹大法幢鳴大法鼓又能以才器文辨見知聖代恩數優渥雖宋慧林唐不空被遇之盛未有能過之者殆所謂為而未始有為無為而無所不為者歟故觀其所與東平問答又皆平易精實體用兼備其有得於聖賢之學者未可以浮屠氏之説器之也謹敘而銘之其辭曰出世之士一􅋀不作流於空愚無有知覺用世之士一切有為流於功利靡所底歸爰有大智見道立卓非律非禪無適無莫白業之積始自秦中雷音振揚達乎九重毳衣來朝當寧前席王后君公膜拜接舄爵以上卿為帝外臣隂翊乾運密贊皇仁動言事為有典有則著為文章載在金石壽安之山龍宫翼嚴人天畢來四聖具瞻樹立門庭廣大堅固孰為為之以我佛故功名富貴文字語言何有於我得魚忘筌化緣既周委席而去生也則榮殁有餘譽殁有餘譽天子念之臬臣屬辭以永其詒有元扎拉爾氏三世功臣碑銘昭武大將軍河南淮北蒙古軍都萬户察罕特穆爾言太祖聖武皇帝之肇闢天地也先臣和克齊率所部為前驅四征不庭與有駿功實察罕特穆爾之始祖也劗金之役髙祖舒爾罕大戰野狐嶺流矢中額卒賵錦綺萬馬四百匹曾大父特們岱嗣將世部征喀爾執訊取大珠以獻平西夏推首功太宗皇帝命行都行省事總烏嚕等五部族將平金賜食邑二千户憲宗征蜀日扈帳殿出戰必捷并晉懷洛之民懷不殺恩皆立祠以祀而大父鄂囉齊受知世皇既襲世官又總四萬户戰襄樊攻沙洋下郢復破陽羅渡江圍鄂招降其守從大兵鼓行下沿江江東浙西諸郡獨松關偹嚴而守固隂設伏陽樹熾山上單騎突前伏發守兵驚潰追奔百餘里俘馘無算既入杭分下浙閩諸郡之未下者追迫二偽孽沒於海宣慰湖北山南二道拜參預左右丞平章政事行省江浙湖廣江西南二行樞密院湖北新民危疑逃匿山澤約束勞來俄皆復業軍士俘獲生口多逃歸有司括男女千餘人欲𨽻之官謂同僚曰新民幸依其父母𨽻之官是重被兵也籍而復宋版之舊平劇盜周龍張虎湖南始寧佐征交址賊懼避匿乃梗我歸路轉戰全師而出驛召面籌者三慰勞溫至錫賚優渥復平章政事行省江西薨贈金紫光祿大夫大司徒上柱國江西行省平章政事追封鄭國公諡忠宣上命大父之征交址也即命先人托音布哈襲世官從征納延有功以行省左丞行世官都萬户事仁皇淵潛覃懷擁護有力拜湖廣行省平章政事進左丞相薨贈銀青榮祿大夫上柱國湖廣行省左丞相追封鄭國公諡宣簡若兄布達拉濟則又攻文事以佐其武精騎射而濟以勇右丞兩省咸以能稱鎮虎北口單騎破敵號著巴圖賜有金帶二行樞密院以遏中夏之震驚發私廩以振兵役人民之野栖無食者院革仍都萬户邏紫荆關薨於行察罕特穆爾襲兄職不勝是懼敢妄徼請以勤有司第念一門六葉服勞王家若曾大父而上當天造之初官制簡古若帥若行省各正天功惟是大父丁世皇混一之會父若兄仕列聖熙洽之朝雖存沒爵贈已極隆赫而所謂功臣之號尚稽寵錫敢援故事以請下有司議曰宜乃集禮曹集賢翰林太常擬贈忠宣推忠開武協運佐治功臣宣簡守忠翊正濟美演德功臣封諡皆如故右丞保忠經武致德宣惠功臣江西行省右丞上護軍追封夷山郡公諡榮襄制可後至元庚辰命下至正丙戌九月昭武扈從歸過安陽諗有壬曰伊水之東先塋在焉世勳已銘矣今也加號三世而銘未有託君賜不章且無以朂後敢以屬子有壬惟周禮司勳其等有六皆銘於太常祭於大蒸而六等之列戰功曰多昭武之三世是已銘太常祭大蒸在古不靳況所謂號乎古者諸侯薨天子論行以賜諡諡以尊名古之制也功臣之號李唐昉有奉天定難之稱趙宋因之始加四字或六字有至十餘字二十字者皆施之於生以為結銜雖制非隆古而勸忠勵節有取焉我元儀禮制度尤不輕畀至治著令立廟有大節功勳在王室者許加焉皆施之於沒以冠易名天厯初一二貴臣始有生加而又有賜大小金符刻其字於上朝會大宴則佩之蓋異數也惟扎拉爾氏大賢世出殊勳碩畫與國基命蓋國之世臣也且世臣孟子所重而公羊譏之何哉譏其以世不以賢也苟得賢如扎拉爾氏諸孫尚何譏乎龎恩茂典不例恆品且當畀之況見之著令者乎昭武之三世加號禮亦宜哉昔有河山白馬之誓盟未寒侯者百四十三人已無孑遺而我之功臣尊寵付託始終不替泝其源而導其流溉其根而遂其實相與保富貴於無窮有壬於是有以見我元崇德報功天覆地載之德軼炎劉而匹隆古矣雖然席勳業之舊著閥閲之英者亦不可恃天地之德而不自為悠久之念也夫為人孫若子弟孝敬而已移而為忠臣道斯盡孝敬本立則世臣者雖百世可引也昭武於祖若父兄既克顯之孝敬備矣後昭武者其聿修無忝銘曰國重世臣其重以賢泝而髙曾沿而曾玄族有逖邇貴胄則一攀鱗翕從橫戈四出瀚海之西昧谷之東靡逺弗至靡戰弗從繼體總戎挺額受矢罔俾萬春專美唐史倬彼前烈克承以似民死而生有嚴廟祀桓桓忠宣造攻襄樊四萬其師虎節龍章長江滔滔一葦可杭遇無完壁迎有簞食斬關獨松追播海涘新民按堵全師飲至宣簡襲部鳬藻允諧平叛遼東捧日覃懷惟喬有梓實邦之楨塞垣摧敵突騎衡行疏郡夷山錫嘉發榮榮襄有弟忠宣有孫我先不顯曷裕後昆名非眩實於以勸忠三世沛澤八字表功伊水悠悠象彼世澤伊闕如礪我功不泐至正集卷四十七
