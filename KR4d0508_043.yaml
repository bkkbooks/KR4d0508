body:
  text: 至正集卷四十三元許有壬撰記御史臺照磨題名記世皇立御史臺肅天憲以正百辟上官底僚罔不各極其選或損或益適於當而已厥初無照磨官至元壬辰臺臣以贓入既夥出納無適爰始奏設又慮員之冗也乃以其職冠承發管勾兼獄丞之上遂為定制焉迄今五十七年階是騰為達官者不知幾人而湮沒無聞者亦復不少今照磨蕭栗刻其姓名於石徵記於愚愚惟照磨兼承發獄丞一人而三職也獨稱照磨者舉其概也金穀則欲燭照磨研厲其隱失也簿書則欲久近有稽出入無格也囹圄則欲大而無抑無廋小而無淹也三職克盡善蔑加焉一或不舉事因有墮矣況三悉不舉者乎抱關擊柝雖賤必敬況列為憲屬冠豸乘驄實權輿於是者乎彼有居其位食其祿卑小官以為不足為髙談計月取償華貫不待後之指議憲條森嚴有議於今者已蕭君起家胄監已出官辟為臺郎除是職其言曰前乎栗題名者善不善皆栗師也後乎栗題名者栗不敢知而竊有望焉愚嘉其三職之能舉而其言復有取也故為之書緱山書院記古王宮至閭巷莫不有學學其學者非有異事也明天常盡人道而已若庠若序約義異稱教則均爾姬轍之東寖不古若以鄭僑當國且有欲毁鄉校者而况重之以秦火離之以異端斯文不喪天實相之學校開設日興月嗣若夫書院之號則昉於李唐之麗正郡邑未有也趙宋即老師宿儒講學之地賜額洎書若白鹿嵩陽應天嶽麓遂為永額焉紫陽朱夫子守南康拳拳於白鹿夫豈不知所先務哉我元戡定伊始即崇文教南北既一􅓺舍遂遍區宇漸濡百年而書院之闢視前代倍百矣贈翰林學士資德大夫上護軍魏郡杜文獻公瑛字文玉其先霸州人金季避地緱氏山中授徒汾晉間學者即舊隱稱為緱山先生中書鈕赫圭聘至相因家焉世祖徇鄂過相嘗召先生問計對以三事稱旨且勸上數事後皆如其言及即位徵之聞王文統當國不起授懷孟彰德大名等路提舉學校官又不起其導中書也則以緩刑薄征廣學納士為先其移書執政也則以遡流求源拯百千年之禍為務所存不亦遠乎於書無不讀讀無不記記無不究其趣者著述有春秋地理源委十卷語孟旁通八卷皇極引用八卷皇極疑事四卷極學十卷律呂律歷禮樂雜志三十卷文集十卷大約明注義之未瑩補先儒之未足時出已見以袪後學之疑中書嘗豫良田千畝不受知屋下有藏金不發是雖若小不義而千駟萬鍾其屑乎卒五十七年有贈諡之命又十三年河南部使者請建書院廷議韙之以緱山為額實至正辛已五月也守臣以官所度地湫隘不稱謀於其孫封彰德路總管愚相攸坤維得故王氏萬卷堂堂故崇且廣子孫廢撤殆盡相與裒金易之修大成殿殿後為先生祠東西齋仍其舊又七年今郡守朱彥亨與其曾孫中書省左司郎中秉彛作講堂以居師生新戟門以嚴中外始幾於完矣彥亨合其僚移書有壬曰文獻子鄉先生也麗牲之石宜有刻文舍子其誰有壬孩提知先生義不敢讓且讀山長馬君熙所為狀犁然有當於心者馬君謂先生著述雖有先儒之已發而其自得蓋十九焉概舉其要以為的然見道之言其知言哉先生出處大節屹然山立視榮達為何如身後祠像之有無不校也然士為學必使後世從祀孔庭而後為至下是亦尸而祝之非以為榮而以見其為學之至且以淑鄉里興後人焉有壬生晚不獲親炙而幸托名先生之碑可不因有以語吾鄉之士乎夫學其學者皆人之所當為為子必孝為臣必忠如手之必持足之必履宜無待於上之風厲也天降下民作之君作之師上之人有不容已者焉方今勉勵長育明詔諄復居之有地誨之有師而吾鄉先生貽範有書讀其書而求其心贍其容而踐其行成德達材由是輩出則書院之設為不虛矣有壬敢便便若是者誠欲明先生之道以淑鄉里也惟吾士其勉之總春亭記饒樂平朱彬可取考亭夫子詩額池亭曰總春其鄉人宣政掌故黃君仲綱諗記於余余以未識彬可辭仲綱亟言之知彬可可人釋辭其可朱氏之先世居新安後徙樂平之清原秀嶺髙林流泉沃壤彬可堂搆其間鑿二池亭其上不質不華可琴可書可命尊罍以樂友生水陸草木效竒獻秀自行自色自花自實寒暑有代謝而品類更相發榮無適而非春池之蓮窗之草前川之花柳無適而非道也亭號曰總春其誰曰不宜雖然華於春者不若夏秋冬之多而悉歸之春何哉華於三時而生意實自春始歸之春原其始也余嘗達觀乎萬物妙觀乎一原維天之命於穆不已萬殊之所以一本也乾道變化各正性命一本之所以萬殊也學者究其用而未究其體悟其貫而未悟其一故於水陸草木但知其為萬紫千紅而不知其無適而非春蓋自老安少懷之言絶浴沂詠歸之迹熄尋芳勝日豈無他人求其領無邉之景識東風之面舍考亭夫子其誰哉嗟夫盈天地之間皆物也而有所謂植物者焉肖形雖異資氣則同因植物之同而知萬物之同總春之義大矣哉彬可為考亭疏族嘗來京師從縉紳先生遊其亦有聞於此否乎豫不得而知也他日仲綱登總春之亭歌考亭之詩然後以豫言問之景韓堂記相為河北重郡牧守著稱世艱於聞周秦邈矣後蓋可考焉若漢京房黃香唐宋景房琯數百年間指不易屈趙宋羅彥瑰而下尤炳炳者其魏國忠獻韓公乎公前持武康之節知相後兩以淮南之節司徒兼侍中判郡蓋古之牧守與宰相同故黃霸潁川治最即入為相而魏公以兩朝顧命定䇿元勳三守兹郡其重可知已夫以千里之治移之天下舉而措之爾而宅百揆憂患之域一旦釋重負斂惠一方則又朝廷用人弛張之道焉流習輕外訾為徒勞膠榮朝著不肯一出國門雖自冗員擢為方面皆為下遷倪若水見班景倩入為大理謂之登仙流習之盩乃至是邪我元重近民之仕作法辟舉屢議屢更必欲真得其人與之共治然卒未聞卓爾在天下者豈風厲振作之道有所未盡邪皇上勵精圖治一新其法內外通融凡久在朝著者核其才考其資俾典郡邑河南行省理問太原朱侯彥亨擢彰德路總管以其敡歷中外靡不著稱首膺是選也侯以剛明之資一旦蒞政百廢俱興剔蠧救荒令行禁止由是名達九重驛賜金段歷徵往躅不一二聞而達嚕噶齊沙喇卜丹桑節判官馬德淳推官薑彬同寅協恭知事王大本照磨李𢎞道畫喏平允郡以無事於是葺公署之後堂扁曰景韓蓋景行先哲慕魏公為法徵記以訓詩不不云乎髙山仰止景行行止説者謂景行大道也言髙山則可仰景行則可行若魏公者非髙山景行乎凡天下牧守皆當儀型於百世下况踵其武踐其位者乎槩其三至合四十餘月利澤之及人如決渠浚隍柵桞廪粟闢牙城除戎器奏罷鹽鐡以紓民力乞國監書以基風化皆宏遠之規非為目前苟且計者至於秉鈞調元天下均受其賜豐功偉績史有不勝書者然愚竊疑先儒稱其務容小人豈含糊求合於人乎蓋君子必欲充其量而後可以有所容可以有所容而後可以施諸人可以施諸人而吾之事業成矣雖大而弼亮三世敉寧四方獨運廟堂再安社稷亦由是而推之爾且魏公作郡作相無一不可為法而愚獨稱其量者誠欲諸公法魏公必造其極而一政一令之及閭閻者在其中矣所謂牧守與宰相等者其尚有資於是焉後之守倅觀是扁也其亦致力於實踐哉墊巾慕郭解幘效王則前政專美矣是為記承恩堂記皇上御天之十六年敕中書慎簡守令或陛辭親勉或中書喻旨皆錫宴敦遣曠典異數所以必其稱而期於治也安陽吳密掾臺出官佐奉使宣撫竣事擢尹渤海將行請言有壬時待罪中臺嘗序以餞既而朝廷遣使核治忽之迹而渤海之政在治列復最它治中書以聞有金緞之賜密因扁其廨之堂曰承恩有壬既為大書而渤海之民李信義李珍蕭克敏劉誠復諉儒者王憲俾請於有壬曰吾明府吳君德我非一思永其傳而刻銘戾法俟為去思則吾民不忍言其去也承恩有堂苟因記之不惟彰君之賜而吾明府之善因附以傳顧不兩得乎又東平韓學詩撰德政詩百首首括一事皆炳炳在人者軼王允規十奇而過之遠矣有壬昔之序有曰余雖不與考績尚能為子紀其實密也在邑不二年治效有成紀實踐言記其可辭語曰君使臣以禮臣事君以忠有壬於是有以見為治之機焉各欲自盡而已昔有賜緋衣或百縑或衣一襲非私也亦盡其使臣之禮爾厥後但聞有罰使以禮未聞也治不古若有以哉皇上徵往古發言震衷海濱逺邑至遣使賜賚盡使臣之禮矣昔人在畎畝不忘君而一飯之恩必報况恩隆山嶽以忠報稱宜何如哉不名之堂不足以暴其恩報之誠不於家而於公署又以垂勸於後來而臨民聽訟之際顧瞻堂扁凛乎其陟降左右也敢易其心乎且今能盡其職德於民名其堂慤於報而其民又能不忘令德以示於永久一邑之治可知已推之天下有不治乎而天下之大一時承恩者幾人名堂思報者有幾而恩之未逮者先儒嘗謂不患使不以禮患忠之不足盍亦自盡其道乎密也植志不回爵祿汨汨異時晝錦歸故鄉其權輿於是繼踵而登斯堂者尚有望焉公生明堂記彰德屬州曰林俗淳訟寂號易治且山水可適髙堂孫君徹徹篤由中書直省舍人來倅是州上官與其能小民安其政山水之適則未遑也州治西北有公明亭圯廢已久金承安間宋黻記文名刻故在一日孫君洎其守若僚請曰亭故遊息地今不能復其扁則可取然不若用其全句之該也丐書公生明三字揭之州堂日視以為警豫喜為之書既又請抒其義以發其蔀請亟而切乃為之説曰公之為義大矣哉天無私覆地無私載日月無私照黃帝之治天下語其輔佐亦曰公而不阿而已周官曰以公滅私民其允懷説者謂以天下之公理滅一已之私情則令行而民莫不敬信懷服矣則是公之為用通三才而一之自天子以至於嗇夫板尹不可須臾離者也人稟天地之中以生具衆理應萬事者心也虛靈洞徹無物不燭一蔽於私蒙昧昏錯而其本然全體固自若也荀卿於是立公生明之説其啓人至矣蓋公也者無私之謂也無私則淨淨則明明則如鑑照物妍媸黑白舉無遁形明也者公之發見者也而所謂生者謂有此公即有此明猶播種於地而必出焉以之扁堂觸目警省而又克已復禮以立其體應事接物以適其用不徼名以為公不仕數以為明一毫私欲無自而入理之微地之逺莫不瞭然在吾目中尚何覆曖之有哉若夫不下比以暗上不上同以疾下分爭於中不以私害之荀卿所謂公士者諸君得之矣推公生明之極致尊君愛民物至而應事起而辨將不盡為通士乎諸君其勉之河南省檢挍官持平堂記河南省南控江淮西掎崤函東掖海岱以輔承京師中土大方面也地重事劇鉛槧膠葛酬酢坌沓雖有敏者不能必其無戾焉隨事釐正不逺而復此檢挍官所由設也夫以七品之職釐一品大府之遂事其任亦重矣哉而弱者俯仰詭隨謬愆何望強者取嫉於上陽示委注隂實逺之終歲踆踆不安其席於是官以之曠而事以之墮矣至正戊子春中書知管差除掾濟寧羅吉擢任是官冬右司掾河間王國瑞繼至協恭交修翕然著稱剸治就緒得以展布餘力顧瞻公署歲久將壓請諸上司出公帑葺之甫逾月煥然改觀扁曰持平余既為大書尋復請記夫天下之至平者惟水與衡而已大而江河小而溝池其平中準大匠取法焉石或磯之則不平矣重而千鈞輕而錙銖應之以權無弗平者手或撓之則不平矣今夫疆域之大事物之夥金榖也銓總也工作也傳置也湮而欲發也泛而欲防也柅而欲行也蹐而欲正也不磯不撓則能適於平而不磯不撓其亦有道乎荀子曰士大夫以上至於公侯莫不以仁厚知能居官職夫是之謂至平惟其本之以仁厚行之以知能施於有政無所往而不得其平矣韓子曰物不得其平則鳴檢挍不任他事専職於此一失其平不惟瘝厥官鳴者紛起矣而况大官臨之史屬睨之可不慎乎執玉捧盈持而勿失階是而理機務天下且平况一省乎二君朂之且以告後來者魯齋書院記至正乙酉江西湖東道肅政亷訪使李守仁言魏國文正公魯齋許先生為我元儒宗從祀孔子廟廷而覃懷先生之鄉大德間鄉人王紀作祠廟學西偏庳隘弗稱昔濓溪為南昌丞宗濓恢設况道州其鄉乎覃懷猶道州也故中書廳永額為書院校職屢更祠則仍舊嵗久且壓守臣嘗請郡巽隅地搆築未報宜亟作以副書院名是牘上報可之符始下先生孫今河北河南道肅政亷訪使從宣入其宅地爽塏夷曠過請地判官馮棋更始石國英代之同知李守敬輩一乃心力市材庇徒成祠而奉遷焉前為兩序後為講堂東西有齋峙以重門繚以周垣西偏作屋以居校職神居有嚴講授有地書院之名實副矣伻來屬記有壬昔長中書左司陪先生子右轄公師敬時聞過庭餘論且讀遺書亦私淑者也義不敢辭夫道統在天地間由開闢迄今日未嘗一日斷絶明晦有時爾接而明之其人乎孟子謂五百年必有王者興其間必有名世者亦舉其概爾孟子後千四百年始得二程夫子天佑我元俾道統之傳亟有所屬朱子卒才八年而先生生際興王之昌運得正學之真傳接道統以淑來世任斯道以覺斯民非天意有屬而能然乎舉而措之事業若時務五事其概也嗚呼中統至元之盛有隆古之所未及而有志之士竊有感焉者何哉孟子距楊墨韓子謂功不在禹下程子興起斯文其要在辨異端闢邪説先生之立朝也當更始萬物之際正始以理萬事端本以暢百支則其時也乃有申韓邪説雜鶩於中其言甘而易入其功卑而易著舉世倀倀以為開物成務如斯而已當時辭而闢之者其有所自也卒之正言以驗正道以明使踵之者知其不容於正途懲塞其將來蓋攘斥之功出於平居講明聖學辨别邪正之有素也其有功於世大矣世徒知道統之有在而不知所以羽翼夫道統者又有在焉至大庚戌集賢大學士姚公燧作祠堂記猶以未升從祀天靳築室為言皇慶癸丑始從西臺侍御史趙世延請暨宋九儒升從祀建書院京兆記則翰林學士承旨程公巨夫筆也元統乙亥皇上敕翰林學士歐陽玄為神道碑與夫制誥贊誄記銘推明道統之所在者至矣有壬晚學謏聞無所容喙矣竊惟先生之道在人心夫何逺邇之有間天下從祀感觸之機大矣懷之人固囿其中而猶屑屑鄉里者豈不以鄉里視天下其感觸之機又有捷於桴鼓者焉王烈居鄉爭田者望廬而返陽城居晉鄙薰其德而善良者幾千人况道德度越二人者乎懷之士過先生之祠有不惕然而興者乎昔先生之教育懷孟也制祠有曰再令董子帷前有傳授之弟子王通門下皆經濟之名臣有壬於懷之士有望焉至正集卷四十三
