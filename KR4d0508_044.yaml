body:
  text: 至正集卷四十四元許有壬撰碑志上都孔子廟碑至元二年丙子嵗七月庚午皇帝御洪禧殿太師秦王中書右丞相達爾罕臣巴延率中書臣僚奏上都世祖皇帝所城至元間作孔子廟仁宗皇帝修其敝增兩廡庖館故事當刻石紀列聖崇文重道之實以詔後世石已具擬中書參知政事臣有壬為文奎章閣侍書學士臣庫庫為書奎章閣承制學士臣師簡篆其額留守臣董其樹立制可臣有壬被詔悚栗罔知攸措洪惟聖朝肇造區宇亭毒運用之大功並開闢而孔子之道猶天地日月人無能名若臣之愚其何以鋪張天休闡揚至德若夫列聖崇文重道之實徴諸聞見或可復明詔萬一謹拜手稽首昧死而言曰昔我太祖皇帝之應天啓運也干戈中徴耶律楚材置左右備咨訪聞周孔教深用嘉納知天下不可馬上治立十路課稅使副皆用儒者國朝尊孔道用文臣實自是啓之太宗嗣位修曲阜廟孔子五十一代孫元措仍襲封衍聖公置編修所於燕經籍所於揚以開儒治輦曲阜雅樂爼豆祭服至日月山王鶚以孔子像達北庭命秋丁行釋奠禮飲福均胙歲以為常收羅儒士俾轉教授遣斷事官穆克德山西東路課稅長官劉中遍視儒人中者與牧守議停蠲其役且將闢舉場以精入仕擇筆且齊子十八人學漢語文字漢官子參學國語弓矢擇師分四隊以教命中書令楊惟中主其事作屋居之餼廪育之檟楚督之迄定宗朝不輟憲宗悉除漢地河西儒戶徭役世祖在藩邸招納儒士撝謙問答知草澤一士賢飛書走幣猶恐失之燕廟學汨於道流奪而歸之儒增修敝陋聞竇默三綱五常之言聖見超詣即謂人道無大於此失此則不名為人且無以立於世及正大位詔先聖廟國家致祭宜恆修潔官若使若軍馬毋泊其中理訟褻宴營造者有罪內設國子監學外分提學教授以職教議行貢舉法以取士督有司以主領責按察以勉勵儒籍者復之材成者擢之分田制祿以奉祭祀以資營修以祿其師以廪其徒而學政備舉矣成宗首詔敦勸且議貢舉又特詔中外百司申世祖之制其略曰孔子之道垂憲萬世有國家者所當崇奉而曲阜上都大都又專言之聖意所注可見矣武宗仁宗英宗文宗恪守祖訓凡大播告必首及此武宗加號大成遣使闕里祀以太牢示萬世無上之絶尊仁宗行賔興法先德行尊五經繼志述事有加焉今上皇帝三降德音靡不懇切此徴諸聞見班班有據者也尚論厯代之興禮樂制度莫不相因而我朝截然首出為一王法立經陳紀大括宇宙細盡事物不資載籍動合孔子之道非天啓大聖為斯文主以康濟斯世而能然耶而天造草昧一元坱圠之始戡定雖武文之用實行其中猶秋之有春藥之有食所遇之時異所施之偏有不免爾天常人紀自然之理則無時無地而不載焉世祖既城開平尋升上都文治益修至元六年命留守臣顔蒙古岱作孔子廟都城東南仁宗皇慶二年命留守臣賀勝重葺舊殿增廊廡齋廳庾廪庖福門閎垣墉西偏為堂廬以待國子分學田坐雲州者六十頃五十九畝興州又十四頃以教以飬作人之盛蔚乎首善之地矣今上當寧大臣協贊益闡大猷使萬世之逺億兆之衆皆知孔道之可尊而祖宗功烈有萬可述獨及此者誠以斯道在天地間一日不可無一日而無猶天運之或息無以為天地矣而貽謀垂憲舍是無大後世尊而行之其於治天下成規大法特舉而措之爾臣聞道之大原出於天其顯者謂之文帝德廣運之文經緯天地之謂也天之未喪斯文禮樂制度之謂也刪詩定書繫周易作春秋孔子之文也彼深文小道急近利務末效漸漬馴致貽禍國家雖以王文統之才卒負任使世祖明斷罪人斯得况下是萬萬者乎均謂之文可不知所辨哉士之藏修於是學者其慎擇從自格物至於平天下皆斯道也繼自今萬億年開太平之基以上副列聖崇文重道建學作人之意顧不偉歟臣有壬謹拜手稽首而獻頌曰聖神立極順天應人謀始斯臧繼體惟寅道有大原顯者為文爰出萬化兹其大鈞金革土沸弦歌載詢考禮綿蕝徵賢蒲輪灤水之陽龍岡作都據其上遊建瓴中區乃咨守成大本在儒國都閭巷有師有徒兹惟首善盍示逺圖咫尺象魏作宮渠渠南面圭衮北庭詩書列聖繼明顯承弗替既極其稱復新其敝居以餼廩搜以科第百年長育四海漸被教隆化洽人有士風引而伸之萬世攸同皇帝曰俞汝臣有壬紀載釋辭後因有今拜手稽首天子萬年斯文斯道如日在天天地位焉萬物育焉拜手稽首天子萬年大都三皇廟碑三皇置一廟有司以時祭享昉天寶六載我元稽古崇德報功元貞初天下咸秩京師嵗春秋御祝香祠以太牢宣徽供饌太府出銀幣大興府給事而太醫院主之三獻奏名蒞事禮崇物備非唐可擬顧惟殿宇涉久傾圯院使休格諏咨同官合辭上請勑工部重葺寢廡齋室應同繚垣以及墄坪炳煥俱新而碑未有紀至元三年嵗丁丑十月壬午偕院使哈喇岱五十四經歷布延特穆爾請於太師秦王達爾罕右丞相巴延協議敷奏制可中書參知政事臣有壬製文奎章閣大學士臣庫庫侍書學士臣師簡為書若篆中書移臣有壬臣有壬不敢辭洪惟三皇繼天立極生民以來君德最神聖者也十三卦言其功不及其德合元相春言其德不明其功德無能名功無所歸一有形喻蠡海而管天矣醫家者流果得而專乎徵諸掌故大德間陜西行御史臺議名醫配祭定制禮官議開天建極者列以十人則專為醫其可禮部韙之至大間湖廣省請名醫配享坐次禮部議視大儒從祀列置兩廡豈一時不考大德之議而許之耶豈以素問稱黃帝本草稱神農而亨庖始庖羲耶而天下遂為定制矣昔在壬辰太宗皇帝慮人有札瘥夭死也羅天下醫置太醫大使佩金符辛丑立太醫院總其政憲宗皇帝癸丑冠以提點世祖皇帝中統庚申給銀章又别置太醫院丙子合二為一戊寅冠以禮部尚書癸未改尚醫監秩正四品乙酉復太醫院秩正三品成宗皇帝大德辛丑升正二品帷幄重臣領之其貴且重視同醫師秦漢而下太醫令丞不侔矣補太醫員慮不根學試嚴科條入官階升迄長其院尚方侍湯液諸王重臣請醫奏遣之郡邑設學置教授正録教諭員教其術業又置提舉司其户調自為銓衡吏部不得而可否也閭閻細民征戍病卒惠之有局待之有堂著於格令以廣好生之德者厥惟至哉生民林林夫婦父子君臣上下之分定飽食暖衣養生送死之具備禮以維之刑以弼之萬世永賴可必也而四時隂陽之沴感之為疾有夭死者已則不能必其無也於是為方技以待之在三皇功德雖猶海之一勺天之昭昭然亦於生民之大者歟天下祠事俾醫尸之其以是也夫用是諗於其官若學者曰學治國具也古一而我三焉國書一代同文之制儒以明人倫醫乃鼎足峙者以其為業重且難故也技而進於道者也故必參造化之機窮事物之理而又存之以仁濟之以亷者其庶幾乎內經尚已近可訓者亦知孫思邈之論習業乎妙解百家探賾具學醫始無滯周醫師嵗終稽其全失民有死終疾醫各書其所以入於醫師若是其嚴也其或懵經旨而冥行席世名而無實熟一方而自售偶一效以自信斃人不刃者雖有常刑而逝者不可復矣盍思列聖崇秩建學之意而慎之哉且醫之責在師師之責在總於上者擇之精布之天下則人之鮮於藥者免矣班格又以銅人圖經字漫屋摧徵考無從得請修治治其具以待其人其知長人之責者乎京師天下原柢大官蒞之故將達於流而暢於枝藹乎生民之遂其生也不然三皇天地其居也元氣其神也何有於一室之修廢耶我元紹天闡繹尚質素以基皇德其亦皇首之初乎皇帝擴列聖好生之德開壽域續民命至和淪浹踵而齊泰矣於以昌聖躬萬億年無疆之壽於以固國家萬億世不拔之基於戲盛哉臣拜首稽首敢對揚天子之休命敕賜經筵題名碑世皇經營六合﨑嶇金革間首索金餘黎獻及一時經術之士諏咨善道及正九五益崇文治至元三年十二月遣中都哈雅諭旨儒臣朕宜聼何書其議選來進於是商挺姚樞楊果竇默王鶚言帝王之道為後世大法皆具尚書乃以進講八年許衡安藏進知人用人德業盛天下歸之説深用嘉納仁宗御極臺臣請開經筵乃命平章政事李孟時入講誦泰定間始以省臺翰林通儒之臣知經筵事而設其屬焉今上皇帝法聖祖之宏規考近制而損益之開宣文閣選中書樞密御史臺翰林國史之臣以見職知兼經筵丞相獨署以領重其事也其下有兼經筵官參贊官譯文官率以中書翰林僚幕若閣屬為之而不常其員又其下譯史三人檢討四人書寫五人宣使四人有公移翰林國史知經筵者署之仍用國史院印章奏為著令至正七年正月二十日知經筵事翰林學士承旨都哩特穆爾暨領經筵事中書右丞相伯勒齊爾布哈奏經筵啓沃聖心禆益治道甚盛事也領知若兼之臣宜立石以記其姓名擬翰林學士承旨臣有壬為記御史中丞臣多爾濟巴勒為書知樞密院事臣太平篆其額制可臣有壬竊聞聖人之道為天地立心為生民立極為萬世開太平之基斯道之明其本於學乎賈誼謂人君不可以不學故雖聖人亦資於教五帝三王皆有師而求多文學古訓遜志時敏念終始典于學不獨殷髙宗為然古今帝王之至訓也漢之賢君祖德師經承師問道致治之盛其有以哉若天祿石渠白虎華光與夫唐之𢎞文集賢名雖不同其討論墳典圖畫治平皆經筵也我世皇徵用儒雅開萬世太平之基薄漢唐而不居一本聖人之道垂裕後昆皇上以天縱之聖留心經籍緝熙聖學治效之隆視中統至元無忝矣臣有壬承乏經筵前後且十有五年每畨直進説天顏怡悅首肯再四經旨淵奧有契宸𠂻聖德日新宗社億萬年無疆之休此權輿也講文附經為辭若古疏義而敷繹之繼以國語譯本覆誦於後終講合二本上之萬幾之暇以資披閲焉夫官署題名昉自近代百司且有之況國家崇儒重道講求太平之大者乎凡與是選莫不以為榮遇而列其姓名者不特榮遇而已抑將勵其傾竭忠誠以格天心勿使後之觀者指而議曰某但榮遇耳則斯石也不為觀美文具矣敕賜大司農司碑語不云乎百工居肆以成其事有其地則有以庀其司鳩其人則有以僝其功苟判涣無統遷於異物求業之精不可得也百工且爾況崇位重秩而亮天工者乎大司農總天下農政其崇且重視古有加焉釐務之司宜雄大華邃而因循卑陋不稱位秩時雍坊故相巴延之居實甲諸第堂皇突兀宛若公𪠘重階連棟櫛比鱗集傍可僚幕列可曹局帑庾固密可以儲金幣棲簿書概以官府所宜有者無一不具既歸之官雖力可請賜而土木勝人不敢居也僦之齊民收其租入則虞烏合雜糅日就廢壞獨有闡為公廨是稱是宜乃至正六年閏十月二十五日大司農納克楚僧格實哩大卿哈達拉圖喇特穆爾少卿穆爾茂蘇默司丞班珠爾王恪經歷庫春特穆爾都事托音奏凡地舍邸肆沒入者悉歸農司巴延之居在其中議諸中書農司宜用為廨制允其請遂遷而闢治焉明年二月二十一日大司農僧格實哩吳秉道大卿哈達拉圖喇特穆爾少卿穆爾茂蘇默司丞班珠爾經歷庫春特穆爾都事托音等覆奏廨既得請宜紀其故敕翰林學士承旨臣有壬文諸石洪惟聖天子敦農務本責成其官因紀其居紀天休播後世宜也然古人緩於頌而急於規故槃席几杖觴豆弓矛莫不有銘以示戒也一器之微為戒若是則堂髙數仞榱題數尺可以因其地以朂其思居其肆以成其事哉帝王之治厚生而已唐虞大聖首重命稷箕疇八政周詩生民七月皆王道之始也世祖皇帝稽古建官特立農司雖品秩之隆殺分釐之內外時有不同其所以敦本抑末責成實效則無以異也仁宗皇帝崇其秩從一品位之崇也其望益隆秩之重也其任益大况一新其廨百工有肆矣亦究其事之成與不成乎且農司之立七十七年其設置責任之意播種植養之法綱以總於內目以布於外者燦然畢陳密而無隙矣責之也嚴行之也久其效宜何如哉今天下之民果盡殷富乎郡邑果盡其職乎風紀果盡其察乎見之簿書者果盡如其説乎政猶廨也嗣而居者亦思所以責其實保其完舉其仆苴其漏乎方今農司之政其概有三耕藉田以供宗廟之粢盛治膳羞以佐尚方之鼎釡教種植以厚天下之民生尊卑之勢不同理則一爾卑或凋攰尊孰與奉厚之之道其農政之先務乎昔韓愈取圬者王承福之言操鏝入富貴之家有一至再至而為墟者以其屋之歸於官也其要則曰食焉而怠其事必有天殃臣於是重有感焉昔過其門莫敢仰視一旦為我所有而治事其中念彼之失我之得也敬畏之心惕然而生矣則是廨也非我龜鏡乎持是畏敬以治其事則事無不成也於農政也何有至正集卷四十四
