body:
  text: 至正集卷五十三元許有壬撰碑志西域使者哈扎哈津碑至大己酉始建中都設留司荀公溫都爾為都事有壬為教官乙卯計偕又與其弟凱霖同旅次京師後屢合輒道故舊歡甚凱霖以交其兄弟之久知其踐履之悉也走狀京師請銘其祖考西使公碑夫聞善而與之君子之心也况交其子孫而銘其父祖乎公諱哈扎哈津諤爾根氏世西域人國去天朝逺而險非誠慤不可至公凡兩至又與其舅鎮阿薩爾渡太祖皇帝兵壓境公斷渡修壘堅守持久衆怨公不降懼破則殘獮公嘆曰廢興有天我非不知但臣子分當爾也衆益澒洞將內變遂降上按劒問抗師狀先斷其髮將誅之正色對曰臣各為其主非罪也死不過汙一席地何恨但恐無名爾上壯而釋之公仰瞻天表知可乘勢樹立因進曰阿塔布實拉爾國堅盛非他國比攻之必難拔其主與臣善請往招之制可按兵馬魯察城公單騎趨其國諭以禍福遂舉國內附録功擢領齊哩克昆既班師隸王實喇邸從戰必捷屢入奏稱㫖嵗丁巳割彰德路為王分地江南平益以寶慶路王邸在極西絶域遣使必慎擇其人以公偕魯思檐木子古里沙迪音入覲計事公夙慕中土因挈家行目疾留豐州至燕病卒時至元五年八月二十三也享年一百一十七嵗初公至和林元帥荀公竒之妻以女生二子長阿哈瑪特早卒次額森一女適瑪哈穆特荀氏繼沒皆藁殯都城西朝廷念其勞以阿薩爾為大名路稅課提領麥砧哈檐西域名族念公之賢贅額森其家生二子長溫都爾始三嵗次克哷始三月喪母繼張氏二子訥古伯克哷提領以至元十四年十二月卒年四十有四藁殯大名溫都爾兄弟鞠於外家攻儒書既長益習禮訓謀於師友曰古之姓或官或封無常也吾其從祖母之荀乎遂姓荀氏又曰我兄弟讀書學禮無名字其可名則不敢忘吾先而字則從華可也於是師友相與字溫都爾曰平叔克哷曰和叔平叔入京初補吏從儕類試藝官不示以目俾以意自書而觀其優劣焉平叔獨列法家結案字綱以對主者驚異由左司令史轉户部令史宗正府史中書右司掾除前官遷大都路警巡院達嚕噶齊階承務郎皇慶壬子十一月卒官選格分地監都縣聽自除拜西邸以和叔世𨽻其邸擬寶慶路邵陽縣達嚕噶齊中書奏可官進義副尉移彰德路臨漳縣進保義校尉平叔之喪躬赴之瘞祖父母殯側酬其遺逋挈嫂姪婦養于家以其職廕弟訥古伯內黃稅使臨漳終更移安陽愛其山水思妥其先卜地司空村有飄風旋塵為渦𨗳馬首者七衆皆見之下馬默禱若吾祖考宜此地當止風即泯買而為兆域遷祖考妣考妣兄以泰定四年嵗丁卯二月癸酉葬焉以公西來而為使也表之曰西使之阡嫂阿蘇蘇拉姪安圖繼母張氏訥古伯相繼沒俱祔馬遷林州達嚕噶齊升奉議大夫彰德路總管府達嚕噶齊兼本路諸軍鄂囉總管府達嚕噶齊管內勸農事丙子春旱入境即雨和叔自謂偶然而民心用是恱其來也作洹水石橋修公廨傳舍百廢俱興娶古華氏子溫都爾女特爾格壻約爾珠善良敬戒家法秩然我元始征西北諸國而西域最先內附故其國人柄用尤多大賈擅水陸利天下名城巨邑必居其津要專其膏腴然而求其善變者則無幾也居中土也服食中土也而惟其國俗是泥也和叔則曰豫非敢變豫俗而取擯於同類也其戾於道者變焉居是土也服食是土也是土之人與居也豫非樂於異吾俗而求合於是也居是而有見也亦惟擇其是者而從焉自吾祖為使而入中國委骨於是若詩書禮樂吾其可不從乎俗之不同理之頓異吾其可從乎於戲若和叔者孟子所謂善變者也其俗不銘而銘其先其俗墓近人而必逺五害此其變之小者也西使公自絶域入中國有勞未食及荀夫人皆殯於燕提領則殯大名平叔又殯於燕南北契濶凡幾易年始合於一繼母嫂弟姪又相繼沒其入兆域若生者之有家暮而有所歸也使為孫子弟非和叔則九殯四置幾何而不為不食之鬼哉世有忍同室為溝中瘠沒委之而顙曽不泚也故凡觀人之先不在子孫之富貴而在其賢不肖爾嘗聞西域人多壽考公度越上壽至燕年已若是其馳驅幾萬里矣計其宣力自壯至卒不衰也吁其亦異人也哉銘曰于闐之山美玉出焉雄鷙沈毅實生其間犀兵內牣巖邑外環而天命有歸則取於殘大人崩厥角小人食其簞有如此渡吾力可殫吾分不可干萬心一潰其倒如瀾惟義所在天誅為寬伏軾棹舌扶危作安唐雎九十惟古其難何百嵗餘驅馳克艱施不究於才用不崇於官流澤逢涌有子有孫弗矜好爵詩書是敦仕能愛人家能裕昆是知親親仁政所原四世一兆宰木鬱然年雖百千祠鄉之人孰不思而指曰此吾使君之祖西使之阡故承直郎僉嶺南廣西道提刑按察司事葛公墓碑昔江南平中土人南走若水趨下家而占籍者有之銜命仕者又倍蓰焉芬華因循忘棄鄉里至葬其親而不歸或志歸不力子孫單弱漸至迷委又不若遂葬之為愈也幸而歸葬漫不復省日就榛茀雖愈於迷委而孝子慈孫為不若是恝也家致千金身為達官有所不免况貧賤者乎惟篤於孝思的然有見者其庶幾乎進義校尉武昌路黃岡河泊提領葛君暨其弟永州路祁陽縣幕以至元四年戊寅嵗奉其母完顔夫人之柩歸祔輝州孫村先塋至則纍纍不容復竁卜其南為新阡遷祖考按察公而下凡十三墳按察公敕語俱逸訪親故間蓋家人質於汴且三十年倍酬而得之泣相謂曰吾先纍世弗耀及大父起家亢宗所至有善政子孫宦學不墜餘澤所被也新阡實祖我按察公而行者流離居者貧乏不表之阡是知有善而不傳且再易世將不可復考矣乃狀其行實求銘於豫豫嘉其志乃為銘之按察公諱榮世為淇上人曾大父大父罹金季亂皆能不去鄉里天兵之南也自奮出說郡守率郡人迎王師鄉里賴以生全者公之考諱旺者也元帥必拉罕命招納降附倡議置縣蘇門因署為令公任授衛輝二州提領譏察使改蘇門主簿蘇門改輝州復提領譏察使升輝州判官蘇門復縣仍主簿而兼尉焉中統初經理江南地居水陸之衝軍興駢沓儲備餉給吏之宿毒不能病民調衛州鎮撫軍民彈壓官兼録事三年復輝州判詔課農桑時河北荐饑部使者頒區田法郡邑不敏於行檄公察核躬率野人相宜授方熟得百倍土之墝埆者教以糞剃鄰境法焉勸農課最遷蘭陽縣令耕桑學校益著其績擢敦武校尉磁州判官雖居底僚下從而上信也州當孔道名遂藉甚轉平陸縣令兼諸軍鄂囉平陸號難治至即繩豪右勵游惰崇儒修教敦本易末恤征人使居行無慮五事考備大盜黨五方橫求盜畏縮公攝尉以計擒之盡其黨擢承直郎僉嶺南廣西道提刑按察司事猺賊方熾有司並供億為繭絲求其弊而刮剔之墨吏有聞風而遁者俄卒於官得年五十有五娶謝繼朱陳耶律子男七人晟德承事郎嶽鄂榷茶提舉晟信纍功至千户晟美廕濟源王屋巡檢謝所出晟義淮安鷹坊打捕提領某某早卒朱所出晟智陳所出也女一人適張氏孫男十二人曰平提領也曰順江西憲司書吏卒曰𤣥縣幕也晟德之子也曰友直以疾廢曰友諒將仕郎處州路縉雲縣主簿曰友聞黃州路蒙古字教授晟信之子也曰某某曰淑益晟美之子也曰國賓曰國瑞晟義之子也曰諾海晟智之子也女七人俱適令族曽孫男九人女十八人公之先鬱於季世至蘇門公崛起挈垂死之民而生之設施才具可驗也公蹈其躅效用兵荒之餘先之以耕桑申之以學校知所本矣惜其服政方隆而厄於壽子若孫曽孫三十人有以知其後之必大也平也𤣥也家非千金也身非達官也篤於孝思的然有見可謂賢已後之子孫宜取法焉銘曰天造未暢里將受兵有奮其傑挈之於生保我一鄉不騫不崩攝邑未施乃啓厥後細民奠居大盜獲醜爰酬其功擢之繩糾天胡不辰歸舟有柩舊封雖妥新阡惟宗若尊若卑昭穆是從固以閈垣翳以柏松既表其世亦章其庸子孫既多自南自北豈不同居勢不可一世或再易邈將不識興言及此淚出橫臆勢不可一理則可周百世繼體四方省丘自根求枝沂源及流視此珉石我銘不浮元故中奉大夫江北淮東道肅政亷訪使胡公墓志銘安陽胡公里人也始在京相從而不相知有壬擢第歸江南先太夫人語其狀後問之乃驚喜曰吾親亦令求訪而不謂得於今也承乏左司員外郎公為右司都事為右司郎中公代為員外郎先太夫人祔安陽武官塋公亦居魏郡夫人憂倚廬相去二里許時相慰也公入朝居中臺有壬參議中書省事俄為治書侍御史又同事焉未幾公以病歸除河南江北等處行中書省參知政事不行改江北淮東道肅政亷訪使一至即歸有壬待罪中書者五年始得請至鄉里相見甚歡公嘗力疾為具方念秋益凉病日退當日相從遊而不意天之殱我故人遂至於不起也孤敬伯泣而請曰先子德善匪公誰屬嗚呼契濶之久始得合並而遽銘其墓邪公諱彛字安常姓胡氏雪野其自號也世居鄢陵貞佑之亂遷安陽遂占籍焉祖諱珍纍贈嘉議大夫吏部尚書上輕車都尉追封魏郡侯祖妣祝氏纍封魏郡夫人父諱景先纍贈中奉大夫江浙等處行中書省參知政事護軍追封魏郡公妣王氏追封魏郡夫人葬安陽孝明原二子長則公也夙稟頴悟起家鄉校官轉大都路儒學録中書參議器其才辟掾府中歷儀曹省府為中書右司掾除工部司程工部主事除河南行省員外郎省曹有小人欲以糧傾其僚公抗救之力居多嵗饑贊省臣擅發廪活飢者僉河西隴右道肅政亷訪司事行部凉州辨盜牛之寃而正贓吏之罪拜監察御史遷右司都事計事行在所張實者陳言伏路左乘輿之馬為驚將誅之抗議得免上都獄有殺人之夫者賂西僧將用佛法曲赦之公力陳其非卒正其罪升左司員外郎尋除工部侍郎漷州倉為水所汜作渠分其勢公所董萬人夜忽舉火譟潰同僚惶懼公但靜坐至旦繩其首衆復安役魏郡公訃至奔赴迄襄事羸毁骨立服除拜陜西諸道行御史臺治書侍御史太夫人迫之使行當關中大饑之餘甫事經畫而太夫人訃至既葬遂廬墓側手樹松柏大作塋門甫大祥除江西湖廣道肅政亷訪使行改户部尚書請使交至鄉里榮之户部兩遇朝廷有大故頒諸王費巨萬計公建議以鹽易銀賜用以足拜治書侍御史升御史既歸除河南不行至淮東即歸疾革盛服趺坐教弟子家人覼縷明盡請郡侯杜公𢎞道與之訣又作詩留别其友五人有壬其一也治命柩以論語殉勿斂華美勿用緇黃言畢而逝公生至元十八年辛巳十二月二十五日丙辰以後至元四年戊寅閏八月二十七日薨於正寢享年五十有八以是年十一月十二日壬申祔魏郡公塋娶楊氏封魏郡夫人一子敬伯也國子生補侍儀舍人一女適侯思禮平生刻意字學憂樂不廢其薨也鄉人皆以為歷階二品年及六十身居鄉里弟若子皆在側以疾終於家在公為無憾豫獨以為生之難成之難世既失才豫復失友其能不為之痛哉銘曰公昔入京蜚英妙年我從之游莫知其先尚論世契悔言之遲天復遂之聨班鳳池憂患歸來創巨盡瘁一線洹水泪血相視臺閣路逺公閒我來觴詠未竟松柏遽摧琅琅耳言巖巖耳存述美貴知子豫所惇霜鶻騰秋後邁無前人有菜色以腴以鮮小人犯蹕斧將及吭何以生之力陳其狂坐鎮衆喧力障狂流時名即我我豈名求分藩既重領憲亦劇匪病匪老敢忘帝力歸來里閈詩酒自娛誰謂一旦古今異途遺辭及豫字仍飛動墓雖宿草哭猶為慟孝明之原祖考是從我銘不佞永志幽宫至正集卷五十三
