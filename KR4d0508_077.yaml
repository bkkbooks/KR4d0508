body:
  text: 至正集卷七十八元許有壬撰樂府水調歌頭題蕭獨清山水勝處山水據全勝消得獨清人神仙定在何處此處可尋真山有蓬莱氣象水有瀛州風物人是葛天民翫得紫芝老吟盡碧桃春四時花千日酒一溪雲回頭下望濁世無地不紅塵憶昔乗軺江右目斷丹霞翠壁㡳事走踆踆今日送君語聊為自移文二胭脂井次湯碧山教授韻它山一卷石何意效時粧天生偶然斑駁蘭麝不能香甃作陳家宫井澆出後庭玊樹直使國俱亡故邑久眢廢陳迹草茫茫嘆人間才璇室又阿房麗華鬒髪如鑑曽此笑相將一旦江山瓶墜猶欲夫妻同穴甚矣色成荒五色補天缺萬世仰媧皇三即席贈河南廉使髙辛甫徒陽記同署三十四年過朝臺暮省蹤跡贏得鬢雙皤相别又逾一紀百嵗都能幾見塵事日蹉跎今夕復何夕旌節照山阿笑年来洹水上試魚簑迂踈久厭城市其奈故人何浩蕩雲山烟水寥落晨星霜木如子已無多邂逅一樽酒忍負醉時歌四和鄭彦章韻春来久無雨都作艶陽天天公素念民事其忍穢良田鞭起九淵濃睡散作兩間膏澤生意發天然聽得老農語大有是今年玊堂深金闕近亂雲烟乾坤放眼無際何物不鮮姸休把聖功收歛要使人心滿慰萬事此為先我老歸農好宜買潞河船沁園春送鄉人髙子翔次来韻放眼蕪城北盡淮堧東馳海門歎故園遥隔闗山岐路好懐深負風月乾坤邂逅佳人笑談清致所見而今勝所聞江湖樂任提鷴挈鷺翳鳯騎麟世間富貴浮雲也莫校箕山與渭濵想抱闗擊析心期賢聖耕田鑿井上有華勲休道官卑休嫌俸少且喜詩成句句新君歸矣問故園桃李幾度青春二寄題詹事丞張希孟綽然亭用王繼學參議韻俯仰乾坤傲睨羲皇優㳺快哉看平湖秋碧浄隨天去亂峯烟翠飛入忩来鴻鵠翺翔雲霄寥廓斥鷃蓬蒿莫見猜門常閉怕等閒踏破滿院蒼苔人間暮省朝臺奈烏兎堂堂挽不回愛小軒月落夢驚風竹空江嵗晚詩到寒梅兩鬢清霜一襟豪氣舉世相知獨此杯京華客問九街何處堪避風埃三次希孟韻召至通州以病歸時齋詹事丞亦堅卧不出因并呈之坎止流行行止非人何勞用心羡枝巢居士泥塗軒冕時齋老子城市山林富貴何常榮枯逓轉惟有髙名不陸沉他休問只清風一榻多少黄金神仙方外難尋更可笑牛山泪滿襟且清尊素琴半庭花影芒鞋竹杖十里松隂歸去成辭閒居留賦梁父安能抱膝吟迷途者聽雲間髙唱誰嗣鴻音四夀可行弟次其見夀韻天相吾家篋笥無金詩書有人看發揮胷臆辭鋒凛凛薰陶氣質韋佩申申師友淵源賢才衡鑑胄館光華近帝宸男兒事便盡輸心力難報君親讀書第一當勤只孝弟書中是大倫況人生為學百年在㓜田家得計一嵗惟春科占龍頭名髙鴈序好與皇家作鳯麟都休問是地鍾河嶽天應星辰五夀同館虎賁百夫長鄧仁甫十載炎方同飲江漢同為轉蓬恨尋常㑹面當年無分三千餘里此地相逢宇宙英奇幽并慷慨肯事區區筆硯中男兒志要長鎗大劒談笑成功轅門醉卧秋風看落日旌旗掩映紅愛朔雲邊雪一聲寒角平沙細草幾㸃飛鴻湖海情懐金蘭義氣莫惜瓊杯到手空君知否怕明朝回首渭北江東六次班彦功韻旅食京華蜀道天難邯鄲夢回笑白衣蒼狗悠悠無定黄塵赤日擾擾何為長鋏休彈瑶琴時鼓倦鳥誰教强去来衡門下幸良辰良友同酒同詩功名少壯為期奈身外升沉自不知算人間難得還丹大藥山中儘有老樹清溪蕙帳雲空石田苔滿應被山靈怪去遲春来也向故園回首歸去休迷七弱冠離家浪走人間餘三十年奈救時才短虛塵政府讀書功少深負經筵風月西清氷霜柏署一嵗中間漫幾遷君恩重便不教覆餗直許歸田豐碑髙表洹阡又飛上呉頭萬里船把家傳圖史拂除塵蠧舊栽松竹収貯雲烟大别嵯峨鵠逢縹緲盡在先生几案前閒人事但登樓小酌閉户髙眠八老子當年壯志凌雲巍科起家被塵囂拂耳鏖成重聽簿書眯眼攻作昏花天上歸来山中絶倒部曲黄牛鼓吹蛙閒官好判園丁牧豎一日三衙平生幾度天涯恰艤住飄飄泛海槎向竹林苔徑時来教鶴山泉石鼎自為烹茶庭下花開樓頭雨霽儘着春風笑鬢華功名事問西山爽氣多少烟霞九飛吟亭和白玉蟾韻少日飛騰湖海奇胷風雲壯圖把人間逺道看為咫尺眼前實地認作虛無釃酒中天振衣千仞塵世烟霞有幾區君山下見洞庭清淺欲問麻姑故吾只是今吾已深愧當年大丈夫悵川流不息真如逝者天風髙舉更有誰歟鼎鼐何功江山多幸長鋏歸来食有魚神仙事笑臨卭道士還在洪都十次張孟功韻撃楫中流躍馬長途今非向年嘆故人萬里江東渭北流光幾度鴈後花前鬢影星星人情落落恰念蘇家負郭田空惆悵負清泉白石布韤行纒壺中浩蕩瑶天問清濁何須較聖賢想塵埃狂走難逢一笑扶摇直上且任孤騫飯有魚羮儲無甔石何必千金學計然君知否但東山醜婦也自嬋娟十一次王仲武為夀韻彼夀而康鴈自能鳴樗還不材且光華老景春風秋月消磨舊夢暮省朝臺倚伏相尋窮通素定軒冕於人果儻来神仙遠有桃花流水便到天台雲林都是親栽幸登覽猶能矍鑠哉但携琴載酒時時遊戱逢山見竹處處安排諌議無功催科無政爛醉何妨卧客懐承平日看英才用世多少臺莱十二賦鶴奴次馬明初韻頂有丹砂服具𤣥明云胡作奴想風霜搏撃不如一鶚雲霄變化復愧雙鳬爾雅無名山經不志多識慚予問學孤今知汝肯自為卑下甘事勤劬蠏奴魚婢然乎笑多士文人善矯誣愛汝從仙侣毎能謙抑日陪食飲惟取殘餘赤壁飛来雲龍放去守舍應門屬𦕈軀無多語似王家便了有約休渝十三賦酪次明初韻有物龎然乃牝而犁山川舍諸為老饕營口因踈黄稚平心酬徳忍怠青芻方丈無功萬錢増害茹飲方將效穴居桃林媪幸日輸甘湩香泛流酥老饕笑問長鬚汝今似桐官不是奴更題封誰調聰明徳祖和漿且浣消渴相如火候沖融春膏濃結常遣韋囊似瓠壺將軍腹問果誰相負吾欲明書十四臨清舟中即席次韓伯髙見贈韻草木無情不問寒暄開時便開只黄花多事偏憐隠逸白頭何補願避賢才老友相逢清談絶倒休校劉郎去後栽尊中物勝它年千里漫寄寒梅神仙合住蓬莱奈老去思兒忍不回任耿莊槐老休為癡夢梅家酒熟且浣愁懐渭北江東暮雲春樹何日扁舟更此来公知不便連朝觴詠能幾徘徊木蘭花慢秦淮次湯碧山教授韻問東来何處控呉越壯江淮愛十里縈紆水雲圖畫鼓吹風雷回頭下臨無地盡朱樓迢逓倚天開酒斾髙懸别浦繡簾低拂長桅踈狂常與世情乖勝地却須来漫懐古長歌後庭花落斜日潮回傷心舊時明月照凄凉亡國恨無涯為問水邊鷗鷺人間幾夢庭槐二至大戊申八月廿五日同踈仙萬户㳺城南㢘園園甲京師主人野雲左丞未老休致指清露堂扁命予二人分賦長短句予得清字皆即席成章喜甚牓之踈仙其甥也後更號酸齋云渺西風天地拂吟䄂出重城正秋滿名園松枯石潤竹瘦霜清扁舟采菱歌斷但一泓寒碧畫橋平放眼奇觀臺上太行飛入簷楹主人聲利一毫輕愛客見髙情便芡剥驪珠蓮分氷繭酒注金瓶風流故家文獻况登髙能賦有諸甥清露堂前好月多應喜我留名三次韻馬廷彦山居羡山人結屋腰碧澗面丹崖問桂有餘香槐多擁翠誰種誰栽幾年力田勤學是慶源先世有人開樂地夏弦春誦浮雲暮省朝臺半生奔走負山齋何地不塵埃歎老病才歸鄉隣幸恕不忍擠排白眉故人多事似東門偏更道賢哉但有黄雞白酒老夫不倦頻来四次韻薛夀夫見寄笑余生多癖非酒病即書囚任世態翻騰亥訛成豕沈變為尤中條有亭無恙論三休吾更早宜休方外青山故在鏡中白髪新收天風鏘佩下瓊樓心事付東流向一壑雲深三年夢熟八表神逰淵明苦無多語只髙標千古邈難儔老子新銜自署醉鄉談笑封侯五和杜徳常中秋韻歎流光如水又分破一年秋奈妬雨癡雲良宵佳節不遂登樓山川滿前圖畫幸故鄉無復有新愁風物催成老境乾坤付與雙眸幾年京國苦淹留今得賦歸休況天柱峯頭清輝好在氛翳俱收身閒更逢全景是腰錢騎鶴上揚州明日霜天紅樹絶勝蘆葉汀洲六次白公嚴為壽韻記青年充賦曽射䇿對嚴宸便暮省朝臺才離筦轄又掌絲綸狂愚豈勝時用幸扁舟歸去早知津一任無錢使鬼猶能有筆通神交逰萍水百年身襟袂幾回分正雪後花前江東渭北嗟我懐人澶淵召棠成頌肯推揚餘韻頌莊椿老矣甘心伏櫪天衢行看翔麟七和鄭彦章暮春即事韻問東君何意来幾日便言歸悵衰病襟懐媗姸景物正欲相依狂風不知人苦遣萬紅千紫一時飛却見楊花才思閒来縈絆晴暉可人應試紵羅衣底事鴈書稀望故里闗河雲林杳靄烟水霏微多情已無聊頼更扁舟孤負鱖魚肥想見洹溪松竹緑隂籠滿苔磯六州頭歌次馬明初韻書所見軒昻仙侶風度似吾儕凡鳥軰雖累百總輿臺敢偕偕何處風絲客昧平昔恣豗突形迹異天壤隔遽相排老眼渾如無見雲霄遠未便時乖笑朱蝥肆螫自喪亦多哉我出塵埃浩無涯有傍觀者同氣類公好惡挺身来行不義宜自斃坐虺頺任奸回萬事如翻手吾方此外形骸来汝鶴吾有語汝無哀誰遣乗軒烜赫令此軰眼不能開付恩讐一笑漫且啄苺苔休面三槐二次明初為夀韻避賢解組三見太行秋慙晝錦猶遠勝敝貂裘翫滄州霜水清如玉窮霄壤忘物我恢幛塞無牖户底綢繆自笑平生事業如今日頗善為謀有静中至樂何處更天㳺已分淹留醉鄉侯有江湖客翰墨友凌元白壓曹劉論文暇陪杖屨事觥籌共藏修世態誰能校輕骯髒重伊優吾有政鋤藥圃治瓜疇說與愚夫樵叟既相好豈但相猶任多言莫及野渡有孤舟天地沙鷗蘭陵王賦古劒用吉善甫韻昆吾鐡神物千年不滅時出匣摇蕩碧空閃閃寒芒電光掣細看時是巨闕三尺斜明隙月新豐旅憚爾醉歌也勝毛錐校平側沈埋土花碧向堅石寒泉重礪霜雪一天星斗昏無色因起舞為樂崆峒試倚螭魅膽寒石自裂免豐獄羈紲勲業幾英傑是曽馘奸邪腥漬餘血方今四海邊塵絶佩服處閒伴金魚寳玦只愁靈化雷雨暗水雲國至正集卷七十八
